<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積書・請求書プレビュー</title>
<style>
:root{--navy:#1e2d40;--gold:#c8a96e;--beige:#eeebe5;--border:#ddd;--bg:#f5f4f0;--white:#fff;--text:#111;--sub:#666;--red:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Meiryo","Yu Gothic",sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--navy);color:#fff;padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:14px;font-weight:500;letter-spacing:0.05em;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.btn{padding:6px 16px;border-radius:4px;font-size:12px;cursor:pointer;border:none;font-family:inherit;}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.4);color:#fff;font-size:11px;}
.btn-outline:hover{background:rgba(255,255,255,0.1);}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:700;}
.btn-gold:hover{background:#d4b97e;}
.mode-label{font-size:11px;color:rgba(255,255,255,0.6);margin-right:4px;}
.doctype-toggle{display:inline-flex;background:#2a3f58;border:1px solid rgba(255,255,255,0.25);border-radius:4px;overflow:hidden;}
.dt-btn{padding:4px 12px;font-size:11px;background:transparent;color:#fff;border:none;cursor:pointer;font-family:inherit;letter-spacing:0.04em;}
.dt-btn:hover{background:rgba(255,255,255,0.08);}
.dt-btn.active{background:var(--gold);color:var(--navy);font-weight:700;}
.mode-select{background:#2a3f58;color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;}
.main{display:flex;flex:1;overflow:hidden;}
.resizer{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background 0.15s;}
.resizer:hover,.resizer.dragging{background:var(--navy);}
.editor{width:520px;min-width:320px;max-width:70vw;background:var(--white);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.editor-head{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--beige);display:flex;align-items:center;justify-content:space-between;}
.editor-head h2{font-size:12px;color:var(--navy);font-weight:700;letter-spacing:0.06em;}
.editor-body{flex:1;overflow-y:auto;padding:12px 14px;}
.fgroup{margin-bottom:10px;}
.fgroup label{display:block;font-size:11px;color:var(--sub);margin-bottom:3px;font-weight:500;}
.fgroup input,.fgroup select,.fgroup textarea{width:100%;border:1px solid var(--border);border-radius:3px;padding:5px 8px;font-size:12px;font-family:inherit;color:var(--text);background:#fff;}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{outline:none;border-color:var(--navy);}
.fgroup textarea{resize:vertical;min-height:48px;}
.fgroup-row{display:flex;gap:8px;}
.fgroup-row .fgroup{flex:1;}
.section-sep{border:none;border-top:1px solid var(--border);margin:12px 0 8px;}
.section-label{font-size:11px;font-weight:700;color:var(--navy);letter-spacing:0.06em;margin-bottom:6px;}
/* フラット明細テーブル */
.items-wrap{overflow-x:auto;}
.items-table{width:100%;min-width:500px;border-collapse:collapse;font-size:11px;table-layout:fixed;}
.items-table th{background:var(--navy);color:#fff;padding:5px 5px;font-weight:500;white-space:nowrap;}
.items-table td{border-bottom:1px solid #eee;padding:6px 2px;vertical-align:middle;}
.items-table td input{width:100%;border:1px solid transparent;border-radius:2px;padding:3px 4px;font-size:11px;font-family:inherit;background:transparent;min-width:0;color:#111;}
.items-table td input[type=number]{-moz-appearance:textfield;}
.items-table td input[type=number]::-webkit-inner-spin-button,
.items-table td input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.items-table td input:focus{border-color:var(--navy);background:#fff;outline:none;}
.items-table td input.r{text-align:right;}
.col-drag{width:18px;padding:0!important;}
.col-name{width:28%;}
.col-qty{width:9%;}
.col-unit{width:8%;}
.col-price{width:13%;}
.col-amt{width:13%;}
.col-note{width:21%;}
.col-del{width:6%;}
/* 大項目明細テーブル */
.groups-wrap{display:flex;flex-direction:column;gap:8px;}
.group-block{border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.group-header{display:flex;align-items:center;background:#e8ecf0;padding:5px 8px;gap:6px;}
.group-header input{flex:1;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--navy);font-family:inherit;outline:none;}
.group-header input:focus{background:#fff;border-radius:2px;padding:1px 4px;}
.group-del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:12px;padding:2px 4px;}
.group-del-btn:hover{color:var(--red);}
.group-items-table{width:100%;min-width:400px;border-collapse:collapse;font-size:11px;table-layout:fixed;}
.group-items-table th{background:#f0f2f4;color:var(--navy);padding:4px 5px;font-weight:500;font-size:10px;border-bottom:1px solid var(--border);}
.group-items-table td{border-bottom:1px solid #eee;padding:9px 2px;height:52px;vertical-align:middle;}
.group-items-table td input{width:100%;border:1px solid transparent;border-radius:2px;padding:3px 4px;font-size:11px;font-family:inherit;background:transparent;min-width:0;color:#111;}
.group-items-table td input[type=number]{-moz-appearance:textfield;}
.group-items-table td input[type=number]::-webkit-inner-spin-button,
.group-items-table td input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.group-items-table td input:focus{border-color:var(--navy);background:#fff;outline:none;}
.group-items-table td input.r{text-align:right;}
.gcol-drag{width:18px;padding:0!important;}
.gcol-name{width:30%;}
.gcol-qty{width:10%;}
.gcol-unit{width:9%;}
.gcol-price{width:14%;}
.gcol-amt{width:14%;}
.gcol-note{width:15%;}
.gcol-del{width:6%;}
.group-subtotal{text-align:right;padding:4px 8px;font-size:11px;color:var(--sub);background:#f8f8f6;border-top:1px solid var(--border);}
.add-item-btn{width:100%;padding:4px;border:none;background:#f0f2f4;font-size:11px;color:var(--sub);cursor:pointer;font-family:inherit;text-align:left;padding-left:10px;}
.add-item-btn:hover{color:var(--navy);background:#e8ecf0;}
.add-row-btn{margin-top:6px;width:100%;padding:5px;border:1px dashed var(--border);border-radius:3px;background:transparent;font-size:11px;color:var(--sub);cursor:pointer;font-family:inherit;}
.add-row-btn:hover{border-color:var(--navy);color:var(--navy);}
.del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:12px;padding:2px 3px;border-radius:2px;}
.del-btn:hover{color:var(--red);background:#fff0f0;}
.drag-handle{cursor:grab;color:#ccc;font-size:13px;padding:2px 3px;user-select:none;line-height:1;}
.drag-handle:hover{color:var(--navy);}
.drag-handle:active{cursor:grabbing;}
tr.drag-over td{border-top:2px solid var(--navy)!important;}
tr.dragging{opacity:0.4;}
.pb-btn{background:none;border:1px solid #ddd;cursor:pointer;color:#bbb;font-size:9px;padding:2px 4px;border-radius:2px;white-space:nowrap;font-family:inherit;}
.pb-btn:hover{border-color:var(--navy);color:var(--navy);}
.pb-btn.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.pb-row-mark td{border-top:2px dashed var(--navy)!important;position:relative;}
.pb-row-mark td:first-child::before{content:"── 改ページ ──";position:absolute;top:-10px;left:0;font-size:9px;color:var(--navy);background:#fff;padding:0 4px;letter-spacing:0.05em;}
.total-box{background:var(--beige);border-radius:4px;padding:8px 12px;margin-top:10px;font-size:12px;}
.total-row{display:flex;justify-content:space-between;padding:2px 0;color:var(--sub);}
.total-row.final{font-weight:700;font-size:14px;color:var(--navy);border-top:1px solid var(--border);padding-top:5px;margin-top:3px;}
.preview{flex:1;overflow:auto;padding:20px;background:#ccc;}
.preview-inner{transform-origin:top left;}
.doc-page{width:210mm;min-height:297mm;margin:0 auto;background:#fff;padding:13mm 15mm;font-family:"Meiryo","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:14px;line-height:1.65;color:#111;box-shadow:0 2px 16px rgba(0,0,0,.18);}
/* ── ひな形CSS プレビュー内に適用 ── */
.doc-page :root{--text:#111111;--text-sub:#444444;--white:#ffffff;--band:#555555;--band-dark:#444444;--band-mid:#666666;--even:#f4f4f4;--subtotal-bg:#e8e8e8;--border:#bbbbbb;--border-dark:#888888;--light:#f8f8f8;}
.doc-page .header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #111;padding-bottom:8px;margin-bottom:10px;}
.doc-page .header-left{position:relative;display:block;}
.doc-page .company-name{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:22px;font-weight:700;color:#111;letter-spacing:0.06em;line-height:1.3;}
.doc-page .company-name .co-prefix{font-size:15px;font-weight:400;letter-spacing:0.1em;}
.doc-page .company-info{font-size:11.5px;color:#444;margin-top:5px;line-height:1.9;}
.doc-page .kakuin{width:64px;height:64px;position:absolute;top:6px;right:-11px;}
.doc-page .doc-title{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:28px;font-weight:700;color:#111;letter-spacing:0.18em;text-align:right;}
.doc-page .doc-meta{font-size:11.5px;color:#444;text-align:right;margin-top:6px;line-height:2;}
.doc-page .info-section{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:16px;}
.doc-page .info-left{flex:1;display:flex;flex-direction:column;gap:8px;}
.doc-page .client-name{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:21px;font-weight:600;color:#111;border-bottom:2px solid #111;padding-bottom:4px;}
.doc-page .summary-box{background:#444!important;color:#fff!important;padding:12px 22px;border-radius:3px;text-align:right;flex-shrink:0;}
.doc-page .summary-box .s-label{font-size:11px;color:#e0e0e0!important;letter-spacing:0.08em;}
.doc-page .summary-box .total-amount{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:26px;font-weight:700;color:#fff!important;margin-top:2px;letter-spacing:0.04em;}
.doc-page .summary-box .tax-note{font-size:11px;color:#e0e0e0!important;margin-top:3px;}
.doc-page .project-band{background:#555!important;border-left:5px solid #111;padding:6px 14px;margin-bottom:6px;font-size:11.5px;color:#fff!important;display:inline-flex;flex-direction:column;gap:3px;align-self:flex-start;}
.doc-page .band-label{color:#ddd!important;margin-right:4px;}
.doc-page .section-title{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:13px;font-weight:600;color:#111;border-bottom:2px solid #111;padding-bottom:3px;margin-bottom:6px;letter-spacing:0.08em;}
.doc-page .estimate-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px;border:1px solid #888;}
.doc-page .estimate-table thead th{background:#555!important;color:#fff!important;padding:6px 8px;font-weight:700;font-size:11.5px;letter-spacing:0.05em;border-right:1px solid #666;}
.doc-page .estimate-table thead th:first-child{text-align:left;}
.doc-page .estimate-table thead th:not(:first-child){text-align:right;}
.doc-page .estimate-table tbody tr{border-bottom:1px solid #bbb;}
.doc-page .estimate-table tbody tr:nth-child(even){background:#f4f4f4!important;}
.doc-page .estimate-table tbody td{padding:9px 10px;vertical-align:middle;color:#111;border-right:1px solid #bbb;}
.doc-page .estimate-table tbody td:first-child{text-align:left;}
.doc-page .estimate-table tbody td:not(:first-child){text-align:right;}
.doc-page .estimate-table .subtotal-row td{background:#e8e8e8!important;font-weight:700;font-size:13px;}
.doc-page .estimate-table .section-header td{background:#444!important;color:#fff!important;font-weight:700;font-size:11.5px;padding:4px 8px;}
.doc-page .bottom-section{display:flex;gap:14px;align-items:flex-start;margin-top:10px;margin-bottom:10px;}
.doc-page .note-box{flex:1;border:1px solid #888;border-radius:3px;padding:8px 12px;background:#f8f8f8;font-size:11px;color:#444;line-height:1.8;min-height:80px;}
.doc-page .note-title{font-size:11.5px;font-weight:700;color:#111;margin-bottom:4px;letter-spacing:0.06em;border-bottom:1px solid #bbb;padding-bottom:4px;}
.doc-page .totals-wrap{flex-shrink:0;}
.doc-page .totals-table{width:300px;border-collapse:collapse;font-size:12px;border:1px solid #888;}
.doc-page .totals-table td{padding:5px 12px;border-bottom:1px solid #bbb;color:#111;}
.doc-page .totals-table td:last-child{text-align:right;}
.doc-page .totals-table .t-subtotal td{background:#e8e8e8!important;font-weight:600;}
.doc-page .totals-table .t-final{background:#444!important;}
.doc-page .totals-table .t-final td{padding:8px 12px;font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:14px;font-weight:700;color:#fff!important;border-bottom:none;}
.doc-page .footer{margin-top:10px;border-top:1px solid #888;padding-top:6px;display:flex;justify-content:space-between;font-size:11px;color:#444;}
.doc-page .validity{font-size:11px;color:#444;text-align:left;margin-bottom:8px;margin-top:4px;}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   スマートフォン対応（768px以下）
   JS一切変更なし・CSSのみ
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media (max-width:768px){
  /* タブバー（スマホのみ表示） */
  .sp-tabbar{
    display:flex!important;
    background:var(--white);
    border-bottom:2px solid var(--border);
    flex-shrink:0;
  }
  .sp-tab{
    flex:1;height:48px;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;color:var(--sub);
    border-bottom:3px solid transparent;cursor:pointer;gap:4px;
  }
  .sp-tab.active{color:var(--navy);border-bottom-color:var(--gold);}
  .sp-tab-num{
    width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    background:#e0e0e0;color:#888;
  }
  .sp-tab.active .sp-tab-num{background:var(--gold);color:var(--navy);}

  /* レイアウト変更 */
  .main{flex-direction:column;}
  .resizer{display:none;}

  /* エディター */
  .editor{
    width:100%!important;min-width:0!important;max-width:100%!important;
    flex-shrink:1;
  }
  .editor-body{padding-bottom:72px;}

  /* フォーム入力を大きく */
  .fgroup input,.fgroup select,.fgroup textarea{
    font-size:16px!important;padding:8px 10px!important;min-height:44px;
  }
  .fgroup textarea{min-height:72px;}

  /* プレビュー：スマホ時は編集パネルの下に配置 */
  .preview{
    flex:none!important;
    padding:12px;
  }

  /* sp-hidden：スマホで非表示 */
  .sp-hidden{display:none!important;}

  /* 底部ナビ */
  .sp-bottom-nav{
    display:flex!important;
    position:fixed;bottom:0;left:0;right:0;
    background:var(--white);border-top:1px solid var(--border);
    padding:8px 10px;gap:8px;z-index:200;
  }
  .sp-nav-btn{
    flex:1;height:52px;border-radius:6px;font-size:14px;font-weight:700;
    cursor:pointer;border:none;font-family:inherit;
  }
  .sp-nav-back{background:#f0f2f4;color:var(--navy);}
  .sp-nav-next{background:var(--gold);color:var(--navy);}
  .sp-nav-print{background:var(--navy);color:#fff;}

  /* スマホ時：エディター/プレビューの表示切替 */
  .main.sp-show-preview .editor{display:none;}
  .main.sp-show-preview .preview{display:block!important;}
  .main:not(.sp-show-preview) .preview{display:none!important;}
  .main:not(.sp-show-preview) .editor{display:flex;}
}

/* PC時はタブバー・底部ナビを非表示 */
@media (min-width:769px){
  .sp-tabbar{display:none;}
  .sp-bottom-nav{display:none;}
}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title" id="topbar-title">見積書プレビュー</span>
  <div class="topbar-actions">
    <span class="mode-label">書類：</span>
    <div class="doctype-toggle">
      <button class="dt-btn active" id="dt-mitsumori" onclick="switchDocType('mitsumori')">見積書</button>
      <button class="dt-btn" id="dt-seikyu" onclick="switchDocType('seikyu')">請求書</button>
    </div>
    <span class="mode-label" style="margin-left:10px;">モード：</span>
    <select class="mode-select" id="mode-select" onchange="switchMode(this.value)">
      <option value="flat">フラット（単一明細）</option>
      <option value="group">大項目・小項目</option>
      <option value="lump" id="mode-lump" style="display:none;">1式表記</option>
    </select>
    <button class="btn btn-gold sp-hidden-sm" onclick="printHTML()">印刷・PDF保存</button>
  </div>
</div>
<!-- スマホ用タブバー -->
<div class="sp-tabbar" style="display:none">
  <div class="sp-tab active" id="sp-tab-edit" onclick="spGoTab('edit')">
    <span class="sp-tab-num">1</span>入力
  </div>
  <div class="sp-tab" id="sp-tab-preview" onclick="spGoTab('preview')">
    <span class="sp-tab-num">2</span>確認
  </div>
</div>
<!-- スマホ用底部ナビ -->
<div class="sp-bottom-nav" style="display:none" id="sp-bottom-nav">
  <button class="sp-nav-btn sp-nav-back" id="sp-nav-back" style="display:none" onclick="spGoTab('edit')">◀ 入力</button>
  <button class="sp-nav-btn sp-nav-next" id="sp-nav-next" onclick="spGoTab('preview')">確認へ ▶</button>
  <button class="sp-nav-btn sp-nav-print" id="sp-nav-print" style="display:none" onclick="printHTML()">印刷・PDF保存</button>
</div>
<div class="main" id="main-area">
  <div class="editor">
    <div class="editor-head"><h2>積算編集</h2></div>
    <div class="editor-body">
      <div class="fgroup"><label>宛名（会社名）</label><input id="atena" type="text" value="" placeholder="例：株式会社〇〇" oninput="render()"></div>
      <div class="fgroup-row">
        <div class="fgroup"><label id="label-docNo">見積番号</label><input id="mitsumoriNo" type="text" value="AR-26-XXX-M1" oninput="render()"></div>
        <div class="fgroup"><label>発行日</label><input id="hakkoDate" type="date" oninput="render()"></div>
      </div>
      <div class="fgroup" id="shiharai-wrap" style="display:none;"><label>お支払期限</label><input id="shiharaiDate" type="date" oninput="render()"></div>
      <div class="fgroup"><label>工事件名</label><input id="kojimei" type="text" value="" placeholder="例：〇〇邸 外壁塗装工事" oninput="render()"></div>
      <div class="fgroup"><label>施工場所</label><input id="seshubasho" type="text" value="" placeholder="例：大分県別府市〇〇" oninput="render()"></div>
      <div class="fgroup" id="koki-wrap" style="display:none;"><label>工事期間</label><input id="koki" type="text" value="" oninput="render()" placeholder="例：2026/4/22 または 2026/4/1〜2026/4/30"></div>
      <hr class="section-sep">
      <div id="items-editor"></div>
      <div class="total-box" id="total-box"></div>
      <div id="shokeihi-wrap" style="display:flex;gap:8px;margin-top:8px;align-items:center;">
        <div class="fgroup" style="flex:1;margin:0;">
          <label style="font-size:10px;color:var(--sub);">諸経費率（%）</label>
          <input id="shokeihiRateInput" type="number" value="15" min="0" max="100" step="0.1"
            style="width:100%;border:1px solid var(--border);border-radius:3px;padding:4px 8px;font-size:12px;font-family:inherit;"
            oninput="shokeihiRate=parseFloat(this.value)||0;render()">
        </div>
        <div class="fgroup" style="flex:2;margin:0;">
          <label style="font-size:10px;color:var(--sub);">値引き（円）</label>
          <input id="nebikiInput" type="number" value="0" min="0"
            style="width:100%;border:1px solid var(--border);border-radius:3px;padding:4px 8px;font-size:12px;font-family:inherit;"
            oninput="nebiki=parseFloat(this.value)||0;render()">
        </div>
      </div>
      <hr class="section-sep">
      <div id="bikou-wrap">
        <div class="section-label">備考欄</div>
        <div class="fgroup"><textarea id="bikou" rows="3" oninput="render()"></textarea></div>
      </div>
    </div>
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="preview" id="preview-area">
    <div class="preview-inner" id="preview-inner">
      <div class="doc-page" id="doc-page"></div>

function switchMode(v){
  const prev = mode;
  mode=v;
  // lumpモードから他モードに切替：自動投入したlumpサンプル行を削除
  if(prev==='lump' && v!=='lump'){

    groupSummaryItems.push({name:kojimei, qty:1, unit:'式', price:0, note:'', _lumpAuto:true});

}

// ── 書類種別切替 ──
function switchDocType(type){
  docType = type;
  const L = LABELS[docType];

  // topbar
  document.getElementById('topbar-title').textContent = L.topbarTitle;
  document.getElementById('dt-mitsumori').classList.toggle('active', type==='mitsumori');
  document.getElementById('dt-seikyu').classList.toggle('active', type==='seikyu');

  // タイトルタグ
  document.title = L.topbarTitle;

  // 入力ラベル
  document.getElementById('label-docNo').textContent = L.docNoLabel;

  // 1式表記オプション：請求書時のみ選択可
  const lumpOpt = document.getElementById('mode-lump');
  if(lumpOpt){
    lumpOpt.style.display = (type==='seikyu') ? '' : 'none';
    // 見積書に戻した時、現在が1式表記ならflatに戻す
    if(type==='mitsumori' && mode==='lump'){
      mode = 'flat';
      document.getElementById('mode-select').value = 'flat';
    }
  }

  // 支払期限入力欄：請求書時のみ表示
  document.getElementById('shiharai-wrap').style.display = (type==='seikyu') ? '' : 'none';
  // 工事期間入力欄：請求書時のみ表示
  document.getElementById('koki-wrap').style.display = (type==='seikyu') ? '' : 'none';

  // 諸経費・値引き：見積書時のみ（請求書時は隠す）
  document.getElementById('shokeihi-wrap').style.display = (type==='mitsumori') ? '' : 'none';

  // 備考欄：見積書時のみ表示（請求書時は振込先が代わりに入る）
  document.getElementById('bikou-wrap').style.display = (type==='mitsumori') ? '' : 'none';

  // 書類番号のデフォルト切替（ユーザーが編集していない場合のみ）
  const docNo = document.getElementById('mitsumoriNo');
  if(docNo.value.match(/^AR-26-XXX-[MS]\d+$/)){
    docNo.value = docNo.value.replace(/-[MS](\d+)$/, type==='mitsumori' ? '-M$1' : '-S$1');
  }

  // 備考欄：空なら種別デフォルトを流し込み
  const bikou = document.getElementById('bikou');
  if(!bikou.value.trim() || bikou.dataset.auto==='1'){
    bikou.value = L.bikouDefault;
    bikou.dataset.auto = '1';
  }

  // 支払期限のデフォルト（請求書時・未設定なら発行日から月末）
  const shiharai = document.getElementById('shiharaiDate');
  if(type==='seikyu' && !shiharai.value){
    const h = document.getElementById('hakkoDate').value;
    if(h){
      const d = new Date(h);
      // 翌月末
      const end = new Date(d.getFullYear(), d.getMonth()+2, 0);
      shiharai.value = end.toISOString().slice(0,10);
    }
  }

  render();
}

// ── 行ドラッグ&ドロップ（共通） ──
// tbody内のtrにdraggable設定・イベント登録
function initDragRows(tbody, getArr, setArr, onDone){
  let dragIdx=null;
  Array.from(tbody.querySelectorAll('tr')).forEach((tr,i)=>{
    tr.draggable=true;
    tr.addEventListener('dragstart',e=>{
      dragIdx=i;
      tr.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    tr.addEventListener('dragend',()=>{
      tr.classList.remove('dragging');
      tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));
    });
    tr.addEventListener('dragover',e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));
      if(i!==dragIdx) tr.classList.add('drag-over');
    });
    tr.addEventListener('dragleave',()=>tr.classList.remove('drag-over'));
    tr.addEventListener('drop',e=>{
      e.preventDefault();
      tr.classList.remove('drag-over');
      if(dragIdx===null||dragIdx===i)return;
      // コピーして操作（元配列への副作用を防ぐ）
      const arr=[...getArr()];
      const moved=arr.splice(dragIdx,1)[0];
      arr.splice(i,0,moved);
      setArr(arr);
      dragIdx=null;
      onDone();
    });
  });
}

// 数量・単価入力時に同行の金額欄を即時更新
function updateAmt(inputEl){
  const tr=inputEl.closest('tr');
  if(!tr)return;
  const inputs=tr.querySelectorAll('input[type="number"]:not([readonly])');
  if(inputs.length<2)return;
  const qty=parseFloat(inputs[0].value)||0;
  const price=parseFloat(inputs[1].value)||0;
  const amtCell=tr.querySelector('.amt-cell');
  if(amtCell) amtCell.value=Math.round(qty*price).toLocaleString();
}

// Enterキーで同行の次input→行末なら次行の品名にフォーカス移動
function enterNav(e){
  if(e.key!=='Enter')return;
  e.preventDefault();
  const tr=e.target.closest('tr');
  if(!tr)return;
  const inputs=Array.from(tr.querySelectorAll('input:not([readonly])')).filter(el=>el.offsetParent!==null);
  const idx=inputs.indexOf(e.target);
  if(idx>=0&&idx<inputs.length-1){
    // 同行の次へ
    inputs[idx+1].focus();
    inputs[idx+1].select();
  } else {
    // 行末→次のtrの最初のinputへ
    const tbody=tr.closest('tbody');
    if(!tbody)return;
    const rows=Array.from(tbody.querySelectorAll('tr'));
    const trIdx=rows.indexOf(tr);
    for(let ni=trIdx+1;ni<rows.length;ni++){
      const nextInputs=Array.from(rows[ni].querySelectorAll('input:not([readonly])')).filter(el=>el.offsetParent!==null);
      if(nextInputs.length>0){
        nextInputs[0].focus();
        nextInputs[0].select();
        return;
      }
    }
  }
}

// ── 合計計算 ──
function calcTotals(){
  let subtotal=0;
  if(mode==='flat'){
    subtotal=flatItems.reduce((s,it)=>s+it.qty*it.price,0);
  } else if(mode==='lump'){
    // 1式表記モード：groupSummaryItemsのみ合計（大項目は使わない）
    groupSummaryItems.forEach(it=>subtotal+=(parseFloat(it.qty)||0)*(parseFloat(it.price)||0));
  } else {
    groupItems.forEach(g=>g.items.forEach(it=>subtotal+=(parseFloat(it.qty)||0)*(parseFloat(it.price)||0)));
    groupSummaryItems.forEach(it=>subtotal+=(parseFloat(it.qty)||0)*(parseFloat(it.price)||0));
  }
  // 1式表記（請求書）・請求書の他モード時は諸経費・値引きを適用しない
  const applyShokeihi = docType==='mitsumori';
  const shokeihi = applyShokeihi ? Math.round(subtotal*(shokeihiRate/100)) : 0;
  const nb = applyShokeihi ? nebiki : 0;
  const zeinuki=subtotal+shokeihi-nb;
  const tax=Math.round(zeinuki*0.1);
  const total=zeinuki+tax;
  return{subtotal,shokeihi,zeinuki,tax,total};
}

function renderTotalBox(t){
  const isMits = docType==='mitsumori';
  const shokeihiRow = isMits ? `<div class="total-row"><span>諸経費（${shokeihiRate}%）</span><span>${fmtN(t.shokeihi)}</span></div>` : '';
  const nebikiRow = (isMits && nebiki>0) ? `<div class="total-row"><span>値引き</span><span>-${fmtN(nebiki)}</span></div>` : '';
  document.getElementById('total-box').innerHTML=`
    <div class="total-row"><span>小計</span><span>${fmtN(t.subtotal)}</span></div>
    ${shokeihiRow}
    ${nebikiRow}
    <div class="total-row"><span>税抜合計</span><span>${fmt(t.zeinuki)}</span></div>
    <div class="total-row"><span>消費税（10%）</span><span>${fmt(t.tax)}</span></div>
    <div class="total-row final"><span>税込合計</span><span>${fmt(t.total)}</span></div>`;
}

const ROW_MIN_H = 52; // px：最低行高さ（備考あり行と同等）
function adjustRowHeight(){
  // est-tbl（フラット・グループ1ページ目）+ group-detail-tbl（グループ明細ページ）両方対象
  ['est-tbl','group-detail-tbl'].forEach(id=>{
    const tbl=document.getElementById(id);
    if(!tbl)return;
    tbl.querySelectorAll('tbody tr.group-item-row, tbody tr:not(.group-section-header):not(.group-subtotal-row):not(.subtotal-row):not(.shokeihi-row)').forEach(el=>el.style.height=ROW_MIN_H+'px');
    tbl.querySelectorAll('tbody td,thead th').forEach(el=>el.style.padding='9px 10px');
    tbl.style.fontSize='12.5px';
  });
}

function applyManualPageBreaks(){
  // 既存の追加ページ・自動ラベルをリセット
  document.querySelectorAll('.overflow-page').forEach(el=>el.remove());
  document.querySelectorAll('.next-page-notice').forEach(el=>el.remove());

  const page=document.getElementById('doc-page');
  const tbl=document.getElementById('est-tbl');
  if(!tbl||!page)return;

  const tbody=tbl.querySelector('tbody');
  if(!tbody)return;

  // pageBreakフラグが立っているインデックスを収集（i>0のもののみ）
  const breakIndices=flatItems.reduce((acc,it,i)=>{if(i>0&&it.pageBreak)acc.push(i);return acc;},[]);
  if(breakIndices.length===0)return;

  // 全データ行とfixed行を取得
  const allRows=Array.from(tbody.querySelectorAll('tr'));
  const dataRows=allRows.filter(tr=>!tr.classList.contains('subtotal-row')&&!tr.classList.contains('shokeihi-row')&&!tr.classList.contains('next-page-notice'));
  const fixedRows=allRows.filter(tr=>tr.classList.contains('subtotal-row')||tr.classList.contains('shokeihi-row'));

  const kojimei=document.getElementById('kojimei').value;
  const mno=document.getElementById('mitsumoriNo').value;

  // 改ページ位置ごとに2ページ目以降を生成
  // 最初の改ページインデックスで分割
  const splitIdx=breakIndices[0];
  const overflowRows=dataRows.slice(splitIdx);
  if(overflowRows.length===0)return;

  buildPage2(overflowRows, fixedRows, true);
}

// ── グループモード改ページ処理 ──
// 手動改頁フラグ＋A4縦横比自動改ページ（明細ページ分割）
function checkAndPaginateGroup(){
  // 既存の分割ページを削除してリセット
  document.querySelectorAll('.group-overflow-page').forEach(el=>el.remove());
  document.querySelectorAll('.next-page-notice').forEach(el=>el.remove());

  const detailPage=document.getElementById('group-detail-page');
  const tbl=document.getElementById('group-detail-tbl');
  if(!detailPage||!tbl)return;

  const mno=document.getElementById('mitsumoriNo').value;
  const kojimei=document.getElementById('kojimei').value;

  // ページヘッダー高さを取得
  const pageRect=detailPage.getBoundingClientRect();
  const tblTop=tbl.getBoundingClientRect().top - pageRect.top;
  const thead=tbl.querySelector('thead');
  const theadH=thead?thead.offsetHeight:30;
  const footer=detailPage.querySelector('.footer');
  const footerH=footer?footer.offsetHeight+20:40;

  const availH=getA4ContentH() - tblTop - theadH - footerH;
  if(availH<=0)return;

  const tbody=tbl.querySelector('tbody');
  if(!tbody)return;
  const allRows=Array.from(tbody.querySelectorAll('tr'));

  // まず手動改頁フラグ（pb-row-mark）の位置を適用してから
  // 各ページ内でA4高さを超えたら自動分割
  // ページ境界インデックスを収集
  const breakPoints=[];

  // 手動改頁行のインデックス
  allRows.forEach((tr,i)=>{
    if(i>0 && tr.classList.contains('pb-row-mark')) breakPoints.push(i);
  });

  // A4高さで自動分割（手動改頁で区切ったセグメントごとに計測）
  const autoBreakPoints=[];
  let segStart=0;
  const allSegEnds=[...breakPoints, allRows.length];

  allSegEnds.forEach(segEnd=>{
    let cumH=0;
    for(let i=segStart;i<segEnd;i++){
      cumH+=allRows[i].offsetHeight;
      if(cumH>availH){
        const bp=Math.max(segStart+1, i);
        autoBreakPoints.push(bp);
        cumH=allRows[i].offsetHeight; // 新セグメント開始
        segStart=bp;
      }
    }
    segStart=segEnd;
  });

  // 全ての改ページ位置をマージ（重複除去・ソート）
  const allBreaks=[...new Set([...breakPoints,...autoBreakPoints])].sort((a,b)=>a-b);
  if(allBreaks.length===0)return;

  // ページに分割してDOMを再構築
  // まず元のdetailPageのtbodyを1ページ目分だけ残す
  const firstBreak=allBreaks[0];

  // 1ページ目の末尾に「次ページへ続く」
  const noticeRow=document.createElement('tr');
  noticeRow.className='next-page-notice';
  noticeRow.innerHTML='<td colspan="5" style="text-align:center;padding:5px 8px;font-size:11px;color:#666;background:#f0f2f4;border-top:1px dashed #aaa;font-style:italic;">―　次ページへ続く　―</td>';
  allRows[firstBreak-1].after(noticeRow);

  // 分割ページを生成
  const segments=[];
  let prev=firstBreak;
  for(let i=1;i<allBreaks.length;i++){
    segments.push({start:prev, end:allBreaks[i]});
    prev=allBreaks[i];
  }
  segments.push({start:prev, end:allRows.length});

  segments.forEach((seg,si)=>{
    const overRows=allRows.slice(seg.start, seg.end);
    if(overRows.length===0)return;

    const pg=document.createElement('div');
    pg.className='doc-page group-overflow-page';
    pg.style.marginTop='20px';

    // ヘッダー
    const hd=document.createElement('div');
    hd.style.cssText='display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #111;padding-bottom:8px;margin-bottom:12px;';
    hd.innerHTML='<div style="font-family:Yu Mincho,serif;font-size:15px;font-weight:700;color:#111;">工 事 明 細　（続き）</div>'
      +'<div style="font-size:11px;color:#666;">'+kojimei+'</div>';

    // テーブル
    const t2=document.createElement('table');
    t2.className='estimate-table';
    t2.style.cssText='width:100%;border-collapse:collapse;border:1px solid #888;';
    t2.innerHTML='<thead><tr>'
      +'<th style="width:42%;text-align:left;background:#555;color:#fff;padding:6px 8px;font-size:11.5px;">工事内容</th>'
      +'<th style="width:8%;background:#555;color:#fff;padding:6px 8px;font-size:11.5px;text-align:right;">数量</th>'
      +'<th style="width:7%;background:#555;color:#fff;padding:6px 8px;font-size:11.5px;text-align:right;">単位</th>'
      +'<th style="width:13%;background:#555;color:#fff;padding:6px 8px;font-size:11.5px;text-align:right;">単価</th>'
      +'<th style="width:20%;background:#555;color:#fff;padding:6px 8px;font-size:11.5px;text-align:right;">金額（税抜）</th>'
      +'</tr></thead>';
    const tb2=document.createElement('tbody');
    overRows.forEach(tr=>{
      tr.classList.remove('pb-row-mark'); // 2ページ目先頭は破線不要
      tb2.appendChild(tr);
    });

    // 最終ページ以外は「次ページへ続く」
    if(si<segments.length-1){
      const nr=document.createElement('tr');
      nr.className='next-page-notice';
      nr.innerHTML='<td colspan="5" style="text-align:center;padding:5px 8px;font-size:11px;color:#666;background:#f0f2f4;border-top:1px dashed #aaa;font-style:italic;">―　次ページへ続く　―</td>';
      tb2.appendChild(nr);
    }

    t2.appendChild(tb2);

    const ft2=document.createElement('div');
    ft2.className='footer';
    ft2.style.marginTop='10px';
    ft2.innerHTML='<div>株式会社アート・レイズ　© 2026</div><div>'+mno+'</div>';

    pg.appendChild(hd);
    pg.appendChild(t2);
    pg.appendChild(ft2);

    // group-detail-pageの直後に挿入
    const ref=document.querySelector('.group-overflow-page:last-of-type')||detailPage;
    ref.after(pg);
  });
}

// ── 自動改ページ処理 ──
// A4縦横比（297/210）からdoc-pageの実幅を使って動的に高さを算出
// 横を5%大きく見なすことで印刷時のはみ出しを防ぐ
function getA4ContentH(){
  const page=document.getElementById('doc-page');
  if(!page)return 1031;
  const pageW=page.offsetWidth;
  const a4H=Math.round(pageW*(297/(210*1.05)));
  // padding上下(13mm+13mm=26mm) → 26/210 の比率分を引く
  const padV=Math.round(pageW*(26/210));
  return a4H - padV;
}

function checkAndPaginate(){
  document.querySelectorAll('.overflow-page').forEach(el=>el.remove());
  // 「次ページへ続く」行も削除してリセット
  document.querySelectorAll('.next-page-notice').forEach(el=>el.remove());

  const page=document.getElementById('doc-page');
  const tbl=document.getElementById('est-tbl');
  if(!tbl||!page)return;

  const pageRect=page.getBoundingClientRect();
  const tblTop=tbl.getBoundingClientRect().top - pageRect.top;
  const thead=tbl.querySelector('thead');
  const theadH=thead?thead.offsetHeight:30;

  const bottomSection=page.querySelector('.bottom-section');
  const footer=page.querySelector('.footer');
  const fixedH=(bottomSection?bottomSection.offsetHeight:0)
              +(footer?footer.offsetHeight:0)
              +50;

  const availH=getA4ContentH() - tblTop - theadH - fixedH;

  // レイアウト未確定（tblTopが0）の場合はスキップ
  if(tblTop<=0||availH<=0)return;

  const tbody=tbl.querySelector('tbody');
  if(!tbody)return;
  const allRows=Array.from(tbody.querySelectorAll('tr'));
  const dataRows=allRows.filter(tr=>!tr.classList.contains('subtotal-row')&&!tr.classList.contains('shokeihi-row'));
  const fixedRows=allRows.filter(tr=>tr.classList.contains('subtotal-row')||tr.classList.contains('shokeihi-row'));

  let cumH=0;
  let splitIdx=-1;
  for(let i=0;i<dataRows.length;i++){
    cumH+=dataRows[i].offsetHeight;
    if(cumH>availH){
      splitIdx=Math.max(0,i-1);
      break;
    }
  }
  if(splitIdx<0)return;

  // 「次ページへ続く」行を挿入
  const noticeRow=document.createElement('tr');
  noticeRow.className='next-page-notice';
  noticeRow.innerHTML='<td colspan="5" style="text-align:center;padding:6px 10px;font-size:11px;color:#666;background:#f0f2f4;border-top:1px dashed #aaa;font-style:italic;letter-spacing:0.05em;">―　次ページへ続く　―</td>';
  dataRows[splitIdx].after(noticeRow);

  const overflowRows=dataRows.slice(splitIdx+1);
  if(overflowRows.length===0)return;

  buildPage2(overflowRows, fixedRows, false);
}

function scalePreview(){
  const area=document.getElementById('preview-area');
  const inner=document.getElementById('preview-inner');
  const page=document.getElementById('doc-page');
  if(!page)return;
  const PAD=20;
  const available=area.clientWidth-PAD*2;
  const scale=Math.min(1,available/794);
  inner.style.transform=`scale(${scale})`;
  inner.style.width=(794*scale)+'px';

function printHTML(){
  let html=buildDocHTML();
  // プレースホルダーを実際のscriptタグに置換（テンプレートリテラル内でのscriptタグ問題を回避）
  const adjScript='<script>'+html.split('ADJSCRIPT_START')[1].split('ADJSCRIPT_END')[0]+'<\/script>';
  html=html.replace(/ADJSCRIPT_START[\s\S]*?ADJSCRIPT_END/,adjScript);
  // Blob URLをaタグでダウンロード→Chromeで開く→Ctrl+P
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.target='_blank';
  a.rel='noopener';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

    tabPv.classList.remove('active');
    navBack.style.display='none';
    navNext.style.display='';
    navPrint.style.display='none';
  }
}

</script>
