<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>工事完了報告書</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 210mm; height: 297mm; overflow: hidden; background: #fff; }
  body {
    font-family: 'Meiryo','Yu Gothic',sans-serif;
    color: #000;
    padding: 18mm 16mm 12mm 16mm;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .header { display: flex; align-items: flex-end; justify-content: center; position: relative; flex-shrink: 0; }
  h1 { font-size: 18pt; font-weight: 700; color: #000; letter-spacing: .10em; line-height: 1.0; }
  .date { position: absolute; right: 0; bottom: 1px; font-size: 8.5pt; color: #000; }
  .divider { height: 2px; background: #000 !important; flex-shrink: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .addressee-block { flex-shrink: 0; padding-top: 2px; }
  .addressee { font-size: 12pt; font-weight: 700; color: #000; margin-bottom: 4px; }
  .greeting { font-size: 9pt; line-height: 1.7; color: #000; }
  table.overview { width: 100%; border-collapse: collapse; font-size: 9pt; flex-shrink: 0; }
  table.overview td { border: 1px solid #999; padding: 5px 8px; vertical-align: middle; line-height: 1.5; color: #000; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  table.overview td.lbl { width: 16%; background: #e0e0e0 !important; font-weight: 700; text-align: center; }
  table.overview tr:nth-child(even) td:not(.lbl) { background: #f5f5f5 !important; }
  .sec { background: #555 !important; color: #fff !important; font-size: 9.5pt; font-weight: 700; padding: 5px 10px; flex-shrink: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .work-list { list-style: none; font-size: 9pt; line-height: 1.8; flex-shrink: 0; padding-left: 4px; }
  .work-list li::before { content: attr(data-n) ". "; font-weight: 700; }
  .photo-sec { flex-shrink: 0; }
  .photos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .photo-block { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .photo-lbl { font-size: 9.5pt; font-weight: 700; color: #000; }
  .photo-frame {
    width: 100%;
    border: 2px solid #000;
    line-height: 0;
    font-size: 0;
    aspect-ratio: 4/3;
    background: #f5f5f5 !important;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .photo-frame img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
  }
  .footer { border-top: 1px solid #999; padding-top: 7px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; margin-top: auto; }
  .footer img { height: 22px; width: auto; }
  .footer-info { font-size: 8pt; color: #000; line-height: 1.5; white-space: nowrap; }
  @media print {
    html, body { width: 210mm; height: 297mm; overflow: hidden; }
    @page { size: A4; margin: 0; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    .footer img { height: 26px; }
    .footer-info { font-size: 9.5pt; }
  }
</style>
</head>
<body>

  <div class="header">
    <h1>工事完了報告書</h1>
    <span class="date">{DATE}</span>
  </div>
  <div class="divider"></div>

  <div class="addressee-block">
    <div class="addressee">{CLIENT}　御中</div>
    <p class="greeting">下記の工事が完了いたしましたのでご報告申し上げます。</p>
  </div>

  <table class="overview">
    <tr><td class="lbl">工 事 名</td><td>{KOJINAME}</td></tr>
    <tr><td class="lbl">工事場所</td><td>{KOJILOC}</td></tr>
    <tr><td class="lbl">工事期間</td><td>{KOJIPERIOD}</td></tr>
  </table>

  <div class="sec">■ 工事内容</div>
  <ul class="work-list">
    {WORKLIST}
  </ul>

  <div class="photo-sec">
    <div class="sec">■ 施工写真</div>
    <div style="height:8px"></div>
    <div class="photos">
      <div class="photo-block">
        <div class="photo-lbl">【施工前】</div>
        <div class="photo-frame">
          {PHOTO_BEFORE}
        </div>
      </div>
      <div class="photo-block">
        <div class="photo-lbl">【施工後】</div>
        <div class="photo-frame">
          {PHOTO_AFTER}
        </div>
      </div>
    </div>
  </div>
