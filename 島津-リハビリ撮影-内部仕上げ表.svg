    <text x="420" y="113">仕上・品名・品番</text>
    <text x="600" y="113">仕上・品名・品番</text>
    <text x="785" y="113">仕上・品名・品番</text>
    <text x="1019" y="113">仕上・品名・品番</text>
  </g>

