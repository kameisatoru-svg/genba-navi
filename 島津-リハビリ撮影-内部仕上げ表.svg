    <text x="420" y="95">巾木</text>
    <text x="600" y="95">壁</text>
    <text x="785" y="95">天井</text>
    <text x="1019" y="95">その他部材・設備品</text>
  </g>
  <g font-size="9.5" fill="#777" text-anchor="middle">
