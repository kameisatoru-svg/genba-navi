  <!-- ===== 備考 ===== -->
  <text x="24" y="324" font-size="13" font-weight="bold" fill="#1a2a3a">■備考</text>
  <rect x="20" y="332" width="1148" height="486" fill="#fff" stroke="#888" stroke-width="1"/>
  <g font-size="11.5" fill="#222">
    <text x="34" y="356">○ 元請：株式会社島津製作所（担当：竹村勝利 / ktake@shimadzu.co.jp）。本工事＝内装（クロス・床シート・巾木）はアート・レイズ。</text>
    <text x="34" y="378">○ 施工：7/18(土)・19(日) 土日施工（既存剥取・貼替・清掃／騒音発生）。設置工程表 7/17-21・使用開始 7/21。</text>
    <text x="34" y="400">○ 数量（見_改２）：床 18㎡ ／ 壁クロス 49㎡。床＝巾1820縦割り2列、壁＝縦貼り(A/C面4短冊・B/D面6短冊)、天井＝横流れ920×6帯。</text>
    <text x="34" y="424" fill="#c0392b">※ 壁品番は島津レイアウト図（操作室=下）を180°回転し各壁の隣接室で対応付け。FE品番のリピート（柄合わせ）有無・在庫を発注前に確認。</text>
    <text x="34" y="444" fill="#c0392b">※ 寸法・数量は清書基準の概略。壁柱の見付・見込、入隅/出隅の回し分は別途。発注前に最終確認。</text>
