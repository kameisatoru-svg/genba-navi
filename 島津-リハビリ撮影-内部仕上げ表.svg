    <line x1="340" y1="78" x2="340" y2="300"/>
    <line x1="500" y1="78" x2="500" y2="300"/>
    <line x1="700" y1="78" x2="700" y2="300"/>
    <line x1="870" y1="78" x2="870" y2="300"/>
  </g>
