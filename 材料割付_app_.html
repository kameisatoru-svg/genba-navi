<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>材料割付｜アート・レイズ</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e2d40">
<style>
:root{
  --bg:#eeebe5;--navy:#1e2d40;--navy2:#2a3f5a;
  --accent:#c8a96e;--text:#1e2d40;--text2:#5a6a7a;--white:#ffffff;
  /* カテゴリカラー */
  --cc:#2563a8;--cw:#0d6e50;--cf:#9a5a10;
  --bc:rgba(37,99,168,0.10);--bw:rgba(13,110,80,0.10);--bf:rgba(154,90,16,0.10);
  --tc:#1a4a88;--tw:#085040;--tf:#7a4008;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Meiryo','Yu Gothic',sans-serif;
  height:100svh;display:flex;flex-direction:column;overflow:hidden;
  position:fixed;width:100%;
}

/* ── ヘッダー ── */
.header{
  background:var(--navy);height:60px;
  display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;
}
.btn-back{
  width:44px;height:44px;border:none;background:transparent;
  color:var(--white);cursor:pointer;
  display:flex;align-items:center;justify-content:center;border-radius:10px;
  flex-shrink:0;
}
.btn-back:active{background:rgba(255,255,255,0.15);}
.header-title{flex:1;font-size:15px;font-weight:700;color:var(--white);}
.header-cat{
  font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
  border:1.5px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);
}

/* ── スクロールエリア ── */
.scroll-area{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 14px max(20px,env(safe-area-inset-bottom));
  touch-action:pan-y;
}

/* ── カテゴリ選択 ── */
.cat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.cat-btn{
  padding:14px 4px;border:1.5px solid rgba(30,45,64,0.15);
  border-radius:12px;background:var(--white);color:var(--text2);
  font-size:15px;font-weight:600;cursor:pointer;text-align:center;
  font-family:inherit;
  box-shadow:0 1px 4px rgba(30,45,64,0.07);
}
.cat-btn.ac-ceil{border-color:var(--cc);background:var(--bc);color:var(--tc);}
.cat-btn.ac-wall{border-color:var(--cw);background:var(--bw);color:var(--tw);}
.cat-btn.ac-floor{border-color:var(--cf);background:var(--bf);color:var(--tf);}

/* ── 材料ボタン ── */
.mat-row{display:grid;gap:6px;margin-bottom:14px;}
.mat-btn{
  padding:13px 14px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:12px;background:var(--white);color:var(--text2);
  font-size:14px;font-weight:500;cursor:pointer;text-align:left;
  font-family:inherit;
  box-shadow:0 1px 3px rgba(30,45,64,0.06);
}
.mat-btn.ac-ceil{border-color:var(--cc);background:var(--bc);color:var(--tc);font-weight:700;}
.mat-btn.ac-wall{border-color:var(--cw);background:var(--bw);color:var(--tw);font-weight:700;}
.mat-btn.ac-floor{border-color:var(--cf);background:var(--bf);color:var(--tf);font-weight:700;}

/* ── サブ選択 ── */
.sub-sel-row{display:grid;gap:6px;margin-bottom:12px;}
.sub-btn{
  padding:12px 14px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:12px;background:var(--white);color:var(--text2);
  font-size:14px;cursor:pointer;text-align:left;
  font-family:inherit;display:flex;justify-content:space-between;align-items:center;
}
.sub-btn.ac-floor{border-color:var(--cf);background:var(--bf);color:var(--tf);font-weight:700;}
.sub-hint{font-size:11px;opacity:.65;}

/* ── パターン選択 ── */
.pat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px;}
.pat-btn{
  padding:10px 6px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:10px;background:var(--white);color:var(--text2);
  font-size:12px;font-weight:500;cursor:pointer;text-align:center;font-family:inherit;
}
.pat-btn.ac-ceil{border-color:var(--cc);background:var(--bc);color:var(--tc);font-weight:700;}
.pat-btn.ac-floor{border-color:var(--cf);background:var(--bf);color:var(--tf);font-weight:700;}

/* ── セクションラベル ── */
.st{
  font-size:10px;font-weight:700;color:var(--text2);
  letter-spacing:0.08em;margin-bottom:7px;
}

/* ── 入力グリッド ── */
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.iw{display:flex;flex-direction:column;gap:3px;}
.iw span{font-size:11px;color:var(--text2);}
input[type=number],select{
  width:100%;height:46px;padding:0 10px;
  border:1.5px solid rgba(30,45,64,0.18);border-radius:10px;
  background:var(--white);color:var(--text);font-size:16px;
  font-family:inherit;outline:none;
}
input[type=number]:focus,select:focus{border-color:var(--navy);}

/* ── シート幅ボタン ── */
.swb{
  padding:10px 4px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:10px;background:var(--white);color:var(--text2);
  font-size:13px;cursor:pointer;text-align:center;font-family:inherit;
}
.swb.act{border-color:var(--cf);background:var(--bf);color:var(--tf);font-weight:700;}

/* ── 計算ボタン ── */
.calc-btn{
  width:100%;height:50px;border:none;border-radius:12px;
  font-size:15px;font-weight:700;cursor:pointer;
  font-family:inherit;color:var(--white);letter-spacing:0.04em;
  margin-top:2px;
}
.calc-ceil{background:var(--cc);}
.calc-wall{background:var(--cw);}
.calc-floor{background:var(--cf);}

/* ── トリムカード ── */
.trim-card{
  background:var(--bg);border-radius:12px;padding:12px;margin-bottom:12px;
  border:1px solid rgba(30,45,64,0.08);
}

/* ── 4面タブ ── */
.face-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px;}
.face-tab{
  padding:10px 4px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:10px;background:var(--white);color:var(--text2);
  font-size:13px;font-weight:500;cursor:pointer;text-align:center;
  font-family:inherit;position:relative;
}
.face-tab.ac-wall{border-color:var(--cw);background:var(--bw);color:var(--tw);font-weight:700;}
.face-tab .fdot{
  width:7px;height:7px;border-radius:50%;background:var(--cw);
  position:absolute;top:5px;right:5px;display:none;
}
.face-tab.has-data .fdot{display:block;}

/* ── まとめ計算チェック ── */
.face-check-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px;}
.face-check{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px;border:1.5px solid rgba(30,45,64,0.1);
  border-radius:10px;background:var(--bg);font-size:12px;color:var(--text2);cursor:pointer;
}
.face-check input{width:16px;height:16px;cursor:pointer;}
.face-check.checked{border-color:var(--cw);background:var(--bw);color:var(--tw);}

/* ── 開口ボタン群 ── */
.aor{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.aob{
  padding:11px 4px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:10px;background:var(--white);color:var(--text2);
  font-size:12px;cursor:pointer;text-align:center;line-height:1.5;font-family:inherit;
}
.aob:active{background:var(--bg);}

/* ── 開口リスト ── */
.oi{
  background:var(--white);border:1.5px solid rgba(30,45,64,0.1);
  border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;
}
.oi.sel-wall{border-color:var(--cw);background:var(--bw);}
.on{font-size:13px;font-weight:600;}
.op{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.6;}
.db{
  font-size:11px;color:var(--text2);background:none;
  border:1px solid rgba(30,45,64,0.15);border-radius:6px;
  padding:3px 8px;cursor:pointer;float:right;font-family:inherit;
}

/* ── Canvas ── */
.vw2{
  border:1.5px solid rgba(30,45,64,0.1);border-radius:10px;
  overflow:hidden;margin-bottom:10px;background:var(--white);
}
.vl{
  font-size:11px;color:var(--text2);padding:7px 10px;
  border-bottom:1px solid rgba(30,45,64,0.08);font-weight:500;
}
canvas{display:block;width:100%;touch-action:pan-y;}
canvas#wall-cv{touch-action:none;}

/* ── 移動パネル ── */
.mpanel{border-radius:12px;padding:12px;margin-bottom:10px;}
.mpanel-wall{background:var(--bw);border:1px solid var(--cw);}
.mg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center;margin-bottom:10px;}
.mb{
  height:50px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:10px;background:var(--white);font-size:22px;cursor:pointer;
}
.mb:active{background:var(--bg);}
.mc-pos{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:11px;color:var(--text2);line-height:1.6;
  background:var(--white);border-radius:10px;padding:6px;
}
.dg4{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.dc{background:var(--white);border-radius:10px;padding:9px 10px;text-align:center;}
.dl{font-size:11px;color:var(--text2);}
.dv-wall{color:var(--tw);font-size:16px;font-weight:700;margin-top:2px;}
.sr{display:flex;align-items:center;gap:6px;margin-top:10px;}
.sr span{font-size:11px;color:var(--text2);white-space:nowrap;}
.sb{
  padding:7px 12px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:8px;background:var(--white);color:var(--text2);
  font-size:12px;cursor:pointer;font-family:inherit;
}
.sb.act-wall{border-color:var(--cw);background:var(--bw);color:var(--tw);font-weight:700;}

/* ── 結果カード ── */
.mx{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
.mc2{border-radius:12px;padding:12px;text-align:center;}
.mc2-ceil{background:var(--bc);}
.mc2-wall{background:var(--bw);}
.mc2-floor{background:var(--bf);}
.mv{font-size:20px;font-weight:700;}
.mv-ceil{color:var(--tc);}
.mv-wall{color:var(--tw);}
.mv-floor{color:var(--tf);}
.ml{font-size:11px;color:var(--text2);margin-top:3px;}

/* ── 詳細テーブル ── */
.dt{
  background:var(--white);border:1.5px solid rgba(30,45,64,0.08);
  border-radius:12px;overflow:hidden;margin-bottom:10px;
}
.dr{
  display:flex;justify-content:space-between;padding:11px 12px;
  border-bottom:1px solid rgba(30,45,64,0.06);font-size:13px;
}
.dr:last-child{border-bottom:none;}
.dr span:first-child{color:var(--text2);}
.dr span:last-child{font-weight:600;}

/* ── カット詳細 ── */
.cd{padding:9px 12px;border-bottom:1px solid rgba(30,45,64,0.06);font-size:13px;}
.cd:last-child{border-bottom:none;}
.ch{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
.cn{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.6;}

/* ── バッジ ── */
.bg{display:inline-block;font-size:10px;padding:2px 6px;border-radius:5px;font-weight:700;margin-left:3px;}
.bgok{background:#dcf5e6;color:#1a7a3a;}
.bgwn{background:#fff0d6;color:#9a5a10;}
.bgin{background:#dceeff;color:#1a4a88;}

/* ── カット集計 ── */
.cut-summary{
  border-radius:12px;padding:11px 13px;margin-bottom:10px;
  background:var(--bw);border:1px solid var(--cw);
}
.cut-title{font-size:12px;font-weight:700;margin-bottom:7px;color:var(--tw);}
.cut-row{
  display:flex;justify-content:space-between;font-size:13px;
  padding:3px 0;border-bottom:1px solid rgba(0,0,0,0.05);
}
.cut-row:last-child{border-bottom:none;}

/* ── トリム結果 ── */
.trim-res{border-radius:12px;padding:11px 13px;margin-bottom:10px;}
.trim-res-ceil{background:var(--bc);border:1px solid var(--cc);}
.trim-res-wall{background:var(--bw);border:1px solid var(--cw);}
.trim-row{
  display:flex;justify-content:space-between;font-size:13px;
  padding:3px 0;border-bottom:1px solid rgba(0,0,0,0.05);
}
.trim-row:last-child{border-bottom:none;font-weight:700;padding-top:6px;}

/* ── まとめカード ── */
.summary-card{
  border-radius:12px;padding:14px;margin-bottom:10px;
  background:var(--bw);border:1.5px solid var(--cw);
}
.summary-title{font-size:13px;font-weight:700;color:var(--tw);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.summary-row{
  display:flex;justify-content:space-between;font-size:13px;
  padding:4px 0;border-bottom:1px solid rgba(0,0,0,0.05);
}
.summary-row:last-child{border-bottom:none;font-weight:700;padding-top:8px;font-size:14px;}

/* ── 面結果ヘッダー ── */
.face-result-header{
  background:var(--bg);border-radius:10px;padding:8px 12px;
  margin-bottom:8px;font-size:12px;font-weight:700;color:var(--text2);
  border:1px solid rgba(30,45,64,0.1);
}

/* ── シート比較 ── */
.sheet-compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
.sheet-card{
  border:1.5px solid rgba(30,45,64,0.1);border-radius:12px;
  padding:12px;background:var(--white);
}
.sheet-card.best{border-color:var(--cf);background:var(--bf);}
.sct{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.bb{font-size:10px;background:var(--cf);color:#fff;padding:2px 7px;border-radius:5px;font-weight:700;}
.sv{font-size:22px;font-weight:700;color:var(--tf);}
.ss{font-size:11px;color:var(--text2);margin-top:2px;}
.sd{margin-top:8px;font-size:12px;color:var(--text2);line-height:1.8;border-top:1px solid rgba(30,45,64,0.08);padding-top:8px;}
.viz-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.vw-sheet{border:1.5px solid rgba(30,45,64,0.1);border-radius:10px;overflow:visible;background:var(--white);}

/* ── 作図へ送るボタン（ヘッダー） ── */
.btn-zumen{
  height:38px;padding:0 12px;border:1.5px solid var(--accent);
  border-radius:10px;background:transparent;color:var(--accent);
  font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  font-family:inherit;display:flex;align-items:center;gap:5px;flex-shrink:0;
}
.btn-zumen:active{background:rgba(200,169,110,0.2);}

/* ── モーダル ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(10,20,35,0.6);
  z-index:100;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.modal-overlay.hidden{display:none;}
.modal-box{
  background:var(--white);border-radius:16px;width:100%;max-width:380px;
  box-shadow:0 8px 32px rgba(10,20,35,0.3);overflow:hidden;
}
.modal-head{
  background:var(--navy);padding:16px 18px;
  font-size:15px;font-weight:700;color:var(--white);
  display:flex;align-items:center;gap:8px;
}
.modal-body{padding:18px;}
.modal-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.modal-input{
  width:100%;height:42px;border:1.5px solid rgba(30,45,64,0.2);
  border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;
  color:var(--text);background:var(--bg);outline:none;
  box-sizing:border-box;
}
.modal-input:focus{border-color:var(--accent);}
.modal-faces{margin:14px 0 0;}
.modal-face-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;border-radius:10px;margin-bottom:6px;
  background:var(--bg);font-size:13px;
}
.modal-face-row.has-data{background:rgba(13,110,80,0.08);border:1px solid rgba(13,110,80,0.2);}
.modal-face-row.no-data{opacity:0.45;}
.mfr-left{display:flex;align-items:center;gap:8px;font-weight:600;}
.mfr-badge{
  font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;
  background:rgba(13,110,80,0.15);color:#085040;
}
.mfr-detail{font-size:11px;color:var(--text2);}
.modal-footer{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:0 18px 18px;
}
.modal-cancel{
  height:44px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;
  background:transparent;color:var(--text2);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;
}
.modal-send{
  height:44px;border:none;border-radius:10px;
  background:var(--navy);color:var(--white);font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;
}
.modal-send:active{background:var(--navy2);}
.modal-send:disabled{background:rgba(30,45,64,0.3);cursor:not-allowed;}

/* ══════════ Z Fold5 / タブレット内側画面（600px〜） ══════════ */
@media (min-width:600px){
  .scroll-area{
    display:grid;grid-template-columns:1fr 1fr;
    column-gap:18px;row-gap:0;align-content:start;
  }
  .cat-row,#mat-list,#sub-area,#pat-area{grid-column:1/-1;}
  #form-area{grid-column:1;align-self:start;min-width:0;}
  #result-area{grid-column:2;align-self:start;min-width:0;position:sticky;top:0;}
  .header-title{font-size:17px;}
}

/* ══════════ canvas拡大プレビュー ══════════ */
.vw2{position:relative;}
.vw-zoom-btn{
  position:absolute;top:5px;right:5px;z-index:5;
  width:34px;height:34px;border:none;border-radius:8px;
  background:rgba(30,45,64,0.7);color:#fff;
  font-size:16px;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.vw-zoom-btn:active{background:rgba(30,45,64,0.92);}
.cv-fullscreen{
  position:fixed;inset:0;background:rgba(10,20,35,0.88);
  z-index:150;display:flex;flex-direction:column;
  padding:max(16px,env(safe-area-inset-top)) 14px max(16px,env(safe-area-inset-bottom));
}
.cv-fullscreen.hidden{display:none;}
.cv-fs-head{
  display:flex;justify-content:space-between;align-items:center;
  color:#fff;margin-bottom:10px;padding:0 4px;
}
.cv-fs-title{font-size:14px;font-weight:700;}
.cv-fs-close{
  width:38px;height:38px;border:none;background:rgba(255,255,255,0.18);
  color:#fff;border-radius:50%;font-size:20px;cursor:pointer;line-height:1;
  font-family:inherit;
}
.cv-fs-body{
  flex:1;background:var(--white);border-radius:12px;
  padding:16px;overflow:auto;display:flex;align-items:center;justify-content:center;
}
.cv-fs-body canvas{display:block;}

/* ══════════ ユーティリティバー（保存/履歴/TSV/PDF） ══════════ */
.util-row{
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-bottom:12px;
}
.util-btn{
  padding:9px 4px;border:1.5px solid rgba(30,45,64,0.15);
  border-radius:10px;background:var(--white);color:var(--text2);
  font-size:12px;font-weight:600;cursor:pointer;text-align:center;
  font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;
}
.util-btn:active{background:var(--bg);}
.util-btn .util-ic{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;line-height:1;}
.util-btn .util-ic svg{display:block;width:100%;height:100%;}
.util-btn.has-data{border-color:var(--accent);color:var(--navy);}
.util-btn.has-data .util-ic{color:var(--accent);}

/* SVG共通サイズ */
.modal-head svg{display:block;flex-shrink:0;}
.room-icon-btn svg{display:block;}
.history-del svg{display:block;}
.vw-zoom-btn svg{display:block;}
.voice-btn svg{display:block;}

/* ── TSV/履歴モーダル ── */
.modal-box.modal-wide{max-width:480px;}
.modal-tsv-area{
  width:100%;height:230px;padding:10px;
  border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;
  background:var(--bg);color:var(--text);font-size:11px;
  font-family:Consolas,Menlo,'Courier New',monospace;
  resize:none;outline:none;line-height:1.55;
  white-space:pre;overflow:auto;
  -webkit-user-select:text;user-select:text;
}
.history-list{max-height:55vh;overflow-y:auto;margin:0 -4px;padding:0 4px;}
.history-item{
  padding:10px 12px;border-radius:10px;margin-bottom:6px;
  background:var(--bg);display:flex;justify-content:space-between;align-items:center;gap:8px;
}
.history-item-info{flex:1;min-width:0;cursor:pointer;}
.history-name{font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.history-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.history-actions{display:flex;gap:6px;flex-shrink:0;}
.history-open{
  padding:7px 14px;border:none;border-radius:8px;
  background:var(--navy);color:var(--white);
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
}
.history-open:active{background:var(--navy2);}
.history-del{
  width:32px;height:32px;border:1px solid rgba(180,0,0,0.3);
  border-radius:8px;background:transparent;color:#a01a1a;
  font-size:14px;cursor:pointer;font-family:inherit;
}
.history-empty{
  padding:36px 10px;text-align:center;color:var(--text2);font-size:13px;
}
.modal-copy-btn{
  height:44px;border:none;border-radius:10px;
  background:var(--accent);color:var(--navy);font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;
}
.modal-copy-btn:active{background:#b0935f;}
.modal-copy-btn.copied{background:#1a7a3a;color:#fff;}

/* ══════════ 音声入力（フローティングマイク） ══════════ */
.voice-btn{
  position:fixed;
  bottom:max(96px,calc(env(safe-area-inset-bottom) + 80px));
  right:12px;
  width:54px;height:54px;border:none;border-radius:50%;
  background:var(--accent);color:var(--navy);
  font-size:22px;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 14px rgba(10,20,35,0.28);
  z-index:80;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  transition:transform 0.15s, background 0.2s;
}
@media (min-width:600px){
  .voice-btn{bottom:24px;right:24px;width:60px;height:60px;font-size:24px;}
}
.voice-btn:active{transform:scale(0.92);}
.voice-btn.listening{background:#e74c3c;color:#fff;animation:voice-pulse 1.2s ease-in-out infinite;}
@keyframes voice-pulse{
  0%,100%{box-shadow:0 4px 14px rgba(231,76,60,0.45);}
  50%{box-shadow:0 4px 14px rgba(231,76,60,0.8), 0 0 0 10px rgba(231,76,60,0.18);}
}
.voice-btn.hidden{display:none;}
.voice-feedback{
  position:fixed;top:75px;left:50%;
  transform:translateX(-50%) translateY(-8px);
  background:var(--navy);color:#fff;
  padding:9px 16px;border-radius:10px;
  font-size:12.5px;font-weight:600;line-height:1.5;
  box-shadow:0 4px 14px rgba(10,20,35,0.3);
  z-index:90;max-width:88%;text-align:center;
  opacity:0;transition:opacity 0.25s, transform 0.25s;
  pointer-events:none;font-family:inherit;
}
.voice-feedback.show{opacity:1;transform:translateX(-50%) translateY(0);}
.voice-feedback.ok{background:#1a7a3a;}
.voice-feedback.error{background:#a01a1a;}
.voice-feedback.heard{background:var(--navy2);}

/* ══════════ 単価マスタ ステータスバッジ ══════════ */
.price-master-badge{
  display:inline-block;font-size:10px;padding:3px 8px;border-radius:10px;
  font-weight:600;font-family:inherit;line-height:1.4;
  background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}
.price-master-badge.ok{background:rgba(13,110,80,0.22);color:#a5e2c8;}
.price-master-badge.warn{background:rgba(200,120,0,0.22);color:#f0c896;}
.price-master-badge.loading{opacity:0.7;}
.price-master-badge:active{opacity:0.6;}

/* ══════════ 部屋（ルーム）タブバー ══════════ */
.room-bar{
  background:var(--bg);padding:8px 14px 0;flex-shrink:0;
  border-bottom:1px solid rgba(30,45,64,0.08);
}
.room-row{
  display:flex;gap:6px;align-items:stretch;padding-bottom:8px;
}
.room-tabs-scroll{
  flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;min-width:0;
}
.room-tabs-scroll::-webkit-scrollbar{display:none;}
.room-tabs{display:flex;gap:5px;}
.room-tab{
  padding:7px 13px;border:1.5px solid rgba(30,45,64,0.15);
  border-radius:18px;background:var(--white);color:var(--text2);
  font-size:12px;font-weight:600;cursor:pointer;
  font-family:inherit;white-space:nowrap;flex-shrink:0;
}
.room-tab.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
.room-tab.has-data{position:relative;padding-right:18px;}
.room-tab.has-data::after{
  content:'';position:absolute;top:50%;right:8px;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;background:var(--accent);
}
.room-tab.active.has-data::after{background:var(--white);}
.room-icon-btn{
  width:34px;height:34px;border:1.5px solid rgba(30,45,64,0.15);
  border-radius:8px;background:var(--white);color:var(--text2);
  font-size:14px;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.room-icon-btn:active{background:var(--bg);}

/* ══════════ TSVモード切替 ══════════ */
.tsv-mode-buttons{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;
}
.tsv-mode-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 6px;border:1.5px solid rgba(30,45,64,0.15);
  border-radius:8px;background:var(--white);font-size:12px;cursor:pointer;
  font-family:inherit;color:var(--text2);
}
.tsv-mode-btn input{margin:0;cursor:pointer;}
.tsv-mode-btn.checked{
  background:var(--bf);border-color:var(--cf);color:var(--tf);font-weight:700;
}

/* ══════════ スティッキー計算ボタン（モバイル＝カバー画面） ══════════ */
@media (max-width:599px){
  .calc-btn{
    position:sticky;
    bottom:max(8px,env(safe-area-inset-bottom));
    z-index:40;
    box-shadow:0 4px 14px rgba(10,20,35,0.22);
  }
  .scroll-area{
    padding-bottom:max(20px,calc(env(safe-area-inset-bottom) + 14px));
  }
}
</style>
</head>
<body>

<div class="header">
  <button class="btn-back" onclick="history.back()" title="戻る">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="header-title">材料割付 <span class="price-master-badge" id="price-master-badge" onclick="refreshPriceMasterFromServer()" title="タップで再取得" style="display:none"></span></div>
  <div class="header-cat" id="header-cat">床</div>
  <button class="btn-zumen" onclick="openZumenModal()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20M2 4h20M6 4v16M18 4v16M6 12h12"/></svg>
    作図へ
  </button>
</div>

<!-- 部屋（ルーム）タブバー -->
<div class="room-bar">
  <div class="room-row">
    <div class="room-tabs-scroll">
      <div class="room-tabs" id="room-tabs"></div>
    </div>
    <button class="room-icon-btn" onclick="addRoomPrompt()" title="部屋を追加">＋</button>
    <button class="room-icon-btn" onclick="renameRoomPrompt()" title="部屋名を変更">✎</button>
    <button class="room-icon-btn" onclick="removeRoomPrompt()" title="部屋を削除">－</button>
  </div>
</div>

<!-- 案件保存モーダル -->
<div class="modal-overlay hidden" id="save-modal" onclick="closeSaveModal(event)">
  <div class="modal-box">
    <div class="modal-head">
      <span style="font-size:18px">💾</span>
      案件として保存
    </div>
    <div class="modal-body">
      <div class="modal-label">案件名</div>
      <input class="modal-input" id="save-name" type="text" placeholder="例：玉寿会-さくら床-26" maxlength="60">
      <div style="font-size:11px;color:var(--text2);margin-top:8px;line-height:1.6">現在の入力・選択・計算結果をブラウザに保存します。同名の案件があれば上書きされます。</div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeSaveModal(null)">キャンセル</button>
      <button class="modal-send" id="save-confirm-btn" onclick="doSaveProject()">保存する</button>
    </div>
  </div>
</div>

<!-- 履歴モーダル -->
<div class="modal-overlay hidden" id="load-modal" onclick="closeLoadModal(event)">
  <div class="modal-box modal-wide">
    <div class="modal-head">
      <span style="font-size:18px">📂</span>
      保存済み案件
    </div>
    <div class="modal-body">
      <div class="history-list" id="history-list"></div>
    </div>
    <div class="modal-footer" style="grid-template-columns:1fr">
      <button class="modal-cancel" onclick="closeLoadModal(null)">閉じる</button>
    </div>
  </div>
</div>

<!-- TSV出力モーダル -->
<div class="modal-overlay hidden" id="tsv-modal" onclick="closeTsvModal(event)">
  <div class="modal-box modal-wide">
    <div class="modal-head">
      <span style="font-size:18px">📋</span>
      発注書（TSV形式）
    </div>
    <div class="modal-body">
      <div class="tsv-mode-buttons" id="tsv-mode-buttons" style="display:none">
        <label class="tsv-mode-btn checked"><input type="radio" name="tsv-mode" value="current" checked onchange="updateTsvText()">現在の部屋のみ</label>
        <label class="tsv-mode-btn"><input type="radio" name="tsv-mode" value="all" onchange="updateTsvText()">全室合算</label>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.6">下記をスプレッドシート／LINE／メール等に貼り付けてご利用ください。</div>
      <textarea class="modal-tsv-area" id="tsv-text" readonly></textarea>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeTsvModal(null)">閉じる</button>
      <button class="modal-copy-btn" id="tsv-copy-btn" onclick="copyTsvToClipboard()">クリップボードへコピー</button>
    </div>
  </div>
</div>

<!-- 部屋追加/編集モーダル -->
<div class="modal-overlay hidden" id="room-modal" onclick="closeRoomModal(event)">
  <div class="modal-box">
    <div class="modal-head">
      <span style="font-size:18px">🏠</span>
      <span id="room-modal-title">部屋を追加</span>
    </div>
    <div class="modal-body">
      <div class="modal-label">部屋名</div>
      <input class="modal-input" id="room-name" type="text" placeholder="例：101号室／廊下／受付" maxlength="40">
      <div class="modal-label" style="margin-top:14px">寸法（mm）</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div>
          <div style="font-size:11px;color:var(--text2);margin-bottom:3px">幅（横）</div>
          <input class="modal-input" id="room-W" type="number" value="3000" inputmode="numeric">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text2);margin-bottom:3px">長さ（縦）</div>
          <input class="modal-input" id="room-L" type="number" value="4000" inputmode="numeric">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text2);margin-bottom:3px">天井高</div>
          <input class="modal-input" id="room-H" type="number" value="2400" inputmode="numeric">
        </div>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-top:10px;line-height:1.6">床・天井のサイズと、壁A〜D（A=上辺、時計回りにB→C→D）の各面寸法に自動反映されます。</div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeRoomModal(null)">キャンセル</button>
      <button class="modal-send" id="room-send-btn" onclick="doSubmitRoom()">確定</button>
    </div>
  </div>
</div>

<!-- 作図へ送るモーダル -->
<div class="modal-overlay hidden" id="zumen-modal" onclick="closeZumenModal(event)">
  <div class="modal-box">
    <div class="modal-head">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20M2 4h20M6 4v16M18 4v16M6 12h12"/></svg>
      作図アプリへ壁データを送信
    </div>
    <div class="modal-body">
      <div class="modal-label">案件名</div>
      <input class="modal-input" id="zumen-project" type="text" placeholder="例：さくら苑　北側居室" maxlength="40">
      <div class="modal-label modal-faces" style="margin-bottom:8px">送信する面</div>
      <div id="zumen-face-list"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeZumenModal(null)">キャンセル</button>
      <button class="modal-send" id="zumen-send-btn" onclick="doSendToZumen()">送信する</button>
    </div>
  </div>
</div>

<!-- 音声入力フローティングボタン＆フィードバック -->
<button class="voice-btn hidden" id="voice-btn" onclick="toggleVoiceInput()" title="音声入力（タップで開始）" aria-label="音声入力">🎤</button>
<div class="voice-feedback" id="voice-feedback"></div>

<div class="scroll-area">
  <div class="cat-row">
    <button class="cat-btn ac-floor" onclick="setCat('floor',this)">床</button>
    <button class="cat-btn" onclick="setCat('wall',this)">壁</button>
    <button class="cat-btn" onclick="setCat('ceil',this)">天井</button>
  </div>
  <div class="util-row">
    <button class="util-btn" id="util-save" onclick="openSaveModal()"><span class="util-ic">💾</span>保存</button>
    <button class="util-btn" id="util-load" onclick="openLoadModal()"><span class="util-ic">📂</span>履歴</button>
    <button class="util-btn" id="util-tsv" onclick="openTsvModal()"><span class="util-ic">📋</span>TSV</button>
    <button class="util-btn" id="util-pdf" onclick="openPdfReport()"><span class="util-ic">📄</span>PDF</button>
  </div>
  <div id="mat-list" class="mat-row"></div>
  <div id="sub-area"></div>
  <div id="pat-area"></div>
  <div id="form-area"></div>
  <div id="result-area"></div>
</div>

<script>
var curCat='floor',curMatIdx=0,curPat='通し目地';
var curFloorType='タイル',curTileType='Pタイル',curSheetW=1820,curFlooringType='フローリング';

var FACES=['A','B','C','D'];
var curFaceIdx=0;
var faceData=[null,null,null,null];
var faceInputs=[null,null,null,null];
var faceOpenings=[[],[],[],[]];
var faceSelId=[null,null,null,null];
var faceOidSeq=[0,0,0,0];
var moveStep=10;

// ── Z Fold5対応：リサイズ/fold追従 ──
var _lastVizRedraw=null,_resizeT=null;
window.addEventListener('resize',function(){
  if(_resizeT)clearTimeout(_resizeT);
  _resizeT=setTimeout(function(){
    if(document.getElementById('wall-cv'))redrawWall();
    if(_lastVizRedraw)_lastVizRedraw();
    addZoomButtons();
  },120);
});

// ══════════ 案件保存 / 履歴 / 発注書TSV ══════════
var _lastOrder=null;
var _SAVES_KEY='genba_saves';

function getDateStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function parseQty(s){
  var m=(''+s).match(/^([\d.,]+)(.*)$/);
  if(!m)return{n:0,u:''};
  return{n:parseFloat(m[1].replace(/,/g,'')),u:(m[2]||'').trim()};
}

function setOrder(items,title){
  if(!items||!items.length){_lastOrder=null;}
  else{_lastOrder={title:title||'材料発注',date:getDateStr(),items:items};}
  refreshUtilIndicators();
  if(typeof autoSaveState==='function')autoSaveState(false);
}

function refreshUtilIndicators(){
  var tsvBtn=document.getElementById('util-tsv');
  if(tsvBtn){
    var hasAny=!!(_lastOrder&&_lastOrder.items&&_lastOrder.items.length)||(typeof _rooms!=='undefined'&&_rooms.some(function(r,i){var lo=(i===_curRoomIdx)?_lastOrder:(r.state&&r.state.lastOrder);return lo&&lo.items&&lo.items.length;}));
    tsvBtn.classList.toggle('has-data',hasAny);
  }
  var loadBtn=document.getElementById('util-load');
  if(loadBtn){
    try{var saves=JSON.parse(localStorage.getItem(_SAVES_KEY)||'{}');loadBtn.classList.toggle('has-data',Object.keys(saves).length>0);}catch(e){}
  }
  if(typeof renderRoomTabs==='function')renderRoomTabs();
}

// ══════════ 部屋（ルーム）管理 ══════════
var _rooms=[],_curRoomIdx=-1;

function _newRoomState(){
  var s={
    cat:'floor',matIdx:0,pat:'通し目地',
    floorType:'タイル',tileType:'Pタイル',
    sheetW:1820,flooringType:'フローリング',
    nedaLen:3,formInputs:{},
    wall:{faceIdx:0,faceData:[null,null,null,null],faceInputs:[null,null,null,null],faceOpenings:[[],[],[],[]],faceSelId:[null,null,null,null],faceOidSeq:[0,0,0,0]},
    lastOrder:null,
    dims:{W:3000,L:4000,H:2400}
  };
  _applyDimsToState(s,s.dims);
  return s;
}

function _captureCurrentRoomState(){
  if(curCat==='wall')saveCurrentFaceInputs();
  var formInputs={};
  ['L','W','BL','BW','LOSS','PRICE','REPEAT','COAT','MAWARI_PRICE','HABAKI_PRICE','NEDA_PRICE'].forEach(function(k){
    var e=document.getElementById('f-'+k);if(e)formInputs[k]=e.value;
  });
  formInputs.MAWARI_TYPE=fsel('MAWARI_TYPE');
  formInputs.HABAKI_TYPE=fsel('HABAKI_TYPE');
  formInputs.HABAKI_H=fsel('HABAKI_H');
  // 既存の部屋状態から dims など「グローバルに反映されない情報」を引き継ぐ
  var prev=(_curRoomIdx>=0&&_rooms[_curRoomIdx]&&_rooms[_curRoomIdx].state)||{};
  return{
    cat:curCat,matIdx:curMatIdx,pat:curPat,
    floorType:curFloorType,tileType:curTileType,
    sheetW:curSheetW,flooringType:curFlooringType,
    nedaLen:window.curNedaLen||3,
    formInputs:formInputs,
    wall:{faceIdx:curFaceIdx,faceData:faceData,faceInputs:faceInputs,faceOpenings:faceOpenings,faceSelId:faceSelId,faceOidSeq:faceOidSeq},
    lastOrder:_lastOrder,
    dims:prev.dims||{W:3000,L:4000,H:2400}  // 部屋寸法はグローバルにないので前回値から引き継ぐ（無ければ既定）
  };
}

function _loadRoomStateToGlobals(s){
  curCat=s.cat||'ceil';curMatIdx=s.matIdx||0;curPat=s.pat||'通し目地';
  curFloorType=s.floorType||'タイル';curTileType=s.tileType||'Pタイル';
  curSheetW=s.sheetW||1820;curFlooringType=s.flooringType||'フローリング';
  window.curNedaLen=s.nedaLen||3;
  if(s.wall){
    curFaceIdx=s.wall.faceIdx||0;
    faceData=s.wall.faceData||[null,null,null,null];
    faceInputs=s.wall.faceInputs||[null,null,null,null];
    faceOpenings=s.wall.faceOpenings||[[],[],[],[]];
    faceSelId=s.wall.faceSelId||[null,null,null,null];
    faceOidSeq=s.wall.faceOidSeq||[0,0,0,0];
  }else{
    curFaceIdx=0;faceData=[null,null,null,null];faceInputs=[null,null,null,null];
    faceOpenings=[[],[],[],[]];faceSelId=[null,null,null,null];faceOidSeq=[0,0,0,0];
  }
  _lastOrder=s.lastOrder||null;
}

function _renderRoomWorkspace(state){
  document.querySelectorAll('.cat-btn').forEach(function(b){b.className='cat-btn';});
  var idx={floor:0,wall:1,ceil:2}[curCat];
  var btns=document.querySelectorAll('.cat-btn');
  if(btns[idx])btns[idx].className='cat-btn ac-'+curCat;
  document.getElementById('header-cat').textContent={ceil:'天井',wall:'壁',floor:'床'}[curCat];
  document.getElementById('result-area').innerHTML='';
  if(curCat==='floor')renderFloorUI();
  else if(curCat==='wall')renderWallUI();
  else renderMats();
  setTimeout(function(){
    if(curCat==='wall'){
      if(document.getElementById('wall-cv'))redrawWall();
      return;
    }
    // 床/天井：L,W は必ず state.dims を唯一の真とする（formInputs から派生させない＝H混入防止）
    var dims=state.dims||(_curRoomIdx>=0&&_rooms[_curRoomIdx]&&_rooms[_curRoomIdx].state&&_rooms[_curRoomIdx].state.dims);
    if(!dims)dims={W:3000,L:4000,H:2400};  // 安全な既定値（formInputs.Wが壁のHで汚染されているケースを避ける）
    var fL=document.getElementById('f-L');if(fL)fL.value=dims.L;
    var fW=document.getElementById('f-W');if(fW)fW.value=dims.W;
    // 他フィールド（BL/BW/LOSS/PRICE 等）はレンダー時のカテゴリ別デフォルトをそのまま使用
  },80);
}

function _escHtml(s){return(s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderRoomTabs(){
  var el=document.getElementById('room-tabs');if(!el)return;
  var h='';
  _rooms.forEach(function(r,i){
    var active=i===_curRoomIdx?' active':'';
    var lo=(i===_curRoomIdx)?_lastOrder:(r.state&&r.state.lastOrder);
    var hasData=lo&&lo.items&&lo.items.length;
    h+='<button class="room-tab'+active+(hasData?' has-data':'')+'" onclick="switchRoom('+i+')">'+_escHtml(r.name)+'</button>';
  });
  el.innerHTML=h;
}

function switchRoom(idx){
  if(idx===_curRoomIdx||idx<0||idx>=_rooms.length)return;
  if(_curRoomIdx>=0&&_curRoomIdx<_rooms.length)_rooms[_curRoomIdx].state=_captureCurrentRoomState();
  _curRoomIdx=idx;
  var st=_rooms[idx].state;
  _loadRoomStateToGlobals(st);
  _renderRoomWorkspace(st);
  renderRoomTabs();
  refreshUtilIndicators();
  autoSaveState(true);
}

// ── 部屋追加/編集モーダル ──
var _roomEditMode='add';

function openRoomModal(mode){
  _roomEditMode=mode||'add';

function closeRoomModal(e){

function doSubmitRoom(){
  var name=document.getElementById('room-name').value.trim();
  if(!name){alert('部屋名を入力してください。');return;}
  var W=parseFloat(document.getElementById('room-W').value)||0;
  var L=parseFloat(document.getElementById('room-L').value)||0;
  var H=parseFloat(document.getElementById('room-H').value)||0;
  if(!(W>0&&L>0&&H>0)){alert('幅・長さ・天井高はすべて0より大きい値を入力してください。');return;}
  var dims={W:W,L:L,H:H};
  if(_roomEditMode==='edit'){
    if(_rooms.some(function(r,i){return i!==_curRoomIdx&&r.name===name;})){alert('同じ名前の部屋が既にあります。');return;}
    _rooms[_curRoomIdx].name=name;
    _applyDimsToCurrentRoom(dims);
    closeRoomModal(null);renderRoomTabs();refreshUtilIndicators();
    autoSaveState(true);
    showToast('✎ 部屋を更新しました');
  }else{
    if(_rooms.some(function(r){return r.name===name;})){alert('同じ名前の部屋が既にあります。');return;}
    if(_curRoomIdx>=0)_rooms[_curRoomIdx].state=_captureCurrentRoomState();
    var newSt=_newRoomState();
    _applyDimsToState(newSt,dims);
    _rooms.push({name:name,state:newSt});
    _curRoomIdx=_rooms.length-1;
    _loadRoomStateToGlobals(newSt);
    _renderRoomWorkspace(newSt);
    setTimeout(function(){_forceInjectDims(dims);},150);
    closeRoomModal(null);renderRoomTabs();refreshUtilIndicators();
    autoSaveState(true);
    showToast('🏠 「'+name+'」を追加しました');
  }
}

// ── 寸法を部屋状態へ反映 ──
function _applyDimsToState(state,dims){
  state.dims={W:dims.W,L:dims.L,H:dims.H};
  state.formInputs=state.formInputs||{};
  state.formInputs.L=String(dims.L);
  state.formInputs.W=String(dims.W);
  // 壁A〜D（A=上辺=幅W×H、B=右辺=長さL×H、C=下辺=W×H、D=左辺=L×H）
  var fdims=[[dims.W,dims.H],[dims.L,dims.H],[dims.W,dims.H],[dims.L,dims.H]];
  state.wall=state.wall||{faceIdx:0,faceData:[null,null,null,null],faceInputs:[null,null,null,null],faceOpenings:[[],[],[],[]],faceSelId:[null,null,null,null],faceOidSeq:[0,0,0,0]};
  state.wall.faceInputs=state.wall.faceInputs||[null,null,null,null];
  for(var i=0;i<4;i++){
    var ex=state.wall.faceInputs[i]||{};
    var merged={};
    Object.keys(ex).forEach(function(k){merged[k]=ex[k];});
    merged.L=fdims[i][0];merged.W=fdims[i][1];
    state.wall.faceInputs[i]=merged;
  }
}

function _applyDimsToCurrentRoom(dims){
  if(_curRoomIdx<0)return;
  _rooms[_curRoomIdx].state=_captureCurrentRoomState();
  _applyDimsToState(_rooms[_curRoomIdx].state,dims);
  _loadRoomStateToGlobals(_rooms[_curRoomIdx].state);
  _renderRoomWorkspace(_rooms[_curRoomIdx].state);
  // 確実にDOMへ反映（setTimeoutレースを回避）
  setTimeout(function(){_forceInjectDims(dims);autoSaveState(true);},150);
}

// ══════════ 自動保存（戻る/再読込時の作業継続用） ══════════
var _AUTOSAVE_KEY='genba_autosave';
var _autosaveTimer=null;

function autoSaveState(immediate){
  function doSave(){
    try{
      if(_curRoomIdx>=0&&_rooms[_curRoomIdx])_rooms[_curRoomIdx].state=_captureCurrentRoomState();
      var data={
        version:1,
        rooms:_rooms.map(function(r){return{name:r.name,state:r.state};}),
        curRoomIdx:_curRoomIdx,
        savedAt:new Date().toISOString()
      };
      localStorage.setItem(_AUTOSAVE_KEY,JSON.stringify(data));
    }catch(e){/* quotaオーバー等は黙って失敗 */}
  }
  if(immediate){
    if(_autosaveTimer){clearTimeout(_autosaveTimer);_autosaveTimer=null;}
    doSave();
  }else{
    if(_autosaveTimer)clearTimeout(_autosaveTimer);
    _autosaveTimer=setTimeout(doSave,800);
  }
}

function loadAutoSavedState(){
  try{
    var raw=localStorage.getItem(_AUTOSAVE_KEY);
    if(!raw)return false;
    var data=JSON.parse(raw);
    if(!data||!data.rooms||!data.rooms.length)return false;
    _rooms=data.rooms.map(function(r){
      var st=r.state||_newRoomState();
      // dims がない古いautosaveに対するガード（H値で幅が汚染されるのを防ぐ）
      if(!st.dims)st.dims={W:3000,L:4000,H:2400};
      return{name:r.name||'部屋',state:st};
    });
    _curRoomIdx=Math.max(0,Math.min(data.curRoomIdx||0,_rooms.length-1));
    return true;
  }catch(e){return false;}
}

function clearAutoSavedState(){try{localStorage.removeItem(_AUTOSAVE_KEY);}catch(e){}}

// フォーム入力（f-*）の変化をデバウンスで自動保存
document.addEventListener('input',function(e){
  if(!e.target||!e.target.id)return;
  if(e.target.id.indexOf('f-')===0)autoSaveState(false);
});
document.addEventListener('change',function(e){
  if(!e.target||!e.target.id)return;
  if(e.target.id.indexOf('f-')===0)autoSaveState(false);
});

// ページ離脱・バックグラウンド遷移時は即時保存
window.addEventListener('beforeunload',function(){autoSaveState(true);});
window.addEventListener('pagehide',function(){autoSaveState(true);});
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden')autoSaveState(true);});

      "無垢材": {"price": 2000, "BL": 1800, "BW": 120, "loss": 15}
    }
  }
}
*/
var _DATA_JSON_URL='https://kameisatoru-svg.github.io/genba-navi/data.json';
var _PRICE_CACHE_KEY='genba_price_master_cache';
var _PRICE_CACHE_TTL=6*60*60*1000; // 6時間
var _priceMaster=null;
var _priceMasterStatus='idle'; // idle|loading|cached|loaded|no-section|error
var _priceMasterFetchedAt=null;

function loadPriceMaster(){
  // キャッシュ参照
  try{
    var cached=JSON.parse(localStorage.getItem(_PRICE_CACHE_KEY)||'null');
    if(cached&&cached.ts&&(Date.now()-cached.ts<_PRICE_CACHE_TTL)&&cached.master){
      _priceMaster=cached.master;_priceMasterStatus='cached';_priceMasterFetchedAt=cached.ts;
      applyPriceMaster(_priceMaster);
      refreshPriceMasterIndicator();
      // バックグラウンドで最新版もチェック（古いキャッシュを使いつつ非同期で更新）
    }
  }catch(e){}
  // ネットワーク取得
  _priceMasterStatus='loading';refreshPriceMasterIndicator();
  fetch(_DATA_JSON_URL,{cache:'no-cache'}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(data){
    var master=data&&data['単価マスタ'];
    if(master){
      _priceMaster=master;_priceMasterFetchedAt=Date.now();
      try{localStorage.setItem(_PRICE_CACHE_KEY,JSON.stringify({ts:_priceMasterFetchedAt,master:master}));}catch(e){}
      applyPriceMaster(master);
      _priceMasterStatus='loaded';
    }else{
      _priceMasterStatus='no-section';
    }
    refreshPriceMasterIndicator();
  }).catch(function(err){
    _priceMasterStatus=(_priceMaster?'cached':'error');
    refreshPriceMasterIndicator();
  });
}

function applyPriceMaster(master){
  if(!master)return;
  // 天井・壁: cats[catKey].mats[].fields[].def[i] を上書き
  [['ceil','天井'],['wall','壁']].forEach(function(pair){
    var catKey=pair[0],mapKey=pair[1],src=master[mapKey];
    if(!src||!cats[catKey])return;
    cats[catKey].mats.forEach(function(m){
      var info=src[m.name];if(!info)return;
      m.fields.forEach(function(f){
        var keys=f.row||f.row3||[];
        keys.forEach(function(r,i){
          var v=null;
          if(r.k==='PRICE'&&info.price!=null)v=info.price;
          else if(r.k==='LOSS'&&info.loss!=null)v=info.loss;
          else if(r.k==='BL'&&info.BL!=null)v=info.BL;
          else if(r.k==='BW'&&info.BW!=null)v=info.BW;
          else if(r.k==='COAT'&&info.COAT!=null)v=info.COAT;
          else if(r.k==='REPEAT'&&info.REPEAT!=null)v=info.REPEAT;
          if(v!=null)f.def[i]=v;
        });
      });
    });
  });
  // 床タイル/フローリング: tileDefaults / floorDefaults を上書き
  if(master.床){
    Object.keys(master.床).forEach(function(name){
      var info=master.床[name];
      function applyTo(obj){
        if(!obj)return;
        if(info.price!=null)obj.PRICE=info.price;
        if(info.BL!=null)obj.BL=info.BL;
        if(info.BW!=null)obj.BW=info.BW;
        if(info.loss!=null)obj.LOSS=info.loss;
      }
      if(typeof tileDefaults==='object'&&tileDefaults[name])applyTo(tileDefaults[name]);
      if(typeof floorDefaults==='object'&&floorDefaults[name])applyTo(floorDefaults[name]);
    });
  }
  // 現在の部屋を再描画して単価変更を反映
  if(_curRoomIdx>=0&&_rooms[_curRoomIdx]&&typeof _renderRoomWorkspace==='function'){
    setTimeout(function(){_renderRoomWorkspace(_rooms[_curRoomIdx].state);},10);
  }
}

function refreshPriceMasterIndicator(){
  var el=document.getElementById('price-master-badge');
  if(!el)return;
  var txt='',cls='';
  switch(_priceMasterStatus){
    case 'loading':txt='⏳ 単価マスタ取得中';cls='loading';break;
    case 'loaded':txt='🔗 単価マスタ連携中';cls='ok';break;
    case 'cached':txt='💾 単価マスタ（キャッシュ）';cls='ok';break;
    case 'no-section':txt='⚠ data.jsonに単価マスタ未登録';cls='warn';break;
    case 'error':txt='⚠ 単価マスタ取得失敗';cls='warn';break;
    default:txt='';
  }
  el.textContent=txt;
  el.className='price-master-badge '+cls;
  el.style.display=txt?'inline-block':'none';
}

function refreshPriceMasterFromServer(){
  try{localStorage.removeItem(_PRICE_CACHE_KEY);}catch(e){}
  _priceMaster=null;loadPriceMaster();
  showToast('🔄 単価マスタを再取得します...');
}

// ══════════ 音声入力（webkitSpeechRecognition） ══════════
var _SR=null,_isListening=false,_voiceFbTimer=null;

function initVoiceInput(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var btn=document.getElementById('voice-btn');
  if(!SR){if(btn)btn.classList.add('hidden');return;}
  if(btn)btn.classList.remove('hidden');
  _SR=new SR();
  _SR.lang='ja-JP';
  _SR.continuous=false;
  _SR.interimResults=false;
  _SR.maxAlternatives=1;
  _SR.onstart=function(){
    _isListening=true;
    if(btn)btn.classList.add('listening');
    showVoiceFeedback('🎤 認識中…「床/壁/天井」「幅5000」「長さ6000」「計算」など','heard',3500);
  };
  _SR.onend=function(){
    _isListening=false;
    if(btn)btn.classList.remove('listening');
  };
  _SR.onerror=function(e){
    _isListening=false;
    if(btn)btn.classList.remove('listening');
    var msg=e.error==='not-allowed'?'マイク権限が必要です':(e.error==='no-speech'?'音声を検出できませんでした':('エラー: '+e.error));
    showVoiceFeedback('❌ '+msg,'error',3500);
  };
  _SR.onresult=function(e){
    if(e.results&&e.results[0]&&e.results[0][0]){
      processVoiceCommand(e.results[0][0].transcript);
    }
  };
}

function toggleVoiceInput(){
  if(!_SR){alert('このブラウザは音声入力に対応していません。\nAndroid Chrome 等でお試しください。');return;}
  if(_isListening){try{_SR.stop();}catch(e){}return;}
  try{_SR.start();}catch(e){showVoiceFeedback('❌ 起動失敗: '+e.message,'error',3000);}
}

function showVoiceFeedback(msg,type,dur){
  var fb=document.getElementById('voice-feedback');if(!fb)return;
  fb.textContent=msg;
  fb.className='voice-feedback show '+(type||'');
  if(_voiceFbTimer)clearTimeout(_voiceFbTimer);
  _voiceFbTimer=setTimeout(function(){fb.className='voice-feedback '+(type||'');},dur||2500);
}

// 「五千」→5000などの簡易変換（音声認識が漢数字で返した場合の保険）
function _normalizeKanjiNumbers(s){
  // 数字記号→ASCII
  s=s.replace(/[０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);});
  // 「千」「百」が含まれる単純パターン
  var kanjiMap={'〇':0,'零':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
  // (例: 五千六百, 三千) ※簡易
  return s.replace(/([〇零一二三四五六七八九])千([〇零一二三四五六七八九])?百?([〇零一二三四五六七八九])?十?([〇零一二三四五六七八九])?/g,function(m,a,b,c,d){
    var n=kanjiMap[a]*1000+(b?kanjiMap[b]*100:0)+(c?kanjiMap[c]*10:0)+(d?kanjiMap[d]:0);
    return String(n);
  });
}

function processVoiceCommand(text){
  var t=_normalizeKanjiNumbers((text||'').replace(/\s+/g,' ').trim());
  showVoiceFeedback('🔊 「'+text+'」','heard',2200);
  var applied=[];

  // カテゴリ判定
  var matchedCat=null;
  if(/(床|ゆか|フロア)/.test(t))matchedCat='floor';
  else if(/(壁|かべ|ウォール)/.test(t))matchedCat='wall';
  else if(/(天井|てんじょう|シーリング)/.test(t))matchedCat='ceil';

  if(matchedCat&&matchedCat!==curCat){
    var btns=document.querySelectorAll('.cat-btn');
    var idx={floor:0,wall:1,ceil:2}[matchedCat];
    if(btns[idx]){setCat(matchedCat,btns[idx]);applied.push({floor:'床',wall:'壁',ceil:'天井'}[matchedCat]);}
  }

  // 数字抽出
  function nums(s){var m=s.match(/\d+/g);return m?m.map(function(n){return parseInt(n,10);}):[];}

  // 単独寸法コマンド
  var dimDelta={};
  var widthMatch=t.match(/(?:幅|はば|W)\s*(\d+)/);
  if(widthMatch)dimDelta.W=parseInt(widthMatch[1],10);
  var lengthMatch=t.match(/(?:長さ|ながさ|奥行|おくゆき|L)\s*(\d+)/);
  if(lengthMatch)dimDelta.L=parseInt(lengthMatch[1],10);
  var heightMatch=t.match(/(?:天井高|てんじょうだか|てんじょうこう|高さ|たかさ|H)\s*(\d+)/);
  if(heightMatch)dimDelta.H=parseInt(heightMatch[1],10);

  // 「天井 4500 6000」「5000 6000 2700」など：カテゴリ単独 or 寸法キーワード無しで2-3個の数字
  var dimKeywordMatched=widthMatch||lengthMatch||heightMatch;
  if(!dimKeywordMatched){
    var allN=nums(t);
    if(allN.length>=2){
      dimDelta.L=allN[0];
      dimDelta.W=allN[1];
      if(allN.length>=3)dimDelta.H=allN[2];
    }
  }

  // 寸法適用
  if(Object.keys(dimDelta).length>0&&_curRoomIdx>=0&&_rooms[_curRoomIdx]){
    var cur=_rooms[_curRoomIdx].state.dims||{W:3000,L:4000,H:2400};
    var nd={W:dimDelta.W||cur.W,L:dimDelta.L||cur.L,H:dimDelta.H||cur.H};
    _applyDimsToCurrentRoom(nd);
    applied.push('寸法 W'+nd.W+'×L'+nd.L+'×H'+nd.H);
  }

  // 壁面 A/B/C/D
  var faceMatch=t.match(/([ABCDＡ-Ｄ])\s*面/i)||t.match(/(エー|ビー|シー|ディー)\s*面/);
  if(faceMatch){
    var key=faceMatch[1].toUpperCase();
    var faceMap={'A':0,'B':1,'C':2,'D':3,'Ａ':0,'Ｂ':1,'Ｃ':2,'Ｄ':3,'エー':0,'ビー':1,'シー':2,'ディー':3};
    var fIdx=faceMap[key];
    if(fIdx!=null){
      if(curCat!=='wall'){
        var wb=document.querySelectorAll('.cat-btn')[1];
        if(wb)setCat('wall',wb);
      }
      setTimeout(function(){if(typeof switchFace==='function')switchFace(fIdx);},120);
      applied.push(key+'面');
    }
  }

  // 計算実行
  if(/(計算|けいさん|測定|スタート)/.test(t)){
    setTimeout(function(){
      var sel;
      if(curCat==='floor'){
        sel=document.querySelector('button.calc-floor');
      }else if(curCat==='wall'){
        sel=document.querySelector('button.calc-wall');
      }else{
        sel=document.querySelector('button.calc-ceil');
      }
      if(sel)sel.click();
    },300);
    applied.push('計算');
  }

  if(applied.length){
    showVoiceFeedback('✅ '+applied.join(' / '),'ok',2500);
  }else{
    showVoiceFeedback('❓ 認識できないコマンド: '+text,'error',3000);
  }
}

function _forceInjectDims(dims){
  if(curCat==='floor'||curCat==='ceil'){
    var fL=document.getElementById('f-L');if(fL)fL.value=dims.L;
    var fW=document.getElementById('f-W');if(fW)fW.value=dims.W;
  }else if(curCat==='wall'){
    var fdims=[[dims.W,dims.H],[dims.L,dims.H],[dims.W,dims.H],[dims.L,dims.H]];
    var cur=fdims[curFaceIdx]||fdims[0];
    var fL=document.getElementById('f-L');if(fL)fL.value=cur[0];
    var fW=document.getElementById('f-W');if(fW)fW.value=cur[1];
    if(document.getElementById('wall-cv'))redrawWall();
  }
}

function removeRoomPrompt(){
  if(_curRoomIdx<0)return;
  if(_rooms.length<=1){alert('最後の1部屋は削除できません。\n「＋」で新しい部屋を追加してから削除してください。');return;}
  var cur=_rooms[_curRoomIdx].name;
  if(!confirm('「'+cur+'」を削除しますか？\n（この部屋の入力・計算結果は失われます）'))return;
  _rooms.splice(_curRoomIdx,1);
  if(_curRoomIdx>=_rooms.length)_curRoomIdx=_rooms.length-1;
  var st=_rooms[_curRoomIdx].state;
  _loadRoomStateToGlobals(st);
  _renderRoomWorkspace(st);
  renderRoomTabs();
  refreshUtilIndicators();
  autoSaveState(true);
  showToast('🗑 削除しました');
}

// ── 状態キャプチャ／復元（マルチルーム対応＋旧形式互換） ──
function captureState(){
  if(_curRoomIdx>=0&&_curRoomIdx<_rooms.length)_rooms[_curRoomIdx].state=_captureCurrentRoomState();
  return{
    version:2,
    rooms:_rooms.map(function(r){return{name:r.name,state:r.state};}),
    curRoomIdx:_curRoomIdx
  };
}

function restoreState(s){
  if(s&&s.rooms&&Array.isArray(s.rooms)&&s.rooms.length){
    _rooms=s.rooms.map(function(r){return{name:r.name||'部屋',state:r.state||_newRoomState()};});
    _curRoomIdx=Math.max(0,Math.min(s.curRoomIdx||0,_rooms.length-1));
  }else if(s&&s.cat){
    // 旧形式（単一部屋）→「部屋1」に包んで読込
    _rooms=[{name:'部屋1',state:s}];_curRoomIdx=0;
  }else{
    _rooms=[{name:'部屋1',state:_newRoomState()}];_curRoomIdx=0;
  }
  var st=_rooms[_curRoomIdx].state;
  _loadRoomStateToGlobals(st);
  _renderRoomWorkspace(st);
  renderRoomTabs();
  refreshUtilIndicators();
}

// ── 保存モーダル ──
function openSaveModal(){
  var nameInput=document.getElementById('save-name');
  nameInput.value='';
  document.getElementById('save-modal').classList.remove('hidden');
  setTimeout(function(){nameInput.focus();},100);
}
function closeSaveModal(e){
  if(e&&e.target!==document.getElementById('save-modal'))return;
  document.getElementById('save-modal').classList.add('hidden');
}
function doSaveProject(){
  var name=document.getElementById('save-name').value.trim();
  if(!name){alert('案件名を入力してください。');return;}
  if(curCat==='wall')saveCurrentFaceInputs();
  var saves;
  try{saves=JSON.parse(localStorage.getItem(_SAVES_KEY)||'{}');}catch(e){saves={};}
  saves[name]={state:captureState(),savedAt:new Date().toISOString()};
  try{
    localStorage.setItem(_SAVES_KEY,JSON.stringify(saves));
    closeSaveModal(null);
    showToast('💾 「'+name+'」を保存しました');
    refreshUtilIndicators();
  }catch(err){alert('保存に失敗しました: '+err.message);}
}

// ── 履歴モーダル ──
function openLoadModal(){renderHistoryList();document.getElementById('load-modal').classList.remove('hidden');}
function closeLoadModal(e){
  if(e&&e.target!==document.getElementById('load-modal'))return;
  document.getElementById('load-modal').classList.add('hidden');
}
function renderHistoryList(){
  var saves;try{saves=JSON.parse(localStorage.getItem(_SAVES_KEY)||'{}');}catch(e){saves={};}
  var names=Object.keys(saves).sort(function(a,b){return(saves[b].savedAt||'').localeCompare(saves[a].savedAt||'');});
  var el=document.getElementById('history-list');
  if(!names.length){
    el.innerHTML='<div class="history-empty">保存済み案件はありません。<br><br>計算結果を「💾 保存」で記録すると、ここから呼び出せます。</div>';
    return;
  }
  var h='';
  names.forEach(function(n){
    var s=saves[n];
    var savedAt=s.savedAt?new Date(s.savedAt):null;
    var dateStr=savedAt?(savedAt.getFullYear()+'/'+(savedAt.getMonth()+1)+'/'+savedAt.getDate()+' '+String(savedAt.getHours()).padStart(2,'0')+':'+String(savedAt.getMinutes()).padStart(2,'0')):'';
    var cat=s.state&&s.state.cat?{ceil:'天井',wall:'壁',floor:'床'}[s.state.cat]:'';
    var safeN=(n+'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var dispN=(n+'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    h+='<div class="history-item">';
    h+='<div class="history-item-info" onclick="loadProject(\''+safeN+'\')">';
    h+='<div class="history-name">'+dispN+'</div>';
    h+='<div class="history-meta">'+cat+' ・ '+dateStr+'</div>';
    h+='</div>';
    h+='<div class="history-actions">';
    h+='<button class="history-open" onclick="loadProject(\''+safeN+'\')">開く</button>';
    h+='<button class="history-del" onclick="deleteProject(\''+safeN+'\')" title="削除">🗑</button>';
    h+='</div>';
    h+='</div>';
  });
  el.innerHTML=h;
}
function loadProject(name){
  var saves;try{saves=JSON.parse(localStorage.getItem(_SAVES_KEY)||'{}');}catch(e){saves={};}
  if(!saves[name]){alert('案件が見つかりません: '+name);return;}
  try{
    restoreState(saves[name].state||{});
    closeLoadModal(null);
    showToast('📂 「'+name+'」を読み込みました');
  }catch(err){alert('読み込みに失敗しました: '+err.message);}
}
function deleteProject(name){
  if(!confirm('「'+name+'」を削除しますか？'))return;
  var saves;try{saves=JSON.parse(localStorage.getItem(_SAVES_KEY)||'{}');}catch(e){saves={};}
  delete saves[name];
  localStorage.setItem(_SAVES_KEY,JSON.stringify(saves));
  renderHistoryList();
  refreshUtilIndicators();
  showToast('🗑 削除しました');
}

// ── TSV出力モーダル ──
function buildTsv(){
  if(!_lastOrder||!_lastOrder.items.length)return'';
  var lines=[];
  lines.push('案件名\t'+_lastOrder.title);
  lines.push('作成日\t'+_lastOrder.date);
  lines.push('');
  lines.push(['カテゴリ','材料名','規格','発注数','単位','単価','金額','備考'].join('\t'));
  var total=0;
  _lastOrder.items.forEach(function(it){
    var qtyStr=(typeof it.qty==='number')?(it.qty%1===0?String(it.qty):it.qty.toFixed(1)):it.qty;
    lines.push([
      it.cat||'',it.name||'',it.spec||'',
      qtyStr,it.unit||'',
      it.price?it.price.toLocaleString():'',
      it.cost?it.cost.toLocaleString():'',
      it.note||''
    ].join('\t'));
    total+=(it.cost||0);
  });
  lines.push('');
  lines.push('合計\t\t\t\t\t\t¥'+total.toLocaleString());
  return lines.join('\n');
}

function buildMultiRoomTsv(){
  if(!_rooms.length)return'';
  if(_curRoomIdx>=0)_rooms[_curRoomIdx].state=_captureCurrentRoomState();
  var lines=[],totalCost=0,matAgg={},hasAny=false,roomCount=0;
  lines.push('案件\t['+_rooms.length+'部屋] 全室合算');
  lines.push('作成日\t'+getDateStr());
  lines.push('');
  lines.push(['部屋','カテゴリ','材料名','規格','発注数','単位','単価','金額','備考'].join('\t'));
  _rooms.forEach(function(r){
    var lo=r.state&&r.state.lastOrder;if(!lo||!lo.items||!lo.items.length)return;
    roomCount++;
    lo.items.forEach(function(it){
      hasAny=true;
      var qtyStr=(typeof it.qty==='number')?(it.qty%1===0?String(it.qty):it.qty.toFixed(1)):it.qty;
      lines.push([
        r.name,it.cat||'',it.name||'',it.spec||'',
        qtyStr,it.unit||'',
        it.price?it.price.toLocaleString():'',
        it.cost?it.cost.toLocaleString():'',
        it.note||''
      ].join('\t'));
      totalCost+=(it.cost||0);
      var key=(it.name||'')+'|'+(it.spec||'')+'|'+(it.unit||'');
      if(!matAgg[key])matAgg[key]={name:it.name||'',spec:it.spec||'',unit:it.unit||'',qty:0,cost:0};
      matAgg[key].qty+=(typeof it.qty==='number'?it.qty:parseFloat(it.qty)||0);
      matAgg[key].cost+=(it.cost||0);
    });
  });
  if(!hasAny)return'計算済みのデータがありません。\n各部屋で「計算する」を押してから出力してください。';
  lines.push('');
  lines.push('【材料別合計】（'+roomCount+'部屋分）');
  lines.push(['材料名','規格','発注数','単位','金額'].join('\t'));
  Object.keys(matAgg).forEach(function(k){
    var m=matAgg[k];
    var qtyStr=m.qty%1===0?String(m.qty):m.qty.toFixed(1);
    lines.push([m.name,m.spec,qtyStr,m.unit,'¥'+m.cost.toLocaleString()].join('\t'));
  });
  lines.push('');
  lines.push('総合計\t\t\t\t¥'+totalCost.toLocaleString());
  return lines.join('\n');
}

function updateTsvText(){
  var checked=document.querySelector('input[name="tsv-mode"]:checked');
  var mode=checked?checked.value:'current';
  document.querySelectorAll('.tsv-mode-btn').forEach(function(b){
    var inp=b.querySelector('input');
    b.classList.toggle('checked',!!(inp&&inp.checked));
  });
  document.getElementById('tsv-text').value=(mode==='all')?buildMultiRoomTsv():buildTsv();
}

function _captureVisibleCanvasImages(){
  var imgs=[];
  document.querySelectorAll('.scroll-area canvas').forEach(function(cv){
    if(!cv.offsetWidth||!cv.offsetHeight)return;
    try{
      var label=(cv.closest('.vw2')&&cv.closest('.vw2').querySelector('.vl'))?cv.closest('.vw2').querySelector('.vl').textContent.trim():'';
      imgs.push({title:label,src:cv.toDataURL('image/png')});
    }catch(e){}
  });
  return imgs;
}

function copyTsvToClipboard(){
  var text=document.getElementById('tsv-text').value;
  var btn=document.getElementById('tsv-copy-btn');
  function ok(){
    btn.classList.add('copied');btn.textContent='✓ コピーしました';
    setTimeout(function(){btn.classList.remove('copied');btn.textContent='クリップボードへコピー';},2000);
  }
  function fb(){
    var ta=document.getElementById('tsv-text');
    ta.removeAttribute('readonly');ta.select();
    try{document.execCommand('copy');ta.setAttribute('readonly','readonly');ok();}
    catch(e){ta.setAttribute('readonly','readonly');alert('コピーに失敗しました。手動で選択してコピーしてください。');}
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(ok).catch(fb);
  }else{fb();}
}

function getOpeningPerim(){var t=0;getOpenings().forEach(function(o){if(o.type==='ドア')t+=o.w/1000*o.count;});return t;}
function bothInside(x1,x2,op){var E=0.5;return(x1>op.x+E&&x1<op.x+op.w-E)&&(x2>op.x+E&&x2<op.x+op.w-E);}
function toHonStr(arr){var m={};arr.forEach(function(l){if(l>0)m[l]=(m[l]||0)+1;});return Object.keys(m).map(Number).sort(function(a,b){return b-a;}).map(function(k){return k+'mm × '+m[k]+'本';}).join('　');}

function showCanvasZoom(srcCanvas,title){
  var existing=document.getElementById('cv-zoom-modal');
  if(existing)document.body.removeChild(existing);
  var modal=document.createElement('div');
  modal.id='cv-zoom-modal';modal.className='cv-fullscreen';
  modal.innerHTML='<div class="cv-fs-head"><div class="cv-fs-title">'+title+' — 拡大表示</div><button class="cv-fs-close" aria-label="閉じる">×</button></div><div class="cv-fs-body"><canvas></canvas></div>';
  document.body.appendChild(modal);
  var target=modal.querySelector('canvas');
  var body=modal.querySelector('.cv-fs-body');
  var bw=body.clientWidth-32,bh=body.clientHeight-32;
  var srcW=srcCanvas.offsetWidth||srcCanvas.width,srcH=srcCanvas.offsetHeight||srcCanvas.height;
  if(srcW<=0||srcH<=0){srcW=400;srcH=300;}
  var ratio=srcW/srcH,tw,th;
  if(bw/bh>ratio){th=bh;tw=th*ratio;}else{tw=bw;th=tw/ratio;}
  var dpr=window.devicePixelRatio||1;
  target.width=Math.round(tw*dpr);target.height=Math.round(th*dpr);
  target.style.width=tw+'px';target.style.height=th+'px';
  var ctx=target.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  if('imageSmoothingQuality' in ctx)ctx.imageSmoothingQuality='high';
  ctx.drawImage(srcCanvas,0,0,target.width,target.height);
  function close(){if(modal.parentNode)modal.parentNode.removeChild(modal);document.removeEventListener('keydown',esc);}
  function esc(e){if(e.key==='Escape')close();}
  modal.querySelector('.cv-fs-close').addEventListener('click',close);
  modal.addEventListener('click',function(e){if(e.target===modal)close();});
  document.addEventListener('keydown',esc);
}

function calcSheetDir(L,W,sw,loss,price,dir){
  var cols,lenPerCol,edgeMm;
  if(dir==='縦割り'){cols=Math.ceil(W/sw);lenPerCol=L/1000;edgeMm=W-(cols-1)*sw;}
  else{cols=Math.ceil(L/sw);lenPerCol=W/1000;edgeMm=(dir==='縦割り'?W:L)-(cols-1)*sw;}
  // 切り出し最終本の「使った幅」。割り切れる場合は0（カット不要）
  if(edgeMm===sw||edgeMm<=0)edgeMm=0;
  var totalM=cols*lenPerCol,ordM=Math.ceil(totalM*(1+loss/100)*10)/10;
  return{dir:dir,cols:cols,lenPerCol:lenPerCol,edgeMm:edgeMm,totalM:totalM,ordM:ordM,costOrd:Math.round(ordM*price)};
}

function calcClothCols(W,H,rw,rp){
  var nc=Math.ceil(W/rw),res=[];
  for(var c=0;c<nc;c++){
    var x1=c*rw,x2=Math.min(x1+rw,W);
    var co=getOpenings().filter(function(op){return op.x<x2&&op.x+op.w>x1;});
    if(!co.length){var l=rceil(H,rp);res.push({c:c+1,x1:Math.round(x1),x2:Math.round(x2),mode:'通常',cuts:[{lb:'全高',len:l,nt:rp?H+'→'+l+'mm':''}],tot:l,reuse:0});continue;}
    var spOp=null;
    for(var i=0;i<co.length;i++){if(bothInside(x1,x2,co[i])){spOp=co[i];break;}}
    if(!spOp){var lf=rceil(H,rp);res.push({c:c+1,x1:Math.round(x1),x2:Math.round(x2),mode:'全高',cuts:[{lb:'全高',len:lf,nt:co.map(function(o){return o.type;}).join('・')+(rp?' ('+H+'→'+lf+'mm)':'')}],tot:lf,reuse:0});continue;}
    var cuts=[],tot=0,reuse=0,op=spOp,topH=H-op.y-op.h,botH=op.y;
    if(op.type==='窓（中連）'){var uc=rceil(topH,rp),ur=uc-topH;cuts.push({lb:'窓上',len:uc,nt:'天端'+topH+'mm'+(rp?' → '+uc+'mm 余り'+ur+'mm':'')});tot+=uc;if(botH>0){if(ur>=botH){cuts.push({lb:'窓下',len:botH,reuse:true,nt:'残材流用（余り'+ur+'mm≥窓下'+botH+'mm）'});reuse+=botH;}else{var bc=rceil(botH,rp);cuts.push({lb:'窓下',len:bc,nt:'新規 床'+botH+'mm'+(rp?' → '+bc:'')});tot+=bc;}}}
    else if(op.type==='窓（掃出）'){if(topH>0){var uc3=rceil(topH,rp);cuts.push({lb:'窓上',len:uc3,nt:'天端'+topH+'mm'+(rp?' → '+uc3+'mm':'')});tot+=uc3;}else cuts.push({lb:'窓上',len:0,nt:'不要'});}
    else{if(topH>0){var uc2=rceil(topH,rp);cuts.push({lb:'開口上',len:uc2,nt:'天端'+topH+'mm'+(rp?' → '+uc2+'mm':'')});tot+=uc2;}else cuts.push({lb:'開口上',len:0,nt:'不要'});}
    res.push({c:c+1,x1:Math.round(x1),x2:Math.round(x2),mode:'分割',cuts:cuts,tot:tot,reuse:reuse});
  }
  return res;
}

  var cols=Math.ceil(d.L/pl),rows=Math.ceil(d.W/pw),base=cols*rows,total=Math.ceil(base*(1+tl/100));

  return{m:[{v:base+'枚',l:'必要枚数'},{v:total+'枚',l:'発注数（ロス込）'},{v:((d.L/1000)*(d.W/1000)).toFixed(2)+'m²',l:'面積'},{v:tl+'%',l:'ロス率'}],rows:[['横（幅方向）',rows+'列','端材 '+eV+'mm'],['縦（長さ方向）',cols+'行','端材 '+eH+'mm'],[pat,'',lx>0?'端部+'+lx+'%':'']],costs:[{l:'材料費（正味）',v:fmt(base*d.PRICE)},{l:'材料費（ロス込）',v:fmt(total*d.PRICE)}],trim:trim,viz:{rW:d.W,rH:d.L,tW:pw,tH:pl,pat:pat,eH:eV,eV:eH,lbl:cols+'×'+rows+'='+base+'枚'}};}

function calcClothWithFace(d,fIdx){
  var savedIdx=curFaceIdx;curFaceIdx=fIdx;
  var opArea=getOpeningArea(),opPerim=getOpeningPerim();
  var rw=d.BL||920,rp=d.REPEAT||0;
  var cr=calcClothCols(d.L,d.W,rw,rp);
  curFaceIdx=savedIdx;
  var totMm=cr.reduce(function(s,r){return s+r.tot;},0),totM=totMm/1000;
  var ordM=Math.ceil(totM*(1+d.LOSS/100)*10)/10;
  var cutMap={};cr.forEach(function(r){r.cuts.forEach(function(ct){if(ct.len>0&&!ct.reuse)cutMap[ct.len]=(cutMap[ct.len]||0)+1;});});
  var reuseT=cr.reduce(function(s,r){return s+(r.reuse||0);},0);
  var wallArea=(d.L/1000)*(d.W/1000)-opArea;
  var hType=d.HABAKI_TYPE||'ソフト巾木',hH=d.HABAKI_H||'60',hPrice=d.HABAKI_PRICE||0;
  var hPerim=(d.L+d.W)*2/1000-opPerim,hOrd=Math.ceil(hPerim*1.05*10)/10;
  var trim={name:'巾木',type:hType+(hType==='ソフト巾木'?' H'+hH:''),perim:hPerim.toFixed(2),order:hOrd.toFixed(1),cost:Math.round(hOrd*hPrice),ordM:hOrd};
  return{m:[{v:ordM.toFixed(1)+'m',l:'発注数（ロス込）'},{v:Math.ceil(d.L/rw)+'列',l:'割り付け列数'},{v:totM.toFixed(1)+'m',l:'正味合計'},{v:wallArea.toFixed(2)+'m²',l:'有効壁面積'}],rows:[],costs:[{l:'材料費（正味）',v:fmt(totM*d.PRICE)},{l:'材料費（ロス込）',v:fmt(ordM*d.PRICE)}],trim:trim,colResults:cr,cutMap:cutMap,reuseT:reuseT,viz:null,ordM:ordM,costOrd:Math.round(ordM*d.PRICE),costNet:Math.round(totM*d.PRICE)};}

function calcCloth(d){return calcClothWithFace(d,curFaceIdx);}

function addOp(type,w,h2){var L=fv('L')||3600,H=fv('W')||2400,rw=fv('BL')||920;var nc=Math.ceil(L/rw),mc=Math.floor(nc/2);var x=w<rw?mc*rw+Math.round((rw-w)/2/10)*10:Math.round((L-w)/2/10)*10;x=Math.max(0,Math.min(L-w,x));var y=type==='ドア'?0:Math.max(0,Math.min(H-h2,Math.round((H-h2)/2/10)*10));faceOidSeq[curFaceIdx]++;var newId=faceOidSeq[curFaceIdx];getOpenings().push({id:newId,type:type,w:w,h:h2,x:x,y:y,count:1});faceSelId[curFaceIdx]=newId;renderOlist();redrawWall();showMP();}

function odists(op){var L=fv('L')||3600,H=fv('W')||2400;return{left:op.x,right:L-op.x-op.w,bottom:op.y,top:H-op.y-op.h};}

function setupCanvas(cv,cssW,cssH){
  var dpr=window.devicePixelRatio||1;
  cv.width=Math.round(cssW*dpr);cv.height=Math.round(cssH*dpr);
  cv.style.width=cssW+'px';cv.style.height=cssH+'px';
  var ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
  return ctx;
}

function redrawWall(){
  var cv=document.getElementById('wall-cv');if(!cv)return;
  var W=fv('L')||3600,H=fv('W')||2400,rw=fv('BL')||920,rp=fv('REPEAT')||0;
  var CW=cv.offsetWidth||360,sc=Math.min((CW-24)/W,180/H),rw2=W*sc,rh=H*sc,ox=12,oy=10;
  var ctx=setupCanvas(cv,CW,rh+28);ctx.clearRect(0,0,CW,rh+28);
  var nc=Math.ceil(W/rw);
  for(var c=0;c<nc;c++){var cx1=ox+c*rw*sc,cx2=ox+Math.min((c+1)*rw,W)*sc;ctx.fillStyle=c%2===0?'rgba(13,110,80,0.06)':'rgba(13,110,80,0.03)';ctx.fillRect(cx1,oy,cx2-cx1,rh);}
  ctx.strokeStyle='rgba(13,110,80,0.18)';ctx.lineWidth=0.8;
  for(var c2=0;c2<=nc;c2++){var cx=ox+Math.min(c2*rw,W)*sc;ctx.beginPath();ctx.moveTo(cx,oy);ctx.lineTo(cx,oy+rh);ctx.stroke();if(c2<nc){ctx.fillStyle='rgba(13,110,80,0.5)';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText((c2+1)+'列',ox+(c2*rw+Math.min((c2+1)*rw,W))/2*sc,oy+9);}}
  if(rp>0){var sl=rceil(H,rp);ctx.strokeStyle='rgba(13,110,80,0.1)';ctx.lineWidth=0.5;ctx.setLineDash([2,5]);for(var rr=rp;rr<sl;rr+=rp){var ry3=oy+(H-rr)*sc;if(ry3>oy&&ry3<oy+rh){ctx.beginPath();ctx.moveTo(ox,ry3);ctx.lineTo(ox+rw2,ry3);ctx.stroke();}}ctx.setLineDash([]);}
  getOpenings().forEach(function(op){
    var rx=ox+op.x*sc,ry2=oy+(H-op.y-op.h)*sc,rw3=op.w*sc,rh2=op.h*sc,s=op.id===faceSelId[curFaceIdx];
    ctx.fillStyle='#f8f7f4';ctx.fillRect(rx,ry2,rw3,rh2);
    ctx.save();ctx.beginPath();ctx.rect(rx,ry2,rw3,rh2);ctx.clip();ctx.strokeStyle='rgba(150,150,150,0.2)';ctx.lineWidth=0.8;for(var dd=-rh2;dd<=rw3+rh2;dd+=12){ctx.beginPath();ctx.moveTo(rx+dd,ry2);ctx.lineTo(rx+dd+rh2,ry2+rh2);ctx.stroke();}ctx.restore();
    ctx.strokeStyle=s?'var(--cw)':'rgba(60,60,60,0.5)';ctx.lineWidth=s?2:1;ctx.strokeRect(rx,ry2,rw3,rh2);
    ctx.fillStyle=s?'#0d6e50':'rgba(60,60,60,0.65)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText(op.type==='ドア'?'D':(op.type==='窓（中連）'?'中連':'掃出'),rx+rw3/2,ry2+rh2/2+4);
    if(s){var d2=odists(op);ctx.fillStyle='#0d6e50';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText(op.w+'mm',rx+rw3/2,ry2-5);ctx.save();ctx.translate(rx-5,ry2+rh2/2);ctx.rotate(-Math.PI/2);ctx.fillText(op.h+'mm',0,0);ctx.restore();}
    if(op.type==='ドア'){ctx.strokeStyle='rgba(13,110,80,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(rx,oy+rh);ctx.lineTo(rx+rw3,oy+rh);ctx.stroke();}
  });
  ctx.strokeStyle='rgba(30,45,64,0.6)';ctx.lineWidth=2;ctx.strokeRect(ox,oy,rw2,rh);
  ctx.strokeStyle='rgba(30,45,64,0.25)';ctx.lineWidth=0.8;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(ox,oy+rh+12);ctx.lineTo(ox+rw2,oy+rh+12);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(90,106,122,0.7)';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText(W+'mm',ox+rw2/2,oy+rh+24);
  addZoomButtons();
}

function drawCompaneViz(L,W,BL,BW,eH,eV,cols,rows,nedaCount,PITCH){
  var cv=document.getElementById('viz-cv');if(!cv)return;
  var CW=cv.offsetWidth||340,CH=200;

  var rw=L*sc,rh=W*sc,ox=mL,oy=mT,ctx=setupCanvas(cv,CW,CH);
  ctx.clearRect(0,0,CW,CH);
  var tw=BL*sc,th=BW*sc;
  for(var row=0;row<rows;row++){var off=(row%2===1)?tw/2:0;var y1=oy+row*th,y2=Math.min(oy+(row+1)*th,oy+rh);for(var col=0;col<cols+(row%2===1?1:0);col++){var x1=ox+col*tw-off,x2=Math.min(x1+tw,ox+rw);if(x1>=ox+rw)break;var isEdge=(x2-Math.max(x1,ox)<tw-1)||(y2-y1<th-1);ctx.fillStyle=isEdge?'rgba(154,90,16,0.18)':'rgba(154,90,16,0.05)';ctx.fillRect(Math.max(x1,ox),y1,Math.min(x2,ox+rw)-Math.max(x1,ox),y2-y1);ctx.strokeStyle='rgba(154,90,16,0.4)';ctx.lineWidth=0.8;ctx.strokeRect(Math.max(x1,ox),y1,Math.min(x2,ox+rw)-Math.max(x1,ox),y2-y1);}}
  var nedaW=Math.ceil(W/PITCH)+1;
  for(var n=0;n<nedaW;n++){var ny=oy+Math.min(n*PITCH,W)*sc,nthick=Math.max(2,45*sc);ctx.fillStyle='rgba(37,99,168,0.15)';ctx.fillRect(ox,ny-nthick/2,rw,nthick);ctx.strokeStyle='rgba(37,99,168,0.4)';ctx.lineWidth=0.8;ctx.strokeRect(ox,ny-nthick/2,rw,nthick);}
  var lthick=Math.max(2,45*sc);[ox,ox+rw-lthick].forEach(function(lx){ctx.fillStyle='rgba(37,99,168,0.22)';ctx.fillRect(lx,oy,lthick,rh);ctx.strokeStyle='rgba(37,99,168,0.5)';ctx.lineWidth=0.8;ctx.strokeRect(lx,oy,lthick,rh);});
  ctx.strokeStyle='rgba(30,45,64,0.6)';ctx.lineWidth=1.5;ctx.strokeRect(ox,oy,rw,rh);
  ctx.fillStyle='rgba(90,106,122,0.7)';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText(L+'mm',ox+rw/2,oy+rh+14);ctx.save();ctx.translate(ox-6,oy+rh/2);ctx.rotate(-Math.PI/2);ctx.fillText(W+'mm',0,0);ctx.restore();
}

function doFloorCalc(){
  var L=fv('L'),W=fv('W'),loss=fv('LOSS'),price=fv('PRICE');
  if(curFloorType==='タイル'){
    var r=calcFloorTile({L:L,W:W,BL:fv('BL'),BW:fv('BW'),LOSS:loss,PRICE:price},curPat);

  }
  else if(curFloorType==='長尺シート'){

    var best=tate.ordM<=yoko.ordM?tate:yoko;
    setOrder([{cat:'床',name:'長尺シート',spec:curSheetW+'mm幅 / '+best.dir,qty:best.ordM,unit:'m',price:price,cost:best.costOrd||Math.round(best.ordM*price),note:'ロス'+loss+'%込 ('+best.cols+'本×'+best.lenPerCol.toFixed(2)+'m)'}],'[床] 長尺シート '+curSheetW+'mm');
  }
  else{
    var r2=calcFlooringMat({L:L,W:W,BL:fv('BL'),BW:fv('BW'),LOSS:loss,PRICE:price},curPat);
    renderResult(r2,'floor');
    var items2=[],qi2=(r2.m||[]).find(function(x){return x.l.indexOf('発注')>=0;});
    if(qi2){var q2=parseQty(qi2.v);items2.push({cat:'床',name:curFlooringType,spec:fv('BL')+'×'+fv('BW')+'mm',qty:q2.n,unit:q2.u||'枚',price:price,cost:Math.round(q2.n*price),note:'ロス'+loss+'%込'});}

    drawSheetCanvas('cv-tate',tate,L,W,sc,ox,oy,rw,rh,CW,CH,'縦');

function drawSheetCanvas(cvId,s,L,W,sc,ox,oy,rw,rh,CW,CH,lineDir){
  var cv=document.getElementById(cvId);if(!cv)return;
  var ctx=setupCanvas(cv,CW,CH);ctx.clearRect(0,0,CW,CH);
  var swPx=curSheetW*sc;
  // 室内背景
  ctx.fillStyle='rgba(154,90,16,0.05)';ctx.fillRect(ox,oy,rw,rh);
  function drawHorizDim(x1,x2,y,label){ctx.strokeStyle='rgba(154,90,16,0.85)';ctx.fillStyle='rgba(154,90,16,0.85)';ctx.lineWidth=0.9;ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x1,y-3);ctx.lineTo(x1,y+3);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y-3);ctx.lineTo(x2,y+3);ctx.stroke();ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(label,(x1+x2)/2,y+5);}
  function drawVertDim(x,y1,y2,label){ctx.strokeStyle='rgba(154,90,16,0.85)';ctx.fillStyle='rgba(154,90,16,0.85)';ctx.lineWidth=0.9;ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x-3,y1);ctx.lineTo(x+3,y1);ctx.stroke();ctx.beginPath();ctx.moveTo(x-3,y2);ctx.lineTo(x+3,y2);ctx.stroke();ctx.save();ctx.translate(x+12,(y1+y2)/2);ctx.rotate(Math.PI/2);ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,0,0);ctx.restore();}
  if(lineDir==='縦'){
    // 切り出し最終本（カット幅 edgeMm）のハイライト：canvas右端側
    if(s.edgeMm>0&&s.cols>0){
      var cutX1=ox+(s.cols-1)*swPx;
      var cutX2=Math.min(cutX1+s.edgeMm*sc,ox+rw);
      ctx.fillStyle='rgba(154,90,16,0.22)';
      ctx.fillRect(cutX1,oy,cutX2-cutX1,rh);
    }
    // 区切り線（cols-1本）
    ctx.strokeStyle='rgba(154,90,16,0.6)';ctx.lineWidth=1;
    for(var i=1;i<s.cols;i++){
      var lx=ox+i*swPx;if(lx>ox+rw)break;
      ctx.beginPath();ctx.moveTo(lx,oy);ctx.lineTo(lx,oy+rh);ctx.stroke();
    }
    // 切り出し本の使用幅ラベル
    if(s.edgeMm>0){
      var d1=ox+(s.cols-1)*swPx;
      var d2=Math.min(d1+s.edgeMm*sc,ox+rw);
      drawHorizDim(d1,d2,oy+rh+10,s.edgeMm+'mm');
    }
    ctx.fillStyle='rgba(90,106,122,0.7)';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(s.cols+'本',ox+rw/2,oy+rh+(s.edgeMm>0?22:6));
  }else{
    // 切り出し最終本：canvas下端側
    if(s.edgeMm>0&&s.cols>0){
      var cutY1=oy+(s.cols-1)*swPx;
      var cutY2=Math.min(cutY1+s.edgeMm*sc,oy+rh);
      ctx.fillStyle='rgba(154,90,16,0.22)';
      ctx.fillRect(ox,cutY1,rw,cutY2-cutY1);
    }
    ctx.strokeStyle='rgba(154,90,16,0.6)';ctx.lineWidth=1;
    for(var j=1;j<s.cols;j++){
      var ly=oy+j*swPx;if(ly>oy+rh)break;
      ctx.beginPath();ctx.moveTo(ox,ly);ctx.lineTo(ox+rw,ly);ctx.stroke();
    }
    if(s.edgeMm>0){
      var e1=oy+(s.cols-1)*swPx;
      var e2=Math.min(e1+s.edgeMm*sc,oy+rh);
      drawVertDim(ox+rw+10,e1,e2,s.edgeMm+'mm');
    }
    ctx.fillStyle='rgba(90,106,122,0.7)';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(s.cols+'本',ox+rw/2,oy+rh+6);
  }
  ctx.strokeStyle='rgba(30,45,64,0.55)';ctx.lineWidth=1.5;ctx.strokeRect(ox,oy,rw,rh);
}
