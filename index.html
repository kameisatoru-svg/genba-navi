<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>現場ナビ｜アート・レイズ</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場ナビ">
<meta name="theme-color" content="#1e2d40">
<link rel="stylesheet" href="common.css">
<style>
/* body：flex縦並びレイアウトだけページ固有 */
body{display:flex;flex-direction:column;}

/* ヘッダー */
.header{background:var(--navy);padding:env(safe-area-inset-top,0) 0 0;flex-shrink:0;}
.header-inner{height:56px;display:flex;align-items:center;padding:0 16px;}
.logo{font-size:18px;font-weight:900;color:var(--white);letter-spacing:0.04em;flex:1;}
.logo span{color:var(--accent);}
.header-date{font-size:11px;color:rgba(255,255,255,0.55);text-align:right;line-height:1.5;}
.header-btn{width:40px;height:40px;border:none;background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;margin-left:4px;}
.header-btn:active{background:rgba(255,255,255,0.12);}

/* スクロールエリア */
.scroll-area{padding:20px 16px max(24px,env(safe-area-inset-bottom));}

/* 今日の日付カード */
.today-card{background:var(--navy2);border-radius:16px;padding:16px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.today-icon{width:44px;height:44px;border-radius:12px;background:rgba(200,169,110,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.today-body{flex:1;}
.today-label{font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:2px;}
.today-val{font-size:14px;font-weight:700;color:var(--white);line-height:1.4;}

/* セクションタイトル */
.sec-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.08em;margin-bottom:10px;padding-left:2px;}

/* ツールカードグリッド（現場ツール・書類で共通） */
.main-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;margin-bottom:24px;
}
.main-card{
  background:var(--white);
  border-radius:20px;
  padding:18px 16px;
  aspect-ratio:4/3;
  display:flex;flex-direction:column;justify-content:space-between;
  cursor:pointer;
  box-shadow:0 2px 10px rgba(30,45,64,0.06);
  border:1px solid rgba(30,45,64,0.06);
  transition:transform 0.15s,border-color 0.15s;
  text-decoration:none;
  color:var(--text);
}
.main-card:active{
  transform:scale(0.97);
  border-color:var(--accent);
  background:#faf8f4;
}
.card-icon{
  width:48px;height:48px;
  color:var(--navy);
  flex-shrink:0;
}
.card-body{width:100%;}
.card-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:2px;line-height:1.3;}
.card-desc{font-size:11px;color:var(--text2);line-height:1.4;}

.footer-info{text-align:center;font-size:10px;color:var(--text2);opacity:0.6;padding:4px 0 8px;}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-inner">
    <div class="logo">現場ナビ<span>.</span></div>
    <div class="header-date" id="headerDate">--/-- --:--</div>
    <button class="header-btn" onclick="location.href='settings.html'" title="設定">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="1.5" fill="none"></circle>
        <path d="M11 2v2M11 18v2M2 11h2M18 11h2M4.2 4.2l1.4 1.4M16.4 16.4l1.4 1.4M4.2 17.8l1.4-1.4M16.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
      </svg>
    </button>
  </div>
</div>

<!-- スクロールエリア -->
<div class="scroll-area">

  <!-- 今日の日付カード -->
  <div class="today-card">
    <div class="today-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="4" width="18" height="17" rx="3" stroke="#c8a96e" stroke-width="1.5" fill="none"></rect>
        <line x1="3" y1="9" x2="21" y2="9" stroke="#c8a96e" stroke-width="1.5"></line>
        <line x1="8" y1="2" x2="8" y2="6" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round"></line>
        <line x1="16" y1="2" x2="16" y2="6" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round"></line>
      </svg>
    </div>
    <div class="today-body">
      <div class="today-label">TODAY</div>
      <div class="today-val" id="todayDate">読み込み中...</div>
    </div>
  </div>

  <!-- 現場ツール -->
  <div class="sec-title">現場ツール</div>
  <div class="main-grid">

    <!-- 1. ダッシュボード -->
    <a class="main-card" href="dashboard.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="6" width="36" height="36" rx="3"/>
        <path d="M6 30 L18 22 L26 28 L42 14" stroke-width="1.8"/>
        <circle cx="18" cy="22" r="2" fill="currentColor" stroke="none"/>
        <circle cx="26" cy="28" r="2" fill="currentColor" stroke="none"/>
        <circle cx="42" cy="14" r="2" fill="currentColor" stroke="none"/>
      </svg>
      <div class="card-body">
        <div class="card-title">ダッシュボード</div>
        <div class="card-desc">経営サマリー・進行中案件</div>
      </div>
    </a>

    <!-- 2. 図面スケッチ -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/zumen_sketch_v4.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="6" width="36" height="36" rx="3"/>
        <path d="M12 36 L20 23 L27 29 L34 18 L38 24"/>
        <circle cx="34" cy="16" r="2" fill="currentColor" stroke="none"/>
      </svg>
      <div class="card-body">
        <div class="card-title">図面スケッチ</div>
        <div class="card-desc">実測・図面・拾い出し</div>
      </div>
    </a>

    <!-- 3. 工程表 -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/gantt.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="8" width="38" height="32" rx="3"/>
        <line x1="5" y1="18" x2="43" y2="18" stroke-width="1" opacity="0.4"/>
        <line x1="5" y1="28" x2="43" y2="28" stroke-width="1" opacity="0.4"/>
        <rect x="12" y="12" width="16" height="4" rx="0.8" fill="currentColor" stroke="none"/>
        <rect x="17" y="22" width="13" height="4" rx="0.8" fill="currentColor" opacity="0.7" stroke="none"/>
        <rect x="22" y="32" width="15" height="4" rx="0.8" fill="currentColor" opacity="0.5" stroke="none"/>
      </svg>
      <div class="card-body">
        <div class="card-title">工程表</div>
        <div class="card-desc">バーチャート作成</div>
      </div>
    </a>

    <!-- 4. 図面アプリ -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/zumen_app.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="4" width="40" height="40" rx="3"/>
        <line x1="16" y1="4" x2="16" y2="44"/>
        <line x1="4" y1="18" x2="44" y2="18"/>
        <rect x="24" y="24" width="14" height="14" fill="rgba(30,45,64,0.08)" stroke="currentColor"/>
      </svg>
      <div class="card-body">
        <div class="card-title">図面アプリ</div>
        <div class="card-desc">平面図・展開図・天井図</div>
      </div>
    </a>

    <!-- 5. 材料割付 -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/%E6%9D%90%E6%96%99%E5%89%B2%E4%BB%98_app_.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <rect x="6" y="6" width="16" height="16" rx="1.5"/>
        <rect x="26" y="6" width="16" height="16" rx="1.5"/>
        <rect x="6" y="26" width="16" height="16" rx="1.5"/>
        <rect x="26" y="26" width="16" height="16" rx="1.5" fill="rgba(30,45,64,0.15)" stroke="currentColor"/>
      </svg>
      <div class="card-body">
        <div class="card-title">材料割付</div>
        <div class="card-desc">タイル・床材・数量拾い</div>
      </div>
    </a>

    <!-- 6. Claude -->
    <a class="main-card" href="https://claude.ai/project/019ce0c4-f60b-74b7-88ad-873a22c28553" target="_blank">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 12 Q8 8 12 8 L36 8 Q40 8 40 12 L40 28 Q40 32 36 32 L20 32 L12 38 L12 32 Q8 32 8 28 Z"/>
        <path d="M24 14 L25.5 18 L29.5 19.5 L25.5 21 L24 25 L22.5 21 L18.5 19.5 L22.5 18 Z" fill="currentColor" stroke="none"/>
      </svg>
      <div class="card-body">
        <div class="card-title">Claude</div>
        <div class="card-desc">AI見積・書類生成</div>
      </div>
    </a>

    <!-- 7. 案件 -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/案件台帳_アートレイズ.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="8" y="6" width="32" height="36" rx="3"/>
        <line x1="14" y1="16" x2="34" y2="16"/>
        <line x1="14" y1="23" x2="34" y2="23"/>
        <line x1="14" y1="30" x2="26" y2="30"/>
      </svg>
      <div class="card-body">
        <div class="card-title">案件</div>
        <div class="card-desc">案件台帳・Drive連携</div>
      </div>
    </a>

    <!-- 8. 工程カレンダー -->
    <a class="main-card" href="https://calendar.google.com/calendar/r?src=hf02c6e51i9chil96o9hmsccmk@group.calendar.google.com" target="_blank">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="8" width="36" height="34" rx="3"/>
        <line x1="6" y1="18" x2="42" y2="18"/>
        <line x1="15" y1="4" x2="15" y2="12"/>
        <line x1="33" y1="4" x2="33" y2="12"/>
        <rect x="13" y="24" width="6" height="6" rx="1" fill="currentColor" opacity="0.5" stroke="none"/>
        <rect x="23" y="24" width="6" height="6" rx="1" fill="currentColor" opacity="0.3" stroke="none"/>
      </svg>
      <div class="card-body">
        <div class="card-title">工程カレンダー</div>
        <div class="card-desc">Googleカレンダー</div>
      </div>
    </a>

  </div>

  <!-- 書類 -->
  <div class="sec-title">書類</div>
  <div class="main-grid">

    <!-- 取引先台帳 -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/取引先台帳_アートレイズ.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="16" r="6"/>
        <circle cx="33" cy="16" r="6"/>
        <path d="M6 40 Q6 28 18 28 Q30 28 30 40"/>
        <path d="M30 33 Q33 28 38 28 Q44 28 44 40" opacity="0.7"/>
      </svg>
      <div class="card-body">
        <div class="card-title">取引先台帳</div>
        <div class="card-desc">顧客・業者・取引先</div>
      </div>
    </a>

    <!-- 単価マスター -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/単価マスター_アートレイズ.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="8" width="36" height="32" rx="3"/>
        <line x1="6" y1="18" x2="42" y2="18" stroke-width="1.2" opacity="0.5"/>
        <line x1="18" y1="8" x2="18" y2="40" stroke-width="1.2" opacity="0.5"/>
        <line x1="30" y1="8" x2="30" y2="40" stroke-width="1.2" opacity="0.5"/>
      </svg>
      <div class="card-body">
        <div class="card-title">単価マスター</div>
        <div class="card-desc">工種別単価一覧</div>
      </div>
    </a>

    <!-- 名刺帳 -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/名刺帳_アートレイズ.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="11" width="40" height="26" rx="3"/>
        <line x1="10" y1="20" x2="22" y2="20"/>
        <line x1="10" y1="26" x2="18" y2="26" opacity="0.6"/>
        <circle cx="34" cy="24" r="4" opacity="0.7"/>
      </svg>
      <div class="card-body">
        <div class="card-title">名刺帳</div>
        <div class="card-desc">CSV読み込み・全件検索</div>
      </div>
    </a>

  </div>

  <div class="footer-info">株式会社アート・レイズ　現場ナビ v2.0</div>

</div>

<script>
function updateDate(){
  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  const d = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
  document.getElementById('todayDate').textContent = d;
  document.getElementById('headerDate').textContent =
    `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}
updateDate();
setInterval(updateDate, 60000);
</script>
</body></html>
