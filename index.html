<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>現場ナビ｜アート・レイズ</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場ナビ">
<meta name="theme-color" content="#1e2d40">
<link rel="stylesheet" href="common.css">
<style>
/* ★ Phase 0 仕上げ（2026/4/23）：common.cssとの重複CSSを削除
   - :root変数 → common.cssで一元管理
   - *{リセット} → common.cssで定義済み（完全削除）
   - body基本 → common.cssで定義済み（ページ固有のflex設定のみ残す）
   - .scroll-area → common.cssで定義済み（ページ固有のpaddingのみ追記） */

/* body：flex縦並びレイアウトだけページ固有（それ以外はcommon.cssで定義済み） */
body{display:flex;flex-direction:column;}

/* ヘッダー */
.header{background:var(--navy);padding:env(safe-area-inset-top,0) 0 0;flex-shrink:0;}
.header-inner{height:56px;display:flex;align-items:center;padding:0 16px;}
.logo{font-size:18px;font-weight:900;color:var(--white);letter-spacing:0.04em;flex:1;}
.logo span{color:var(--accent);}
.header-date{font-size:11px;color:rgba(255,255,255,0.55);text-align:right;line-height:1.5;}
.header-btn{width:40px;height:40px;border:none;background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;margin-left:4px;}
.header-btn:active{background:rgba(255,255,255,0.12);}

/* スクロールエリア（flex:1とoverflow-y:autoはcommon.cssで定義済み・paddingのみ追記） */
.scroll-area{padding:20px 16px max(24px,env(safe-area-inset-bottom));}

/* 今日の日付カード */
.today-card{background:var(--navy2);border-radius:16px;padding:16px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.today-icon{width:44px;height:44px;border-radius:12px;background:rgba(200,169,110,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.today-body{flex:1;}
.today-label{font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:2px;}
.today-val{font-size:14px;font-weight:700;color:var(--white);line-height:1.4;}

/* ── KPI ダッシュボード ── */
.kpi-section{margin-bottom:20px;}
.sec-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.08em;margin-bottom:10px;padding-left:2px;}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.kpi-card{background:var(--white);border-radius:14px;padding:14px 14px 12px;box-shadow:0 2px 8px rgba(30,45,64,0.07);}
.kpi-label{font-size:10px;color:var(--text2);margin-bottom:4px;letter-spacing:0.04em;}
.kpi-val{font-size:20px;font-weight:900;color:var(--navy);letter-spacing:-0.02em;line-height:1.1;}
.kpi-val small{font-size:11px;font-weight:400;color:var(--text2);margin-left:2px;}
.kpi-sub{font-size:10px;color:var(--text2);margin-top:3px;}
.kpi-accent{color:var(--accent);}
.kpi-green{color:var(--green);}
.kpi-blue{color:var(--blue);}

/* 入金率バー */
.kpi-bar-wrap{background:var(--white);border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(30,45,64,0.07);margin-bottom:10px;}
.kpi-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.kpi-bar-label{font-size:10px;color:var(--text2);}
.kpi-bar-pct{font-size:13px;font-weight:700;color:var(--navy);}
.kpi-bar-bg{height:8px;background:rgba(30,45,64,0.1);border-radius:99px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#e8c07e);transition:width 0.8s ease;}

/* 案件ステータスリスト */
.anken-list{background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(30,45,64,0.07);margin-bottom:10px;}
.anken-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(30,45,64,0.06);}
.anken-row:last-child{border-bottom:none;}
.anken-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.anken-body{flex:1;min-width:0;}
.anken-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.anken-status{font-size:10px;color:var(--text2);margin-top:1px;}
.anken-amount{font-size:12px;font-weight:700;color:var(--navy);white-space:nowrap;}
.kpi-loading{text-align:center;padding:20px;color:var(--text2);font-size:12px;}
.kpi-error{text-align:center;padding:12px;color:#c0392b;font-size:11px;}

/* ステータス色 */
.dot-施工中{background:#f39c12;}
.dot-見積提出済み{background:var(--blue);}
.dot-見積作成中{background:#9b59b6;}
.dot-請求済み{background:var(--green);}
.dot-入金済み{background:#27ae60;}
.dot-完了{background:#95a5a6;}

/* ★ 今の動き：トピック3分割グリッド（2026/4/23 ダッシュボード統合）
   進行中案件ドットと色を統一：紫=見積対応中 / 橙=施工中 / 緑=入金待ち */
.topic-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;
}
.topic-cell{
  background:var(--white);border-radius:14px;padding:12px 12px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(30,45,64,0.07);
}
.topic-dot{
  width:12px;height:12px;border-radius:50%;flex-shrink:0;
}
.topic-body{flex:1;min-width:0;}
.topic-label{
  font-size:10px;color:var(--text2);letter-spacing:0.04em;margin-bottom:2px;
  white-space:nowrap;
}
.topic-count{
  font-size:22px;font-weight:900;color:var(--navy);line-height:1;letter-spacing:-0.02em;
}
.topic-count small{
  font-size:11px;font-weight:400;color:var(--text2);margin-left:2px;
}

/* ダッシュボード内のサブタイトル（進行中案件）*/
.sub-title{
  font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.08em;
  margin:14px 0 8px 2px;
}
.sub-title span{font-weight:400;margin-left:4px;}

/* セクションタイトル */
/* ★ 現場ツール：ミニマル白カード（2026/4/23 Phase 1導入）
   - 3列自動切替（Fold5横向き=3列 / 縦向き=2列）
   - アスペクト比 4:3
   - アイコン48px（紺の線）
   - カード全体がピクト領域 */
.main-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;margin-bottom:24px;
}
.main-card{
  background:var(--white);
  border-radius:20px;
  padding:18px 16px;
  aspect-ratio:4/3;
  display:flex;flex-direction:column;justify-content:space-between;
  cursor:pointer;
  box-shadow:0 2px 10px rgba(30,45,64,0.06);
  border:1px solid rgba(30,45,64,0.06);
  transition:transform 0.15s,border-color 0.15s;
  text-decoration:none;
  color:var(--text);
}
.main-card:active{
  transform:scale(0.97);
  border-color:var(--accent);
  background:#faf8f4;
}
.card-icon{
  width:48px;height:48px;
  color:var(--navy);
  flex-shrink:0;
}
.card-body{width:100%;}
.card-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:2px;line-height:1.3;}
.card-desc{font-size:11px;color:var(--text2);line-height:1.4;}

/* 外部連携リスト */
.link-list{background:var(--white);border-radius:16px;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 4px rgba(30,45,64,0.07);}
.link-row{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-family:'Meiryo','Yu Gothic',sans-serif;border-bottom:1px solid rgba(30,45,64,0.06);text-decoration:none;color:var(--text);}
.link-row:last-child{border-bottom:none;}
.link-row:active{background:rgba(30,45,64,0.03);}
/* ★ ミニマル化：ラインアイコン（塗り枠なし）・2026/4/23 */
.link-icon{width:32px;height:32px;color:var(--navy);flex-shrink:0;}
.link-body{flex:1;}
.link-title{font-size:14px;font-weight:700;color:var(--text);}
.link-desc{font-size:11px;color:var(--text2);margin-top:1px;}
.link-arrow{color:var(--text2);font-size:16px;opacity:0.5;}

/* 書類BOX */
.doc-box-card{background:var(--white);border-radius:20px;box-shadow:0 2px 10px rgba(30,45,64,0.06);border:1px solid rgba(30,45,64,0.06);overflow:hidden;margin-bottom:12px;transition:border-color 0.15s;}
.doc-box-card.open{border-color:var(--accent);}
.doc-box-trigger{display:flex;flex-direction:column;align-items:flex-start;gap:10px;padding:18px 14px 16px;cursor:pointer;background:transparent;border:none;width:100%;text-align:left;font-family:'Meiryo','Yu Gothic',sans-serif;}
.doc-box-trigger:active{background:#faf8f4;}
.doc-box-header{display:flex;align-items:center;gap:14px;width:100%;}
/* ★ ミニマル化：ラインアイコン（塗り枠なし） */
.doc-box-icon{width:48px;height:48px;color:var(--navy);flex-shrink:0;}
.doc-box-chevron{margin-left:auto;font-size:14px;color:var(--text2);opacity:0.5;transition:transform 0.2s;display:inline-block;}
.doc-box-card.open .doc-box-chevron{transform:rotate(90deg);}
.doc-box-body{max-height:0;overflow:hidden;transition:max-height 0.3s ease;}
.doc-box-card.open .doc-box-body{max-height:800px;}
.doc-sec-label{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:0.08em;padding:10px 16px 4px;border-top:1px solid rgba(30,45,64,0.06);}
.doc-sec-label:first-child{border-top:none;padding-top:8px;}

.footer-info{text-align:center;font-size:10px;color:var(--text2);opacity:0.6;padding:4px 0 8px;}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-inner">
    <div class="logo">現場ナビ<span>.</span></div>
    <div class="header-date" id="headerDate">--/-- --:--</div>
    <button class="header-btn" onclick="location.href='settings.html'" title="設定">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="1.5" fill="none"></circle>
        <path d="M11 2v2M11 18v2M2 11h2M18 11h2M4.2 4.2l1.4 1.4M16.4 16.4l1.4 1.4M4.2 17.8l1.4-1.4M16.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
      </svg>
    </button>
  </div>
</div>

<!-- スクロールエリア -->
<div class="scroll-area">

  <!-- 今日の日付カード -->
  <div class="today-card">
    <div class="today-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="4" width="18" height="17" rx="3" stroke="#c8a96e" stroke-width="1.5" fill="none"></rect>
        <line x1="3" y1="9" x2="21" y2="9" stroke="#c8a96e" stroke-width="1.5"></line>
        <line x1="8" y1="2" x2="8" y2="6" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round"></line>
        <line x1="16" y1="2" x2="16" y2="6" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round"></line>
      </svg>
    </div>
    <div class="today-body">
      <div class="today-label">TODAY</div>
      <div class="today-val" id="todayDate">読み込み中...</div>
    </div>
  </div>

  <!-- ダッシュボード（経営サマリー＋今の動き＋進行中案件） -->
  <div class="kpi-section">
    <div class="sec-title">ダッシュボード</div>

    <div id="kpiArea">
      <div class="kpi-loading">📊 データ読み込み中...</div>
    </div>
  </div>

  <!-- 現場ツール -->
  <div class="sec-title">現場ツール</div>
  <div class="main-grid">

    <!-- 1. 図面スケッチ -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/zumen_sketch_v4.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="6" width="36" height="36" rx="3"/>
        <path d="M12 36 L20 23 L27 29 L34 18 L38 24"/>
        <circle cx="34" cy="16" r="2" fill="currentColor" stroke="none"/>
      </svg>
      <div class="card-body">
        <div class="card-title">図面スケッチ</div>
        <div class="card-desc">実測・図面・拾い出し</div>
      </div>
    </a>

    <!-- 2. 工程表 -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/gantt.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="8" width="38" height="32" rx="3"/>
        <line x1="5" y1="18" x2="43" y2="18" stroke-width="1" opacity="0.4"/>
        <line x1="5" y1="28" x2="43" y2="28" stroke-width="1" opacity="0.4"/>
        <rect x="12" y="12" width="16" height="4" rx="0.8" fill="currentColor" stroke="none"/>

        <rect x="22" y="32" width="15" height="4" rx="0.8" fill="currentColor" opacity="0.5" stroke="none"/>
      </svg>
      <div class="card-body">
        <div class="card-title">工程表</div>
        <div class="card-desc">バーチャート作成</div>
      </div>
    </a>

    <!-- 3. 図面アプリ -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/zumen_app.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">

        <div class="card-title">図面アプリ</div>
        <div class="card-desc">平面図・展開図・天井図</div>
      </div>
    </a>

    <!-- 4. 材料割付 -->
    <a class="main-card" href="https://kameisatoru-svg.github.io/genba-navi/%E6%9D%90%E6%96%99%E5%89%B2%E4%BB%98_app_.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <rect x="6" y="6" width="16" height="16" rx="1.5"/>
        <rect x="26" y="6" width="16" height="16" rx="1.5"/>

      <div class="card-body">
        <div class="card-title">材料割付</div>
        <div class="card-desc">タイル・床材・数量拾い</div>
      </div>
    </a>

    <!-- 5. Claude -->
    <a class="main-card" href="https://claude.ai/project/019ce0c4-f60b-74b7-88ad-873a22c28553" target="_blank">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 12 Q8 8 12 8 L36 8 Q40 8 40 12 L40 28 Q40 32 36 32 L20 32 L12 38 L12 32 Q8 32 8 28 Z"/>

        <div class="card-title">Claude</div>

    <!-- 6. 案件 -->

      <div class="card-body">
        <div class="card-title">案件</div>
        <div class="card-desc">案件台帳・Drive連携</div>
      </div>
    </a>

    <!-- 7. 工程カレンダー -->
    <a class="main-card" href="https://calendar.google.com/calendar/r?src=hf02c6e51i9chil96o9hmsccmk@group.calendar.google.com" target="_blank">

  </div>

  <!-- 書類BOX -->
  <div class="doc-box-card" id="docBoxCard">
    <button class="doc-box-trigger" onclick="toggleDocBox()">
      <div class="doc-box-header">
        <svg class="doc-box-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">

    </button>
    <div class="doc-box-body">
      <div class="doc-sec-label">台帳</div>

        </svg>
        <div class="link-body"><div class="link-title">案件台帳</div><div class="link-desc">見積・請求・原価・契約書 一元管理</div></div>
        <div class="link-arrow">›</div>
      </a>
      <a class="link-row" href="https://kameisatoru-svg.github.io/genba-navi/取引先台帳_アートレイズ.html" target="_blank">
        <svg class="link-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="11" r="4"/>
          <circle cx="22" cy="11" r="4"/>
          <path d="M5 26 Q5 19 12 19 Q19 19 19 26"/>
          <path d="M19 22 Q22 20 25 20 Q29 20 29 26" opacity="0.6"/>
        </svg>
        <div class="link-body"><div class="link-title">取引先台帳</div><div class="link-desc">顧客・業者・取引先一覧</div></div>
        <div class="link-arrow">›</div>
      </a>
      <div class="doc-sec-label">マスター</div>
      <a class="link-row" href="https://kameisatoru-svg.github.io/genba-navi/単価マスター_アートレイズ.html" target="_blank">

          <rect x="3" y="8" width="26" height="17" rx="2"/>
          <line x1="7" y1="14" x2="15" y2="14"/>
          <line x1="7" y1="18" x2="12" y2="18" opacity="0.6"/>
          <circle cx="22" cy="16" r="3" opacity="0.7"/>
        </svg>
        <div class="link-body"><div class="link-title">名刺帳</div><div class="link-desc">CSV読み込み・全件検索</div></div>

      </a>

</div>

<script>
// 日付表示
function updateDate(){
  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  const d = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
  document.getElementById('todayDate').textContent = d;
  document.getElementById('headerDate').textContent =
    `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}
updateDate();
setInterval(updateDate, 60000);

function openLink(url){ window.open(url,'_blank'); }
function toggleDocBox(){
  document.getElementById('docBoxCard').classList.toggle('open');
}

// ── KPI ダッシュボード ──
const ANKEN_CSV_URL = 'https://docs.google.com/spreadsheets/d/1M7CPRijH446h63LlDYIZGzwSSfUZnvqYT0VSRoEy2PU/export?format=csv&sheet=Sheet1';

const STATUS_ORDER = ['施工中','見積作成中','見積提出済み','請求済み','入金済み','完了'];

function parseCSV(text){
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for(const c of line){
      if(c==='"'){ inQ=!inQ; }
      else if(c===','&&!inQ){ vals.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').replace(/"/g,''));
    return obj;
  });
}

function fmt(n){
  if(!n || isNaN(n)) return '-';
  return '¥' + Number(n).toLocaleString();
}

function renderKPI(rows){
  // アクティブ案件（完了・入金済み以外）
  const active = rows.filter(r => r['ステータス'] !== '完了');

  // 集計
  const totalMitsumori = active.reduce((s,r) => s + (parseFloat(r['見積金額'])||0), 0);
  const totalSeikyu    = active.reduce((s,r) => s + (parseFloat(r['請求金額'])||0), 0);
  const totalNyukin    = active.filter(r => r['入金状況']==='入金済み')
                               .reduce((s,r) => s + (parseFloat(r['請求金額'])||0), 0);
  const nyukinRate     = totalSeikyu > 0 ? Math.round(totalNyukin / totalSeikyu * 100) : 0;
  const activeCount    = active.filter(r => !['入金済み','完了'].includes(r['ステータス'])).length;

  // ★ 今の動き：ステータス別件数
  const mitsumoriCount = active.filter(r => ['見積作成中','見積提出済み'].includes(r['ステータス'])).length;
  const sekoCount      = active.filter(r => r['ステータス']==='施工中').length;
  const nyukinMachi    = active.filter(r => r['ステータス']==='請求済み').length;

  // ステータス別に並べ替え
  const sorted = [...active].sort((a,b) =>
    STATUS_ORDER.indexOf(a['ステータス']) - STATUS_ORDER.indexOf(b['ステータス'])
  );

  const dotColor = {
    '施工中':'#f39c12','見積提出済み':'#1a6fc4','見積作成中':'#9b59b6',
    '請求済み':'#1a7a30','入金済み':'#27ae60','完了':'#95a5a6'
  };

  let html = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">受注総額（見積）</div>
        <div class="kpi-val kpi-accent">${fmt(totalMitsumori)}</div>
        <div class="kpi-sub">進行中 ${active.length}件</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">請求済み金額</div>
        <div class="kpi-val kpi-blue">${fmt(totalSeikyu)}</div>
        <div class="kpi-sub">入金済 ${fmt(totalNyukin)}</div>
      </div>
    </div>
    <div class="kpi-bar-wrap">
      <div class="kpi-bar-header">
        <div class="kpi-bar-label">入金率（請求済みに対する入金済み）</div>
        <div class="kpi-bar-pct">${nyukinRate}%</div>
      </div>
      <div class="kpi-bar-bg">
        <div class="kpi-bar-fill" style="width:${nyukinRate}%"></div>
      </div>
    </div>
    <div class="topic-grid">
      <div class="topic-cell">
        <div class="topic-dot" style="background:#9b59b6;"></div>
        <div class="topic-body">
          <div class="topic-label">見積対応中</div>
          <div class="topic-count">${mitsumoriCount}<small>件</small></div>
        </div>
      </div>
      <div class="topic-cell">
        <div class="topic-dot" style="background:#f39c12;"></div>
        <div class="topic-body">
          <div class="topic-label">施工中</div>
          <div class="topic-count">${sekoCount}<small>件</small></div>
        </div>
      </div>
      <div class="topic-cell">
        <div class="topic-dot" style="background:#1a7a30;"></div>
        <div class="topic-body">
          <div class="topic-label">入金待ち</div>
          <div class="topic-count">${nyukinMachi}<small>件</small></div>
        </div>
      </div>
    </div>
    <div class="sub-title">進行中案件 <span>(${activeCount}件)</span></div>
    <div class="anken-list">`;

  sorted.forEach(r => {
    const status = r['ステータス'] || '';
    const dot = dotColor[status] || '#aaa';
    const amt = r['請求金額'] ? fmt(r['請求金額']) : (r['見積金額'] ? fmt(r['見積金額']) : '-');
    const name = r['工事名'] || '-';
    html += `
      <div class="anken-row">
        <div class="anken-dot" style="background:${dot};"></div>
        <div class="anken-body">
          <div class="anken-name">${name}</div>
          <div class="anken-status">${status}　${r['案件番号']||''}</div>
        </div>
        <div class="anken-amount">${amt}</div>
      </div>`;
  });

  html += `</div>`;
  document.getElementById('kpiArea').innerHTML = html;
}

async function loadKPI(){
  try {
    const res = await fetch(ANKEN_CSV_URL + '&t=' + Date.now());
    if(!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const rows = parseCSV(text);
    renderKPI(rows);
  } catch(e) {
    document.getElementById('kpiArea').innerHTML =
      '<div class="kpi-error">データの読み込みに失敗しました。<br>ネットワークを確認してください。</div>';
  }
}

loadKPI();
</script>
