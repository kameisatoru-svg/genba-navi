<title>現場ナビ｜アート・レイズ</title>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{
  --bg:#eeebe5;--navy:#1e2d40;--navy2:#2a3f5a;
  --accent:#c8a96e;--text:#1e2d40;--text2:#5a6a7a;--white:#ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
}

/* ── ヘッダー ── */
.header{
  background:var(--navy);
  padding:env(safe-area-inset-top,0) 0 0;
  flex-shrink:0;
}
.header-inner{
  height:56px;display:flex;align-items:center;
  padding:0 16px;
}
.logo{
  font-size:18px;font-weight:900;color:var(--white);
  letter-spacing:0.04em;flex:1;
}
.logo span{color:var(--accent);}
.header-date{
  font-size:11px;color:rgba(255,255,255,0.55);
  text-align:right;line-height:1.5;
}
.header-btn{
  width:40px;height:40px;border:none;background:transparent;
  color:rgba(255,255,255,0.7);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;flex-shrink:0;margin-left:4px;
}
.header-btn:active{background:rgba(255,255,255,0.12);}

/* ── スクロールエリア ── */
.scroll-area{
  flex:1;overflow-y:auto;
  padding:20px 16px max(24px,env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch;
}

/* ── 今日の日付カード ── */
.today-card{
  background:var(--navy2);border-radius:16px;
  padding:16px 18px;margin-bottom:20px;
  display:flex;align-items:center;gap:14px;
}
.today-icon{
  width:44px;height:44px;border-radius:12px;
  background:rgba(200,169,110,0.2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.today-body{flex:1;}
.today-label{font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:2px;}
.today-val{font-size:14px;font-weight:700;color:var(--white);line-height:1.4;}
.today-val small{font-size:11px;font-weight:400;opacity:0.7;margin-left:6px;}

/* ── セクションタイトル ── */
.sec-title{
  font-size:11px;font-weight:700;color:var(--text2);
  letter-spacing:0.08em;margin-bottom:10px;padding-left:2px;
}

/* ── メイン4機能グリッド ── */
.main-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;margin-bottom:24px;
}
.main-card{
  background:var(--white);border-radius:16px;
  padding:18px 14px 16px;
  display:flex;flex-direction:column;align-items:flex-start;gap:10px;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(30,45,64,0.08);
  border:1.5px solid transparent;
  transition:border-color 0.15s;
  text-decoration:none;
}
.main-card:active{border-color:var(--accent);background:#faf8f4;}
.card-icon{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.card-body{width:100%;}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.card-desc{font-size:11px;color:var(--text2);line-height:1.4;}

/* ── 外部連携リスト ── */
.link-list{
  background:var(--white);border-radius:16px;
  overflow:hidden;margin-bottom:20px;
  box-shadow:0 1px 4px rgba(30,45,64,0.07);
}
.link-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;cursor:pointer;border:none;
  background:transparent;width:100%;text-align:left;
  font-family:'Noto Sans JP',sans-serif;
  border-bottom:1px solid rgba(30,45,64,0.06);
}
.link-row:last-child{border-bottom:none;}
.link-row:active{background:rgba(30,45,64,0.03);}
.link-icon{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.link-body{flex:1;}
.link-title{font-size:13px;font-weight:700;color:var(--text);}
.link-desc{font-size:11px;color:var(--text2);margin-top:1px;}
.link-arrow{color:var(--text2);font-size:16px;opacity:0.5;}

/* ── 書類BOXアコーディオンカード ── */
.doc-box-card{
  background:var(--white);border-radius:16px;
  box-shadow:0 2px 8px rgba(30,45,64,0.08);
  border:1.5px solid transparent;
  overflow:hidden;margin-bottom:12px;
  transition:border-color 0.15s;
}
.doc-box-card.open{border-color:var(--accent);}
.doc-box-trigger{
  display:flex;flex-direction:column;align-items:flex-start;gap:10px;
  padding:18px 14px 16px;cursor:pointer;
  background:transparent;border:none;width:100%;text-align:left;
  font-family:'Noto Sans JP',sans-serif;
}
.doc-box-trigger:active{background:#faf8f4;}
.doc-box-header{display:flex;align-items:center;gap:10px;width:100%;}
.doc-box-chevron{
  margin-left:auto;font-size:14px;color:var(--text2);opacity:0.5;
  transition:transform 0.2s;display:inline-block;
}
.doc-box-card.open .doc-box-chevron{transform:rotate(90deg);}
.doc-box-body{
  max-height:0;overflow:hidden;
  transition:max-height 0.3s ease;
}
.doc-box-card.open .doc-box-body{max-height:800px;}
.doc-sec-label{
  font-size:10px;font-weight:700;color:var(--text2);
  letter-spacing:0.08em;padding:10px 16px 4px;
  border-top:1px solid rgba(30,45,64,0.06);
}
.doc-sec-label:first-child{border-top:none;padding-top:8px;}

/* ── フッター ── */
.footer-info{
  text-align:center;font-size:10px;color:var(--text2);
  opacity:0.6;padding:4px 0 8px;
}

/* ── JSONデータハブ ── */
.json-hub{
  background:var(--navy2);border-radius:16px;
  margin-bottom:20px;overflow:hidden;
  box-shadow:0 2px 8px rgba(30,45,64,0.12);
}
.json-hub-trigger{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;cursor:pointer;border:none;
  background:transparent;width:100%;text-align:left;
  font-family:'Noto Sans JP',sans-serif;
}
.json-hub-trigger:active{background:rgba(255,255,255,0.05);}
.json-hub-icon{
  width:34px;height:34px;border-radius:10px;
  background:rgba(200,169,110,0.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:18px;
}
.json-hub-body-text{flex:1;}
.json-hub-title{font-size:13px;font-weight:700;color:var(--white);}
.json-hub-desc{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px;}
.json-hub-chevron{color:rgba(255,255,255,0.4);font-size:16px;transition:transform 0.2s;}
.json-hub.open .json-hub-chevron{transform:rotate(90deg);}
.json-hub-panel{
  max-height:0;overflow:hidden;transition:max-height 0.3s ease;
}
.json-hub.open .json-hub-panel{max-height:400px;}
.json-hub-inner{padding:0 16px 16px;}
.json-hub textarea{
  width:100%;height:110px;
  background:#111d2a;color:#7ec8e3;
  border:1px solid #3a5a7a;border-radius:8px;
  padding:10px;font-size:12px;font-family:monospace;
  resize:vertical;
}
.json-hub-btns{display:flex;gap:8px;margin-top:8px;}
.jhub-btn{
  padding:8px 18px;border:none;border-radius:8px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
}
.jhub-btn.primary{background:var(--accent);color:var(--white);}
.jhub-btn.danger{background:#dc2626;color:var(--white);}
.jhub-msg{font-size:11px;margin-top:6px;color:#6ee7b7;min-height:16px;}
</style>

<script>
// 日付表示
function updateDate(){
  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  const d = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
  document.getElementById('todayDate').textContent = d;
  document.getElementById('headerDate').textContent =
    `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}
updateDate();
setInterval(updateDate, 60000);

function openLink(url){ window.open(url,'_blank'); }

function toggleDocBox(){
  const card = document.getElementById('docBoxCard');
  card.classList.toggle('open');
}

// ─── JSONデータハブ ───────────────────────────────────
const ANKEN_KEY = 'artrise_anken_v1';

function toggleJsonHub(){
  const hub = document.getElementById('jsonHub');
  hub.classList.toggle('open');
}

function hubSave(){
  const raw = document.getElementById('jsonHubInput').value.trim();
  const msg = document.getElementById('jhubMsg');
  if(!raw){ msg.style.color='#fca5a5'; msg.textContent='⚠ JSONを貼り付けてください'; return; }
  try {
    let incoming = JSON.parse(raw);
    if(!Array.isArray(incoming)) incoming = [incoming];
    // 既存データとマージ（案件番号で上書き）
    let existing = [];
    try { existing = JSON.parse(localStorage.getItem(ANKEN_KEY) || '[]'); } catch(e){}
    const map = {};
    existing.forEach(p => { map[p.案件番号] = p; });
    incoming.forEach(p => { map[p.案件番号] = p; });
    const merged = Object.values(map).sort((a,b) => a.案件番号.localeCompare(b.案件番号));
    localStorage.setItem(ANKEN_KEY, JSON.stringify(merged));
    document.getElementById('jsonHubInput').value = '';
    msg.style.color='#6ee7b7';
    msg.textContent = `✅ ${incoming.length}件を保存（合計${merged.length}件）`;
  } catch(e) {
    msg.style.color='#fca5a5';
    msg.textContent = '❌ JSON形式エラー: ' + e.message;
  }
}

function hubClear(){
  if(!confirm('全案件データを削除します。よろしいですか？')) return;
  localStorage.removeItem(ANKEN_KEY);
  document.getElementById('jhubMsg').textContent = '🗑 削除しました';
}
</script>


<div id="claude-agent-glow-border" style="position: fixed; inset: 0px; pointer-events: none; z-index: 2147483646; opacity: 1; transition: opacity 0.3s ease-in-out; animation: 2s ease-in-out 0s infinite normal none running claude-pulse; box-shadow: rgba(217, 119, 87, 0.5) 0px 0px 10px inset, rgba(217, 119, 87, 0.3) 0px 0px 20px inset, rgba(217, 119, 87, 0.1) 0px 0px 30px inset;"></div><script>
function copyLatestAnken(){
  const msg = document.getElementById('copyMsg');
  try {
    const data = JSON.parse(localStorage.getItem('artrise_anken_v1') || '[]');
    if(data.length === 0){ msg.style.color='#fca5a5'; msg.textContent='⚠ データがありません'; return; }
    const latest = [data[data.length - 1]];
    navigator.clipboard.writeText(JSON.stringify(latest, null, 2)).then(() => {
      msg.style.color='#6ee7b7';
      msg.textContent='✅ 最新1件をコピーしました！';
      setTimeout(()=>{ msg.textContent=''; }, 3000);
    }).catch(()=>{ msg.style.color='#fca5a5'; msg.textContent='❌ コピー失敗'; });
  } catch(e){ msg.style.color='#fca5a5'; msg.textContent='❌ エラー: '+e.message; }
}
function copyAllAnken(){
  const msg = document.getElementById('copyMsg');
  try {
    const raw = localStorage.getItem('artrise_anken_v1') || '[]';
    const parsed = JSON.parse(raw);
    if(parsed.length === 0){ msg.style.color='#fca5a5'; msg.textContent='⚠ データがありません'; return; }
    navigator.clipboard.writeText(JSON.stringify(parsed, null, 2)).then(() => {
      msg.style.color='#6ee7b7';
      msg.textContent='✅ 全'+parsed.length+'件をコピーしました！';
      setTimeout(()=>{ msg.textContent=''; }, 3000);
    }).catch(()=>{ msg.style.color='#fca5a5'; msg.textContent='❌ コピー失敗'; });
  } catch(e){ msg.style.color='#fca5a5'; msg.textContent='❌ エラー: '+e.message; }
}
</script></body></html>
