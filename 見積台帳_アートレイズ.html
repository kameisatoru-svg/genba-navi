<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積台帳｜株式会社アート・レイズ</title>
<style>
:root {
  --band: #555; --light: #f8f8f8; --border: #ddd; --border-dark: #aaa;
  --text: #333; --text-sub: #666; --white: #fff; --accent: #2563eb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Meiryo,'Yu Gothic',sans-serif; background: #eee; color: var(--text); font-size: 14px; padding-bottom: 70px; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

.page-header {
  background: var(--band); color: var(--white);
  padding: 18px 24px; border-radius: 6px 6px 0 0;
  display: flex; justify-content: space-between; align-items: center;
}
.page-header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; }
.page-header .meta { font-size: 12px; opacity: 0.8; text-align: right; }

.stats-bar {
  background: var(--white); border: 1px solid var(--border); border-top: none;
  padding: 14px 24px; display: flex; gap: 32px; flex-wrap: wrap;
}
.stat-item { text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; color: var(--band); }
.stat-label { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

.search-bar {
  background: var(--white); border: 1px solid var(--border); border-top: none;
  padding: 12px 24px; border-radius: 0 0 6px 6px; margin-bottom: 20px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.search-bar input {
  flex: 1; padding: 8px 12px; border: 1px solid var(--border-dark);
  border-radius: 4px; font-size: 14px; font-family: inherit;
}
.search-bar input:focus { outline: none; border-color: var(--accent); }
.filter-btn {
  padding: 5px 12px; border: 1px solid var(--border-dark); border-radius: 20px;
  background: var(--white); font-size: 12px; cursor: pointer; font-family: inherit;
}
.filter-btn.active { background: var(--band); color: var(--white); border-color: var(--band); }

.estimate-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 6px; margin-bottom: 14px; overflow: hidden;
}
.card-header {
  background: #444; color: var(--white);
  padding: 10px 16px; display: flex; justify-content: space-between;
  align-items: center; gap: 12px; flex-wrap: wrap;
}
.card-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.estimate-id {
  font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.2);
  padding: 2px 8px; border-radius: 4px; letter-spacing: 0.05em; white-space: nowrap;
}
.estimate-name { font-size: 14px; font-weight: 700; }
.badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; white-space: nowrap; }
.badge-juchu     { background: #16a34a; color: #fff; }
.badge-mitsumori { background: #2563eb; color: #fff; }
.badge-yotei     { background: #d97706; color: #fff; }
.badge-kanryo    { background: #6b7280; color: #fff; }

.card-body { padding: 16px; }
.info-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px 20px; margin-bottom: 14px;
}
.info-item { display: flex; flex-direction: column; gap: 2px; }
.info-label { font-size: 11px; color: var(--text-sub); font-weight: 700; }
.info-value { font-size: 13px; color: var(--text); }
.amount-value { font-size: 15px; font-weight: 700; color: #1e40af; }

.meisai-toggle {
  background: none; border: 1px solid var(--border-dark); border-radius: 4px;
  padding: 5px 12px; font-size: 12px; font-family: inherit;
  cursor: pointer; color: var(--text-sub); margin-bottom: 10px;
}
.meisai-toggle:hover { background: var(--light); }
.meisai-wrap { display: none; }
.meisai-wrap.open { display: block; }
.meisai-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
  margin-bottom: 8px; border: 1px solid var(--border);
}
.meisai-table th {
  background: #444; color: var(--white); padding: 6px 10px;
  text-align: left; font-weight: 700;
}
.meisai-table th.right, .meisai-table td.right { text-align: right; }
.meisai-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
.meisai-table tr:nth-child(even) td { background: #f5f5f5; }
.meisai-table tr:last-child td { border-bottom: none; }
.totals-table {
  width: 320px; margin-left: auto; border-collapse: collapse;
  font-size: 13px; border: 1px solid var(--border);
}
.totals-table td { padding: 6px 14px; border-bottom: 1px solid var(--border); }
.totals-table td:last-child { text-align: right; }
.totals-table tr:last-child td {
  background: #444; color: var(--white);
  font-weight: 700; font-size: 14px; border-bottom: none;
}

.note-box {
  background: #fafafa; border-left: 3px solid #d1d5db;
  padding: 10px 14px; font-size: 12px; color: var(--text-sub);
  border-radius: 0 4px 4px 0; margin-top: 12px; line-height: 1.7;
}
.note-label { font-weight: 700; color: var(--text); margin-bottom: 4px; font-size: 11px; }

.doc-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 4px; font-size: 12px;
  text-decoration: none; margin: 4px 4px 0 0;
}
.doc-tag.available { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
.doc-tag.unavailable { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; }

.add-row {
  background: var(--white); border: 2px dashed var(--border-dark);
  border-radius: 6px; padding: 16px; text-align: center;
  color: var(--text-sub); font-size: 13px; margin-bottom: 20px;
}
.page-footer {
  text-align: center; font-size: 11px; color: var(--text-sub);
  padding: 12px 0; border-top: 1px solid var(--border); margin-top: 8px;
}

/* ★ 共通ナビバー */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: #333; display: flex; border-top: 2px solid #c8a96e;
}
.bottom-nav a {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 8px 4px; color: #ccc;
  text-decoration: none; font-size: 11px; gap: 2px; transition: background 0.15s;
}
.bottom-nav a:hover { background: #444; }
.bottom-nav a.active { color: #c8a96e; border-top: 2px solid #c8a96e; margin-top: -2px; }
.bottom-nav a .nav-icon { font-size: 18px; }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>📝 見積台帳</h1>
    <div class="meta">株式会社アート・レイズ<br><span id="lastUpdated">-</span></div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num" id="totalCount">-</div><div class="stat-label">総見積件数</div></div>
    <div class="stat-item"><div class="stat-num" id="countJuchu">-</div><div class="stat-label">受注済</div></div>
    <div class="stat-item"><div class="stat-num" id="countMitsumori">-</div><div class="stat-label">提出済</div></div>
    <div class="stat-item"><div class="stat-num" id="countYotei">-</div><div class="stat-label">提出予定</div></div>
    <div class="stat-item"><div class="stat-num" id="totalAmount">-</div><div class="stat-label">見積総額（税込）</div></div>
    <div class="stat-item" style="margin-left:auto;text-align:right;">
      <div style="font-size:12px;font-weight:600;" id="sourceBadge">読込中...</div>
      <div class="stat-label">データソース</div>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 案件番号・顧客名・工事内容で絞り込み..." oninput="renderCards()">
    <div id="statusFilter"></div>
  </div>

  <div id="cardsArea"></div>
  <div class="add-row" id="addRow">＋ Claudeに依頼してJSONで見積を追加</div>

  <div class="page-footer">
    株式会社アート・レイズ｜大分県別府市上原町13番25号｜TEL 0977-21-0603
  </div>
</div>

<!-- ★ 共通ナビバー -->
<nav class="bottom-nav">
  <a href="案件台帳_アートレイズ.html"><span class="nav-icon">📋</span>案件台帳</a>
  <a href="見積台帳_アートレイズ.html" class="active"><span class="nav-icon">📄</span>見積台帳</a>
  <a href="請求台帳_アートレイズ.html"><span class="nav-icon">🧾</span>請求台帳</a>
  <a href="原価管理台帳_アートレイズ.html"><span class="nav-icon">📊</span>工事台帳</a>
</nav>

<script>
const BASE_URL = 'https://kameisatoru-svg.github.io/genba-navi/';
const DATA_JSON_URL = BASE_URL + 'data.json';
const STORAGE_KEY = 'artrise_mitsumori_v1';

const BADGE_MAP = {
  '受注済':      'badge-juchu',
  '見積提出済み': 'badge-mitsumori',
  '見積提出予定': 'badge-yotei',
  '完了':        'badge-kanryo',
};

// ─── データ読み込み ──────────────────────────────────
async function loadDataAsync() {
  try {
    const res = await fetch(DATA_JSON_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const data = json.見積 || [];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    setSourceBadge('fetch', json.最終更新 || '');
    return data;
  } catch(e) {
    setSourceBadge('local', '');
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch(e2) { return []; }
  }
}
function loadDataSync() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}
function setSourceBadge(type, updatedAt) {
  const el = document.getElementById('sourceBadge');
  if (!el) return;
  el.innerHTML = type === 'fetch'
    ? `<span style="color:#1a7a30;">● GitHub同期</span>${updatedAt ? ' <span style="color:#888;font-size:11px;">('+updatedAt+')</span>' : ''}`
    : `<span style="color:#d97706;">● オフライン（ローカル）</span>`;
}

// ─── カード生成 ──────────────────────────────────────
function buildDocTag(url, label, icon) {
  if (url) {
    return `<a class="doc-tag available" href="${url}" download><span>${icon}</span>${label}</a>`;
  }
  return `<span class="doc-tag unavailable"><span>${icon}</span>${label}</span>`;
}

function buildMeisaiTable(item) {
  if (!item.明細 || item.明細.length === 0) return '';
  const rows = item.明細.map(m =>
    `<tr><td>${m.工事内容}</td><td class="right">${m.数量}</td><td>${m.単位}</td>
     <td class="right">¥${Number(m.単価).toLocaleString()}</td>
     <td class="right">¥${Number(m.金額).toLocaleString()}</td></tr>`
  ).join('');
  const keihiRow = item.諸経費率 > 0
    ? `<tr><td>諸経費（${item.諸経費率}%）</td><td colspan="3"></td><td class="right">¥${(item.税抜合計 - item.小計).toLocaleString()}</td></tr>` : '';
  return `
    <table class="meisai-table">
      <thead><tr><th>工事内容</th><th class="right">数量</th><th>単位</th><th class="right">単価</th><th class="right">金額</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <table class="totals-table">
      <tr><td>小計</td><td>¥${Number(item.小計).toLocaleString()}</td></tr>
      ${keihiRow}
      <tr><td>税抜合計</td><td>¥${Number(item.税抜合計).toLocaleString()}</td></tr>
      <tr><td>消費税（10%）</td><td>¥${Number(item.消費税).toLocaleString()}</td></tr>
      <tr><td>税込合計（見積金額）</td><td>¥${Number(item.税込合計).toLocaleString()}</td></tr>
    </table>`;
}

function buildCard(item, idx) {
  const badgeClass = BADGE_MAP[item.ステータス] || 'badge-kanryo';
  const mid = item.見積番号 || item.案件番号 || '';
  return `
  <div class="estimate-card" data-search="${[mid, item.工事名, item.顧客, item.施工場所, item.備考].filter(Boolean).join(' ').toLowerCase()}" data-status="${item.ステータス || ''}">
    <div class="card-header">
      <div class="card-header-left">
        <span class="estimate-id">${mid}</span>
        <span class="estimate-name">${item.工事名}</span>
      </div>
      <span class="badge ${badgeClass}">${item.ステータス || '未設定'}</span>
    </div>
    <div class="card-body">
      <div class="info-grid">
        <div class="info-item"><span class="info-label">顧客</span><span class="info-value">${item.顧客 || '-'}</span></div>
        <div class="info-item"><span class="info-label">施工場所</span><span class="info-value">${item.施工場所 || '-'}</span></div>
        <div class="info-item"><span class="info-label">見積日</span><span class="info-value">${item.見積日 || '-'}</span></div>
        <div class="info-item"><span class="info-label">見積金額（税込）</span><span class="info-value amount-value">¥${Number(item.税込合計 || item.見積金額 || 0).toLocaleString()}</span></div>
        ${item.諸経費率 > 0 ? `<div class="info-item"><span class="info-label">諸経費</span><span class="info-value">${item.諸経費率}%</span></div>` : ''}
      </div>
      ${item.明細 && item.明細.length > 0 ? `
        <button class="meisai-toggle" onclick="toggleMeisai('meisai-${idx}', this)">▶ 明細を表示</button>
        <div class="meisai-wrap" id="meisai-${idx}">${buildMeisaiTable(item)}</div>
      ` : ''}
      ${item.備考 ? `<div class="note-box"><div class="note-label">📝 備考</div>${item.備考}</div>` : ''}
      <div style="margin-top:10px;">${buildDocTag(item.書類, '見積書PDF', '📄')}</div>
    </div>
  </div>`;
}

// ─── 統計・フィルター ────────────────────────────────
let activeStatus = 'all';

function updateStats(data) {
  document.getElementById('totalCount').textContent = data.length;
  document.getElementById('countJuchu').textContent = data.filter(p => p.ステータス === '受注済').length;
  document.getElementById('countMitsumori').textContent = data.filter(p => p.ステータス === '見積提出済み').length;
  document.getElementById('countYotei').textContent = data.filter(p => p.ステータス === '見積提出予定').length;
  const total = data.reduce((s, p) => s + (Number(p.税込合計) || Number(p.見積金額) || 0), 0);
  document.getElementById('totalAmount').textContent = total ? '¥' + total.toLocaleString() : '-';
  const now = new Date();
  document.getElementById('lastUpdated').textContent = `最終更新：${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

function buildStatusFilter(data) {
  const statuses = ['all', ...new Set(data.map(p => p.ステータス).filter(Boolean))];
  document.getElementById('statusFilter').innerHTML = statuses.map(s =>
    `<button class="filter-btn ${s === activeStatus ? 'active' : ''}" onclick="setFilter('${s}')">${s === 'all' ? 'すべて' : s}</button>`
  ).join('');
}

function setFilter(s) { activeStatus = s; renderCards(); }

// ─── レンダリング ────────────────────────────────────
function renderCards(data) {
  if (data === undefined) data = loadDataSync();
  const q = document.getElementById('searchInput').value.toLowerCase();
  updateStats(data);
  buildStatusFilter(data);
  const filtered = data.filter(p => {
    const sm = !q || (p.見積番号||''+p.工事名||''+p.顧客||''+p.施工場所||''+p.備考||'').toLowerCase().includes(q);
    const fm = activeStatus === 'all' || p.ステータス === activeStatus;
    return sm && fm;
  });
  const area = document.getElementById('cardsArea');
  area.innerHTML = filtered.length === 0
    ? '<div class="add-row" style="margin-bottom:14px;">該当する見積がありません</div>'
    : filtered.map((p, i) => buildCard(p, i)).join('');
  document.getElementById('addRow').style.display = q ? 'none' : '';
}

// ─── 初期化 ─────────────────────────────────────────
async function init() {
  document.getElementById('cardsArea').innerHTML =
    '<div class="add-row" style="margin-bottom:14px;color:#888;">📡 データを読み込んでいます...</div>';
  const data = await loadDataAsync();
  renderCards(data);
}

function toggleMeisai(id, btn) {
  const wrap = document.getElementById(id);
  const isOpen = wrap.classList.toggle('open');
  btn.textContent = isOpen ? '▼ 明細を隠す' : '▶ 明細を表示';
}

init();
</script>
</body>
</html>
