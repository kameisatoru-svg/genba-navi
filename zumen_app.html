<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>図面アプリ｜アート・レイズ</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e2d40">
<style>
:root{
  --bg:#eeebe5;--navy:#1e2d40;--navy2:#2a3f5a;
  --accent:#c8a96e;--text:#1e2d40;--text2:#5a6a7a;--white:#ffffff;
  --cop:#b06a00;--bop:rgba(176,106,0,0.10);--top:#7a4800;
  --ceq:#1a6aaa;--beq:rgba(26,106,170,0.08);--teq:#1a4a88;
  --ceil:#2a6a4a;--bceil:rgba(42,106,74,0.08);--tceil:#1a4a2a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
.hidden{display:none!important;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Meiryo','Yu Gothic',sans-serif;
  height:100svh;display:flex;flex-direction:column;overflow:hidden;
  position:fixed;width:100%;
}

/* ── ヘッダー ── */
.header{
  background:var(--navy);height:60px;
  display:flex;align-items:center;padding:0 10px;gap:5px;flex-shrink:0;
}
.btn-back{
  width:44px;height:44px;border:none;background:transparent;
  color:var(--white);cursor:pointer;
  display:flex;align-items:center;justify-content:center;border-radius:10px;
  flex-shrink:0;
}
.btn-back:active{background:rgba(255,255,255,0.15);}

/* 図面種別セレクト */
.view-select-wrap{
  position:relative;flex:1;max-width:175px;
}
.view-select{
  width:100%;height:38px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:10px;color:var(--white);
  font-size:13px;font-weight:700;font-family:inherit;
  padding:0 26px 0 10px;cursor:pointer;
  -webkit-appearance:none;appearance:none;outline:none;
}
.view-select option{
  background:#ffffff;
  color:#1e2d40;
}
.view-select-wrap::after{
  content:'▼';position:absolute;right:8px;top:50%;transform:translateY(-50%);
  font-size:9px;color:rgba(255,255,255,0.7);pointer-events:none;
}

/* モードトグル（編集/印刷） */
.mode-toggle{display:flex;gap:2px;background:rgba(255,255,255,0.1);border-radius:10px;padding:2px;margin-left:auto;}
.mtb{
  width:40px;height:40px;border:none;border-radius:8px;
  background:transparent;color:rgba(255,255,255,0.75);
  font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
}
.mtb svg{display:block;}
.mtb.active{background:var(--accent);color:var(--navy);}
.mtb.active svg{stroke:var(--navy);}

/* Undo/Redoトグル */
.undo-toggle{display:flex;gap:2px;background:rgba(255,255,255,0.1);border-radius:10px;padding:2px;margin-left:0;}
.utb{
  width:40px;height:40px;border:none;border-radius:8px;
  background:transparent;color:#ffffff;
  cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.15s;
}
.utb:active{background:rgba(255,255,255,0.15);}
.utb svg{display:block;}

/* 割付・出力ボタン */
.btn-do-print{
  height:38px;padding:0 10px;border:1.5px solid var(--accent);border-radius:10px;
  background:transparent;color:var(--accent);font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:4px;
}
.btn-do-print:active{background:rgba(200,169,110,0.2);}

/* ── スクロールエリア ── */
.scroll-area{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 14px max(20px,env(safe-area-inset-bottom));
  touch-action:pan-y;
}

/* ── 共通 ── */
.st{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:0.03em;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.r4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;}
.iw{display:flex;flex-direction:column;gap:4px;}
.iw span{font-size:11px;color:var(--text2);font-weight:600;}
.iw input{
  height:42px;border:1.5px solid rgba(30,45,64,0.18);border-radius:10px;
  padding:0 12px;font-size:15px;font-family:inherit;color:var(--text);
  background:var(--white);outline:none;
}
.iw input:focus{border-color:var(--accent);}
.sec{margin-bottom:16px;}

/* 壁厚ボタン */
.wt-btns{display:flex;gap:6px;}
.wt-btn{
  flex:1;height:36px;border:1.5px solid rgba(30,45,64,0.15);
  border-radius:8px;background:var(--white);color:var(--text2);
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
}
.wt-btn.active{border-color:var(--accent);background:rgba(200,169,110,0.12);color:var(--navy);}

/* ── canvas ── */
.canvas-wrap{
  background:var(--white);border-radius:14px;
  border:1.5px solid rgba(30,45,64,0.1);overflow:hidden;
  box-shadow:0 2px 8px rgba(30,45,64,0.07);
  margin-bottom:12px;position:relative;
}
.canvas-label{
  font-size:11px;font-weight:700;color:var(--text2);
  padding:8px 14px;border-bottom:1px solid rgba(30,45,64,0.07);
  letter-spacing:0.04em;display:flex;align-items:center;justify-content:space-between;
}
.canvas-label-badge{
  font-size:10px;background:var(--navy);color:#fff;
  border-radius:10px;padding:1px 7px;
}
canvas{display:block;width:100%;}


#zumen-cv{touch-action:none;}

/* ── 寸法カード ── */
.dim-card{
  background:var(--white);border-radius:12px;
  border:1.5px solid rgba(30,45,64,0.08);padding:12px 14px;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
  margin-bottom:14px;
}
.dc{text-align:center;}
.dl{font-size:10px;color:var(--text2);margin-bottom:2px;}
.dv{font-size:15px;font-weight:700;color:var(--navy);}

/* ── 開口部ボタン群 ── */
.aor{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.aob{
  padding:11px 4px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:10px;background:var(--white);color:var(--text2);
  font-size:12px;cursor:pointer;text-align:center;line-height:1.5;font-family:inherit;
}
.aob:active{background:var(--bg);}

/* ── アコーディオン ── */
.acc-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--white);border-radius:12px;
  border:1.5px solid rgba(30,45,64,0.1);cursor:pointer;margin-bottom:6px;
  font-size:13px;font-weight:700;color:var(--text);
  box-shadow:0 1px 3px rgba(30,45,64,0.06);
}
.acc-hd:active{background:var(--bg);}
.acc-hd .acc-arrow{font-size:11px;color:var(--text2);transition:transform 0.2s;}
.acc-hd.open .acc-arrow{transform:rotate(180deg);}
.acc-hd .acc-badge{
  font-size:10px;background:var(--navy);color:#fff;
  border-radius:10px;padding:1px 7px;margin-left:6px;
}
.acc-body{display:none;margin-bottom:10px;}
.acc-body.open{display:block;}

/* ── 開口リスト ── */
.oi{
  background:var(--white);border:1.5px solid rgba(30,45,64,0.1);
  border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;
}
.oi.sel-op{border-color:var(--cop);background:var(--bop);}
.on{font-size:13px;font-weight:600;}
.op-dist{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.6;}
.db{
  font-size:11px;color:var(--text2);background:none;
  border:1px solid rgba(30,45,64,0.15);border-radius:6px;
  padding:3px 8px;cursor:pointer;float:right;font-family:inherit;
}

/* ── コンパクト移動パネル ── */
.mpanel-compact{border-radius:12px;padding:10px 12px;margin-bottom:10px;}
.mpanel-compact.cop{background:var(--bop);border:1px solid var(--cop);}
.mpanel-compact.ceq{background:var(--beq);border:1px solid var(--ceq);}
.mpanel-compact.cceil{background:var(--bceil);border:1px solid var(--ceil);}
.mpc-title{font-size:12px;font-weight:700;margin-bottom:8px;}
.mpc-title.cop{color:var(--top);}
.mpc-title.ceq{color:var(--teq);}
.mpc-title.cceil{color:var(--tceil);}
.mpc-body{display:flex;gap:8px;align-items:stretch;}
.mpc-pos{flex:1 1 0;display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.mpc-ctrl{flex:1 1 0;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;}
.mpc-cell{background:var(--white);border-radius:8px;padding:6px 8px;text-align:center;}
.mpc-lbl{font-size:10px;color:var(--text2);}
.mpc-val{font-size:13px;font-weight:700;margin-top:1px;}
.mpc-val.cop{color:var(--top);}
.mpc-val.ceq{color:var(--teq);}
.mpc-val.cceil{color:var(--tceil);}
.mpc-dpad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;width:100%;}
.mpb{
  width:100%;height:36px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:8px;background:var(--white);font-size:16px;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;
}
.mpb:active{background:var(--bg);}
.mpc-steps{display:flex;gap:3px;margin-top:2px;width:100%;}
.mps{
  flex:1;padding:6px 0;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:6px;background:var(--white);color:var(--text2);
  font-size:10px;cursor:pointer;font-family:inherit;text-align:center;
}
.mps.act-op{border-color:var(--cop);background:var(--bop);color:var(--top);font-weight:700;}
.mps.act-eq{border-color:var(--ceq);background:var(--beq);color:var(--teq);font-weight:700;}
.mps.act-ceil{border-color:var(--ceil);background:var(--bceil);color:var(--tceil);font-weight:700;}

/* ── 設備記号 ── */
.eq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.eq-btn{
  padding:12px 4px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:10px;background:var(--white);color:var(--text2);
  font-size:11px;cursor:pointer;text-align:center;line-height:1.6;font-family:inherit;
}
.eq-btn:active{background:var(--bg);}
.eq-icon{font-size:18px;display:block;margin-bottom:2px;}

/* 設備リスト */
.ei{
  background:var(--white);border:1.5px solid rgba(30,45,64,0.1);
  border-radius:10px;padding:9px 12px;margin-bottom:6px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
}
.ei.sel-eq{border-color:var(--ceq);background:var(--beq);}
.ei.sel-ceil{border-color:var(--ceil);background:var(--bceil);}
.ei-sym{font-size:20px;line-height:1;}
.ei-info{flex:1;}
.ei-name{font-size:13px;font-weight:600;}
.ei-pos{font-size:11px;color:var(--text2);margin-top:2px;}
.db-eq{
  font-size:11px;color:var(--text2);background:none;
  border:1px solid rgba(30,45,64,0.15);border-radius:6px;
  padding:3px 8px;cursor:pointer;font-family:inherit;
}

/* 削除ボタン（canvas上） */
#eq-del-btn{
  display:none;position:absolute;background:#e53535;color:#fff;
  border:none;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;
  cursor:pointer;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,0.25);
}

/* ── 平面図専用 ── */
.plan-info-card{
  background:var(--white);border-radius:12px;border:1.5px solid rgba(30,45,64,0.08);
  padding:12px 14px;margin-bottom:14px;
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;
}

/* ── 天井図専用 ── */
.ceil-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.ceil-btn{
  padding:11px 4px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:10px;background:var(--white);color:var(--text2);
  font-size:11px;cursor:pointer;text-align:center;line-height:1.6;font-family:inherit;
}
.ceil-btn:active{background:var(--bg);}

/* ── 柱配置ダイアログ ── */
.col-dialog-overlay{
  position:fixed;inset:0;background:rgba(10,20,35,0.55);
  z-index:200;display:flex;align-items:flex-start;justify-content:center;
  padding:80px 20px 20px;
}
.col-dialog-overlay.hidden{display:none;}
.col-dialog-box{
  background:var(--white);border-radius:16px;width:100%;max-width:320px;
  box-shadow:0 8px 32px rgba(10,20,35,0.3);overflow:hidden;
}
.col-dialog-head{
  background:var(--navy);padding:12px 16px;
  font-size:14px;font-weight:700;color:var(--white);
}
.col-dialog-body{padding:14px 16px;}
.col-dialog-footer{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:0 16px 16px;
}
.col-dialog-cancel{
  height:44px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;
  background:transparent;color:var(--text2);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;
}
.col-dialog-ok{
  height:44px;border:none;border-radius:10px;
  background:var(--navy);color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;
}

/* ── 割付送信モーダル ── */
.wa-modal-overlay{
  position:fixed;inset:0;background:rgba(10,20,35,0.6);
  z-index:100;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.wa-modal-overlay.hidden{display:none;}
.wa-modal-box{
  background:var(--white);border-radius:16px;width:100%;max-width:380px;
  box-shadow:0 8px 32px rgba(10,20,35,0.3);overflow:hidden;
}
.wa-modal-head{
  background:var(--navy);padding:16px 18px;
  font-size:15px;font-weight:700;color:var(--white);
}
.wa-modal-body{padding:18px;}
.wa-modal-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.wa-modal-input{
  width:100%;height:42px;border:1.5px solid rgba(30,45,64,0.2);
  border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;
  color:var(--text);background:var(--bg);outline:none;box-sizing:border-box;
}
.wa-modal-input:focus{border-color:var(--accent);}
.wa-face-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;border-radius:10px;margin-bottom:6px;
  background:var(--bg);font-size:13px;
}
.wa-face-row.has-data{background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.4);}
.wa-face-row.no-data{opacity:0.4;}
.wa-mfr-left{display:flex;align-items:center;gap:8px;font-weight:600;}
.wa-mfr-badge{
  font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;
  background:rgba(200,169,110,0.2);color:var(--navy);
}
.wa-mfr-detail{font-size:11px;color:var(--text2);}
.wa-modal-footer{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:0 18px 18px;
}
.wa-modal-cancel{
  height:44px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;
  background:transparent;color:var(--text2);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;
}
.wa-modal-send{
  height:44px;border:none;border-radius:10px;
  background:var(--accent);color:var(--navy);font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;
}
.wa-modal-send:disabled{background:rgba(30,45,64,0.15);color:var(--text2);cursor:not-allowed;}

/* ── GLM BLEモーダル ── */
.ble-overlay{
  position:fixed;inset:0;background:rgba(10,20,35,0.6);
  z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;
}
.ble-overlay.hidden{display:none;}
.ble-box{
  background:var(--white);border-radius:16px;width:100%;max-width:360px;
  box-shadow:0 8px 32px rgba(10,20,35,0.3);overflow:hidden;
}
.ble-head{
  background:var(--navy);padding:14px 18px;
  font-size:15px;font-weight:700;color:var(--white);
  display:flex;align-items:center;gap:8px;
}
.ble-body{padding:16px 16px 4px;}
.ble-target{
  height:40px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;
  background:var(--white);color:var(--text);font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;
}
.ble-target.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* ── 印刷スタイル ── */
@media print{
  body{position:static;height:auto;overflow:visible;background:#fff;}
  .header,.scroll-area > .sec,.dim-card,.plan-info-card,
  #mpanel-wrap,.mode-toggle,.btn-do-print,.btn-back,
  .acc-hd,#placed-list{display:none!important;}
  .scroll-area{overflow:visible;padding:0;}
  .canvas-wrap{border:none;box-shadow:none;border-radius:0;}
  .canvas-label{display:none;}
  #eq-del-btn{display:none!important;}
}
</style>
</head>
<body>

<div class="header">
  <!-- 戻る -->
  <button class="btn-back" onclick="goBackToTop()" title="戻る">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <!-- 図面種別セレクト -->
  <div class="view-select-wrap">
    <select class="view-select" id="view-select" onchange="switchView(this.value)">
      <option value="plan">平面図</option>
      <option value="faceA">展開図 A面</option>
      <option value="faceB">展開図 B面</option>
      <option value="faceC">展開図 C面</option>
      <option value="faceD">展開図 D面</option>
      <option value="ceil">天井図</option>
    </select>
  </div>

  <!-- プロジェクト名（タップでロールダウン） -->
  <button id="proj-btn" onclick="toggleProjPanel()" style="flex:1;min-width:0;height:38px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:var(--white);font-size:11px;font-family:inherit;cursor:pointer;padding:0 8px;display:flex;align-items:center;gap:4px;overflow:hidden;">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span id="proj-label" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:left;">未保存</span>
    <span id="proj-arrow" style="font-size:9px;opacity:0.7;flex-shrink:0;">▼</span>
  </button>

  <!-- 編集 / 印刷モード -->
  <div class="mode-toggle">
    <button class="mtb active" id="btn-edit" onclick="setMode('edit')" title="編集">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
    <button class="mtb" id="btn-print" onclick="setMode('print')" title="印刷">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    </button>
  </div>

  <!-- Undo / Redo -->
  <div class="undo-toggle">
    <button class="utb" id="btn-undo" onclick="doUndo()" title="元に戻す">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13C5 8 9.5 5 15 5a9 9 0 0 1 9 9 9 9 0 0 1-9 9c-3.5 0-6.5-1.5-8.5-4"/></svg>

<script>
// ══════════════════════════════════════════
//  データ構造
// ══════════════════════════════════════════

// 部屋基本データ（平面図が起点）
var roomData = {W:0, D:0, H:0, wallT:120, compassDeg:0};

// 面定義（A=上/B=右/C=下/D=左）
var FACES = ['A','B','C','D'];
var FACE_LABEL = {A:'A面（上）',B:'B面（右）',C:'C面（下）',D:'D面（左）'};
// A・C面の幅=W、B・D面の幅=D
function faceW(fi){ return (fi===0||fi===2)?roomData.W:roomData.D; }
function faceH(){ return roomData.H; }

// 展開図データ（各面の開口部・設備記号）
var faceOpenings = [[],[],[],[]]; // A/B/C/D
var faceSelId    = [null,null,null,null];
var faceOidSeq   = [0,0,0,0];
var faceEquips   = [[],[],[],[]];
var faceEqSelId  = [null,null,null,null];
var faceEqSeq    = [0,0,0,0];

// 天井データ
var ceilParts   = [];
var ceilSelId   = null;
var ceilSeq     = 0;

// 平面図 柱・間仕切りデータ
var planColumns    = [];  // {id, x, y, w, d}  x/y=左上座標(内法基準), w/d=幅×奥行(mm)
var planColSelId   = null;
var planColSeq     = 0;
var planPartitions = [];  // {id, axis:'v'|'h', pos, start, end, t}
                          // v: pos=X(左壁から), start=Y開始, end=Y終了
                          // h: pos=Y(上壁から), start=X開始, end=X終了
var planPartSeq    = 0;

// 状態
var curView    = 'plan'; // 'plan' | 'faceA'〜'faceD' | 'ceil'
var curFaceIdx = 0;      // 展開図時の面インデックス
var moveStep   = 10;
var drawMode   = 'edit';

// ══════════════════════════════════════════
//  Undo/Redo
// ══════════════════════════════════════════

var _undoStack = [];
var _redoStack = [];
var _UNDO_MAX  = 30;

function _snapshot(){
  return JSON.stringify({
    roomData:    roomData,
    faceOpenings:faceOpenings,
    faceOidSeq:  faceOidSeq,
    faceEquips:  faceEquips,
    faceEqSeq:   faceEqSeq,
    ceilParts:   ceilParts,
    ceilSeq:     ceilSeq,
    planColumns: planColumns,
    planColSeq:  planColSeq,
    planPartitions:planPartitions,
    planPartSeq: planPartSeq
  });
}

function _restore(snap){
  var s=JSON.parse(snap);
  roomData=s.roomData;
  faceOpenings=s.faceOpenings;  faceOidSeq=s.faceOidSeq;
  faceEquips=s.faceEquips;      faceEqSeq=s.faceEqSeq;
  ceilParts=s.ceilParts;        ceilSeq=s.ceilSeq;
  planColumns=s.planColumns;    planColSeq=s.planColSeq;
  planPartitions=s.planPartitions; planPartSeq=s.planPartSeq;
  // 選択状態はリセット
  faceSelId=[null,null,null,null];
  faceEqSelId=[null,null,null,null];
  ceilSelId=null; planColSelId=null;
}

function pushHistory(){
  _undoStack.push(_snapshot());
  if(_undoStack.length>_UNDO_MAX) _undoStack.shift();
  _redoStack=[];
  _updateUndoBtn();
  projAutoSave();
}

function doUndo(){
  if(_planMode==='outline'){
    outlineUndo();
    return;
  }
  if(!_undoStack.length) return;
  _redoStack.push(_snapshot());
  _restore(_undoStack.pop());
  _updateUndoBtn();
  renderMain();
}

function doRedo(){
  if(!_redoStack.length) return;
  _undoStack.push(_snapshot());
  _restore(_redoStack.pop());
  _updateUndoBtn();
  renderMain();
}

function _updateUndoBtn(){
  var u=document.getElementById('btn-undo');
  var r=document.getElementById('btn-redo');
  if(_planMode==='outline'){
    if(u) u.style.opacity=_outlineVerts.length>0?'1':'0.35';
    if(r) r.style.opacity=_redoStack.length?'1':'0.35';
    return;
  }
  if(u) u.style.opacity=_undoStack.length?'1':'0.35';
  if(r) r.style.opacity=_redoStack.length?'1':'0.35';
}

// 設備記号定義（展開図用）
var EQ_TYPES = [
  {id:'outlet',    label:'コンセント',    icon:'⊟', w:86,  h:86},
  {id:'switch',    label:'スイッチ',      icon:'▣', w:86,  h:86},
  {id:'switch3',   label:'3路SW',         icon:'▣', w:86,  h:86},
  {id:'bracket',   label:'ブラケット',    icon:'◫', w:150, h:200},
  {id:'fan_round', label:'換気扇（丸）',  icon:'◎', w:150, h:150},
  {id:'fan_sq',    label:'換気扇（角）',  icon:'⊠', w:200, h:200},
  {id:'ac_wall',   label:'エアコン',      icon:'▭', w:800, h:250},
];

// 天井器具定義
var CEIL_TYPES = [
  {id:'ceiling_light', label:'シーリング照明', icon:'◯', w:400, h:400},
  {id:'downlight',     label:'ダウンライト',   icon:'●', w:100, h:100},
  {id:'led_tube',      label:'蛍光灯型LED',    icon:'▬', w:1200,h:100},
  {id:'rail',          label:'ライティングレール', icon:'━', w:1200,h:50},
  {id:'ac_ceil',       label:'天カセエアコン', icon:'⊞', w:800, h:800},
  {id:'fan_ceil_r',    label:'天井換気扇（丸）', icon:'◎', w:150, h:150},
  {id:'fan_ceil_s',    label:'天井換気扇（角）', icon:'⊠', w:200, h:200},
  {id:'inspection',    label:'点検口',         icon:'⊡', w:450, h:450},
];

// ══════════════════════════════════════════
//  ビュー切替
// ══════════════════════════════════════════

function switchView(v){
  saveCurrentInputs();
  curView = v;
  if(v.startsWith('face')){
    var fi = ['A','B','C','D'].indexOf(v.charAt(4));
    curFaceIdx = fi>=0?fi:0;
    faceSelId[curFaceIdx]=null;
    faceEqSelId[curFaceIdx]=null;
  } else {
    ceilSelId = null;
  }
  renderMain();
}

function setMode(m){
  drawMode=m;
  document.getElementById('btn-edit').className='mtb'+(m==='edit'?' active':'');
  document.getElementById('btn-print').className='mtb'+(m==='print'?' active':'');
  var btn=document.getElementById('eq-del-btn'); if(btn) btn.style.display='none';
  redraw();
}

function doPrint(){
  setMode('print');
  // 印刷用に高解像度で再描画（dpr=6相当）
  var _origSetup=setupCanvas;
  window._printDpr=6;
  setTimeout(function(){
    // setupCanvasを高解像度版に差し替えて再描画
    window._printMode=true;
    redrawForPrint();
    setTimeout(function(){
      window.print();
      setTimeout(function(){
        window._printMode=false;
        setMode('edit');
      },500);
    },200);
  },150);
}

function redrawForPrint(){
  // 現在のビューを高解像度で再描画
  if(curView==='plan') redrawPlan();
  else if(curView==='ceil') redrawCeil();
  else redraw();
}

// ══════════════════════════════════════════
//  入力保存
// ══════════════════════════════════════════

function saveCurrentInputs(){
  if(curView==='plan'){
    var wEl=document.getElementById('inp-W');
    var dEl=document.getElementById('inp-D');
    var hEl=document.getElementById('inp-H');
    var newW=parseFloat(wEl?wEl.value:0)||roomData.W;
    var newD=parseFloat(dEl?dEl.value:0)||roomData.D;
    var newH=parseFloat(hEl?hEl.value:0)||roomData.H;
    // 変化があった時だけ履歴を積む
    if(newW!==roomData.W||newD!==roomData.D||newH!==roomData.H) pushHistory();
    if(wEl) roomData.W=newW;
    if(dEl) roomData.D=newD;
    if(hEl) roomData.H=newH;
  }
}

// ══════════════════════════════════════════
//  メイン描画ルーター
// ══════════════════════════════════════════

function renderMain(){
  var sel=document.getElementById('view-select');
  if(sel&&sel.value!==curView) sel.value=curView;

  if(curView==='plan')       renderPlan();
  else if(curView==='ceil')  renderCeil();
  else                       renderFace();
}

// ══════════════════════════════════════════
//  平面図パネル
// ══════════════════════════════════════════

function renderPlan(){
  var W=roomData.W,D=roomData.D,H=roomData.H,T=roomData.wallT;
  var dimOpen=roomData._dimOpen!==false;
  var area=document.getElementById('main-area');
  var html='';

  // ── 外周作図モード：専用画面 ──
  if(_planMode==='outline'){

var _colPending = null; // ダイアログ表示中の仮データ {corner, face, offset, x, y}

function _detectColType(mmX, mmY){
  // タップ位置mmX/mmYから柱種別を判定（内寸基準）
  var hasInner=(roomData._innerW>0);
  var W=hasInner?(roomData._innerW||roomData.W):roomData.W;
  var D=hasInner?(roomData._innerD||roomData.D):roomData.D;
  var thresh=50;

  var nearLeft  = mmX < thresh;
  var nearRight = mmX > W-thresh;
  var nearTop   = mmY < thresh;
  var nearBot   = mmY > D-thresh;

  // コーナー判定（両方向が壁に近い）
  if(nearLeft  && nearTop)  return {type:'corner', corner:'tl'};
  if(nearRight && nearTop)  return {type:'corner', corner:'tr'};
  if(nearLeft  && nearBot)  return {type:'corner', corner:'bl'};
  if(nearRight && nearBot)  return {type:'corner', corner:'br'};

  // 壁面判定（片方向が壁に近い）
  if(nearTop)   return {type:'wall', face:'A', offset:Math.round(mmX/10)*10};
  if(nearBot)   return {type:'wall', face:'C', offset:Math.round(mmX/10)*10};
  if(nearLeft)  return {type:'wall', face:'D', offset:Math.round(mmY/10)*10};
  if(nearRight) return {type:'wall', face:'B', offset:Math.round(mmY/10)*10};

  return {type:'interior'};
}

function openColDialog(detected){
  _colPending = detected;
  var head = document.getElementById('col-dialog-head');
  if(head){
    if(detected.type==='corner'){
      var lbl={tl:'左上',tr:'右上',bl:'左下',br:'右下'}[detected.corner];
      head.textContent = lbl+'コーナー　柱を配置';
    } else {
      head.textContent = detected.face+'面　柱を配置（端から'+detected.offset+'mm）';
    }
  }
  document.getElementById('col-dialog').classList.remove('hidden');
  setTimeout(function(){ document.getElementById('col-dlg-w').focus(); }, 100);
}

function closeColDialog(){
  _colPending = null;
  document.getElementById('col-dialog').classList.add('hidden');
}

function confirmColDialog(){
  if(!_colPending) return;
  pushHistory();
  var cw = parseInt(document.getElementById('col-dlg-w').value)||120;
  var cd = parseInt(document.getElementById('col-dlg-d').value)||120;
  var W=roomData.W, D=roomData.D;
  var x=0, y=0, corner=null, face=null, offset=0;

  if(_colPending.type==='corner'){
    corner = _colPending.corner;
    if(corner==='tl'){ x=0;    y=0;    }
    if(corner==='tr'){ x=W-cw; y=0;    }
    if(corner==='bl'){ x=0;    y=D-cd; }
    if(corner==='br'){ x=W-cw; y=D-cd; }
    // 同コーナーの既存を上書き
    planColumns=planColumns.filter(function(c){return c.corner!==corner;});
  } else {
    face   = _colPending.face;
    offset = _colPending.offset;
    if(face==='A'){ x=Math.max(0,Math.min(W-cw,offset)); y=0;    }
    if(face==='C'){ x=Math.max(0,Math.min(W-cw,offset)); y=D-cd; }
    if(face==='D'){ x=0;    y=Math.max(0,Math.min(D-cd,offset)); }
    if(face==='B'){ x=W-cw; y=Math.max(0,Math.min(D-cd,offset)); }
  }

  planColSeq++;
  planColumns.push({id:planColSeq, corner:corner, face:face, offset:offset, x:x, y:y, w:cw, d:cd});
  closeColDialog();
  renderPlan();
}

function removePlanCol(id){
  pushHistory();
  planColumns=planColumns.filter(function(c){return c.id!==id;});
  renderPlan();
}

var _planMode = 'none'; // 'none' | 'column' | 'part_v' | 'part_h' | 'outline'

// 外周作図モード用変数

var _outlineClosed = false;

function movePart(delta){
  var sp=planPartitions.find(function(p){return p.id===_planSelId;});
  if(!sp) return;
  pushHistory();
  var newPos=sp.pos+delta;
  var halfT=Math.round((sp.t||roomData.wallT)/2);
  // 内寸基準で制限
  var hasInner=(roomData._innerW>0);
  var maxPos=sp.axis==='v'
    ?(hasInner?(roomData._innerW||roomData.W):roomData.W)
    :(hasInner?(roomData._innerD||roomData.D):roomData.D);
  if(newPos-halfT<0||newPos+halfT>maxPos) return;
  sp.pos=newPos;
  renderPlan();
}

function resizePart(end, delta){
  var sp=planPartitions.find(function(p){return p.id===_planSelId;});
  if(!sp) return;
  pushHistory();
  if(end==='start'){
    var newStart=sp.start+delta;
    var newLen=sp.len-delta;
    if(newLen<roomData.wallT) return; // 最小壁厚
    sp.start=newStart; sp.len=newLen;
  } else {
    var newLen2=sp.len+delta;
    if(newLen2<roomData.wallT) return;
    sp.len=newLen2;
  }
  renderPlan();
}

function deletePlanSel(){
  if(!_planSelId) return;
  pushHistory();
  if(_planSelType==='partition'){
    planPartitions=planPartitions.filter(function(p){return p.id!==_planSelId;});
  } else if(_planSelType==='column'){
    planColumns=planColumns.filter(function(c){return c.id!==_planSelId;});
  }
  _planSelType=null; _planSelId=null;
  renderPlan();
}

  if(mode!=='outline'){ _outlineVerts=[]; _outlinePreview=null; _outlineClosed=false; _outlineSelEdge=null; }
  renderPlan();
}

        var adjDim2=isAbsorb?_outlineCalcAbsorbDim(ei2):null;
        // 外観
        var bg2=isLocked?'rgba(30,45,64,0.08)':isAbsorb?'rgba(200,169,110,0.15)':'rgba(255,255,255,0.8)';
        var border2=isLocked?'1.5px solid rgba(30,45,64,0.3)':isAbsorb?'1.5px solid var(--accent)':'1px solid rgba(30,45,64,0.08)';
        var canTap=isErrDir; // 誤差方向の辺のみタップ有効
        html+='<div onclick="toggleLockEdge('+ei2+')" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;cursor:'+(canTap?'pointer':'default')+';background:'+bg2+';border:'+border2+';transition:all 0.15s;">';
        html+='<span style="font-size:12px;font-weight:700;color:'+(isLocked?'var(--navy)':isAbsorb?'var(--cop)':'var(--text2)')+';flex-shrink:0;width:28px;">辺'+(ei2+1)+'</span>';
        html+='<span style="font-size:13px;font-weight:700;color:'+(isLocked?'var(--navy)':isAbsorb?'var(--cop)':'var(--text2)')+';flex:1;">';
        if(isAbsorb&&adjDim2!==null){
          html+=_outlineDims[ei2]+'mm <span style="font-size:11px;color:var(--cop);">→ <b>'+adjDim2+'mm</b></span>';
        } else {
          html+=_outlineDims[ei2]+'mm';
        }
        html+='</span>';
        if(isLocked)  html+='<span style="font-size:16px;">🔒</span>';
        if(isAbsorb)  html+='<span style="font-size:14px;color:var(--cop);font-weight:700;">調整</span>';
        html+='</div>';
      }
    }
    html+='</div>';

    // ボタン行
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
    if(_outlinePhase==='input'){
      html+='<button onclick="outlineEditBack()" style="height:40px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;">← 作業画面へ戻る</button>';
      html+='<button onclick="outlineGenerate()" style="height:40px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">生成して確認</button>';
    } else {
      html+='<button onclick="_outlinePhase=\'input\';_outlineLockEdges=new Set();renderPlan();" style="height:40px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;">← 寸法修正</button>';
      var errNow=_outlineCalcError();
      var canConfirm=(errNow.xErr===0&&errNow.yErr===0)||_outlineCalcAbsorbIdx()!==null;
      html+='<button onclick="outlineConfirm()" '+(canConfirm?'':'disabled')+' style="height:40px;border:none;border-radius:10px;background:'+(canConfirm?'var(--accent)':'rgba(30,45,64,0.2)')+';color:'+(canConfirm?'var(--navy)':'rgba(255,255,255,0.5)')+';font-size:14px;font-weight:700;cursor:'+(canConfirm?'pointer':'default')+';font-family:inherit;">外周を確定</button>';
    }
    html+='</div>';
  }

  if(area) area.innerHTML=html;

  // キャンバス初期化
  if(!_outlineClosed){
    setTimeout(_initOutlineCv, 50);
    _updateUndoBtn();
  } else {
    // input・checkどちらのフェーズでもプレビューcanvas描画
    setTimeout(_drawOutlinePreview, 50);
  }
}

function _drawOutlinePreview(){
  var cv=document.getElementById('outline-preview'); if(!cv) return;
  if(_outlineVerts.length<2) return;
  var dpr=window.devicePixelRatio||1;
  var cw=cv.offsetWidth||320;
  // バウンディングボックス計算
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  _outlineVerts.forEach(function(v){
    minX=Math.min(minX,v.x);minY=Math.min(minY,v.y);
    maxX=Math.max(maxX,v.x);maxY=Math.max(maxY,v.y);
  });
  var vw=maxX-minX||1, vh=maxY-minY||1;
  var pad=16*dpr;
  var sc=Math.min((cw*dpr-pad*2)/vw, (160*dpr-pad*2)/vh);
  var ch=Math.round(vh*sc+pad*2)/dpr;
  cv.style.height=Math.min(ch,160)+'px';
  cv.width=Math.round(cw*dpr);
  cv.height=Math.round(Math.min(ch,160)*dpr);
  var ox=(cw*dpr-vw*sc)/2, oy=(cv.height-vh*sc)/2;
  var ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#f9f8f6'; ctx.fillRect(0,0,cv.width,cv.height);
  // 外周
  ctx.strokeStyle='#1e2d40'; ctx.lineWidth=2*dpr;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(ox+(_outlineVerts[0].x-minX)*sc, oy+(_outlineVerts[0].y-minY)*sc);
  for(var i=1;i<_outlineVerts.length;i++){
    ctx.lineTo(ox+(_outlineVerts[i].x-minX)*sc, oy+(_outlineVerts[i].y-minY)*sc);
  }
  ctx.closePath(); ctx.stroke();
  // 辺番号（かめさんが描いた辺のみ・自動交点辺は表示しない）
  for(var ei=0;ei<_outlineDims.length;ei++){
    var v1=_outlineVerts[ei];
    var v2=_outlineVerts[ei+1];
    var mx=(v1.x+v2.x)/2-minX, my=(v1.y+v2.y)/2-minY;
    var a=Math.atan2(v2.y-v1.y,v2.x-v1.x);
    var isSel=_outlineSelEdge===ei;
    var hasDim=_outlineDims&&_outlineDims[ei]>0;
    ctx.fillStyle=isSel?'#b06a00':hasDim?'#2db55d':'rgba(30,45,64,0.5)';
    ctx.font='bold '+(9*dpr)+'px Meiryo,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ei+1, ox+mx*sc-Math.sin(a)*12*dpr, oy+my*sc+Math.cos(a)*12*dpr);
  }
}


var _outlineDims=[];
var _outlineIsDrawing=false;
var _outlineStartX=0, _outlineStartY=0;
var _outlineAutoCorner=false;
var _outlineAdjIdx=null;      // 旧変数（互換用・未使用）
var _outlinePhase='input';    // 'input' | 'check'
var _outlineLockEdges=new Set(); // 守る辺のインデックスSet

function setOutlineDim(idx,val){
  if(!_outlineDims) _outlineDims=[];
  _outlineDims[idx]=parseInt(val)||0;
}

// 終了ボタン：辺選択・編集モード（フェーズ1.5）へ
function outlineFinish(){
  if(_outlineVerts.length<2){
    showWaToast('⚠ まず頂点を2つ以上打ってください');
    return;
  }
  _outlineAutoCorner=false;
  _outlineClosed=false;
  _outlinePhase='edit';
  _outlineSelEdge=null;
  // 描画スケールを確定保存
  if(_outlineVerts.length>=2){
    var dpr=window.devicePixelRatio||1;
    var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    _outlineVerts.forEach(function(v){minX=Math.min(minX,v.x);minY=Math.min(minY,v.y);maxX=Math.max(maxX,v.x);maxY=Math.max(maxY,v.y);});
    var vw=maxX-minX||1, vh=maxY-minY||1, pad=40*dpr;
    _outlineDrawSc=Math.min((_outlineCvW-pad*2)/vw,(_outlineCvH-pad*2)/vh);
  }
  var fb=document.getElementById('btn-outline-finish');
  if(fb) fb.classList.add('hidden');
  renderPlan();
}

// ── 調整モード（フェーズ1.5）──
var _adjDragTarget=null; // 'first'|'last'|null

function _initAdjustCv(){
  var cv=document.getElementById('outline-adj-cv'); if(!cv) return;
  var dpr=window.devicePixelRatio||1;
  var cw=cv.parentElement.offsetWidth||320;
  var ch=Math.round(cw*0.9);
  cv.style.width=cw+'px'; cv.style.height=ch+'px';
  cv.width=Math.round(cw*dpr); cv.height=Math.round(ch*dpr);
  _redrawAdjustCv();
  cv.addEventListener('touchstart', _adjDown, {passive:false});
  cv.addEventListener('touchmove',  _adjMove, {passive:false});
  cv.addEventListener('touchend',   _adjUp,   {passive:false});
  cv.addEventListener('mousedown',  _adjDown);
  cv.addEventListener('mousemove',  _adjMove);
  cv.addEventListener('mouseup',    _adjUp);
}

function _adjPos(e, cv){
  var r=cv.getBoundingClientRect();
  var dpr=window.devicePixelRatio||1;
  var src=(e.touches&&e.touches.length>0)?e.touches[0]
        :(e.changedTouches&&e.changedTouches.length>0)?e.changedTouches[0]:e;
  return {x:(src.clientX-r.left)*dpr, y:(src.clientY-r.top)*dpr};
}

function _adjScaleInfo(){
  var cv=document.getElementById('outline-adj-cv'); if(!cv) return null;
  var dpr=window.devicePixelRatio||1;
  var W=cv.width, H=cv.height;
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  _outlineVerts.forEach(function(v){
    minX=Math.min(minX,v.x);minY=Math.min(minY,v.y);
    maxX=Math.max(maxX,v.x);maxY=Math.max(maxY,v.y);
  });
  var pad=28*dpr;
  var vw=maxX-minX||1, vh=maxY-minY||1;
  var sc=Math.min((W-pad*2)/vw,(H-pad*2)/vh);
  var ox=(W-vw*sc)/2, oy=(H-vh*sc)/2;
  return {sc:sc,ox:ox,oy:oy,minX:minX,minY:minY,dpr:dpr};
}

function _adjToCanvas(vx,vy,info){
  return {x:info.ox+(vx-info.minX)*info.sc, y:info.oy+(vy-info.minY)*info.sc};
}

function _adjToVerts(cx,cy,info){
  return {x:(cx-info.ox)/info.sc+info.minX, y:(cy-info.oy)/info.sc+info.minY};
}

function _redrawAdjustCv(){
  var cv=document.getElementById('outline-adj-cv'); if(!cv) return;
  var info=_adjScaleInfo(); if(!info) return;
  var ctx=cv.getContext('2d');
  var W=cv.width, H=cv.height, dpr=info.dpr;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f9f8f6'; ctx.fillRect(0,0,W,H);

  if(_outlineVerts.length<2) return;
  var n=_outlineVerts.length;

  // 辺を描画（辺1は青、最後の辺は赤、他はネイビー）
  for(var i=0;i<n-1;i++){
    var p1=_adjToCanvas(_outlineVerts[i].x,_outlineVerts[i].y,info);
    var p2=_adjToCanvas(_outlineVerts[i+1].x,_outlineVerts[i+1].y,info);
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
    ctx.strokeStyle=i===0?'#1a6aaa':i===n-2?'#e53535':'rgba(30,45,64,0.8)';
    ctx.lineWidth=2.5*dpr; ctx.lineCap='round'; ctx.stroke();
  }

  // 全頂点
  _outlineVerts.forEach(function(v,i){
    var p=_adjToCanvas(v.x,v.y,info);
    var isFirst=(i===0), isLast=(i===n-1);
    ctx.beginPath();
    ctx.arc(p.x,p.y,(isFirst||isLast?10:5)*dpr,0,Math.PI*2);
    ctx.fillStyle=isFirst?'#1a6aaa':isLast?'#e53535':'rgba(30,45,64,0.6)';
    ctx.fill();
    if(isFirst||isLast){
      ctx.strokeStyle='#fff'; ctx.lineWidth=2*dpr; ctx.stroke();
    }
  });
}

function _adjDown(e){
  e.preventDefault();
  var cv=document.getElementById('outline-adj-cv'); if(!cv) return;
  var pos=_adjPos(e,cv);
  var info=_adjScaleInfo(); if(!info) return;
  var n=_outlineVerts.length;
  var dpr=info.dpr;
  var snapR=28*dpr;
  // 辺1の起点（青）
  var pF=_adjToCanvas(_outlineVerts[0].x,_outlineVerts[0].y,info);
  var dF=Math.sqrt(Math.pow(pos.x-pF.x,2)+Math.pow(pos.y-pF.y,2));
  // 最後の辺の終点（赤）
  var pL=_adjToCanvas(_outlineVerts[n-1].x,_outlineVerts[n-1].y,info);
  var dL=Math.sqrt(Math.pow(pos.x-pL.x,2)+Math.pow(pos.y-pL.y,2));
  if(dF<=snapR) _adjDragTarget='first';
  else if(dL<=snapR) _adjDragTarget='last';
  else _adjDragTarget=null;
}

function _adjMove(e){
  e.preventDefault();
  if(!_adjDragTarget) return;
  var cv=document.getElementById('outline-adj-cv'); if(!cv) return;
  var pos=_adjPos(e,cv);
  var info=_adjScaleInfo(); if(!info) return;
  var v=_adjToVerts(pos.x,pos.y,info);
  var n=_outlineVerts.length;
  if(_adjDragTarget==='first') _outlineVerts[0]={x:v.x,y:v.y};
  else if(_adjDragTarget==='last') _outlineVerts[n-1]={x:v.x,y:v.y};
  // 2点が近ければスナップ
  var pF=_outlineVerts[0], pL=_outlineVerts[n-1];
  var dist=Math.sqrt(Math.pow(pF.x-pL.x,2)+Math.pow(pF.y-pL.y,2));
  var snapR=20*(window.devicePixelRatio||1);
  if(dist<snapR){
    var mid={x:(pF.x+pL.x)/2,y:(pF.y+pL.y)/2};
    _outlineVerts[0]=mid; _outlineVerts[n-1]=mid;
  }
  _redrawAdjustCv();
}

function _adjUp(e){
  e.preventDefault();
  _adjDragTarget=null;
}

// 調整完了→寸法入力フェーズへ
function outlineAdjustDone(){
  var n=_outlineVerts.length;
  var pF=_outlineVerts[0], pL=_outlineVerts[n-1];
  var dist=Math.sqrt(Math.pow(pF.x-pL.x,2)+Math.pow(pF.y-pL.y,2));
  if(dist>15*(window.devicePixelRatio||1)){
    showWaToast('⚠ 起点と終点をもっと近づけてください');
    return;
  }
  // 起点と終点を完全に同じ座標に
  var mid={x:Math.round((pF.x+pL.x)/2),y:Math.round((pF.y+pL.y)/2)};
  _outlineVerts[0]=mid; _outlineVerts[n-1]=mid;
  _outlinePhase='input';
  _outlineDims=new Array(n-1).fill(0);
  renderPlan();
}

// 編集フェーズ：描画フェーズのキャンバスをそのまま流用
function _initEditOnOutlineCv(){
  var cv=document.getElementById('outline-cv'); if(!cv) return;
  var ov=document.getElementById('outline-ov'); if(!ov) return;
  _panOffsetX=0; _panOffsetY=0; _isPanning=false;
  cv.style.transform=''; ov.style.transform='';
  var dpr=window.devicePixelRatio||1;
  var cw=cv.parentElement.offsetWidth||320;
  var ch=Math.round(cw*1.05);
  [cv,ov].forEach(function(c){
    c.style.width=cw+'px'; c.style.height=ch+'px';
    c.width=Math.round(cw*dpr); c.height=Math.round(ch*dpr);
  });
  _outlineCvW=cw*dpr; _outlineCvH=ch*dpr;
  // 編集用に再描画
  _redrawOutlineCvEdit();
  // イベントを編集用に設定
  ov.addEventListener('touchstart', _outlineTouchStart, {passive:false});
  ov.addEventListener('touchmove',  _outlineTouchMove,  {passive:false});
  ov.addEventListener('touchend',   _outlineTouchEnd,   {passive:false});
  ov.addEventListener('mousedown',  _editOnOvDown);
  ov.addEventListener('mousemove',  _editOnOvMove);
  ov.addEventListener('mouseup',    _editOnOvUp);
}

function _redrawOutlineCvEdit(){
  var cv=document.getElementById('outline-cv'); if(!cv) return;
  var dpr=window.devicePixelRatio||1;
  var W=_outlineCvW, H=_outlineCvH;
  var ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f9f8f6'; ctx.fillRect(0,0,W,H);
  // グリッド
  var g=Math.round(W/12);
  ctx.strokeStyle='rgba(30,45,64,0.07)'; ctx.lineWidth=0.8;
  for(var x=0;x<=W;x+=g){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<=H;y+=g){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  if(_outlineVerts.length<2) return;
  var n=_outlineVerts.length;
  // 辺
  for(var i=0;i<n-1;i++){
    var v1=_outlineVerts[i], v2=_outlineVerts[i+1];
    var isSel=(i===_editSelEdge);
    ctx.beginPath(); ctx.moveTo(v1.x,v1.y); ctx.lineTo(v2.x,v2.y);
    ctx.strokeStyle=isSel?'#c8a96e':'#1e2d40';
    ctx.lineWidth=(isSel?4:2.5)*dpr; ctx.lineCap='round'; ctx.stroke();
    // 辺番号
    var mx=(v1.x+v2.x)/2, my=(v1.y+v2.y)/2;
    var a=Math.atan2(v2.y-v1.y,v2.x-v1.x);
    ctx.fillStyle=isSel?'#b06a00':'rgba(30,45,64,0.55)';
    ctx.font='bold '+(10*dpr)+'px Meiryo,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('辺'+(i+1), mx-Math.sin(a)*14*dpr, my+Math.cos(a)*14*dpr);
  }
  // 頂点
  _outlineVerts.forEach(function(v,i){
    var isSel=(_editSelEdge!==null&&(i===_editSelEdge||i===_editSelEdge+1));
    ctx.fillStyle=isSel?'#c8a96e':'#1e2d40';
    ctx.beginPath(); ctx.arc(v.x,v.y,(isSel?9:5)*dpr,0,Math.PI*2); ctx.fill();
    if(isSel){ctx.strokeStyle='#b06a00';ctx.lineWidth=2*dpr;ctx.stroke();}
  });
}

function _editOnOvDown(e){
  e.preventDefault();
  var ov=document.getElementById('outline-ov'); if(!ov) return;
  var pos=_outlinePos(e,ov);
  var dpr=window.devicePixelRatio||1;
  var n=_outlineVerts.length;
  var snapR=24*dpr;

  // 選択中の辺の端点にヒット？
  if(_editSelEdge!==null){
    var v1=_outlineVerts[_editSelEdge], v2=_outlineVerts[_editSelEdge+1];
    if(v1&&v2){
      var d1=Math.sqrt(Math.pow(pos.x-v1.x,2)+Math.pow(pos.y-v1.y,2));
      var d2=Math.sqrt(Math.pow(pos.x-v2.x,2)+Math.pow(pos.y-v2.y,2));
      if(d1<snapR){ _editDragPt={edgeIdx:_editSelEdge,pt:'start'}; return; }
      if(d2<snapR){ _editDragPt={edgeIdx:_editSelEdge,pt:'end'};   return; }
    }
  }
  // 辺タップで選択
  _editDragPt=null;
  var hitEdge=null, hitDist=20*dpr;
  for(var i=0;i<n-1;i++){
    var va=_outlineVerts[i], vb=_outlineVerts[i+1];
    var dx=vb.x-va.x, dy=vb.y-va.y, len=Math.sqrt(dx*dx+dy*dy)||1;
    var t=((pos.x-va.x)*dx+(pos.y-va.y)*dy)/(len*len);
    t=Math.max(0,Math.min(1,t));
    var nx=va.x+t*dx-pos.x, ny=va.y+t*dy-pos.y;
    var d=Math.sqrt(nx*nx+ny*ny);
    if(d<hitDist){ hitDist=d; hitEdge=i; }
  }
  _editSelEdge=hitEdge;
  _redrawOutlineCvEdit();
}

function _editOnOvMove(e){
  e.preventDefault();
  if(!_editDragPt) return;
  var ov=document.getElementById('outline-ov'); if(!ov) return;
  var pos=_outlinePos(e,ov);
  var ei=_editDragPt.edgeIdx;
  var isPt=(_editDragPt.pt==='start');
  var vi=isPt?ei:ei+1;
  var n=_outlineVerts.length;
  var dpr=window.devicePixelRatio||1;

  // 辺の角度を15度スナップして方向ベクトルを決定
  var edgeV1=_outlineVerts[ei], edgeV2=_outlineVerts[ei+1];
  var edx=edgeV2.x-edgeV1.x, edy=edgeV2.y-edgeV1.y;
  var rawAng=Math.atan2(edy,edx);
  var snapAng=Math.round(rawAng*180/Math.PI/15)*15*Math.PI/180;
  var eax=Math.cos(snapAng), eay=Math.sin(snapAng);
  var fixPt=isPt?edgeV2:edgeV1;
  var t=((pos.x-fixPt.x)*eax+(pos.y-fixPt.y)*eay);
  var newPt={x:Math.round(fixPt.x+t*eax), y:Math.round(fixPt.y+t*eay)};

  // 隣辺吸着
  var snapR=22*dpr;
  if(vi>0&&vi!==ei+1){
    var pp=_outlineVerts[vi-1], pq=_outlineVerts[vi];
    var pdx=pq.x-pp.x,pdy=pq.y-pp.y,pl=Math.sqrt(pdx*pdx+pdy*pdy)||1;
    var pt2=((newPt.x-pp.x)*pdx+(newPt.y-pp.y)*pdy)/(pl*pl);
    var proj={x:pp.x+pt2*pdx,y:pp.y+pt2*pdy};
    if(Math.sqrt(Math.pow(newPt.x-proj.x,2)+Math.pow(newPt.y-proj.y,2))<snapR) newPt={x:Math.round(proj.x),y:Math.round(proj.y)};
  }
  if(vi<n-1&&vi!==ei){
    var np=_outlineVerts[vi],nq=_outlineVerts[vi+1];
    var ndx=nq.x-np.x,ndy=nq.y-np.y,nl=Math.sqrt(ndx*ndx+ndy*ndy)||1;
    var nt2=((newPt.x-np.x)*ndx+(newPt.y-np.y)*ndy)/(nl*nl);
    var nproj={x:np.x+nt2*ndx,y:np.y+nt2*ndy};
    if(Math.sqrt(Math.pow(newPt.x-nproj.x,2)+Math.pow(newPt.y-nproj.y,2))<snapR) newPt={x:Math.round(nproj.x),y:Math.round(nproj.y)};
  }

  _outlineVerts[vi]=newPt;

  // 頂点吸着：辺の延長線上に射影した点で吸着（15度ルール維持）
  var snapPtR=28*dpr;
  for(var si=0;si<n;si++){
    if(si===vi) continue;
    var sv=_outlineVerts[si];
    var sd=Math.sqrt(Math.pow(newPt.x-sv.x,2)+Math.pow(newPt.y-sv.y,2));
    if(sd<snapPtR){
      // svを辺の延長線上に射影
      var toSv={x:sv.x-fixPt.x, y:sv.y-fixPt.y};
      var dot=toSv.x*eax+toSv.y*eay;
      var projX=Math.round(fixPt.x+dot*eax);
      var projY=Math.round(fixPt.y+dot*eay);
      // 射影点がsvに十分近ければ吸着（延長線上にある）
      var offLine=Math.sqrt(Math.pow(sv.x-projX,2)+Math.pow(sv.y-projY,2));
      if(offLine<snapPtR*0.5){
        // svの座標ではなく射影点を使う（15度ルール維持）
        _outlineVerts[vi]={x:projX, y:projY};
        break;
      }
    }
  }

  _redrawOutlineCvEdit();
}

function _editOnOvUp(e){
  e.preventDefault();
  _editDragPt=null;
}

function _initEditCv(){ // 旧関数（互換用・未使用）
}
var _editSelEdge=null;    // 選択中の辺インデックス
var _editDragPt=null;     // ドラッグ中の端点 {edgeIdx, pt:'start'|'end'}
var _editDragStartPos=null;

function outlineEditBack(){
  // 頂点はそのまま保持して描画フェーズに戻る
  _outlineClosed=false;
  _outlinePhase='input';
  _editSelEdge=null;
  _editDragPt=null;
  var fb=document.getElementById('btn-outline-finish');
  if(fb) fb.classList.remove('hidden');
  renderPlan();
}

function outlineEditDone(){
  // 辺数 = 頂点数-1
  _outlineClosed=true;
  _outlinePhase='input';
  _outlineDims=new Array(_outlineVerts.length-1).fill(0);
  _editSelEdge=null; _editDragPt=null;
  renderPlan();
}

function _initEditCv(){
  var cv=document.getElementById('outline-edit-cv'); if(!cv) return;
  var dpr=window.devicePixelRatio||1;
  var cw=cv.parentElement.offsetWidth||320;
  var ch=Math.round(cw*0.75); // 全体が見える高さ
  cv.style.width=cw+'px'; cv.style.height=ch+'px';
  cv.width=Math.round(cw*dpr); cv.height=Math.round(ch*dpr);
  _redrawEditCv();
  cv.addEventListener('touchstart', _editDown, {passive:false});
  cv.addEventListener('touchmove',  _editMove, {passive:false});
  cv.addEventListener('touchend',   _editUp,   {passive:false});
  cv.addEventListener('mousedown',  _editDown);
  cv.addEventListener('mousemove',  _editMove);
  cv.addEventListener('mouseup',    _editUp);
}

function _editCvPos(e){
  var cv=document.getElementById('outline-edit-cv'); if(!cv) return {x:0,y:0};
  var r=cv.getBoundingClientRect();
  var dpr=window.devicePixelRatio||1;
  var src=(e.touches&&e.touches.length>0)?e.touches[0]
        :(e.changedTouches&&e.changedTouches.length>0)?e.changedTouches[0]:e;
  return {x:(src.clientX-r.left)*dpr, y:(src.clientY-r.top)*dpr};
}

function _editScale(){
  var cv=document.getElementById('outline-edit-cv'); if(!cv) return null;
  var dpr=window.devicePixelRatio||1;
  var W=cv.width, H=cv.height;
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  _outlineVerts.forEach(function(v){
    minX=Math.min(minX,v.x); minY=Math.min(minY,v.y);
    maxX=Math.max(maxX,v.x); maxY=Math.max(maxY,v.y);
  });
  var pad=40*dpr;
  var vw=maxX-minX||1, vh=maxY-minY||1;
  // 描画フェーズと同じスケールを使用（拡大しない）
  var sc=_outlineDrawSc||Math.min((W-pad*2)/vw,(H-pad*2)/vh);
  var ox=(W-vw*sc)/2, oy=(H-vh*sc)/2;
  return {sc:sc, ox:ox, oy:oy, minX:minX, minY:minY, dpr:dpr};
}

function _editV2C(vx,vy,s){ return {x:s.ox+(vx-s.minX)*s.sc, y:s.oy+(vy-s.minY)*s.sc}; }
function _editC2V(cx,cy,s){ return {x:(cx-s.ox)/s.sc+s.minX, y:(cy-s.oy)/s.sc+s.minY}; }

function _redrawEditCv(){
  var cv=document.getElementById('outline-edit-cv'); if(!cv) return;
  var s=_editScale(); if(!s) return;
  var ctx=cv.getContext('2d');
  var W=cv.width, H=cv.height, dpr=s.dpr;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f9f8f6'; ctx.fillRect(0,0,W,H);
  var n=_outlineVerts.length;
  if(n<1) return;

  // 辺を描画
  for(var i=0;i<n-1;i++){
    var p1=_editV2C(_outlineVerts[i].x,_outlineVerts[i].y,s);
    var p2=_editV2C(_outlineVerts[i+1].x,_outlineVerts[i+1].y,s);
    var isSel=(i===_editSelEdge);
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
    ctx.strokeStyle=isSel?'#c8a96e':'rgba(30,45,64,0.8)';
    ctx.lineWidth=(isSel?4:2.5)*dpr; ctx.lineCap='round'; ctx.stroke();
    // 辺番号
    var mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    var a=Math.atan2(p2.y-p1.y,p2.x-p1.x);
    ctx.fillStyle=isSel?'#b06a00':'rgba(30,45,64,0.5)';
    ctx.font='bold '+(10*dpr)+'px Meiryo,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('辺'+(i+1), mx-Math.sin(a)*14*dpr, my+Math.cos(a)*14*dpr);
  }

  // 頂点
  _outlineVerts.forEach(function(v,i){
    var p=_editV2C(v.x,v.y,s);
    var isEndpt=(_editSelEdge!==null&&(i===_editSelEdge||i===_editSelEdge+1));
    ctx.beginPath(); ctx.arc(p.x,p.y,(isEndpt?10:5)*dpr,0,Math.PI*2);
    ctx.fillStyle=isEndpt?'#c8a96e':'rgba(30,45,64,0.6)';
    ctx.fill();
    if(isEndpt){
      ctx.strokeStyle='#b06a00'; ctx.lineWidth=2*dpr; ctx.stroke();
    }
  });
}

function _editDown(e){
  e.preventDefault();
  var pos=_editCvPos(e);
  var s=_editScale(); if(!s) return;
  var dpr=s.dpr;
  var snapR=24*dpr;

  // まず選択中の辺の端点にヒットするか
  if(_editSelEdge!==null){
    var v1=_outlineVerts[_editSelEdge];
    var v2=_outlineVerts[_editSelEdge+1];
    if(v1&&v2){
      var p1=_editV2C(v1.x,v1.y,s);
      var p2=_editV2C(v2.x,v2.y,s);
      var d1=Math.sqrt(Math.pow(pos.x-p1.x,2)+Math.pow(pos.y-p1.y,2));
      var d2=Math.sqrt(Math.pow(pos.x-p2.x,2)+Math.pow(pos.y-p2.y,2));
      if(d1<snapR){ _editDragPt={edgeIdx:_editSelEdge, pt:'start'}; _editDragStartPos=pos; return; }
      if(d2<snapR){ _editDragPt={edgeIdx:_editSelEdge, pt:'end'};   _editDragStartPos=pos; return; }
    }
  }

  // 辺をタップして選択
  _editDragPt=null;
  var n=_outlineVerts.length;
  var hitEdge=null, hitDist=20*dpr;
  for(var i=0;i<n-1;i++){
    var va=_outlineVerts[i], vb=_outlineVerts[i+1];
    var pa=_editV2C(va.x,va.y,s), pb=_editV2C(vb.x,vb.y,s);
    // 点と線分の距離
    var dx=pb.x-pa.x, dy=pb.y-pa.y, len=Math.sqrt(dx*dx+dy*dy)||1;
    var t=((pos.x-pa.x)*dx+(pos.y-pa.y)*dy)/(len*len);
    t=Math.max(0,Math.min(1,t));
    var nx=pa.x+t*dx-pos.x, ny=pa.y+t*dy-pos.y;
    var d=Math.sqrt(nx*nx+ny*ny);
    if(d<hitDist){ hitDist=d; hitEdge=i; }
  }
  _editSelEdge=hitEdge;
  _redrawEditCv();
}

function _editMove(e){
  e.preventDefault();
  if(!_editDragPt) return;
  var pos=_editCvPos(e);
  var s=_editScale(); if(!s) return;
  var v=_editC2V(pos.x,pos.y,s);
  var ei=_editDragPt.edgeIdx;
  var isPt=(_editDragPt.pt==='start');
  var vi=isPt?ei:ei+1; // 動かす頂点インデックス
  var n=_outlineVerts.length;

  // 辺の角度を固定：選択辺の方向ベクトルに沿って端点を移動（延長・縮小のみ）
  var edgeV1=_outlineVerts[ei], edgeV2=_outlineVerts[ei+1];
  var edx=edgeV2.x-edgeV1.x, edy=edgeV2.y-edgeV1.y;
  var elen=Math.sqrt(edx*edx+edy*edy)||1;
  var eax=edx/elen, eay=edy/elen; // 辺の単位方向ベクトル

  // 固定点（動かさない端点）
  var fixPt=isPt?edgeV2:edgeV1;
  // ドラッグ位置を辺の直線上に射影
  var t=((v.x-fixPt.x)*eax+(v.y-fixPt.y)*eay);
  var newPt={x:Math.round(fixPt.x+t*eax), y:Math.round(fixPt.y+t*eay)};

  // 隣の辺の延長線に近づいたら吸着
  var snapR=22*s.dpr;
  // 前の辺の延長線（viの前がある場合）
  if(vi>0 && vi!==ei+1){
    var pp=_outlineVerts[vi-1];
    var pdx=edgeV1.x-pp.x, pdy=edgeV1.y-pp.y, pl=Math.sqrt(pdx*pdx+pdy*pdy)||1;
    var pt2=((newPt.x-pp.x)*pdx+(newPt.y-pp.y)*pdy)/(pl*pl);
    var proj={x:pp.x+pt2*pdx, y:pp.y+pt2*pdy};
    var d=Math.sqrt(Math.pow(newPt.x-proj.x,2)+Math.pow(newPt.y-proj.y,2))*s.sc;
    if(d<snapR) newPt={x:Math.round(proj.x), y:Math.round(proj.y)};
  }
  if(vi<n-1 && vi!==ei){
    var np=_outlineVerts[vi+1];
    var ndx=np.x-edgeV2.x, ndy=np.y-edgeV2.y, nl=Math.sqrt(ndx*ndx+ndy*ndy)||1;
    var nt2=((newPt.x-edgeV2.x)*ndx+(newPt.y-edgeV2.y)*ndy)/(nl*nl);
    var nproj={x:edgeV2.x+nt2*ndx, y:edgeV2.y+nt2*ndy};
    var nd=Math.sqrt(Math.pow(newPt.x-nproj.x,2)+Math.pow(newPt.y-nproj.y,2))*s.sc;
    if(nd<snapR) newPt={x:Math.round(nproj.x), y:Math.round(nproj.y)};
  }

  _outlineVerts[vi]=newPt;
  _redrawEditCv();
}

function _editUp(e){
  e.preventDefault();
  _editDragPt=null;
  _editDragStartPos=null;
}

function outlineAutoClose(){ // 旧関数（互換用）
  if(_outlineVerts.length<3) return;
  // 最後の頂点を最初の頂点に強制スナップ（同一視）
  // → 最後の頂点は削除して最初の頂点で閉じる
  var first=_outlineVerts[0];
  var last=_outlineVerts[_outlineVerts.length-1];
  var dist=Math.sqrt(Math.pow(last.x-first.x,2)+Math.pow(last.y-first.y,2));
  // 最後の頂点が最初の頂点にほぼ重なっていれば削除
  if(dist<20*(window.devicePixelRatio||1)){
    _outlineVerts.pop();
  }
  _outlineClosed=true;
  _outlineDims=new Array(_outlineVerts.length).fill(0);
  renderPlan();
}

function outlineCancelMode(){
  _planMode='none';
  _outlineVerts=[]; _outlineClosed=false; _outlineSelEdge=null; _outlinePreview=null;
  _outlineDims=[]; _outlineAutoCorner=false; _outlineAdjIdx=null; _outlinePhase='input';
  _outlineLockEdges=new Set();
  roomData._setupMode=null;
  roomData.W=0; roomData.D=0; roomData.H=0;
  var fb=document.getElementById('btn-outline-finish');
  if(fb) fb.classList.add('hidden');
  renderPlan();
}

function outlineUndo(){
  if(_outlineVerts.length===0) return;
  _outlineVerts.pop();
  if(_outlineVerts.length>0){
    var last=_outlineVerts[_outlineVerts.length-1];
    _outlineStartX=last.x; _outlineStartY=last.y;
  }
  _redrawOutlineCv();
  var guide=document.getElementById('outline-guide');
  if(guide){
    if(_outlineVerts.length===0) guide.textContent='ドラッグして最初の辺を描いてください';
    else guide.textContent='続けてドラッグ → 終了で閉じる';
  }
  var undoBtn=document.getElementById('outline-undo-btn');
  if(undoBtn){
    undoBtn.disabled=(_outlineVerts.length===0);
    undoBtn.style.opacity=(_outlineVerts.length===0)?'0.35':'1';
  }
  _updateUndoBtn();
}

function outlineClear(){
  _outlineVerts=[]; _outlineClosed=false; _outlineSelEdge=null; _outlineDims=[];
  _outlineStartX=0; _outlineStartY=0; _outlineAutoCorner=false;
  _redrawOutlineCv();
  var guide=document.getElementById('outline-guide');
  if(guide) guide.textContent='ドラッグして最初の辺を描いてください';

function _initOutlineCv(){
  var cv=document.getElementById('outline-cv'); if(!cv) return;
  var ov=document.getElementById('outline-ov'); if(!ov) return;
  _panOffsetX=0; _panOffsetY=0; _isPanning=false;
  cv.style.transform=''; ov.style.transform='';
  var dpr=window.devicePixelRatio||1;
  var cw=cv.parentElement.offsetWidth||320;
  var ch=Math.round(cw*1.05);
  [cv,ov].forEach(function(c){
    c.style.width=cw+'px'; c.style.height=ch+'px';
    c.width=Math.round(cw*dpr); c.height=Math.round(ch*dpr);
  });
  _outlineCvW=cw*dpr; _outlineCvH=ch*dpr;
  // 描画スケールを保存（編集フェーズで同じスケールを使用）
  if(_outlineVerts.length>=2){
    var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    _outlineVerts.forEach(function(v){minX=Math.min(minX,v.x);minY=Math.min(minY,v.y);maxX=Math.max(maxX,v.x);maxY=Math.max(maxY,v.y);});
    var vw=maxX-minX||1, vh=maxY-minY||1, pad=40*dpr;
    _outlineDrawSc=Math.min((_outlineCvW-pad*2)/vw,(_outlineCvH-pad*2)/vh);
  }
  _redrawOutlineCv();
  ov.addEventListener('touchstart', _outlineTouchStart, {passive:false});
  ov.addEventListener('touchmove',  _outlineTouchMove,  {passive:false});
  ov.addEventListener('touchend',   _outlineTouchEnd,   {passive:false});
  ov.addEventListener('mousedown',  _outlineDown);
  ov.addEventListener('mousemove',  _outlineMove);
  ov.addEventListener('mouseup',    _outlineUp);
}

// 2本指パン用変数
var _panStartX=0, _panStartY=0;
var _panOffsetX=0, _panOffsetY=0;
var _isPanning=false;

function _outlineTouchStart(e){
  if(e.touches.length===2){
    e.preventDefault();
    _isPanning=true;
    _panStartX=(e.touches[0].clientX+e.touches[1].clientX)/2;
    _panStartY=(e.touches[0].clientY+e.touches[1].clientY)/2;
  } else {
    _isPanning=false;
    if(_outlinePhase==='edit') _editOnOvDown(e);
    else _outlineDown(e);
  }
}

function _outlineTouchMove(e){
  if(_isPanning&&e.touches.length===2){
    e.preventDefault();
    var cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    var cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    var dy=cy-_panStartY; // 上下のみ
    _panOffsetY+=dy;
    _panStartX=cx; _panStartY=cy;
    var cv=document.getElementById('outline-cv');
    var ov2=document.getElementById('outline-ov');
    var tr='translate(0px,'+_panOffsetY+'px)';
    if(cv) cv.style.transform=tr;
    if(ov2) ov2.style.transform=tr;
  } else if(!_isPanning){
    if(_outlinePhase==='edit') _editOnOvMove(e);
    else _outlineMove(e);
  }
}

function _outlineTouchEnd(e){
  if(_isPanning&&e.touches.length<2){
    _isPanning=false;
  } else if(!_isPanning){
    if(_outlinePhase==='edit') _editOnOvUp(e);
    else _outlineUp(e);
  }
}

function _outlinePos(e, el){
  var r=el.getBoundingClientRect();
  var dpr=window.devicePixelRatio||1;
  var src=(e.touches&&e.touches.length>0)?e.touches[0]
        :(e.changedTouches&&e.changedTouches.length>0)?e.changedTouches[0]:e;
  return {x:(src.clientX-r.left)*dpr, y:(src.clientY-r.top)*dpr};
}

function _outline15snap(fx,fy,tx,ty){
  var dx=tx-fx,dy=ty-fy;
  var len=Math.sqrt(dx*dx+dy*dy);
  if(len<2) return {x:tx,y:ty};
  var ang=Math.round(Math.atan2(dy,dx)*180/Math.PI/15)*15*Math.PI/180;
  return {x:Math.round(fx+Math.cos(ang)*len), y:Math.round(fy+Math.sin(ang)*len)};
}

function _redrawOutlineCv(){
  var cv=document.getElementById('outline-cv'); if(!cv) return;
  var dpr=window.devicePixelRatio||1;
  var W=_outlineCvW, H=_outlineCvH;
  var ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f9f8f6'; ctx.fillRect(0,0,W,H);
  // グリッド
  var g=Math.round(W/12);
  ctx.strokeStyle='rgba(30,45,64,0.07)'; ctx.lineWidth=0.8;
  for(var x=0;x<=W;x+=g){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<=H;y+=g){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.strokeStyle='rgba(30,45,64,0.14)'; ctx.lineWidth=1;
  for(var x2=0;x2<=W;x2+=g*5){ctx.beginPath();ctx.moveTo(x2,0);ctx.lineTo(x2,H);ctx.stroke();}
  for(var y2=0;y2<=H;y2+=g*5){ctx.beginPath();ctx.moveTo(0,y2);ctx.lineTo(W,y2);ctx.stroke();}
  if(_outlineVerts.length===0) return;
  // 確定辺
  ctx.strokeStyle='#1e2d40'; ctx.lineWidth=2.5*dpr;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(_outlineVerts[0].x,_outlineVerts[0].y);
  for(var vi=1;vi<_outlineVerts.length;vi++) ctx.lineTo(_outlineVerts[vi].x,_outlineVerts[vi].y);
  ctx.stroke();
  // 辺番号
  for(var ei=0;ei<_outlineVerts.length-1;ei++){
    var v1=_outlineVerts[ei],v2=_outlineVerts[ei+1];
    var mx=(v1.x+v2.x)/2,my=(v1.y+v2.y)/2;
    var a=Math.atan2(v2.y-v1.y,v2.x-v1.x);
    ctx.fillStyle='rgba(30,45,64,0.55)';
    ctx.font='bold '+(10*dpr)+'px Meiryo,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('辺'+(ei+1), mx-Math.sin(a)*14*dpr, my+Math.cos(a)*14*dpr);
  }
  // 頂点
  _outlineVerts.forEach(function(v,i){
    ctx.fillStyle=i===0?'#c8a96e':'#1e2d40';
    ctx.beginPath(); ctx.arc(v.x,v.y,(i===0?8:5)*dpr,0,Math.PI*2); ctx.fill();
    if(i===0){
      ctx.strokeStyle='#b06a00'; ctx.lineWidth=2*dpr;
      ctx.beginPath(); ctx.arc(v.x,v.y,12*dpr,0,Math.PI*2); ctx.stroke();
    }
  });
}

var _outlineCvW=320, _outlineCvH=350;
var _outlineDrawSc=1; // 描画フェーズのスケール（編集フェーズで流用）

function _outlineDown(e){
  e.preventDefault();
  var ov=document.getElementById('outline-ov'); if(!ov) return;
  var pos=_outlinePos(e,ov);
  // 頂点が0個：タッチダウン位置が起点
  // 頂点が1個以上：前の終点から続ける
  if(_outlineVerts.length===0){
    _outlineStartX=pos.x; _outlineStartY=pos.y;
  } else {
    var last=_outlineVerts[_outlineVerts.length-1];
    _outlineStartX=last.x; _outlineStartY=last.y;
  }
  _outlineIsDrawing=true;
}

function _outlineMove(e){
  e.preventDefault();
  if(!_outlineIsDrawing) return;
  var ov=document.getElementById('outline-ov'); if(!ov) return;
  var pos=_outlinePos(e,ov);
  var dpr=window.devicePixelRatio||1;
  var snapped=_outline15snap(_outlineStartX,_outlineStartY,pos.x,pos.y);
  var oCtx=ov.getContext('2d');
  oCtx.clearRect(0,0,ov.width,ov.height);
  oCtx.strokeStyle='rgba(200,169,110,0.9)'; oCtx.lineWidth=2.5*dpr; oCtx.lineCap='round';
  oCtx.beginPath(); oCtx.moveTo(_outlineStartX,_outlineStartY); oCtx.lineTo(snapped.x,snapped.y); oCtx.stroke();
  var ang=Math.round(Math.atan2(snapped.y-_outlineStartY,snapped.x-_outlineStartX)*180/Math.PI);
  oCtx.fillStyle='rgba(30,45,64,0.65)';
  oCtx.font='bold '+(10*dpr)+'px Meiryo,sans-serif';
  oCtx.textAlign='center'; oCtx.textBaseline='bottom';
  oCtx.fillText(ang+'°', (_outlineStartX+snapped.x)/2, (_outlineStartY+snapped.y)/2-4*dpr);
}

function _outlineUp(e){
  e.preventDefault();
  var ov=document.getElementById('outline-ov'); if(!ov) return;
  var oCtx=ov.getContext('2d');
  oCtx.clearRect(0,0,ov.width,ov.height);
  if(!_outlineIsDrawing) return;
  _outlineIsDrawing=false;
  var pos=_outlinePos(e,ov);
  var dpr=window.devicePixelRatio||1;
  var dist=Math.sqrt(Math.pow(pos.x-_outlineStartX,2)+Math.pow(pos.y-_outlineStartY,2));
  if(dist<8*dpr) return; // 最小ドラッグ距離
  var snapped=_outline15snap(_outlineStartX,_outlineStartY,pos.x,pos.y);
  // 初辺なら起点も追加
  if(_outlineVerts.length===0) _outlineVerts.push({x:Math.round(_outlineStartX),y:Math.round(_outlineStartY)});
  _outlineVerts.push({x:snapped.x,y:snapped.y});
  // 次の辺の開始点を自動セット
  _outlineStartX=snapped.x; _outlineStartY=snapped.y;
  _redrawOutlineCv();
  var guide=document.getElementById('outline-guide');
  if(guide) guide.textContent='続けてドラッグ → 終了ボタンで完成';
  _updateUndoBtn();
  projAutoSave(); // 辺追加のたびに保存
}

// ══════════════════════════════════════════
//  外周作図 補助関数群（内寸対応版）
// ══════════════════════════════════════════

// 辺の方向（'h'=横 'v'=縦）
function _outlineEdgeDir(idx){
  var v1=_outlineVerts[idx], v2=_outlineVerts[idx+1];
  if(!v1||!v2) return 'h';
  return Math.abs(v2.x-v1.x)>=Math.abs(v2.y-v1.y)?'h':'v';
}

// 辺の向き符号（右/下=+1, 左/上=-1）
function _outlineEdgeSign(idx){
  var v1=_outlineVerts[idx], v2=_outlineVerts[idx+1];
  if(!v1||!v2) return 1;
  var dir=_outlineEdgeDir(idx);
  return dir==='h'?(v2.x>=v1.x?1:-1):(v2.y>=v1.y?1:-1);
}

// 内寸 → 外寸（壁厚T加算）
function _innerToOuter(dim){
  return dim + roomData.wallT;
}

// 誤差計算：各辺の外寸（内寸+T）の符号付き合計
// 閉じた外周では 横成分合計=0、縦成分合計=0 が正解
function _outlineCalcError(){
  var xSum=0, ySum=0;
  for(var i=0;i<_outlineDims.length;i++){
    var dir=_outlineEdgeDir(i);
    var sign=_outlineEdgeSign(i);
    var outerDim=_innerToOuter(_outlineDims[i]);
    if(dir==='h') xSum += sign * outerDim;
    else          ySum += sign * outerDim;
  }
  return {xErr: Math.round(xSum), yErr: Math.round(ySum)};
}

// 守られていない辺の中から吸収辺を決定（最長辺）
function _outlineCalcAbsorbIdx(){
  var errInfo=_outlineCalcError();
  if(errInfo.xErr===0&&errInfo.yErr===0) return null;
  var best=null, bestLen=0;
  for(var i=0;i<_outlineDims.length;i++){
    if(_outlineLockEdges.has(i)) continue;
    var dir=_outlineEdgeDir(i);
    var isErrDir=(dir==='h'&&errInfo.xErr!==0)||(dir==='v'&&errInfo.yErr!==0);
    if(!isErrDir) continue;
    if(_outlineDims[i]>bestLen){ bestLen=_outlineDims[i]; best=i; }
  }
  return best;
}

// 吸収辺の調整後内寸を計算
function _outlineCalcAbsorbDim(idx){
  var errInfo=_outlineCalcError();
  var dir=_outlineEdgeDir(idx);
  var sign=_outlineEdgeSign(idx);
  var err=dir==='h'?errInfo.xErr:errInfo.yErr;
  if(err===0) return _outlineDims[idx];
  // 外寸を sign*err 分縮める → 内寸 = 現内寸 - sign*err
  var newInner=_outlineDims[idx] - sign * err;
  return Math.max(1, Math.round(newInner));
}

// 守る辺のトグル（誤差方向の辺のみ）
function toggleLockEdge(idx){
  var errInfo=_outlineCalcError();
  var dir=_outlineEdgeDir(idx);
  var isErrDir=(dir==='h'&&errInfo.xErr!==0)||(dir==='v'&&errInfo.yErr!==0);
  if(!isErrDir) return;
  if(_outlineLockEdges.has(idx)) _outlineLockEdges.delete(idx);
  else _outlineLockEdges.add(idx);
  renderPlan();
}

// 「生成して確認」：全辺入力チェック → 誤差確認フェーズへ
// 「描き直す」：外周をリセットして作図画面に戻り、終了ボタンを再表示
function outlineRedraw(){
  _outlineClosed=false;
  _outlineVerts=[];
  _outlineDims=[];
  _outlinePhase='input';
  _outlineAdjIdx=null;
  _outlineLockEdges=new Set();
  _outlineAutoCorner=false;
  _editSelEdge=null; _editDragPt=null;
  roomData.W=0; roomData.D=0; roomData.H=0;
  var fb=document.getElementById('btn-outline-finish');
  if(fb) fb.classList.remove('hidden');
  renderPlan();
}

function outlineGenerate(){
  var hEl=document.getElementById('outline-H');
  var h=parseInt(hEl?hEl.value:0)||0;
  if(!h){ showWaToast('⚠ 高さ H を入力してください'); return; }
  roomData.H=h;
  for(var i=0;i<_outlineDims.length;i++){
    var el=document.getElementById('odim-'+i);
    var v=parseInt(el?el.value:0)||0;
    if(el) _outlineDims[i]=v;
    if(!v){ showWaToast('⚠ 辺'+(i+1)+'の寸法を入力してください'); return; }
  }
  _outlinePhase='check';
  _outlineLockEdges=new Set();
  renderPlan();
}

function selectOutlineEdge(idx){
  _outlineSelEdge=(_outlineSelEdge===idx)?null:idx;
}

function outlineConfirm(){
  if(_outlineVerts.length<3||!_outlineClosed){ showWaToast('外周を閉じてから確定してください'); return; }
  var h=roomData.H||0;
  if(!h){ showWaToast('⚠ 高さ H を入力してください'); return; }

  // 吸収辺がある場合は内寸を自動調整
  var absorbIdx=_outlineCalcAbsorbIdx();
  if(absorbIdx!==null){
    var adjDim=_outlineCalcAbsorbDim(absorbIdx);
    if(adjDim!==null) _outlineDims[absorbIdx]=adjDim;
  }

  // 各辺の角度（スケッチから）＋内寸で頂点を再計算（仮起点0,0）
  var T=roomData.wallT;
  var newVerts=[{x:0,y:0}];
  for(var j=0;j<_outlineDims.length;j++){
    var sv1=_outlineVerts[j], sv2=_outlineVerts[j+1];
    if(!sv1||!sv2) continue;
    var sdx=sv2.x-sv1.x, sdy=sv2.y-sv1.y;
    var ang=Math.atan2(sdy,sdx);
    var snapAng=Math.round(ang*180/Math.PI/15)*15*Math.PI/180;
    var prev=newVerts[newVerts.length-1];
    newVerts.push({
      x: Math.round(prev.x + Math.cos(snapAng)*_outlineDims[j]),
      y: Math.round(prev.y + Math.sin(snapAng)*_outlineDims[j])
    });
  }

  // バウンディングボックスでW・D算出
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  newVerts.forEach(function(v){
    minX=Math.min(minX,v.x); minY=Math.min(minY,v.y);
    maxX=Math.max(maxX,v.x); maxY=Math.max(maxY,v.y);
  });

  pushHistory();
  roomData.W=Math.round(maxX-minX);
  roomData.D=Math.round(maxY-minY);
  roomData.H=h;
  roomData._outline=newVerts.map(function(v){return{x:v.x-minX,y:v.y-minY};});
  roomData._setupMode=null;
  _outlineVerts=[]; _outlineClosed=false; _outlineSelEdge=null; _outlinePreview=null;
  _outlineDims=[]; _outlineAutoCorner=false; _outlineAdjIdx=null; _outlinePhase='input';
  _outlineLockEdges=new Set();
  _planMode='none';
  var fb=document.getElementById('btn-outline-finish');
  if(fb) fb.classList.add('hidden');
  renderPlan();
  showWaToast('✅ 外周確定 W'+roomData.W+' D'+roomData.D+' H'+h);
}

function _planSc(){
  var cv=document.getElementById('zumen-cv'); if(!cv) return null;
  var W=roomData.W, D=roomData.D, T=roomData.wallT;
  var CW=cv.offsetWidth||340;
  var mL=56,mR=20,mT=20,mB=56;
  var sc=Math.min((CW-mL-mR)/W,370/D);
  // ドア弧余白確保（redrawPlanと同じ縮小ロジック）
  var Tpx0=T*sc;
  var maxArcL=0,maxArcR=0,maxArcU=0,maxArcD=0;
  [{fi:0,dir:'U'},{fi:2,dir:'D'},{fi:1,dir:'R'},{fi:3,dir:'L'}].forEach(function(f){
    faceOpenings[f.fi].forEach(function(op){
      if(!isDoor(op.type)) return;
      if(f.dir==='U') maxArcU=Math.max(maxArcU,op.w);
      if(f.dir==='D') maxArcD=Math.max(maxArcD,op.w);
      if(f.dir==='L') maxArcL=Math.max(maxArcL,op.w);
      if(f.dir==='R') maxArcR=Math.max(maxArcR,op.w);
    });
  });
  var needL=Tpx0+maxArcL*sc+36, needR=Tpx0+maxArcR*sc+16;
  var needT=Tpx0+maxArcU*sc+16, needB=Tpx0+maxArcD*sc+36;
  var scL=needL>mL?sc*(mL/needL):sc, scR=needR>mR?sc*(mR/needR):sc;
  var scT=needT>mT?sc*(mT/needT):sc, scB=needB>mB?sc*(mB/needB):sc;
  sc=Math.max(Math.min(sc,scL,scR,scT,scB),0.01);
  var Tpx=T*sc;
  var ox=mL, oy=mT;
  // 内寸基準原点（外周モード：内壁面が基準、四角モード：外壁面=内壁面）
  var hasInner=(roomData._innerW>0);
  var pox=hasInner?(ox+Tpx/2):ox;
  var poy=hasInner?(oy+Tpx/2):oy;
  var iW=hasInner?(roomData._innerW||W):W;
  var iD=hasInner?(roomData._innerD||D):D;
  return{sc:sc, ox:ox, oy:oy, pox:pox, poy:poy, iW:iW, iD:iD, W:W, D:D, Tpx:Tpx, cv:cv};
}

function _snapMm(px, info){
  var iW=info.iW||info.W, iD=info.iD||info.D;
  var pox=info.pox||info.ox, poy=info.poy||info.oy;
  return{
    x:Math.max(0,Math.min(iW, Math.round((px.x-pox)/info.sc/10)*10)),
    y:Math.max(0,Math.min(iD, Math.round((px.y-poy)/info.sc/10)*10))
  };
}

function _pxToMm(pxX, pxY, info){
  // canvas座標 → mm（クランプなし、外周作図用）
  return{
    x: (pxX-info.ox)/info.sc,
    y: (pxY-info.oy)/info.sc
  };
}

// 既存間仕切りのコーナー端点リストを返す
function _getPartitionCorners(){
  var corners=[];
  planPartitions.forEach(function(p){
    if(p.axis==='v'){
      corners.push({x:p.pos, y:p.start, axis:'v', end:'start'});
      corners.push({x:p.pos, y:p.start+p.len, axis:'v', end:'end'});
    } else {
      corners.push({x:p.start,   y:p.pos, axis:'h', end:'start'});
      corners.push({x:p.start+p.len, y:p.pos, axis:'h', end:'end'});
    }
  });
  return corners;
}

// 既存間仕切りの端面にスナップ（終点用）
// mode='v'（縦壁）: 終点Y → 既存横壁の上面・下面にスナップ
// mode='h'（横壁）: 終点X → 既存縦壁の左面・右面にスナップ
// 既存間仕切りのコーナー点にスナップ
// axisSnap='x': 横壁の端点X → 既存縦壁のコーナーX座標にスナップ
//               縦壁のposX  → 既存横壁のコーナーX座標にスナップ（並走防止）
// axisSnap='y': 縦壁の端点Y → 既存横壁のコーナーY座標にスナップ
//               横壁のposY  → 既存縦壁のコーナーY座標にスナップ（並走防止）
// srcAxis: 'same'=同軸壁のコーナー, 'cross'=異軸壁のコーナー
// 新しい壁の終点が既存壁の面に壁厚以内なら吸着
function _snapEndToPartition(val, axisSnap, SNAP, srcAxis){
  var T=roomData.wallT;
  var best=null, bestDist=T+1; // 壁厚以内なら吸着
  planPartitions.forEach(function(p){
    var halfT=Math.round((p.t||T)/2);
    if((axisSnap==='x'||axisSnap==='pos_x') && p.axis==='v'){
      [p.pos-halfT, p.pos+halfT].forEach(function(face){
        var d=Math.abs(val-face);
        if(d<bestDist){ bestDist=d; best=face; }
      });
    }
    if((axisSnap==='y'||axisSnap==='pos_y') && p.axis==='h'){
      [p.pos-halfT, p.pos+halfT].forEach(function(face){
        var d=Math.abs(val-face);
        if(d<bestDist){ bestDist=d; best=face; }
      });
    }
  });
  return best!==null?best:val;
}

// 外周壁スナップ（始点・終点共通）
function _snapToOuterWall(val, max, SNAP){
  if(val<=SNAP) return 0;
  if(val>=max-SNAP) return max;
  return val;
}
