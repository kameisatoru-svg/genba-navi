function redrawPlan(){
  var cv=document.getElementById('zumen-cv'); if(!cv) return;
  var W=roomData.W, D=roomData.D, T=roomData.wallT;
  var CW=cv.offsetWidth||340;

  // ── ドア弧の最大はみ出し量（mm）を事前計算 ──
  var maxArcU=0,maxArcD=0,maxArcL=0,maxArcR=0;
  [{fi:0,dir:'U'},{fi:2,dir:'D'},{fi:1,dir:'R'},{fi:3,dir:'L'}].forEach(function(f){
    faceOpenings[f.fi].forEach(function(op){
      if(!isDoor(op.type)) return;
      if(f.dir==='U') maxArcU=Math.max(maxArcU,op.w);
      if(f.dir==='D') maxArcD=Math.max(maxArcD,op.w);
      if(f.dir==='L') maxArcL=Math.max(maxArcL,op.w);
      if(f.dir==='R') maxArcR=Math.max(maxArcR,op.w);
    });
  });

  // ── 余白・スケール計算（2パス方式でキャンバス収まりを保証）──
  var mR=20, mT=20;
  var _hasInnerRD=(roomData._innerW>0);

  // ── パス1：暫定sc（mL/mB固定）でTpxを求めmL/mBを決定 ──
  var _mL1=56, _mB1=56;
  var _sc1=Math.max(Math.min((CW-_mL1-mR)/W, 370/D), 0.01);
  var _Tpx1=T*_sc1;
  // 間仕切りかわし追加余白
  var _addB1=0;
  var _hasHPart1=planPartitions.some(function(p){return p.axis==='h';});
  if(_hasHPart1) _addB1=10; // 横壁下引き出し線とdYのかわし
  planPartitions.forEach(function(p){
    if(p.axis!=='v') return;
    var dO1=(p.dimOffset||0)*_sc1;
    var _poy1=_hasInnerRD?(mT+_Tpx1/2):mT;
    var _outerB1=mT+((_hasInnerRD?(roomData._innerD||D):D)*_sc1)+_Tpx1;
    var vY1=_poy1+(p.start+p.len/2)*_sc1+dO1;
    var over1=vY1-(_outerB1+6);
    if(over1>0) _addB1=Math.max(_addB1, over1+10);
  });
  // mL：Tpx+外周寸法幅(16)+テキスト(28)+余裕(4) = Tpx+48、ただし最低56
  var mL=Math.max(56, Math.ceil(_Tpx1)+48);
  var mB=Math.max(56, Math.ceil(_Tpx1)+42+_addB1);

  // ── パス2：確定sc計算 ──
  var sc=Math.min((CW-mL-mR)/W, 370/D);
  // ドア弧余白確認
  var Tpx0=T*sc;
  var needL=Tpx0+maxArcL*sc+36, needR=Tpx0+maxArcR*sc+16;
  var needT=Tpx0+maxArcU*sc+16, needB=Tpx0+maxArcD*sc+36;
  var scL=needL>mL?sc*(mL/needL):sc, scR=needR>mR?sc*(mR/needR):sc;
  var scT=needT>mT?sc*(mT/needT):sc, scB=needB>mB?sc*(mB/needB):sc;
  sc=Math.max(Math.min(sc,scL,scR,scT,scB), 0.01);

  var Tpx=T*sc;
  var rw=W*sc, rd=D*sc;
  var CH=rd+mT+mB;
  var ox=mL, oy=mT;
  // 内寸基準原点（間仕切り座標系）
  var iW=_hasInnerRD?(roomData._innerW||W):W;
  var iD=_hasInnerRD?(roomData._innerD||D):D;
  var pox=_hasInnerRD?(ox+Tpx/2):ox;
  var poy=_hasInnerRD?(oy+Tpx/2):oy;

  var ctx=setupCanvas(cv,CW,CH);
  ctx.clearRect(0,0,CW,CH);

  // ── 内法ポリゴンパス（_outline=内法頂点、なければ矩形）──
  function _makeInnerPath(ctx){
    ctx.beginPath();
    if(roomData._outline&&roomData._outline.length>=3){
      var ol=roomData._outline;
      ctx.moveTo(ox+ol[0].x*sc, oy+ol[0].y*sc);
      for(var ii=1;ii<ol.length;ii++) ctx.lineTo(ox+ol[ii].x*sc, oy+ol[ii].y*sc);
      ctx.closePath();
    } else {
      ctx.rect(ox, oy, rw, rd);
    }
  }

  // 外壁：内法パスを壁厚px×2の太線でストローク → 外側に壁厚分はみ出す
  ctx.save();
  ctx.lineJoin='miter'; ctx.miterLimit=10;
  ctx.lineWidth=Tpx*2;
  ctx.strokeStyle='rgba(30,45,64,0.7)';
  _makeInnerPath(ctx); ctx.stroke();
  ctx.restore();

  // 内法を白で塗りつぶし（壁を内側に隠す）
  ctx.fillStyle='#f9f8f6';
  _makeInnerPath(ctx); ctx.fill();

  // グリッド（内法クリップ）
  ctx.save();
  _makeInnerPath(ctx); ctx.clip();
  ctx.strokeStyle='rgba(30,45,64,0.06)'; ctx.lineWidth=0.7; ctx.setLineDash([3,4]);
  for(var x=900;x<W;x+=900){ var gx=ox+x*sc; ctx.beginPath();ctx.moveTo(gx,oy);ctx.lineTo(gx,oy+rd);ctx.stroke(); }
  for(var d2=900;d2<D;d2+=900){ var gd=oy+d2*sc; ctx.beginPath();ctx.moveTo(ox,gd);ctx.lineTo(ox+rw,gd);ctx.stroke(); }
  ctx.setLineDash([]);
  ctx.restore();

  // 開口部
  drawPlanOpenings(ctx, ox, oy, rw, rd, Tpx, sc);

  // 内法輪郭線（細）
  ctx.strokeStyle='rgba(30,45,64,0.6)'; ctx.lineWidth=1;
  _makeInnerPath(ctx); ctx.stroke();
  // 外壁外面輪郭線：内法パスを壁厚×2の太線でストローク外枠のみ
  ctx.save();
  ctx.lineJoin='miter'; ctx.miterLimit=10;
  ctx.strokeStyle='rgba(30,45,64,0.95)'; ctx.lineWidth=2.5;
  _makeInnerPath(ctx); ctx.stroke();
  ctx.restore();

  // 間仕切り描画（内寸基準：pox/poy）
  planPartitions.forEach(function(p){
    var pt=Math.max(2, (p.t||roomData.wallT)*sc);
    var isSel=(_planSelType==='partition'&&p.id===_planSelId);
    ctx.fillStyle=isSel?'rgba(200,169,110,0.7)':'rgba(30,45,64,0.25)';
    ctx.strokeStyle=isSel?'#c8a96e':'rgba(30,45,64,0.4)';
    ctx.lineWidth=isSel?2:1;
    if(p.axis==='v'){
      var px2=pox+p.pos*sc-pt/2;
      var py2=poy+p.start*sc;
      var pl=p.len*sc;
      ctx.fillRect(px2,py2,pt,pl);
      ctx.strokeRect(px2,py2,pt,pl);
    } else {
      var px3=pox+p.start*sc;
      var py3=poy+p.pos*sc-pt/2;
      var pl2=p.len*sc;
      ctx.fillRect(px3,py3,pl2,pt);
      ctx.strokeRect(px3,py3,pl2,pt);
    }
  });

  // ── 間仕切り寸法線（確定後・常時表示・dimOffset反映）──
  var halfT2=Math.round(roomData.wallT/2);
  planPartitions.forEach(function(p){
    var pt2=Math.max(2,(p.t||roomData.wallT)*sc);
    var dOff=(p.dimOffset||0)*sc;
    ctx.strokeStyle='rgba(30,45,64,0.35)'; ctx.lineWidth=0.8; ctx.setLineDash([]);
    ctx.fillStyle='rgba(30,45,64,0.7)'; ctx.font='bold 9px Meiryo,sans-serif';
    if(p.axis==='h'){
      var hMidX=pox+(p.start+p.len/2)*sc+dOff;
      var hTopY=poy+p.pos*sc-pt2/2;
      var hBotY=poy+p.pos*sc+pt2/2;
      var wallTopY=poy;
      var wallBotY=poy+iD*sc;
      var topDist=Math.round(p.pos-halfT2);
      var botDist=Math.round(iD-p.pos-halfT2);
      if(topDist>0){
        ctx.beginPath();ctx.moveTo(hMidX,wallTopY);ctx.lineTo(hMidX,hTopY);ctx.stroke();
        [wallTopY,hTopY].forEach(function(ty){ctx.beginPath();ctx.moveTo(hMidX-3,ty);ctx.lineTo(hMidX+3,ty);ctx.stroke();});
        ctx.save();ctx.translate(hMidX-8,wallTopY+(hTopY-wallTopY)/2);ctx.rotate(-Math.PI/2);
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(topDist+'mm',0,0);ctx.restore();
      }
      if(botDist>0){
        ctx.beginPath();ctx.moveTo(hMidX,hBotY);ctx.lineTo(hMidX,wallBotY);ctx.stroke();
        [hBotY,wallBotY].forEach(function(ty){ctx.beginPath();ctx.moveTo(hMidX-3,ty);ctx.lineTo(hMidX+3,ty);ctx.stroke();});
        ctx.save();ctx.translate(hMidX-8,hBotY+(wallBotY-hBotY)/2);ctx.rotate(-Math.PI/2);
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(botDist+'mm',0,0);ctx.restore();
      }
    } else {
      var vMidY=poy+(p.start+p.len/2)*sc+dOff;
      var vLftX=pox+p.pos*sc-pt2/2;
      var vRgtX=pox+p.pos*sc+pt2/2;
      var wallLftX=pox;
      var wallRgtX=pox+iW*sc;
      var lftDist=Math.round(p.pos-halfT2);
      var rgtDist=Math.round(iW-p.pos-halfT2);
      if(lftDist>0){
        ctx.beginPath();ctx.moveTo(wallLftX,vMidY);ctx.lineTo(vLftX,vMidY);ctx.stroke();
        [wallLftX,vLftX].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,vMidY-3);ctx.lineTo(tx,vMidY+3);ctx.stroke();});
        ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillText(lftDist+'mm',wallLftX+(vLftX-wallLftX)/2,vMidY-4);
      }
      if(rgtDist>0){
        ctx.beginPath();ctx.moveTo(vRgtX,vMidY);ctx.lineTo(wallRgtX,vMidY);ctx.stroke();
        [vRgtX,wallRgtX].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,vMidY-3);ctx.lineTo(tx,vMidY+3);ctx.stroke();});
        ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillText(rgtDist+'mm',vRgtX+(wallRgtX-vRgtX)/2,vMidY-4);
      }
    }
  });

  // 柱描画
  planColumns.forEach(function(c){
    var sel=c.id===planColSelId;
    var cx2=ox+c.x*sc, cy2=oy+c.y*sc;
    var cw2=c.w*sc, cd2=c.d*sc;
    ctx.fillStyle=sel?'rgba(30,45,64,0.55)':'rgba(30,45,64,0.45)';
    ctx.fillRect(cx2,cy2,cw2,cd2);
    ctx.strokeStyle=sel?'rgba(200,169,110,0.9)':'rgba(255,255,255,0.5)';
    ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2+cw2,cy2+cd2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx2+cw2,cy2);ctx.lineTo(cx2,cy2+cd2);ctx.stroke();
    ctx.strokeStyle=sel?'#c8a96e':'rgba(30,45,64,0.8)';
    ctx.lineWidth=sel?2:1.5;
    ctx.strokeRect(cx2,cy2,cw2,cd2);
    if(sel){
      ctx.strokeStyle='rgba(200,169,110,0.5)'; ctx.lineWidth=1; ctx.setLineDash([3,2]);
      ctx.strokeRect(cx2-2,cy2-2,cw2+4,cd2+4); ctx.setLineDash([]);
      ctx.fillStyle='rgba(200,169,110,0.9)'; ctx.font='bold 9px Meiryo,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(c.w+'×'+c.d, cx2+cw2/2, cy2-3);
    }
  });

  // ══════════════════════════════════════════
  //  寸法線：外周の外・固定余白内に配置
  //  外壁外面基準・1層（W・D）
  // ══════════════════════════════════════════
  var outerL=ox-Tpx, outerR=ox+rw+Tpx;
  var outerT=oy-Tpx, outerB=oy+rd+Tpx;

  ctx.strokeStyle='rgba(30,45,64,0.5)';
  ctx.fillStyle='rgba(30,45,64,0.75)';
  ctx.lineWidth=1;

  // 外周寸法線かわし：引き出し線と外周寸法線の重なり防止
  var _dimShiftB=0, _dimShiftL=0;
  // 横壁がある → 下引き出し線がouterBに接するのでdYを10px外に
  if(planPartitions.some(function(p){return p.axis==='h';})) _dimShiftB=10;
  planPartitions.forEach(function(p){
    if(p.axis!=='v') return;
    var dOsc=(p.dimOffset||0)*sc;
    var vMidY2=poy+(p.start+p.len/2)*sc+dOsc;
    var overB2=vMidY2-(outerB+6);
    if(overB2>0) _dimShiftB=Math.max(_dimShiftB, overB2+10);
  });

  var dY=Math.min(outerB+16+_dimShiftB, oy+rd+mB-18); // mB内に収める
  ctx.beginPath();ctx.moveTo(outerL,dY);ctx.lineTo(outerR,dY);ctx.stroke();
  [outerL,outerR].forEach(function(tx){
    ctx.beginPath();ctx.moveTo(tx,dY-4);ctx.lineTo(tx,dY+4);ctx.stroke();
  });
  // 補助線
  ctx.strokeStyle='rgba(30,45,64,0.25)'; ctx.lineWidth=0.7; ctx.setLineDash([2,3]);
  ctx.beginPath();ctx.moveTo(outerL,outerB+2);ctx.lineTo(outerL,dY+6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(outerR,outerB+2);ctx.lineTo(outerR,dY+6);ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='rgba(30,45,64,0.5)'; ctx.lineWidth=1;
  ctx.font='bold 11px Meiryo,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(W.toLocaleString()+'mm', (outerL+outerR)/2, dY+5);

  // 左：D（外壁外面→外壁外面）
  var dX=Math.max(outerL-16-_dimShiftL, 4+13); // mL内（x>=17）に収める
  ctx.beginPath();ctx.moveTo(dX,outerT);ctx.lineTo(dX,outerB);ctx.stroke();
  [outerT,outerB].forEach(function(ty){
    ctx.beginPath();ctx.moveTo(dX-4,ty);ctx.lineTo(dX+4,ty);ctx.stroke();
  });
  // 補助線
  ctx.strokeStyle='rgba(30,45,64,0.25)'; ctx.lineWidth=0.7; ctx.setLineDash([2,3]);
  ctx.beginPath();ctx.moveTo(outerL-2,outerT);ctx.lineTo(dX-6,outerT);ctx.stroke();
  ctx.beginPath();ctx.moveTo(outerL-2,outerB);ctx.lineTo(dX-6,outerB);ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='rgba(30,45,64,0.5)'; ctx.lineWidth=1;
  ctx.save();
  ctx.translate(dX-13, (outerT+outerB)/2);
  ctx.rotate(-Math.PI/2);
  ctx.font='bold 11px Meiryo,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(D.toLocaleString()+'mm', 0, 0);
  ctx.restore();

  // ── 外周作図モード描画 ──
  if(_planMode==='outline'){
    var GRID=OUTLINE_GRID;
    // グリッド描画
    ctx.strokeStyle='rgba(200,169,110,0.25)'; ctx.lineWidth=0.5; ctx.setLineDash([]);
    for(var gxi=0;gxi<=W;gxi+=GRID){
      ctx.beginPath();ctx.moveTo(ox+gxi*sc,oy);ctx.lineTo(ox+gxi*sc,oy+rd);ctx.stroke();
    }
    for(var gyi=0;gyi<=D;gyi+=GRID){
      ctx.beginPath();ctx.moveTo(ox,oy+gyi*sc);ctx.lineTo(ox+rw,oy+gyi*sc);ctx.stroke();
    }
    // 描画済み頂点・辺
    if(_outlineVerts.length>0){
      ctx.strokeStyle='#c8a96e'; ctx.lineWidth=2; ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(ox+_outlineVerts[0].x*sc, oy+_outlineVerts[0].y*sc);
      for(var vi=1;vi<_outlineVerts.length;vi++){
        ctx.lineTo(ox+_outlineVerts[vi].x*sc, oy+_outlineVerts[vi].y*sc);
      }
      if(_outlineClosed) ctx.closePath();
      ctx.stroke();
      // 辺の長さラベル
      var edgeCount=_outlineClosed?_outlineVerts.length:_outlineVerts.length-1;
      for(var evi=0;evi<edgeCount;evi++){
        var ev1=_outlineVerts[evi];
        var ev2=_outlineVerts[(evi+1)%_outlineVerts.length];
        var emx=(ev1.x+ev2.x)/2, emy=(ev1.y+ev2.y)/2;
        var edx=ev2.x-ev1.x, edy=ev2.y-ev1.y;
        var elen=Math.round(Math.sqrt(edx*edx+edy*edy));
        var isSel=_outlineSelEdge===evi;
        ctx.fillStyle=isSel?'#b06a00':'rgba(30,45,64,0.6)';
        ctx.font='bold 9px Meiryo,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        // 辺に垂直方向に少しオフセット
        var ang2=Math.atan2(edy,edx);
        var offX=-Math.sin(ang2)*12, offY=Math.cos(ang2)*12;
        ctx.fillText(elen+'mm', ox+emx*sc+offX, oy+emy*sc+offY);
      }
      // 頂点マーカー
      _outlineVerts.forEach(function(v,vi2){
        ctx.fillStyle=vi2===0?'#c8a96e':'rgba(30,45,64,0.6)';
        ctx.beginPath();ctx.arc(ox+v.x*sc, oy+v.y*sc, vi2===0?6:4, 0, Math.PI*2);ctx.fill();
        if(vi2===0){
          ctx.strokeStyle='#b06a00'; ctx.lineWidth=1.5;
          ctx.beginPath();ctx.arc(ox+v.x*sc, oy+v.y*sc, 8, 0, Math.PI*2);ctx.stroke();
        }
      });
      // プレビュー線
      if(_outlinePreview&&!_outlineClosed){
        var last2=_outlineVerts[_outlineVerts.length-1];
        ctx.strokeStyle='rgba(200,169,110,0.5)'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
        ctx.beginPath();
        ctx.moveTo(ox+last2.x*sc, oy+last2.y*sc);
        ctx.lineTo(ox+_outlinePreview.x*sc, oy+_outlinePreview.y*sc);
        ctx.stroke();
        ctx.setLineDash([]);
        // プレビュー長さ
        var pdx=_outlinePreview.x-last2.x, pdy=_outlinePreview.y-last2.y;
        var plen=Math.round(Math.sqrt(pdx*pdx+pdy*pdy));
        ctx.fillStyle='rgba(200,169,110,0.9)';
        ctx.font='bold 9px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(plen+'mm', ox+(_outlinePreview.x+last2.x)/2*sc, oy+(_outlinePreview.y+last2.y)/2*sc-4);
        ctx.fillStyle='rgba(200,169,110,0.5)';
        ctx.beginPath();ctx.arc(ox+_outlinePreview.x*sc,oy+_outlinePreview.y*sc,3,0,Math.PI*2);ctx.fill();
      }
    }
  }
  if(_partPending){
    var Tpx2=Math.max(2,roomData.wallT*sc);
    ctx.fillStyle='rgba(30,45,64,0.25)';
    ctx.strokeStyle='rgba(30,45,64,0.6)'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
    if(_partPending.axis==='v'){
      ctx.fillRect(ox+_partPending.pos*sc-Tpx2/2, oy+_partPending.start*sc, Tpx2, _partPending.len*sc);
      ctx.strokeRect(ox+_partPending.pos*sc-Tpx2/2, oy+_partPending.start*sc, Tpx2, _partPending.len*sc);
    } else {
      ctx.fillRect(ox+_partPending.start*sc, oy+_partPending.pos*sc-Tpx2/2, _partPending.len*sc, Tpx2);
      ctx.strokeRect(ox+_partPending.start*sc, oy+_partPending.pos*sc-Tpx2/2, _partPending.len*sc, Tpx2);
    }
    ctx.setLineDash([]);
  }
}


function drawPlanOpenings(ctx, ox, oy, rw, rd, Tpx, sc){
  // A面(idx=0)：上壁 D方向が面の幅なので openingのxはW方向
  // 各面の開口部を平面図的に描画
  var faceConfigs=[
    // {fi, axis:'h'or'v', wallX, wallY, wallLen, wallT, dir:1=外方向}
    {fi:0, wallX:ox,      wallY:oy-Tpx, wallLen:rw,  wallT:Tpx, axis:'h', ydir:-1}, // A上
    {fi:1, wallX:ox+rw,   wallY:oy,     wallLen:rd,  wallT:Tpx, axis:'v', xdir:1},  // B右
    {fi:2, wallX:ox,      wallY:oy+rd,  wallLen:rw,  wallT:Tpx, axis:'h', ydir:1},  // C下
    {fi:3, wallX:ox-Tpx,  wallY:oy,     wallLen:rd,  wallT:Tpx, axis:'v', xdir:-1}, // D左
  ];
  faceConfigs.forEach(function(cfg){
    faceOpenings[cfg.fi].forEach(function(op){
      var xRatio=op.x/faceW(cfg.fi);
      var wRatio=op.w/faceW(cfg.fi);
      var col=(op.id===faceSelId[cfg.fi])?'#b06a00':'rgba(40,40,40,0.85)';
      ctx.save();
      ctx.strokeStyle=col; ctx.fillStyle='#ffffff'; ctx.lineWidth=1.5;
      if(cfg.axis==='h'){
        var rx=cfg.wallX+xRatio*cfg.wallLen;
        var ropw=wRatio*cfg.wallLen;
        // 開口白抜き
        ctx.fillRect(rx, cfg.wallY, ropw, cfg.wallT);
        // ドア系は弧、窓系は二重線
        if(isDoor(op.type)){
          // ドアの平面表記：弧
          ctx.strokeStyle=col;
          ctx.strokeRect(rx, cfg.wallY, ropw, cfg.wallT);
          ctx.beginPath();
          if(cfg.ydir<0){
            ctx.moveTo(rx,cfg.wallY+cfg.wallT);
            ctx.arc(rx,cfg.wallY+cfg.wallT, ropw, -Math.PI/2, 0);
          } else {
            ctx.moveTo(rx,cfg.wallY);
            ctx.arc(rx,cfg.wallY, ropw, 0, Math.PI/2);
          }
          ctx.setLineDash([3,2]); ctx.stroke(); ctx.setLineDash([]);
        } else {
          // 窓：外枠＋内枠
          ctx.strokeRect(rx, cfg.wallY, ropw, cfg.wallT);
          var gi=Tpx*0.25;
          ctx.lineWidth=0.8;
          ctx.strokeRect(rx+gi, cfg.wallY+gi, ropw-gi*2, cfg.wallT-gi*2);
        }
      } else {
        var ry=cfg.wallY+xRatio*cfg.wallLen;
        var ropd=wRatio*cfg.wallLen;
        ctx.fillRect(cfg.wallX, ry, cfg.wallT, ropd);
        if(isDoor(op.type)){
          ctx.strokeRect(cfg.wallX, ry, cfg.wallT, ropd);
          ctx.beginPath();
          if(cfg.xdir>0){
            ctx.moveTo(cfg.wallX, ry);
            ctx.arc(cfg.wallX, ry, ropd, 0, Math.PI/2);
          } else {
            ctx.moveTo(cfg.wallX+cfg.wallT, ry);
            ctx.arc(cfg.wallX+cfg.wallT, ry, ropd, Math.PI/2, Math.PI);
          }
          ctx.setLineDash([3,2]); ctx.stroke(); ctx.setLineDash([]);
        } else {
          ctx.strokeRect(cfg.wallX, ry, cfg.wallT, ropd);
          var gi2=Tpx*0.25;
          ctx.lineWidth=0.8;
          ctx.strokeRect(cfg.wallX+gi2, ry+gi2, cfg.wallT-gi2*2, ropd-gi2*2);
        }
      }
      ctx.restore();
    });
  });
}

function isDoor(type){
  return type==='ドア'||type==='親子ドア'||type==='両開きドア'||type==='引き違いドア'||type==='スライドドア';
}

function drawCompass(ctx, cx, cy, r){
  ctx.save();
  ctx.strokeStyle='rgba(30,45,64,0.6)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  // N矢印
  ctx.fillStyle='rgba(30,45,64,0.7)';
  ctx.beginPath();
  ctx.moveTo(cx,cy-r+3);
  ctx.lineTo(cx-4,cy+4);
  ctx.lineTo(cx+4,cy+4);
  ctx.closePath(); ctx.fill();
  ctx.font='bold 9px Meiryo,sans-serif';
  ctx.fillStyle='rgba(30,45,64,0.7)';
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('N',cx,cy-r);
  ctx.restore();
}

// ══════════════════════════════════════════
//  天井図 操作
// ══════════════════════════════════════════

function getCeilParts(){ return ceilParts; }

function addCeilPart(typeId){
  pushHistory();
  var ct=CEIL_TYPES.find(function(c){return c.id===typeId;}); if(!ct) return;
  ceilSeq++;
  var W=roomData.W, D=roomData.D;
  var cw=ct.w, ch=ct.h;
  var x=Math.round((W-cw)/2/10)*10;
  var y=Math.round((D-ch)/2/10)*10;
  x=Math.max(0,Math.min(W-cw,x)); y=Math.max(0,Math.min(D-ch,y));
  ceilParts.push({id:ceilSeq,typeId:typeId,label:ct.label,icon:ct.icon,w:cw,h:ch,x:x,y:y});
  ceilSelId=ceilSeq;
  renderCeilPlacedList(); showMPCeil(); redrawCeil(); updateCeilBadge();
}

function removeCeilPart(id){
  pushHistory();
  ceilParts=ceilParts.filter(function(c){return c.id!==id;});
  if(ceilSelId===id){ceilSelId=null; hideMPCeil();}
  var btn=document.getElementById('eq-del-btn'); if(btn) btn.style.display='none';
  renderCeilPlacedList(); redrawCeil(); updateCeilBadge();
}

function selCeil(id){
  ceilSelId=id;
  renderCeilPlacedList(); showMPCeil(); redrawCeil();
}

function delSelCeil(){
  if(ceilSelId===null) return;
  removeCeilPart(ceilSelId);
}

function updateCeilBadge(){
  var b=document.getElementById('acc-ceil-badge'); if(b) b.textContent=ceilParts.length;
}

function renderCeilPlacedList(){
  var el=document.getElementById('placed-list'); if(!el) return;
  var h='';
  ceilParts.forEach(function(c){
    var s=c.id===ceilSelId;
    h+='<div class="ei'+(s?' sel-ceil':'')+'" onclick="selCeil('+c.id+')">';
    h+='<div class="ei-sym">'+c.icon+'</div>';
    h+='<div class="ei-info"><div class="ei-name">'+c.label+'</div>';
    h+='<div class="ei-pos">X:'+c.x+'mm　Y:'+c.y+'mm</div></div>';
    h+='<button class="db-eq" onclick="event.stopPropagation();removeCeilPart('+c.id+')">削除</button>';
    h+='</div>';
  });
  el.innerHTML=h;
}

function showMPCeil(){
  var w=document.getElementById('mpanel-wrap'); if(!w) return;
  updMPCeil(); w.style.display='block';
  updateCeilDelBtn();
}
function hideMPCeil(){
  var w=document.getElementById('mpanel-wrap'); if(w){w.innerHTML='';w.style.display='none';}
  var btn=document.getElementById('eq-del-btn'); if(btn) btn.style.display='none';
}

function updMPCeil(){
  var cp=ceilParts.find(function(c){return c.id===ceilSelId;}); if(!cp) return;
  var W=roomData.W, D=roomData.D;
  var right=W-cp.x-cp.w, bottom=D-cp.y-cp.h;
  var steps=[10,100,300].map(function(s){
    return '<button class="mps'+(moveStep===s?' act-ceil':'')+'" onclick="setMvStep('+s+')">'+s+'mm</button>';
  }).join('');
  var h=''
    +'<div class="mpanel-compact cceil">'
      +'<div class="mpc-title cceil">'+cp.icon+' '+cp.label+'</div>'
      +'<div class="mpc-body">'
        +'<div class="mpc-pos">'
          +'<div class="mpc-cell"><div class="mpc-lbl">左端から</div><div class="mpc-val cceil">'+cp.x+'mm</div></div>'
          +'<div class="mpc-cell"><div class="mpc-lbl">右端から</div><div class="mpc-val cceil">'+right+'mm</div></div>'
          +'<div class="mpc-cell"><div class="mpc-lbl">上端から</div><div class="mpc-val cceil">'+cp.y+'mm</div></div>'
          +'<div class="mpc-cell"><div class="mpc-lbl">下端から</div><div class="mpc-val cceil">'+bottom+'mm</div></div>'
        +'</div>'
        +'<div class="mpc-ctrl">'
          +'<div class="mpc-dpad">'
            +'<div></div><button class="mpb" onclick="movCeil(0,-1)">▲</button><div></div>'
            +'<button class="mpb" onclick="movCeil(-1,0)">◀</button><div style="width:36px"></div><button class="mpb" onclick="movCeil(1,0)">▶</button>'
            +'<div></div><button class="mpb" onclick="movCeil(0,1)">▼</button><div></div>'
          +'</div>'
          +'<div class="mpc-steps">'+steps+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px">'
        +'<div class="mpc-cell"><div class="mpc-lbl">幅 mm</div>'
        +'<input type="number" id="cp-w-inp" value="'+cp.w+'" inputmode="numeric" style="width:100%;height:32px;border:1.5px solid rgba(42,106,74,0.4);border-radius:6px;padding:0 6px;font-size:13px;font-family:inherit;color:var(--tceil);text-align:center;background:#fff;" oninput="resizeCeil(&apos;w&apos;,this.value)"></div>'
        +'<div class="mpc-cell"><div class="mpc-lbl">奥行 mm</div>'
        +'<input type="number" id="cp-h-inp" value="'+cp.h+'" inputmode="numeric" style="width:100%;height:32px;border:1.5px solid rgba(42,106,74,0.4);border-radius:6px;padding:0 6px;font-size:13px;font-family:inherit;color:var(--tceil);text-align:center;background:#fff;" oninput="resizeCeil(&apos;h&apos;,this.value)"></div>'
      +'</div>'
    +'</div>';
  document.getElementById('mpanel-wrap').innerHTML=h;
  renderCeilPlacedList();
}

function movCeil(dx,dy){
  pushHistory();
  var cp=ceilParts.find(function(c){return c.id===ceilSelId;}); if(!cp) return;
  var W=roomData.W, D=roomData.D;
  cp.x=Math.max(0,Math.min(W-cp.w, cp.x+dx*moveStep));
  cp.y=Math.max(0,Math.min(D-cp.h, cp.y+dy*moveStep));
  updMPCeil(); redrawCeil();
  setTimeout(updateCeilDelBtn,30);
}

function resizeCeil(axis,val){
  pushHistory();
  var cp=ceilParts.find(function(c){return c.id===ceilSelId;}); if(!cp) return;
  var v=parseInt(val)||0; if(v<10) return;
  if(axis==='w') cp.w=Math.min(v,roomData.W-cp.x);
  else cp.h=Math.min(v,roomData.D-cp.y);
  updateCeilDelBtn(); redrawCeil(); renderCeilPlacedList();
}

function updateCeilDelBtn(){
  var btn=document.getElementById('eq-del-btn');
  var cv=document.getElementById('zumen-cv');
  if(!btn||!cv) return;
  var cp=ceilParts.find(function(c){return c.id===ceilSelId;});
  if(!cp){btn.style.display='none';return;}
  var W=roomData.W, D=roomData.D;
  var CW=cv.offsetWidth||340;
  var mL=56,mR=20,mT=20;
  var sc=Math.min((CW-mL-mR)/W, 370/D);
  var ox=mL, oy=mT;
  var erx=ox+cp.x*sc, ery=oy+cp.y*sc, erw=cp.w*sc;
  btn.style.display='block';
  btn.style.left=(erx+erw+2)+'px';
  btn.style.top=(ery-2)+'px';
}

// ══════════════════════════════════════════
//  天井図 canvas描画
// ══════════════════════════════════════════

function redrawCeil(){
  var cv=document.getElementById('zumen-cv'); if(!cv) return;
  var W=roomData.W, D=roomData.D;
  var CW=cv.offsetWidth||340;
  var mL=56, mR=20, mT=20, mB=64;
  var sc=Math.min((CW-mL-mR)/W, 370/D);
  var rw=W*sc, rd=D*sc, CH=rd+mT+mB;
  var ox=mL, oy=mT;
  var ctx=setupCanvas(cv,CW,CH); ctx.clearRect(0,0,CW,CH);

  // 背景
  ctx.fillStyle='#f0f4f8'; ctx.fillRect(ox,oy,rw,rd);

  // グリッド（900mm）
  ctx.strokeStyle='rgba(30,45,64,0.06)'; ctx.lineWidth=0.7; ctx.setLineDash([3,4]);
  for(var x=900;x<W;x+=900){var gx=ox+x*sc;ctx.beginPath();ctx.moveTo(gx,oy);ctx.lineTo(gx,oy+rd);ctx.stroke();}
  for(var d=900;d<D;d+=900){var gd=oy+d*sc;ctx.beginPath();ctx.moveTo(ox,gd);ctx.lineTo(ox+rw,gd);ctx.stroke();}
  ctx.setLineDash([]);

  // 外形線
  ctx.strokeStyle='rgba(30,45,64,0.85)'; ctx.lineWidth=2;
  ctx.strokeRect(ox,oy,rw,rd);

  // 天井器具
  ceilParts.forEach(function(cp){
    var sel=cp.id===ceilSelId;
    var erx=ox+cp.x*sc, ery=oy+cp.y*sc;
    var erw=cp.w*sc, erd=cp.h*sc;
    var ecx=erx+erw/2, ecy=ery+erd/2;
    var col=sel?'#2a6a4a':'rgba(30,45,64,0.75)';
    ctx.save();
    ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=sel?2:1.5;

    if(cp.typeId==='ceiling_light'){
      var r=Math.min(erw,erd)/2;
      ctx.beginPath();ctx.arc(ecx,ecy,r,0,Math.PI*2);ctx.stroke();
      ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(ecx-r*0.65,ecy);ctx.lineTo(ecx+r*0.65,ecy);
      ctx.moveTo(ecx,ecy-r*0.65);ctx.lineTo(ecx,ecy+r*0.65);ctx.stroke();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('CL',ecx,ery+erd+2);

    } else if(cp.typeId==='downlight'){
      var r2=Math.min(erw,erd)/2;
      ctx.beginPath();ctx.arc(ecx,ecy,r2,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(ecx,ecy,r2*0.5,0,Math.PI*2);ctx.fill();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('DL',ecx,ery+erd+2);

    } else if(cp.typeId==='led_tube'){
      ctx.strokeRect(erx,ecy-erd/2,erw,erd);
      var mg=erd*0.15;
      ctx.strokeRect(erx+mg,ecy-erd/2+mg,erw-mg*2,erd-mg*2);
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('FL',ecx,ery+erd+2);

    } else if(cp.typeId==='rail'){
      ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(erx,ecy);ctx.lineTo(erx+erw,ecy);ctx.stroke();
      ctx.lineWidth=1;
      for(var rx=erx+erw*0.1;rx<erx+erw;rx+=erw*0.2){
        ctx.beginPath();ctx.moveTo(rx,ecy-4);ctx.lineTo(rx,ecy+4);ctx.stroke();
      }
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('Rail',ecx,ery+erd+4);

    } else if(cp.typeId==='ac_ceil'){
      ctx.strokeRect(erx,ery,erw,erd);
      var mg2=Math.min(erw,erd)*0.08;
      ctx.strokeRect(erx+mg2,ery+mg2,erw-mg2*2,erd-mg2*2);
      // 4方向ルーバー
      ctx.lineWidth=0.8;
      [[ecx-erw*0.1,ery+mg2,ecx-erw*0.1,ecy],[ecx+erw*0.1,ery+mg2,ecx+erw*0.1,ecy],
       [ecx-erw*0.1,ery+erd-mg2,ecx-erw*0.1,ecy],[ecx+erw*0.1,ery+erd-mg2,ecx+erw*0.1,ecy]].forEach(function(l){
        ctx.beginPath();ctx.moveTo(l[0],l[1]);ctx.lineTo(l[2],l[3]);ctx.stroke();
      });
      ctx.beginPath();ctx.arc(ecx,ecy,Math.min(erw,erd)*0.1,0,Math.PI*2);ctx.fill();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('AC',ecx,ecy);

    } else if(cp.typeId==='fan_ceil_r'){
      var fr=Math.min(erw,erd)/2;
      ctx.beginPath();ctx.arc(ecx,ecy,fr,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(ecx,ecy,fr*0.75,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ecx-fr*0.65,ecy);ctx.lineTo(ecx+fr*0.65,ecy);
      ctx.moveTo(ecx,ecy-fr*0.65);ctx.lineTo(ecx,ecy+fr*0.65);ctx.stroke();
      ctx.beginPath();ctx.arc(ecx,ecy,fr*0.12,0,Math.PI*2);ctx.fill();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('EF',ecx,ery+erd+2);

    } else if(cp.typeId==='fan_ceil_s'){
      ctx.strokeRect(erx,ery,erw,erd);
      var mg3=Math.min(erw,erd)*0.1;
      ctx.strokeRect(erx+mg3,ery+mg3,erw-mg3*2,erd-mg3*2);
      ctx.beginPath();
      ctx.moveTo(erx+mg3,ery+mg3);ctx.lineTo(erx+erw-mg3,ery+erd-mg3);
      ctx.moveTo(erx+erw-mg3,ery+mg3);ctx.lineTo(erx+mg3,ery+erd-mg3);ctx.stroke();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('EF',ecx,ery+erd+2);

    } else if(cp.typeId==='inspection'){
      ctx.strokeRect(erx,ery,erw,erd);
      ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(erx,ery);ctx.lineTo(erx+erw,ery+erd);
      ctx.moveTo(erx+erw,ery);ctx.lineTo(erx,ery+erd);ctx.stroke();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=col; ctx.fillText('点検',ecx,ecy);
    }

    // 選択時ハイライト＋寸法引き出し線
    if(sel&&drawMode==='edit'){
      // 選択枠
      ctx.strokeStyle='rgba(42,106,74,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
      ctx.strokeRect(erx-2,ery-2,erw+4,erd+4); ctx.setLineDash([]);

      var df='rgba(42,106,74,0.9)';
      var cxMm=Math.round(cp.x+cp.w/2);
      var cyMm=Math.round(cp.y+cp.h/2);

      // X方向：左端から中心まで（下部寸法線）
      if(cxMm>0){
        var cdimY=oy+rd+12;
        ctx.strokeStyle='#2a6a4a'; ctx.lineWidth=0.8;
        ctx.beginPath();ctx.moveTo(ox,cdimY);ctx.lineTo(ecx,cdimY);ctx.stroke();
        [ox,ecx].forEach(function(tx){
          ctx.beginPath();ctx.moveTo(tx,cdimY-3);ctx.lineTo(tx,cdimY+3);ctx.stroke();
        });
        // 引き出し垂直線
        ctx.strokeStyle='rgba(42,106,74,0.3)'; ctx.setLineDash([2,3]);
        ctx.beginPath();ctx.moveTo(ecx,ery+erd);ctx.lineTo(ecx,cdimY);ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle=df; ctx.font='bold 9px Meiryo,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='top';
        ctx.fillText(cxMm.toLocaleString()+'mm', ox+(ecx-ox)/2, cdimY+4);
      }

      // Y方向：上端から中心まで（左側寸法線）
      if(cyMm>0){
        var cdimX=ox-14;
        ctx.strokeStyle='#2a6a4a'; ctx.lineWidth=0.8;
        ctx.beginPath();ctx.moveTo(cdimX,oy);ctx.lineTo(cdimX,ecy);ctx.stroke();
        [oy,ecy].forEach(function(ty){
          ctx.beginPath();ctx.moveTo(cdimX-3,ty);ctx.lineTo(cdimX+3,ty);ctx.stroke();
        });
        // 引き出し水平線
        ctx.strokeStyle='rgba(42,106,74,0.3)'; ctx.setLineDash([2,3]);
        ctx.beginPath();ctx.moveTo(erx,ecy);ctx.lineTo(cdimX,ecy);ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle=df; ctx.font='bold 9px Meiryo,sans-serif';
        ctx.save();
        ctx.translate(cdimX-10, oy+(ecy-oy)/2);
        ctx.rotate(-Math.PI/2);
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(cyMm.toLocaleString()+'mm', 0, 0);
        ctx.restore();
      }

      // 器具名ラベル（右上）
      ctx.fillStyle=df; ctx.font='bold 10px Meiryo,sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='bottom';
      ctx.fillText(cp.label, erx+erw+4, ery);
    }
    ctx.restore();
  });

  // 寸法線
  var dimY=oy+rd+30;
  ctx.strokeStyle='rgba(30,45,64,0.45)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ox,dimY);ctx.lineTo(ox+rw,dimY);ctx.stroke();
  [ox,ox+rw].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,dimY-4);ctx.lineTo(tx,dimY+4);ctx.stroke();});
  ctx.fillStyle='rgba(30,45,64,0.6)'; ctx.font='bold 11px Meiryo,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(W.toLocaleString()+'mm',ox+rw/2,dimY+5);

  var dimX=ox-22;
  ctx.beginPath();ctx.moveTo(dimX,oy);ctx.lineTo(dimX,oy+rd);ctx.stroke();
  [oy,oy+rd].forEach(function(ty){ctx.beginPath();ctx.moveTo(dimX-4,ty);ctx.lineTo(dimX+4,ty);ctx.stroke();});
  ctx.save(); ctx.translate(dimX-13,oy+rd/2); ctx.rotate(-Math.PI/2);
  ctx.textAlign='center'; ctx.fillStyle='rgba(30,45,64,0.6)';
  ctx.font='bold 11px Meiryo,sans-serif';
  ctx.fillText(D.toLocaleString()+'mm',0,0); ctx.restore();

  // 方位記号
  drawCompass(ctx, ox+rw+30, oy, 16);
}

// canvasドラッグ（平面図）間仕切り追加
(function(){
  var cv_el=null;
  function getCV(){ return document.getElementById('zumen-cv'); }

  function getEvPos(e, cv){
    var r=cv.getBoundingClientRect();
    var src=e.touches?e.touches[0]:e;
    return{x:src.clientX-r.left, y:src.clientY-r.top};
  }

  function onStart(e){
    if(curView!=='plan') return;
    var cv=getCV(); if(!cv||e.target!==cv) return;
    if(e.touches) e.preventDefault();
    var pos=getEvPos(e,cv);
    _partDrag.active=true;
    _partDrag.sx=pos.x; _partDrag.sy=pos.y;
    _partDrag.ex=pos.x; _partDrag.ey=pos.y;
    // 外周作図モード
    if(_planMode==='outline'){
      var info0=_planSc(); if(!info0) return;
      var mm0=_pxToMm(pos.x, pos.y, info0);
      outlineTap(mm0.x, mm0.y, pos.x, pos.y, info0.sc, info0.ox, info0.oy);
      return;
    }
    if(_planMode==='none') {
      if(_planSelType==='partition'&&_planSelId!==null){
        var pb=planPartitions.find(function(p){return p.id===_planSelId;});
        if(pb) pb._dimBase=pb.dimOffset||0;
      }
      return;
    }
    var info=_planSc(); if(!info) return;
    var mm=_snapMm(pos, info);
    _partDrag.detected = _detectColType(mm.x, mm.y);
  }

  function onMove(e){
    if(!_partDrag.active||curView!=='plan') return;
    if(e.touches) e.preventDefault();
    var cv=getCV(); if(!cv) return;
    var pos=getEvPos(e,cv);
    _partDrag.ex=pos.x; _partDrag.ey=pos.y;
    // 外周作図モード：プレビュー更新
    if(_planMode==='outline'){
      var info1=_planSc(); if(!info1) return;
      var mm1=_pxToMm(pos.x, pos.y, info1);
      outlineMove(mm1.x, mm1.y);
      return;
    }
    if(_planMode==='part_v'||_planMode==='part_h') redrawPlanWithDrag();
    if(_planMode==='none'&&_planSelType==='partition'&&_planSelId!==null){
      var info3=_planSc(); if(!info3) return;
      var p3=planPartitions.find(function(p){return p.id===_planSelId;});
      if(p3){
        var ddx=(_partDrag.ex-_partDrag.sx)/info3.sc;
        var ddy=(_partDrag.ey-_partDrag.sy)/info3.sc;
        p3.dimOffset=(p3._dimBase||0)+(p3.axis==='v'?ddy:ddx);
        redrawPlan();
      }
    }
  }

  function onEnd(e){
    if(!_partDrag.active||curView!=='plan'){ _partDrag.active=false; return; }
    _partDrag.active=false;
    var dx=Math.abs(_partDrag.ex-_partDrag.sx);
    var dy=Math.abs(_partDrag.ey-_partDrag.sy);
    var det=_partDrag.detected||{type:'interior'};

    if(_planMode==='none'){
      if(dx<10&&dy<10){
        // タップ → 選択（内寸基準）
        var info2=_planSc(); if(!info2) return;
        var _poxT=info2.pox||info2.ox;
        var _poyT=info2.poy||info2.oy;
        var mmX=((_partDrag.sx-_poxT)/info2.sc);
        var mmY=((_partDrag.sy-_poyT)/info2.sc);
        var hit=false;
        var halfT=Math.round(roomData.wallT/2)+20;
        for(var pi=planPartitions.length-1;pi>=0;pi--){
          var p=planPartitions[pi];
          var hit2=false;
          if(p.axis==='v'){
            hit2=mmX>=p.pos-halfT&&mmX<=p.pos+halfT&&mmY>=p.start&&mmY<=p.start+p.len;
          } else {
            hit2=mmY>=p.pos-halfT&&mmY<=p.pos+halfT&&mmX>=p.start&&mmX<=p.start+p.len;
          }
          if(hit2){ _planSelType='partition'; _planSelId=p.id; hit=true; break; }
        }
        if(!hit){
          for(var ci=planColumns.length-1;ci>=0;ci--){
            var c=planColumns[ci];
            if(mmX>=c.x&&mmX<=c.x+c.w&&mmY>=c.y&&mmY<=c.y+c.d){
              _planSelType='column'; _planSelId=c.id; hit=true; break;
            }
          }
        }
        if(!hit){ _planSelType=null; _planSelId=null; }
        renderPlan();
      } else {
        // ドラッグ → 寸法線移動確定（_dimBaseをクリア）
        if(_planSelType==='partition'&&_planSelId!==null){
          var pb2=planPartitions.find(function(p){return p.id===_planSelId;});
          if(pb2) pb2._dimBase=pb2.dimOffset||0;
        }
        renderPlan();
      }
      return;
    }

    if(_planMode==='column'){
      // タップのみ反応（ドラッグは無視）
      if(dx<10&&dy<10){
        if(det.type==='corner'||det.type==='wall'){
          openColDialog(det);
        }
      }
      return;
    }

    if(_planMode==='part_v'||_planMode==='part_h'){
      if(dx<10&&dy<10){ redrawPlan(); return; }
      var info=_planSc(); if(!info) return;
      var snap=_calcPartSnap(info);
      _partPending={axis:snap.axis, pos:snap.pos, start:snap.start, len:snap.len};
      renderPlan();
    }
  }

  document.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onEnd);
  document.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('touchmove',  onMove,  {passive:false});
  document.addEventListener('touchend',   onEnd);
})();

function _calcPartSnap(info){
  var iW=info.iW||info.W, iD=info.iD||info.D;
  var s=_snapMm({x:_partDrag.sx,y:_partDrag.sy},info);
  var e=_snapMm({x:_partDrag.ex,y:_partDrag.ey},info);
  var SNAP=50;
  var result={};
  if(_planMode==='part_h'){
    var startX=_snapToOuterWall(Math.min(s.x,e.x),iW,SNAP);
    var endX=_snapToOuterWall(Math.max(s.x,e.x),iW,SNAP);
    if(startX!==0&&startX!==iW) startX=_snapEndToPartition(startX,'x',SNAP);
    if(endX!==0&&endX!==iW) endX=_snapEndToPartition(endX,'x',SNAP);
    var posY=Math.round((s.y+e.y)/2/10)*10;
    posY=_snapToOuterWall(posY,iD,SNAP);
    if(posY!==0&&posY!==iD) posY=_snapEndToPartition(posY,'pos_y',SNAP);
    result={axis:'h',pos:posY,start:Math.min(startX,endX),len:Math.abs(endX-startX),
      sxSnap:Math.min(startX,endX),exSnap:Math.max(startX,endX),posYsnap:posY,
      sySnap:0,eySnap:0,posXsnap:0};
  } else {
    var startY=_snapToOuterWall(Math.min(s.y,e.y),iD,SNAP);
    var endY=_snapToOuterWall(Math.max(s.y,e.y),iD,SNAP);
    if(startY!==0&&startY!==iD) startY=_snapEndToPartition(startY,'y',SNAP);
    if(endY!==0&&endY!==iD) endY=_snapEndToPartition(endY,'y',SNAP);
    var posX=Math.round((s.x+e.x)/2/10)*10;
    posX=_snapToOuterWall(posX,iW,SNAP);
    if(posX!==0&&posX!==iW) posX=_snapEndToPartition(posX,'pos_x',SNAP);
    result={axis:'v',pos:posX,start:Math.min(startY,endY),len:Math.abs(endY-startY),
      sySnap:Math.min(startY,endY),eySnap:Math.max(startY,endY),posXsnap:posX,
      sxSnap:0,exSnap:0,posYsnap:0};
  }
  return result;
}

function redrawPlanWithDrag(){
  redrawPlan();
  if(!_partDrag.active) return;
  var cv=document.getElementById('zumen-cv'); if(!cv) return;
  var ctx=cv.getContext('2d');
  var info=_planSc(); if(!info) return;
  var T=roomData.wallT;
  var dpr=window.devicePixelRatio||1;
  ctx.save(); ctx.setTransform(dpr,0,0,dpr,0,0);
  var dx=Math.abs(_partDrag.ex-_partDrag.sx);
  var dy=Math.abs(_partDrag.ey-_partDrag.sy);
  var Tpx=Math.max(2,T*info.sc);
  ctx.fillStyle='rgba(30,45,64,0.35)';
  ctx.strokeStyle='rgba(30,45,64,0.7)'; ctx.lineWidth=1;
  var forceH=(_planMode==='part_h');
  var forceV=(_planMode==='part_v');
  var isH=forceH||((!forceV)&&dx>=dy);

  // _calcPartSnapでリアルタイムスナップ
  var snap=_calcPartSnap(info);
  var sxSnap=snap.sxSnap, exSnap=snap.exSnap, posYsnap=snap.posYsnap;
  var sySnap=snap.sySnap, eySnap=snap.eySnap, posXsnap=snap.posXsnap;
  var halfT=Math.round(roomData.wallT/2);

  if(isH){
    var _poxD=info.pox||info.ox;
    var _poyD=info.poy||info.oy;
    var x1=_poxD+sxSnap*info.sc;
    var x2=_poxD+exSnap*info.sc;
    var snapMidY=_poyD+posYsnap*info.sc;
    var Tpx2=Math.max(2,roomData.wallT*info.sc);
    ctx.fillRect(x1, snapMidY-Tpx2/2, x2-x1, Tpx2);
    ctx.strokeRect(x1, snapMidY-Tpx2/2, x2-x1, Tpx2);
    var topFaceY=snapMidY-Tpx2/2, botFaceY=snapMidY+Tpx2/2;
    var posYmm=posYsnap;
    var botDistMm=roomData.D-posYmm;
    ctx.strokeStyle='rgba(30,45,64,0.4)'; ctx.lineWidth=0.8;
    var dimX3=(x1+x2)/2;
    ctx.beginPath();ctx.moveTo(dimX3,_poyD);ctx.lineTo(dimX3,topFaceY);ctx.stroke();
    [_poyD,topFaceY].forEach(function(ty){ctx.beginPath();ctx.moveTo(dimX3-3,ty);ctx.lineTo(dimX3+3,ty);ctx.stroke();});
    var _iDdrag=info.iD||roomData.D;
    var botWallY=_poyD+_iDdrag*info.sc;
    ctx.beginPath();ctx.moveTo(dimX3,botFaceY);ctx.lineTo(dimX3,botWallY);ctx.stroke();
    [botFaceY,botWallY].forEach(function(ty){ctx.beginPath();ctx.moveTo(dimX3-3,ty);ctx.lineTo(dimX3+3,ty);ctx.stroke();});
    ctx.fillStyle='rgba(30,45,64,0.85)'; ctx.font='bold 10px Meiryo,sans-serif';
    ctx.save(); ctx.translate(dimX3-10,_poyD+(topFaceY-_poyD)/2); ctx.rotate(-Math.PI/2);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText((posYmm-halfT)+'mm',0,0); ctx.restore();
    ctx.save(); ctx.translate(dimX3-10,botFaceY+(botWallY-botFaceY)/2); ctx.rotate(-Math.PI/2);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText((botDistMm-halfT)+'mm',0,0); ctx.restore();
    var lenMm=Math.abs(exSnap-sxSnap);
    if(lenMm>0){
      ctx.strokeStyle='rgba(200,169,110,0.8)'; ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(x1,snapMidY-Tpx2/2-8);ctx.lineTo(x2,snapMidY-Tpx2/2-8);ctx.stroke();
      [x1,x2].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,snapMidY-Tpx2/2-11);ctx.lineTo(tx,snapMidY-Tpx2/2-5);ctx.stroke();});
      ctx.fillStyle='rgba(200,169,110,1)'; ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(lenMm.toLocaleString()+'mm',(x1+x2)/2,snapMidY-Tpx2/2-10);
    }
  } else {
    var y1=_poyD+sySnap*info.sc;
    var y2=_poyD+eySnap*info.sc;
    var snapMidX=_poxD+posXsnap*info.sc;
    var Tpx3=Math.max(2,roomData.wallT*info.sc);
    ctx.fillRect(snapMidX-Tpx3/2, y1, Tpx3, y2-y1);
    ctx.strokeRect(snapMidX-Tpx3/2, y1, Tpx3, y2-y1);
    var leftFaceX=snapMidX-Tpx3/2, rightFaceX=snapMidX+Tpx3/2;
    var posXmm=posXsnap;
    var rightDistMm=roomData.W-posXmm;
    ctx.strokeStyle='rgba(30,45,64,0.4)'; ctx.lineWidth=0.8;
    var dimY3=(y1+y2)/2;
    ctx.beginPath();ctx.moveTo(_poxD,dimY3);ctx.lineTo(leftFaceX,dimY3);ctx.stroke();
    [_poxD,leftFaceX].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,dimY3-3);ctx.lineTo(tx,dimY3+3);ctx.stroke();});
    var _iWdrag=info.iW||roomData.W;
    var rightWallX=_poxD+_iWdrag*info.sc;
    ctx.beginPath();ctx.moveTo(rightFaceX,dimY3);ctx.lineTo(rightWallX,dimY3);ctx.stroke();
    [rightFaceX,rightWallX].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,dimY3-3);ctx.lineTo(tx,dimY3+3);ctx.stroke();});
    ctx.fillStyle='rgba(30,45,64,0.85)'; ctx.font='bold 10px Meiryo,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText((posXmm-halfT)+'mm',_poxD+(leftFaceX-_poxD)/2,dimY3-4);
    ctx.fillText((rightDistMm-halfT)+'mm',rightFaceX+(rightWallX-rightFaceX)/2,dimY3-4);
    var lenMm2=Math.abs(eySnap-sySnap);
    if(lenMm2>0){
      ctx.strokeStyle='rgba(200,169,110,0.8)'; ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(snapMidX+Tpx3/2+8,y1);ctx.lineTo(snapMidX+Tpx3/2+8,y2);ctx.stroke();
      [y1,y2].forEach(function(ty){ctx.beginPath();ctx.moveTo(snapMidX+Tpx3/2+5,ty);ctx.lineTo(snapMidX+Tpx3/2+11,ty);ctx.stroke();});
      ctx.fillStyle='rgba(200,169,110,1)'; ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(lenMm2.toLocaleString()+'mm',snapMidX+Tpx3/2+14,(y1+y2)/2);
    }
  }

  ctx.restore();
}
document.addEventListener('click',function(e){
  if(curView==='plan'||curView==='ceil') return;
  var cv=document.getElementById('zumen-cv'); if(!cv||e.target!==cv) return;
  var r=cv.getBoundingClientRect();
  var px=e.clientX-r.left,py=e.clientY-r.top;
  var W=getW(),H=getH();
  var mL=48,mR=16,mT=16;
  var sc=Math.min((cv.offsetWidth-mL-mR)/W,275/H);
  var ox=mL,oy=mT,hit=null;
  for(var i=getOps().length-1;i>=0;i--){
    var o=getOps()[i];
    var rx=ox+o.x*sc,ry2=oy+(H-o.y-o.h)*sc,rw3=o.w*sc,rh2=o.h*sc;
    if(px>=rx&&px<=rx+rw3&&py>=ry2&&py<=ry2+rh2){hit=o.id;break;}
  }
  if(hit!==null){
    faceEqSelId[curFaceIdx]=null; selOp(hit);
  } else {
    var eqHit=null;
    for(var j=getEquips().length-1;j>=0;j--){
      var eq=getEquips()[j];
      var erx=ox+eq.x*sc,ery=oy+(H-eq.y-eq.h)*sc,erw=eq.w*sc,erh=eq.h*sc;
      if(px>=erx&&px<=erx+erw&&py>=ery&&py<=ery+erh){eqHit=eq.id;break;}
    }
    if(eqHit!==null){
      faceSelId[curFaceIdx]=null; selEq(eqHit);
    } else {
      faceSelId[curFaceIdx]=null;faceEqSelId[curFaceIdx]=null;
      hideMP();hideMPEq();renderPlacedList();redraw();
    }
  }
});

// ══════════════════════════════════════════
//  共通canvas設定
// ══════════════════════════════════════════

function setupCanvas(cv,cssW,cssH){
  var dpr=window._printMode?window._printDpr:(window.devicePixelRatio||1);
  cv.width=Math.round(cssW*dpr); cv.height=Math.round(cssH*dpr);
  cv.style.width=cssW+'px'; cv.style.height=cssH+'px';
  var ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  return ctx;
}

// ══════════════════════════════════════════
//  展開図 canvas描画
// ══════════════════════════════════════════

function redraw(){
  if(curView==='plan'){ redrawPlan(); return; }
  if(curView==='ceil'){ redrawCeil(); return; }
  var cv=document.getElementById('zumen-cv'); if(!cv) return;
  var W=getW(),H=getH();
  var CW=cv.offsetWidth||340;
  var mL=48,mR=drawMode==='print'?80:16,mT=16,mB=drawMode==='print'?70:40;
  var sc=Math.min((CW-mL-mR)/W,275/H);
  var rw=W*sc,rh=H*sc,CH=rh+mT+mB;
  var ox=mL,oy=mT;
  var ctx=setupCanvas(cv,CW,CH);
  ctx.clearRect(0,0,CW,CH);

  // 壁面背景
  ctx.fillStyle='#f9f8f6'; ctx.fillRect(ox,oy,rw,rh);

  // 900mmグリッド
  ctx.strokeStyle='rgba(30,45,64,0.07)'; ctx.lineWidth=0.8; ctx.setLineDash([3,4]);
  for(var x=900;x<W;x+=900){var gx=ox+x*sc;ctx.beginPath();ctx.moveTo(gx,oy);ctx.lineTo(gx,oy+rh);ctx.stroke();}
  for(var y=900;y<H;y+=900){var gy=oy+(H-y)*sc;ctx.beginPath();ctx.moveTo(ox,gy);ctx.lineTo(ox+rw,gy);ctx.stroke();}
  ctx.setLineDash([]);

  // 巾木ゾーン
  var habakiH=60,habakiY=oy+rh-habakiH*sc;
  if(habakiH*sc>4){
    ctx.fillStyle='rgba(30,45,64,0.04)'; ctx.fillRect(ox,habakiY,rw,rh-(habakiY-oy));
    ctx.strokeStyle='rgba(30,45,64,0.2)'; ctx.lineWidth=0.8; ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(ox,habakiY);ctx.lineTo(ox+rw,habakiY);ctx.stroke();
    ctx.setLineDash([]);
  }

  // 間仕切り断面（交差する壁を展開図に表示）
  var faceIdx=curFaceIdx; // 0=A,1=B,2=C,3=D
  var T2=roomData.wallT;
  planPartitions.forEach(function(p){
    var secX=null, secW2=null;
    if(faceIdx===0||faceIdx===2){
      // A面(上)・C面(下)：縦壁(v)が交差
      if(p.axis==='v'){
        var touchesA=(p.start<=0);
        var touchesC=(p.start+p.len>=roomData.D);
        if((faceIdx===0&&touchesA)||(faceIdx===2&&touchesC)){
          secX=ox+p.pos*sc-(p.t||T2)*sc/2;
          secW2=(p.t||T2)*sc;
        }
      }
    } else {
      // B面(右)・D面(左)：横壁(h)が交差
      if(p.axis==='h'){
        var touchesB=(p.start+p.len>=roomData.W);
        var touchesD=(p.start<=0);
        if((faceIdx===1&&touchesB)||(faceIdx===3&&touchesD)){
          var posInFace=faceIdx===1?(roomData.D-p.pos):p.pos;
          secX=ox+posInFace*sc-(p.t||T2)*sc/2;
          secW2=(p.t||T2)*sc;
        }
      }
    }
    if(secX!==null){
      ctx.save();
      ctx.beginPath();ctx.rect(secX,oy,secW2,rh);ctx.clip();
      ctx.fillStyle='rgba(30,45,64,0.2)';
      ctx.fillRect(secX,oy,secW2,rh);
      // ハッチング
      ctx.strokeStyle='rgba(30,45,64,0.2)'; ctx.lineWidth=0.8;
      for(var hi=-rh;hi<secW2+rh;hi+=7){
        ctx.beginPath();ctx.moveTo(secX+hi,oy);ctx.lineTo(secX+hi+rh,oy+rh);ctx.stroke();
      }
      ctx.restore();
      ctx.strokeStyle='rgba(30,45,64,0.5)'; ctx.lineWidth=1;
      ctx.strokeRect(secX,oy,secW2,rh);
    }
  });

  // 開口部
  getOps().forEach(function(op){ drawOpening(ctx,op,ox,oy,W,H,sc); });

  // 外形線
  ctx.strokeStyle='rgba(30,45,64,0.85)'; ctx.lineWidth=2;
  ctx.strokeRect(ox,oy,rw,rh);

  // 設備記号
  getEquips().forEach(function(eq){ drawEquip(ctx,eq,ox,oy,W,H,sc); });

  // 寸法線（下：幅）
  var dimY=oy+rh+20;
  ctx.strokeStyle='rgba(30,45,64,0.45)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ox,dimY);ctx.lineTo(ox+rw,dimY);ctx.stroke();
  [ox,ox+rw].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,dimY-4);ctx.lineTo(tx,dimY+4);ctx.stroke();});
  ctx.fillStyle='rgba(30,45,64,0.6)'; ctx.font='bold 11px Meiryo,sans-serif';
  ctx.textAlign='center'; ctx.fillText(W.toLocaleString()+'mm',ox+rw/2,dimY+14);

  // 寸法線（左：高さ）
  var dimX=ox-22;
  ctx.strokeStyle='rgba(30,45,64,0.45)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(dimX,oy);ctx.lineTo(dimX,oy+rh);ctx.stroke();
  [oy,oy+rh].forEach(function(ty){ctx.beginPath();ctx.moveTo(dimX-4,ty);ctx.lineTo(dimX+4,ty);ctx.stroke();});
  ctx.save(); ctx.translate(dimX-13,oy+rh/2); ctx.rotate(-Math.PI/2);
  ctx.textAlign='center'; ctx.fillStyle='rgba(30,45,64,0.6)';
  ctx.font='bold 11px Meiryo,sans-serif'; ctx.fillText(H.toLocaleString()+'mm',0,0); ctx.restore();

  // 面積
  ctx.fillStyle='rgba(30,45,64,0.3)'; ctx.font='10px Meiryo,sans-serif';
  ctx.textAlign='right';
  ctx.fillText(((W/1000)*(H/1000)).toFixed(2)+'m²',ox+rw-4,oy+rh-6);
}

// ══════════════════════════════════════════
//  展開図 開口部描画（独立関数化）
// ══════════════════════════════════════════

function drawOpening(ctx,op,ox,oy,W,H,sc){
  var rx=ox+op.x*sc, ry2=oy+(H-op.y-op.h)*sc, rw3=op.w*sc, rh2=op.h*sc;
  var rcx=rx+rw3/2, rcy=ry2+rh2/2;
  var sel=op.id===faceSelId[curFaceIdx];
  var col=sel?'#b06a00':'rgba(40,40,40,0.8)';
  var lw=sel?2:1.5;
  ctx.save();
  ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=lw;
  ctx.fillStyle='#ffffff'; ctx.fillRect(rx,ry2,rw3,rh2);
  ctx.strokeStyle=col; ctx.fillStyle=col;
  var t=op.type;

  if(t==='ドア'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    ctx.lineWidth=lw*1.2; ctx.beginPath();ctx.moveTo(rx+3*sc,ry2);ctx.lineTo(rx+3*sc,ry2+rh2);ctx.stroke();
    ctx.lineWidth=lw; ctx.beginPath();ctx.moveTo(rx,ry2+rh2);ctx.lineTo(rx+rw3,ry2+rh2);ctx.stroke();
  } else if(t==='親子ドア'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    ctx.lineWidth=lw*1.2; ctx.beginPath();ctx.moveTo(rx+3*sc,ry2);ctx.lineTo(rx+3*sc,ry2+rh2);ctx.stroke();
    ctx.lineWidth=lw; ctx.beginPath();ctx.moveTo(rx+rw3*0.67,ry2);ctx.lineTo(rx+rw3*0.67,ry2+rh2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx,ry2+rh2);ctx.lineTo(rx+rw3,ry2+rh2);ctx.stroke();
    ctx.font='bold '+Math.max(7,rw3*0.06)+'px Meiryo,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('子',rx+rw3*0.83,rcy);
  } else if(t==='両開きドア'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    ctx.lineWidth=lw*1.2;
    ctx.beginPath();ctx.moveTo(rx+3*sc,ry2);ctx.lineTo(rx+3*sc,ry2+rh2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx+rw3-3*sc,ry2);ctx.lineTo(rx+rw3-3*sc,ry2+rh2);ctx.stroke();
    ctx.lineWidth=lw;
    ctx.beginPath();ctx.moveTo(rcx-1,ry2);ctx.lineTo(rcx-1,ry2+rh2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rcx+1,ry2);ctx.lineTo(rcx+1,ry2+rh2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx,ry2+rh2);ctx.lineTo(rx+rw3,ry2+rh2);ctx.stroke();
  } else if(t==='引き違いドア'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    var hw2=rw3/2;
    ctx.lineWidth=lw; ctx.strokeRect(rx+2,ry2+2,hw2+4,rh2-4);
    ctx.lineWidth=lw*0.7; ctx.setLineDash([3,2]);
    ctx.strokeRect(rx+hw2-4,ry2+4,hw2+4,rh2-8);
    ctx.setLineDash([]); ctx.lineWidth=lw;
  } else if(t==='スライドドア'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    ctx.lineWidth=lw*0.6;
    ctx.beginPath();ctx.moveTo(rx,ry2+3);ctx.lineTo(rx+rw3,ry2+3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx,ry2+rh2-3);ctx.lineTo(rx+rw3,ry2+rh2-3);ctx.stroke();
    ctx.lineWidth=lw; ctx.strokeRect(rx+2,ry2+3,rw3*0.55,rh2-6);
    ctx.lineWidth=lw*0.6; ctx.setLineDash([2,2]);
    ctx.beginPath();ctx.moveTo(rx+rw3*0.6,rcy);ctx.lineTo(rx+rw3-4,rcy);ctx.stroke();
    ctx.setLineDash([]); ctx.lineWidth=lw;
  } else if(t==='窓（中連）'||t==='窓（掃出）'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    var gi=Math.max(2,2*sc);
    ctx.strokeRect(rx+gi,ry2+gi,rw3-gi*2,rh2-gi*2);
    ctx.lineWidth=lw*0.8; ctx.beginPath();ctx.moveTo(rcx,ry2+gi);ctx.lineTo(rcx,ry2+rh2-gi);ctx.stroke();
    ctx.strokeStyle='rgba(100,160,200,0.3)'; ctx.lineWidth=0.6;
    ctx.beginPath();ctx.moveTo(rx+gi,ry2+gi);ctx.lineTo(rx+rw3-gi,ry2+rh2-gi);ctx.stroke();
    ctx.strokeStyle=col; ctx.lineWidth=lw;
  } else if(t==='排煙窓'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    var gi2=Math.max(2,2*sc);
    ctx.strokeRect(rx+gi2,ry2+gi2,rw3-gi2*2,rh2-gi2*2);
    ctx.lineWidth=lw*0.7; ctx.setLineDash([3,2]);
    ctx.beginPath();ctx.moveTo(rx+gi2,ry2+gi2);ctx.lineTo(rcx,ry2+rh2-gi2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx+rw3-gi2,ry2+gi2);ctx.lineTo(rcx,ry2+rh2-gi2);ctx.stroke();
    ctx.setLineDash([]); ctx.lineWidth=lw;
    ctx.font='bold '+Math.max(8,rw3*0.1)+'px Meiryo,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('EX',rcx,rcy);
  } else if(t==='縦滑り窓'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    var gi3=Math.max(2,2*sc);
    ctx.strokeRect(rx+gi3,ry2+gi3,rw3-gi3*2,rh2-gi3*2);
    ctx.lineWidth=lw*0.7; ctx.setLineDash([3,2]);
    ctx.beginPath();ctx.moveTo(rx+gi3,ry2+gi3);ctx.lineTo(rx+rw3-gi3,rcy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx+gi3,ry2+rh2-gi3);ctx.lineTo(rx+rw3-gi3,rcy);ctx.stroke();
    ctx.setLineDash([]); ctx.lineWidth=lw;
  } else if(t==='横滑り窓'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    var gi4=Math.max(2,2*sc);
    ctx.strokeRect(rx+gi4,ry2+gi4,rw3-gi4*2,rh2-gi4*2);
    ctx.lineWidth=lw*0.7; ctx.setLineDash([3,2]);
    ctx.beginPath();ctx.moveTo(rx+gi4,ry2+gi4);ctx.lineTo(rcx,ry2+rh2-gi4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx+rw3-gi4,ry2+gi4);ctx.lineTo(rcx,ry2+rh2-gi4);ctx.stroke();
    ctx.setLineDash([]); ctx.lineWidth=lw;
  } else if(t==='出窓'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    var bump=rh2*0.2;
    ctx.strokeRect(rx+rw3*0.15,ry2,rw3*0.7,rh2+bump);
    ctx.strokeStyle='rgba(100,160,200,0.4)'; ctx.lineWidth=0.6;
    ctx.beginPath();ctx.moveTo(rx+rw3*0.15,ry2+2);ctx.lineTo(rx+rw3*0.85,ry2+rh2-2);ctx.stroke();
    ctx.strokeStyle=col; ctx.lineWidth=lw;
  } else if(t==='ジャロジー'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    var blades=4,bh=rh2/blades;
    for(var bi=1;bi<blades;bi++){
      var by=ry2+bi*bh;
      ctx.lineWidth=lw*0.8; ctx.beginPath();ctx.moveTo(rx+2,by);ctx.lineTo(rx+rw3-2,by-bh*0.3);ctx.stroke();
    }
  } else if(t==='嵌め殺し'){
    ctx.strokeRect(rx,ry2,rw3,rh2);
    var gi5=Math.max(2,2*sc);
    ctx.strokeRect(rx+gi5,ry2+gi5,rw3-gi5*2,rh2-gi5*2);
    ctx.lineWidth=lw*0.5; ctx.strokeStyle='rgba(100,160,200,0.5)';
    ctx.beginPath();
    ctx.moveTo(rx+gi5,ry2+gi5);ctx.lineTo(rx+rw3-gi5,ry2+rh2-gi5);
    ctx.moveTo(rx+rw3-gi5,ry2+gi5);ctx.lineTo(rx+gi5,ry2+rh2-gi5);ctx.stroke();
    ctx.strokeStyle=col; ctx.lineWidth=lw;
    ctx.font='bold '+Math.max(7,rw3*0.1)+'px Meiryo,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle=col; ctx.fillText('FIX',rcx,rcy);
  }

  // 選択時寸法
  if(sel){
    ctx.fillStyle='#b06a00'; ctx.font='10px Meiryo,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(op.w+'mm',rcx,ry2-3);
    ctx.save(); ctx.translate(rx-5,rcy); ctx.rotate(-Math.PI/2);
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(op.h+'mm',0,0); ctx.restore();
    if(op.x>0){
      var dimY2b=oy+H*sc+8;
      ctx.strokeStyle='rgba(176,106,0,0.5)'; ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(ox,dimY2b);ctx.lineTo(rx,dimY2b);ctx.stroke();
      [ox,rx].forEach(function(tx2){ctx.beginPath();ctx.moveTo(tx2,dimY2b-3);ctx.lineTo(tx2,dimY2b+3);ctx.stroke();});
      ctx.fillStyle='rgba(176,106,0,0.8)'; ctx.font='9px Meiryo,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(op.x+'mm',ox+(rx-ox)/2,dimY2b+4);
    }
  }
  ctx.restore();
}

// ══════════════════════════════════════════
//  展開図 設備記号描画（独立関数化）
// ══════════════════════════════════════════

function drawEquip(ctx,eq,ox,oy,W,H,sc){
  var erx=ox+eq.x*sc, ery=oy+(H-eq.y-eq.h)*sc;
  var erw=eq.w*sc, erh=eq.h*sc;
  var ecx=erx+erw/2, ecy=ery+erh/2;
  var sel=eq.id===faceEqSelId[curFaceIdx];
  var col=sel?'#1a6aaa':'rgba(30,45,64,0.75)';
  ctx.save();
  ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=sel?2:1.5;
  ctx.textAlign='center'; ctx.textBaseline='middle';

  if(eq.typeId==='outlet'){
    ctx.strokeRect(erx,ery,erw,erh);
    var m=Math.max(2,3*sc);
    ctx.strokeRect(erx+m,ery+m,erw-m*2,erh-m*2);
    var sw2=erw*0.12,sh2=erh*0.3,sx1=ecx-erw*0.18,sx2=ecx+erw*0.06;
    ctx.fillRect(sx1-sw2/2,ecy-sh2/2,sw2,sh2);
    ctx.fillRect(sx2-sw2/2,ecy-sh2/2,sw2,sh2);
  } else if(eq.typeId==='switch'||eq.typeId==='switch3'){
    ctx.strokeRect(erx,ery,erw,erh);
    var m2=Math.max(2,3*sc);
    ctx.strokeRect(erx+m2,ery+m2,erw-m2*2,erh-m2*2);
    ctx.beginPath();ctx.moveTo(ecx,ery+m2);ctx.lineTo(ecx,ery+erh-m2);ctx.stroke();
    if(eq.typeId==='switch3'){
      ctx.font='bold '+Math.max(8,erw*0.18)+'px Meiryo,sans-serif';
      ctx.textBaseline='top'; ctx.fillText('3',erx+erw+3,ery); ctx.textBaseline='middle';
    }
  } else if(eq.typeId==='bracket'){
    var baseH=erh*0.2;
    ctx.strokeRect(erx+erw*0.2,ery+erh-baseH,erw*0.6,baseH);
    var bodyW=erw*0.35,bodyH=erh*0.45;
    ctx.beginPath();ctx.ellipse(ecx,ery+erh*0.55,bodyW/2,bodyH/2,0,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ecx-erw*0.45,ery+erh*0.25);ctx.lineTo(ecx+erw*0.45,ery+erh*0.25);
    ctx.lineTo(ecx+bodyW/2,ery+erh*0.55-bodyH/2);ctx.lineTo(ecx-bodyW/2,ery+erh*0.55-bodyH/2);
    ctx.closePath();ctx.stroke();
    ctx.font='bold '+Math.max(8,erw*0.14)+'px Meiryo,sans-serif';
    ctx.textBaseline='middle'; ctx.fillText('BL',erx+erw+6,ecy);
  } else if(eq.typeId==='fan_round'){
    var fr=Math.min(erw,erh)/2;
    ctx.beginPath();ctx.arc(ecx,ecy,fr,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(ecx,ecy,fr*0.75,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ecx-fr*0.65,ecy);ctx.lineTo(ecx+fr*0.65,ecy);
    ctx.moveTo(ecx,ecy-fr*0.65);ctx.lineTo(ecx,ecy+fr*0.65);ctx.stroke();
    ctx.beginPath();ctx.arc(ecx,ecy,fr*0.12,0,Math.PI*2);ctx.fill();
    ctx.font='bold '+Math.max(8,fr*0.28)+'px Meiryo,sans-serif';
    ctx.textBaseline='top'; ctx.fillText('EF',ecx+fr+3,ery); ctx.textBaseline='middle';
  } else if(eq.typeId==='fan_sq'){
    ctx.strokeRect(erx,ery,erw,erh);
    var mg=erw*0.1;
    ctx.strokeRect(erx+mg,ery+mg,erw-mg*2,erh-mg*2);
    ctx.beginPath();ctx.moveTo(erx+mg,ery+mg);ctx.lineTo(erx+erw-mg,ery+erh-mg);
    ctx.moveTo(erx+erw-mg,ery+mg);ctx.lineTo(erx+mg,ery+erh-mg);ctx.stroke();
    ctx.beginPath();ctx.arc(ecx,ecy,Math.min(erw,erh)*0.08,0,Math.PI*2);ctx.fill();
    ctx.font='bold '+Math.max(8,erw*0.14)+'px Meiryo,sans-serif';
    ctx.textBaseline='top'; ctx.fillText('EF',erx+erw+3,ery); ctx.textBaseline='middle';
  } else if(eq.typeId==='ac_wall'){
    ctx.strokeRect(erx,ery,erw,erh);
    var mg2=Math.min(erw,erh)*0.08;
    ctx.strokeRect(erx+mg2,ery+mg2,erw-mg2*2,erh-mg2*2);
    // ルーバー線
    ctx.lineWidth=0.7;
    for(var i=1;i<=4;i++){
      var lx=erx+mg2+(erw-mg2*2)*i/5;
      ctx.beginPath();ctx.moveTo(lx,ery+mg2);ctx.lineTo(lx,ery+erh-mg2);ctx.stroke();
    }
    ctx.font='bold '+Math.max(7,erh*0.25)+'px Meiryo,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('AC',ecx,ecy);
  }

  // 選択時ハイライト・寸法
  if(sel&&drawMode==='edit'){
    ctx.strokeStyle='rgba(26,106,170,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.strokeRect(erx-2,ery-2,erw+4,erh+4); ctx.setLineDash([]);
    var df='rgba(26,106,170,0.85)';
    var cxMm=Math.round(eq.x+eq.w/2), cyMm=Math.round(eq.y+eq.h/2);
    if(cxMm>0){
      var dimY2=oy+H*sc+10;
      ctx.strokeStyle='#1a6aaa'; ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(ox,dimY2);ctx.lineTo(ecx,dimY2);ctx.stroke();
      [ox,ecx].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,dimY2-4);ctx.lineTo(tx,dimY2+4);ctx.stroke();});
      ctx.strokeStyle='rgba(26,106,170,0.3)'; ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(ecx,ery+erh);ctx.lineTo(ecx,dimY2);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle=df; ctx.font='bold 10px Meiryo,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(cxMm.toLocaleString()+'mm',ox+(ecx-ox)/2,dimY2+5);
    }
    if(cyMm>0){
      var dimX2=ox-10;
      ctx.strokeStyle='#1a6aaa'; ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(dimX2,oy+H*sc);ctx.lineTo(dimX2,ecy);ctx.stroke();
      [oy+H*sc,ecy].forEach(function(ty){ctx.beginPath();ctx.moveTo(dimX2-4,ty);ctx.lineTo(dimX2+4,ty);ctx.stroke();});
      ctx.strokeStyle='rgba(26,106,170,0.3)'; ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(erx,ecy);ctx.lineTo(dimX2,ecy);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle=df; ctx.font='bold 10px Meiryo,sans-serif';
      ctx.save(); ctx.translate(dimX2-12,oy+H*sc-(oy+H*sc-ecy)/2);
      ctx.rotate(-Math.PI/2); ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(cyMm.toLocaleString()+'mm',0,0); ctx.restore();
    }
    ctx.fillStyle=df; ctx.font='bold 10px Meiryo,sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(eq.label,erx+erw+5,ecy);
  }
  ctx.restore();
}

function openWaritsukeModal(){
  saveCurrentInputs();
  var faceNames=['A面','B面','C面','D面'];
  var html=''; var hasAny=false;
  FACES.forEach(function(f,i){
    var W=faceW(i), H=faceH();
    var opCnt=faceOpenings[i].length, eqCnt=faceEquips[i].length;
    var hasData=W>0&&H>0;
    if(hasData) hasAny=true;
    var detail=hasData?(W.toLocaleString()+'×'+H.toLocaleString()+'mm'):'（寸法未入力）';
    var badge='';
    if(hasData&&(opCnt+eqCnt)>0){
      badge=' <span class="wa-mfr-badge">'+(opCnt?'開口'+opCnt:'')+(opCnt&&eqCnt?' / ':'')+(eqCnt?'設備'+eqCnt:'')+'</span>';
    }
    html+='<div class="wa-face-row '+(hasData?'has-data':'no-data')+'">';
    html+='<div class="wa-mfr-left">'+faceNames[i]+badge+'</div>';
    html+='<div class="wa-mfr-detail">'+detail+'</div>';
    html+='</div>';
  });
  document.getElementById('wa-face-list').innerHTML=html;
  var btn=document.getElementById('wa-send-btn');
  btn.disabled=!hasAny;
  btn.textContent=hasAny?'送信する':'（寸法を入力してください）';
  document.getElementById('wa-modal').classList.remove('hidden');
  setTimeout(function(){ document.getElementById('wa-project').focus(); },100);
}

function closeWaModal(e){
  if(e&&e.target!==document.getElementById('wa-modal')) return;
  document.getElementById('wa-modal').classList.add('hidden');
}

function doSendToWaritsuke(){
  var project=document.getElementById('wa-project').value.trim()||'未設定';
  var today=new Date();
  var dateStr=today.getFullYear()+'-'+(today.getMonth()+1).toString().padStart(2,'0')+'-'+today.getDate().toString().padStart(2,'0');
  var faceNames=['A面','B面','C面','D面'];
  var faces=[];
  FACES.forEach(function(f,i){
    var W=faceW(i), H=faceH();
    if(W<=0||H<=0) return;
    var openings=faceOpenings[i].map(function(op){
      return{id:op.id,type:op.type,x:Math.round(op.x),y:Math.round(op.y),w:Math.round(op.w),h:Math.round(op.h)};
    });
    var objects=faceEquips[i].map(function(eq){
      return{id:eq.id,typeId:eq.typeId,label:eq.label,x:Math.round(eq.x),y:Math.round(eq.y),w:Math.round(eq.w),h:Math.round(eq.h)};
    });
    faces.push({id:'face_'+i,name:faceNames[i],W:W,H:H,openings:openings,objects:objects});
  });

  if(faces.length===0){
    showWaToast('⚠️ 寸法が入力されていません（平面図で設定してください）');
    return;
  }

  var data={
    project:project,
    createdAt:dateStr,
    roomW:roomData.W, roomD:roomData.D, roomH:roomData.H,
    faces:faces
  };
  try{
    localStorage.setItem('genba_wall_data', JSON.stringify(data));
    document.getElementById('wa-modal').classList.add('hidden');
    showWaToast('📐 「'+project+'」'+faces.length+'面を割付アプリへ送信しました');
  }catch(err){
    showWaToast('⚠️ 送信に失敗しました: '+err.message);
  }
}

function showWaToast(msg){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+20px);left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:200;white-space:nowrap;box-shadow:0 4px 16px rgba(10,20,35,0.3)';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity 0.4s';setTimeout(function(){if(t.parentNode)document.body.removeChild(t);},400);},2500);
}

// ══════════════════════════════════════════
//  割付アプリからのデータ受信
// ══════════════════════════════════════════

(function loadFromWaritsuke(){
  var raw;
  try{ raw=localStorage.getItem('genba_wall_data'); }catch(e){ return; }
  if(!raw) return;
  var data;
  try{ data=JSON.parse(raw); }catch(e){ return; }
  if(!data||!data.faces||!data.faces.length) return;

  // 部屋寸法をroomDataに反映（roomW/D/Hがあれば優先）
  if(data.roomW>0) roomData.W=data.roomW;
  if(data.roomD>0) roomData.D=data.roomD;
  if(data.roomH>0) roomData.H=data.roomH;

  // 各面の開口部・設備記号を展開図データに反映
  data.faces.forEach(function(face,i){
    if(i>=4) return;
    var W=face.W||0, H=face.H||0;
    if(W<=0||H<=0) return;

    // roomDataの高さはfaceのHで上書き（全面共通）
    if(H>0) roomData.H=H;

    // 開口部をセット（割付アプリ→図面アプリ型変換）
    var ops=[];
    var seq=faceOidSeq[i]||0;
    (face.openings||[]).forEach(function(op){
      seq++;
      // 割付アプリの開口typeをそのまま使用（ドア/窓（中連）/窓（掃出））
      // 図面アプリの型名にマッピング
      var type=op.type;
      if(type==='ドア') type='ドア';
      else if(type==='窓（掃出）') type='窓（掃出）';
      else type='窓（引き違い）';
      ops.push({id:seq, type:type, w:op.w||900, h:op.h||2100, x:op.x||0, y:op.y||0});
    });
    faceOpenings[i]=ops;
    faceOidSeq[i]=seq;
  });

  // 展開図A面に切替して表示
  curView='faceA';
  curFaceIdx=0;

  showWaToast('📐 割付アプリから'+data.faces.length+'面を読み込みました');
  // 読み込み後は消去して二重読み込みを防ぐ
  try{ localStorage.removeItem('genba_wall_data'); }catch(e){}
})();

// ── 一覧描画 ──
function _renderProjList(keyword){
  var list=document.getElementById('proj-list');
  if(!list) return;
  var keys=[];
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.indexOf(PROJ_PREFIX)===0) keys.push(k);
  }
  // 更新日時降順ソート
  keys.sort(function(a,b){
    var da=0,db=0;
    try{ da=JSON.parse(localStorage.getItem(a)).savedAt||0; }catch(e){}
    try{ db=JSON.parse(localStorage.getItem(b)).savedAt||0; }catch(e){}
    return db-da;
  });
  // キーワードフィルタ
  var kw=(keyword||'').trim();
  if(kw) keys=keys.filter(function(k){ return k.replace(PROJ_PREFIX,'').indexOf(kw)>=0; });

  // 現場名でグループ化
  var groups={};
  var groupOrder=[];
  keys.forEach(function(k){
    var name=k.replace(PROJ_PREFIX,'');
    var parts=name.split('|');
    var g=parts[0]||'', r=parts[1]||'';
    if(!groups[g]){ groups[g]=[]; groupOrder.push(g); }
    groups[g].push(r);
  });

  list.innerHTML='';
  if(groupOrder.length===0){
    list.innerHTML='<div style="font-size:12px;color:rgba(255,255,255,0.35);padding:6px 2px;">'+(kw?'該当なし':'保存済みデータなし')+'</div>';
    return;
  }

  groupOrder.forEach(function(g){
    var rooms=groups[g];
    var isCurrentGenba=(g===_projGenba);
    // 現場名行
    var genbaRow=document.createElement('div');
    genbaRow.style.cssText='padding:8px 10px;border-radius:8px;margin-bottom:2px;background:'+(isCurrentGenba?'rgba(200,169,110,0.15)':'rgba(255,255,255,0.05)')+';border:1px solid '+(isCurrentGenba?'rgba(200,169,110,0.4)':'transparent')+';cursor:pointer;';
    var genbaInner=document.createElement('div');
    genbaInner.style.cssText='display:flex;align-items:center;gap:6px;';
    var arrow=document.createElement('span');
    arrow.style.cssText='font-size:10px;color:rgba(255,255,255,0.5);transition:transform 0.2s;';
    arrow.textContent='▶';
    var genbaLabel=document.createElement('span');
    genbaLabel.style.cssText='flex:1;font-size:13px;font-weight:700;color:#fff;';
    genbaLabel.textContent='🏠 '+g;
    var countBadge=document.createElement('span');
    countBadge.style.cssText='font-size:10px;color:rgba(255,255,255,0.4);';
    countBadge.textContent=rooms.length+'室';
    genbaInner.appendChild(arrow);
    genbaInner.appendChild(genbaLabel);
    genbaInner.appendChild(countBadge);
    genbaRow.appendChild(genbaInner);

    // 部屋一覧（折りたたみ）
    var roomList=document.createElement('div');
    roomList.style.cssText='overflow:hidden;max-height:0;transition:max-height 0.2s;';
    var expanded=isCurrentGenba; // 現在の現場は展開済み
    if(expanded){ roomList.style.maxHeight='400px'; arrow.style.transform='rotate(90deg)'; }

    rooms.forEach(function(r){
      (function(g,r){
        var isCurrent=(g===_projGenba&&r===_projRoom);
        var roomRow=document.createElement('div');
        roomRow.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 10px 7px 22px;border-radius:6px;margin-top:2px;background:'+(isCurrent?'rgba(200,169,110,0.2)':'rgba(255,255,255,0.04)')+';cursor:pointer;';

        var roomLabel=document.createElement('span');
        roomLabel.style.cssText='flex:1;font-size:12px;color:#fff;font-weight:'+(isCurrent?'700':'400')+';';
        roomLabel.textContent='🚪 '+r;
        if(!isCurrent) roomLabel.onclick=function(){ projLoadExisting(g,r); };
        roomRow.appendChild(roomLabel);

        var status=document.createElement('span');
        status.style.cssText='font-size:10px;color:'+(isCurrent?'var(--accent)':'rgba(255,255,255,0.4)')+';flex-shrink:0;';
        status.textContent=isCurrent?'表示中':'読込';
        if(!isCurrent) status.onclick=function(){ projLoadExisting(g,r); };
        roomRow.appendChild(status);

        var delBtn=document.createElement('button');
        delBtn.textContent='🗑';
        delBtn.style.cssText='height:28px;width:28px;border:none;border-radius:6px;background:rgba(229,53,53,0.3);color:#fff;font-size:12px;cursor:pointer;flex-shrink:0;';
        delBtn.onclick=function(e){ e.stopPropagation(); projDeleteRoom(g,r); };
        roomRow.appendChild(delBtn);

        roomList.appendChild(roomRow);
      })(g,r);
    });

    genbaRow.appendChild(roomList);

    // 現場名タップで展開/折りたたみ
    genbaInner.onclick=function(){
      expanded=!expanded;
      roomList.style.maxHeight=expanded?'400px':'0';
      arrow.style.transform=expanded?'rotate(90deg)':'';
    };

    list.appendChild(genbaRow);
  });
}

function projDeleteRoom(g,r){
  var label=(r?g+'｜'+r:g);
  try{ localStorage.removeItem(_projKey(g,r)); }catch(e){}
  showWaToast('🗑 「'+label+'」を削除しました');
  if(g===_projGenba&&r===_projRoom){
    _projGenba=''; _projRoom='';
    _updateProjLabel();
    _resetData();
    curView='plan';
    var sel=document.getElementById('view-select');
    if(sel) sel.value='plan';
    closeProjPanel();
    renderMain();
  } else {
    _renderProjList('');
  }
}

function projSearch(){
  var s=document.getElementById('proj-search');
  _renderProjList(s?s.value:'');
}

// ── 新規作成 → 読込 ──
function projLoadNew(){
  var g=document.getElementById('new-genba');
  var r=document.getElementById('new-room');
  var gv=(g?g.value.trim():'');
  var rv=(r?r.value.trim():'');
  if(!gv){ showWaToast('⚠ 現場名を入力してください'); return; }
  if(!rv){ showWaToast('⚠ 部屋名を入力してください'); return; }
  // 現在の作図を保存してから切り替え
  projAutoSave();
  var raw=localStorage.getItem(_projKey(gv,rv));
  if(raw){
    _loadData(gv,rv,raw);
  } else {
    _resetData();
    _projGenba=gv; _projRoom=rv;
    _updateProjLabel();
    projAutoSave();
    curView='plan';
    var sel=document.getElementById('view-select');
    if(sel) sel.value='plan';
    showWaToast('📂 新規作成：'+gv+'｜'+rv);
  }
  closeProjPanel();
  renderMain();
}

// ── 部屋追加 → 読込 ──
function projLoadAddRoom(){
  var r=document.getElementById('addroom-room');
  var rv=(r?r.value.trim():'');

  // 現在の作図を保存してから切り替え
  projAutoSave();
  var raw=localStorage.getItem(_projKey(_projGenba,rv));

    _loadData(_projGenba,rv,raw);
  } else {
    _resetData();
    _projRoom=rv;
    _updateProjLabel();
    projAutoSave();
    curView='plan';
    var sel=document.getElementById('view-select');
    if(sel) sel.value='plan';

  }
  closeProjPanel();
  renderMain();
}

// ── 一覧から読込 ──
function projLoadExisting(g,r){
  // 現在の作図を保存してから切り替え
  projAutoSave();
  var raw=localStorage.getItem(_projKey(g,r));
  if(!raw){ showWaToast('データが見つかりません'); return; }
  _loadData(g,r,raw);
  closeProjPanel();
}

// ── 内部：データリセット ──
function _resetData(){
  roomData={W:0,D:0,H:0,wallT:120,compassDeg:0,_setupMode:null};
  faceOpenings=[[],[],[],[]]; faceOidSeq=[0,0,0,0];
  faceEquips=[[],[],[],[]];   faceEqSeq=[0,0,0,0];
  ceilParts=[];ceilSeq=0;
  planColumns=[];planColSeq=0;
  planPartitions=[];planPartSeq=0;
  _undoStack=[];_redoStack=[];
}

// ── 内部：データ読込 ──
function _loadData(g,r,raw){
  try{
    var d=JSON.parse(raw);
    roomData=d.roomData||{W:3600,D:4500,H:2400,wallT:120,compassDeg:0};
    faceOpenings=d.faceOpenings||[[],[],[],[]];
    faceOidSeq=d.faceOidSeq||[0,0,0,0];
    faceEquips=d.faceEquips||[[],[],[],[]];
    faceEqSeq=d.faceEqSeq||[0,0,0,0];
    ceilParts=d.ceilParts||[]; ceilSeq=d.ceilSeq||0;
    planColumns=d.planColumns||[]; planColSeq=d.planColSeq||0;
    planPartitions=d.planPartitions||[]; planPartSeq=d.planPartSeq||0;
    _undoStack=[];_redoStack=[];
    // 外周作図途中データを復元
    var os=d.outlineState;
    if(os){
      _planMode=os.planMode||'none';
      _outlineVerts=os.outlineVerts||[];
      _outlineClosed=os.outlineClosed||false;
      _outlinePhase=os.outlinePhase||'input';
      _outlineDims=os.outlineDims||[];
      _outlineAutoCorner=os.outlineAutoCorner||false;
      var fb=document.getElementById('btn-outline-finish');
      if(fb){
        if(_planMode==='outline'&&!_outlineClosed) fb.classList.remove('hidden');
        else fb.classList.add('hidden');
      }
    } else {
      _planMode='none';
      _outlineVerts=[]; _outlineClosed=false;
      _outlinePhase='input'; _outlineDims=[];
      _outlineAutoCorner=false;
      var fb2=document.getElementById('btn-outline-finish');
      if(fb2) fb2.classList.add('hidden');
    }
    _editSelEdge=null; _editDragPt=null;
    _outlineLockEdges=new Set();
    curView='plan';
    var sel=document.getElementById('view-select');
    if(sel) sel.value='plan';
    _projGenba=g; _projRoom=r;
    _updateProjLabel();
    renderMain();
    showWaToast('📂 読込：'+g+'｜'+r);
  }catch(e){ showWaToast('読込失敗: '+e.message); }
}

var _bleDevice    = null;
var _bleChar      = null;
var _bleConnected = false;
var _bleTarget    = 'W'; // 'W'|'D'|'H'|'PL'

// Bosch GLM BLE UUIDs（GLM 50-27CG）
var BLE_SERVICE_UUID  = '00005301-0000-0041-4c50-534146455359';
var BLE_CHAR_UUID     = '00005302-0000-0041-4c50-534146455359';

function openBleModal(){
  document.getElementById('ble-modal').classList.remove('hidden');
  _updateBleUI();
}
function closeBleModal(e){
  if(e&&e.currentTarget!==e.target) return;
  document.getElementById('ble-modal').classList.add('hidden');
}

function setBleTarget(t){
  _bleTarget=t;
  ['W','D','H','PL'].forEach(function(k){
    var b=document.getElementById('bt-'+k);
    if(b) b.className='ble-target'+(k===t?' active':'');
  });
}

function _updateBleUI(){
  var dot=document.getElementById('ble-dot');
  var txt=document.getElementById('ble-status-text');
  var btn=document.getElementById('ble-connect-btn');
  var lbl=document.getElementById('ble-label');
  var icon=document.getElementById('ble-icon');
  if(_bleConnected){
    if(dot){ dot.style.background='#2db55d'; dot.style.boxShadow='0 0 6px #2db55d'; }
    if(txt) txt.textContent=(_bleDevice?_bleDevice.name:'GLM')+' 接続中';
    if(btn){ btn.textContent='接続済み'; btn.style.background='#2db55d'; }
    if(lbl){ lbl.textContent='接続中'; lbl.style.color='#2db55d'; }
    if(icon) icon.setAttribute('stroke','#2db55d');
  } else {
    if(dot){ dot.style.background='rgba(30,45,64,0.2)'; dot.style.boxShadow=''; }
    if(txt) txt.textContent='未接続';
    if(btn){ btn.textContent='接続'; btn.style.background='var(--navy)'; }
    if(lbl){ lbl.textContent='GLM'; lbl.style.color='rgba(255,255,255,0.7)'; }
    if(icon) icon.setAttribute('stroke','rgba(255,255,255,0.7)');
  }
}

async function bleConnect(){
  if(!navigator.bluetooth){
    showWaToast('⚠ このブラウザはWeb Bluetooth非対応です（Chrome推奨）');
    return;
  }
  var btn=document.getElementById('ble-connect-btn');
  if(btn){ btn.textContent='スキャン中...'; btn.disabled=true; }
  try {
    _bleDevice = await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:'GLM'}],
      optionalServices:[BLE_SERVICE_UUID]
    });
    _bleDevice.addEventListener('gattserverdisconnected', _onBleDisconnected);
    var server  = await _bleDevice.gatt.connect();
    var service = await server.getPrimaryService(BLE_SERVICE_UUID);
    _bleChar    = await service.getCharacteristic(BLE_CHAR_UUID);
    await _bleChar.startNotifications();
    _bleChar.addEventListener('characteristicvaluechanged', _onBleValue);
    _bleConnected = true;
    _updateBleUI();
    showWaToast('✅ GLM接続しました');
  } catch(e) {
    if(btn){ btn.textContent='接続'; btn.disabled=false; }
    if(e.name!=='NotFoundError') showWaToast('接続失敗: '+e.message);
    _updateBleUI();
  }
}

function bleDisconnect(){
  if(_bleDevice&&_bleDevice.gatt.connected){
    _bleDevice.gatt.disconnect();
  }
  _onBleDisconnected();
}

function _onBleDisconnected(){
  _bleConnected=false;
  _bleChar=null;
  _updateBleUI();
  showWaToast('🔵 GLM切断しました');
}

function _onBleValue(e){
  // GLM 50-27CGのデータ形式: バイト列から距離(mm)を取得
  var val=e.target.value;
  var bytes=new Uint8Array(val.buffer);
  // Bosch GLMプロトコル: 先頭4バイトがリトルエンディアンで距離(0.1mm単位)
  var raw=(bytes[3]<<24)|(bytes[2]<<16)|(bytes[1]<<8)|bytes[0];
  var mm=Math.round(raw/10); // 0.1mm→mm
  _applyBleValue(mm);
}

function bleInjectTest(){
  var inp=document.getElementById('ble-test-input');
  var mm=parseInt(inp?inp.value:3600)||3600;
  _applyBleValue(mm);
}

function _applyBleValue(mm){
  if(mm<=0||mm>50000) return;
  window._bleLastMm=mm; // 外周作図モードでも使えるよう保存
  var lastEl=document.getElementById('ble-last-val');
  if(lastEl) lastEl.textContent=mm.toLocaleString()+' mm';

  if(_bleTarget==='W'){
    roomData.W=mm;
    var el=document.getElementById('inp-W');
    if(el) el.value=mm;
  } else if(_bleTarget==='D'){
    roomData.D=mm;
    var el=document.getElementById('inp-D');
    if(el) el.value=mm;
  } else if(_bleTarget==='H'){
    roomData.H=mm;
    var el=document.getElementById('inp-H');
    if(el) el.value=mm;
  } else if(_bleTarget==='PL'){
    // 間仕切り長さ：選択中の間仕切りに適用
    if(_planSelId!==null&&_planSelType==='partition'){
      var sp=planPartitions.find(function(p){return p.id===_planSelId;});
      if(sp){ pushHistory(); sp.len=mm; }
    } else {
      showWaToast('先に平面図で間仕切りを選択してください');
      return;
    }
  }
  pushHistory();
  renderMain();
  showWaToast('📏 '+_bleTarget+' = '+mm.toLocaleString()+'mm をセットしました');
}
