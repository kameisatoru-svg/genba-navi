<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>図面アプリ｜アート・レイズ</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e2d40">
<style>
:root{
  --bg:#eeebe5;--navy:#1e2d40;--navy2:#2a3f5a;
  --accent:#c8a96e;--text:#1e2d40;--text2:#5a6a7a;--white:#ffffff;
  --cop:#b06a00;--bop:rgba(176,106,0,0.10);--top:#7a4800;
  --ceq:#1a6aaa;--beq:rgba(26,106,170,0.08);--teq:#1a4a88;
  --ceil:#2a6a4a;--bceil:rgba(42,106,74,0.08);--tceil:#1a4a2a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Meiryo','Yu Gothic',sans-serif;
  height:100svh;display:flex;flex-direction:column;overflow:hidden;
  position:fixed;width:100%;
}

/* ── ヘッダー ── */
.header{
  background:var(--navy);height:60px;
  display:flex;align-items:center;padding:0 10px;gap:5px;flex-shrink:0;
}
.btn-back{
  width:44px;height:44px;border:none;background:transparent;
  color:var(--white);cursor:pointer;
  display:flex;align-items:center;justify-content:center;border-radius:10px;
  flex-shrink:0;
}
.btn-back:active{background:rgba(255,255,255,0.15);}

/* 図面種別セレクト */
.view-select-wrap{
  position:relative;flex:1;max-width:175px;
}
.view-select{
  width:100%;height:38px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:10px;color:var(--white);
  font-size:13px;font-weight:700;font-family:inherit;
  padding:0 26px 0 10px;cursor:pointer;
  -webkit-appearance:none;appearance:none;outline:none;
}
.view-select option{
  background:#ffffff;
  color:#1e2d40;
}
.view-select-wrap::after{
  content:'▼';position:absolute;right:8px;top:50%;transform:translateY(-50%);
  font-size:9px;color:rgba(255,255,255,0.7);pointer-events:none;
}

/* モードトグル（編集/印刷） */
.mode-toggle{display:flex;gap:2px;background:rgba(255,255,255,0.1);border-radius:10px;padding:2px;margin-left:auto;}
.mtb{
  width:40px;height:40px;border:none;border-radius:8px;
  background:transparent;color:rgba(255,255,255,0.75);
  font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
}
.mtb svg{display:block;}
.mtb.active{background:var(--accent);color:var(--navy);}
.mtb.active svg{stroke:var(--navy);}

/* Undo/Redoトグル */
.undo-toggle{display:flex;gap:2px;background:rgba(255,255,255,0.1);border-radius:10px;padding:2px;margin-left:0;}
.utb{
  width:40px;height:40px;border:none;border-radius:8px;
  background:transparent;color:var(--accent);
  cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.15s;
}
.utb:active{background:rgba(200,169,110,0.2);}
.utb svg{display:block;}

/* 割付・出力ボタン */
.btn-do-print{
  height:38px;padding:0 10px;border:1.5px solid var(--accent);border-radius:10px;
  background:transparent;color:var(--accent);font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:4px;
}
.btn-do-print:active{background:rgba(200,169,110,0.2);}

/* ── スクロールエリア ── */
.scroll-area{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 14px max(20px,env(safe-area-inset-bottom));
  touch-action:pan-y;
}

/* ── 共通 ── */
.st{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:0.03em;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.r4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;}
.iw{display:flex;flex-direction:column;gap:4px;}
.iw span{font-size:11px;color:var(--text2);font-weight:600;}
.iw input{
  height:42px;border:1.5px solid rgba(30,45,64,0.18);border-radius:10px;
  padding:0 12px;font-size:15px;font-family:inherit;color:var(--text);
  background:var(--white);outline:none;
}
.iw input:focus{border-color:var(--accent);}
.sec{margin-bottom:16px;}

/* 壁厚ボタン */
.wt-btns{display:flex;gap:6px;}
.wt-btn{
  flex:1;height:36px;border:1.5px solid rgba(30,45,64,0.15);
  border-radius:8px;background:var(--white);color:var(--text2);
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
}
.wt-btn.active{border-color:var(--accent);background:rgba(200,169,110,0.12);color:var(--navy);}

/* ── canvas ── */
.canvas-wrap{
  background:var(--white);border-radius:14px;
  border:1.5px solid rgba(30,45,64,0.1);overflow:hidden;
  box-shadow:0 2px 8px rgba(30,45,64,0.07);
  margin-bottom:12px;position:relative;
}
.canvas-label{
  font-size:11px;font-weight:700;color:var(--text2);
  padding:8px 14px;border-bottom:1px solid rgba(30,45,64,0.07);
  letter-spacing:0.04em;display:flex;align-items:center;justify-content:space-between;
}
.canvas-label-badge{
  font-size:10px;background:var(--navy);color:#fff;
  border-radius:10px;padding:1px 7px;
}
canvas{display:block;width:100%;}
#zumen-cv{touch-action:none;}

/* ── 寸法カード ── */
.dim-card{
  background:var(--white);border-radius:12px;
  border:1.5px solid rgba(30,45,64,0.08);padding:12px 14px;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
  margin-bottom:14px;
}
.dc{text-align:center;}
.dl{font-size:10px;color:var(--text2);margin-bottom:2px;}
.dv{font-size:15px;font-weight:700;color:var(--navy);}

/* ── 開口部ボタン群 ── */
.aor{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.aob{
  padding:11px 4px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:10px;background:var(--white);color:var(--text2);
  font-size:12px;cursor:pointer;text-align:center;line-height:1.5;font-family:inherit;
}
.aob:active{background:var(--bg);}

/* ── アコーディオン ── */
.acc-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--white);border-radius:12px;
  border:1.5px solid rgba(30,45,64,0.1);cursor:pointer;margin-bottom:6px;
  font-size:13px;font-weight:700;color:var(--text);
  box-shadow:0 1px 3px rgba(30,45,64,0.06);
}
.acc-hd:active{background:var(--bg);}
.acc-hd .acc-arrow{font-size:11px;color:var(--text2);transition:transform 0.2s;}
.acc-hd.open .acc-arrow{transform:rotate(180deg);}
.acc-hd .acc-badge{
  font-size:10px;background:var(--navy);color:#fff;
  border-radius:10px;padding:1px 7px;margin-left:6px;
}
.acc-body{display:none;margin-bottom:10px;}
.acc-body.open{display:block;}

/* ── 開口リスト ── */
.oi{
  background:var(--white);border:1.5px solid rgba(30,45,64,0.1);
  border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;
}
.oi.sel-op{border-color:var(--cop);background:var(--bop);}
.on{font-size:13px;font-weight:600;}
.op-dist{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.6;}
.db{
  font-size:11px;color:var(--text2);background:none;
  border:1px solid rgba(30,45,64,0.15);border-radius:6px;
  padding:3px 8px;cursor:pointer;float:right;font-family:inherit;
}

/* ── コンパクト移動パネル ── */
.mpanel-compact{border-radius:12px;padding:10px 12px;margin-bottom:10px;}
.mpanel-compact.cop{background:var(--bop);border:1px solid var(--cop);}
.mpanel-compact.ceq{background:var(--beq);border:1px solid var(--ceq);}
.mpanel-compact.cceil{background:var(--bceil);border:1px solid var(--ceil);}
.mpc-title{font-size:12px;font-weight:700;margin-bottom:8px;}
.mpc-title.cop{color:var(--top);}
.mpc-title.ceq{color:var(--teq);}
.mpc-title.cceil{color:var(--tceil);}
.mpc-body{display:flex;gap:8px;align-items:stretch;}
.mpc-pos{flex:1 1 0;display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.mpc-ctrl{flex:1 1 0;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;}
.mpc-cell{background:var(--white);border-radius:8px;padding:6px 8px;text-align:center;}
.mpc-lbl{font-size:10px;color:var(--text2);}
.mpc-val{font-size:13px;font-weight:700;margin-top:1px;}
.mpc-val.cop{color:var(--top);}
.mpc-val.ceq{color:var(--teq);}
.mpc-val.cceil{color:var(--tceil);}
.mpc-dpad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;width:100%;}
.mpb{
  width:100%;height:36px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:8px;background:var(--white);font-size:16px;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;
}
.mpb:active{background:var(--bg);}
.mpc-steps{display:flex;gap:3px;margin-top:2px;width:100%;}
.mps{
  flex:1;padding:6px 0;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:6px;background:var(--white);color:var(--text2);
  font-size:10px;cursor:pointer;font-family:inherit;text-align:center;
}
.mps.act-op{border-color:var(--cop);background:var(--bop);color:var(--top);font-weight:700;}
.mps.act-eq{border-color:var(--ceq);background:var(--beq);color:var(--teq);font-weight:700;}
.mps.act-ceil{border-color:var(--ceil);background:var(--bceil);color:var(--tceil);font-weight:700;}

/* ── 設備記号 ── */
.eq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.eq-btn{
  padding:12px 4px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:10px;background:var(--white);color:var(--text2);
  font-size:11px;cursor:pointer;text-align:center;line-height:1.6;font-family:inherit;
}
.eq-btn:active{background:var(--bg);}
.eq-icon{font-size:18px;display:block;margin-bottom:2px;}

/* 設備リスト */
.ei{
  background:var(--white);border:1.5px solid rgba(30,45,64,0.1);
  border-radius:10px;padding:9px 12px;margin-bottom:6px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
}
.ei.sel-eq{border-color:var(--ceq);background:var(--beq);}
.ei.sel-ceil{border-color:var(--ceil);background:var(--bceil);}
.ei-sym{font-size:20px;line-height:1;}
.ei-info{flex:1;}
.ei-name{font-size:13px;font-weight:600;}
.ei-pos{font-size:11px;color:var(--text2);margin-top:2px;}
.db-eq{
  font-size:11px;color:var(--text2);background:none;
  border:1px solid rgba(30,45,64,0.15);border-radius:6px;
  padding:3px 8px;cursor:pointer;font-family:inherit;
}

/* 削除ボタン（canvas上） */
#eq-del-btn{
  display:none;position:absolute;background:#e53535;color:#fff;
  border:none;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;
  cursor:pointer;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,0.25);
}

/* ── 平面図専用 ── */
.plan-info-card{
  background:var(--white);border-radius:12px;border:1.5px solid rgba(30,45,64,0.08);
  padding:12px 14px;margin-bottom:14px;
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;
}

/* ── 天井図専用 ── */
.ceil-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.ceil-btn{
  padding:11px 4px;border:1.5px solid rgba(30,45,64,0.12);
  border-radius:10px;background:var(--white);color:var(--text2);
  font-size:11px;cursor:pointer;text-align:center;line-height:1.6;font-family:inherit;
}
.ceil-btn:active{background:var(--bg);}

/* ── 柱配置ダイアログ ── */
.col-dialog-overlay{
  position:fixed;inset:0;background:rgba(10,20,35,0.55);
  z-index:200;display:flex;align-items:flex-start;justify-content:center;
  padding:80px 20px 20px;
}
.col-dialog-overlay.hidden{display:none;}
.col-dialog-box{
  background:var(--white);border-radius:16px;width:100%;max-width:320px;
  box-shadow:0 8px 32px rgba(10,20,35,0.3);overflow:hidden;
}
.col-dialog-head{
  background:var(--navy);padding:12px 16px;
  font-size:14px;font-weight:700;color:var(--white);
}
.col-dialog-body{padding:14px 16px;}
.col-dialog-footer{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:0 16px 16px;
}
.col-dialog-cancel{
  height:44px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;
  background:transparent;color:var(--text2);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;
}
.col-dialog-ok{
  height:44px;border:none;border-radius:10px;
  background:var(--navy);color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;
}

/* ── 割付送信モーダル ── */
.wa-modal-overlay{
  position:fixed;inset:0;background:rgba(10,20,35,0.6);
  z-index:100;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.wa-modal-overlay.hidden{display:none;}
.wa-modal-box{
  background:var(--white);border-radius:16px;width:100%;max-width:380px;
  box-shadow:0 8px 32px rgba(10,20,35,0.3);overflow:hidden;
}
.wa-modal-head{
  background:var(--navy);padding:16px 18px;
  font-size:15px;font-weight:700;color:var(--white);
}
.wa-modal-body{padding:18px;}
.wa-modal-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.wa-modal-input{
  width:100%;height:42px;border:1.5px solid rgba(30,45,64,0.2);
  border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;
  color:var(--text);background:var(--bg);outline:none;box-sizing:border-box;
}
.wa-modal-input:focus{border-color:var(--accent);}
.wa-face-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;border-radius:10px;margin-bottom:6px;
  background:var(--bg);font-size:13px;
}
.wa-face-row.has-data{background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.4);}
.wa-face-row.no-data{opacity:0.4;}
.wa-mfr-left{display:flex;align-items:center;gap:8px;font-weight:600;}
.wa-mfr-badge{
  font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;
  background:rgba(200,169,110,0.2);color:var(--navy);
}
.wa-mfr-detail{font-size:11px;color:var(--text2);}
.wa-modal-footer{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:0 18px 18px;
}
.wa-modal-cancel{
  height:44px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;
  background:transparent;color:var(--text2);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;
}
.wa-modal-send{
  height:44px;border:none;border-radius:10px;
  background:var(--accent);color:var(--navy);font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;
}
.wa-modal-send:disabled{background:rgba(30,45,64,0.15);color:var(--text2);cursor:not-allowed;}

/* ── GLM BLEモーダル ── */
.ble-overlay{
  position:fixed;inset:0;background:rgba(10,20,35,0.6);
  z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;
}
.ble-overlay.hidden{display:none;}
.ble-box{
  background:var(--white);border-radius:16px;width:100%;max-width:360px;
  box-shadow:0 8px 32px rgba(10,20,35,0.3);overflow:hidden;
}
.ble-head{
  background:var(--navy);padding:14px 18px;
  font-size:15px;font-weight:700;color:var(--white);
  display:flex;align-items:center;gap:8px;
}
.ble-body{padding:16px 16px 4px;}
.ble-target{
  height:40px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;
  background:var(--white);color:var(--text);font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;
}
.ble-target.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* ── 印刷スタイル ── */
@media print{
  body{position:static;height:auto;overflow:visible;background:#fff;}
  .header,.scroll-area > .sec,.dim-card,.plan-info-card,
  #mpanel-wrap,.mode-toggle,.btn-do-print,.btn-back,
  .acc-hd,#placed-list{display:none!important;}
  .scroll-area{overflow:visible;padding:0;}
  .canvas-wrap{border:none;box-shadow:none;border-radius:0;}
  .canvas-label{display:none;}
  #eq-del-btn{display:none!important;}
}
</style>
</head>
<body>

<div class="header">
  <!-- 戻る -->
  <button class="btn-back" onclick="history.back()" title="戻る">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <!-- 図面種別セレクト -->
  <div class="view-select-wrap">
    <select class="view-select" id="view-select" onchange="switchView(this.value)">
      <option value="plan">平面図</option>
      <option value="faceA">展開図 A面</option>
      <option value="faceB">展開図 B面</option>
      <option value="faceC">展開図 C面</option>
      <option value="faceD">展開図 D面</option>
      <option value="ceil">天井図</option>
    </select>
  </div>

  <!-- 編集 / 印刷モード -->
  <div class="mode-toggle">
    <button class="mtb active" id="btn-edit" onclick="setMode('edit')" title="編集">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
    <button class="mtb" id="btn-print" onclick="setMode('print')" title="印刷">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    </button>
  </div>

  <!-- Undo / Redo -->
  <div class="undo-toggle">
    <button class="utb" id="btn-undo" onclick="doUndo()" title="元に戻す">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13C5 8 9.5 5 15 5a9 9 0 0 1 9 9 9 9 0 0 1-9 9c-3.5 0-6.5-1.5-8.5-4"/></svg>
    </button>
    <button class="utb" id="btn-redo" onclick="doRedo()" title="やり直す">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M21 13c-2 5-6.5 8-12 8a9 9 0 0 1-9-9 9 9 0 0 1 9-9c3.5 0 6.5 1.5 8.5 4"/></svg>
    </button>
  </div>

  <!-- GLM Bluetooth接続ボタン -->
  <button class="btn-do-print" id="ble-btn" onclick="openBleModal()" style="background:rgba(255,255,255,0.08);padding:0 10px;gap:5px;">
    <svg id="ble-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>
    </svg>

<script>
// ══════════════════════════════════════════
//  データ構造
// ══════════════════════════════════════════

// 部屋基本データ（平面図が起点）
var roomData = {W:3600, D:4500, H:2400, wallT:120, compassDeg:0};

// 面定義（A=上/B=右/C=下/D=左）
var FACES = ['A','B','C','D'];
var FACE_LABEL = {A:'A面（上）',B:'B面（右）',C:'C面（下）',D:'D面（左）'};
// A・C面の幅=W、B・D面の幅=D
function faceW(fi){ return (fi===0||fi===2)?roomData.W:roomData.D; }
function faceH(){ return roomData.H; }

// 展開図データ（各面の開口部・設備記号）
var faceOpenings = [[],[],[],[]]; // A/B/C/D
var faceSelId    = [null,null,null,null];
var faceOidSeq   = [0,0,0,0];
var faceEquips   = [[],[],[],[]];
var faceEqSelId  = [null,null,null,null];
var faceEqSeq    = [0,0,0,0];

// 天井データ
var ceilParts   = [];
var ceilSelId   = null;
var ceilSeq     = 0;

// 平面図 柱・間仕切りデータ
var planColumns    = [];  // {id, x, y, w, d}  x/y=左上座標(内法基準), w/d=幅×奥行(mm)
var planColSelId   = null;
var planColSeq     = 0;
var planPartitions = [];  // {id, axis:'v'|'h', pos, start, end, t}
                          // v: pos=X(左壁から), start=Y開始, end=Y終了
                          // h: pos=Y(上壁から), start=X開始, end=X終了
var planPartSeq    = 0;

// 状態
var curView    = 'plan'; // 'plan' | 'faceA'〜'faceD' | 'ceil'
var curFaceIdx = 0;      // 展開図時の面インデックス
var moveStep   = 10;
var drawMode   = 'edit';

// ══════════════════════════════════════════
//  Undo/Redo
// ══════════════════════════════════════════

var _undoStack = [];
var _redoStack = [];
var _UNDO_MAX  = 30;

function _snapshot(){
  return JSON.stringify({
    roomData:    roomData,
    faceOpenings:faceOpenings,
    faceOidSeq:  faceOidSeq,
    faceEquips:  faceEquips,
    faceEqSeq:   faceEqSeq,
    ceilParts:   ceilParts,
    ceilSeq:     ceilSeq,
    planColumns: planColumns,
    planColSeq:  planColSeq,
    planPartitions:planPartitions,
    planPartSeq: planPartSeq
  });
}

function _restore(snap){
  var s=JSON.parse(snap);
  roomData=s.roomData;
  faceOpenings=s.faceOpenings;  faceOidSeq=s.faceOidSeq;
  faceEquips=s.faceEquips;      faceEqSeq=s.faceEqSeq;
  ceilParts=s.ceilParts;        ceilSeq=s.ceilSeq;
  planColumns=s.planColumns;    planColSeq=s.planColSeq;
  planPartitions=s.planPartitions; planPartSeq=s.planPartSeq;
  // 選択状態はリセット
  faceSelId=[null,null,null,null];
  faceEqSelId=[null,null,null,null];
  ceilSelId=null; planColSelId=null;
}

function pushHistory(){
  _undoStack.push(_snapshot());
  if(_undoStack.length>_UNDO_MAX) _undoStack.shift();
  _redoStack=[];
  _updateUndoBtn();
}

function doUndo(){
  if(!_undoStack.length) return;
  _redoStack.push(_snapshot());
  _restore(_undoStack.pop());
  _updateUndoBtn();
  renderMain();
}

function doRedo(){
  if(!_redoStack.length) return;
  _undoStack.push(_snapshot());
  _restore(_redoStack.pop());
  _updateUndoBtn();
  renderMain();
}

function _updateUndoBtn(){
  var u=document.getElementById('btn-undo');
  var r=document.getElementById('btn-redo');
  if(u) u.style.opacity=_undoStack.length?'1':'0.35';
  if(r) r.style.opacity=_redoStack.length?'1':'0.35';
}

// 設備記号定義（展開図用）
var EQ_TYPES = [
  {id:'outlet',    label:'コンセント',    icon:'⊟', w:86,  h:86},
  {id:'switch',    label:'スイッチ',      icon:'▣', w:86,  h:86},
  {id:'switch3',   label:'3路SW',         icon:'▣', w:86,  h:86},
  {id:'bracket',   label:'ブラケット',    icon:'◫', w:150, h:200},
  {id:'fan_round', label:'換気扇（丸）',  icon:'◎', w:150, h:150},
  {id:'fan_sq',    label:'換気扇（角）',  icon:'⊠', w:200, h:200},
  {id:'ac_wall',   label:'エアコン',      icon:'▭', w:800, h:250},
];

// 天井器具定義
var CEIL_TYPES = [
  {id:'ceiling_light', label:'シーリング照明', icon:'◯', w:400, h:400},
  {id:'downlight',     label:'ダウンライト',   icon:'●', w:100, h:100},
  {id:'led_tube',      label:'蛍光灯型LED',    icon:'▬', w:1200,h:100},
  {id:'rail',          label:'ライティングレール', icon:'━', w:1200,h:50},
  {id:'ac_ceil',       label:'天カセエアコン', icon:'⊞', w:800, h:800},
  {id:'fan_ceil_r',    label:'天井換気扇（丸）', icon:'◎', w:150, h:150},
  {id:'fan_ceil_s',    label:'天井換気扇（角）', icon:'⊠', w:200, h:200},
  {id:'inspection',    label:'点検口',         icon:'⊡', w:450, h:450},
];

// ══════════════════════════════════════════
//  ビュー切替
// ══════════════════════════════════════════

function switchView(v){
  saveCurrentInputs();
  curView = v;
  if(v.startsWith('face')){
    var fi = ['A','B','C','D'].indexOf(v.charAt(4));
    curFaceIdx = fi>=0?fi:0;
    faceSelId[curFaceIdx]=null;
    faceEqSelId[curFaceIdx]=null;
  } else {
    ceilSelId = null;
  }
  renderMain();
}

function setMode(m){
  drawMode=m;
  document.getElementById('btn-edit').className='mtb'+(m==='edit'?' active':'');
  document.getElementById('btn-print').className='mtb'+(m==='print'?' active':'');
  var btn=document.getElementById('eq-del-btn'); if(btn) btn.style.display='none';
  redraw();
}

function doPrint(){
  setMode('print');
  // 印刷用に高解像度で再描画（dpr=6相当）
  var _origSetup=setupCanvas;
  window._printDpr=6;
  setTimeout(function(){
    // setupCanvasを高解像度版に差し替えて再描画
    window._printMode=true;
    redrawForPrint();
    setTimeout(function(){
      window.print();
      setTimeout(function(){
        window._printMode=false;
        setMode('edit');
      },500);
    },200);
  },150);
}

function redrawForPrint(){
  // 現在のビューを高解像度で再描画
  if(curView==='plan') redrawPlan();
  else if(curView==='ceil') redrawCeil();
  else redraw();
}

// ══════════════════════════════════════════
//  入力保存
// ══════════════════════════════════════════

function saveCurrentInputs(){
  if(curView==='plan'){
    var wEl=document.getElementById('inp-W');
    var dEl=document.getElementById('inp-D');
    var hEl=document.getElementById('inp-H');
    var newW=parseFloat(wEl?wEl.value:0)||roomData.W;
    var newD=parseFloat(dEl?dEl.value:0)||roomData.D;
    var newH=parseFloat(hEl?hEl.value:0)||roomData.H;
    // 変化があった時だけ履歴を積む
    if(newW!==roomData.W||newD!==roomData.D||newH!==roomData.H) pushHistory();
    if(wEl) roomData.W=newW;
    if(dEl) roomData.D=newD;
    if(hEl) roomData.H=newH;
  }
}

// ══════════════════════════════════════════
//  メイン描画ルーター
// ══════════════════════════════════════════

function renderMain(){
  var sel=document.getElementById('view-select');
  if(sel&&sel.value!==curView) sel.value=curView;

  if(curView==='plan')       renderPlan();
  else if(curView==='ceil')  renderCeil();
  else                       renderFace();
}

// ══════════════════════════════════════════
//  平面図パネル
// ══════════════════════════════════════════

function renderPlan(){
  var W=roomData.W,D=roomData.D,H=roomData.H,T=roomData.wallT;
  var dimOpen=roomData._dimOpen!==false; // デフォルト開いている
  var html='';

  // 寸法入力（折りたたみ）
  html+='<div class="sec" style="margin-bottom:8px;">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;" onclick="toggleDimPanel()">';
  html+='<div class="st" style="margin-bottom:0;">部屋寸法・壁厚</div>';
  html+='<div style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;">';
  if(!dimOpen) html+='<span>W'+W.toLocaleString()+' D'+D.toLocaleString()+' H'+H.toLocaleString()+' T'+T+'</span>';
  html+='<span style="font-size:14px;">'+(dimOpen?'▲':'▼')+'</span>';
  html+='</div></div>';
  if(dimOpen){
    html+='<div style="margin-top:8px;">';
    html+='<div class="r3" style="margin-bottom:8px;">';
    html+='<div class="iw"><span>幅 W mm</span><input type="number" id="inp-W" value="'+W+'" inputmode="numeric" oninput="onPlanDimChange()"></div>';
    html+='<div class="iw"><span>奥行 D mm</span><input type="number" id="inp-D" value="'+D+'" inputmode="numeric" oninput="onPlanDimChange()"></div>';
    html+='<div class="iw"><span>高さ H mm</span><input type="number" id="inp-H" value="'+H+'" inputmode="numeric" oninput="onPlanDimChange()"></div>';
    html+='</div>';
    html+='<div class="wt-btns">';
    [100,120,150].forEach(function(t){
      html+='<button class="wt-btn'+(T===t?' active':'')+'" onclick="setWallT('+t+')">'+t+'mm</button>';
    });
    html+='</div></div>';
  }
  html+='</div>';

  // canvas
  html+='<div class="canvas-wrap" style="position:relative">';
  html+='<div class="canvas-label" style="display:flex;align-items:center;gap:6px;">';
  html+='<span>平面図</span>';
  html+='<span style="font-size:10px;color:var(--text2)">W'+W.toLocaleString()+'×D'+D.toLocaleString()+'mm</span>';
  html+='<span class="canvas-label-badge">壁厚'+T+'mm</span>';
  // ABCD方位ピクト
  html+='<span style="margin-left:auto;display:flex;align-items:center;gap:3px;">';
  html+='<svg width="46" height="46" viewBox="0 0 46 46" style="display:block;flex-shrink:0;">';
  html+='<rect x="12" y="12" width="22" height="22" fill="none" stroke="rgba(30,45,64,0.5)" stroke-width="1.5"/>';
  html+='<text x="23" y="9" text-anchor="middle" font-size="8" font-weight="700" font-family="Meiryo,sans-serif" fill="rgba(30,45,64,0.7)">A</text>';
  html+='<text x="23" y="41" text-anchor="middle" font-size="8" font-weight="700" font-family="Meiryo,sans-serif" fill="rgba(30,45,64,0.7)">C</text>';
  html+='<text x="40" y="25" text-anchor="middle" font-size="8" font-weight="700" font-family="Meiryo,sans-serif" fill="rgba(30,45,64,0.7)">B</text>';
  html+='<text x="6" y="25" text-anchor="middle" font-size="8" font-weight="700" font-family="Meiryo,sans-serif" fill="rgba(30,45,64,0.7)">D</text>';
  html+='</svg>';
  // 方位コンパス（◀ コンパス ▶ 横並び）
  var deg=roomData.compassDeg||0;
  var rad=deg*Math.PI/180;
  var cx=18,cy=18,r=12;
  var nx=cx+r*Math.sin(rad),ny=cy-r*Math.cos(rad);
  var sx2=cx-r*Math.sin(rad),sy2=cy+r*Math.cos(rad);
  var lx=cx+3.5*Math.cos(rad),ly=cy+3.5*Math.sin(rad);
  var rx2=cx-3.5*Math.cos(rad),ry2=cy-3.5*Math.sin(rad);
  var nlx=cx+(r+4)*Math.sin(rad),nly=cy-(r+4)*Math.cos(rad);
  html+='<button onclick="rotateCompass(-1)" style="width:26px;height:36px;border:1px solid rgba(30,45,64,0.2);border-radius:6px;background:var(--white);font-size:12px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0;">◀</button>';
  html+='<div style="display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0;">';
  html+='<svg width="36" height="36" viewBox="0 0 36 36" style="display:block;">';
  html+='<circle cx="18" cy="18" r="15" fill="rgba(30,45,64,0.06)" stroke="rgba(30,45,64,0.3)" stroke-width="1"/>';
  html+='<polygon points="'+nx.toFixed(1)+','+ny.toFixed(1)+' '+lx.toFixed(1)+','+ly.toFixed(1)+' '+sx2.toFixed(1)+','+sy2.toFixed(1)+' '+rx2.toFixed(1)+','+ry2.toFixed(1)+'" fill="rgba(30,45,64,0.85)"/>';
  html+='<polygon points="'+sx2.toFixed(1)+','+sy2.toFixed(1)+' '+lx.toFixed(1)+','+ly.toFixed(1)+' '+nx.toFixed(1)+','+ny.toFixed(1)+' '+rx2.toFixed(1)+','+ry2.toFixed(1)+'" fill="rgba(30,45,64,0.2)"/>';
  html+='<text x="'+nlx.toFixed(1)+'" y="'+nly.toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" font-size="7" font-weight="700" font-family="Meiryo,sans-serif" fill="rgba(30,45,64,0.9)">N</text>';
  html+='</svg>';
  html+='<span style="font-size:9px;color:var(--text2);">'+deg+'°</span>';
  html+='</div>';
  html+='<button onclick="rotateCompass(1)" style="width:26px;height:36px;border:1px solid rgba(30,45,64,0.2);border-radius:6px;background:var(--white);font-size:12px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0;">▶</button>';
  html+='</span>';
  html+='</div>';
  html+='<canvas id="zumen-cv"></canvas></div>';

  // 平面図モード切替
  html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px;">';
  [['none','通常'],['column','柱'],['part_v','縦壁'],['part_h','横壁']].forEach(function(m){
    var active=_planMode===m[0];
    var s=active
      ?'height:42px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;'
      :'height:42px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;background:var(--white);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;';
    html+='<button style="'+s+'" onclick="setPlanMode(\''+m[0]+'\')">'+m[1]+'</button>';
  });
  html+='</div>';

  // 通常モード：選択削除バー
  if(_planMode==='none'&&_planSelId!==null){
    var selLabel='';
    var sp=null;
    if(_planSelType==='partition'){
      sp=planPartitions.find(function(p){return p.id===_planSelId;});
      if(sp) selLabel=(sp.axis==='v'?'縦壁':'横壁')+' ('+sp.len+'mm)';
    } else if(_planSelType==='column'){
      var sc2=planColumns.find(function(c){return c.id===_planSelId;});
      if(sc2) selLabel='柱 '+sc2.w+'×'+sc2.d+'mm';
    }
    html+='<div style="background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.4);border-radius:10px;margin-bottom:12px;overflow:hidden;">';
    html+='<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;">';

      // 吸着チェック：posの左面・右面が既存直交壁の面と一致
      function isPosSnapped(face){
        // 外周壁
        if(face===0) return true;
        if(isV && face===roomData.W) return true;
        if(!isV && face===roomData.D) return true;
        // 直交壁の面と一致するか
        // 縦壁(v)のposX → 既存横壁(h)の左面・右面（p.start, p.start+p.len）と比較

          }
          if(!isV && p2.axis==='v'){

          }
        });
        return snapped;

      var leftFaceSnap=isPosSnapped(posVal-halfT5);
      var rightFaceSnap=isPosSnapped(posVal+halfT5);
      var anySnap=leftFaceSnap||rightFaceSnap;

      html+='</div>';
      html+='</div>';
    }
    html+='</div>';
  }

  // 間仕切り確定バー（縦壁・横壁モード選択中は常時表示）
  if(_planMode==='part_v'||_planMode==='part_h'){

    html+='<span style="font-size:13px;flex:1;color:var(--text2);">'+(_partPending?'再ドラッグで調整できます':'平面図をドラッグして引いてください')+'</span>';
    if(_partPending){

  // 寸法カード
  html+='<div class="plan-info-card">';
  html+='<div class="dc"><div class="dl">幅 W</div><div class="dv" id="dv-W">'+W.toLocaleString()+'mm</div></div>';

  if(planColumns.length>0){

  if(planPartitions.length>0){

      html+='<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;background:var(--white);border:1.5px solid rgba(30,45,64,0.1);">';

  } else {

var _colPending = null; // ダイアログ表示中の仮データ {corner, face, offset, x, y}

function _detectColType(mmX, mmY){
  // タップ位置mmX/mmYから柱種別を判定
  // コーナー・壁面・内部のどれかを返す
  var W=roomData.W, D=roomData.D;
  var thresh=50; // 壁から50mm以内で吸着判定

  var nearLeft  = mmX < thresh;
  var nearRight = mmX > W-thresh;
  var nearTop   = mmY < thresh;
  var nearBot   = mmY > D-thresh;

  // コーナー判定（両方向が壁に近い）
  if(nearLeft  && nearTop)  return {type:'corner', corner:'tl'};
  if(nearRight && nearTop)  return {type:'corner', corner:'tr'};
  if(nearLeft  && nearBot)  return {type:'corner', corner:'bl'};
  if(nearRight && nearBot)  return {type:'corner', corner:'br'};

  // 壁面判定（片方向が壁に近い）
  if(nearTop)   return {type:'wall', face:'A', offset:Math.round(mmX/10)*10};
  if(nearBot)   return {type:'wall', face:'C', offset:Math.round(mmX/10)*10};
  if(nearLeft)  return {type:'wall', face:'D', offset:Math.round(mmY/10)*10};
  if(nearRight) return {type:'wall', face:'B', offset:Math.round(mmY/10)*10};

  return {type:'interior'};
}

function openColDialog(detected){
  _colPending = detected;
  var head = document.getElementById('col-dialog-head');
  if(head){
    if(detected.type==='corner'){
      var lbl={tl:'左上',tr:'右上',bl:'左下',br:'右下'}[detected.corner];
      head.textContent = lbl+'コーナー　柱を配置';
    } else {
      head.textContent = detected.face+'面　柱を配置（端から'+detected.offset+'mm）';
    }
  }
  document.getElementById('col-dialog').classList.remove('hidden');
  setTimeout(function(){ document.getElementById('col-dlg-w').focus(); }, 100);
}

function closeColDialog(){
  _colPending = null;
  document.getElementById('col-dialog').classList.add('hidden');
}

function confirmColDialog(){
  if(!_colPending) return;
  pushHistory();
  var cw = parseInt(document.getElementById('col-dlg-w').value)||120;
  var cd = parseInt(document.getElementById('col-dlg-d').value)||120;
  var W=roomData.W, D=roomData.D;
  var x=0, y=0, corner=null, face=null, offset=0;

  if(_colPending.type==='corner'){
    corner = _colPending.corner;
    if(corner==='tl'){ x=0;    y=0;    }
    if(corner==='tr'){ x=W-cw; y=0;    }
    if(corner==='bl'){ x=0;    y=D-cd; }
    if(corner==='br'){ x=W-cw; y=D-cd; }
    // 同コーナーの既存を上書き
    planColumns=planColumns.filter(function(c){return c.corner!==corner;});
  } else {
    face   = _colPending.face;
    offset = _colPending.offset;
    if(face==='A'){ x=Math.max(0,Math.min(W-cw,offset)); y=0;    }
    if(face==='C'){ x=Math.max(0,Math.min(W-cw,offset)); y=D-cd; }
    if(face==='D'){ x=0;    y=Math.max(0,Math.min(D-cd,offset)); }
    if(face==='B'){ x=W-cw; y=Math.max(0,Math.min(D-cd,offset)); }
  }

  planColSeq++;
  planColumns.push({id:planColSeq, corner:corner, face:face, offset:offset, x:x, y:y, w:cw, d:cd});
  closeColDialog();
  renderPlan();
}

function removePlanCol(id){
  pushHistory();
  planColumns=planColumns.filter(function(c){return c.id!==id;});
  renderPlan();
}

//  平面図 間仕切り操作（ドラッグ）

var _planMode = 'none'; // 'none' | 'column' | 'part_v' | 'part_h'
var _partPending = null; // 確定待ちの間仕切り {axis, pos, start, len}
var _partDrag={active:false, sx:0, sy:0, ex:0, ey:0};
var _planSelType = null; // 'partition' | 'column'
var _planSelId   = null; // 選択中のid

function movePart(delta){
  var sp=planPartitions.find(function(p){return p.id===_planSelId;});
  if(!sp) return;
  pushHistory();
  var newPos=sp.pos+delta;
  var halfT=Math.round((sp.t||roomData.wallT)/2);
  // 外周壁内に収まるよう制限
  var maxPos=sp.axis==='v'?roomData.W:roomData.D;
  if(newPos-halfT<0||newPos+halfT>maxPos) return;
  sp.pos=newPos;
  renderPlan();
}

function resizePart(end, delta){
  var sp=planPartitions.find(function(p){return p.id===_planSelId;});
  if(!sp) return;
  pushHistory();
  if(end==='start'){
    var newStart=sp.start+delta;
    var newLen=sp.len-delta;
    if(newLen<roomData.wallT) return; // 最小壁厚
    sp.start=newStart; sp.len=newLen;
  } else {
    var newLen2=sp.len+delta;
    if(newLen2<roomData.wallT) return;
    sp.len=newLen2;
  }
  renderPlan();
}

function deletePlanSel(){
  if(!_planSelId) return;
  pushHistory();
  if(_planSelType==='partition'){
    planPartitions=planPartitions.filter(function(p){return p.id!==_planSelId;});
  } else if(_planSelType==='column'){
    planColumns=planColumns.filter(function(c){return c.id!==_planSelId;});
  }
  _planSelType=null; _planSelId=null;
  renderPlan();
}

function setPlanMode(mode){
  _planMode=mode;
  if(mode!=='part_v'&&mode!=='part_h') _partPending=null;
  _planSelType=null; _planSelId=null;
  renderPlan();
}

function confirmPartPending(){
  if(!_partPending) return;
  pushHistory();
  planPartSeq++;
  planPartitions.push({id:planPartSeq, axis:_partPending.axis, pos:_partPending.pos, start:_partPending.start, len:_partPending.len, t:roomData.wallT, dimOffset:0});
  _partPending=null;
  renderPlan();
}

function cancelPartPending(){
  _partPending=null;
  renderPlan();
}

function removePlanPartition(id){
  pushHistory();
  planPartitions=planPartitions.filter(function(p){return p.id!==id;});
  renderPlan();
}

function _planSc(){
  var cv=document.getElementById('zumen-cv'); if(!cv) return null;
  var W=roomData.W, D=roomData.D;
  var CW=cv.offsetWidth||340;
  var mL=56,mR=20,mT=20,mB=56;
  var sc=Math.min((CW-mL-mR)/W,240/D);
  return{sc:sc, ox:mL, oy:mT, W:W, D:D, cv:cv};
}

function _snapMm(px, info){
  // canvas座標 → mm（内法座標）
  return{
    x:Math.max(0,Math.min(info.W, Math.round((px.x-info.ox)/info.sc/10)*10)),
    y:Math.max(0,Math.min(info.D, Math.round((px.y-info.oy)/info.sc/10)*10))
  };
}

// 既存間仕切りのコーナー端点リストを返す
function _getPartitionCorners(){
  var corners=[];
  planPartitions.forEach(function(p){
    if(p.axis==='v'){
      corners.push({x:p.pos, y:p.start, axis:'v', end:'start'});
      corners.push({x:p.pos, y:p.start+p.len, axis:'v', end:'end'});
    } else {
      corners.push({x:p.start,   y:p.pos, axis:'h', end:'start'});
      corners.push({x:p.start+p.len, y:p.pos, axis:'h', end:'end'});
    }
  });
  return corners;
}

// 既存間仕切りの端面にスナップ（終点用）
// mode='v'（縦壁）: 終点Y → 既存横壁の上面・下面にスナップ
// mode='h'（横壁）: 終点X → 既存縦壁の左面・右面にスナップ
// 既存間仕切りのコーナー点にスナップ
// axisSnap='x': 横壁の端点X → 既存縦壁のコーナーX座標にスナップ
//               縦壁のposX  → 既存横壁のコーナーX座標にスナップ（並走防止）
// axisSnap='y': 縦壁の端点Y → 既存横壁のコーナーY座標にスナップ
//               横壁のposY  → 既存縦壁のコーナーY座標にスナップ（並走防止）
// srcAxis: 'same'=同軸壁のコーナー, 'cross'=異軸壁のコーナー
// 新しい壁の終点が既存壁の面に壁厚以内なら吸着
function _snapEndToPartition(val, axisSnap, SNAP, srcAxis){
  var T=roomData.wallT;
  var best=null, bestDist=T+1; // 壁厚以内なら吸着
  planPartitions.forEach(function(p){
    var halfT=Math.round((p.t||T)/2);
    if((axisSnap==='x'||axisSnap==='pos_x') && p.axis==='v'){
      [p.pos-halfT, p.pos+halfT].forEach(function(face){
        var d=Math.abs(val-face);
        if(d<bestDist){ bestDist=d; best=face; }
      });
    }
    if((axisSnap==='y'||axisSnap==='pos_y') && p.axis==='h'){
      [p.pos-halfT, p.pos+halfT].forEach(function(face){
        var d=Math.abs(val-face);
        if(d<bestDist){ bestDist=d; best=face; }
      });
    }
  });
  return best!==null?best:val;
}

// 外周壁スナップ（始点・終点共通）
function _snapToOuterWall(val, max, SNAP){
  if(val<=SNAP) return 0;
  if(val>=max-SNAP) return max;
  return val;
}

//  平面図canvas描画
// ══════════════════════════════════════════

function redrawPlan(){
  var cv=document.getElementById('zumen-cv'); if(!cv) return;
  var W=roomData.W, D=roomData.D, T=roomData.wallT;
  var CW=cv.offsetWidth||340;
  var mL=56, mR=20, mT=20, mB=56;
  var sc=Math.min((CW-mL-mR)/W, 240/D);
  var rw=W*sc, rd=D*sc;
  var CH=rd+mT+mB;
  var ox=mL, oy=mT;
  var ctx=setupCanvas(cv,CW,CH);
  ctx.clearRect(0,0,CW,CH);

  var Tpx=T*sc;

  // 外壁（塗りつぶし・濃く）
  ctx.fillStyle='rgba(30,45,64,0.7)';
  ctx.fillRect(ox-Tpx, oy-Tpx, rw+Tpx*2, rd+Tpx*2);

  // 内法（白抜き）
  ctx.fillStyle='#f9f8f6';
  ctx.fillRect(ox, oy, rw, rd);

  // 900mmグリッド
  ctx.strokeStyle='rgba(30,45,64,0.06)'; ctx.lineWidth=0.7; ctx.setLineDash([3,4]);
  for(var x=900;x<W;x+=900){ var gx=ox+x*sc; ctx.beginPath();ctx.moveTo(gx,oy);ctx.lineTo(gx,oy+rd);ctx.stroke(); }
  for(var d=900;d<D;d+=900){ var gd=oy+d*sc; ctx.beginPath();ctx.moveTo(ox,gd);ctx.lineTo(ox+rw,gd);ctx.stroke(); }
  ctx.setLineDash([]);

  // 各面の開口部（平面図表記）
  // A面（上壁 y=oy-Tpx〜oy）, B面（右壁）, C面（下壁）, D面（左壁）
  drawPlanOpenings(ctx, ox, oy, rw, rd, Tpx, sc);

  // 壁線（内壁）
  ctx.strokeStyle='rgba(30,45,64,0.6)'; ctx.lineWidth=1;
  ctx.strokeRect(ox, oy, rw, rd);
  // 壁線（外壁）
  ctx.strokeStyle='rgba(30,45,64,0.95)'; ctx.lineWidth=2.5;
  ctx.strokeRect(ox-Tpx, oy-Tpx, rw+Tpx*2, rd+Tpx*2);

  // ── 間仕切り描画 ──
  planPartitions.forEach(function(p){
    var pt=Math.max(2, (p.t||roomData.wallT)*sc);
    ctx.fillStyle='rgba(30,45,64,0.25)';
    ctx.strokeStyle='rgba(30,45,64,0.4)'; ctx.lineWidth=1;
    var isSel=(_planSelType==='partition'&&p.id===_planSelId);
    if(isSel){ ctx.fillStyle='rgba(200,169,110,0.7)'; ctx.strokeStyle='var(--accent)'; ctx.lineWidth=2; }
    if(p.axis==='v'){
      var px2=ox+p.pos*sc - pt/2;
      var py2=oy+p.start*sc;
      var pl=p.len*sc;
      ctx.fillRect(px2, py2, pt, pl);
      ctx.strokeRect(px2, py2, pt, pl);
      // 寸法引き出し線（dimOffsetでY位置調整）
      ctx.save();
      ctx.strokeStyle='rgba(30,45,64,0.4)'; ctx.lineWidth=0.8;
      var dimOff=p.dimOffset||0;
      var dimY2=oy+p.start*sc + pl/2 + dimOff*sc;
      var leftFace=px2;
      var rightFace=px2+pt;
      // 引き出し破線（間仕切り端点→寸法線位置）
      if(Math.abs(dimY2-(py2+pl/2))>2){
        var nearEdgeY=dimY2<py2+pl/2?py2:py2+pl;
        ctx.setLineDash([2,3]);
        ctx.beginPath();ctx.moveTo(px2+pt/2,nearEdgeY);ctx.lineTo(px2+pt/2,dimY2);ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.beginPath();ctx.moveTo(ox,dimY2);ctx.lineTo(leftFace,dimY2);ctx.stroke();
      [ox,leftFace].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,dimY2-3);ctx.lineTo(tx,dimY2+3);ctx.stroke();});
      var rightWall=ox+roomData.W*sc;
      ctx.beginPath();ctx.moveTo(rightFace,dimY2);ctx.lineTo(rightWall,dimY2);ctx.stroke();
      [rightFace,rightWall].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,dimY2-3);ctx.lineTo(tx,dimY2+3);ctx.stroke();});
      ctx.fillStyle='rgba(30,45,64,0.75)'; ctx.font='bold 9px Meiryo,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      var halfT=Math.round(roomData.wallT/2);
      var leftDist=p.pos - halfT;   // 左内壁面→間仕切り左面
      var rightDist=roomData.W - p.pos - halfT; // 間仕切り右面→右内壁面
      ctx.fillText(leftDist+'mm', ox+(leftFace-ox)/2, dimY2-4);
      ctx.fillText(rightDist+'mm', rightFace+(rightWall-rightFace)/2, dimY2-4);
      ctx.restore();
    } else {
      var px3=ox+p.start*sc;
      var py3=oy+p.pos*sc - pt/2;
      var pl2=p.len*sc;
      ctx.fillRect(px3, py3, pl2, pt);
      ctx.strokeRect(px3, py3, pl2, pt);
      // 寸法引き出し線（dimOffsetでX位置調整）
      ctx.save();
      ctx.strokeStyle='rgba(30,45,64,0.4)'; ctx.lineWidth=0.8;
      var dimOff2=p.dimOffset||0;
      var dimX2=ox+p.start*sc + pl2/2 + dimOff2*sc;
      var topFace=py3;
      var botFace=py3+pt;
      // 引き出し破線（間仕切り端点→寸法線位置）
      if(Math.abs(dimX2-(px3+pl2/2))>2){
        var nearEdgeX=dimX2<px3+pl2/2?px3:px3+pl2;
        ctx.setLineDash([2,3]);
        ctx.beginPath();ctx.moveTo(nearEdgeX,py3+pt/2);ctx.lineTo(dimX2,py3+pt/2);ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.beginPath();ctx.moveTo(dimX2,oy);ctx.lineTo(dimX2,topFace);ctx.stroke();
      [oy,topFace].forEach(function(ty){ctx.beginPath();ctx.moveTo(dimX2-3,ty);ctx.lineTo(dimX2+3,ty);ctx.stroke();});
      var botWall=oy+roomData.D*sc;
      ctx.beginPath();ctx.moveTo(dimX2,botFace);ctx.lineTo(dimX2,botWall);ctx.stroke();
      [botFace,botWall].forEach(function(ty){ctx.beginPath();ctx.moveTo(dimX2-3,ty);ctx.lineTo(dimX2+3,ty);ctx.stroke();});
      ctx.fillStyle='rgba(30,45,64,0.75)'; ctx.font='bold 9px Meiryo,sans-serif';
      var halfT2=Math.round(roomData.wallT/2);
      var topDist=p.pos - halfT2;
      var botDist2=roomData.D - p.pos - halfT2;
      // 上側：縦向きテキスト（外周D寸法と同じ方向）
      ctx.save();
      ctx.translate(dimX2-10, oy+(topFace-oy)/2);
      ctx.rotate(-Math.PI/2);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(topDist+'mm', 0, 0);
      ctx.restore();
      // 下側：縦向きテキスト
      ctx.save();
      ctx.translate(dimX2-10, botFace+(botWall-botFace)/2);
      ctx.rotate(-Math.PI/2);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(botDist2+'mm', 0, 0);
      ctx.restore();
      ctx.restore();
    }
  });

  // ── 柱描画 ──
  planColumns.forEach(function(c){
    var sel=c.id===planColSelId;
    var cx=ox+c.x*sc, cy=oy+c.y*sc;
    var cw2=c.w*sc, cd2=c.d*sc;
    // 塗りつぶし（構造体ハッチング風）
    ctx.fillStyle=sel?'rgba(30,45,64,0.55)':'rgba(30,45,64,0.45)';
    ctx.fillRect(cx,cy,cw2,cd2);
    // 対角線（柱の記号）
    ctx.strokeStyle=sel?'rgba(200,169,110,0.9)':'rgba(255,255,255,0.5)';
    ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+cw2,cy+cd2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+cw2,cy);ctx.lineTo(cx,cy+cd2);ctx.stroke();
    // 外枠
    ctx.strokeStyle=sel?'var(--accent)':'rgba(30,45,64,0.8)';
    ctx.lineWidth=sel?2:1.5;
    ctx.strokeRect(cx,cy,cw2,cd2);
    // 選択時ハイライト＋寸法
    if(sel){
      ctx.strokeStyle='rgba(200,169,110,0.5)'; ctx.lineWidth=1; ctx.setLineDash([3,2]);
      ctx.strokeRect(cx-2,cy-2,cw2+4,cd2+4); ctx.setLineDash([]);
      ctx.fillStyle='rgba(200,169,110,0.9)'; ctx.font='bold 9px Meiryo,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(c.w+'×'+c.d, cx+cw2/2, cy-3);
    }
  });

  // 寸法線 内寸
  var dY=oy+rd+Tpx+18;
  var dX=ox-Tpx-22;
  // 下（幅W・内寸）
  ctx.strokeStyle='rgba(30,45,64,0.45)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ox,dY);ctx.lineTo(ox+rw,dY);ctx.stroke();
  [ox,ox+rw].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,dY-4);ctx.lineTo(tx,dY+4);ctx.stroke();});
  ctx.fillStyle='rgba(30,45,64,0.7)'; ctx.font='bold 11px Meiryo,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(W.toLocaleString()+'mm', ox+rw/2, dY+5);
  // 左（奥行D・内寸）
  ctx.beginPath();ctx.moveTo(dX,oy);ctx.lineTo(dX,oy+rd);ctx.stroke();
  [oy,oy+rd].forEach(function(ty){ctx.beginPath();ctx.moveTo(dX-4,ty);ctx.lineTo(dX+4,ty);ctx.stroke();});
  ctx.save(); ctx.translate(dX-13, oy+rd/2);
  ctx.rotate(-Math.PI/2);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(D.toLocaleString()+'mm', 0, 0); ctx.restore();

  // 確定待ち間仕切りプレビュー
  if(_partPending){
    var Tpx2=Math.max(2, roomData.wallT*sc);
    ctx.fillStyle='rgba(30,45,64,0.25)';
    ctx.strokeStyle='rgba(30,45,64,0.6)'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
    if(_partPending.axis==='v'){
      var pvx=ox+_partPending.pos*sc-Tpx2/2;
      var pvy=oy+_partPending.start*sc;
      var pvl=_partPending.len*sc;
      ctx.fillRect(pvx,pvy,Tpx2,pvl);
      ctx.strokeRect(pvx,pvy,Tpx2,pvl);
    } else {
      var phx=ox+_partPending.start*sc;
      var phy=oy+_partPending.pos*sc-Tpx2/2;
      var phl=_partPending.len*sc;
      ctx.fillRect(phx,phy,phl,Tpx2);
      ctx.strokeRect(phx,phy,phl,Tpx2);
    }
    ctx.setLineDash([]);
  }

}

function drawPlanOpenings(ctx, ox, oy, rw, rd, Tpx, sc){
  // A面(idx=0)：上壁 D方向が面の幅なので openingのxはW方向
  // 各面の開口部を平面図的に描画
  var faceConfigs=[
    // {fi, axis:'h'or'v', wallX, wallY, wallLen, wallT, dir:1=外方向}
    {fi:0, wallX:ox,      wallY:oy-Tpx, wallLen:rw,  wallT:Tpx, axis:'h', ydir:-1}, // A上
    {fi:1, wallX:ox+rw,   wallY:oy,     wallLen:rd,  wallT:Tpx, axis:'v', xdir:1},  // B右
    {fi:2, wallX:ox,      wallY:oy+rd,  wallLen:rw,  wallT:Tpx, axis:'h', ydir:1},  // C下
    {fi:3, wallX:ox-Tpx,  wallY:oy,     wallLen:rd,  wallT:Tpx, axis:'v', xdir:-1}, // D左
  ];
  faceConfigs.forEach(function(cfg){
    faceOpenings[cfg.fi].forEach(function(op){
      var xRatio=op.x/faceW(cfg.fi);
      var wRatio=op.w/faceW(cfg.fi);
      var col=(op.id===faceSelId[cfg.fi])?'#b06a00':'rgba(40,40,40,0.85)';
      ctx.save();
      ctx.strokeStyle=col; ctx.fillStyle='#ffffff'; ctx.lineWidth=1.5;
      if(cfg.axis==='h'){
        var rx=cfg.wallX+xRatio*cfg.wallLen;
        var ropw=wRatio*cfg.wallLen;
        // 開口白抜き
        ctx.fillRect(rx, cfg.wallY, ropw, cfg.wallT);
        // ドア系は弧、窓系は二重線
        if(isDoor(op.type)){
          // ドアの平面表記：弧
          ctx.strokeStyle=col;
          ctx.strokeRect(rx, cfg.wallY, ropw, cfg.wallT);
          ctx.beginPath();
          if(cfg.ydir<0){
            ctx.moveTo(rx,cfg.wallY+cfg.wallT);
            ctx.arc(rx,cfg.wallY+cfg.wallT, ropw, -Math.PI/2, 0);
          } else {
            ctx.moveTo(rx,cfg.wallY);
            ctx.arc(rx,cfg.wallY, ropw, 0, Math.PI/2);
          }
          ctx.setLineDash([3,2]); ctx.stroke(); ctx.setLineDash([]);
        } else {
          // 窓：外枠＋内枠
          ctx.strokeRect(rx, cfg.wallY, ropw, cfg.wallT);
          var gi=Tpx*0.25;
          ctx.lineWidth=0.8;
          ctx.strokeRect(rx+gi, cfg.wallY+gi, ropw-gi*2, cfg.wallT-gi*2);
        }
      } else {
        var ry=cfg.wallY+xRatio*cfg.wallLen;
        var ropd=wRatio*cfg.wallLen;
        ctx.fillRect(cfg.wallX, ry, cfg.wallT, ropd);
        if(isDoor(op.type)){
          ctx.strokeRect(cfg.wallX, ry, cfg.wallT, ropd);
          ctx.beginPath();
          if(cfg.xdir>0){
            ctx.moveTo(cfg.wallX, ry);
            ctx.arc(cfg.wallX, ry, ropd, 0, Math.PI/2);
          } else {
            ctx.moveTo(cfg.wallX+cfg.wallT, ry);
            ctx.arc(cfg.wallX+cfg.wallT, ry, ropd, Math.PI/2, Math.PI);
          }
          ctx.setLineDash([3,2]); ctx.stroke(); ctx.setLineDash([]);
        } else {
          ctx.strokeRect(cfg.wallX, ry, cfg.wallT, ropd);
          var gi2=Tpx*0.25;
          ctx.lineWidth=0.8;
          ctx.strokeRect(cfg.wallX+gi2, ry+gi2, cfg.wallT-gi2*2, ropd-gi2*2);
        }
      }
      ctx.restore();
    });
  });
}

function isDoor(type){
  return type==='ドア'||type==='親子ドア'||type==='両開きドア'||type==='引き違いドア'||type==='スライドドア';
}

function drawCompass(ctx, cx, cy, r){
  ctx.save();
  ctx.strokeStyle='rgba(30,45,64,0.6)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  // N矢印
  ctx.fillStyle='rgba(30,45,64,0.7)';
  ctx.beginPath();
  ctx.moveTo(cx,cy-r+3);
  ctx.lineTo(cx-4,cy+4);
  ctx.lineTo(cx+4,cy+4);
  ctx.closePath(); ctx.fill();
  ctx.font='bold 9px Meiryo,sans-serif';
  ctx.fillStyle='rgba(30,45,64,0.7)';
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('N',cx,cy-r);
  ctx.restore();
}

function getCeilParts(){ return ceilParts; }

function addCeilPart(typeId){
  pushHistory();
  var ct=CEIL_TYPES.find(function(c){return c.id===typeId;}); if(!ct) return;
  ceilSeq++;
  var W=roomData.W, D=roomData.D;
  var cw=ct.w, ch=ct.h;
  var x=Math.round((W-cw)/2/10)*10;
  var y=Math.round((D-ch)/2/10)*10;
  x=Math.max(0,Math.min(W-cw,x)); y=Math.max(0,Math.min(D-ch,y));
  ceilParts.push({id:ceilSeq,typeId:typeId,label:ct.label,icon:ct.icon,w:cw,h:ch,x:x,y:y});
  ceilSelId=ceilSeq;
  renderCeilPlacedList(); showMPCeil(); redrawCeil(); updateCeilBadge();
}

function removeCeilPart(id){
  pushHistory();
  ceilParts=ceilParts.filter(function(c){return c.id!==id;});
  if(ceilSelId===id){ceilSelId=null; hideMPCeil();}
  var btn=document.getElementById('eq-del-btn'); if(btn) btn.style.display='none';
  renderCeilPlacedList(); redrawCeil(); updateCeilBadge();
}

function selCeil(id){
  ceilSelId=id;
  renderCeilPlacedList(); showMPCeil(); redrawCeil();
}

function delSelCeil(){
  if(ceilSelId===null) return;
  removeCeilPart(ceilSelId);
}

function updateCeilBadge(){
  var b=document.getElementById('acc-ceil-badge'); if(b) b.textContent=ceilParts.length;
}

function renderCeilPlacedList(){
  var el=document.getElementById('placed-list'); if(!el) return;
  var h='';
  ceilParts.forEach(function(c){
    var s=c.id===ceilSelId;
    h+='<div class="ei'+(s?' sel-ceil':'')+'" onclick="selCeil('+c.id+')">';
    h+='<div class="ei-sym">'+c.icon+'</div>';
    h+='<div class="ei-info"><div class="ei-name">'+c.label+'</div>';
    h+='<div class="ei-pos">X:'+c.x+'mm　Y:'+c.y+'mm</div></div>';
    h+='<button class="db-eq" onclick="event.stopPropagation();removeCeilPart('+c.id+')">削除</button>';
    h+='</div>';
  });
  el.innerHTML=h;
}

function showMPCeil(){
  var w=document.getElementById('mpanel-wrap'); if(!w) return;
  updMPCeil(); w.style.display='block';
  updateCeilDelBtn();
}
function hideMPCeil(){
  var w=document.getElementById('mpanel-wrap'); if(w){w.innerHTML='';w.style.display='none';}
  var btn=document.getElementById('eq-del-btn'); if(btn) btn.style.display='none';
}

function updMPCeil(){
  var cp=ceilParts.find(function(c){return c.id===ceilSelId;}); if(!cp) return;
  var W=roomData.W, D=roomData.D;
  var right=W-cp.x-cp.w, bottom=D-cp.y-cp.h;
  var steps=[10,100,300].map(function(s){
    return '<button class="mps'+(moveStep===s?' act-ceil':'')+'" onclick="setMvStep('+s+')">'+s+'mm</button>';
  }).join('');
  var h=''
    +'<div class="mpanel-compact cceil">'
      +'<div class="mpc-title cceil">'+cp.icon+' '+cp.label+'</div>'
      +'<div class="mpc-body">'
        +'<div class="mpc-pos">'
          +'<div class="mpc-cell"><div class="mpc-lbl">左端から</div><div class="mpc-val cceil">'+cp.x+'mm</div></div>'
          +'<div class="mpc-cell"><div class="mpc-lbl">右端から</div><div class="mpc-val cceil">'+right+'mm</div></div>'
          +'<div class="mpc-cell"><div class="mpc-lbl">上端から</div><div class="mpc-val cceil">'+cp.y+'mm</div></div>'
          +'<div class="mpc-cell"><div class="mpc-lbl">下端から</div><div class="mpc-val cceil">'+bottom+'mm</div></div>'
        +'</div>'
        +'<div class="mpc-ctrl">'
          +'<div class="mpc-dpad">'
            +'<div></div><button class="mpb" onclick="movCeil(0,-1)">▲</button><div></div>'
            +'<button class="mpb" onclick="movCeil(-1,0)">◀</button><div style="width:36px"></div><button class="mpb" onclick="movCeil(1,0)">▶</button>'
            +'<div></div><button class="mpb" onclick="movCeil(0,1)">▼</button><div></div>'
          +'</div>'
          +'<div class="mpc-steps">'+steps+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px">'
        +'<div class="mpc-cell"><div class="mpc-lbl">幅 mm</div>'
        +'<input type="number" id="cp-w-inp" value="'+cp.w+'" inputmode="numeric" style="width:100%;height:32px;border:1.5px solid rgba(42,106,74,0.4);border-radius:6px;padding:0 6px;font-size:13px;font-family:inherit;color:var(--tceil);text-align:center;background:#fff;" oninput="resizeCeil(&apos;w&apos;,this.value)"></div>'
        +'<div class="mpc-cell"><div class="mpc-lbl">奥行 mm</div>'
        +'<input type="number" id="cp-h-inp" value="'+cp.h+'" inputmode="numeric" style="width:100%;height:32px;border:1.5px solid rgba(42,106,74,0.4);border-radius:6px;padding:0 6px;font-size:13px;font-family:inherit;color:var(--tceil);text-align:center;background:#fff;" oninput="resizeCeil(&apos;h&apos;,this.value)"></div>'
      +'</div>'
    +'</div>';
  document.getElementById('mpanel-wrap').innerHTML=h;
  renderCeilPlacedList();
}

function movCeil(dx,dy){
  pushHistory();
  var cp=ceilParts.find(function(c){return c.id===ceilSelId;}); if(!cp) return;
  var W=roomData.W, D=roomData.D;
  cp.x=Math.max(0,Math.min(W-cp.w, cp.x+dx*moveStep));
  cp.y=Math.max(0,Math.min(D-cp.h, cp.y+dy*moveStep));
  updMPCeil(); redrawCeil();
  setTimeout(updateCeilDelBtn,30);
}

function resizeCeil(axis,val){
  pushHistory();
  var cp=ceilParts.find(function(c){return c.id===ceilSelId;}); if(!cp) return;
  var v=parseInt(val)||0; if(v<10) return;
  if(axis==='w') cp.w=Math.min(v,roomData.W-cp.x);
  else cp.h=Math.min(v,roomData.D-cp.y);
  updateCeilDelBtn(); redrawCeil(); renderCeilPlacedList();
}

function updateCeilDelBtn(){
  var btn=document.getElementById('eq-del-btn');
  var cv=document.getElementById('zumen-cv');
  if(!btn||!cv) return;
  var cp=ceilParts.find(function(c){return c.id===ceilSelId;});
  if(!cp){btn.style.display='none';return;}
  var W=roomData.W, D=roomData.D;
  var CW=cv.offsetWidth||340;
  var mL=56,mR=20,mT=20;
  var sc=Math.min((CW-mL-mR)/W, 240/D);
  var ox=mL, oy=mT;
  var erx=ox+cp.x*sc, ery=oy+cp.y*sc, erw=cp.w*sc;
  btn.style.display='block';
  btn.style.left=(erx+erw+2)+'px';
  btn.style.top=(ery-2)+'px';
}

// ══════════════════════════════════════════
//  天井図 canvas描画
// ══════════════════════════════════════════

function redrawCeil(){
  var cv=document.getElementById('zumen-cv'); if(!cv) return;
  var W=roomData.W, D=roomData.D;
  var CW=cv.offsetWidth||340;
  var mL=56, mR=20, mT=20, mB=64;
  var sc=Math.min((CW-mL-mR)/W, 240/D);
  var rw=W*sc, rd=D*sc, CH=rd+mT+mB;
  var ox=mL, oy=mT;
  var ctx=setupCanvas(cv,CW,CH); ctx.clearRect(0,0,CW,CH);

  // 背景
  ctx.fillStyle='#f0f4f8'; ctx.fillRect(ox,oy,rw,rd);

  // グリッド（900mm）
  ctx.strokeStyle='rgba(30,45,64,0.06)'; ctx.lineWidth=0.7; ctx.setLineDash([3,4]);
  for(var x=900;x<W;x+=900){var gx=ox+x*sc;ctx.beginPath();ctx.moveTo(gx,oy);ctx.lineTo(gx,oy+rd);ctx.stroke();}
  for(var d=900;d<D;d+=900){var gd=oy+d*sc;ctx.beginPath();ctx.moveTo(ox,gd);ctx.lineTo(ox+rw,gd);ctx.stroke();}
  ctx.setLineDash([]);

  // 外形線
  ctx.strokeStyle='rgba(30,45,64,0.85)'; ctx.lineWidth=2;
  ctx.strokeRect(ox,oy,rw,rd);

  // 天井器具
  ceilParts.forEach(function(cp){
    var sel=cp.id===ceilSelId;
    var erx=ox+cp.x*sc, ery=oy+cp.y*sc;
    var erw=cp.w*sc, erd=cp.h*sc;
    var ecx=erx+erw/2, ecy=ery+erd/2;
    var col=sel?'#2a6a4a':'rgba(30,45,64,0.75)';
    ctx.save();
    ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=sel?2:1.5;

    if(cp.typeId==='ceiling_light'){
      var r=Math.min(erw,erd)/2;
      ctx.beginPath();ctx.arc(ecx,ecy,r,0,Math.PI*2);ctx.stroke();
      ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(ecx-r*0.65,ecy);ctx.lineTo(ecx+r*0.65,ecy);
      ctx.moveTo(ecx,ecy-r*0.65);ctx.lineTo(ecx,ecy+r*0.65);ctx.stroke();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('CL',ecx,ery+erd+2);

    } else if(cp.typeId==='downlight'){
      var r2=Math.min(erw,erd)/2;
      ctx.beginPath();ctx.arc(ecx,ecy,r2,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(ecx,ecy,r2*0.5,0,Math.PI*2);ctx.fill();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('DL',ecx,ery+erd+2);

    } else if(cp.typeId==='led_tube'){
      ctx.strokeRect(erx,ecy-erd/2,erw,erd);
      var mg=erd*0.15;
      ctx.strokeRect(erx+mg,ecy-erd/2+mg,erw-mg*2,erd-mg*2);
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('FL',ecx,ery+erd+2);

    } else if(cp.typeId==='rail'){
      ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(erx,ecy);ctx.lineTo(erx+erw,ecy);ctx.stroke();
      ctx.lineWidth=1;
      for(var rx=erx+erw*0.1;rx<erx+erw;rx+=erw*0.2){
        ctx.beginPath();ctx.moveTo(rx,ecy-4);ctx.lineTo(rx,ecy+4);ctx.stroke();
      }
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('Rail',ecx,ery+erd+4);

    } else if(cp.typeId==='ac_ceil'){
      ctx.strokeRect(erx,ery,erw,erd);
      var mg2=Math.min(erw,erd)*0.08;
      ctx.strokeRect(erx+mg2,ery+mg2,erw-mg2*2,erd-mg2*2);
      // 4方向ルーバー
      ctx.lineWidth=0.8;
      [[ecx-erw*0.1,ery+mg2,ecx-erw*0.1,ecy],[ecx+erw*0.1,ery+mg2,ecx+erw*0.1,ecy],
       [ecx-erw*0.1,ery+erd-mg2,ecx-erw*0.1,ecy],[ecx+erw*0.1,ery+erd-mg2,ecx+erw*0.1,ecy]].forEach(function(l){
        ctx.beginPath();ctx.moveTo(l[0],l[1]);ctx.lineTo(l[2],l[3]);ctx.stroke();
      });
      ctx.beginPath();ctx.arc(ecx,ecy,Math.min(erw,erd)*0.1,0,Math.PI*2);ctx.fill();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('AC',ecx,ecy);

    } else if(cp.typeId==='fan_ceil_r'){
      var fr=Math.min(erw,erd)/2;
      ctx.beginPath();ctx.arc(ecx,ecy,fr,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(ecx,ecy,fr*0.75,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ecx-fr*0.65,ecy);ctx.lineTo(ecx+fr*0.65,ecy);
      ctx.moveTo(ecx,ecy-fr*0.65);ctx.lineTo(ecx,ecy+fr*0.65);ctx.stroke();
      ctx.beginPath();ctx.arc(ecx,ecy,fr*0.12,0,Math.PI*2);ctx.fill();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('EF',ecx,ery+erd+2);

    } else if(cp.typeId==='fan_ceil_s'){
      ctx.strokeRect(erx,ery,erw,erd);
      var mg3=Math.min(erw,erd)*0.1;
      ctx.strokeRect(erx+mg3,ery+mg3,erw-mg3*2,erd-mg3*2);
      ctx.beginPath();
      ctx.moveTo(erx+mg3,ery+mg3);ctx.lineTo(erx+erw-mg3,ery+erd-mg3);
      ctx.moveTo(erx+erw-mg3,ery+mg3);ctx.lineTo(erx+mg3,ery+erd-mg3);ctx.stroke();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('EF',ecx,ery+erd+2);

    } else if(cp.typeId==='inspection'){
      ctx.strokeRect(erx,ery,erw,erd);
      ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(erx,ery);ctx.lineTo(erx+erw,ery+erd);
      ctx.moveTo(erx+erw,ery);ctx.lineTo(erx,ery+erd);ctx.stroke();
      ctx.font='bold 8px Meiryo,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=col; ctx.fillText('点検',ecx,ecy);
    }

    // 選択時ハイライト＋寸法引き出し線
    if(sel&&drawMode==='edit'){
      // 選択枠
      ctx.strokeStyle='rgba(42,106,74,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
      ctx.strokeRect(erx-2,ery-2,erw+4,erd+4); ctx.setLineDash([]);

      var df='rgba(42,106,74,0.9)';
      var cxMm=Math.round(cp.x+cp.w/2);
      var cyMm=Math.round(cp.y+cp.h/2);

      // X方向：左端から中心まで（下部寸法線）
      if(cxMm>0){
        var cdimY=oy+rd+12;
        ctx.strokeStyle='#2a6a4a'; ctx.lineWidth=0.8;
        ctx.beginPath();ctx.moveTo(ox,cdimY);ctx.lineTo(ecx,cdimY);ctx.stroke();
        [ox,ecx].forEach(function(tx){
          ctx.beginPath();ctx.moveTo(tx,cdimY-3);ctx.lineTo(tx,cdimY+3);ctx.stroke();
        });
        // 引き出し垂直線
        ctx.strokeStyle='rgba(42,106,74,0.3)'; ctx.setLineDash([2,3]);
        ctx.beginPath();ctx.moveTo(ecx,ery+erd);ctx.lineTo(ecx,cdimY);ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle=df; ctx.font='bold 9px Meiryo,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='top';
        ctx.fillText(cxMm.toLocaleString()+'mm', ox+(ecx-ox)/2, cdimY+4);
      }

      // Y方向：上端から中心まで（左側寸法線）
      if(cyMm>0){
        var cdimX=ox-14;
        ctx.strokeStyle='#2a6a4a'; ctx.lineWidth=0.8;
        ctx.beginPath();ctx.moveTo(cdimX,oy);ctx.lineTo(cdimX,ecy);ctx.stroke();
        [oy,ecy].forEach(function(ty){
          ctx.beginPath();ctx.moveTo(cdimX-3,ty);ctx.lineTo(cdimX+3,ty);ctx.stroke();
        });
        // 引き出し水平線
        ctx.strokeStyle='rgba(42,106,74,0.3)'; ctx.setLineDash([2,3]);
        ctx.beginPath();ctx.moveTo(erx,ecy);ctx.lineTo(cdimX,ecy);ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle=df; ctx.font='bold 9px Meiryo,sans-serif';
        ctx.save();
        ctx.translate(cdimX-10, oy+(ecy-oy)/2);
        ctx.rotate(-Math.PI/2);
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(cyMm.toLocaleString()+'mm', 0, 0);
        ctx.restore();
      }

      // 器具名ラベル（右上）
      ctx.fillStyle=df; ctx.font='bold 10px Meiryo,sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='bottom';
      ctx.fillText(cp.label, erx+erw+4, ery);
    }
    ctx.restore();
  });

  // 寸法線
  var dimY=oy+rd+30;
  ctx.strokeStyle='rgba(30,45,64,0.45)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ox,dimY);ctx.lineTo(ox+rw,dimY);ctx.stroke();
  [ox,ox+rw].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,dimY-4);ctx.lineTo(tx,dimY+4);ctx.stroke();});
  ctx.fillStyle='rgba(30,45,64,0.6)'; ctx.font='bold 11px Meiryo,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(W.toLocaleString()+'mm',ox+rw/2,dimY+5);

  var dimX=ox-22;
  ctx.beginPath();ctx.moveTo(dimX,oy);ctx.lineTo(dimX,oy+rd);ctx.stroke();
  [oy,oy+rd].forEach(function(ty){ctx.beginPath();ctx.moveTo(dimX-4,ty);ctx.lineTo(dimX+4,ty);ctx.stroke();});
  ctx.save(); ctx.translate(dimX-13,oy+rd/2); ctx.rotate(-Math.PI/2);
  ctx.textAlign='center'; ctx.fillStyle='rgba(30,45,64,0.6)';
  ctx.font='bold 11px Meiryo,sans-serif';
  ctx.fillText(D.toLocaleString()+'mm',0,0); ctx.restore();

  // 方位記号
  drawCompass(ctx, ox+rw+30, oy, 16);
}

// ══════════════════════════════════════════

function getW(){ return faceW(curFaceIdx); }
function getH(){ return faceH(); }
function getOps(){ return faceOpenings[curFaceIdx]; }
function getEquips(){ return faceEquips[curFaceIdx]; }

function renderPlacedList(){
  var el=document.getElementById('placed-list'); if(!el) return;
  var h='';
  getOps().forEach(function(op){
    var s=op.id===faceSelId[curFaceIdx], d=odists(op);
    h+='<div class="oi'+(s?' sel-op':'')+'" onclick="selOp('+op.id+')">';
    h+='<button class="db" onclick="event.stopPropagation();removeOp('+op.id+')">削除</button>';
    h+='<div class="on">'+op.type+'　'+op.w+'×'+op.h+'mm</div>';
    h+='<div class="op-dist">左:'+op.x+'mm　右:'+d.right+'mm　床:'+d.bottom+'mm　天端:'+d.top+'mm</div>';
    h+='</div>';
  });
  getEquips().forEach(function(eq){
    var s=eq.id===faceEqSelId[curFaceIdx];
    h+='<div class="ei'+(s?' sel-eq':'')+'" onclick="selEq('+eq.id+')">';
    h+='<div class="ei-sym">'+eq.icon+'</div>';
    h+='<div class="ei-info"><div class="ei-name">'+eq.label+'</div>';
    h+='<div class="ei-pos">左:'+Math.round(eq.x+eq.w/2)+'mm　床CL:'+Math.round(eq.y+eq.h/2)+'mm</div></div>';
    h+='<button class="db-eq" onclick="event.stopPropagation();removeEq('+eq.id+')">削除</button>';
    h+='</div>';
  });
  el.innerHTML=h;
}

function toggleAcc(key){
  var hd=document.getElementById('acc-'+key+'-hd');
  var bd=document.getElementById('acc-'+key+'-body');
  if(!hd||!bd) return;
  var isOpen=bd.classList.contains('open');
  if(isOpen){bd.classList.remove('open');hd.classList.remove('open');}
  else{bd.classList.add('open');hd.classList.add('open');}
}

function updateAccBadge(){
  var ob=document.getElementById('acc-op-badge');
  var eb=document.getElementById('acc-eq-badge');
  if(ob) ob.textContent=getOps().length;
  if(eb) eb.textContent=getEquips().length;
}

function addOp(type,w,h2){
  pushHistory();
  var W=getW(), H=getH();
  var x=Math.round((W-w)/2/10)*10;
  x=Math.max(0,Math.min(W-w,x));
  var isDoor2=isDoor(type);
  var isSweep=type==='窓（掃出）';
  var y=isDoor2||isSweep?0:Math.max(0,Math.min(H-h2,Math.round((H-h2*1.5)/10)*10));
  y=Math.max(0,Math.min(H-h2,y));
  faceOidSeq[curFaceIdx]++;
  var id=faceOidSeq[curFaceIdx];
  getOps().push({id:id,type:type,w:w,h:h2,x:x,y:y});
  faceSelId[curFaceIdx]=id;
  renderPlacedList(); redraw(); showMP(); updateAccBadge();
}

function removeOp(id){
  pushHistory();
  faceOpenings[curFaceIdx]=faceOpenings[curFaceIdx].filter(function(o){return o.id!==id;});
  if(faceSelId[curFaceIdx]===id){faceSelId[curFaceIdx]=null;hideMP();}
  renderPlacedList(); redraw(); updateAccBadge();
}

function odists(op){
  var W=getW(),H=getH();
  return{left:op.x,right:W-op.x-op.w,bottom:op.y,top:H-op.y-op.h};
}

function selOp(id){faceSelId[curFaceIdx]=id;renderPlacedList();showMP();}

function showMP(){
  var w=document.getElementById('mpanel-wrap'); if(!w) return;
  updMP(); w.style.display='block';
  var cv=document.getElementById('zumen-cv');
  if(cv) setTimeout(function(){cv.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
}
function hideMP(){var w=document.getElementById('mpanel-wrap');if(w) w.style.display='none';}

function updMP(){
  var op=getOps().find(function(o){return o.id===faceSelId[curFaceIdx];}); if(!op) return;
  var d=odists(op);
  var steps=[10,100,300].map(function(s){
    return '<button class="mps'+(moveStep===s?' act-op':'')+'" onclick="setMvStep('+s+')">'+s+'mm</button>';
  }).join('');
  var h=''
    +'<div class="mpanel-compact cop">'
      +'<div class="mpc-title cop">'+op.type+'</div>'
      +'<div class="mpc-body">'
        +'<div class="mpc-pos">'
          +'<div class="mpc-cell"><div class="mpc-lbl">左端から</div><div class="mpc-val cop">'+op.x+'mm</div></div>'
          +'<div class="mpc-cell"><div class="mpc-lbl">右端から</div><div class="mpc-val cop">'+d.right+'mm</div></div>'
          +'<div class="mpc-cell"><div class="mpc-lbl">床から</div><div class="mpc-val cop">'+d.bottom+'mm</div></div>'
          +'<div class="mpc-cell"><div class="mpc-lbl">天端から</div><div class="mpc-val cop">'+d.top+'mm</div></div>'
        +'</div>'
        +'<div class="mpc-ctrl">'
          +'<div class="mpc-dpad">'
            +'<div></div><button class="mpb" onclick="movOp(0,1)">▲</button><div></div>'
            +'<button class="mpb" onclick="movOp(-1,0)">◀</button><div style="width:36px"></div><button class="mpb" onclick="movOp(1,0)">▶</button>'
            +'<div></div><button class="mpb" onclick="movOp(0,-1)">▼</button><div></div>'
          +'</div>'
          +'<div class="mpc-steps">'+steps+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px">'
        +'<div class="mpc-cell"><div class="mpc-lbl">幅 mm</div>'

  if(typeId==='bracket') centerY=1800;
  if(typeId==='fan_round'||typeId==='fan_sq') centerY=H-100;

// canvasドラッグ（平面図）間仕切り追加
(function(){
  var cv_el=null;
  function getCV(){ return document.getElementById('zumen-cv'); }

  function getEvPos(e, cv){
    var r=cv.getBoundingClientRect();
    var src=e.touches?e.touches[0]:e;
    return{x:src.clientX-r.left, y:src.clientY-r.top};
  }

  function onStart(e){
    if(curView!=='plan') return;
    var cv=getCV(); if(!cv||e.target!==cv) return;
    if(e.touches) e.preventDefault();
    var pos=getEvPos(e,cv);
    _partDrag.active=true;
    _partDrag.sx=pos.x; _partDrag.sy=pos.y;
    _partDrag.ex=pos.x; _partDrag.ey=pos.y;
    if(_planMode==='none') {
      // 選択中間仕切りのdimOffsetベース値を記録
      if(_planSelType==='partition'&&_planSelId!==null){
        var pb=planPartitions.find(function(p){return p.id===_planSelId;});
        if(pb) pb._dimBase=pb.dimOffset||0;
      }
      return;
    }
    var info=_planSc(); if(!info) return;
    var mm=_snapMm(pos, info);
    _partDrag.detected = _detectColType(mm.x, mm.y);
  }

  function onMove(e){
    if(!_partDrag.active||curView!=='plan') return;
    if(e.touches) e.preventDefault();
    var cv=getCV(); if(!cv) return;
    var pos=getEvPos(e,cv);
    _partDrag.ex=pos.x; _partDrag.ey=pos.y;
    if(_planMode==='part_v'||_planMode==='part_h') redrawPlanWithDrag();
    // 通常モード：選択中間仕切りの寸法線ドラッグ
    if(_planMode==='none'&&_planSelType==='partition'&&_planSelId!==null){
      var info3=_planSc(); if(!info3) return;
      var p3=planPartitions.find(function(p){return p.id===_planSelId;});
      if(p3){
        var ddx=(_partDrag.ex-_partDrag.sx)/info3.sc;
        var ddy=(_partDrag.ey-_partDrag.sy)/info3.sc;
        // 縦壁→Y方向のみ、横壁→X方向のみ
        p3.dimOffset=(p3._dimBase||0)+(p3.axis==='v'?ddy:ddx);
        redrawPlan();
      }
    }
  }

  function onEnd(e){
    if(!_partDrag.active||curView!=='plan'){ _partDrag.active=false; return; }
    _partDrag.active=false;
    var dx=Math.abs(_partDrag.ex-_partDrag.sx);
    var dy=Math.abs(_partDrag.ey-_partDrag.sy);
    var det=_partDrag.detected||{type:'interior'};

    if(_planMode==='none'){
      if(dx<10&&dy<10){
        // タップ → 選択
        var info2=_planSc(); if(!info2) return;
        var mmX=((_partDrag.sx-info2.ox)/info2.sc);
        var mmY=((_partDrag.sy-info2.oy)/info2.sc);
        var hit=false;
        var halfT=Math.round(roomData.wallT/2)+20;
        for(var pi=planPartitions.length-1;pi>=0;pi--){
          var p=planPartitions[pi];
          var hit2=false;
          if(p.axis==='v'){
            hit2=mmX>=p.pos-halfT&&mmX<=p.pos+halfT&&mmY>=p.start&&mmY<=p.start+p.len;
          } else {
            hit2=mmY>=p.pos-halfT&&mmY<=p.pos+halfT&&mmX>=p.start&&mmX<=p.start+p.len;
          }
          if(hit2){ _planSelType='partition'; _planSelId=p.id; hit=true; break; }
        }
        if(!hit){
          for(var ci=planColumns.length-1;ci>=0;ci--){
            var c=planColumns[ci];
            if(mmX>=c.x&&mmX<=c.x+c.w&&mmY>=c.y&&mmY<=c.y+c.d){
              _planSelType='column'; _planSelId=c.id; hit=true; break;
            }
          }
        }
        if(!hit){ _planSelType=null; _planSelId=null; }
        renderPlan();
      } else {
        // ドラッグ → 寸法線移動確定（_dimBaseをクリア）
        if(_planSelType==='partition'&&_planSelId!==null){
          var pb2=planPartitions.find(function(p){return p.id===_planSelId;});
          if(pb2) pb2._dimBase=pb2.dimOffset||0;
        }
        renderPlan();
      }
      return;
    }

    if(_planMode==='column'){
      // タップのみ反応（ドラッグは無視）
      if(dx<10&&dy<10){
        if(det.type==='corner'||det.type==='wall'){
          openColDialog(det);
        }
      }
      return;
    }

    if(_planMode==='part_v'||_planMode==='part_h'){
      if(dx<10&&dy<10){ redrawPlan(); return; }
      var info=_planSc(); if(!info) return;
      var snap=_calcPartSnap(info);
      _partPending={axis:snap.axis, pos:snap.pos, start:snap.start, len:snap.len};
      renderPlan();
    }
  }

  document.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onEnd);
  document.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('touchmove',  onMove,  {passive:false});
  document.addEventListener('touchend',   onEnd);
})();

function _calcPartSnap(info){
  var s=_snapMm({x:_partDrag.sx,y:_partDrag.sy},info);
  var e=_snapMm({x:_partDrag.ex,y:_partDrag.ey},info);
  var SNAP=50;
  var result={};
  if(_planMode==='part_h'){
    var startX=_snapToOuterWall(Math.min(s.x,e.x),info.W,SNAP);
    var endX=_snapToOuterWall(Math.max(s.x,e.x),info.W,SNAP);
    if(startX!==0&&startX!==info.W) startX=_snapEndToPartition(startX,'x',SNAP);
    if(endX!==0&&endX!==info.W) endX=_snapEndToPartition(endX,'x',SNAP);
    var posY=Math.round((s.y+e.y)/2/10)*10;
    posY=_snapToOuterWall(posY,info.D,SNAP);
    if(posY!==0&&posY!==info.D) posY=_snapEndToPartition(posY,'pos_y',SNAP);
    result={axis:'h',pos:posY,start:Math.min(startX,endX),len:Math.abs(endX-startX),
      sxSnap:Math.min(startX,endX),exSnap:Math.max(startX,endX),posYsnap:posY,
      sySnap:0,eySnap:0,posXsnap:0};
  } else {
    var startY=_snapToOuterWall(Math.min(s.y,e.y),info.D,SNAP);
    var endY=_snapToOuterWall(Math.max(s.y,e.y),info.D,SNAP);
    if(startY!==0&&startY!==info.D) startY=_snapEndToPartition(startY,'y',SNAP);
    if(endY!==0&&endY!==info.D) endY=_snapEndToPartition(endY,'y',SNAP);
    var posX=Math.round((s.x+e.x)/2/10)*10;
    posX=_snapToOuterWall(posX,info.W,SNAP);
    if(posX!==0&&posX!==info.W) posX=_snapEndToPartition(posX,'pos_x',SNAP);
    result={axis:'v',pos:posX,start:Math.min(startY,endY),len:Math.abs(endY-startY),
      sySnap:Math.min(startY,endY),eySnap:Math.max(startY,endY),posXsnap:posX,
      sxSnap:0,exSnap:0,posYsnap:0};
  }
  return result;
}

function redrawPlanWithDrag(){
  redrawPlan();
  if(!_partDrag.active) return;
  var cv=document.getElementById('zumen-cv'); if(!cv) return;
  var ctx=cv.getContext('2d');
  var info=_planSc(); if(!info) return;
  var T=roomData.wallT;
  var dpr=window.devicePixelRatio||1;
  ctx.save(); ctx.setTransform(dpr,0,0,dpr,0,0);
  var dx=Math.abs(_partDrag.ex-_partDrag.sx);
  var dy=Math.abs(_partDrag.ey-_partDrag.sy);
  var Tpx=Math.max(2,T*info.sc);
  ctx.fillStyle='rgba(30,45,64,0.35)';
  ctx.strokeStyle='rgba(30,45,64,0.7)'; ctx.lineWidth=1;
  var forceH=(_planMode==='part_h');
  var forceV=(_planMode==='part_v');
  var isH=forceH||((!forceV)&&dx>=dy);

  // _calcPartSnapでリアルタイムスナップ
  var snap=_calcPartSnap(info);
  var sxSnap=snap.sxSnap, exSnap=snap.exSnap, posYsnap=snap.posYsnap;
  var sySnap=snap.sySnap, eySnap=snap.eySnap, posXsnap=snap.posXsnap;
  var halfT=Math.round(roomData.wallT/2);

  if(isH){
    var x1=info.ox+sxSnap*info.sc;
    var x2=info.ox+exSnap*info.sc;
    var snapMidY=info.oy+posYsnap*info.sc;
    var Tpx2=Math.max(2,roomData.wallT*info.sc);
    ctx.fillRect(x1, snapMidY-Tpx2/2, x2-x1, Tpx2);
    ctx.strokeRect(x1, snapMidY-Tpx2/2, x2-x1, Tpx2);
    var topFaceY=snapMidY-Tpx2/2, botFaceY=snapMidY+Tpx2/2;
    var posYmm=posYsnap;
    var botDistMm=roomData.D-posYmm;
    ctx.strokeStyle='rgba(30,45,64,0.4)'; ctx.lineWidth=0.8;
    var dimX3=(x1+x2)/2;
    ctx.beginPath();ctx.moveTo(dimX3,info.oy);ctx.lineTo(dimX3,topFaceY);ctx.stroke();
    [info.oy,topFaceY].forEach(function(ty){ctx.beginPath();ctx.moveTo(dimX3-3,ty);ctx.lineTo(dimX3+3,ty);ctx.stroke();});
    var botWallY=info.oy+roomData.D*info.sc;
    ctx.beginPath();ctx.moveTo(dimX3,botFaceY);ctx.lineTo(dimX3,botWallY);ctx.stroke();
    [botFaceY,botWallY].forEach(function(ty){ctx.beginPath();ctx.moveTo(dimX3-3,ty);ctx.lineTo(dimX3+3,ty);ctx.stroke();});
    ctx.fillStyle='rgba(30,45,64,0.85)'; ctx.font='bold 10px Meiryo,sans-serif';
    ctx.save(); ctx.translate(dimX3-10,info.oy+(topFaceY-info.oy)/2); ctx.rotate(-Math.PI/2);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText((posYmm-halfT)+'mm',0,0); ctx.restore();
    ctx.save(); ctx.translate(dimX3-10,botFaceY+(botWallY-botFaceY)/2); ctx.rotate(-Math.PI/2);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText((botDistMm-halfT)+'mm',0,0); ctx.restore();
    var lenMm=Math.abs(exSnap-sxSnap);
    if(lenMm>0){
      ctx.strokeStyle='rgba(200,169,110,0.8)'; ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(x1,snapMidY-Tpx2/2-8);ctx.lineTo(x2,snapMidY-Tpx2/2-8);ctx.stroke();
      [x1,x2].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,snapMidY-Tpx2/2-11);ctx.lineTo(tx,snapMidY-Tpx2/2-5);ctx.stroke();});
      ctx.fillStyle='rgba(200,169,110,1)'; ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(lenMm.toLocaleString()+'mm',(x1+x2)/2,snapMidY-Tpx2/2-10);
    }
  } else {
    var y1=info.oy+sySnap*info.sc;
    var y2=info.oy+eySnap*info.sc;
    var snapMidX=info.ox+posXsnap*info.sc;
    var Tpx3=Math.max(2,roomData.wallT*info.sc);
    ctx.fillRect(snapMidX-Tpx3/2, y1, Tpx3, y2-y1);
    ctx.strokeRect(snapMidX-Tpx3/2, y1, Tpx3, y2-y1);
    var leftFaceX=snapMidX-Tpx3/2, rightFaceX=snapMidX+Tpx3/2;
    var posXmm=posXsnap;
    var rightDistMm=roomData.W-posXmm;
    ctx.strokeStyle='rgba(30,45,64,0.4)'; ctx.lineWidth=0.8;
    var dimY3=(y1+y2)/2;
    ctx.beginPath();ctx.moveTo(info.ox,dimY3);ctx.lineTo(leftFaceX,dimY3);ctx.stroke();
    [info.ox,leftFaceX].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,dimY3-3);ctx.lineTo(tx,dimY3+3);ctx.stroke();});
    var rightWallX=info.ox+roomData.W*info.sc;
    ctx.beginPath();ctx.moveTo(rightFaceX,dimY3);ctx.lineTo(rightWallX,dimY3);ctx.stroke();
    [rightFaceX,rightWallX].forEach(function(tx){ctx.beginPath();ctx.moveTo(tx,dimY3-3);ctx.lineTo(tx,dimY3+3);ctx.stroke();});
    ctx.fillStyle='rgba(30,45,64,0.85)'; ctx.font='bold 10px Meiryo,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText((posXmm-halfT)+'mm',info.ox+(leftFaceX-info.ox)/2,dimY3-4);
    ctx.fillText((rightDistMm-halfT)+'mm',rightFaceX+(rightWallX-rightFaceX)/2,dimY3-4);
    var lenMm2=Math.abs(eySnap-sySnap);
    if(lenMm2>0){
      ctx.strokeStyle='rgba(200,169,110,0.8)'; ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(snapMidX+Tpx3/2+8,y1);ctx.lineTo(snapMidX+Tpx3/2+8,y2);ctx.stroke();
      [y1,y2].forEach(function(ty){ctx.beginPath();ctx.moveTo(snapMidX+Tpx3/2+5,ty);ctx.lineTo(snapMidX+Tpx3/2+11,ty);ctx.stroke();});
      ctx.fillStyle='rgba(200,169,110,1)'; ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(lenMm2.toLocaleString()+'mm',snapMidX+Tpx3/2+14,(y1+y2)/2);
    }
  }

  ctx.restore();
}
