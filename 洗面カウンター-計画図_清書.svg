<rect x="30" y="648" width="900" height="372" fill="#fbfbf8" stroke="#888" stroke-width="1"/>
<text x="48.0" y="678.0" font-size="16" fill="#1a2a3a" text-anchor="start" font-weight="bold">■ 注記</text>
<text x="48.0" y="710.0" font-size="13" fill="#333" text-anchor="start" font-weight="bold">1.</text>
<text x="72.0" y="710.0" font-size="13" fill="#333" text-anchor="start">本図は手書きスケッチ（2026-07-02）の清書。寸法は現地実測メモに基づく。施工前に再実測のこと。</text>
<text x="48.0" y="740.0" font-size="13" fill="#333" text-anchor="start" font-weight="bold">2.</text>
<text x="72.0" y="740.0" font-size="13" fill="#333" text-anchor="start">新設カウンター＝メルクシパイン積層材 t30 × W500 × L約980。手持ちの500幅板を現場カットして使用。</text>
<text x="48.0" y="770.0" font-size="13" fill="#333" text-anchor="start" font-weight="bold">3.</text>
<text x="72.0" y="770.0" font-size="13" fill="#333" text-anchor="start">冷蔵庫天端とカウンター下端の間に放熱クリアランス 10〜20mm を確保（冷蔵庫に熱をこもらせない）。</text>
<text x="48.0" y="800.0" font-size="13" fill="#333" text-anchor="start" font-weight="bold">4.</text>
<text x="72.0" y="800.0" font-size="13" fill="#333" text-anchor="start">カウンター支持＝笠木側の下駄 h約52 ／ カラーBOX側の下駄 h約63（天板面から。側板天端からは60）。固定方法は現場判断。</text>
<text x="48.0" y="830.0" font-size="13" fill="#333" text-anchor="start" font-weight="bold">5.</text>
<text x="72.0" y="830.0" font-size="13" fill="#333" text-anchor="start">カラーBOX側の下駄＝引出側オープンの「コの字型」。側板（t22・天板+3mm）を避けて ひと回り小さく天板凹み内に設置。背面突起なし。</text>
<text x="48.0" y="860.0" font-size="13" fill="#333" text-anchor="start" font-weight="bold">6.</text>
<text x="72.0" y="860.0" font-size="13" fill="#333" text-anchor="start">コの字の開口（引出側＝左）からカラーBOX上へトレイ等を差し込んで使用可（側板天端上の有効すき間 約60）。</text>
<text x="48.0" y="890.0" font-size="13" fill="#333" text-anchor="start" font-weight="bold">7.</text>
<text x="72.0" y="890.0" font-size="13" fill="#333" text-anchor="start">レーザー実測より：笠木天端930（=壁900+笠木t30）／冷蔵庫天端 約967（笠木+37）／カラーBOX天端（側板）約922。</text>
<text x="48.0" y="920.0" font-size="13" fill="#333" text-anchor="start" font-weight="bold">8.</text>
<text x="72.0" y="920.0" font-size="13" fill="#333" text-anchor="start">既存壁（右側）＝天井まで達しない中間間仕切り。天端（笠木天板）まで FL+1925・笠木t30。</text>
<text x="48.0" y="958.0" font-size="12" fill="#7a4a00" text-anchor="start">（笠木天端930・冷蔵庫W500・既存壁H1925は 2026-07-02 確認済。施工時は現地レーザー基準で墨出しすること）</text>
<rect x="960" y="648" width="495" height="372" fill="#fbfbf8" stroke="#888" stroke-width="1"/>
