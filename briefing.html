<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>朝ブリーフィング｜現場ナビ</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="朝ブリーフィング">
<meta name="theme-color" content="#1e2d40">
<link rel="stylesheet" href="common.css">
<style>
body{display:flex;flex-direction:column;background:var(--bg);}

/* ヘッダー（index.html と共通トーン） */
.header{background:var(--navy);padding:env(safe-area-inset-top,0) 0 0;flex-shrink:0;position:sticky;top:0;z-index:10;}
.header-inner{height:56px;display:flex;align-items:center;padding:0 8px 0 4px;}
.header-btn{width:44px;height:44px;border:none;background:transparent;color:rgba(255,255,255,0.85);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;}
.header-btn:active{background:rgba(255,255,255,0.12);}
.header-title{font-size:16px;font-weight:800;color:var(--white);letter-spacing:0.03em;flex:1;}
.header-title span{color:var(--accent);}

.scroll-area{padding:16px 16px max(28px,env(safe-area-inset-bottom));}

/* 日付ヘッダ帯 */
.date-band{background:var(--navy2);border-radius:16px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.date-band .ico{width:40px;height:40px;border-radius:11px;background:rgba(200,169,110,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.date-band .lbl{font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:0.1em;margin-bottom:2px;}
.date-band .val{font-size:15px;font-weight:700;color:var(--white);line-height:1.35;}
.date-band .gen{font-size:10px;color:rgba(255,255,255,0.45);margin-top:3px;}

/* 未生成バナー */
.stale{background:var(--orange-bg);border:1px solid rgba(176,106,0,0.35);color:var(--orange);border-radius:12px;padding:11px 14px;font-size:12px;line-height:1.5;margin-bottom:14px;}

/* 本文カード */
.doc{background:var(--surface);border-radius:18px;padding:20px 18px 24px;box-shadow:0 2px 10px rgba(30,45,64,0.06);border:1px solid rgba(30,45,64,0.06);}
.doc .lead{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:6px;}
.doc h2{font-size:16px;font-weight:800;color:var(--text);margin:22px 0 10px;padding-bottom:7px;border-bottom:2px solid var(--accent);line-height:1.4;}
.doc h2:first-of-type{margin-top:4px;}
.doc h3{font-size:13.5px;font-weight:800;color:var(--navy);margin:16px 0 7px;line-height:1.4;}
.doc p{font-size:13px;color:var(--text);line-height:1.75;margin:8px 0;}
.doc ul{margin:6px 0 10px;padding-left:2px;list-style:none;}
.doc li{font-size:13px;color:var(--text);line-height:1.7;margin:6px 0;padding-left:16px;position:relative;}
.doc li::before{content:"";position:absolute;left:2px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--accent);}
.doc strong{font-weight:800;color:var(--text);}
.doc a{color:var(--blue);text-decoration:none;word-break:break-all;}
.doc a:active{text-decoration:underline;}
.doc code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;background:var(--surface2);border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:var(--text);}
.doc .src-h + ul li{word-break:break-all;}

.state{text-align:center;color:var(--text2);font-size:13px;padding:48px 12px;line-height:1.7;}
.footer-info{text-align:center;font-size:10px;color:var(--text2);opacity:0.6;padding:18px 0 6px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <button class="header-btn" onclick="goBack()" title="戻る" aria-label="戻る">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 5 L8 12 L15 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </button>
    <div class="header-title">朝ブリーフィング<span>.</span></div>
    <button class="header-btn" onclick="reload()" title="更新" aria-label="更新">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M18 5.5 A8 8 0 1 0 19 11" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none"></path>
        <path d="M18 3 L18 6 L15 6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
      </svg>
    </button>
  </div>
</div>

<div class="scroll-area">
  <div class="date-band">
    <div class="ico">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 3 A9 9 0 1 0 12 21 A9 9 0 0 0 12 3" stroke="#c8a96e" stroke-width="1.5" fill="none"></path>
        <path d="M12 7 L12 12 L15.5 14" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round"></path>
      </svg>
    </div>
    <div style="flex:1;">
      <div class="lbl">MORNING BRIEFING</div>
      <div class="val" id="dateVal">読み込み中…</div>
      <div class="gen" id="genVal"></div>
    </div>
  </div>

  <div id="staleBox"></div>
  <div id="content"><div class="state">ブリーフィングを読み込んでいます…</div></div>

  <div class="footer-info">株式会社アート・レイズ　現場ナビ｜朝ブリーフィング</div>
</div>

<script>
function goBack(){
  if (document.referrer && document.referrer.indexOf(location.host) !== -1) { history.back(); }
  else { location.href = 'index.html'; }
}
function reload(){ location.reload(); }

function todayStr(){
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* インライン装飾：**太字** / `コード` / [text](url) */
function inline(s){
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, (m,c)=>`<code>${c}</code>`);
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (m,t,u)=>`<a href="${u}" target="_blank" rel="noopener">${t}</a>`);
  s = s.replace(/\*\*([^*]+)\*\*/g, (m,c)=>`<strong>${c}</strong>`);
  return s;
}

/* 軽量Markdown → HTML（見出し・箇条書き・段落のみ対応） */
function renderMd(md){
  const lines = md.replace(/\r\n/g,'\n').split('\n');
  let html = '', inList = false, firstH2 = true;
  const closeList = ()=>{ if(inList){ html += '</ul>'; inList = false; } };
  for (let raw of lines){
    const line = raw.replace(/\s+$/,'');
    if (line === ''){ closeList(); continue; }
    let m;
    if (m = line.match(/^###\s+(.*)$/)){ closeList(); html += `<h3>${inline(m[1])}</h3>`; }
    else if (m = line.match(/^##\s+(.*)$/)){ closeList(); const cls = /参照ソース|ソース/.test(m[1]) ? ' class="src-h"' : ''; html += `<h2${cls}>${inline(m[1])}</h2>`; firstH2 = false; }
    else if (m = line.match(/^[-*]\s+(.*)$/)){ if(!inList){ html += '<ul>'; inList = true; } html += `<li>${inline(m[1])}</li>`; }
    else { closeList(); const p = inline(line); html += (firstH2 ? `<p class="lead">${p}</p>` : `<p>${p}</p>`); }
  }
  closeList();
  return html;
}

function meta(md, key){
  const m = md.match(new RegExp('<!--\\s*'+key+':\\s*([^>]*?)\\s*-->'));
  return m ? m[1].trim() : '';
}
function stripMeta(md){ return md.replace(/<!--[^>]*-->/g,'').replace(/^\s+/,''); }

fetch('briefing.md?t=' + Date.now(), {cache:'no-store'})
  .then(r=>{ if(!r.ok) throw new Error('not found'); return r.text(); })
  .then(md=>{
    const dateLabel = meta(md,'dateLabel') || meta(md,'date') || '';
    const dateIso   = meta(md,'date') || '';
    const gen       = meta(md,'generatedAt') || '';
    document.getElementById('dateVal').textContent = dateLabel || 'ブリーフィング';
    if (gen){
      const g = new Date(gen);
      if (!isNaN(g)) document.getElementById('genVal').textContent =
        `生成：${g.getMonth()+1}/${g.getDate()} ${String(g.getHours()).padStart(2,'0')}:${String(g.getMinutes()).padStart(2,'0')}`;
    }
    if (dateIso && dateIso !== todayStr()){
      document.getElementById('staleBox').innerHTML =
        `<div class="stale">⚠️ 本日（${todayStr().replace(/-/g,'/')}）のブリーフィングはまだ生成されていません。以下は直近（${dateLabel}）の内容です。毎朝6時に自動更新されます。</div>`;
    }
    document.getElementById('content').innerHTML = '<div class="doc">' + renderMd(stripMeta(md)) + '</div>';
  })
  .catch(()=>{
    document.getElementById('dateVal').textContent = 'ブリーフィング';
    document.getElementById('content').innerHTML =
      '<div class="state">まだブリーフィングが生成されていません。<br>毎朝6時の自動生成後にここで読めるようになります。</div>';
  });
</script>
<script src="back-guard.js"></script>
</body></html>
