<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>図面スケッチ｜アート・レイズ</title>
<style>
:root{
  --bg:#eeebe5;--navy:#1e2d40;--navy2:#2a3f5a;
  --accent:#c8a96e;--text:#1e2d40;--text2:#5a6a7a;--white:#ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

.header{background:var(--navy);height:50px;display:flex;align-items:center;padding:0 6px;flex-shrink:0;gap:2px;}
.btn-icon{width:44px;height:44px;border:none;background:transparent;color:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;}
.btn-icon:active{background:rgba(255,255,255,0.15);}
.header-title{flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--white);}

.type-bar{background:var(--navy2);min-height:38px;display:flex;align-items:center;padding:0 6px;gap:5px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.type-bar::-webkit-scrollbar{display:none;}
.type-btn{height:26px;padding:0 12px;border:1.5px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.7);font-size:11px;font-weight:500;border-radius:20px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;flex-shrink:0;}
.type-btn.active{background:var(--accent);border-color:var(--accent);color:var(--navy);font-weight:700;}
.type-add-btn{width:26px;height:26px;border:1.5px solid rgba(255,255,255,0.4);background:transparent;color:rgba(255,255,255,0.9);font-size:18px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;}
.type-add-btn:active{background:rgba(255,255,255,0.2);}

.toolbar{background:var(--white);height:48px;display:flex;align-items:center;padding:0 3px;gap:1px;border-bottom:1px solid rgba(30,45,64,0.1);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.toolbar::-webkit-scrollbar{display:none;}
.tool-btn{width:36px;height:36px;min-width:36px;border:none;background:transparent;color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;font-weight:700;flex-shrink:0;}
.tool-btn.active{background:var(--navy);color:var(--white);}
.tool-btn:active{opacity:0.7;}
.divider{width:1px;height:26px;background:rgba(30,45,64,0.15);margin:0 2px;flex-shrink:0;}
.stroke-selector{display:flex;align-items:center;gap:4px;padding:0 3px;flex-shrink:0;}
.stroke-dot{border-radius:50%;background:var(--navy);cursor:pointer;flex-shrink:0;border:2px solid transparent;}
.stroke-dot.active{border-color:var(--accent);}
.color-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.color-dot.active{border-color:var(--accent);}
.spacer{flex:1;min-width:4px;}
.grid-selector{display:flex;gap:2px;padding:0 2px;flex-shrink:0;}
.grid-btn{height:24px;padding:0 6px;border:1.5px solid rgba(30,45,64,0.2);background:transparent;color:var(--text2);font-size:11px;font-weight:700;border-radius:6px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.grid-btn.active{background:var(--navy);color:var(--white);border-color:var(--navy);}

.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--white);}
#gridCanvas,#drawCanvas,#overlayCanvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;}
#gridCanvas{z-index:1;}#drawCanvas{z-index:2;}#overlayCanvas{z-index:3;}
.kigo-mode-bar{display:none;position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:10;background:var(--navy);color:var(--white);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;pointer-events:none;white-space:nowrap;}
.kigo-mode-bar.show{display:block;}

.modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.5);align-items:flex-end;justify-content:center;}
.modal.show{display:flex;}
.modal-panel{background:var(--white);width:100%;max-width:480px;border-radius:16px 16px 0 0;padding:18px 16px 36px;}
.modal-panel h3{font-size:13px;color:var(--text2);margin-bottom:10px;}
.modal-panel input{width:100%;height:48px;border:2px solid var(--navy);border-radius:10px;padding:0 14px;font-size:18px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);outline:none;margin-bottom:0;}
.modal-row{display:flex;gap:8px;align-items:center;margin-bottom:0;}
.modal-row input{flex:1;}
.modal-row span{font-size:20px;font-weight:700;color:var(--text2);flex-shrink:0;}
.modal-btns{display:flex;gap:10px;margin-top:12px;}
.btn-cancel{flex:1;height:44px;border:2px solid rgba(30,45,64,0.2);background:transparent;border-radius:10px;font-size:15px;font-family:'Noto Sans JP',sans-serif;color:var(--text2);cursor:pointer;}
.btn-ok{flex:2;height:44px;border:none;background:var(--navy);border-radius:10px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:var(--white);cursor:pointer;}

.palette-wrap{background:var(--bg);border-top:1px solid rgba(30,45,64,0.12);flex-shrink:0;padding:6px 6px 10px;}
.palette-tabs{display:flex;gap:5px;margin-bottom:6px;overflow-x:auto;scrollbar-width:none;align-items:center;}
.palette-tabs::-webkit-scrollbar{display:none;}
.ptab{height:22px;padding:0 10px;border:none;background:rgba(30,45,64,0.1);color:var(--text2);font-size:11px;font-weight:500;border-radius:20px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;flex-shrink:0;}
.ptab.active{background:var(--navy);color:var(--white);}
.palette-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;align-items:center;}
.palette-row::-webkit-scrollbar{display:none;}
.kigo-btn{flex-shrink:0;min-width:52px;height:44px;background:var(--white);border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:0 5px;}
.kigo-btn.selected{background:var(--accent);border-color:var(--accent);}
.kigo-label{font-size:12px;font-weight:700;color:var(--navy);font-family:monospace;}
.kigo-desc{font-size:9px;color:var(--text2);}
.kigo-btn.selected .kigo-label,.kigo-btn.selected .kigo-desc{color:var(--navy);}
.kigo-add-btn{flex-shrink:0;width:40px;height:44px;background:transparent;border:1.5px dashed rgba(30,45,64,0.3);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text2);}
.kigo-add-btn:active{background:rgba(30,45,64,0.08);}

.save-btn{position:fixed;bottom:max(14px,env(safe-area-inset-bottom));right:14px;z-index:50;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(30,45,64,0.3);display:flex;align-items:center;justify-content:center;}
.save-btn:active{transform:scale(0.94);}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">
  <button class="btn-icon" onclick="goBack()">←</button>
  <div class="header-title">図面スケッチ</div>
  <button class="btn-icon" onclick="undoStep()" style="font-size:15px;">↩</button>
  <button class="btn-icon" style="font-size:12px;color:var(--accent);" onclick="clearCurrent()">全消</button>
</div>

<div class="type-bar" id="typeBar"></div>

<div class="toolbar">
  <!-- ペン -->
  <button class="tool-btn active" id="toolPen" onclick="setTool('pen')" title="ペン">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M4 16 L14 4 L17 7 L7 17 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
      <line x1="4" y1="16" x2="2" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <!-- 直線 -->
  <button class="tool-btn" id="toolLine" onclick="setTool('line')" title="直線">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <line x1="3" y1="17" x2="17" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <!-- 寸法線 -->
  <button class="tool-btn" id="toolDim" onclick="setTool('dim')" title="寸法線">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <line x1="2" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <polyline points="6,6 2,10 6,14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <polyline points="14,6 18,10 14,14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
  </button>
  <!-- 四角 -->
  <button class="tool-btn" id="toolRect" onclick="setTool('rect')" title="四角">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="3" y="4" width="14" height="12" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    </svg>
  </button>
  <!-- ドア -->
  <button class="tool-btn" id="toolDoor" onclick="setTool('door')" title="ドア">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <line x1="3" y1="17" x2="13" y2="17" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="3" y1="7" x2="3" y2="17" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M3,7 A10,10 0 0,1 13,17" stroke="#4a9eff" stroke-width="1.5" fill="none"/>
    </svg>
  </button>
  <!-- サッシ -->
  <button class="tool-btn" id="toolSash" onclick="setTool('sash')" title="サッシ">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="2" y="5" width="16" height="10" stroke="#3dd68c" stroke-width="1.5" fill="none"/>
      <line x1="10" y1="5" x2="10" y2="15" stroke="#3dd68c" stroke-width="1.5"/>
      <line x1="6" y1="6.5" x2="6" y2="13.5" stroke="#3dd68c" stroke-width="0.8" opacity="0.6"/>
      <line x1="14" y1="6.5" x2="14" y2="13.5" stroke="#3dd68c" stroke-width="0.8" opacity="0.6"/>
    </svg>
  </button>
  <!-- 円 -->
  <button class="tool-btn" id="toolCircle" onclick="setTool('circle')" title="円">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/>
    </svg>
  </button>
  <!-- テキスト -->
  <button class="tool-btn" id="toolText" onclick="setTool('text')" title="テキスト">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <line x1="4" y1="5" x2="16" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10" y1="5" x2="10" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <!-- 消しゴム -->
  <button class="tool-btn" id="toolErase" onclick="setTool('erase')" title="消しゴム">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M4 16 L14 4 L18 8 L8 16 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
      <line x1="4" y1="16" x2="18" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="divider"></div>
  <div class="stroke-selector">
    <div class="stroke-dot active" style="width:5px;height:5px;" onclick="setStroke(1.5,this)"></div>
    <div class="stroke-dot" style="width:9px;height:9px;" onclick="setStroke(3,this)"></div>
    <div class="stroke-dot" style="width:13px;height:13px;" onclick="setStroke(6,this)"></div>
  </div>
  <div class="divider"></div>
  <div class="color-dot active" style="background:#1e2d40;" onclick="setColor('#1e2d40',this)"></div>
  <div class="color-dot" style="background:#e03030;" onclick="setColor('#e03030',this)"></div>
  <div class="color-dot" style="background:#1a6fc4;" onclick="setColor('#1a6fc4',this)"></div>
  <div class="spacer"></div>
  <div class="grid-selector">
    <button class="grid-btn" onclick="setGrid('S',this)">S</button>
    <button class="grid-btn active" onclick="setGrid('M',this)">M</button>
    <button class="grid-btn" onclick="setGrid('L',this)">L</button>
  </div>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="gridCanvas"></canvas>
  <canvas id="drawCanvas"></canvas>
  <canvas id="overlayCanvas"></canvas>
  <div class="kigo-mode-bar" id="kigoModeBar"></div>
</div>

<div class="palette-wrap">
  <div class="palette-tabs" id="paletteTabs"></div>
  <div class="palette-row" id="paletteRow"></div>
</div>

<!-- 汎用入力モーダル（1フィールド） -->
<div class="modal" id="inputModal">
  <div class="modal-panel">
    <h3 id="inputTitle">入力</h3>
    <input type="text" id="inputField" placeholder="">
    <div class="modal-btns">
      <button class="btn-cancel" id="inputCancel">キャンセル</button>
      <button class="btn-ok" id="inputOk">確定</button>
    </div>
  </div>
</div>

<!-- 幅×奥行き 2フィールドモーダル -->
<div class="modal" id="dimXModal">
  <div class="modal-panel">
    <h3>幅と奥行きを入力（mm）</h3>
    <div class="modal-row">
      <input type="text" id="dimW" inputmode="numeric" placeholder="幅　例：2500">
      <span>×</span>
      <input type="text" id="dimD" inputmode="numeric" placeholder="奥行　例：3600">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDimX()">キャンセル</button>
      <button class="btn-ok" onclick="confirmDimX()">配置場所をタップ</button>
    </div>
  </div>
</div>

<!-- タブ追加モーダル -->
<div class="modal" id="tabModal">
  <div class="modal-panel">
    <h3>図面の名前を入力</h3>
    <input type="text" id="tabInput" placeholder="例：立面図、2階平面図">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeTabModal()">キャンセル</button>
      <button class="btn-ok" onclick="confirmAddTab()">追加</button>
    </div>
  </div>
</div>

<!-- 記号追加モーダル -->
<div class="modal" id="kigoAddModal">
  <div class="modal-panel">
    <h3>記号を追加</h3>
    <input type="text" id="kigoSymbolInput" placeholder="記号　例：[XX]" style="margin-bottom:8px;">
    <input type="text" id="kigoDescInput" placeholder="説明　例：倉庫" style="margin-top:8px;">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeKigoAddModal()">キャンセル</button>
      <button class="btn-ok" onclick="confirmAddKigo()">追加</button>
    </div>
  </div>
</div>

<button class="save-btn" onclick="saveSketch()">💾</button>

<script>
// ── パレットデータ ──
const DEFAULT_PALETTE = {
  建具:[
    {label:'[D]',desc:'ドア'},{label:'[SD]',desc:'防火扉'},
    {label:'[S]',desc:'窓'},{label:'[W]',desc:'壁'},
    {label:'[OP]',desc:'開口部'},{label:'[CL]',desc:'収納'},
  ],
  設備:[
    {label:'[AC]',desc:'エアコン'},{label:'[BS]',desc:'洗面'},
    {label:'[TL]',desc:'トイレ'},{label:'[KT]',desc:'キッチン'},
    {label:'[P]',desc:'柱'},{label:'[EL]',desc:'EV'},
    {label:'[ST]',desc:'階段'},{label:'[RC]',desc:'カウンター'},
  ],
  施工:[
    {label:'★',desc:'要注意'},{label:'新設',desc:'NEW'},
    {label:'撤去',desc:'DEL'},{label:'既存',desc:'現状'},
    {label:'■',desc:'対象外'},{label:'①',desc:'エリア1'},
    {label:'②',desc:'エリア2'},{label:'③',desc:'エリア3'},
  ],
  寸法:[
    {label:'←→',desc:'水平'},{label:'↑↓',desc:'垂直'},
    {label:'H=',desc:'高さ'},{label:'×',desc:'幅×奥行'},
    {label:'約',desc:'おおよそ'},{label:'㎡',desc:'面積'},
  ],
};
const DIM_CATS=['寸法'];

function loadPalette(){
  try{const s=localStorage.getItem('artRaiseKigo');if(s)return JSON.parse(s);}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_PALETTE));
}
function savePaletteLS(){localStorage.setItem('artRaiseKigo',JSON.stringify(paletteData));}
let paletteData=loadPalette();
let currentPaletteCat='建具';

// ── タブ管理 ──
let tabs=[{label:'平面図',history:[]}];
let currentTab=0;

// ── State ──
let tool='pen',strokeWidth=1.5,strokeColor='#1e2d40';
let isDrawing=false,startX=0,startY=0;
let penPoints=[];
let selectedKigo=null;
// 寸法パレット：数値入力後に配置場所待ち
let pendingKigoText=null;
// dimX（×）用
let dimXResolve=null;
const GRID_SIZE={S:10,M:20,L:50};
let gridKey='M',GRID=20;

// ── Canvas ──
const wrap=document.getElementById('canvasWrap');
const gridC=document.getElementById('gridCanvas');
const drawC=document.getElementById('drawCanvas');
const overlayC=document.getElementById('overlayCanvas');
const gCtx=gridC.getContext('2d');
const dCtx=drawC.getContext('2d');
const oCtx=overlayC.getContext('2d');

function resize(){
  const W=wrap.clientWidth,H=wrap.clientHeight;
  [gridC,drawC,overlayC].forEach(c=>{c.width=W;c.height=H;});
  drawGrid();restoreCurrent();
}
function drawGrid(){
  const W=gridC.width,H=gridC.height;
  gCtx.clearRect(0,0,W,H);
  gCtx.strokeStyle='rgba(30,45,64,0.09)';gCtx.lineWidth=0.5;
  for(let x=0;x<=W;x+=GRID){gCtx.beginPath();gCtx.moveTo(x,0);gCtx.lineTo(x,H);gCtx.stroke();}
  for(let y=0;y<=H;y+=GRID){gCtx.beginPath();gCtx.moveTo(0,y);gCtx.lineTo(W,y);gCtx.stroke();}
  gCtx.strokeStyle='rgba(30,45,64,0.18)';gCtx.lineWidth=0.8;
  for(let x=0;x<=W;x+=GRID*5){gCtx.beginPath();gCtx.moveTo(x,0);gCtx.lineTo(x,H);gCtx.stroke();}
  for(let y=0;y<=H;y+=GRID*5){gCtx.beginPath();gCtx.moveTo(0,y);gCtx.lineTo(W,y);gCtx.stroke();}
}
function snap(v){return Math.round(v/GRID)*GRID;}
function getPos(e){
  const r=overlayC.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e.changedTouches?e.changedTouches[0]:e;
  return{x:t.clientX-r.left,y:t.clientY-r.top};
}

// ── タブUI ──
function buildTypeBar(){
  const bar=document.getElementById('typeBar');
  bar.innerHTML='';
  tabs.forEach((tab,i)=>{
    const btn=document.createElement('button');
    btn.className='type-btn'+(i===currentTab?' active':'');
    btn.textContent=tab.label;
    btn.onclick=()=>switchTab(i);
    bar.appendChild(btn);
  });
  const addBtn=document.createElement('button');
  addBtn.className='type-add-btn';addBtn.textContent='+';
  addBtn.onclick=()=>openTabModal();
  bar.appendChild(addBtn);
}
function switchTab(i){saveCurrent();currentTab=i;buildTypeBar();restoreCurrent();}
function openTabModal(){
  document.getElementById('tabInput').value='';
  document.getElementById('tabModal').classList.add('show');
  setTimeout(()=>document.getElementById('tabInput').focus(),100);
}
function closeTabModal(){document.getElementById('tabModal').classList.remove('show');}
function confirmAddTab(){
  const val=document.getElementById('tabInput').value.trim();
  if(!val){closeTabModal();return;}
  saveCurrent();
  tabs.push({label:val,history:[]});
  currentTab=tabs.length-1;
  closeTabModal();buildTypeBar();
  dCtx.clearRect(0,0,drawC.width,drawC.height);
}
document.getElementById('tabInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddTab();});

// ── キャンバス保存・復元 ──
function saveCurrent(){
  tabs[currentTab].history.push(drawC.toDataURL());
  if(tabs[currentTab].history.length>25)tabs[currentTab].history.shift();
}
function restoreCurrent(){
  dCtx.clearRect(0,0,drawC.width,drawC.height);
  const h=tabs[currentTab].history;
  if(h.length>0){const img=new Image();img.src=h[h.length-1];img.onload=()=>dCtx.drawImage(img,0,0);}
}
function saveStep(){
  tabs[currentTab].history.push(drawC.toDataURL());
  if(tabs[currentTab].history.length>25)tabs[currentTab].history.shift();
}
function undoStep(){
  const h=tabs[currentTab].history;
  if(h.length===0){dCtx.clearRect(0,0,drawC.width,drawC.height);return;}
  h.pop();dCtx.clearRect(0,0,drawC.width,drawC.height);
  if(h.length>0){const img=new Image();img.src=h[h.length-1];img.onload=()=>dCtx.drawImage(img,0,0);}
}
function clearCurrent(){
  if(!confirm('このページを全て消しますか？'))return;
  dCtx.clearRect(0,0,drawC.width,drawC.height);tabs[currentTab].history=[];
}

// ── ツール ──
function setTool(t){
  tool=t;clearKigoMode();
  ['Pen','Line','Dim','Rect','Door','Sash','Circle','Text','Erase'].forEach(n=>{
    const el=document.getElementById('tool'+n);
    if(el)el.classList.toggle('active',t===n.toLowerCase());
  });
}
function setStroke(w,el){
  strokeWidth=w;
  document.querySelectorAll('.stroke-dot').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');
}
function setColor(c,el){
  strokeColor=c;
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');
}
function setGrid(key,el){
  gridKey=key;GRID=GRID_SIZE[key];
  document.querySelectorAll('.grid-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');drawGrid();
}
function setupCtx(ctx,color,width){
  ctx.strokeStyle=color||strokeColor;ctx.fillStyle=color||strokeColor;
  ctx.lineWidth=width||strokeWidth;ctx.lineCap='round';ctx.lineJoin='round';
}

// ── 汎用入力モーダル ──
let inputResolve=null;
function openInput(title,placeholder,numeric){
  return new Promise(resolve=>{
    inputResolve=resolve;
    document.getElementById('inputTitle').textContent=title;
    const f=document.getElementById('inputField');
    f.placeholder=placeholder||'';f.inputMode=numeric?'numeric':'text';f.value='';
    document.getElementById('inputModal').classList.add('show');
    setTimeout(()=>f.focus(),100);
  });
}
function closeInput(val){
  document.getElementById('inputModal').classList.remove('show');
  if(inputResolve){inputResolve(val);inputResolve=null;}
}
document.getElementById('inputOk').onclick=()=>closeInput(document.getElementById('inputField').value.trim());
document.getElementById('inputCancel').onclick=()=>closeInput(null);
document.getElementById('inputField').addEventListener('keydown',e=>{if(e.key==='Enter')closeInput(document.getElementById('inputField').value.trim());});

// ── 幅×奥行きモーダル ──
function openDimX(){
  return new Promise(resolve=>{
    dimXResolve=resolve;
    document.getElementById('dimW').value='';document.getElementById('dimD').value='';
    document.getElementById('dimXModal').classList.add('show');
    setTimeout(()=>document.getElementById('dimW').focus(),100);
  });
}
function closeDimX(){document.getElementById('dimXModal').classList.remove('show');if(dimXResolve){dimXResolve(null);dimXResolve=null;}}
function confirmDimX(){
  const w=document.getElementById('dimW').value.trim();
  const d=document.getElementById('dimD').value.trim();
  document.getElementById('dimXModal').classList.remove('show');
  if(dimXResolve){
    const txt=(w&&d)?`${w}×${d}`:(w||d||'');
    dimXResolve(txt||null);dimXResolve=null;
  }
}
document.getElementById('dimD').addEventListener('keydown',e=>{if(e.key==='Enter')confirmDimX();});
document.getElementById('dimW').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('dimD').focus();});

// ── ポインターイベント ──
overlayC.addEventListener('pointerdown',onDown);
overlayC.addEventListener('pointermove',onMove);
overlayC.addEventListener('pointerup',onUp);
overlayC.addEventListener('pointercancel',onUp);

function onDown(e){
  e.preventDefault();
  const p=getPos(e);
  const sx=snap(p.x),sy=snap(p.y);

  // 寸法パレット配置待ちモード
  if(pendingKigoText!==null){
    placeText(pendingKigoText,sx,sy,14);
    saveStep();
    pendingKigoText=null;
    clearKigoMode();
    return;
  }
  // 通常記号配置待ちモード
  if(selectedKigo!==null){
    placeText(selectedKigo,sx,sy,14);
    saveStep();clearKigoMode();
    return;
  }

  if(tool==='text'){
    openInput('テキストを入力','例：リビング',false).then(val=>{
      if(val){placeText(val,sx,sy,14);saveStep();}
    });
    return;
  }

  isDrawing=true;startX=sx;startY=sy;
  if(tool==='pen'){
    penPoints=[{x:p.x,y:p.y}];
    setupCtx(dCtx);dCtx.beginPath();dCtx.moveTo(p.x,p.y);
  }
  if(tool==='erase'){
    dCtx.globalCompositeOperation='destination-out';
    dCtx.lineWidth=28;dCtx.lineCap='round';
    dCtx.beginPath();dCtx.moveTo(p.x,p.y);
  }
}

function onMove(e){
  e.preventDefault();
  if(!isDrawing)return;
  const p=getPos(e);
  const sx=snap(p.x),sy=snap(p.y);
  if(tool==='pen'){
    penPoints.push({x:p.x,y:p.y});
    if(penPoints.length>=3){
      const len=penPoints.length;
      const p1=penPoints[len-2],p2=penPoints[len-1];
      const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;
      setupCtx(dCtx);dCtx.quadraticCurveTo(p1.x,p1.y,mx,my);dCtx.stroke();
      dCtx.beginPath();dCtx.moveTo(mx,my);
    }else{dCtx.lineTo(p.x,p.y);dCtx.stroke();}
  }
  if(tool==='erase'){dCtx.lineTo(p.x,p.y);dCtx.stroke();}
  if(['line','rect','dim','door','sash','circle'].includes(tool)){
    oCtx.clearRect(0,0,overlayC.width,overlayC.height);
    const dx=sx-startX,dy=sy-startY;
    if(tool==='line'){setupCtx(oCtx);oCtx.beginPath();oCtx.moveTo(startX,startY);oCtx.lineTo(sx,sy);oCtx.stroke();}
    else if(tool==='rect'){setupCtx(oCtx);oCtx.strokeRect(startX,startY,dx,dy);}
    else if(tool==='dim'){drawDimLine(oCtx,startX,startY,sx,sy,'');}
    else if(tool==='door'){const isH=Math.abs(dx)>=Math.abs(dy);drawDoor(oCtx,startX,startY,sx,sy,dx,dy,isH);}
    else if(tool==='sash'){const isH=Math.abs(dx)>=Math.abs(dy);drawSash(oCtx,startX,startY,sx,sy,dx,dy,isH);}
    else if(tool==='circle'){drawCircle(oCtx,startX,startY,dx,dy);}
  }
}

function onUp(e){
  if(!isDrawing)return;
  isDrawing=false;
  const p=getPos(e);
  const sx=snap(p.x),sy=snap(p.y);
  const dx=sx-startX,dy=sy-startY;

  if(tool==='pen'){
    if(penPoints.length>0){const last=penPoints[penPoints.length-1];setupCtx(dCtx);dCtx.lineTo(last.x,last.y);dCtx.stroke();}
    saveStep();
  }
  if(tool==='erase'){dCtx.globalCompositeOperation='source-over';saveStep();}
  if(tool==='line'){
    oCtx.clearRect(0,0,overlayC.width,overlayC.height);
    setupCtx(dCtx);dCtx.beginPath();dCtx.moveTo(startX,startY);dCtx.lineTo(sx,sy);dCtx.stroke();
    saveStep();
  }
  if(tool==='rect'){
    oCtx.clearRect(0,0,overlayC.width,overlayC.height);
    setupCtx(dCtx);dCtx.strokeRect(startX,startY,dx,dy);saveStep();
    const mx=startX+dx/2,my=startY+dy/2;
    openInput('部屋名・エリア名（省略可）','例：リビング',false).then(val=>{
      if(val){placeText(val,mx,my,13);saveStep();}
    });
  }
  if(tool==='dim'){
    oCtx.clearRect(0,0,overlayC.width,overlayC.height);
    if(Math.abs(dx)>8||Math.abs(dy)>8){
      const x1=startX,y1=startY,x2=sx,y2=sy;
      openInput('寸法を入力（mm）','例：2500',true).then(val=>{
        drawDimLine(dCtx,x1,y1,x2,y2,val||'');saveStep();
      });
    }
  }
  if(tool==='door'){
    oCtx.clearRect(0,0,overlayC.width,overlayC.height);
    const isH=Math.abs(dx)>=Math.abs(dy);
    drawDoor(dCtx,startX,startY,sx,sy,dx,dy,isH);saveStep();
  }
  if(tool==='sash'){
    oCtx.clearRect(0,0,overlayC.width,overlayC.height);
    const isH=Math.abs(dx)>=Math.abs(dy);
    drawSash(dCtx,startX,startY,sx,sy,dx,dy,isH);saveStep();
  }
  if(tool==='circle'){
    oCtx.clearRect(0,0,overlayC.width,overlayC.height);
    drawCircle(dCtx,startX,startY,dx,dy);saveStep();
  }
}

// ── 図形描画 ──
function drawDimLine(ctx,x1,y1,x2,y2,label){
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<4)return;
  const ux=dx/len,uy=dy/len,al=10;
  ctx.save();setupCtx(ctx);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x1,y1);ctx.lineTo(x1+ux*al+uy*4,y1+uy*al-ux*4);
  ctx.moveTo(x1,y1);ctx.lineTo(x1+ux*al-uy*4,y1+uy*al+ux*4);ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2,y2);ctx.lineTo(x2-ux*al+uy*4,y2-uy*al-ux*4);
  ctx.moveTo(x2,y2);ctx.lineTo(x2-ux*al-uy*4,y2-uy*al+ux*4);ctx.stroke();
  if(label){
    const mx=(x1+x2)/2,my=(y1+y2)/2;
    ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    const tw=ctx.measureText(label).width;
    ctx.fillStyle='#ffffff';ctx.fillRect(mx-tw/2-3,my-8,tw+6,16);
    ctx.fillStyle=strokeColor;ctx.fillText(label,mx,my);
  }
  ctx.restore();
}

function drawDoor(ctx,x1,y1,x2,y2,dx,dy,isH){
  ctx.save();
  ctx.strokeStyle='#4a9eff';ctx.lineWidth=2;ctx.lineCap='round';
  if(isH){
    const r=Math.abs(dx),sign=dy>=0?1:-1;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y1);ctx.stroke();
    ctx.beginPath();
    if(dx>=0){ctx.arc(x1,y1,r,0,sign*Math.PI/2,sign<0);}
    else{ctx.arc(x1,y1,r,Math.PI,Math.PI-sign*Math.PI/2,sign>0);}
    ctx.stroke();
  }else{
    const r=Math.abs(dy),sign=dx>=0?1:-1;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x1,y2);ctx.stroke();
    ctx.beginPath();
    if(dy>=0){ctx.arc(x1,y1,r,Math.PI/2,Math.PI/2-sign*Math.PI/2,sign>0);}
    else{ctx.arc(x1,y1,r,-Math.PI/2,-Math.PI/2-sign*Math.PI/2,sign>0);}
    ctx.stroke();
  }
  ctx.restore();
}

function drawSash(ctx,x1,y1,x2,y2,dx,dy,isH){
  ctx.save();
  ctx.strokeStyle='#3dd68c';ctx.lineWidth=2;
  ctx.strokeRect(x1,y1,dx,dy);
  ctx.lineWidth=1.5;
  if(isH){
    const mx=x1+dx/2;
    ctx.beginPath();ctx.moveTo(mx,y1);ctx.lineTo(mx,y2);ctx.stroke();
    ctx.strokeStyle='rgba(61,214,140,0.45)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x1+dx*0.25,y1+3);ctx.lineTo(x1+dx*0.25,y2-3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x1+dx*0.75,y1+3);ctx.lineTo(x1+dx*0.75,y2-3);ctx.stroke();
  }else{
    const my=y1+dy/2;
    ctx.beginPath();ctx.moveTo(x1,my);ctx.lineTo(x2,my);ctx.stroke();
    ctx.strokeStyle='rgba(61,214,140,0.45)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x1+3,y1+dy*0.25);ctx.lineTo(x2-3,y1+dy*0.25);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x1+3,y1+dy*0.75);ctx.lineTo(x2-3,y1+dy*0.75);ctx.stroke();
  }
  ctx.restore();
}

function drawCircle(ctx,x1,y1,dx,dy){
  ctx.save();setupCtx(ctx);
  const rx=Math.abs(dx)/2,ry=Math.abs(dy)/2;
  const cx=x1+dx/2,cy=y1+dy/2;
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

// ── テキスト配置 ──
function placeText(txt,x,y,size){
  dCtx.save();dCtx.fillStyle=strokeColor;
  dCtx.font=`bold ${size||14}px monospace`;
  dCtx.textAlign='center';dCtx.textBaseline='middle';
  dCtx.fillText(txt,x,y);dCtx.restore();
}

// ── 記号パレット ──
function buildPaletteTabs(){
  const tabsEl=document.getElementById('paletteTabs');
  tabsEl.innerHTML='';
  Object.keys(paletteData).forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='ptab'+(cat===currentPaletteCat?' active':'');
    btn.textContent=cat;
    btn.onclick=()=>{currentPaletteCat=cat;buildPaletteTabs();buildPaletteRow();};
    tabsEl.appendChild(btn);
  });
}
function buildPaletteRow(){
  const row=document.getElementById('paletteRow');
  row.innerHTML='';
  const isDimCat=DIM_CATS.includes(currentPaletteCat);
  (paletteData[currentPaletteCat]||[]).forEach(item=>{
    const btn=document.createElement('button');
    btn.className='kigo-btn';
    btn.innerHTML=`<span class="kigo-label">${item.label}</span><span class="kigo-desc">${item.desc}</span>`;
    btn.onclick=()=>{
      if(isDimCat){
        if(item.label==='×'){
          // 幅×奥行きの2フィールド入力
          openDimX().then(txt=>{
            if(txt!==null){
              enterPendingKigo(txt,btn);
            }
          });
        }else{
          // 単一数値入力 → 配置場所タップ待ち
          openInput(`${item.desc}を入力（mm）`,'例：2500',true).then(val=>{
            if(val!==null){
              const txt=item.label+(val||'');
              enterPendingKigo(txt,btn);
            }
          });
        }
      }else{
        enterKigoMode(item.label,btn);
      }
    };
    row.appendChild(btn);
  });
  const addBtn=document.createElement('button');
  addBtn.className='kigo-add-btn';addBtn.textContent='+';
  addBtn.onclick=()=>openKigoAddModal();
  row.appendChild(addBtn);
}

// 寸法パレット：テキスト確定後に配置場所待ち
function enterPendingKigo(txt,btn){
  pendingKigoText=txt;
  document.querySelectorAll('.kigo-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  const bar=document.getElementById('kigoModeBar');
  bar.textContent=`「${txt}」　置く場所をタップ`;
  bar.classList.add('show');
  overlayC.style.cursor='crosshair';
}

function enterKigoMode(label,btn){
  if(selectedKigo===label){clearKigoMode();return;}
  selectedKigo=label;
  document.querySelectorAll('.kigo-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  const bar=document.getElementById('kigoModeBar');
  bar.textContent=`${label}　置く場所をタップ`;
  bar.classList.add('show');
  overlayC.style.cursor='crosshair';
}
function clearKigoMode(){
  selectedKigo=null;pendingKigoText=null;
  document.querySelectorAll('.kigo-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('kigoModeBar').classList.remove('show');
  overlayC.style.cursor='';
}

// ── 記号追加 ──
let addingKigoCat=null;
function openKigoAddModal(){
  addingKigoCat=currentPaletteCat;
  document.getElementById('kigoSymbolInput').value='';
  document.getElementById('kigoDescInput').value='';
  document.getElementById('kigoAddModal').classList.add('show');
  setTimeout(()=>document.getElementById('kigoSymbolInput').focus(),100);
}
function closeKigoAddModal(){document.getElementById('kigoAddModal').classList.remove('show');}
function confirmAddKigo(){
  const sym=document.getElementById('kigoSymbolInput').value.trim();
  const desc=document.getElementById('kigoDescInput').value.trim();
  if(!sym){closeKigoAddModal();return;}
  if(!paletteData[addingKigoCat])paletteData[addingKigoCat]=[];
  paletteData[addingKigoCat].push({label:sym,desc:desc||sym});
  savePaletteLS();closeKigoAddModal();buildPaletteRow();
}
document.getElementById('kigoSymbolInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('kigoDescInput').focus();});
document.getElementById('kigoDescInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddKigo();});

// ── 保存 ──
function saveSketch(){
  const tmp=document.createElement('canvas');
  tmp.width=drawC.width;tmp.height=drawC.height;
  const tc=tmp.getContext('2d');
  tc.fillStyle='#ffffff';tc.fillRect(0,0,tmp.width,tmp.height);
  tc.drawImage(gridC,0,0);tc.drawImage(drawC,0,0);
  const now=new Date();
  const label=`${tabs[currentTab].label}　${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  tc.fillStyle='rgba(30,45,64,0.4)';tc.font='bold 12px sans-serif';
  tc.fillText(label,8,tmp.height-8);
  const link=document.createElement('a');
  link.download=`sketch_${tabs[currentTab].label}_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.png`;
  link.href=tmp.toDataURL('image/png');link.click();
  // 保存後にキャンバスをクリア
  dCtx.clearRect(0,0,drawC.width,drawC.height);
  tabs[currentTab].history=[];
}
function goBack(){saveCurrent();history.back();}

// ── Init ──
buildTypeBar();buildPaletteTabs();buildPaletteRow();
window.addEventListener('resize',resize);
resize();
