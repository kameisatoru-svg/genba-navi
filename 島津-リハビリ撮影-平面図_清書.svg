<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="'Noto Sans CJK JP','Noto Sans JP','IPAGothic','Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif">
  <defs>
    <marker id="dim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M2,2 L8,5 L2,8" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
  </defs>

  <!-- ===== タイトル ===== -->
  <text x="30" y="40" font-size="22" font-weight="bold" fill="#1a2a3a">大分リハビリテーション病院 一般撮影室 平面図（清書）</text>
  <text x="30" y="62" font-size="13" fill="#555">島津レイアウト図＋現地調査スケッチ(2026/5/21)の清書／形状は概略・寸法は記載値(mm)／天井高 CH=2790</text>

  <!-- ===== 床(長尺シート PT-105M = ライトブルー) ===== -->
  <rect x="300" y="150" width="280" height="394" fill="#cfe3f0"/>

  <!-- 操作室への開口(下・延長) -->
  <polygon points="370,544 470,544 470,590 370,590" fill="#cfe3f0"/>

  <!-- ===== 部屋 外形(壁芯) ===== -->
  <path d="M300,150 L580,150 L580,544 L470,544 L470,590 L370,590 L370,544 L300,544 Z"
        fill="none" stroke="#2c3e50" stroke-width="4"/>

  <!-- 入口ドア(廊下側・上左)＋開き勝手 -->
  <rect x="318" y="147" width="72" height="6" fill="#fff" stroke="#e8932e" stroke-width="1.5"/>
  <path d="M318,150 A72,72 0 0,1 318,222" fill="none" stroke="#e8932e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="324" y="170" font-size="10" fill="#e8932e" font-weight="bold">入口</text>

  <!-- 操作室開口ラベル -->
  <text x="420" y="572" font-size="11" fill="#3a3f47" text-anchor="middle">操作室へ</text>

  <!-- ===== 壁クロス品番(各面・サンゲツFE) ===== -->
  <!-- 上:廊下側 FE-76251 -->
  <rect x="410" y="158" width="14" height="14" fill="#fff" stroke="#a8600a"/>
  <text x="430" y="170" font-size="12" fill="#a8600a" font-weight="bold">壁 廊下側：FE-76251</text>
  <!-- 左:空室側 FE-76109 -->
  <g transform="rotate(-90 322 350)">
    <rect x="276" y="343" width="14" height="14" fill="#fff" stroke="#a8600a"/>
    <text x="296" y="355" font-size="12" fill="#a8600a" font-weight="bold">壁 左面：FE-76109</text>
  </g>
  <!-- 右:受付側 FE-76728 -->
  <g transform="rotate(-90 560 350)">
    <rect x="514" y="343" width="14" height="14" fill="#fff" stroke="#a8600a"/>
    <text x="534" y="355" font-size="12" fill="#a8600a" font-weight="bold">壁 受付側：FE-76728</text>
  </g>
  <!-- 下:操作室側 FE-76751 -->
  <rect x="300" y="524" width="14" height="14" fill="#fff" stroke="#a8600a"/>
  <text x="320" y="536" font-size="12" fill="#a8600a" font-weight="bold">壁 操作室側：FE-76751</text>

  <!-- 室内ラベル -->
  <text x="440" y="345" font-size="15" fill="#2c3e50" text-anchor="middle" font-weight="bold">一般撮影室</text>
  <text x="440" y="366" font-size="12" fill="#2a6da3" text-anchor="middle" font-weight="bold">床：長尺シート PT-105M</text>
  <text x="440" y="384" font-size="12" fill="#2a6da3" text-anchor="middle">天井：FE-76202（ルーバー有）</text>
  <text x="440" y="402" font-size="11" fill="#3a3f47" text-anchor="middle">巾木 H80</text>

  <!-- ===== 寸法線(赤) ===== -->
  <!-- 上:3600 -->
  <line x1="300" y1="125" x2="580" y2="125" stroke="#c0392b" stroke-width="1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="440" y="119" font-size="13" fill="#c0392b" text-anchor="middle" font-weight="bold">3600</text>
  <!-- 左:5050 -->
  <line x1="275" y1="150" x2="275" y2="544" stroke="#c0392b" stroke-width="1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="268" y="347" font-size="13" fill="#c0392b" text-anchor="middle" font-weight="bold" transform="rotate(-90 268 347)">5050</text>
  <!-- 下:操作室開口 1000 -->
  <line x1="370" y1="612" x2="470" y2="612" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="420" y="606" font-size="11" fill="#c0392b" text-anchor="middle" font-weight="bold">開口</text>

  <!-- 方位(展開方向) -->
  <g transform="translate(640,560)">
    <circle cx="0" cy="0" r="26" fill="none" stroke="#888" stroke-width="1"/>
    <text x="0" y="-14" font-size="11" fill="#555" text-anchor="middle">A</text>
    <text x="20" y="4" font-size="11" fill="#555" text-anchor="middle">B</text>
    <text x="0" y="22" font-size="11" fill="#555" text-anchor="middle">C</text>
    <text x="-20" y="4" font-size="11" fill="#555" text-anchor="middle">D</text>
    <text x="0" y="42" font-size="10" fill="#888" text-anchor="middle">展開方向</text>
  </g>

  <!-- ===== 凡例 ===== -->
  <g transform="translate(700,120)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#1a2a3a">凡 例</text>
    <rect x="0" y="12" width="22" height="14" fill="#cfe3f0" stroke="#2a6da3"/>
    <text x="30" y="24" font-size="12" fill="#333">床 長尺シート張替（PT-105M）</text>
    <rect x="0" y="34" width="22" height="14" fill="#fff" stroke="#a8600a"/>
    <text x="30" y="46" font-size="12" fill="#333">壁クロス張替（サンゲツFE）</text>
    <line x1="0" y1="62" x2="22" y2="62" stroke="#2c3e50" stroke-width="4"/>
    <text x="30" y="66" font-size="12" fill="#333">壁芯（アウトライン）</text>
    <rect x="0" y="76" width="22" height="6" fill="#fff" stroke="#e8932e" stroke-width="1.5"/>
    <text x="30" y="84" font-size="12" fill="#333">建具（入口ドア）</text>
  </g>

  <!-- ===== 仕上げ・数量メモ ===== -->
  <g transform="translate(700,230)">
    <rect x="-8" y="-18" width="290" height="200" fill="#f2f8fc" stroke="#2a6da3" stroke-width="1.2" rx="6"/>
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#2a6da3">仕上げ・数量メモ</text>
    <text x="0" y="24" font-size="12" fill="#333">○ 床：長尺シート PT-105M／巾木 H80</text>
    <text x="0" y="44" font-size="12" fill="#333">○ 天井：サンゲツ FE-76202（ルーバー有）</text>
    <text x="0" y="64" font-size="12" fill="#333">○ 壁クロス（サンゲツ）：</text>
    <text x="14" y="82" font-size="11" fill="#333">廊下側 FE-76251／左面 FE-76109</text>
    <text x="14" y="98" font-size="11" fill="#333">受付側 FE-76728／操作室側 FE-76751</text>
    <text x="0" y="120" font-size="12" fill="#333">○ 天井高 CH = 2790</text>
    <text x="0" y="140" font-size="12" fill="#333">○ 数量（見_改２）：床18㎡／壁49㎡</text>
    <text x="0" y="162" font-size="11" fill="#888">（形状概略・数量は概算／発注前に品番確認）</text>
  </g>

  <!-- ===== 工程メモ ===== -->
  <text x="30" y="600" font-size="11" fill="#888">施工：7/18(土)・19(日) 土日施工（剥取・貼替・清掃／騒音発生）。設置工程表7/17-21・使用開始7/21。</text>
</svg>
