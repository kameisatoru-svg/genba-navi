<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 792" font-family="'Noto Sans CJK JP','Noto Sans JP','IPAGothic','Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif">
  <defs>
    <marker id="dimS" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto">
      <path d="M8,2 L2,5 L8,8" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
    <marker id="dimE" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M2,2 L8,5 L2,8" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#2a6da3" stroke-width="1.4"/>
    </marker>
    <pattern id="pit" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#dfe7ec"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#9bb3c2" stroke-width="1.4"/>
    </pattern>
    <pattern id="pitg" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#e2efe0"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#6fae6a" stroke-width="1.6"/>
    </pattern>
  </defs>

  <!-- ===== タイトル ===== -->
  <text x="30" y="38" font-size="21" font-weight="bold" fill="#1a2a3a">大分リハビリテーション病院 一般撮影室 平面図（清書）</text>
  <text x="30" y="58" font-size="12" fill="#555">現地手書き（操作室=上・壁＝太線）を基準に作図／壁の途切れ＝建具・窓／柱＝壁柱／開き勝手・建具は図面アプリ準拠／寸法mm・CH=2790</text>

  <!-- ===== 操作室(隣接・上) ===== -->
  <rect x="511" y="92" width="81" height="50" fill="#eef1f4" stroke="#9aa3ad" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="551" y="122" font-size="12" fill="#5b6670" text-anchor="middle">操作室</text>

  <!-- ===== 床(長尺シート PT-105M) ===== -->
  <rect x="300" y="150" width="300" height="420" fill="#cfe3f0"/>

  <!-- ===== 壁(太線=マジック)。開口部は途切れ ===== -->
  <g stroke="#2c3e50" stroke-width="4" fill="none" stroke-linecap="square">
    <!-- A面(上): 窓・操作室ドアの位置で途切れ -->
    <line x1="300" y1="150" x2="390" y2="150"/>
    <line x1="461" y1="150" x2="511" y2="150"/>
    <line x1="592" y1="150" x2="600" y2="150"/>
    <!-- B面(右): ドアW900で途切れ -->
    <line x1="600" y1="150" x2="600" y2="314"/>
    <line x1="600" y1="389" x2="600" y2="570"/>
    <!-- C面(下): 親子ドアで途切れ -->
    <line x1="300" y1="570" x2="486" y2="570"/>
    <line x1="592" y1="570" x2="600" y2="570"/>
    <!-- D面(左): 開口なし -->
    <line x1="300" y1="150" x2="300" y2="570"/>
  </g>

  <!-- ===== 壁柱(柱670) B面・室内へ突出 ===== -->
  <g>
    <rect x="565" y="257" width="35" height="55" fill="rgba(44,62,80,0.5)" stroke="#2c3e50" stroke-width="1.5"/>
    <line x1="565" y1="257" x2="600" y2="312" stroke="#fff" stroke-width="0.8"/>
    <line x1="600" y1="257" x2="565" y2="312" stroke="#fff" stroke-width="0.8"/>
    <text x="560" y="289" font-size="10" fill="#2c3e50" text-anchor="end" font-weight="bold">壁柱 670</text>
  </g>

  <!-- ===== 窓(A面 中連窓 W850/H850・腰下860) ===== -->
  <g>
    <rect x="390" y="146" width="71" height="8" fill="#fff" stroke="#2a6da3" stroke-width="1.2"/>
    <line x1="390" y1="150" x2="461" y2="150" stroke="#2a6da3" stroke-width="0.8"/>
    <text x="425" y="201" font-size="9.5" fill="#2a6da3" text-anchor="middle" font-weight="bold">中連窓 W850</text>
    <text x="425" y="212" font-size="9" fill="#2a6da3" text-anchor="middle">H850/腰下860</text>
  </g>

  <!-- ===== 操作室ドア(A面 W970/H2025・内開き・吊元右) 実線=扉/点線=先端軌道 ===== -->
  <g stroke="#e8932e" fill="none">
    <line x1="592" y1="150" x2="592" y2="231" stroke-width="2.4"/>
    <path d="M592,231 A81,81 0 0,1 511,150" stroke-width="1" stroke-dasharray="3 3"/>
  </g>
  <text x="551" y="205" font-size="9.5" fill="#e8932e" text-anchor="middle" font-weight="bold">操作室ドア</text>
  <text x="551" y="216" font-size="9" fill="#e8932e" text-anchor="middle">W970/H2025</text>

  <!-- ===== ドア(B面 W900/H2025・内開き・吊元上) 実線=扉/点線=先端軌道 ===== -->
  <g stroke="#e8932e" fill="none">
    <line x1="600" y1="314" x2="525" y2="314" stroke-width="2.4"/>
    <path d="M525,314 A75,75 0 0,0 600,389" stroke-width="1" stroke-dasharray="3 3"/>
  </g>
  <text x="556" y="333" font-size="9.5" fill="#e8932e" text-anchor="middle" font-weight="bold">ドア W900/H2025</text>

  <!-- ===== 親子ドア(C面 W1280・内開き・親=右/子=左) 実線=扉/点線=先端軌道 ===== -->
  <g stroke="#e8932e" fill="none">
    <!-- 親(右) -->
    <line x1="592" y1="570" x2="592" y2="499" stroke-width="2.4"/>
    <path d="M592,499 A71,71 0 0,0 521,570" stroke-width="1" stroke-dasharray="3 3"/>
    <!-- 子(左) -->
    <line x1="486" y1="570" x2="486" y2="535" stroke-width="2.4"/>
    <path d="M486,535 A35,35 0 0,1 521,570" stroke-width="1" stroke-dasharray="3 3"/>
  </g>
  <text x="568" y="515" font-size="9" fill="#e8932e" text-anchor="middle">親</text>
  <text x="497" y="552" font-size="9" fill="#e8932e" text-anchor="middle">子</text>
  <text x="500" y="588" font-size="10" fill="#e8932e" text-anchor="middle" font-weight="bold">親子ドア W1280（親=右/子=左）</text>

  <!-- ===== 室内設備(概略・現地の色付け図に準拠) ===== -->
  <!-- 床ピット(撮影台ベース・緑) -->
  <rect x="405" y="318" width="82" height="122" fill="url(#pitg)" stroke="#6fae6a" stroke-width="1"/>
  <text x="446" y="382" font-size="11" fill="#3f7a3a" text-anchor="middle">床ピット</text>
  <!-- 照明 40W×2(黄) ×4 -->
  <g fill="#f6e6a8" stroke="#c8a93e" stroke-width="1">
    <rect x="350" y="210" width="16" height="58"/><rect x="500" y="210" width="16" height="58"/>
    <rect x="350" y="425" width="16" height="58"/><rect x="500" y="425" width="16" height="58"/>
  </g>
  <g fill="none" stroke="#c8a93e" stroke-width="0.9">
    <circle cx="358" cy="239" r="4"/><circle cx="508" cy="239" r="4"/>
    <circle cx="358" cy="454" r="4"/><circle cx="508" cy="454" r="4"/>
  </g>
  <!-- AC エアコン(ピンク) -->
  <rect x="412" y="275" width="38" height="20" fill="#f3cfe1" stroke="#c0508a" stroke-width="1.1"/>
  <text x="431" y="289" font-size="10" fill="#a23a76" text-anchor="middle" font-weight="bold">AC</text>
  <!-- 非常灯(紫) -->
  <circle cx="382" cy="378" r="9" fill="#ead3ee" stroke="#9a4a9a" stroke-width="1.1"/>
  <text x="382" y="382" font-size="9" fill="#7a2a7a" text-anchor="middle">非</text>
  <!-- SP スピーカー(緑) -->
  <circle cx="364" cy="500" r="9" fill="#c4e3c0" stroke="#4a9a4a" stroke-width="1.1"/>
  <text x="364" y="504" font-size="8.5" fill="#2f6f2f" text-anchor="middle">SP</text>
  <!-- 換気扇(青) ×2 -->
  <g fill="#bcd8f0" stroke="#3a6ea5" stroke-width="1">
    <rect x="334" y="497" width="15" height="12"/><rect x="470" y="205" width="15" height="12"/>
  </g>
  <g stroke="#3a6ea5" stroke-width="0.7">
    <line x1="334" y1="497" x2="349" y2="509"/><line x1="349" y1="497" x2="334" y2="509"/>
    <line x1="470" y1="205" x2="485" y2="217"/><line x1="485" y1="205" x2="470" y2="217"/>
  </g>

  <!-- ===== 壁仕上げ品番(各面・面記号+アンカー+FE) ===== -->
  <rect x="306" y="158" width="13" height="13" fill="#fff" stroke="#a8600a"/>
  <text x="324" y="169" font-size="11.5" fill="#a8600a" font-weight="bold">A面 操作室側：FE-76751</text>
  <rect x="306" y="548" width="13" height="13" fill="#fff" stroke="#a8600a"/>
  <text x="324" y="559" font-size="11.5" fill="#a8600a" font-weight="bold">C面 廊下側：FE-76251</text>
  <g transform="rotate(-90 288 360)">
    <rect x="242" y="353" width="13" height="13" fill="#fff" stroke="#a8600a"/>
    <text x="260" y="364" font-size="11.5" fill="#a8600a" font-weight="bold">D面 受付側：FE-76728</text>
  </g>
  <g transform="rotate(-90 612 470)">
    <rect x="566" y="463" width="13" height="13" fill="#fff" stroke="#a8600a"/>
    <text x="584" y="474" font-size="11.5" fill="#a8600a" font-weight="bold">B面 空室側：FE-76109</text>
  </g>

  <!-- 室名 -->
  <text x="445" y="245" font-size="15" fill="#2c3e50" text-anchor="middle" font-weight="bold">一般撮影室</text>
  <text x="445" y="262" font-size="11" fill="#2a6da3" text-anchor="middle">床：長尺シート PT-105M</text>

  <!-- ===== 寸法線(赤) ===== -->
  <line x1="300" y1="126" x2="600" y2="126" stroke="#c0392b" stroke-width="1" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="450" y="120" font-size="13" fill="#c0392b" text-anchor="middle" font-weight="bold">3618</text>
  <line x1="660" y1="150" x2="660" y2="570" stroke="#c0392b" stroke-width="1" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="653" y="362" font-size="13" fill="#c0392b" text-anchor="middle" font-weight="bold" transform="rotate(-90 653 362)">5073</text>
  <line x1="636" y1="150" x2="636" y2="257" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="628" y="203" font-size="10" fill="#c0392b" text-anchor="middle" transform="rotate(-90 628 203)">1289</text>
  <line x1="636" y1="257" x2="636" y2="312" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="628" y="285" font-size="10" fill="#c0392b" text-anchor="middle" transform="rotate(-90 628 285)">670</text>
  <line x1="636" y1="312" x2="636" y2="570" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="628" y="441" font-size="10" fill="#c0392b" text-anchor="middle" transform="rotate(-90 628 441)">3125</text>
  <!-- 下:親子ドア W1280 / 左2241（数字は線の上） -->
  <line x1="300" y1="610" x2="486" y2="610" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="393" y="603" font-size="10" fill="#c0392b" text-anchor="middle">2241</text>
  <line x1="486" y1="610" x2="592" y2="610" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="539" y="603" font-size="10" fill="#c0392b" text-anchor="middle">1280</text>

  <!-- 面記号 -->
  <text x="450" y="143" font-size="11" fill="#888" text-anchor="middle">A</text>
  <text x="610" y="240" font-size="11" fill="#888">B</text>
  <text x="450" y="566" font-size="11" fill="#888" text-anchor="middle">C</text>
  <text x="289" y="300" font-size="11" fill="#888">D</text>

  <!-- ===== 流れ方向 ===== -->
  <g transform="translate(140,470)">
    <line x1="0" y1="0" x2="0" y2="56" stroke="#2a6da3" stroke-width="1.4" marker-start="url(#ar)" marker-end="url(#ar)"/>
    <text x="8" y="32" font-size="12" fill="#2a6da3" font-weight="bold">床流れ（縦）</text>
    <line x1="0" y1="82" x2="74" y2="82" stroke="#2a6da3" stroke-width="1.4" marker-start="url(#ar)" marker-end="url(#ar)"/>
    <text x="0" y="101" font-size="12" fill="#2a6da3" font-weight="bold">クロス流れ（横）</text>
  </g>

  <!-- ===== 凡例 ===== -->
  <g transform="translate(700,115)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#1a2a3a">凡 例</text>
    <rect x="0" y="10" width="20" height="13" fill="#cfe3f0" stroke="#2a6da3"/>
    <text x="28" y="21" font-size="11.5" fill="#333">床 長尺シート（PT-105M）</text>
    <rect x="0" y="30" width="20" height="13" fill="#fff" stroke="#a8600a"/>
    <text x="28" y="41" font-size="11.5" fill="#333">壁クロス品番（サンゲツFE）</text>
    <line x1="0" y1="58" x2="20" y2="58" stroke="#2c3e50" stroke-width="4"/>
    <text x="28" y="62" font-size="11.5" fill="#333">壁（手書き太線＝マジック）</text>
    <rect x="0" y="71" width="20" height="13" fill="rgba(44,62,80,0.5)" stroke="#2c3e50"/>
    <text x="28" y="82" font-size="11.5" fill="#333">壁柱</text>
    <path d="M0,98 q20,0 20,13" fill="none" stroke="#e8932e" stroke-width="1.2"/>
    <text x="28" y="103" font-size="11.5" fill="#333">建具（ドア・親子ドア／内開き）</text>
    <rect x="220" y="11" width="20" height="13" fill="#fff" stroke="#2a6da3"/>
    <text x="248" y="21" font-size="11.5" fill="#333">窓</text>
    <rect x="220" y="30" width="20" height="13" fill="#f6e6a8" stroke="#c8a93e"/>
    <text x="248" y="41" font-size="11.5" fill="#333">照明 40W×2</text>
    <rect x="220" y="50" width="20" height="13" fill="#f3cfe1" stroke="#c0508a"/>
    <text x="248" y="61" font-size="11.5" fill="#333">AC（エアコン）</text>
    <rect x="220" y="70" width="20" height="13" fill="url(#pitg)" stroke="#6fae6a"/>
    <text x="248" y="81" font-size="11.5" fill="#333">床ピット</text>
    <circle cx="230" cy="96" r="7" fill="#c4e3c0" stroke="#4a9a4a"/>
    <text x="248" y="100" font-size="11.5" fill="#333">SP（スピーカー）</text>
    <rect x="312" y="30" width="18" height="13" fill="#bcd8f0" stroke="#3a6ea5"/>
    <text x="338" y="41" font-size="11.5" fill="#333">換気扇</text>
    <circle cx="321" cy="56" r="7" fill="#ead3ee" stroke="#9a4a9a"/>
    <text x="338" y="61" font-size="11.5" fill="#333">非（非常灯）</text>
  </g>

  <!-- ===== 仕上げ・数量メモ ===== -->
  <g transform="translate(700,235)">
    <rect x="-8" y="-16" width="430" height="248" fill="#f2f8fc" stroke="#2a6da3" stroke-width="1.2" rx="6"/>
    <text x="0" y="2" font-size="14" font-weight="bold" fill="#2a6da3">仕上げ・数量メモ</text>
    <text x="0" y="26" font-size="12" fill="#333">○ 床：長尺シート <tspan font-weight="bold">PT-105M</tspan>（流れ＝縦）</text>
    <text x="0" y="46" font-size="12" fill="#333">○ 巾木：<tspan font-weight="bold">田島 No.80</tspan>（品番。※高さではない）</text>
    <text x="0" y="66" font-size="12" fill="#333">○ 天井：サンゲツ <tspan font-weight="bold">FE-76202</tspan>（ルーバー〔エアー吹出〕有）</text>
    <text x="0" y="90" font-size="12" fill="#333">○ 壁クロス（サンゲツ・壁＝縦貼り／天井＝横流れ）：</text>
    <text x="16" y="110" font-size="12" fill="#333">A面 操作室側 <tspan font-weight="bold">FE-76751</tspan>　／　C面 廊下側 <tspan font-weight="bold">FE-76251</tspan></text>
    <text x="16" y="130" font-size="12" fill="#333">D面 受付側 <tspan font-weight="bold">FE-76728</tspan>　／　B面 空室側 <tspan font-weight="bold">FE-76109</tspan></text>
    <text x="0" y="154" font-size="12" fill="#333">○ 建具：操作室ドアW970／ドアW900（H2025）／親子ドアW1280(親右子左)</text>
    <text x="16" y="172" font-size="12" fill="#333">中連窓 W850・H850（腰下860）　ドアは内開き（実線=扉/点線=軌道）</text>
    <text x="0" y="194" font-size="12" fill="#333">○ 壁柱 670（B面）／ CH＝2790 ／ W3618×D5073</text>
    <text x="0" y="214" font-size="11.5" fill="#333">○ 数量（見_改２）：床 18㎡ ／ 壁クロス 49㎡</text>
    <text x="0" y="230" font-size="10" fill="#9a5a00">※ 壁品番は島津図(操作室=下)を180°回転し各壁へ対応。形状・数量は概略。</text>
  </g>

  <!-- 工程メモ -->
  <text x="30" y="715" font-size="11" fill="#888">施工：7/18(土)・19(日) 土日施工（剥取・貼替・清掃／騒音発生）。設置工程表7/17-21・使用開始7/21。</text>
</svg>
