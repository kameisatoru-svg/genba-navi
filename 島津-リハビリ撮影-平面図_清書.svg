<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" font-family="'Noto Sans CJK JP','Noto Sans JP','IPAGothic','Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif">
  <defs>
    <marker id="dim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M2,2 L8,5 L2,8" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#2a6da3" stroke-width="1.4"/>
    </marker>
    <pattern id="pit" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#dfe7ec"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#9bb3c2" stroke-width="1.4"/>
    </pattern>
  </defs>

  <!-- ===== タイトル ===== -->
  <text x="30" y="38" font-size="21" font-weight="bold" fill="#1a2a3a">大分リハビリテーション病院 一般撮影室 平面図（清書）</text>
  <text x="30" y="58" font-size="12" fill="#555">現地手書き（操作室=上・壁＝太線）を基準に作図／壁の途切れ＝建具・窓／柱＝壁柱／開き勝手・建具は図面アプリ準拠／寸法mm・CH=2790</text>

  <!-- ===== 操作室(隣接・上) ===== -->
  <rect x="511" y="92" width="81" height="50" fill="#eef1f4" stroke="#9aa3ad" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="551" y="122" font-size="12" fill="#5b6670" text-anchor="middle">操作室</text>

  <!-- ===== 床(長尺シート PT-105M) ===== -->
  <rect x="300" y="150" width="300" height="420" fill="#cfe3f0"/>

  <!-- ===== 壁(太線=マジック)。開口部は途切れ ===== -->
  <g stroke="#2c3e50" stroke-width="4" fill="none" stroke-linecap="square">
    <!-- A面(上): 窓・操作室ドアの位置で途切れ -->
    <line x1="300" y1="150" x2="390" y2="150"/>
    <line x1="461" y1="150" x2="511" y2="150"/>
    <line x1="592" y1="150" x2="600" y2="150"/>
    <!-- B面(右): ドアW900で途切れ -->
    <line x1="600" y1="150" x2="600" y2="314"/>
    <line x1="600" y1="389" x2="600" y2="570"/>
    <!-- C面(下): 親子ドアで途切れ -->
    <line x1="300" y1="570" x2="486" y2="570"/>
    <line x1="592" y1="570" x2="600" y2="570"/>
    <!-- D面(左): 開口なし -->
    <line x1="300" y1="150" x2="300" y2="570"/>
  </g>

  <!-- ===== 壁柱(柱670) B面・室内へ突出 ===== -->
  <g>
    <rect x="565" y="257" width="35" height="55" fill="rgba(44,62,80,0.5)" stroke="#2c3e50" stroke-width="1.5"/>
    <line x1="565" y1="257" x2="600" y2="312" stroke="#fff" stroke-width="0.8"/>
    <line x1="600" y1="257" x2="565" y2="312" stroke="#fff" stroke-width="0.8"/>
    <text x="560" y="289" font-size="10" fill="#2c3e50" text-anchor="end" font-weight="bold">壁柱 670</text>
  </g>

  <!-- ===== 窓(A面 W850/H1850・腰壁860) ===== -->
  <g>
    <rect x="390" y="147" width="71" height="6" fill="#fff" stroke="#2a6da3" stroke-width="1.2"/>
    <line x1="390" y1="150" x2="461" y2="150" stroke="#2a6da3" stroke-width="0.8"/>
    <text x="425" y="201" font-size="9.5" fill="#2a6da3" text-anchor="middle" font-weight="bold">窓 W850</text>
    <text x="425" y="212" font-size="9" fill="#2a6da3" text-anchor="middle">H1850/腰壁860</text>
  </g>

  <!-- ===== 操作室ドア(A面 W970/H2025・内開き・吊元右) ===== -->
  <g stroke="#e8932e" fill="none">
    <rect x="511" y="147" width="81" height="6" fill="#fff" stroke="#e8932e" stroke-width="1.2"/>
    <line x1="592" y1="150" x2="592" y2="231" stroke-width="1.4"/>
    <path d="M592,231 A81,81 0 0,0 511,150" stroke-width="1.2" stroke-dasharray="4 3"/>
  </g>
  <text x="551" y="205" font-size="9.5" fill="#e8932e" text-anchor="middle" font-weight="bold">操作室ドア</text>
  <text x="551" y="216" font-size="9" fill="#e8932e" text-anchor="middle">W970/H2025</text>

  <!-- ===== ドア(B面 W900/H2025・内開き・吊元上) ===== -->
  <g stroke="#e8932e" fill="none">
    <rect x="597" y="314" width="6" height="75" fill="#fff" stroke="#e8932e" stroke-width="1.2"/>
    <line x1="600" y1="314" x2="525" y2="314" stroke-width="1.4"/>
    <path d="M525,314 A75,75 0 0,1 600,389" stroke-width="1.2" stroke-dasharray="4 3"/>
  </g>
  <text x="556" y="333" font-size="9.5" fill="#e8932e" text-anchor="middle" font-weight="bold">ドア W900/H2025</text>

  <!-- ===== 親子ドア(C面 W1280・内開き) ===== -->
  <g stroke="#e8932e" fill="none">
    <rect x="486" y="567" width="106" height="6" fill="#fff" stroke="#e8932e" stroke-width="1.2"/>
    <line x1="486" y1="570" x2="486" y2="500" stroke-width="1.4"/>
    <path d="M486,500 A70,70 0 0,1 556,570" stroke-width="1.2" stroke-dasharray="4 3"/>
    <line x1="592" y1="570" x2="592" y2="534" stroke-width="1.4"/>
    <path d="M592,534 A36,36 0 0,0 556,570" stroke-width="1.2" stroke-dasharray="4 3"/>
  </g>
  <text x="539" y="588" font-size="10" fill="#e8932e" text-anchor="middle" font-weight="bold">親子ドア W1280</text>

  <!-- ===== 室内設備(概略・鉛筆) ===== -->
  <rect x="395" y="300" width="95" height="150" fill="url(#pit)" stroke="#9bb3c2" stroke-width="1"/>
  <text x="442" y="378" font-size="11" fill="#5b7384" text-anchor="middle">床ピット</text>
  <rect x="330" y="205" width="34" height="150" fill="url(#pit)" stroke="#9bb3c2" stroke-width="1"/>
  <rect x="400" y="330" width="32" height="20" fill="#fff" stroke="#3a6ea5" stroke-width="1.1"/>
  <text x="416" y="344" font-size="10" fill="#3a6ea5" text-anchor="middle">AC</text>
  <circle cx="372" cy="430" r="9" fill="#fff" stroke="#c0392b" stroke-width="1.1"/>
  <text x="372" y="434" font-size="9" fill="#c0392b" text-anchor="middle">非</text>
  <circle cx="345" cy="495" r="9" fill="#fff" stroke="#555" stroke-width="1.1"/>
  <text x="345" y="499" font-size="8.5" fill="#555" text-anchor="middle">SP</text>

  <!-- ===== 壁仕上げ品番(各面・面記号+アンカー+FE) ===== -->
  <rect x="306" y="158" width="13" height="13" fill="#fff" stroke="#a8600a"/>
  <text x="324" y="169" font-size="11.5" fill="#a8600a" font-weight="bold">A面 操作室側：FE-76751</text>
  <rect x="306" y="548" width="13" height="13" fill="#fff" stroke="#a8600a"/>
  <text x="324" y="559" font-size="11.5" fill="#a8600a" font-weight="bold">C面 廊下側：FE-76251</text>
  <g transform="rotate(-90 288 360)">
    <rect x="242" y="353" width="13" height="13" fill="#fff" stroke="#a8600a"/>
    <text x="260" y="364" font-size="11.5" fill="#a8600a" font-weight="bold">D面 受付側：FE-76728</text>
  </g>
  <g transform="rotate(-90 612 470)">
    <rect x="566" y="463" width="13" height="13" fill="#fff" stroke="#a8600a"/>
    <text x="584" y="474" font-size="11.5" fill="#a8600a" font-weight="bold">B面 空室側：FE-76109</text>
  </g>

  <!-- 室名 -->
  <text x="445" y="245" font-size="15" fill="#2c3e50" text-anchor="middle" font-weight="bold">一般撮影室</text>
  <text x="445" y="262" font-size="11" fill="#2a6da3" text-anchor="middle">床：長尺シート PT-105M</text>

  <!-- ===== 寸法線(赤) ===== -->
  <line x1="300" y1="126" x2="600" y2="126" stroke="#c0392b" stroke-width="1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="450" y="120" font-size="13" fill="#c0392b" text-anchor="middle" font-weight="bold">3618</text>
  <line x1="660" y1="150" x2="660" y2="570" stroke="#c0392b" stroke-width="1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="653" y="362" font-size="13" fill="#c0392b" text-anchor="middle" font-weight="bold" transform="rotate(-90 653 362)">5073</text>
  <line x1="636" y1="150" x2="636" y2="257" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="642" y="207" font-size="10" fill="#c0392b">1289</text>
  <line x1="636" y1="257" x2="636" y2="312" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="642" y="289" font-size="10" fill="#c0392b">670</text>
  <line x1="636" y1="312" x2="636" y2="570" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="642" y="445" font-size="10" fill="#c0392b">3125</text>
  <!-- 下:親子ドア W1280 / 左2241 -->
  <line x1="300" y1="592" x2="486" y2="592" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="393" y="605" font-size="10" fill="#c0392b" text-anchor="middle">2241</text>
  <line x1="486" y1="592" x2="592" y2="592" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="539" y="605" font-size="10" fill="#c0392b" text-anchor="middle">1280</text>

  <!-- 面記号 -->
  <text x="450" y="143" font-size="11" fill="#888" text-anchor="middle">A</text>
  <text x="610" y="240" font-size="11" fill="#888">B</text>
  <text x="450" y="566" font-size="11" fill="#888" text-anchor="middle">C</text>
  <text x="289" y="300" font-size="11" fill="#888">D</text>

  <!-- ===== 流れ方向 ===== -->
  <g transform="translate(140,470)">
    <line x1="0" y1="0" x2="0" y2="56" stroke="#2a6da3" stroke-width="1.4" marker-start="url(#ar)" marker-end="url(#ar)"/>
    <text x="8" y="32" font-size="12" fill="#2a6da3" font-weight="bold">床流れ（縦）</text>
    <line x1="0" y1="82" x2="74" y2="82" stroke="#2a6da3" stroke-width="1.4" marker-start="url(#ar)" marker-end="url(#ar)"/>
    <text x="0" y="101" font-size="12" fill="#2a6da3" font-weight="bold">クロス流れ（横）</text>
  </g>

  <!-- ===== 凡例 ===== -->
  <g transform="translate(700,115)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#1a2a3a">凡 例</text>
    <rect x="0" y="10" width="20" height="13" fill="#cfe3f0" stroke="#2a6da3"/>
    <text x="28" y="21" font-size="11.5" fill="#333">床 長尺シート（PT-105M）</text>
    <rect x="0" y="30" width="20" height="13" fill="#fff" stroke="#a8600a"/>
    <text x="28" y="41" font-size="11.5" fill="#333">壁クロス品番（サンゲツFE）</text>
    <line x1="0" y1="58" x2="20" y2="58" stroke="#2c3e50" stroke-width="4"/>
    <text x="28" y="62" font-size="11.5" fill="#333">壁（手書き太線＝マジック）</text>
    <rect x="0" y="71" width="20" height="13" fill="rgba(44,62,80,0.5)" stroke="#2c3e50"/>
    <text x="28" y="82" font-size="11.5" fill="#333">壁柱</text>
    <path d="M0,98 q20,0 20,13" fill="none" stroke="#e8932e" stroke-width="1.2"/>
    <text x="28" y="103" font-size="11.5" fill="#333">建具（ドア・親子ドア／内開き）</text>
    <rect x="220" y="11" width="20" height="13" fill="#fff" stroke="#2a6da3"/>
    <text x="248" y="21" font-size="11.5" fill="#333">窓</text>
    <text x="220" y="41" font-size="11.5" fill="#333">AC＝エアコン／SP＝スピーカー</text>
    <text x="220" y="62" font-size="11.5" fill="#333">非＝非常灯／照明40W×2・換気扇</text>
  </g>

  <!-- ===== 仕上げ・数量メモ ===== -->
  <g transform="translate(700,235)">
    <rect x="-8" y="-16" width="430" height="248" fill="#f2f8fc" stroke="#2a6da3" stroke-width="1.2" rx="6"/>
    <text x="0" y="2" font-size="14" font-weight="bold" fill="#2a6da3">仕上げ・数量メモ</text>
    <text x="0" y="26" font-size="12" fill="#333">○ 床：長尺シート <tspan font-weight="bold">PT-105M</tspan>（流れ＝縦）</text>
    <text x="0" y="46" font-size="12" fill="#333">○ 巾木：<tspan font-weight="bold">田島 No.80</tspan>（品番。※高さではない）</text>
    <text x="0" y="66" font-size="12" fill="#333">○ 天井：サンゲツ <tspan font-weight="bold">FE-76202</tspan>（ルーバー〔エアー吹出〕有）</text>
    <text x="0" y="90" font-size="12" fill="#333">○ 壁クロス（サンゲツ・流れ＝横）：</text>
    <text x="16" y="110" font-size="12" fill="#333">A面 操作室側 <tspan font-weight="bold">FE-76751</tspan>　／　C面 廊下側 <tspan font-weight="bold">FE-76251</tspan></text>
    <text x="16" y="130" font-size="12" fill="#333">D面 受付側 <tspan font-weight="bold">FE-76728</tspan>　／　B面 空室側 <tspan font-weight="bold">FE-76109</tspan></text>
    <text x="0" y="154" font-size="12" fill="#333">○ 建具：操作室ドアW970／ドアW900（H2025）／親子ドアW1280</text>
    <text x="16" y="172" font-size="12" fill="#333">窓 W850・H1850（腰壁860）　すべて内開き</text>
    <text x="0" y="194" font-size="12" fill="#333">○ 壁柱 670（B面）／ CH＝2790 ／ W3618×D5073</text>
    <text x="0" y="214" font-size="11.5" fill="#333">○ 数量（見_改２）：床 18㎡ ／ 壁クロス 49㎡</text>
    <text x="0" y="230" font-size="10" fill="#9a5a00">※ 壁品番は島津図(操作室=下)を180°回転し各壁へ対応。形状・数量は概略。</text>
  </g>

  <!-- 工程メモ -->
  <text x="30" y="715" font-size="11" fill="#888">施工：7/18(土)・19(日) 土日施工（剥取・貼替・清掃／騒音発生）。設置工程表7/17-21・使用開始7/21。</text>
</svg>
