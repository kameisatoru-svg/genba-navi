<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>見積書作成 - Fold5</title>
<style>
:root{
  --navy:#1e2d40;--gold:#c8a96e;--beige:#eeebe5;--border:#ddd;
  --bg:#f5f4f0;--white:#fff;--text:#111;--sub:#666;--red:#c0392b;
  --tap:52px; /* タップターゲット最小高さ */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:"Meiryo","Yu Gothic",sans-serif;background:var(--bg);display:flex;flex-direction:column;max-width:904px;margin:0 auto;}

/* ── トップバー ── */
.topbar{
  background:var(--navy);color:#fff;
  height:52px;padding:0 14px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:0.05em;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.mode-sel{
  background:#2a3f58;color:#fff;border:1px solid rgba(255,255,255,0.3);
  border-radius:4px;padding:6px 8px;font-size:12px;
  font-family:inherit;height:36px;
}

/* ── 画面タブバー ── */
.tabbar{
  display:flex;background:var(--white);border-bottom:2px solid var(--border);
  flex-shrink:0;
}
.tab{
  flex:1;height:var(--tap);display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;color:var(--sub);
  border-bottom:3px solid transparent;cursor:pointer;gap:6px;
  transition:color 0.15s,border-color 0.15s;
}
.tab.active{color:var(--navy);border-bottom-color:var(--gold);}
.tab-num{
  width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  background:#e0e0e0;color:#888;
}
.tab.active .tab-num{background:var(--gold);color:var(--navy);}

/* ── コンテンツエリア ── */
.screens{flex:1;overflow:hidden;position:relative;}
.screen{
  position:absolute;inset:0;overflow-y:auto;
  display:none;padding:0 0 80px 0;
}
.screen.active{display:block;}

/* ── セクション ── */
.sec{padding:12px 14px 0;}
.sec-label{
  font-size:11px;font-weight:700;color:var(--navy);letter-spacing:0.08em;
  margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);
}
.fgroup{margin-bottom:10px;}
.fgroup label{display:block;font-size:11px;color:var(--sub);margin-bottom:3px;font-weight:500;}
.fgroup input,.fgroup select,.fgroup textarea{
  width:100%;border:1px solid var(--border);border-radius:4px;
  padding:0 10px;font-size:15px;font-family:inherit;color:var(--text);background:#fff;
  height:var(--tap);
}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{
  outline:none;border-color:var(--navy);box-shadow:0 0 0 2px rgba(30,45,64,0.1);
}
.fgroup textarea{height:auto;min-height:80px;padding:10px;resize:none;}
.fgroup-row{display:flex;gap:8px;}
.fgroup-row .fgroup{flex:1;}
.sep{border:none;border-top:1px solid var(--border);margin:14px 14px 0;}

/* ── data.jsonバナー ── */
.data-banner{
  margin:12px 14px 0;padding:10px 14px;
  background:#e8f0f8;border:1px solid #b0c8e0;border-radius:6px;
  font-size:12px;color:var(--navy);display:flex;align-items:center;gap:10px;
}
.data-banner.ok{background:#e8f5e9;border-color:#a5d6a7;}
.data-banner.err{background:#fce4ec;border-color:#f48fb1;}
.banner-spin{
  width:16px;height:16px;border:2px solid #b0c8e0;border-top-color:var(--navy);
  border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg);}}
.banner-text{flex:1;line-height:1.4;}
.btn-sm{
  height:36px;padding:0 12px;border-radius:4px;font-size:12px;
  cursor:pointer;border:none;font-family:inherit;font-weight:600;
  white-space:nowrap;flex-shrink:0;
}
.btn-navy{background:var(--navy);color:#fff;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-outline{background:#fff;border:1px solid var(--border);color:var(--navy);}

/* ── 明細テーブル ── */
.items-wrap{overflow-x:auto;margin:0 14px;}
.items-table{
  width:100%;min-width:560px;border-collapse:collapse;font-size:12px;table-layout:fixed;
}
.items-table th{
  background:var(--navy);color:#fff;padding:8px 5px;font-weight:500;
  white-space:nowrap;font-size:11px;
}
.items-table td{border-bottom:1px solid #eee;padding:4px 2px;vertical-align:middle;}
.items-table td input{
  width:100%;border:1px solid transparent;border-radius:3px;
  padding:4px 5px;font-size:13px;font-family:inherit;background:transparent;
  min-width:0;color:#111;height:44px;
}
.items-table td input[type=number]{-moz-appearance:textfield;text-align:right;}
.items-table td input[type=number]::-webkit-inner-spin-button,
.items-table td input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
.items-table td input:focus{border-color:var(--navy);background:#fff;outline:none;}
.col-drag{width:22px;}
.col-name{width:30%;}
.col-qty{width:11%;}
.col-unit{width:10%;}
.col-price{width:15%;}
.col-amt{width:15%;}
.col-note{width:14%;}
.col-del{width:8%;}
.drag-handle{
  cursor:grab;color:#bbb;font-size:16px;padding:6px 4px;
  user-select:none;line-height:1;display:block;text-align:center;
}
.drag-handle:active{cursor:grabbing;color:var(--navy);}
.del-btn{
  background:none;border:none;cursor:pointer;color:#ccc;
  font-size:16px;padding:4px 6px;border-radius:3px;width:100%;height:44px;
}
.del-btn:active{color:var(--red);background:#fff0f0;}
tr.dragging{opacity:0.4;}
tr.drag-over td{border-top:2px solid var(--navy)!important;}

/* ── 行追加ボタン ── */
.add-row-btn{
  width:calc(100% - 28px);margin:6px 14px 0;
  height:44px;border:1px dashed var(--border);border-radius:4px;
  background:transparent;font-size:13px;color:var(--sub);cursor:pointer;
  font-family:inherit;
}
.add-row-btn:active{border-color:var(--navy);color:var(--navy);background:#f0f2f4;}

/* ── 大項目ブロック ── */
.group-block{
  margin:0 14px 8px;border:1px solid var(--border);border-radius:6px;overflow:hidden;
}
.group-header{
  display:flex;align-items:center;background:#e8ecf0;padding:0 10px;gap:8px;
  min-height:var(--tap);
}
.group-header input{
  flex:1;border:none;background:transparent;font-size:14px;font-weight:700;
  color:var(--navy);font-family:inherit;outline:none;height:var(--tap);
}
.group-header input:focus{background:#fff;border-radius:3px;padding:0 6px;}
.group-del-btn{
  background:none;border:none;cursor:pointer;color:#ccc;font-size:18px;
  padding:4px 6px;height:var(--tap);display:flex;align-items:center;
}
.group-items-wrap{overflow-x:auto;}
.group-items-table{
  width:100%;min-width:460px;border-collapse:collapse;font-size:12px;table-layout:fixed;
}
.group-items-table th{
  background:#f0f2f4;color:var(--navy);padding:6px 5px;font-weight:500;
  font-size:10px;border-bottom:1px solid var(--border);
}
.group-items-table td{border-bottom:1px solid #eee;padding:4px 2px;vertical-align:middle;}
.group-items-table td input{
  width:100%;border:1px solid transparent;border-radius:3px;
  padding:4px 5px;font-size:13px;font-family:inherit;background:transparent;
  min-width:0;color:#111;height:44px;
}
.group-items-table td input[type=number]{-moz-appearance:textfield;text-align:right;}
.group-items-table td input[type=number]::-webkit-inner-spin-button,
.group-items-table td input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
.group-items-table td input:focus{border-color:var(--navy);background:#fff;outline:none;}
.gcol-drag{width:22px;}
.gcol-name{width:32%;}
.gcol-qty{width:12%;}
.gcol-unit{width:10%;}
.gcol-price{width:15%;}
.gcol-amt{width:15%;}
.gcol-note{width:10%;}
.gcol-del{width:6%;}
.group-subtotal{
  text-align:right;padding:6px 10px;font-size:12px;color:var(--sub);
  background:#f8f8f6;border-top:1px solid var(--border);
}
.group-add-item{
  width:100%;padding:8px;border:none;background:#f0f2f4;
  font-size:12px;color:var(--sub);cursor:pointer;font-family:inherit;
  height:40px;text-align:left;padding-left:14px;
}
.group-add-item:active{color:var(--navy);background:#e8ecf0;}
.group-section-label{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 14px;margin:14px 0 8px;
}
.group-section-label span{font-size:11px;font-weight:700;color:var(--navy);}
.add-group-btn{
  height:36px;padding:0 12px;border-radius:4px;font-size:12px;font-weight:600;
  background:var(--white);border:1px solid var(--border);color:var(--navy);cursor:pointer;
}
.add-group-btn:active{background:#e8ecf0;}

/* ── 合計ボックス ── */
.total-box{
  background:var(--beige);border-radius:6px;padding:10px 14px;
  margin:10px 14px 0;font-size:13px;
}
.total-row{display:flex;justify-content:space-between;padding:3px 0;color:var(--sub);}
.total-row.final{
  font-weight:700;font-size:16px;color:var(--navy);
  border-top:1px solid var(--border);padding-top:6px;margin-top:4px;
}

/* ── 諸経費・値引き ── */
.extra-row{display:flex;gap:8px;margin:8px 14px 0;}
.extra-row .fgroup{flex:1;margin:0;}
.extra-row .fgroup input{font-size:14px;}

/* ── 確認画面 ── */
#screen-preview{background:#ccc;}
.preview-header{
  background:var(--navy);color:#fff;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
}
.preview-header span{font-size:13px;font-weight:600;}
.preview-scale-wrap{padding:12px;transform-origin:top center;}
.doc-page{
  width:210mm;background:#fff;padding:13mm 15mm;
  font-family:"Meiryo","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  font-size:14px;line-height:1.65;color:#111;
  box-shadow:0 2px 16px rgba(0,0,0,.2);margin:0 auto;
}

/* ── 保存画面 ── */
.save-section{padding:16px 14px 0;}
.save-card{
  background:#fff;border:1px solid var(--border);border-radius:8px;
  padding:14px 16px;margin-bottom:12px;
}
.save-card-title{
  font-size:12px;font-weight:700;color:var(--navy);
  margin-bottom:8px;letter-spacing:0.06em;
}
.save-summary{font-size:13px;line-height:2;color:var(--text);}
.save-summary b{color:var(--navy);}
.save-summary .amount{
  font-size:22px;font-weight:700;color:var(--navy);
  font-family:"Yu Mincho",serif;display:block;margin-top:4px;
}
.action-btn{
  width:100%;height:56px;border-radius:8px;font-size:16px;font-weight:700;
  cursor:pointer;border:none;font-family:inherit;margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-share{background:var(--gold);color:var(--navy);}
.btn-share:active{background:#d4b97e;}
.btn-download{background:var(--navy);color:#fff;}
.btn-download:active{background:#152030;}
.btn-copy{background:#f0f2f4;color:var(--navy);border:1px solid var(--border);}
.btn-copy:active{background:#e0e4e8;}
.save-note{
  font-size:11px;color:var(--sub);padding:8px 12px;
  background:#f5f4f0;border-radius:4px;line-height:1.7;margin-bottom:10px;
}

/* ── 底部ナビゲーション ── */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:904px;
  background:var(--white);border-top:1px solid var(--border);
  display:flex;padding:6px 10px;gap:8px;z-index:100;
}
.nav-btn{
  flex:1;height:52px;border-radius:6px;font-size:14px;font-weight:700;
  cursor:pointer;border:none;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.nav-back{background:#f0f2f4;color:var(--navy);}
.nav-back:active{background:#e0e4e8;}
.nav-next{background:var(--gold);color:var(--navy);}
.nav-next:active{background:#d4b97e;}
.nav-save{background:var(--navy);color:#fff;}
.nav-save:active{background:#152030;}

/* ── プレビュー内CSS（ひな形と同じ） ── */
.doc-page .header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #111;padding-bottom:8px;margin-bottom:10px;}
.doc-page .header-left{position:relative;display:inline-block;}
.doc-page .company-name{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:22px;font-weight:700;color:#111;letter-spacing:0.06em;line-height:1.3;}
.doc-page .company-name .co-prefix{font-size:15px;font-weight:400;letter-spacing:0.1em;}
.doc-page .company-info{font-size:11.5px;color:#444;margin-top:5px;line-height:1.9;}
.doc-page .kakuin{width:64px;height:64px;position:absolute;top:6px;right:-28px;}
.doc-page .doc-title{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:28px;font-weight:700;color:#111;letter-spacing:0.18em;text-align:right;}
.doc-page .doc-meta{font-size:11.5px;color:#444;text-align:right;margin-top:6px;line-height:2;}
.doc-page .info-section{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:16px;}
.doc-page .info-left{flex:1;display:flex;flex-direction:column;gap:8px;}
.doc-page .client-name{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:21px;font-weight:600;color:#111;border-bottom:2px solid #111;padding-bottom:4px;}
.doc-page .summary-box{background:#444!important;color:#fff!important;padding:12px 22px;border-radius:3px;text-align:right;flex-shrink:0;}
.doc-page .summary-box .s-label{font-size:11px;color:#e0e0e0!important;letter-spacing:0.08em;}
.doc-page .summary-box .total-amount{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:26px;font-weight:700;color:#fff!important;margin-top:2px;letter-spacing:0.04em;}
.doc-page .summary-box .tax-note{font-size:11px;color:#e0e0e0!important;margin-top:3px;}
.doc-page .project-band{background:#555!important;border-left:5px solid #111;padding:6px 14px;margin-bottom:6px;font-size:11.5px;color:#fff!important;display:inline-flex;flex-direction:column;gap:3px;align-self:flex-start;}
.doc-page .band-label{color:#ddd!important;margin-right:4px;}
.doc-page .section-title{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:13px;font-weight:600;color:#111;border-bottom:2px solid #111;padding-bottom:3px;margin-bottom:6px;letter-spacing:0.08em;}
.doc-page .estimate-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px;border:1px solid #888;}
.doc-page .estimate-table thead th{background:#555!important;color:#fff!important;padding:6px 8px;font-weight:700;font-size:11.5px;border-right:1px solid #666;}
.doc-page .estimate-table thead th:first-child{text-align:left;}
.doc-page .estimate-table thead th:not(:first-child){text-align:right;}
.doc-page .estimate-table tbody tr{border-bottom:1px solid #bbb;}
.doc-page .estimate-table tbody tr:nth-child(even){background:#f4f4f4!important;}
.doc-page .estimate-table tbody td{padding:9px 10px;vertical-align:middle;color:#111;border-right:1px solid #bbb;}
.doc-page .estimate-table tbody td:first-child{text-align:left;}
.doc-page .estimate-table tbody td:not(:first-child){text-align:right;}
.doc-page .estimate-table .subtotal-row td{background:#e8e8e8!important;font-weight:700;font-size:13px;}
.doc-page .estimate-table .shokeihi-row td{background:#f4f4f4!important;color:#555;}
.doc-page .bottom-section{display:flex;gap:14px;align-items:flex-start;margin-top:10px;margin-bottom:10px;}
.doc-page .note-box{flex:1;border:1px solid #888;border-radius:3px;padding:8px 12px;background:#f8f8f8;font-size:11px;color:#444;line-height:1.8;min-height:80px;}
.doc-page .note-title{font-size:11.5px;font-weight:700;color:#111;margin-bottom:4px;letter-spacing:0.06em;border-bottom:1px solid #bbb;padding-bottom:4px;}
.doc-page .totals-wrap{flex-shrink:0;}
.doc-page .totals-table{width:260px;border-collapse:collapse;font-size:12px;border:1px solid #888;}
.doc-page .totals-table td{padding:5px 12px;border-bottom:1px solid #bbb;color:#111;}
.doc-page .totals-table td:last-child{text-align:right;}
.doc-page .totals-table .t-subtotal td{background:#e8e8e8!important;font-weight:600;}
.doc-page .totals-table .t-final{background:#444!important;}
.doc-page .totals-table .t-final td{padding:8px 12px;font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:14px;font-weight:700;color:#fff!important;border-bottom:none;}
.doc-page .footer{margin-top:10px;border-top:1px solid #888;padding-top:6px;display:flex;justify-content:space-between;font-size:11px;color:#444;}
.doc-page .validity{font-size:11px;color:#444;text-align:left;margin-bottom:8px;margin-top:4px;}
</style>
</head>
<body>

<!-- トップバー -->
<div class="topbar">
  <span class="topbar-title">📋 見積書作成</span>
  <div class="topbar-right">
    <select class="mode-sel" id="mode-select" onchange="switchMode(this.value)">
      <option value="flat">フラット</option>
      <option value="group">大項目</option>
    </select>
  </div>
</div>

<!-- タブバー -->
<div class="tabbar">
  <div class="tab active" id="tab-input" onclick="goScreen('input')">
    <span class="tab-num">1</span>入力
  </div>
  <div class="tab" id="tab-preview" onclick="goScreen('preview')">
    <span class="tab-num">2</span>確認
  </div>
  <div class="tab" id="tab-save" onclick="goScreen('save')">
    <span class="tab-num">3</span>保存
  </div>
</div>

<!-- ── 画面コンテナ ── -->
<div class="screens">

  <!-- ===== 画面1：入力 ===== -->
  <div class="screen active" id="screen-input">

    <!-- data.jsonバナー -->
    <div class="data-banner" id="data-banner">
      <div class="banner-spin" id="banner-spin"></div>
      <div class="banner-text" id="banner-text">data.jsonを取得中…</div>
      <button class="btn-sm btn-navy" id="banner-btn" style="display:none" onclick="loadDataJson()">再取得</button>
    </div>

    <!-- 基本情報 -->
    <div class="sec" style="padding-top:14px;">
      <div class="sec-label">基本情報</div>
      <div class="fgroup">
        <label>宛名（会社名）</label>
        <input id="atena" type="text" placeholder="例：〇〇株式会社" oninput="onAnyInput()">
      </div>
      <div class="fgroup-row">
        <div class="fgroup">
          <label>見積番号</label>
          <input id="mitsumoriNo" type="text" placeholder="AR26-T000-M01" oninput="onAnyInput()">
        </div>
        <div class="fgroup">
          <label>発行日</label>
          <input id="hakkoDate" type="date" oninput="onAnyInput()">
        </div>
      </div>
      <div class="fgroup">
        <label>工事件名</label>
        <input id="kojimei" type="text" placeholder="工事件名を入力" oninput="onAnyInput()">
      </div>
      <div class="fgroup">
        <label>施工場所</label>
        <input id="seshubasho" type="text" placeholder="大分県別府市" oninput="onAnyInput()">
      </div>
    </div>

    <hr class="sep">

    <!-- 明細 -->
    <div class="sec" style="padding-top:12px;">
      <div class="sec-label">明細</div>
    </div>
    <div id="items-editor"></div>

    <hr class="sep" style="margin-top:14px;">

    <!-- 諸経費・値引き -->
    <div class="extra-row">
      <div class="fgroup">
        <label>諸経費率（%）</label>
        <input id="shokeihiRateInput" type="number" value="10" min="0" max="100"
          oninput="shokeihiRate=parseFloat(this.value)||0;renderTotalBox()">
      </div>
      <div class="fgroup">
        <label>値引き（円）</label>
        <input id="nebikiInput" type="number" value="0" min="0"
          oninput="nebiki=parseFloat(this.value)||0;renderTotalBox()">
      </div>
    </div>

    <!-- 合計ボックス -->
    <div class="total-box" id="total-box"></div>

    <hr class="sep">

    <!-- 備考 -->
    <div class="sec" style="padding-top:12px;">
      <div class="sec-label">備考</div>
      <div class="fgroup">
        <textarea id="bikou" rows="3">・本見積書の有効期限は発行日より30日間とさせていただきます。
・上記金額は概算であり、現地確認後に変更となる場合があります。</textarea>
      </div>
    </div>

  </div>
  <!-- /screen-input -->

  <!-- ===== 画面2：確認（プレビュー） ===== -->

// data.json 取得
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadDataJson(){
  const banner = document.getElementById('data-banner');
  const bannerText = document.getElementById('banner-text');
  const spin = document.getElementById('banner-spin');
  const btn = document.getElementById('banner-btn');
  banner.className = 'data-banner';
  spin.style.display = '';
  btn.style.display = 'none';
  bannerText.textContent = 'data.jsonを取得中…';
  try {
    const res = await fetch('https://kameisatoru-svg.github.io/genba-navi/data.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    dataJson = await res.json();
    // 次番号を採番
    const ankenNums = (dataJson.案件||[]).map(a=>parseInt((a.案件番号||'').replace('AR-26-',''))||0);
    const tNums = (dataJson.取引先||[]).map(t=>parseInt((t.取引先番号||'').replace('T-',''))||0);
    const nextAnken = 'AR-26-'+ String(Math.max(0,...ankenNums)+1).padStart(3,'0');
    const nextT = 'T-'+ String(Math.max(0,...tNums)+1).padStart(3,'0');
    const nextMno = 'AR26-T'+String(Math.max(0,...ankenNums)+1).padStart(3,'0')+'-M01';
    // フィールド自動入力（空欄のみ）
    if(!document.getElementById('mitsumoriNo').value)
      document.getElementById('mitsumoriNo').value = nextMno;
    banner.className = 'data-banner ok';
    spin.style.display = 'none';
    bannerText.innerHTML = `<b>取得完了</b>　次の案件番号：<b>${nextAnken}</b>　見積番号：<b>${nextMno}</b>　（取引先${nextT}）`;
  } catch(e) {
    banner.className = 'data-banner err';
    spin.style.display = 'none';
    btn.style.display = '';
    bannerText.textContent = '取得失敗。オフラインの可能性があります。手動で番号を入力してください。';
  }
}

// 画面切替
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function goScreen(s){
  currentScreen = s;
  ['input','preview','save'].forEach(id=>{
    document.getElementById('screen-'+id).classList.toggle('active', id===s);
    document.getElementById('tab-'+id).classList.toggle('active', id===s);
  });
  const back = document.getElementById('nav-back');
  const next = document.getElementById('nav-next');
  if(s==='input'){
    back.style.display='none';
    next.textContent='確認画面へ ▶';
    next.className='nav-btn nav-next';
    next.style.display='';
    next.onclick=navNext;
  } else if(s==='preview'){
    back.style.display='';
    back.textContent='◀ 入力';
    next.style.display='';
    next.textContent='保存へ ▶';
    next.className='nav-btn nav-next';
    next.onclick=navNext;
    renderPreview();
  } else {
    back.style.display='';
    back.textContent='◀ 確認';
    next.style.display='';
    next.textContent='⬇ HTML保存';
    next.className='nav-btn nav-save';
    next.onclick=downloadHTML;
    updateSaveSummary();
  }
}
function navNext(){
  if(currentScreen==='input') goScreen('preview');
  else if(currentScreen==='preview') goScreen('save');
}
function navBack(){
  if(currentScreen==='preview') goScreen('input');
  else if(currentScreen==='save') goScreen('preview');
}
function switchMode(v){
  mode=v;
  renderEditor();
  renderTotalBox();
}

// 集計
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcTotals(){
  let sub=0;
  if(mode==='flat'){
    flatItems.forEach(it=>{sub+=(parseFloat(it.qty)||0)*(parseFloat(it.price)||0);});
  } else {
    groupSummaryItems.forEach(it=>{sub+=(parseFloat(it.qty)||0)*(parseFloat(it.price)||0);});
    groupItems.forEach(g=>{g.items.forEach(it=>{sub+=(parseFloat(it.qty)||0)*(parseFloat(it.price)||0);});});
  }
  const shokeihi=Math.round(sub*shokeihiRate/100);
  const zeinuki=sub+shokeihi-nebiki;
  const tax=Math.round(zeinuki*0.1);
  return {subtotal:sub,shokeihi,nebiki,zeinuki,tax,total:zeinuki+tax};
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ドラッグ（タッチ対応）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initDragRows(tbody, getArr, setArr, onDone){
  let dragIdx=null;
  Array.from(tbody.querySelectorAll('tr')).forEach((tr,i)=>{
    const handle=tr.querySelector('.drag-handle');
    if(!handle)return;
    // タッチドラッグ
    let touchStartY=0;
    handle.addEventListener('touchstart',e=>{
      dragIdx=i;
      touchStartY=e.touches[0].clientY;
      tr.classList.add('dragging');
    },{passive:true});
    handle.addEventListener('touchmove',e=>{
      e.preventDefault();
      const y=e.touches[0].clientY;
      const rows=Array.from(tbody.querySelectorAll('tr'));
      rows.forEach(r=>r.classList.remove('drag-over'));
      const target=document.elementFromPoint(e.touches[0].clientX,y);
      if(target){
        const targetRow=target.closest('tr');
        if(targetRow&&targetRow!==tr){
          const ti=rows.indexOf(targetRow);
          if(ti>=0) rows[ti].classList.add('drag-over');
        }
      }
    },{passive:false});
    handle.addEventListener('touchend',e=>{
      tr.classList.remove('dragging');
      const y=e.changedTouches[0].clientY;
      const target=document.elementFromPoint(e.changedTouches[0].clientX,y);
      tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));
      if(target&&dragIdx!==null){
        const targetRow=target.closest('tr');
        if(targetRow&&targetRow!==tr){
          const rows=Array.from(tbody.querySelectorAll('tr'));
          const ti=rows.indexOf(targetRow);
          if(ti>=0&&ti!==dragIdx){
            const arr=[...getArr()];
            const moved=arr.splice(dragIdx,1)[0];
            arr.splice(ti,0,moved);
            setArr(arr);
            onDone();
          }
        }
      }
      dragIdx=null;
    });
    // マウスドラッグ
    tr.draggable=true;
    tr.addEventListener('dragstart',e=>{dragIdx=i;tr.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    tr.addEventListener('dragend',()=>{tr.classList.remove('dragging');tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));});
    tr.addEventListener('dragover',e=>{e.preventDefault();tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));if(i!==dragIdx)tr.classList.add('drag-over');});
    tr.addEventListener('drop',e=>{
      e.preventDefault();tr.classList.remove('drag-over');
      if(dragIdx===null||dragIdx===i)return;
      const arr=[...getArr()];const moved=arr.splice(dragIdx,1)[0];arr.splice(i,0,moved);
      setArr(arr);dragIdx=null;onDone();
    });
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Enterナビ・金額更新
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function enterNav(e){
  if(e.key!=='Enter')return;
  e.preventDefault();
  const tr=e.target.closest('tr');
  if(!tr)return;
  const inputs=Array.from(tr.querySelectorAll('input:not([readonly])')).filter(el=>el.offsetParent!==null);
  const idx=inputs.indexOf(e.target);
  if(idx>=0&&idx<inputs.length-1){inputs[idx+1].focus();inputs[idx+1].select();}
  else{
    const tbody=tr.closest('tbody');if(!tbody)return;
    const rows=Array.from(tbody.querySelectorAll('tr'));
    const trIdx=rows.indexOf(tr);
    for(let ni=trIdx+1;ni<rows.length;ni++){
      const ni2=Array.from(rows[ni].querySelectorAll('input:not([readonly])')).filter(el=>el.offsetParent!==null);
      if(ni2.length>0){ni2[0].focus();ni2[0].select();return;}
    }
  }
}
function updateAmt(inputEl){
  const tr=inputEl.closest('tr');if(!tr)return;
  const nums=tr.querySelectorAll('input[type="number"]:not([readonly])');
  if(nums.length<2)return;
  const q=parseFloat(nums[0].value)||0,p=parseFloat(nums[1].value)||0;
  const amtEl=tr.querySelector('input[readonly]');
  if(amtEl) amtEl.value=(q*p)|0;
}

    <div class="footer"><div>株式会社アート・レイズ　© 2026</div></div>`;

  // A4スケール
  requestAnimationFrame(()=>{
    const wrap=document.getElementById('preview-scale-wrap');
    const page=document.getElementById('doc-page');
    if(!wrap||!page)return;
    const a4w=page.offsetWidth;
    const avail=wrap.parentElement.clientWidth-24;
    const scale=Math.min(1,avail/a4w);
    page.style.transform=`scale(${scale})`;
    page.style.transformOrigin='top center';
    page.style.marginBottom=(page.offsetHeight*scale-page.offsetHeight)+'px';
  });
}

function downloadHTML(){
  const html=buildDocHTML();
  const mno=document.getElementById('mitsumoriNo').value||'mitsumori';
  const fname=`見積書_${mno}.html`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=fname;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

function openPrint(){
  const html=buildDocHTML();
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.target='_blank';a.rel='noopener';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

async function copyAsText(){
  const t=calcTotals();
  const atena=document.getElementById('atena').value;
  const mno=document.getElementById('mitsumoriNo').value;
  const kojimei=document.getElementById('kojimei').value;
  let lines=[`【御見積書】`,`宛名：${atena}　御中`,`見積番号：${mno}`,`工事件名：${kojimei}`,``,`--- 明細 ---`];
  if(mode==='flat'){
    flatItems.forEach(it=>{
      if(it.name) lines.push(`${it.name}　${it.qty}${it.unit}　¥${fmtN(it.price)}　= ¥${fmtN((parseFloat(it.qty)||0)*(parseFloat(it.price)||0))}`);
    });
  }
  lines.push(``,`税抜合計：${fmt(t.zeinuki)}`,`消費税：${fmt(t.tax)}`,`税込合計：${fmt(t.total)}`);
  try{
    await navigator.clipboard.writeText(lines.join('\n'));
    alert('テキストをコピーしました');
  }catch(e){
    alert('コピーに失敗しました');
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// エスケープ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function escH(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
