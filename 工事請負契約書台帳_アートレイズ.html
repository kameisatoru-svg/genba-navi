<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工事請負契約書台帳｜株式会社アート・レイズ</title>
<style>
:root {
  --band: #1e2d40; --light: #f8f8f8; --border: #ddd; --border-dark: #aaa;
  --text: #333; --text-sub: #666; --white: #fff; --accent: #2563eb;
  --green: #16a34a; --orange: #d97706; --red: #dc2626;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Meiryo,'Yu Gothic',sans-serif; background: #eee; color: var(--text); font-size: 14px; padding-bottom: 70px; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

.page-header {
  background: var(--band); color: var(--white);
  padding: 18px 24px; border-radius: 6px 6px 0 0;
  display: flex; justify-content: space-between; align-items: center;
}
.page-header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; }
.page-header .meta { font-size: 12px; opacity: 0.8; text-align: right; }

.stats-bar {
  background: var(--white); border: 1px solid var(--border); border-top: none;
  padding: 14px 24px; display: flex; gap: 32px; flex-wrap: wrap;
}
.stat-item { text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; color: var(--band); }
.stat-label { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

.search-bar {
  background: var(--white); border: 1px solid var(--border); border-top: none;
  padding: 12px 24px; border-radius: 0 0 6px 6px; margin-bottom: 20px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.search-bar input {
  flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid var(--border-dark);
  border-radius: 4px; font-size: 14px; font-family: inherit;
}
.search-bar input:focus { outline: none; border-color: var(--accent); }

.contract-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 6px; margin-bottom: 14px; overflow: hidden;
}
.card-header {
  background: var(--band); color: var(--white);
  padding: 10px 16px; display: flex; justify-content: space-between;
  align-items: center; gap: 12px; flex-wrap: wrap;
}
.card-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.contract-id {
  background: rgba(255,255,255,0.2); padding: 2px 10px;
  border-radius: 12px; font-size: 12px; font-weight: 700;
}
.contract-name { font-size: 15px; font-weight: 700; }
.badge {
  padding: 3px 12px; border-radius: 12px; font-size: 12px; font-weight: 700;
}
.badge-signed   { background: #1a7a30; color: #fff; }
.badge-pending  { background: #d97706; color: #fff; }
.badge-unsigned { background: #6b7280; color: #fff; }

.card-body { padding: 16px 20px; }
.info-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px 24px; margin-bottom: 14px;
}
.info-item { display: flex; flex-direction: column; gap: 2px; }
.info-label { font-size: 11px; color: var(--text-sub); }
.info-value { font-size: 13px; font-weight: 600; }
.amount-value { color: var(--band); font-size: 15px; }

.note-box {
  background: #fafafa; border-left: 3px solid #d1d5db;
  padding: 10px 14px; font-size: 12px; color: var(--text-sub);
  border-radius: 0 4px 4px 0; margin-top: 12px; line-height: 1.7;
}
.note-label { font-weight: 700; color: var(--text); margin-bottom: 4px; font-size: 11px; }

.doc-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 4px; font-size: 12px;
  text-decoration: none; margin: 4px 4px 0 0;
}
.doc-tag.available { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
.doc-tag.unavailable { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; }

.add-row {
  background: var(--white); border: 2px dashed var(--border-dark);
  border-radius: 6px; padding: 16px; text-align: center;
  color: var(--text-sub); font-size: 13px; margin-bottom: 20px;
}
.page-footer {
  text-align: center; font-size: 11px; color: var(--text-sub);
  padding: 12px 0; border-top: 1px solid var(--border); margin-top: 8px;
}

/* ★ 共通ナビバー */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: #333; display: flex; border-top: 2px solid #c8a96e;
}
.bottom-nav a {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 8px 4px; color: #ccc;
  text-decoration: none; font-size: 11px; gap: 2px; transition: background 0.15s;
}
.bottom-nav a:hover { background: #444; }
.bottom-nav a.active { color: #c8a96e; border-top: 2px solid #c8a96e; margin-top: -2px; }
.bottom-nav a .nav-icon { font-size: 18px; }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>📜 工事請負契約書台帳</h1>
    <div class="meta">株式会社アート・レイズ<br><span id="lastUpdated">-</span></div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num" id="totalCount">-</div><div class="stat-label">総契約件数</div></div>
    <div class="stat-item"><div class="stat-num" id="signedCount" style="color:#1a7a30;">-</div><div class="stat-label">締結済み</div></div>
    <div class="stat-item"><div class="stat-num" id="pendingCount" style="color:#d97706;">-</div><div class="stat-label">未締結</div></div>
    <div class="stat-item" style="margin-left:auto;text-align:right;">
      <div style="font-size:12px;font-weight:600;" id="sourceBadge">読込中...</div>
      <div class="stat-label">データソース</div>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 契約番号・顧客名・工事名で絞り込み..." oninput="renderCards()">
  </div>

  <div id="cardsArea"></div>
  <div class="add-row" id="addRow">＋ Claudeに依頼してJSONで契約書を追加</div>

  <div class="page-footer">
    株式会社アート・レイズ｜大分県別府市上原町13番25号｜TEL 0977-21-0603
  </div>
</div>

<!-- ★ 共通ナビバー -->
<nav class="bottom-nav">
  <a href="案件台帳_アートレイズ.html"><span class="nav-icon">📋</span>案件台帳</a>
  <a href="見積台帳_アートレイズ.html"><span class="nav-icon">📄</span>見積台帳</a>
  <a href="請求台帳_アートレイズ.html"><span class="nav-icon">🧾</span>請求台帳</a>
  <a href="原価管理台帳_アートレイズ.html"><span class="nav-icon">📊</span>工事台帳</a>
</nav>

<script>
const BASE_URL = 'https://kameisatoru-svg.github.io/genba-navi/';
const DATA_JSON_URL = BASE_URL + 'data.json';
const STORAGE_KEY = 'artrise_keiyaku_v1';

// ─── データ読み込み ──────────────────────────────────
async function loadDataAsync() {
  try {
    const res = await fetch(DATA_JSON_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const data = json.契約書 || [];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    setSourceBadge('fetch', json.最終更新 || '');
    return data;
  } catch(e) {
    setSourceBadge('local', '');
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch(e2) { return []; }
  }
}
function loadDataSync() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}
function setSourceBadge(type, updatedAt) {
  const el = document.getElementById('sourceBadge');
  if (!el) return;
  el.innerHTML = type === 'fetch'
    ? `<span style="color:#1a7a30;">● GitHub同期</span>${updatedAt ? ' <span style="color:#888;font-size:11px;">('+updatedAt+')</span>' : ''}`
    : `<span style="color:#d97706;">● オフライン（ローカル）</span>`;
}

// ─── カード生成 ──────────────────────────────────────
function buildCard(item) {
  const isSigned = item.ステータス === '締結済み';
  const badgeClass = isSigned ? 'badge-signed' : 'badge-pending';
  const badgeLabel = item.ステータス || '未締結';

  const docTag = item.契約書PDF
    ? `<a class="doc-tag available" href="${item.契約書PDF}" target="_blank">📄 契約書PDF</a>`
    : `<span class="doc-tag unavailable">📄 契約書PDF</span>`;

  const searchText = [item.契約番号, item.案件番号, item.顧客名, item.工事名, item.施工場所].filter(Boolean).join(' ').toLowerCase();

  return `
  <div class="contract-card" data-search="${searchText}">
    <div class="card-header">
      <div class="card-header-left">
        <span class="contract-id">${item.契約番号 || '-'}</span>
        <span class="contract-name">${item.工事名 || '-'}</span>
      </div>
      <span class="badge ${badgeClass}">${badgeLabel}</span>
    </div>
    <div class="card-body">
      <div class="info-grid">
        <div class="info-item"><span class="info-label">顧客名</span><span class="info-value">${item.顧客名 || '-'}</span></div>
        <div class="info-item"><span class="info-label">案件番号</span><span class="info-value">${item.案件番号 || '-'}</span></div>
        <div class="info-item"><span class="info-label">施工場所</span><span class="info-value">${item.施工場所 || '-'}</span></div>
        <div class="info-item"><span class="info-label">契約日</span><span class="info-value">${item.契約日 || '-'}</span></div>
        <div class="info-item"><span class="info-label">契約金額（税込）</span><span class="info-value amount-value">${item.契約金額 ? '¥' + Number(item.契約金額).toLocaleString() : '-'}</span></div>
        <div class="info-item"><span class="info-label">工期</span><span class="info-value">${item.工期開始 || '-'} 〜 ${item.工期終了 || '-'}</span></div>
      </div>
      ${item.備考 ? `<div class="note-box"><div class="note-label">📝 備考</div>${item.備考}</div>` : ''}
      <div style="margin-top:10px;">${docTag}</div>
    </div>
  </div>`;
}

// ─── 統計 ────────────────────────────────────────────
function updateStats(data) {
  document.getElementById('totalCount').textContent = data.length;
  document.getElementById('signedCount').textContent = data.filter(p => p.ステータス === '締結済み').length;
  document.getElementById('pendingCount').textContent = data.filter(p => p.ステータス !== '締結済み').length;
  const now = new Date();
  document.getElementById('lastUpdated').textContent = `最終更新：${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

// ─── レンダリング ────────────────────────────────────
function renderCards(data) {
  if (data === undefined) data = loadDataSync();
  const q = document.getElementById('searchInput').value.toLowerCase();
  updateStats(data);
  const filtered = data.filter(p =>
    !q || [p.契約番号, p.案件番号, p.顧客名, p.工事名, p.施工場所].filter(Boolean).join(' ').toLowerCase().includes(q)
  );
  const area = document.getElementById('cardsArea');
  area.innerHTML = filtered.length === 0
    ? '<div class="add-row" style="margin-bottom:14px;">該当する契約書がありません</div>'
    : filtered.map(p => buildCard(p)).join('');
  document.getElementById('addRow').style.display = q ? 'none' : '';
}

// ─── 初期化 ─────────────────────────────────────────
async function init() {
  document.getElementById('cardsArea').innerHTML =
    '<div class="add-row" style="margin-bottom:14px;color:#888;">📡 データを読み込んでいます...</div>';
  const data = await loadDataAsync();
  renderCards(data);
}

init().then(() => {
  const params = new URLSearchParams(window.location.search);
  const anken = params.get('anken');
  if (!anken) return;

  const statsBar = document.querySelector('.stats-bar');
  const searchBar = document.querySelector('.search-bar');
  if (statsBar) statsBar.style.display = 'none';
  if (searchBar) searchBar.style.display = 'none';

  const header = document.querySelector('.page-header');
  if (header) {
    const backBtn = document.createElement('a');
    backBtn.href = BASE_URL + '案件台帳_アートレイズ.html';
    backBtn.textContent = '← 案件台帳に戻る';
    backBtn.style.cssText = 'display:inline-block;margin-bottom:10px;color:#2563eb;font-size:13px;font-weight:700;text-decoration:none;';
    header.parentNode.insertBefore(backBtn, header);
  }

  const input = document.getElementById('searchInput');
  if (input) {
    input.value = anken;
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    renderCards(data);
  }
});
</script>
</body>
</html>
