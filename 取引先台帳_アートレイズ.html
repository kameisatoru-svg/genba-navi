<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取引先台帳｜株式会社アート・レイズ</title>
<link rel="stylesheet" href="common.css">
<style>
/* ★ 案件台帳_アートレイズ.htmlと同じ設計思想で改修（2026/4/24）
   - Google Fonts撤去
   - page-headerをnavy系に統一
   - カードはC-3準拠（白基調・角丸14px・影のみ・左端バーは関係性色）
   - カード展開はC-4準拠（nav-list化・2階層折りたたみ）
   - 検索＋フィルタはC-1準拠（フィルタシート下スライド） */
:root {
  --navy:#1e2d40; --accent:#c8a96e; --white:#fff;
  --bg:#eeebe5; --border:#ddd; --border-dark:#aaa;
  --text:#333; --text-sub:#666; --light:#f8f8f8;
  --green:#16a34a; --red:#dc2626; --orange:#d97706; --blue:#2563eb;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Meiryo,'Yu Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:14px;padding-bottom:20px;
  /* ★ common.cssの overflow:hidden と height:100dvh を解除してページ全体スクロールを有効化 */
  height:auto;min-height:100dvh;overflow:auto;overflow-x:hidden;}
.container{max-width:1100px;margin:0 auto;padding:0 16px 24px;}
.page-header{background:var(--navy);color:var(--white);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.page-header h1{font-size:17px;font-weight:700;letter-spacing:0.04em;display:flex;align-items:center;gap:8px;}
.page-header .summary{font-size:14px;opacity:0.9;text-align:right;line-height:1.4;white-space:nowrap;}
.page-header .summary .count{font-size:17px;font-weight:700;}

/* ★ 検索＋フィルタボタン：案件台帳と統一 */
.filter-bar{background:var(--white);border:none;padding:10px 12px;display:flex;gap:8px;align-items:center;margin-bottom:14px;border-radius:14px;margin-top:14px;box-shadow:0 2px 8px rgba(30,45,64,0.07);}
.search-input-wrap{flex:1;min-width:0;position:relative;display:flex;align-items:center;}
.search-icon{position:absolute;left:12px;color:var(--text-sub);pointer-events:none;flex-shrink:0;}
.filter-bar input[type="text"]{flex:1;min-width:0;padding:10px 12px 10px 38px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;background:var(--light);width:100%;}
.filter-bar input[type="text"]:focus{outline:none;border-color:var(--accent);background:var(--white);}
/* フィルタボタン（右端のアイコン・タップでシート展開） */
.filter-toggle-btn{
  width:44px;height:44px;border:1px solid var(--border);border-radius:10px;
  background:var(--white);color:var(--navy);cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;
}
.filter-toggle-btn:hover{background:var(--light);}
.filter-toggle-btn.has-filter{background:var(--navy);color:var(--white);border-color:var(--navy);}
.filter-toggle-btn .filter-dot{
  position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;
  background:var(--accent);display:none;
}
.filter-toggle-btn.has-filter .filter-dot{display:block;}

/* フィルタシート（下から出るモーダル） */
.filter-sheet{
  position:fixed;bottom:0;left:0;right:0;background:var(--white);
  border-radius:16px 16px 0 0;box-shadow:0 -4px 16px rgba(0,0,0,0.15);
  z-index:200;padding:20px 20px 24px;transform:translateY(100%);
  transition:transform 0.25s ease-out;max-height:80vh;overflow-y:auto;
}
.filter-sheet.open{transform:translateY(0);}
.filter-sheet-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:199;
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
.filter-sheet-backdrop.open{opacity:1;pointer-events:auto;}
.filter-sheet-title{font-size:13px;font-weight:700;color:var(--text-sub);margin-bottom:12px;letter-spacing:0.06em;margin-top:14px;}
.filter-sheet-title:first-child{margin-top:0;}
.filter-sheet-chips{display:flex;flex-wrap:wrap;gap:8px;}
.filter-sheet-chip{
  padding:10px 18px;border:1px solid var(--border);border-radius:24px;
  background:var(--white);font-size:14px;font-weight:600;color:var(--text);
  cursor:pointer;font-family:inherit;min-height:44px;
}
.filter-sheet-chip.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
.filter-sheet-close{
  margin-top:20px;width:100%;padding:12px;background:var(--accent);color:var(--navy);
  border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:inherit;min-height:48px;
}

/* コピーバー（業者選択→一括コピー機能） */
.copy-bar{
  display:none;background:var(--navy);color:#fff;
  padding:10px 16px;border-radius:10px;margin-bottom:12px;
  align-items:center;gap:12px;flex-wrap:wrap;
}
.copy-bar.visible{display:flex;}
.copy-bar-text{font-size:13px;flex:1;font-weight:600;}
.copy-btn{
  background:var(--accent);color:var(--navy);border:none;border-radius:8px;
  padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;min-height:40px;
}
.copy-btn:hover{background:#b8996a;}
.clear-btn{
  background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.4);
  border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:inherit;min-height:40px;
}

/* ★ カード：案件台帳C-3準拠（白基調・角丸14px・影のみ・左端関係性バー） */
.vendor-card{background:var(--white);border:none;border-radius:14px;margin-bottom:10px;overflow:hidden;transition:box-shadow 0.15s;position:relative;box-shadow:0 2px 8px rgba(30,45,64,0.07);border-left:4px solid #d0d0cc;}
.vendor-card:hover{box-shadow:0 4px 12px rgba(30,45,64,0.1);}
/* 関係性バー：優先度順（元請 > 顧客 > 業者 > 仕入先 > 休眠） */
.vendor-card.rel-元請{border-left-color:#9b59b6;}
.vendor-card.rel-顧客{border-left-color:#1a7a30;}
.vendor-card.rel-業者{border-left-color:#f39c12;}
.vendor-card.rel-仕入先{border-left-color:#2563eb;}
.vendor-card.rel-休眠{border-left-color:#9ca3af;opacity:0.75;}

/* ヘッダー：白基調 */
.card-header{background:var(--white);color:var(--text);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:nowrap;cursor:pointer;user-select:none;min-height:56px;}
.card-header:hover{background:#faf9f6;}
.card-header-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:1;min-width:0;}
.vendor-id{background:var(--light);color:var(--text-sub);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;flex-shrink:0;letter-spacing:0.02em;}
.vendor-name{font-size:16px;font-weight:700;color:var(--navy);line-height:1.35;}
.card-toggle{font-size:14px;opacity:0.4;color:var(--text-sub);transition:transform 0.2s;flex-shrink:0;}
.vendor-card.open .card-toggle{transform:rotate(180deg);opacity:0.7;}
.vendor-card.open{box-shadow:0 4px 16px rgba(30,45,64,0.12);}

/* カードチェックボックス（コピー選択用） */
.card-checkbox{
  width:20px;height:20px;cursor:pointer;accent-color:var(--navy);flex-shrink:0;
}
.vendor-card.selected{box-shadow:0 0 0 2px var(--navy),0 2px 8px rgba(30,45,64,0.15);}

/* バッジ：82px固定・中央寄せ（案件台帳と統一） */
.badge{
  padding:5px 0;border-radius:12px;font-size:11px;font-weight:700;
  white-space:nowrap;flex-shrink:0;letter-spacing:0.02em;
  min-width:56px;text-align:center;display:inline-block;padding:5px 10px;
}
.b-顧客{background:#1a7a30;color:#fff;}
.b-業者{background:#f39c12;color:#fff;}
.b-元請{background:#9b59b6;color:#fff;}
.b-仕入先{background:#2563eb;color:#fff;}
.b-休眠{background:#e8ebef;color:#6b7280;}
.b-業種{background:#f1f5f9;color:#475569;font-weight:600;}

/* カードボディ：展開時 */
.card-body{display:none;padding:12px;background:#fbfaf8;}
.vendor-card.open .card-body{display:block;}

/* ★ C-4 改修：カード展開部分を nav-list 化 + 2階層折りたたみ */
/* ★ PCでbuttonが横並びになるのを確実に防ぐため、明示的にdisplay:block + width:100% */
.vendor-card .nav-list{box-shadow:none;border-radius:10px;border:1px solid rgba(30,45,64,0.08);margin-bottom:0;display:block;}
.vendor-card .nav-list-item{
  min-height:60px;padding:13px 14px;cursor:pointer;
  display:flex;
  align-items:center;
  width:100%;
  box-sizing:border-box;
  gap:14px;
  text-align:left;
}
/* ★ SVGアイコンは必ず32x32固定・flex-shrink:0で絶対拡大させない */
.vendor-card .nav-list-item__icon{
  width:32px !important;
  height:32px !important;
  flex-shrink:0 !important;
  flex-grow:0 !important;
  color:var(--navy);
}
.vendor-card .nav-list-item__body{
  flex:1;
  min-width:0;
  text-align:left;
}
.vendor-card .nav-list-item__title{font-size:15px;font-weight:700;color:var(--text);line-height:1.35;text-align:left;}
.vendor-card .nav-list-item__desc{font-size:12px;color:var(--text-sub);margin-top:1px;line-height:1.4;text-align:left;}
.vendor-card .nav-list-item__value{font-size:13px;font-weight:600;color:var(--text-sub);margin-right:4px;white-space:nowrap;flex-shrink:0;}
.vendor-card .nav-list-item__arrow{font-size:14px;transition:transform 0.2s;color:var(--text-sub);opacity:0.5;flex-shrink:0;}
.vendor-card .nav-list-item.nav-expand.open .nav-list-item__arrow{transform:rotate(90deg);opacity:0.9;}
.vendor-card .nav-list-item.nav-expand.open{background:#f5f2ec;border-bottom:1px solid rgba(200,169,110,0.3);}
.vendor-card .nav-list-item.nav-expand.open .nav-list-item__title{color:var(--navy);}
/* 2階層目（展開エリア）：display:blockで横幅いっぱい */
.nav-expand-body{
  display:none;
  padding:14px 16px 16px;
  background:#fff;
  border-bottom:1px solid rgba(30,45,64,0.06);
  animation:navExpandFade 0.2s ease-out;
  width:100%;
  box-sizing:border-box;
}
.nav-list-item.nav-expand.open + .nav-expand-body{display:block;}
@keyframes navExpandFade{from{opacity:0;}to{opacity:1;}}

/* 情報グリッド（展開エリア内） */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px 20px;}
.info-item{display:flex;flex-direction:column;gap:3px;}
.info-label{font-size:11px;color:var(--text-sub);font-weight:700;}
.info-value{font-size:14px;color:var(--text);}
.info-value a{color:var(--blue);text-decoration:none;}
.info-value a:hover{text-decoration:underline;}
.info-value.warn{color:#b45309;}
.info-value.fullwidth{grid-column:1/-1;}

/* 案件履歴 */
.case-links{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.case-link{
  font-size:12px;background:#f1f5f9;border:1px solid #cbd5e1;
  border-radius:6px;padding:6px 12px;color:#334155;text-decoration:none;
  font-weight:600;
}
.case-link:hover{background:#e2e8f0;}

/* メモ */
.note-box{
  background:#fffbf0;border-left:3px solid #e8d9a0;
  padding:10px 14px;font-size:13px;color:var(--text-sub);
  border-radius:0 4px 4px 0;line-height:1.7;
}

.empty{background:var(--white);border:2px dashed var(--border-dark);border-radius:10px;padding:20px;text-align:center;color:var(--text-sub);font-size:13px;margin-bottom:12px;}
.loading{text-align:center;padding:40px;color:var(--text-sub);font-size:13px;}

/* ページフッター */
.page-footer{text-align:center;font-size:11px;color:var(--text-sub);padding:12px 0;border-top:1px solid var(--border);margin-top:8px;}

/* トースト */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--navy);color:#fff;padding:10px 24px;border-radius:24px;
  font-size:13px;font-weight:700;opacity:0;transition:opacity 0.3s;
  pointer-events:none;z-index:999;
}
.toast.show{opacity:1;}

@media(max-width:600px){
  .info-grid{grid-template-columns:1fr 1fr;}
  .page-header{padding:12px 14px;}
  .page-header h1{font-size:16px;}
  .page-header .summary{font-size:11px;}
  .page-header .summary .count{font-size:13px;}
  .vendor-name{font-size:15px;}
  .filter-bar{padding:8px 10px;gap:6px;}
  .filter-bar input[type="text"]{font-size:15px;padding:10px;}
}
</style>
</head>

<!-- フィルタシート（下からスライドアップ） -->
<div class="filter-sheet-backdrop" id="filterBackdrop" onclick="closeFilterSheet()"></div>

<!-- トースト -->
<div class="toast" id="toast">
  <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><polyline points="4,10 8,14 16,6"/></svg>

/* ═══════════════════════════════════════════════════════════
   状態
   ═══════════════════════════════════════════════════════════ */
let relFilter = 'all';
let typeFilter = 'all';
let selectedIds = new Set();

/* ═══════════════════════════════════════════════════════════
   関係性の表示優先度
   （左端バー色・バッジ並び順）
   元請 > 顧客 > 業者 > 仕入先 > 休眠
   ═══════════════════════════════════════════════════════════ */
const REL_PRIORITY = ['元請','顧客','業者','仕入先','休眠'];
function primaryRel(rels){
  for(const r of REL_PRIORITY){ if(rels.includes(r)) return r; }
  return '顧客';
}

/* ═══════════════════════════════════════════════════════════
   フィルタシート
   ═══════════════════════════════════════════════════════════ */
function openFilterSheet(){
  renderFilterChips();
  document.getElementById('filterSheet').classList.add('open');
  document.getElementById('filterBackdrop').classList.add('open');
}
function closeFilterSheet(){
  document.getElementById('filterSheet').classList.remove('open');
  document.getElementById('filterBackdrop').classList.remove('open');
}
function renderFilterChips(){
  // 関係性チップ
  const rels = ['all',...REL_PRIORITY];
  document.getElementById('filter-sheet-rel-chips').innerHTML = rels.map(r =>
    `<button class="filter-sheet-chip ${r===relFilter?'active':''}" onclick="setRelFilter('${r}')">${r==='all'?'すべて':r}</button>`
  ).join('');
  // 業種チップ（使用中のものだけ表示）
  const typesSet = new Set();
  VENDORS.forEach(v => (v.type||[]).forEach(t => typesSet.add(t)));
  const types = ['all',...Array.from(typesSet).sort()];
  document.getElementById('filter-sheet-type-chips').innerHTML = types.map(t =>
    `<button class="filter-sheet-chip ${t===typeFilter?'active':''}" onclick="setTypeFilter('${t}')">${t==='all'?'すべて':t}</button>`
  ).join('');
}
function setRelFilter(r){ relFilter = r; renderFilterChips(); renderVendors(); }
function setTypeFilter(t){ typeFilter = t; renderFilterChips(); renderVendors(); }

/* ═══════════════════════════════════════════════════════════
   カード展開
   ═══════════════════════════════════════════════════════════ */
function toggleCard(el){
  // チェックボックスのクリックでは展開しない
  if(event && event.target.classList.contains('card-checkbox')) return;
  el.closest('.vendor-card').classList.toggle('open');
}
function toggleNavItem(el){
  el.classList.toggle('open');
}

/* ═══════════════════════════════════════════════════════════
   メイン描画
   ═══════════════════════════════════════════════════════════ */
function renderVendors(){
  const q = (document.getElementById('vendor-search').value || '').toLowerCase().trim();
  const data = VENDORS.filter(v => {
    const relOK = relFilter==='all' || (v.rel||[]).includes(relFilter);
    const typeOK = typeFilter==='all' || (v.type||[]).includes(typeFilter);
    const textOK = !q || (v.search||'').toLowerCase().includes(q)
                      || (v.name||'').toLowerCase().includes(q)
                      || (v.id||'').toLowerCase().includes(q)
                      || (v.cases||[]).some(c => (c.num||'').toLowerCase().includes(q));
    return relOK && typeOK && textOK;
  });

  // ヘッダーサマリー更新
  const total = VENDORS.length;
  const kokyakuCount = VENDORS.filter(v => (v.rel||[]).includes('顧客')).length;
  const gyoushaCount = VENDORS.filter(v => (v.rel||[]).includes('業者')).length;
  document.getElementById('headerSummary').innerHTML =
    `<span class="count">${data.length}/${total}社</span> · 顧客${kokyakuCount} · 業者${gyoushaCount}`;

  // フィルタボタン状態
  const btn = document.getElementById('vendor-filter-btn');
  if(btn) btn.classList.toggle('has-filter', relFilter!=='all' || typeFilter!=='all');

  const area = document.getElementById('vendor-area');
  if(!data.length){
    area.innerHTML = '<div class="empty">該当する取引先がありません</div>';
    return;
  }
  area.innerHTML = data.map(v => buildVendorCard(v)).join('');
}

/* ═══════════════════════════════════════════════════════════
   カードHTML生成
   ═══════════════════════════════════════════════════════════ */
function buildVendorCard(v){
  const mainRel = primaryRel(v.rel||[]);
  const isSelected = selectedIds.has(v.id);

  // バッジ（関係性 + 業種）
  const relBadges = (v.rel||[]).map(r => `<span class="badge b-${r}">${r}</span>`).join('');
  const typeBadges = (v.type||[]).map(t => `<span class="badge b-業種">${t}</span>`).join('');

  // 基本情報（担当・代表）
  const basicHtml = `
    <div class="info-grid">
      ${v.basic?.contact ? `<div class="info-item"><span class="info-label">担当者</span><span class="info-value">${v.basic.contact}</span></div>` : ''}
      ${v.basic?.rep     ? `<div class="info-item"><span class="info-label">代表者</span><span class="info-value">${v.basic.rep}</span></div>` : ''}

      ${fieldHtml('FAX', c.fax)}
      ${fieldHtml('メール', c.mail, c.mail ? `<a href="mailto:${c.mail}">${c.mail}</a>` : null)}
      ${fieldHtml('住所', c.address, null, true)}
      ${c.touroku ? `<div class="info-item fullwidth"><span class="info-label">登録番号</span><span class="info-value">${c.touroku}</span></div>` : ''}
      ${c.furikomi ? `<div class="info-item fullwidth"><span class="info-label">振込先</span><span class="info-value">${c.furikomi}</span></div>` : ''}
    </div>`;

  // 関連案件
  const casesHtml = (v.cases||[]).length ?
    `<div class="case-links">
       ${(v.cases||[]).map(c => `<a class="case-link" href="案件台帳_アートレイズ.html">${c.num?c.num+' ':''}${c.title||''}</a>`).join('')}

    '<div style="color:#999;font-size:13px;">関連案件なし</div>';

  // メモ
  const memoHtml = v.memo ?

    '<div style="color:#999;font-size:13px;">メモなし</div>';

  // 連絡先サマリー（リストの右側に出す値）
  const contactSummary = c.tel || c.mobile || c.mail || '-';
  const caseSummary = (v.cases||[]).length ? `${v.cases.length}件` : 'なし';

  return `
  <div class="vendor-card rel-${mainRel} ${isSelected?'selected':''}">
    <div class="card-header" onclick="toggleCard(this)">
      <input type="checkbox" class="card-checkbox" ${isSelected?'checked':''} onchange="toggleSelect('${v.id}', this)" onclick="event.stopPropagation()">
      <div class="card-header-left">
        <span class="vendor-id">${v.id}</span>
        <span class="vendor-name">${v.name}</span>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;">
        ${relBadges}
      </div>
      <span class="card-toggle">▼</span>
    </div>
    <div class="card-body">
      <div class="nav-list">

        <!-- 基本情報 -->
        <button class="nav-list-item nav-expand" onclick="toggleNavItem(this)">
          <svg class="nav-list-item__icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="16" cy="11" r="4"/><path d="M6 26 Q6 19 16 19 Q26 19 26 26"/>
          </svg>
          <div class="nav-list-item__body">
            <div class="nav-list-item__title">基本情報</div>
            <div class="nav-list-item__desc">${v.basic?.contact || v.basic?.rep || '未登録'}</div>
          </div>
          <div class="nav-list-item__arrow">›</div>
        </button>
        <div class="nav-expand-body">${basicHtml}</div>

        <!-- 連絡先 -->
        <button class="nav-list-item nav-expand" onclick="toggleNavItem(this)">
          <svg class="nav-list-item__icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 10 Q6 7 9 7 L11 7 Q13 7 13 9 L13 12 Q13 14 11 14 Q11 19 16 23 Q21 25 21 21 L24 21 Q26 21 26 23 L26 25 Q26 28 23 28 Q12 28 6 17 Q6 13 6 10"/>
          </svg>
          <div class="nav-list-item__body">
            <div class="nav-list-item__title">連絡先</div>
            <div class="nav-list-item__desc">${c.address || '住所未登録'}</div>
          </div>
          <div class="nav-list-item__value">${contactSummary}</div>
          <div class="nav-list-item__arrow">›</div>
        </button>
        <div class="nav-expand-body">${contactHtml}</div>

        <!-- 業種 -->
        ${(v.type||[]).length ? `
        <button class="nav-list-item nav-expand" onclick="toggleNavItem(this)">
          <svg class="nav-list-item__icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">

          <div class="nav-list-item__body">

          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${relBadges}${typeBadges}

        <!-- 関連案件 -->
        <button class="nav-list-item nav-expand" onclick="toggleNavItem(this)">
          <svg class="nav-list-item__icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="5" width="20" height="22" rx="2"/><line x1="11" y1="11" x2="21" y2="11"/><line x1="11" y1="16" x2="21" y2="16"/><line x1="11" y1="21" x2="17" y2="21"/>
          </svg>
          <div class="nav-list-item__body">
            <div class="nav-list-item__title">関連案件</div>

          <div class="nav-list-item__arrow">›</div>
        </button>
        <div class="nav-expand-body">${casesHtml}</div>

        <!-- メモ -->
        <button class="nav-list-item nav-expand" onclick="toggleNavItem(this)">
          <svg class="nav-list-item__icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 5 L22 5 L26 9 L26 27 L8 27 Z"/><line x1="12" y1="13" x2="22" y2="13"/><line x1="12" y1="17" x2="22" y2="17"/><line x1="12" y1="21" x2="18" y2="21"/>

          </div>

        </button>
        <div class="nav-expand-body">${memoHtml}</div>

      </div>
    </div>

}

/* info-grid フィールドHTMLヘルパー */
function fieldHtml(label, value, linkHtml, fullwidth){
  if(!value){
    return `<div class="info-item${fullwidth?' fullwidth':''}"><span class="info-label">${label}</span><span class="info-value warn"><svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:3px;"><path d="M10 3 L18 16 L2 16 Z"/><line x1="10" y1="8" x2="10" y2="12"/><circle cx="10" cy="14" r="0.5" fill="currentColor"/></svg>未登録</span></div>`;
  }
  const cls = 'info-item' + (fullwidth?' fullwidth':'');
  return `<div class="${cls}"><span class="info-label">${label}</span><span class="info-value">${linkHtml || value}</span></div>`;
}

/* ═══════════════════════════════════════════════════════════
   選択・コピー機能
   ═══════════════════════════════════════════════════════════ */
function toggleSelect(id, cb){
  if(cb.checked){ selectedIds.add(id); }
  else{ selectedIds.delete(id); }
  const card = cb.closest('.vendor-card');
  card.classList.toggle('selected', cb.checked);
  updateCopyBar();
}
function updateCopyBar(){
  const bar = document.getElementById('copyBar');
  const n = selectedIds.size;
  if(n === 0){
    bar.classList.remove('visible');
  }else{
    bar.classList.add('visible');
    document.getElementById('copyBarText').textContent = `${n}社選択中`;
  }
}
function getSelectedNames(){
  return Array.from(selectedIds).map(id => {
    const v = VENDORS.find(v => v.id === id);
    return v ? v.name : '';
  }).filter(Boolean).join('\n');
}
function copySelected(){
  const text = getSelectedNames();
  if(!text) return;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(showCopiedToast).catch(() => fallbackCopy(text));
  }else{
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); showCopiedToast(); }catch(e){}
  document.body.removeChild(ta);
}
function showCopiedToast(){
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}
function clearSelection(){
  selectedIds.clear();
  document.querySelectorAll('.card-checkbox').forEach(cb => cb.checked = false);
  document.querySelectorAll('.vendor-card').forEach(c => c.classList.remove('selected'));
  updateCopyBar();
}
