<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件台帳｜株式会社アート・レイズ</title>
<style>
:root {
  --navy:#1e2d40; --accent:#c8a96e; --white:#fff;
  --bg:#f0f0ee; --border:#ddd; --border-dark:#aaa;
  --text:#333; --text-sub:#666; --light:#f8f8f8;
  --green:#16a34a; --red:#dc2626; --orange:#d97706; --blue:#2563eb;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Meiryo,'Yu Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:14px;padding-bottom:20px;}
.container{max-width:1100px;margin:0 auto;padding:0 16px 24px;}
.page-header{background:var(--navy);color:var(--white);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.page-header h1{font-size:18px;font-weight:700;letter-spacing:0.05em;}
.page-header .meta{font-size:11px;opacity:0.7;text-align:right;}
#sourceBadge{font-size:11px;font-weight:600;margin-top:2px;}
.tab-nav{background:var(--navy);display:flex;border-bottom:2px solid var(--accent);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-btn{padding:10px 18px;border:none;background:transparent;color:rgba(255,255,255,0.6);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s;}
.tab-btn:hover{color:rgba(255,255,255,0.9);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.filter-bar{background:var(--white);border:1px solid var(--border);padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;border-radius:0 0 6px 6px;}
.filter-bar input[type="text"]{flex:1;min-width:180px;padding:7px 10px;border:1px solid var(--border-dark);border-radius:4px;font-size:13px;font-family:inherit;}
.filter-bar input[type="text"]:focus{outline:none;border-color:var(--blue);}
.filter-bar input[type="date"]{padding:6px 8px;border:1px solid var(--border-dark);border-radius:4px;font-size:12px;font-family:inherit;cursor:pointer;}
.filter-label{font-size:11px;color:var(--text-sub);white-space:nowrap;}
.filter-sep{color:var(--border-dark);}
.chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border-dark);background:var(--white);font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.1s;white-space:nowrap;}
.chip.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
.stats-bar{display:flex;background:var(--white);border:1px solid var(--border);border-top:none;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.stats-bar::-webkit-scrollbar{display:none;}
.stat-item{text-align:center;padding:12px 20px;border-right:1px solid var(--border);flex-shrink:0;}
.stat-item:last-child{border-right:none;}
.stat-num{font-size:20px;font-weight:700;color:var(--navy);}
.stat-label{font-size:10px;color:var(--text-sub);margin-top:2px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;overflow:hidden;transition:box-shadow 0.15s;}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.card-header{background:#444;color:var(--white);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;cursor:pointer;user-select:none;}
.card-header:hover{background:#3a3a3a;}
.card-header-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:1;}
.card-id{background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;flex-shrink:0;}
.card-name{font-size:15px;font-weight:700;}
.card-toggle{font-size:12px;opacity:0.6;transition:transform 0.2s;flex-shrink:0;}
.card.open .card-toggle{transform:rotate(180deg);}
.card-body{display:none;padding:16px 20px;}
.card.open .card-body{display:block;}
.badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.b-施工中{background:#0e6b9a;color:#fff;}
.b-受注済{background:#1a7a30;color:#fff;}
.b-完了{background:#6b7280;color:#fff;}
.b-見積提出済み{background:#2563eb;color:#fff;}
.b-見積提出予定{background:#d97706;color:#fff;}
.b-請求済み{background:#6b7280;color:#fff;}
.b-入金済み{background:#4b5563;color:#fff;}
.b-未入金{background:#dc2626;color:#fff;}
.b-締結済み{background:#1a7a30;color:#fff;}
.b-未締結{background:#d97706;color:#fff;}
.b-default{background:#9ca3af;color:#fff;}
.detail-section{border:1px solid var(--border);border-radius:4px;margin-bottom:12px;overflow:hidden;}
.detail-section-header{background:var(--light);padding:8px 14px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:var(--text-sub);border-bottom:1px solid var(--border);}
.detail-section-body{padding:12px 14px;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px 20px;margin-bottom:10px;}
.info-item{display:flex;flex-direction:column;gap:2px;}
.info-label{font-size:10px;color:var(--text-sub);}
.info-value{font-size:13px;font-weight:600;}
.amount{color:var(--navy);font-size:14px;}
.minyukin{color:var(--red);}
.nyukin{color:var(--green);}
.sub-card{border:1px solid var(--border);border-radius:4px;padding:10px 14px;margin-bottom:8px;background:#fafafa;}
.sub-card:last-child{margin-bottom:0;}
.sub-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.sub-id{font-size:12px;font-weight:700;color:var(--blue);}
.note-box{background:#fffbf0;border-left:3px solid #e8d9a0;padding:8px 12px;font-size:12px;color:var(--text-sub);border-radius:0 4px 4px 0;margin-top:8px;line-height:1.7;}
.note-label{font-weight:700;color:#9a7a20;margin-bottom:2px;font-size:11px;}
.pdf-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:4px;font-size:12px;text-decoration:none;margin:4px 4px 0 0;}
.pdf-tag.on{background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd;}
.pdf-tag.on:hover{background:#0369a1;color:#fff;}
.pdf-tag.off{background:#f3f4f6;color:#9ca3af;border:1px solid #e5e7eb;pointer-events:none;}
.drive-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:4px;font-size:12px;text-decoration:none;margin:4px 4px 0 0;background:#e6f4ea;color:#1a7a30;border:1px solid #a8d5b0;}
.drive-tag:hover{background:#1a7a30;color:#fff;}
.drive-tag.off{background:#f3f4f6;color:#9ca3af;border:1px solid #e5e7eb;pointer-events:none;}
.genka-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:8px 0;}
.genka-bar-fill{transition:width 0.3s;}
.genka-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;}
.genka-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:3px;}
.view-card{background:var(--white);border:1px solid var(--border);border-radius:6px;margin-bottom:10px;overflow:hidden;}
.view-card-header{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.view-card-body{padding:14px 16px;}
.view-card-id{font-size:12px;font-weight:700;color:var(--blue);}
.view-card-name{font-size:14px;font-weight:700;color:var(--text);}
.view-anken-ref{font-size:11px;color:var(--text-sub);background:var(--light);padding:2px 8px;border-radius:10px;}
.empty{background:var(--white);border:2px dashed var(--border-dark);border-radius:6px;padding:20px;text-align:center;color:var(--text-sub);font-size:13px;margin-bottom:12px;}
.loading{text-align:center;padding:40px;color:var(--text-sub);font-size:13px;}
@media(max-width:600px){.info-grid{grid-template-columns:1fr 1fr;}.tab-btn{padding:10px 12px;font-size:12px;}}
</style>
</head>
<body>

  <button class="tab-btn" onclick="switchTab('keiyaku')">
    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" style="vertical-align:-3px;margin-right:4px;"><rect x="3" y="2" width="14" height="17" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="6" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="6" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="6" y1="13" x2="14" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="9" y1="15.5" x2="11" y2="15.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>契約書

  <button class="tab-btn" onclick="switchTab('genka')">

</div>
<div class="container">

<!-- 案件ビュー -->
<div id="view-anken">
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num" id="s-total">-</div><div class="stat-label">総案件数</div></div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num" id="r-total">-</div><div class="stat-label">総請求件数</div></div>
    <div class="stat-item"><div class="stat-num" id="r-minyukin" style="color:#dc2626;">-</div><div class="stat-label">未入金</div></div>

</div>
<script>
const BASE_URL='https://kameisatoru-svg.github.io/genba-navi/';
const DATA_URL=BASE_URL+'data.json';
const LS_KEY='artrise_allinone_v1';
let ALL_DATA=[];
let currentTab='anken';
let seikyuFilter='all';
let keiyakuFilter='all';
let ankenStatusFilter='all';

async function loadData(){
  try{
    const res=await fetch(DATA_URL+'?v='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    ALL_DATA=json.案件||[];
    localStorage.setItem(LS_KEY,JSON.stringify(ALL_DATA));
    setSourceBadge('fetch',json.最終更新||'');
    document.getElementById('lastUpdated').textContent='最終更新：'+(json.最終更新||'-');
  }catch(e){
    try{ALL_DATA=JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e2){ALL_DATA=[];}
    setSourceBadge('local','');
  }
  renderAll();
}
function setSourceBadge(type,date){
  const el=document.getElementById('sourceBadge');
  el.innerHTML=type==='fetch'
    ?`<span style="color:#6ee7b7;">● GitHub同期</span>${date?' <span style="opacity:0.6;">('+date+')</span>':''}`
    :`<span style="color:#fbbf24;">● オフライン</span>`;
}
function switchTab(tab){
  currentTab=tab;
  ['anken','mitsumori','seikyu','chumon','keiyaku','genka'].forEach(t=>{
    document.getElementById('view-'+t).style.display=t===tab?'':'none';
  });
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>{
    const tabs=['anken','mitsumori','seikyu','chumon','keiyaku','genka'];
    btn.classList.toggle('active',tabs[i]===tab);
  });
  const fns={anken:renderAnken,mitsumori:renderMitsumori,seikyu:renderSeikyu,chumon:renderChumon,keiyaku:renderKeiyaku,genka:renderGenka};

function renderAnken(){
  const q=document.getElementById('anken-search').value.toLowerCase();
  const data=ALL_DATA.filter(p=>{
    const txt=[p.案件番号,p.工事名,p.法人名,p.代表者,p.施工場所,p.ステータス,p.備考].filter(Boolean).join(' ').toLowerCase();
    return(!q||txt.includes(q))&&(ankenStatusFilter==='all'||p.ステータス===ankenStatusFilter);
  });
  document.getElementById('s-total').textContent=data.length;
  document.getElementById('s-active').textContent=data.filter(p=>p.ステータス==='施工中').length;
  document.getElementById('s-mitsumori').textContent=data.filter(p=>p.ステータス?.includes('見積')).length;
  document.getElementById('s-seikyu').textContent=data.filter(p=>p.ステータス==='請求済み'||p.ステータス==='入金済み').length;
  const amt=data.reduce((s,p)=>{const r=(p.請求||[]).reduce((a,r)=>a+Number(r.請求金額||0),0);return s+(r||Number(p.見積?.見積金額||0));},0);
  document.getElementById('s-amount').textContent=amt?'¥'+Math.round(amt/10000)+'万':'-';
  const statuses=['all',...new Set(ALL_DATA.map(p=>p.ステータス).filter(Boolean))];
  document.getElementById('anken-chips').innerHTML=statuses.map(s=>`<button class="chip ${s===ankenStatusFilter?'active':''}" onclick="setAnkenStatus('${s}')">${s==='all'?'すべて':s}</button>`).join('');
  const area=document.getElementById('anken-area');
  if(!data.length){area.innerHTML='<div class="empty">該当する案件がありません</div>';return;}
  area.innerHTML=data.map(p=>buildAnkenCard(p)).join('');
}

    </div>
    <div class="view-card-body">
      <div class="info-grid">
        <div class="info-item"><span class="info-label">業者名</span><span class="info-value">${c.業者名||'-'}</span></div>
        <div class="info-item"><span class="info-label">注文日</span><span class="info-value">${fmtDate(c.注文日)}</span></div>
        <div class="info-item"><span class="info-label">納期</span><span class="info-value">${fmtDate(c.納期)}</span></div>
      </div>
      <div style="margin-top:8px;">${pdfTag(c.PDF,'注文書PDF')}</div>
    </div>
  </div>`).join('');
}

// ─ 契約書ビュー ─
function setKeiyakuFilter(f){
  keiyakuFilter=f;
  ['all','signed','pending'].forEach(k=>document.getElementById('k-chip-'+k)?.classList.toggle('active',k===f));
  renderKeiyaku();
}
function renderKeiyaku(){
  const q=document.getElementById('k-search').value.toLowerCase();
  const from=document.getElementById('k-from').value;
  const to=document.getElementById('k-to').value;
  const items=ALL_DATA.filter(p=>{
    const k=p.契約書||{};
    const txt=[p.案件番号,p.工事名,p.法人名,p.代表者,k.契約番号].filter(Boolean).join(' ').toLowerCase();
    const isSigned=k.ステータス==='締結済み';
    return(!q||txt.includes(q))&&inRange(k.契約日,from,to)&&(keiyakuFilter==='all'||(keiyakuFilter==='signed'&&isSigned)||(keiyakuFilter==='pending'&&!isSigned));
  });
  const signed=items.filter(p=>p.契約書?.ステータス==='締結済み');
  document.getElementById('k-total').textContent=items.length;
  document.getElementById('k-signed').textContent=signed.length;
  document.getElementById('k-pending').textContent=items.length-signed.length;
  const area=document.getElementById('keiyaku-area');
  if(!items.length){area.innerHTML='<div class="empty">該当する契約書がありません</div>';return;}
  area.innerHTML=items.map(p=>{
    const k=p.契約書||{};
    const isSigned=k.ステータス==='締結済み';
    return`<div class="view-card">
      <div class="view-card-header">
        <div><div class="view-card-name">${p.工事名}</div><div style="margin-top:3px;">${k.契約番号?`<span class="view-card-id">${k.契約番号}</span> `:''}<span class="view-anken-ref">${p.案件番号}</span></div></div>
        <span class="badge ${isSigned?'b-締結済み':'b-未締結'}">${k.ステータス||'未締結'}</span>
      </div>
      <div class="view-card-body">
        <div class="info-grid">
          <div class="info-item"><span class="info-label">顧客</span><span class="info-value">${p.法人名||p.代表者||'-'}</span></div>
          <div class="info-item"><span class="info-label">施工場所</span><span class="info-value">${p.施工場所||'-'}</span></div>
          <div class="info-item"><span class="info-label">契約日</span><span class="info-value">${fmtDate(k.契約日)}</span></div>
          <div class="info-item"><span class="info-label">契約金額</span><span class="info-value amount">${fmtYen(k.契約金額)}</span></div>
        </div>
        <div style="margin-top:8px;">${pdfTag(k.PDF,'契約書PDF')}</div>
      </div>
    </div>`;
  }).join('');
}

// ─ 原価ビュー ─
function renderGenka(){
  const q=document.getElementById('g-search').value.toLowerCase();
  const items=ALL_DATA.filter(p=>{
    const txt=[p.案件番号,p.工事名,p.法人名,p.代表者].filter(Boolean).join(' ').toLowerCase();
    return!q||txt.includes(q);
  });
  let tg=0,tu=0;
  items.forEach(p=>{
    const g=p.原価||{};
    const gt=(g.労務費||0)+(g.材料費||0)+(g.外注費||0)+(g.経費||0);
    const u=(p.請求||[]).reduce((s,r)=>s+Number(r.請求金額||0),0)||Number(p.見積?.見積金額||0);
    tg+=gt;tu+=u;
  });
  const avgRate=tu&&tg?Math.round((1-tg/tu)*100):null;
  document.getElementById('g-total').textContent=items.length;
  document.getElementById('g-total-genka').textContent=fmtYen(tg||null);
  document.getElementById('g-total-uri').textContent=fmtYen(tu||null);
  document.getElementById('g-avg-rate').textContent=avgRate!==null?avgRate+'%':'-';
  const area=document.getElementById('genka-area');
  if(!items.length){area.innerHTML='<div class="empty">該当する案件がありません</div>';return;}
  area.innerHTML=items.map(p=>{
    const g=p.原価||{};
    const gt=(g.労務費||0)+(g.材料費||0)+(g.外注費||0)+(g.経費||0);
    const u=(p.請求||[]).reduce((s,r)=>s+Number(r.請求金額||0),0)||Number(p.見積?.見積金額||0);
    const rate=u&&gt?Math.round((1-gt/u)*100):null;
    const rc=rate===null?'#999':rate>=80?'#1a7a30':rate>=60?'#d97706':'#dc2626';
    return`<div class="view-card">
      <div class="view-card-header">
        <div><div class="view-card-name">${p.工事名}</div><div style="margin-top:3px;"><span class="view-anken-ref">${p.案件番号}</span></div></div>
        <div style="text-align:right;">${rate!==null?`<div style="font-size:18px;font-weight:700;color:${rc};">粗利率 ${rate}%</div>`:'<div style="color:#999;font-size:12px;">原価未入力</div>'}</div>
      </div>
      <div class="view-card-body">
        <div class="info-grid">
          <div class="info-item"><span class="info-label">売上</span><span class="info-value amount nyukin">${fmtYen(u||null)}</span></div>
          <div class="info-item"><span class="info-label">原価合計</span><span class="info-value amount minyukin">${fmtYen(gt||null)}</span></div>
          <div class="info-item"><span class="info-label">粗利</span><span class="info-value amount" style="color:${rc};">${u&&gt?fmtYen(u-gt):'-'}</span></div>
          <div class="info-item"><span class="info-label">労務費</span><span class="info-value">${fmtYen(g.労務費||null)}</span></div>
          <div class="info-item"><span class="info-label">材料費</span><span class="info-value">${fmtYen(g.材料費||null)}</span></div>
          <div class="info-item"><span class="info-label">外注費</span><span class="info-value">${fmtYen(g.外注費||null)}</span></div>
          <div class="info-item"><span class="info-label">経費</span><span class="info-value">${fmtYen(g.経費||null)}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

loadData();
</script>
