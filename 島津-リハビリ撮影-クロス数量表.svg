<text x="32" y="437" font-size="15" fill="#222">○ 壁クロス正味 ≒ <tspan font-weight="bold">49㎡</tspan>（見_改2）＋柱巻込分 ≒ +2.6㎡／天井 ≒ <tspan font-weight="bold">20㎡</tspan>。切寸計 ≒ <tspan font-weight="bold">86m</tspan>／発注目安 計 ≒ <tspan font-weight="bold">94m</tspan>。</text>
