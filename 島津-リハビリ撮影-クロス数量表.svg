<text x="490" y="730" font-size="13.5" fill="#222">クロスは柱の <tspan font-weight="bold" fill="#c0392b">前面670 ＋ 両側面459×2</tspan> を1面で通し貼り。</text>
<text x="490" y="758" font-size="16" fill="#222">展開長 ＝ 5073 ＋ 459×2 ＝ <tspan font-weight="bold" fill="#c0392b">5991mm</tspan></text>
<text x="490" y="783" font-size="16" fill="#222">920巾 → <tspan font-weight="bold" fill="#c0392b">実材7短冊</tspan>（①の正面は見かけ6面・柱側面分で+1本）</text>
<text x="32" y="850" font-size="14.5" font-weight="bold" fill="#7a4a00">※ 発注前の確認事項</text>
<text x="32" y="874" font-size="13" fill="#7a4a00">・柄合わせ要：A面 FE-76751(タテ642)・D面 FE-76728(タテ321ステップ)＝各短冊の切寸をリピート倍数へ切上済（表に反映）。</text>
<text x="32" y="898" font-size="13" fill="#7a4a00">・FE-76728 はステップ(半割れ)柄＝隣接短冊を½リピートずらすため、端短冊で +½リピート程度のロスを別途見込む。</text>
<text x="32" y="922" font-size="13" fill="#7a4a00">・短冊本数は開口(窓・ドア)上も通しで取り、開口部は現場カット＝保守的な通し本数。端短冊は入隅で回す/逃がす。</text>
<text x="32" y="946" font-size="13" fill="#7a4a00">・壁柱の突出459は現地スケッチ値。実測でB面短冊数(境界6.5付近)が変わり得るため、発注前に柱の見込寸法を実測確認。</text>
<text x="32" y="970" font-size="13" fill="#7a4a00">・無地貼可：C面 FE-76251／リピート無：B面 FE-76109・天井 FE-76202＝柄合わせ不要。天井ルーバー(エアー吹出)開口は別途カット。</text>
<text x="32" y="998" font-size="12" fill="#555">寸法は清書基準・概略。発注前にサンゲツ在庫・ロット・巾(92cm)・50m乱単位を最終確認すること。</text>
</svg>