<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1188 840" font-family="'Noto Sans CJK JP','Noto Sans JP','IPAGothic','Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif">
  <rect x="0" y="0" width="1188" height="840" fill="#fff"/>
  <text x="24" y="38" font-size="20" font-weight="bold" fill="#1a2a3a">■大分リハビリテーション病院 一般撮影室 内装仕上げリスト</text>
  <text x="1164" y="38" font-size="12" fill="#555" text-anchor="end">2026/06/17</text>
  <text x="24" y="60" font-size="11" fill="#c0392b">※スウォッチは代表色（実サンプルは別途ご確認）。品番は清書/仕上げ表と一致。</text>

  <!-- 表枠 -->
  <g stroke="#888" stroke-width="1" fill="none">
    <rect x="20" y="74" width="1148" height="700"/>
    <line x1="130" y1="74" x2="130" y2="774"/>
    <line x1="470" y1="74" x2="470" y2="774"/>
    <line x1="20" y1="104" x2="1168" y2="104"/>   <!-- ヘッダ下 -->
    <line x1="20" y1="262" x2="1168" y2="262"/>   <!-- 天井下 -->
    <line x1="20" y1="450" x2="1168" y2="450"/>   <!-- 壁下 -->
    <line x1="20" y1="608" x2="1168" y2="608"/>   <!-- 床下 -->
  </g>
  <rect x="20" y="74" width="1148" height="30" fill="#eef2f6"/>
  <g font-size="13" font-weight="bold" fill="#1a2a3a" text-anchor="middle">
    <text x="75" y="94">面</text>
    <text x="300" y="94">スウォッチ（代表色）</text>
    <text x="819" y="94">品番・仕上・備考</text>
  </g>
  <g font-size="14" font-weight="bold" fill="#1a2a3a" text-anchor="middle">
    <text x="75" y="188">天井</text>
    <text x="75" y="362">壁</text>
    <text x="75" y="535">床</text>
    <text x="75" y="695">巾木</text>
  </g>

  <!-- 天井: FE-76202 -->
  <rect x="225" y="125" width="150" height="110" fill="#e9e3d6" stroke="#b9b09c" stroke-width="1"/>
  <text x="300" y="252" font-size="11" fill="#222" text-anchor="middle" font-weight="bold">FE-76202</text>
  <g font-size="11.5" fill="#222">
    <text x="486" y="160">ビニルクロス（サンゲツ）</text>
    <text x="486" y="182" font-weight="bold">FE-76202</text>
    <text x="486" y="204">ルーバー（エアー吹出）有</text>
    <text x="486" y="226" fill="#2a6da3">貼り方向＝横流れ（920×6帯／3618方向）</text>
  </g>

  <!-- 壁: 4面 FE -->
  <g>
    <rect x="135" y="290" width="78" height="78" fill="#e9e3d6" stroke="#b9b09c"/>
    <text x="174" y="384" font-size="9.5" fill="#222" text-anchor="middle">A:FE-76751</text>
    <rect x="223" y="290" width="78" height="78" fill="#ece7dc" stroke="#b9b09c"/>
    <text x="262" y="384" font-size="9.5" fill="#222" text-anchor="middle">C:FE-76251</text>
    <rect x="311" y="290" width="78" height="78" fill="#e3ddcf" stroke="#b9b09c"/>
    <text x="350" y="384" font-size="9.5" fill="#222" text-anchor="middle">D:FE-76728</text>
    <rect x="399" y="290" width="62" height="78" fill="#e6e0d2" stroke="#b9b09c"/>
    <text x="430" y="384" font-size="9.5" fill="#222" text-anchor="middle">B:FE-76109</text>
  </g>
  <g font-size="11.5" fill="#222">
    <text x="486" y="312">ビニルクロス（サンゲツ FE／面別4種）</text>
    <text x="486" y="334">A面 操作室側 <tspan font-weight="bold">FE-76751</tspan>　／　C面 廊下側 <tspan font-weight="bold">FE-76251</tspan></text>
    <text x="486" y="356">D面 受付側 <tspan font-weight="bold">FE-76728</tspan>　／　B面 空室側 <tspan font-weight="bold">FE-76109</tspan></text>
    <text x="486" y="380" fill="#2a6da3">貼り方向＝縦貼り（A/C面4短冊・B/D面6短冊）</text>
    <text x="486" y="404">数量 約49㎡（開口控除）</text>
  </g>

  <!-- 床: PT-105M -->
  <rect x="225" y="470" width="150" height="110" fill="#cfe3f0" stroke="#7fa6bd" stroke-width="1"/>
  <text x="300" y="598" font-size="11" fill="#222" text-anchor="middle" font-weight="bold">PT-105M</text>
  <g font-size="11.5" fill="#222">
    <text x="486" y="505">長尺シート</text>
    <text x="486" y="527" font-weight="bold">PT-105M</text>
    <text x="486" y="549" fill="#2a6da3">流れ＝縦（巾1820縦割り2列・縦継ぎ1本）</text>
    <text x="486" y="571">数量 約18㎡</text>
  </g>

  <!-- 巾木: 田島No.80 -->
  <rect x="200" y="650" width="200" height="34" fill="#c8ccd2" stroke="#8a8f96" stroke-width="1"/>
  <text x="300" y="704" font-size="11" fill="#222" text-anchor="middle" font-weight="bold">田島 No.80</text>
  <g font-size="11.5" fill="#222">
    <text x="486" y="668">ソフト巾木</text>
    <text x="486" y="690" font-weight="bold">田島 No.80</text>
    <text x="486" y="712" fill="#c0392b">※「80」は品番（高さではない）。高さは要確認</text>
  </g>
</svg>
