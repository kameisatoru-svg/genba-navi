<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積書 - 株式会社アート・レイズ</title>
<style>
  :root {
    --text:#111111;--text-sub:#444444;--white:#ffffff;
    --band:#555555;--band-dark:#444444;--band-mid:#666666;
    --even:#f4f4f4;--subtotal-bg:#e8e8e8;--border:#bbbbbb;
    --border-dark:#888888;--light:#f8f8f8;
  }
  @page{margin:0;size:A4;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;}
  body{font-family:"Meiryo","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:#e0e0e0;color:var(--text);font-size:14px;line-height:1.65;}
  .page{width:210mm;min-height:297mm;margin:0 auto;background:var(--white);padding:13mm 15mm;}
  @media screen{.page{margin-bottom:24px;box-shadow:0 2px 16px rgba(0,0,0,.18);}}
  @media print{body{background:#fff;}.page{margin:0;padding:11mm 13mm;box-shadow:none;}}
  .header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--text);padding-bottom:10px;margin-bottom:14px;}
  .header-left{position:relative;display:block;}
  .company-name{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:0.06em;line-height:1.3;}
  .company-name .co-prefix{font-size:15px;font-weight:400;letter-spacing:0.1em;}
  .company-info{font-size:11.5px;color:var(--text-sub);margin-top:5px;line-height:1.9;}
  .kakuin{width:64px;height:64px;position:absolute;top:-13px;right:-11px;}
  .doc-title{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:28px;font-weight:700;color:var(--text);letter-spacing:0.18em;text-align:right;}
  .doc-meta{font-size:11.5px;color:var(--text-sub);text-align:right;margin-top:6px;line-height:2;}
  .info-section{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;}
  .client-name{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:21px;font-weight:600;color:var(--text);border-bottom:2px solid var(--text);padding-bottom:4px;padding-right:50px;min-width:200px;}
  .summary-box{background:var(--band-dark)!important;color:var(--white)!important;padding:12px 22px;border-radius:3px;text-align:right;}
  .summary-box .s-label{font-size:11px;color:#e0e0e0!important;letter-spacing:0.08em;}
  .summary-box .total-amount{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:26px;font-weight:700;color:var(--white)!important;margin-top:2px;letter-spacing:0.04em;}
  .summary-box .tax-note{font-size:11px;color:#e0e0e0!important;margin-top:3px;}
  .project-band{background:var(--band)!important;border-left:5px solid var(--text);padding:8px 14px;margin-bottom:16px;font-size:12.5px;color:var(--white)!important;display:flex;flex-wrap:wrap;align-items:center;gap:4px 28px;}
  .band-label{color:#dddddd!important;margin-right:4px;}
  .koji-name{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:16px;font-weight:700;line-height:1.2;}
  .section-title{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:14px;font-weight:600;color:var(--text);border-bottom:2px solid var(--text);padding-bottom:4px;margin-bottom:10px;letter-spacing:0.08em;}
  .estimate-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:8px;border:1px solid var(--border-dark);}
  .estimate-table thead th{background:var(--band)!important;color:var(--white)!important;padding:8px 10px;font-weight:700;font-size:12px;letter-spacing:0.05em;border-right:1px solid var(--band-mid);}
  .estimate-table thead th:first-child{text-align:left;}
  .estimate-table thead th:not(:first-child){text-align:right;}
  .estimate-table tbody tr{border-bottom:1px solid var(--border);}
  .estimate-table tbody tr:nth-child(even){background:var(--even)!important;}
  .estimate-table tbody td{padding:9px 10px;vertical-align:middle;color:var(--text);border-right:1px solid var(--border);}
  .estimate-table tbody td:first-child{text-align:left;}
  .estimate-table tbody td:not(:first-child){text-align:right;}
  .estimate-table .subtotal-row td{background:var(--subtotal-bg)!important;font-weight:700;font-size:13px;}
  .totals-wrap{display:flex;justify-content:flex-end;margin-top:14px;margin-bottom:20px;}
  .totals-table{width:340px;border-collapse:collapse;font-size:13px;border:1px solid var(--border-dark);}
  .totals-table td{padding:8px 14px;border-bottom:1px solid var(--border);color:var(--text);}
  .totals-table td:last-child{text-align:right;}
  .totals-table .t-subtotal td{background:var(--subtotal-bg)!important;font-weight:600;}
  .totals-table .t-final{background:var(--band-dark)!important;}
  .totals-table .t-final td{padding:11px 14px;font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:15px;font-weight:700;color:var(--white)!important;border-bottom:none;}
  .note-box{border:1px solid var(--border-dark);border-radius:3px;padding:10px 14px;margin-bottom:18px;background:var(--light);font-size:12px;color:var(--text-sub);line-height:2;}
  .note-title{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:0.06em;border-bottom:1px solid var(--border);padding-bottom:5px;}
  .footer{margin-top:16px;border-top:1px solid var(--border-dark);padding-top:8px;display:flex;justify-content:space-between;font-size:11px;color:var(--text-sub);}
  .validity{font-size:11.5px;color:var(--text-sub);text-align:right;margin-bottom:14px;}
  .page-break{page-break-before:always;}
  .detail-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;border:1px solid var(--border-dark);}
  .detail-table thead th{background:var(--band)!important;color:var(--white)!important;padding:5px 8px;font-weight:700;border-right:1px solid var(--band-mid);}
  .detail-table thead th:first-child{text-align:left;}
  .detail-table thead th:not(:first-child){text-align:right;}
  .detail-table tbody tr{border-bottom:1px solid var(--border);}
  .detail-table tbody tr:nth-child(even){background:var(--even)!important;}
  .detail-table tbody td{padding:5px 8px;vertical-align:middle;border-right:1px solid var(--border);}
  .detail-table tbody td:first-child{text-align:left;}
  .detail-table tbody td:not(:first-child){text-align:right;}
  .detail-table .section-header td{background:var(--band-dark)!important;color:var(--white)!important;font-weight:700;font-size:11.5px;padding:4px 8px;}
  .detail-table .subtotal-row td{background:var(--subtotal-bg)!important;font-weight:700;}
</style>
</head>
