<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fold5 ビューア</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;
  background:#111;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  overflow-y:auto;
  padding:24px 0;
}
.fold{
  position:relative;
  /* Fold5内画面 縦使い：904×1076px CSSピクセル */
  /* フレーム込みで縮小表示（実画面に収まるよう0.7倍） */
  width:632px;   /* 904×0.7 */
  height:770px;  /* 1100×0.7 */
  flex-shrink:0;
}
.fold-screen{
  position:absolute;
  top:14px;left:10px;right:10px;bottom:14px;
  border-radius:18px;
  overflow:hidden;
  background:#f8f8f6;
}
iframe{
  width:1286px;   /* 904×(1/0.7) */
  height:1100px;
  border:none;
  display:block;
  transform:scale(0.7);
  transform-origin:top left;
}
svg.frame{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:10;
}
</style>
</head>
<body>
<div class="fold">
  <div class="fold-screen">
    <iframe src="floor_plan.html"></iframe>
  </div>
  <svg class="frame" viewBox="0 0 632 770" xmlns="http://www.w3.org/2000/svg">
    <!-- 外枠 -->
    <rect x="1" y="1" width="630" height="768" rx="28" fill="none" stroke="#3a3a3c" stroke-width="8"/>
    <!-- 内枠 -->
    <rect x="5" y="5" width="622" height="760" rx="24" fill="none" stroke="#222" stroke-width="3"/>
    <!-- パンチホール（フロントカメラ） -->
    <circle cx="316" cy="18" r="5" fill="#1c1c1e"/>
    <!-- ホームバー -->
    <rect cx="316" cy="755" width="80" height="5" rx="2.5" x="276" y="752" fill="#3a3a3c"/>
    <!-- 音量ボタン左 -->
    <rect x="0" y="180" width="4" height="55" rx="2" fill="#2a2a2a"/>
    <rect x="0" y="245" width="4" height="55" rx="2" fill="#2a2a2a"/>
    <!-- 電源ボタン右 -->
    <rect x="628" y="210" width="4" height="80" rx="2" fill="#2a2a2a"/>

  </svg>
</div>
</body>
</html>
