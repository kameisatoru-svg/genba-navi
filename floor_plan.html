<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>floor_plan - 現場ナビPRO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#1a1a1a;font-family:'Meiryo','Yu Gothic',system-ui,sans-serif;}
#app{display:flex;flex-direction:column;height:100%;width:100%;background:#f8f8f6;position:relative;overflow:hidden;}

/* キャンバスエリア */
#canvas-area{flex:1;position:relative;min-height:0;background:#f0f0ec;}
#cv{display:block;touch-action:none;}

/* ステータスバー */
#status-bar{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.92);border:0.5px solid rgba(0,0,0,0.12);
  border-radius:16px;padding:4px 14px;font-size:11px;color:#555;
  white-space:nowrap;pointer-events:none;z-index:5;max-width:80%;
  backdrop-filter:blur(4px);
}
#err-bar{
  position:absolute;top:36px;left:50%;transform:translateX(-50%);
  background:#fee;border:0.5px solid #fbb;
  border-radius:16px;padding:4px 14px;font-size:11px;color:#c33;
  pointer-events:none;z-index:6;max-width:88%;display:none;
}
#fitview-btn{
  position:absolute;top:8px;right:8px;height:32px;border-radius:16px;
  border:0.5px solid rgba(0,0,0,0.15);background:rgba(255,255,255,0.9);
  color:#444;font-size:11px;cursor:pointer;padding:0 10px;z-index:5;display:none;
  font-family:inherit;
}

/* ボトムバー */
#bottombar{
  height:60px;background:#fff;border-top:0.5px solid #e0e0e0;
  display:flex;align-items:center;justify-content:space-around;
  padding:0 4px;flex-shrink:0;z-index:10;
}
.bb-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:8px;min-width:52px;
}
.bb-btn.active .bb-icon{background:#e8eeff;}
.bb-btn.active .bb-label{color:#534AB7;}
.bb-icon{
  width:44px;height:44px;border-radius:10px;background:#f2f2f2;
  display:flex;align-items:center;justify-content:center;
}
.bb-btn.active .bb-icon svg{stroke:#534AB7;}
.bb-label{font-size:10px;color:#888;font-family:inherit;}

/* パネル */
#panel{
  position:absolute;bottom:60px;left:0;right:0;
  background:#fff;border-top:0.5px solid #ddd;
  z-index:30;max-height:288px;overflow-y:auto;
}
#panel.hidden{display:none;}
#panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 6px;border-bottom:0.5px solid #eee;
  position:sticky;top:0;background:#fff;z-index:2;
}
.panel-title{font-size:13px;font-weight:500;color:#222;}
.close-btn{font-size:20px;color:#999;background:none;border:none;cursor:pointer;padding:2px 8px;line-height:1;}
#panel-body{padding:10px 14px 16px;}

/* ホイールオーバーレイ */
#wheel-overlay{
  position:absolute;bottom:60px;left:0;right:0;
  background:#fff;border-top:0.5px solid #ddd;z-index:20;padding:12px 0 10px;
}
#wheel-overlay.hidden{display:none;}
#wheel-inner{display:flex;align-items:center;gap:14px;padding:0 14px;}
#wheel-canvas{display:block;flex-shrink:0;touch-action:none;}
#wheel-right{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;}
#angle-disp{font-size:26px;font-weight:500;font-family:monospace;color:#222;line-height:1;}
#dir-disp{font-size:12px;color:#888;}
.len-row{display:flex;align-items:center;gap:8px;}
#len-val{
  flex:1;height:52px;font-size:22px;font-weight:500;
  border:0.5px solid #ccc;border-radius:10px;padding:0 12px;
  background:#fff;color:#222;text-align:right;min-width:0;font-family:monospace;
}
.wbtn-row{display:flex;gap:8px;flex-wrap:wrap;}
.wbtn{
  height:44px;border-radius:22px;border:0.5px solid #ddd;
  background:#f5f5f5;color:#333;font-size:12px;cursor:pointer;
  padding:0 16px;white-space:nowrap;font-family:inherit;
}
.wbtn.primary{background:#534AB7;color:#fff;border-color:#534AB7;}
.wbtn.success{background:#2d7d3a;color:#fff;border-color:#2d7d3a;}
.wbtn.danger{color:#c33;border-color:#fbb;}
.wbtn:disabled{opacity:0.35;cursor:default;}
.seg-list{max-height:36px;overflow-y:auto;}
.seg-row{font-size:10px;color:#888;font-family:monospace;padding:1px 0;}

/* 基準点オーバーレイ */
#anchor-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:40;
}
#anchor-overlay.hidden{display:none;}
#anchor-box{
  background:#fff;border-radius:12px;padding:20px;width:88%;max-width:380px;
}

/* 閉じるダイアログ */
#close-dialog{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:50;
}
#close-dialog.hidden{display:none;}
#close-dialog-box{background:#fff;border-radius:12px;padding:20px;width:88%;max-width:360px;}
.dialog-title{font-size:14px;font-weight:500;color:#222;margin-bottom:8px;}
.dialog-err{font-size:12px;color:#c33;line-height:1.8;margin-bottom:14px;padding:8px 10px;background:#fee;border-radius:6px;}
.dialog-ok{font-size:12px;color:#2d7d3a;line-height:1.8;margin-bottom:14px;padding:8px 10px;background:#efe;border-radius:6px;}
.dialog-body{font-size:12px;color:#666;line-height:1.8;margin-bottom:14px;}
.dialog-btns{display:flex;gap:8px;flex-wrap:wrap;}
.dbtn{
  height:44px;border-radius:22px;border:0.5px solid #ddd;
  background:#f5f5f5;color:#333;font-size:12px;cursor:pointer;padding:0 18px;
  white-space:nowrap;font-family:inherit;
}
.dbtn.success{background:#2d7d3a;color:#fff;border-color:#2d7d3a;}
.dbtn.danger{color:#c33;border-color:#fbb;}

/* フォーム共通 */
.f-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.f-label{font-size:12px;color:#666;width:84px;flex-shrink:0;}
.f-row input,.f-row select{
  flex:1;height:36px;border:0.5px solid #ccc;border-radius:8px;
  padding:0 10px;font-size:13px;background:#fff;color:#222;font-family:inherit;
}
.f-unit{font-size:12px;color:#888;white-space:nowrap;}
.btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.abtn{
  height:44px;border-radius:22px;border:0.5px solid #ddd;
  background:#f5f5f5;color:#333;font-size:12px;cursor:pointer;
  padding:0 18px;white-space:nowrap;font-family:inherit;
}
.abtn.primary{background:#534AB7;color:#fff;border-color:#534AB7;}
.abtn.warn{background:#b87d00;color:#fff;border-color:#b87d00;}
.abtn.danger{color:#c33;border-color:#fbb;}
.sdiv{
  font-size:11px;color:#888;margin:10px 0 8px;
  padding-bottom:4px;border-bottom:0.5px solid #eee;
}
.note{
  font-size:11px;color:#666;margin-bottom:8px;
  padding:6px 10px;background:#f8f8f8;border-radius:6px;line-height:1.7;
}

/* 間仕切りパネル用 */
.wall-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 0;border-bottom:0.5px solid #eee;font-size:11px;color:#666;font-family:monospace;
}
.wall-del{background:none;border:none;color:#c33;cursor:pointer;font-size:14px;padding:0 4px;}

/* 部屋カード */
.room-card{border:0.5px solid #ddd;border-radius:8px;padding:8px 10px;margin-bottom:8px;background:#fafafa;}
.room-card-hd{font-size:12px;font-weight:500;color:#222;margin-bottom:6px;}

/* レイヤーパネル */
.layer-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid #eee;}
.layer-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0;}
.layer-label{font-size:13px;flex:1;color:#222;}
.layer-toggle{
  width:48px;height:28px;border-radius:14px;
  border:0.5px solid #534AB7;background:#534AB7;color:#fff;
  font-size:11px;cursor:pointer;font-family:inherit;
}
.layer-toggle.off{background:#f5f5f5;color:#888;border-color:#ddd;}
</style>
</head>
<body>
<div id="app">
  <div id="canvas-area">
    <canvas id="cv"></canvas>
    <div id="status-bar">外周パネルから設定を開始してください</div>
    <div id="err-bar"></div>
    <button id="fitview-btn" onclick="GN.fitView()">全体表示</button>
  </div>

  <!-- ホイールオーバーレイ -->
  <div id="wheel-overlay" class="hidden">
    <div id="wheel-inner">
      <canvas id="wheel-canvas" width="200" height="200"></canvas>
      <div id="wheel-right">
        <div id="angle-disp">0°</div>
        <div id="dir-disp">→ 右方向</div>
        <div class="len-row">
          <input type="number" id="len-val" placeholder="長さ mm" min="0" step="1">
          <button class="wbtn primary" style="height:52px;padding:0 16px;font-size:13px;" onclick="GN.addSeg()">確定</button>
        </div>
        <div class="wbtn-row">
          <button class="wbtn success" id="btn-close-poly" disabled onclick="GN.tryClose()">閉じる</button>
          <button class="wbtn danger" onclick="GN.undoSeg()">1辺戻す</button>
          <button class="wbtn" onclick="GN.openPanel('skeleton')">設定</button>
        </div>
        <div class="seg-list" id="seg-list"></div>
      </div>
    </div>
  </div>



  <!-- 閉じるダイアログ -->
  <div id="close-dialog" class="hidden">
    <div id="close-dialog-box">
      <div class="dialog-title" id="dlg-title">外周を閉じる</div>
      <div id="dlg-content"></div>
      <div class="dialog-btns" id="dlg-btns"></div>
    </div>
  </div>

  <!-- ボトムバー -->
  <div id="bottombar">
    <button class="bb-btn active" id="bb-skeleton" onclick="GN.setMode('skeleton')">
      <div class="bb-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/></svg></div>
      <span class="bb-label">外周</span>
    </button>
    <button class="bb-btn" id="bb-partition" onclick="GN.setMode('partition')">
      <div class="bb-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="13" x2="12" y2="13"/></svg></div>
      <span class="bb-label">間仕切り</span>
    </button>
    <button class="bb-btn" id="bb-opening" onclick="GN.setMode('opening')">
      <div class="bb-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="9" y1="21" x2="9" y2="15"/><path d="M9 15 Q15 15 15 21"/></svg></div>
      <span class="bb-label">開口部</span>
    </button>
    <button class="bb-btn" id="bb-layer" onclick="GN.setMode('layer')">
      <div class="bb-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8"><polygon points="12 2 22 8.5 12 15 2 8.5"/><polyline points="2 15 12 21.5 22 15"/><polyline points="2 11.5 12 18 22 11.5"/></svg></div>
      <span class="bb-label">レイヤー</span>
    </button>
    <button class="bb-btn" id="bb-setting" onclick="GN.setMode('setting')">
      <div class="bb-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg></div>
      <span class="bb-label">設定</span>
    </button>
  </div>

  <!-- パネル -->
  <div id="panel">
    <div id="panel-header">
      <span class="panel-title" id="panel-title">外周・現場設定</span>
      <button class="close-btn" onclick="GN.closePanel()">×</button>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

<script>
var GN = (function(){
  // カラー定義
  var C = {
    bg:'#f0f0ec', grid:'rgba(0,0,0,0.05)',
    skel:'#534AB7', skelF:'rgba(83,74,183,0.06)',
    guideF:'rgba(83,74,183,0.03)', guideDash:'rgba(83,74,183,0.28)',
    cur:'rgba(15,110,86,0.9)', pt:'#E24B4A',
    anc:'rgba(24,95,165,0.9)',
    snapOk:'rgba(59,109,17,0.9)', snapWn:'rgba(186,117,23,0.9)',
    lbl:'#333', dim:'#bbb',
    partF:'rgba(127,119,221,0.15)', part:'#7F77DD',
    partSel:'#E24B4A', partSelF:'rgba(226,75,74,0.12)',
    roomFills:[
      'rgba(59,139,221,0.07)','rgba(29,158,117,0.07)',
      'rgba(186,117,23,0.07)','rgba(83,74,183,0.07)',
      'rgba(99,153,34,0.07)','rgba(163,45,45,0.07)',
    ],
    wTr:'rgba(0,0,0,0.06)', wAF:'rgba(83,74,183,0.14)',
    wNd:'#E24B4A', wTk:'rgba(0,0,0,0.18)', wTM:'rgba(0,0,0,0.35)',
    wLb:'#666', wCn:'#efefef', wTx:'#222',
  };

  var STEP=15;
  var CEILT=[
    {value:'skeleton',label:'スケルトン'},
    {value:'existing_reuse',label:'既存天井あり・転用'},
    {value:'existing_renew',label:'既存天井あり・解体新設'},
  ];
  var LAYERS=[
    {key:'skeleton',  label:'外周壁',    color:'#534AB7'},
    {key:'partition', label:'間仕切り',  color:'#7F77DD'},
    {key:'opening',   label:'開口部',    color:'#E24B4A'},
    {key:'ceiling',   label:'天井',      color:'#3B6D11'},
    {key:'lighting',  label:'照明',      color:'#BA7517'},
    {key:'electrical',label:'電気設備',  color:'#185FA5'},
    {key:'sanitary',  label:'衛生設備',  color:'#0F6E56'},
    {key:'hvac',      label:'空調・換気',color:'#639922'},
    {key:'furniture', label:'家具・什器',color:'#5F5E5A'},
    {key:'dimension', label:'寸法線',    color:'#888780'},
  ];

  var CV=document.getElementById('cv');
  var CTX=CV.getContext('2d');
  var WCV=document.getElementById('wheel-canvas');
  var WCX=WCV.getContext('2d');
  var CA=document.getElementById('canvas-area');
  var WCX_R=100,WCY_R=100,WR=72,WRI=28;
  var TCH={a:false,l:null,pd:null,pm:null};
  var PAN={active:false,x:0,y:0}; // 中ボタンパン用
  var ET=null;
  var nextWallId=1;

  // アプリ状態
  var _W=9000,_D=6000;
  var S={
    name:'テスト現場',str:'RC',ct:'skeleton',ch:2800,
    gW:_W,gH:_D,thr:100,
    phase:'confirmed',
    segs:[
      {angle:0,  len:_W,dx:_W, dy:0,  isFinal:true},
      {angle:90, len:_D,dx:0,  dy:_D, isFinal:true},
      {angle:180,len:_W,dx:-_W,dy:0,  isFinal:true},
      {angle:270,len:_D,dx:0,  dy:-_D,isFinal:true},
    ],
    pts:[{x:0,y:0},{x:_W,y:0},{x:_W,y:_D},{x:0,y:_D},{x:0,y:0}],
    cerr:{dx:0,dy:0,total:0,abs:'distributed'},
    selectingSegs:false,
    lockedSegs:[],
    closeAngleDeg:0,
    vSC:1,vOX:40,vOY:40,
    wAng:0,wDrag:false,
    mode:'partition',
    // 間仕切り
    walls:[],
    selectedWall:null,
    addWallMode:false,
    addWallStep:0,
    addWallP1:null,
    wallDrag:false,
    wallDragStart:0,
    wallDragMouse:0,
    lastCursorPx:null,
    // 部屋
    rooms:[],
    // レイヤー表示
    layerVis:{skeleton:true,partition:true,opening:true,ceiling:true,lighting:true,electrical:true,sanitary:true,hvac:true,furniture:true,dimension:true},
  };

  // セッター
  function setName(v){S.name=(v||'').trim();}
  function setStr(v){S.str=v;}
  function setCt(v){S.ct=v;}
  function setCh(v){S.ch=parseInt(v)||2800;}
  function setGW(v){S.gW=parseInt(v)||0;}
  function setGH(v){S.gH=parseInt(v)||0;}
  function setThr(v){S.thr=parseInt(v)||100;}

  // ユーティリティ
  function gnPX(m){return S.vOX+m*S.vSC;}
  function gnPY(m){return S.vOY+m*S.vSC;}
  function gnMX(p){return(p-S.vOX)/S.vSC;}
  function gnMY(p){return(p-S.vOY)/S.vSC;}
  function gnSnap(a){return Math.round(a/STEP)*STEP;}
  function gnRad(d){return d*Math.PI/180;}
  function gnMax(a){return a.reduce(function(m,v){return v>m?v:m;},-Infinity);}
  function gnMin(a){return a.reduce(function(m,v){return v<m?v:m;},Infinity);}
  function snap50(v){return Math.round(v/50)*50;}

  function gnErr(msg){
    var el=document.getElementById('err-bar');
    el.textContent=msg;el.style.display='block';
    clearTimeout(ET);ET=setTimeout(function(){el.style.display='none';},3000);
  }
  function gnDirLbl(deg){
    var d=(((deg%360)+360)%360);
    var m={0:'→ 右',90:'↓ 下',180:'← 左',270:'↑ 上',45:'↘',135:'↙',225:'↖',315:'↗'};
    return (m[d]||d+'°')+' 方向';
  }
  function gnRealSegs(){return S.segs;}
  function gnDrawPts(){return S.pts;}
  function gnCloseTgt(){return S.pts[0];}
  function gnCloseErr(){
    var l=S.pts[S.pts.length-1],t=gnCloseTgt();
    var dx=t.x-l.x,dy=t.y-l.y;
    return{dx:Math.round(dx),dy:Math.round(dy),total:Math.round(Math.sqrt(dx*dx+dy*dy))};
  }
  function gnCalcView(w,h,offY){
    var mg=30,aW=CA.offsetWidth,aH=CA.offsetHeight-(offY||0);
    if(aW<=0)aW=816;if(aH<=0)aH=600; // フォールバック
    S.vSC=Math.min((aW-mg*2)/w,(aH-mg*2)/h,3);
    S.vOX=Math.round(mg+(aW-mg*2-w*S.vSC)/2);
    S.vOY=Math.round(mg+(aH-mg*2-h*S.vSC)/2);
  }
  function skelBounds(){
    var dp=gnDrawPts();if(dp.length<2)return null;
    var xs=dp.map(function(p){return p.x;}),ys=dp.map(function(p){return p.y;});
    return{minX:gnMin(xs),maxX:gnMax(xs),minY:gnMin(ys),maxY:gnMax(ys)};
  }

  // 部屋自動生成
  // 壁のfrom/toを考慮：セルをその境界で分断する壁が存在するかチェック
  function wallSplitsCell(type,coord,from,to,cellMin,cellMax,cellCoord){
    // cellCoordはセルの該当軸の範囲（cellMin〜cellMax）
    // 壁がセルを通過するか：coordがセルのcoord範囲内 AND from/toがcellCoord範囲に重なる
    if(type==='V'){
      // 縦壁：coord=x座標、from/to=y範囲
      // セルのx範囲(cellMin〜cellMax)をcoordが分断し、壁のy範囲がセルのy範囲(cellCoord)に重なる
      return coord>cellMin&&coord<cellMax&&from<cellCoord[1]&&to>cellCoord[0];
    }else{
      // 横壁：coord=y座標、from/to=x範囲
      return coord>cellMin&&coord<cellMax&&from<cellCoord[1]&&to>cellCoord[0];
    }
  }

  function updateRooms(){
    var b=skelBounds();if(!b)return;
    // 全壁のcoordを軸として候補グリッドを作る
    var vx=S.walls.filter(function(w){return w.type==='V';}).map(function(w){return w.coord;});
    var hy=S.walls.filter(function(w){return w.type==='H';}).map(function(w){return w.coord;});
    vx=Array.from(new Set(vx)).sort(function(a,b2){return a-b2;});
    hy=Array.from(new Set(hy)).sort(function(a,b2){return a-b2;});
    var xs=[b.minX].concat(vx).concat([b.maxX]);
    var ys=[b.minY].concat(hy).concat([b.maxY]);
    var existing={};
    S.rooms.forEach(function(r){existing[r.key]=r;});
    S.rooms=[];
    for(var i=0;i<xs.length-1;i++){
      for(var j=0;j<ys.length-1;j++){
        var x0=xs[i],x1=xs[i+1],y0=ys[j],y1=ys[j+1];
        // このセルを実際に分断する壁があるかチェック
        // 縦方向：x0〜x1の間にfrom/toがy0〜y1に重なる縦壁
        var splitByV=S.walls.some(function(w){
          return w.type==='V'&&w.coord>x0&&w.coord<x1&&w.from<y1&&w.to>y0;
        });
        // 横方向：y0〜y1の間にfrom/toがx0〜x1に重なる横壁
        var splitByH=S.walls.some(function(w){
          return w.type==='H'&&w.coord>y0&&w.coord<y1&&w.from<x1&&w.to>x0;
        });
        // セルを分断する壁がある場合はスキップ（より小さいセルで処理される）
        if(splitByV||splitByH)continue;
        // このセルの境界に壁が存在するかチェック（セルが実際に囲まれているか）
        var key=x0+'_'+y0+'_'+x1+'_'+y1;
        var w2=x1-x0,h2=y1-y0;
        var area=Math.round(w2*h2/1000000*100)/100;
        if(existing[key]){
          S.rooms.push(Object.assign({},existing[key],{x:x0,y:y0,w:w2,h:h2,area:area}));
        }else{
          S.rooms.push({
            id:'r'+(Date.now()+Math.random()|0),key:key,
            name:'',x:x0,y:y0,w:w2,h:h2,area:area,
            ch:S.ch,
            mat:{floor:'',ceiling:'',wall:''},
          });
        }
      }
    }
  }

  // 壁ヒットテスト
  function hitWall(mx,my){
    var mmx=gnMX(mx),mmy=gnMY(my),HIT=10/S.vSC;
    for(var i=S.walls.length-1;i>=0;i--){
      var w=S.walls[i];
      if(w.type==='V'){if(Math.abs(mmx-w.coord)<HIT&&mmy>=w.from-HIT&&mmy<=w.to+HIT)return w;}
      else{if(Math.abs(mmy-w.coord)<HIT&&mmx>=w.from-HIT&&mmx<=w.to+HIT)return w;}
    }
    return null;
  }

  // ビュー
  function fitView(){
    if(S.phase==='setup'||!S.gW)return;
    if(S.phase==='confirmed'){
      var dp=gnDrawPts();
      var xs=dp.map(function(p){return p.x;}),ys=dp.map(function(p){return p.y;});
      var W=gnMax(xs)-gnMin(xs)||1000,H=gnMax(ys)-gnMin(ys)||1000;
      var mg=20;
      var aW=CA.offsetWidth||816;
      // canvas-areaの実高さ：window.innerHeightからボトムバー(60px)を引く
      var bbEl=document.getElementById('bottombar');
      var bbH=bbEl?bbEl.offsetHeight:60;
      var aH=(window.innerHeight-bbH)||500;
      S.vSC=Math.min((aW-mg*2)/W,(aH-mg*2)/H,3);
      S.vOX=Math.round(mg+(aW-mg*2-W*S.vSC)/2 - gnMin(xs)*S.vSC);
      S.vOY=Math.round(mg+(aH-mg*2-H*S.vSC)/2 - gnMin(ys)*S.vSC);
    }else{gnCalcView(S.gW,S.gH,190);}
    gnPaint();
  }

  // 基準点
  function gnShowAnc(){
    document.getElementById('anchor-overlay').classList.remove('hidden');
    setTimeout(function(){document.getElementById('anchor-len').focus();},150);
  }
  function confirmAnchor(){
    var dd=parseInt(document.getElementById('anchor-dir').value);
    var len=parseInt(document.getElementById('anchor-len').value);
    if(!len||len<=0){gnErr('基準距離を入力してください');return;}
    var r=gnRad(dd),rs={x:Math.round(Math.cos(r)*len),y:Math.round(Math.sin(r)*len)};
    S.pts=[{x:0,y:0},rs];
    S.segs=[{angle:dd,len:len,dx:rs.x,dy:rs.y,isAnc:true}];
    S.hasAnc=true;S.ancPt={x:0,y:0};S.rStart={x:rs.x,y:rs.y};
    document.getElementById('anchor-overlay').classList.add('hidden');
    gnCalcView(S.gW,S.gH,190);gnUpdWheel();
    setTimeout(function(){document.getElementById('len-val').focus();},100);
  }
  function skipAnchor(){
    S.hasAnc=false;S.ancPt=null;S.rStart=null;S.pts=[{x:0,y:0}];S.segs=[];
    document.getElementById('anchor-overlay').classList.add('hidden');
    gnUpdWheel();setTimeout(function(){document.getElementById('len-val').focus();},100);
  }

  // 外周を閉じる
  // 最終辺の角度計算
  function gnFinalAngle(){
    var last=S.pts[S.pts.length-1],t=gnCloseTgt();
    var dx=t.x-last.x,dy=t.y-last.y;
    var deg=Math.atan2(dy,dx)*180/Math.PI;
    return (deg+360)%360; // 0〜360
  }
  // 最も近い15°ステップ角度
  function gnNearestSnap(deg){return Math.round(deg/STEP)*STEP;}
  // 最終辺の長さ計算
  function gnFinalLen(angleDeg){
    var last=S.pts[S.pts.length-1],t=gnCloseTgt();
    var dx=t.x-last.x,dy=t.y-last.y;
    // 指定角度方向への射影距離
    var rad=gnRad(angleDeg);
    var len=dx*Math.cos(rad)+dy*Math.sin(rad);
    return Math.round(Math.abs(len));
  }


  // 内角計算（最後の辺と閉じる辺がなす建物内側の角）
  function gnCalcInnerAngle(closeDeg){
    var rs=gnRealSegs();
    var lastSeg=rs[rs.length-1];
    var lastDeg=lastSeg?((lastSeg.angle%360+360)%360):0;
    var fromDeg=(lastDeg+180)%360;
    var raw=((closeDeg-fromDeg)+360)%360;
    if(raw>180)raw=360-raw;
    return Math.round(raw*10)/10;
  }

  // これ以上ロックできるか判定
  function gnCanLockMore(testIdx){
    var rs=gnRealSegs();
    var e=gnCloseErr();
    var testLocked=S.lockedSegs.concat(testIdx>=0?[testIdx]:[]);
    var free=rs.filter(function(s,i){return testLocked.indexOf(i)<0;});
    var freeH=free.filter(function(s){return((s.angle%180)+180)%180===0;}).length;
    var freeV=free.filter(function(s){return((s.angle%180)+180)%180===90;}).length;
    if(Math.abs(e.dx)>0&&freeH===0)return false;
    if(Math.abs(e.dy)>0&&freeV===0)return false;
    return true;
  }

  function tryClose(){
    if(gnRealSegs().length<3){gnErr('もう少し辺を追加してください');return;}
    var e=gnCloseErr();
    if(e.total>S.thr){gnShowErrDlg(e);return;}
    gnShowAngleDlg(e);
  }

  function gnShowErrDlg(e){
    document.getElementById('dlg-title').textContent='寸法を確認してください';
    document.getElementById('dlg-content').innerHTML=
      '<div class="dialog-err">残差が大きすぎます（'+e.total+'mm、許容：'+S.thr+'mm）<br>'
      +'X方向：'+(e.dx>0?'+':'')+e.dx+'mm　Y方向：'+(e.dy>0?'+':'')+e.dy+'mm</div>'
      +'<div class="dialog-body">「1辺戻す」で修正してください。</div>';
    document.getElementById('dlg-btns').innerHTML=
      '<button class="dbtn danger" onclick="GN.closeDlg()">作図に戻る</button>';
    document.getElementById('close-dialog').classList.remove('hidden');
  }

  function gnShowAngleDlg(e){
    var actualDeg=gnFinalAngle();
    var snapDeg=gnNearestSnap(actualDeg);
    var innerActual=gnCalcInnerAngle(actualDeg);
    var innerSnap=gnCalcInnerAngle(snapDeg);
    var diff=Math.round(Math.abs(innerActual-innerSnap)*10)/10;
    var xDisp=(e.dx>0?'+':'')+e.dx;
    var yDisp=(e.dy>0?'+':'')+e.dy;
    document.getElementById('dlg-title').textContent='閉じる角度を選んでください';
    document.getElementById('dlg-content').innerHTML=
      '<div class="dialog-ok">'
      +'最後の角の内角：<b>'+innerActual+'°</b>'
      +(diff>0?'　（'+innerSnap+'°から '+diff+'°のずれ）':'　（ぴったり）')+'<br>'
      +'X方向の残差：<b>'+xDisp+'mm</b>　Y方向の残差：<b>'+yDisp+'mm</b>'
      +'</div>'
      +'<div class="dialog-body">角度を選ぶと、守りたい寸法をキャンバス上でタップして選べます。</div>';
    document.getElementById('dlg-btns').innerHTML=
      '<button class="dbtn success" id="btn-snap-ang">'+innerSnap+'°に補正して閉じる</button>'
      +'<button class="dbtn" id="btn-act-ang">'+innerActual+'°このまま</button>'
      +'<button class="dbtn danger" onclick="GN.closeDlg()">作図に戻る</button>';
    document.getElementById('close-dialog').classList.remove('hidden');
    document.getElementById('btn-snap-ang').onclick=function(){GN.startLockMode(snapDeg);};
    document.getElementById('btn-act-ang').onclick=function(){GN.startLockMode(actualDeg);};
  }

  function closeDlg(){document.getElementById('close-dialog').classList.add('hidden');}

  // 角度確定 → キャンバスタップ選択モードへ
  function startLockMode(angleDeg){
    S.closeAngleDeg=angleDeg;
    S.selectingSegs=true;
    S.lockedSegs=[];
    closeDlg();
    document.getElementById('wheel-overlay').classList.add('hidden');
    gnPaint();
    var bar=document.getElementById('lock-bar');
    if(!bar){
      bar=document.createElement('div');
      bar.id='lock-bar';
      bar.style.cssText='position:absolute;bottom:68px;left:0;right:0;'
        +'display:flex;gap:8px;padding:8px 14px;'
        +'background:rgba(255,255,255,0.97);border-top:0.5px solid #ddd;z-index:25;';
      document.getElementById('app').appendChild(bar);
    }
    bar.innerHTML='<button class="abtn primary" style="flex:1;" onclick="GN.doCloseWithLocks()">確定して閉じる</button>'
      +'<button class="abtn danger" onclick="GN.cancelSegSelect()">作図に戻る</button>';
    bar.style.display='flex';
  }

  function cancelSegSelect(){
    S.selectingSegs=false;S.lockedSegs=[];
    var bar=document.getElementById('lock-bar');
    if(bar)bar.style.display='none';
    document.getElementById('wheel-overlay').classList.remove('hidden');
    gnPaint();
  }

  // キャンバス上の辺タップでロック切替
  function toggleLockSeg(idx){
    var i=S.lockedSegs.indexOf(idx);
    if(i>=0){
      S.lockedSegs.splice(i,1);
    }else{
      if(!gnCanLockMore(idx)){gnErr('これ以上選択できません');return;}
      S.lockedSegs.push(idx);
    }
    gnPaint();
  }

  // 後方互換（旧フローから呼ばれる可能性）
  function closeWithSnap(json){
    var obj=typeof json==='string'?JSON.parse(json):json;
    GN.startLockMode(obj.deg);
  }
  function closeWithActual(json){
    var obj=typeof json==='string'?JSON.parse(json):json;
    GN.startLockMode(obj.deg);
  }

  // 確定して閉じる：守らない辺に残差を吸収してゼロで閉じる
  function doCloseWithLocks(){
    S.selectingSegs=false;
    var bar=document.getElementById('lock-bar');
    if(bar)bar.style.display='none';
    var rs=gnRealSegs();
    var e=gnCloseErr();
    var locked=S.lockedSegs;
    var angleDeg=S.closeAngleDeg;
    // X方向調整可能辺
    var freeH=rs.map(function(s,i){return{s:s,i:i};})
      .filter(function(o){return locked.indexOf(o.i)<0&&((o.s.angle%180)+180)%180===0;});
    // Y方向調整可能辺
    var freeV=rs.map(function(s,i){return{s:s,i:i};})
      .filter(function(o){return locked.indexOf(o.i)<0&&((o.s.angle%180)+180)%180===90;});
    // X残差を横方向の調整可能辺に均等分配
    if(freeH.length>0&&Math.abs(e.dx)>0){
      var eachX=Math.round(e.dx/freeH.length);
      freeH.forEach(function(o){
        var sign=Math.cos(gnRad(o.s.angle))>0?1:-1;
        o.s.len+=sign*eachX;
        if(o.s.len<0)o.s.len=0;
        o.s.dx=Math.round(Math.cos(gnRad(o.s.angle))*o.s.len);
      });
    }
    // Y残差を縦方向の調整可能辺に均等分配
    if(freeV.length>0&&Math.abs(e.dy)>0){
      var eachY=Math.round(e.dy/freeV.length);
      freeV.forEach(function(o){
        var sign=Math.sin(gnRad(o.s.angle))>0?1:-1;
        o.s.len+=sign*eachY;
        if(o.s.len<0)o.s.len=0;
        o.s.dy=Math.round(Math.sin(gnRad(o.s.angle))*o.s.len);
      });
    }
    // ptsを再計算
    S.pts=[S.pts[0]];
    rs.forEach(function(s){
      var last=S.pts[S.pts.length-1];
      S.pts.push({x:Math.round(last.x+Math.cos(gnRad(s.angle))*s.len),
                   y:Math.round(last.y+Math.sin(gnRad(s.angle))*s.len)});
    });
    // 最終辺を追加してぴったり閉じる
    var last=S.pts[S.pts.length-1];
    var t=gnCloseTgt();
    var dx2=t.x-last.x,dy2=t.y-last.y;
    var len=Math.round(Math.sqrt(dx2*dx2+dy2*dy2));
    if(len>0){
      S.segs.push({angle:Math.round(angleDeg),len:len,dx:Math.round(dx2),dy:Math.round(dy2),isFinal:true});
      S.pts.push({x:t.x,y:t.y});
    }
    S.cerr={dx:0,dy:0,total:0,abs:'distributed'};
    gnFinish();
  }

  // 強制クローズ（誤差超過時）
  function forceCloseDirect(){
    var e=gnCloseErr();
    var t=gnCloseTgt(),last=S.pts[S.pts.length-1];
    var dx2=t.x-last.x,dy2=t.y-last.y;
    var len=Math.round(Math.sqrt(dx2*dx2+dy2*dy2));
    var angleDeg=Math.atan2(dy2,dx2)*180/Math.PI;
    S.segs.push({angle:Math.round(angleDeg),len:len,dx:Math.round(dx2),dy:Math.round(dy2),isFinal:true});
    S.pts.push({x:t.x,y:t.y});
    S.cerr={dx:e.dx,dy:e.dy,total:e.total,abs:'forced',warn:true};
    gnFinish();
  }
  // 後方互換
  function confirmClose(e){if(typeof e==='string')e=JSON.parse(e);gnAddFinalAndFinish(gnFinalAngle(),e);}
  function forceClose(){forceCloseDirect();}
  function gnFinish(){
    S.phase='confirmed';closeDlg();
    document.getElementById('wheel-overlay').classList.add('hidden');
    document.getElementById('fitview-btn').style.display='none';
    updateRooms();fitView();
    // 外周確定後は自動で間仕切りモードへ
    setMode('partition');
  }

  // タッチ・ピンチ
  function gnTD(t){var dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
  function gnTM(t,r){var sx=CV.width/r.width;return{x:((t[0].clientX+t[1].clientX)/2-r.left)*sx,y:((t[0].clientY+t[1].clientY)/2-r.top)*sx};}
  function getPos(e){
    var r=CV.getBoundingClientRect(),sx=CV.width/r.width;
    if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sx};
    return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sx};
  }

  CV.addEventListener('touchstart',function(e){
    e.preventDefault();var r=CV.getBoundingClientRect();
    if(e.touches.length===2){TCH.a=true;TCH.pd=gnTD(e.touches);TCH.pm=gnTM(e.touches,r);TCH.l=null;}
    else{TCH.a=false;TCH.pd=null;onCVDown(e);}
  },{passive:false});
  CV.addEventListener('touchmove',function(e){
    e.preventDefault();var r=CV.getBoundingClientRect();
    if(e.touches.length===2){
      var nd=gnTD(e.touches),nm=gnTM(e.touches,r);
      if(TCH.pd){
        var ratio=nd/TCH.pd,nsc=Math.max(0.05,Math.min(S.vSC*ratio,10));
        S.vOX=nm.x-(nm.x-S.vOX)*(nsc/S.vSC);S.vOY=nm.y-(nm.y-S.vOY)*(nsc/S.vSC);S.vSC=nsc;
        if(TCH.l){S.vOX+=(nm.x-TCH.l.x);S.vOY+=(nm.y-TCH.l.y);}
      }
      TCH.pd=nd;TCH.pm=nm;TCH.l=nm;
      document.getElementById('fitview-btn').style.display='block';gnPaint();
    }else{onCVMove(e);}
  },{passive:false});
  CV.addEventListener('touchend',function(e){
    if(e.touches.length===0){
      if(TCH.l){var aW=CA.offsetWidth,aH=CA.offsetHeight;if(TCH.l.x<-50||TCH.l.x>aW+50||TCH.l.y<-50||TCH.l.y>aH+50)fitView();}
      TCH={a:false,l:null,pd:null,pm:null};onCVUp(e);
    }else{TCH={a:false,l:null,pd:null,pm:null};}
  },{passive:true});
  CV.addEventListener('wheel',function(e){
    e.preventDefault();var r=CV.getBoundingClientRect(),sx=CV.width/r.width;
    var mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sx;
    var ratio=e.deltaY<0?1.1:0.91,nsc=Math.max(0.05,Math.min(S.vSC*ratio,10));
    S.vOX=mx-(mx-S.vOX)*(nsc/S.vSC);S.vOY=my-(my-S.vOY)*(nsc/S.vSC);S.vSC=nsc;
    document.getElementById('fitview-btn').style.display='block';gnPaint();
  },{passive:false});
  CV.addEventListener('mousedown',function(e){
    // 中ボタン（button=1）でパン開始
    if(e.button===1){e.preventDefault();PAN.active=true;PAN.x=e.clientX;PAN.y=e.clientY;CV.style.cursor='grab';return;}
    onCVDown(e);
  });
  CV.addEventListener('mousemove',function(e){
    if(PAN.active){
      var r=CV.getBoundingClientRect(),sx=CV.width/r.width;
      S.vOX+=(e.clientX-PAN.x)*sx;S.vOY+=(e.clientY-PAN.y)*sx;
      PAN.x=e.clientX;PAN.y=e.clientY;
      document.getElementById('fitview-btn').style.display='block';gnPaint();
      return;
    }
    onCVMove(e);
  });
  CV.addEventListener('mouseup',function(e){
    if(PAN.active){PAN.active=false;CV.style.cursor='default';return;}
    onCVUp(e);
  });
  // 中ボタンのデフォルト動作（スクロール）を抑制
  CV.addEventListener('auxclick',function(e){if(e.button===1)e.preventDefault();});

  function onCVDown(e){
    // 辺タップ選択モード（守りたい寸法を選ぶ）
    if(S.selectingSegs){
      var p=getPos(e);
      var dp=gnDrawPts();
      var rs=gnRealSegs();
      var HIT=22/S.vSC;
      for(var i=0;i<rs.length;i++){
        var pa=dp[i],pb=dp[i+1]||dp[0];
        if(!pa||!pb)continue;
        var mx2=gnMX(p.x),my2=gnMY(p.y);
        var dx3=pb.x-pa.x,dy3=pb.y-pa.y;
        var len3=Math.sqrt(dx3*dx3+dy3*dy3);
        if(len3===0)continue;
        var t2=Math.max(0,Math.min(1,((mx2-pa.x)*dx3+(my2-pa.y)*dy3)/(len3*len3)));
        var cx2=pa.x+t2*dx3,cy2=pa.y+t2*dy3;
        if(Math.sqrt((mx2-cx2)*(mx2-cx2)+(my2-cy2)*(my2-cy2))<HIT){
          GN.toggleLockSeg(i);return;
        }
      }
      return;
    }
    if(S.mode!=='partition')return;
    var p=getPos(e);
    var mmx=snap50(gnMX(p.x)),mmy=snap50(gnMY(p.y));
    if(S.addWallMode){
      var b=skelBounds();
      if(!b||mmx<b.minX||mmx>b.maxX||mmy<b.minY||mmy>b.maxY)return;
      if(S.addWallStep===0){
        // 1点目
        S.addWallP1={x:mmx,y:mmy};S.addWallStep=1;gnPaint(p);
      }else{
        // 2点目：V/Hはボタンで指定済み
        var b2=skelBounds();
        var w2;
        if(S.addWallMode==='V'){
          // 縦壁：x座標=1点目のx、y範囲=1点目〜2点目
          w2={id:'w'+(nextWallId++),type:'V',
            coord:S.addWallP1.x,
            from:Math.max(b2.minY,Math.min(S.addWallP1.y,mmy)),
            to:Math.min(b2.maxY,Math.max(S.addWallP1.y,mmy)),
            thick:100};
        }else{
          // 横壁：y座標=1点目のy、x範囲=1点目〜2点目
          w2={id:'w'+(nextWallId++),type:'H',
            coord:S.addWallP1.y,
            from:Math.max(b2.minX,Math.min(S.addWallP1.x,mmx)),
            to:Math.min(b2.maxX,Math.max(S.addWallP1.x,mmx)),
            thick:100};
        }
        S.walls.push(w2);S.addWallStep=0;S.addWallP1=null;
        updateRooms();
        if(!document.getElementById('panel').classList.contains('hidden'))openPanel('partition');
        gnPaint(p);
      }
      return;
    }
    var hit=hitWall(p.x,p.y);
    if(hit){
      S.selectedWall=hit;S.wallDrag=true;
      S.wallDragStart=hit.coord;
      S.wallDragMouse=hit.type==='V'?p.x:p.y;
      if(!document.getElementById('panel').classList.contains('hidden'))openPanel('partition');
    }else{
      S.selectedWall=null;S.wallDrag=false;
      if(!document.getElementById('panel').classList.contains('hidden'))openPanel('partition');
    }
    gnPaint(p);
  }
  function onCVMove(e){
    var p=getPos(e);
    S.lastCursorPx=p;
    if(S.mode==='partition'){
      if(S.wallDrag&&S.selectedWall){
        var w2=S.selectedWall;
        var delta=w2.type==='V'?(p.x-S.wallDragMouse)/S.vSC:(p.y-S.wallDragMouse)/S.vSC;
        var b=skelBounds();
        var nc=snap50(S.wallDragStart+delta);
        if(w2.type==='V')w2.coord=Math.max(b.minX+50,Math.min(b.maxX-50,nc));
        else w2.coord=Math.max(b.minY+50,Math.min(b.maxY-50,nc));
        updateRooms();
      }
      gnPaint(p);
    }
  }
  function onCVUp(e){
    if(S.wallDrag){updateRooms();if(!document.getElementById('panel').classList.contains('hidden'))openPanel('partition');}
    S.wallDrag=false;
  }

  // カーソルオーバーレイ（間仕切りモード）
  function drawCursorOverlay(CTX2,cpx){
    if(!cpx)return;
    var mmx=snap50(gnMX(cpx.x)),mmy=snap50(gnMY(cpx.y));
    CTX2.save();
    CTX2.strokeStyle=C.cur;CTX2.lineWidth=0.8;CTX2.setLineDash([3,3]);CTX2.globalAlpha=0.5;
    CTX2.beginPath();CTX2.moveTo(cpx.x,0);CTX2.lineTo(cpx.x,CV.height);CTX2.stroke();
    CTX2.beginPath();CTX2.moveTo(0,cpx.y);CTX2.lineTo(CV.width,cpx.y);CTX2.stroke();
    CTX2.setLineDash([]);CTX2.globalAlpha=1;
    var txt='x='+mmx+'  y='+mmy;
    CTX2.font='bold 11px monospace';
    var tw=CTX2.measureText(txt).width,pad=5,lh=16;
    var lx=cpx.x+10,ly=cpx.y-24;
    if(lx+tw+pad*2>CV.width)lx=cpx.x-tw-pad*2-10;
    if(ly<10)ly=cpx.y+10;
    CTX2.fillStyle='rgba(255,255,255,0.88)';
    CTX2.beginPath();CTX2.roundRect(lx,ly,tw+pad*2,lh+pad,4);CTX2.fill();
    CTX2.strokeStyle=C.cur;CTX2.lineWidth=0.8;CTX2.stroke();
    CTX2.fillStyle=C.cur;CTX2.fillText(txt,lx+pad,ly+lh);
    // 追加モード1点目後プレビュー
    if(S.addWallStep===1&&S.addWallP1){
      var dx=Math.abs(mmx-S.addWallP1.x),dy=Math.abs(mmy-S.addWallP1.y);
      var isV=dy>=dx;
      CTX2.strokeStyle=C.cur;CTX2.lineWidth=2;CTX2.setLineDash([6,3]);
      CTX2.beginPath();
      if(isV){CTX2.moveTo(gnPX(S.addWallP1.x),gnPY(S.addWallP1.y));CTX2.lineTo(gnPX(S.addWallP1.x),gnPY(mmy));}
      else{CTX2.moveTo(gnPX(S.addWallP1.x),gnPY(S.addWallP1.y));CTX2.lineTo(gnPX(mmx),gnPY(S.addWallP1.y));}
      CTX2.stroke();CTX2.setLineDash([]);
      var dist=isV?Math.abs(mmy-S.addWallP1.y):Math.abs(mmx-S.addWallP1.x);
      var dtxt=(isV?'縦壁':'横壁')+' '+dist+'mm';
      CTX2.font='bold 11px monospace';
      var dtw=CTX2.measureText(dtxt).width;
      var dlx=isV?gnPX(S.addWallP1.x)+8:(gnPX(S.addWallP1.x)+gnPX(mmx))/2-dtw/2;
      var dly=isV?(gnPY(S.addWallP1.y)+gnPY(mmy))/2:gnPY(S.addWallP1.y)-18;
      CTX2.fillStyle='rgba(255,255,255,0.88)';
      CTX2.beginPath();CTX2.roundRect(dlx-4,dly-14,dtw+8,18,4);CTX2.fill();
      CTX2.strokeStyle=C.cur;CTX2.lineWidth=0.8;CTX2.stroke();
      CTX2.fillStyle=C.cur;CTX2.fillText(dtxt,dlx,dly);
      CTX2.fillStyle=C.cur;CTX2.beginPath();CTX2.arc(gnPX(S.addWallP1.x),gnPY(S.addWallP1.y),4,0,Math.PI*2);CTX2.fill();
    }
    CTX2.restore();
  }

  // メイン描画
  function gnPaint(cpx){
    CV.width=CA.offsetWidth;CV.height=CA.offsetHeight;
    CTX.clearRect(0,0,CV.width,CV.height);
    CTX.fillStyle=C.bg;CTX.fillRect(0,0,CV.width,CV.height);

    if(S.phase==='setup'||!S.gW){
      CTX.fillStyle=C.dim;CTX.font='12px sans-serif';CTX.textAlign='center';
      CTX.fillText('「外周」パネルから現場情報を設定してください',CV.width/2,CV.height/2-14);
      CTX.fillText('最大幅・最大奥行を入力すると作図を開始できます',CV.width/2,CV.height/2+10);
      gnUpdStatus();return;
    }

    var gW=S.gW,gH=S.gH,gs=1000;
    // グリッド
    CTX.strokeStyle=C.grid;CTX.lineWidth=0.5;
    var gx0=Math.floor(gnMX(0)/gs)*gs,gx1=Math.ceil(gnMX(CV.width)/gs)*gs;
    var gy0=Math.floor(gnMY(0)/gs)*gs,gy1=Math.ceil(gnMY(CV.height)/gs)*gs;
    for(var xi=gx0;xi<=gx1;xi+=gs){CTX.beginPath();CTX.moveTo(gnPX(xi),0);CTX.lineTo(gnPX(xi),CV.height);CTX.stroke();}
    for(var yi=gy0;yi<=gy1;yi+=gs){CTX.beginPath();CTX.moveTo(0,gnPY(yi));CTX.lineTo(CV.width,gnPY(yi));CTX.stroke();}

    // 仮スケルトン枠（作図中のみ）
    if(S.phase==='drawing'){
      CTX.fillStyle=C.guideF;CTX.fillRect(gnPX(0),gnPY(0),gW*S.vSC,gH*S.vSC);
      CTX.strokeStyle=C.guideDash;CTX.lineWidth=1.5;CTX.setLineDash([8,5]);
      CTX.strokeRect(gnPX(0),gnPY(0),gW*S.vSC,gH*S.vSC);CTX.setLineDash([]);
      CTX.fillStyle=C.guideDash;CTX.font='10px sans-serif';CTX.textAlign='center';
      CTX.fillText('最大幅 '+gW+'mm',gnPX(gW/2),gnPY(0)-8);
      CTX.save();CTX.translate(gnPX(0)-16,gnPY(gH/2));CTX.rotate(-Math.PI/2);CTX.fillText('最大奥行 '+gH+'mm',0,0);CTX.restore();
    }

    // 目盛り
    CTX.fillStyle=C.dim;CTX.font='8px sans-serif';CTX.textAlign='center';
    for(var x2=Math.ceil(gx0/gs)*gs;x2<=gx1;x2+=gs){if(gnPX(x2)>0&&gnPX(x2)<CV.width)CTX.fillText(x2,gnPX(x2),Math.min(CV.height-2,gnPY(Math.max(gH,0))+14));}
    CTX.textAlign='right';
    for(var y2=Math.ceil(gy0/gs)*gs;y2<=gy1;y2+=gs){if(gnPY(y2)>0&&gnPY(y2)<CV.height)CTX.fillText(y2,Math.max(30,gnPX(0)-4),gnPY(y2)+3);}

    var pts=S.pts,dp=gnDrawPts();

    // 部屋塗り（確定後）
    if(S.phase==='confirmed'&&S.layerVis.partition){
      S.rooms.forEach(function(r,i){
        CTX.fillStyle=C.roomFills[i%C.roomFills.length];
        CTX.fillRect(gnPX(r.x),gnPY(r.y),r.w*S.vSC,r.h*S.vSC);
        if(r.name){
          CTX.fillStyle=C.lbl;CTX.font='11px sans-serif';CTX.textAlign='center';
          CTX.fillText(r.name,gnPX(r.x+r.w/2),gnPY(r.y+r.h/2)-6);
        }
        CTX.fillStyle=C.dim;CTX.font='10px sans-serif';CTX.textAlign='center';
        CTX.fillText(r.area+'㎡',gnPX(r.x+r.w/2),gnPY(r.y+r.h/2)+(r.name?8:0));
      });
    }

    // 基準点補助線（作図中）


    // 外周ライン
    if(S.layerVis.skeleton&&dp.length>=2){
      CTX.beginPath();CTX.moveTo(gnPX(dp[0].x),gnPY(dp[0].y));
      for(var i=1;i<dp.length;i++)CTX.lineTo(gnPX(dp[i].x),gnPY(dp[i].y));
      if(S.phase==='confirmed')CTX.closePath();
      CTX.fillStyle=C.skelF;if(S.phase==='confirmed')CTX.fill();
      CTX.strokeStyle=C.skel;CTX.lineWidth=2.5;CTX.stroke();
      // 寸法ラベル
      if(S.layerVis.dimension){
        var rs=gnRealSegs();
        for(var si=0;si<rs.length&&si<dp.length-1;si++){
          var pa=dp[si],pb=dp[si+1],mx2=(gnPX(pa.x)+gnPX(pb.x))/2,my2=(gnPY(pa.y)+gnPY(pb.y))/2,isV2=Math.abs(pb.x-pa.x)<1;
          CTX.fillStyle=C.lbl;CTX.font='bold 10px monospace';CTX.textAlign='center';
          if(isV2){CTX.save();CTX.translate(mx2-12,my2);CTX.rotate(-Math.PI/2);CTX.fillText(rs[si].len,0,0);CTX.restore();}
          else CTX.fillText(rs[si].len,mx2,my2-7);
        }
      }
    }

    // 始点マーカー
    if(dp.length>0){CTX.fillStyle=C.pt;CTX.beginPath();CTX.arc(gnPX(dp[0].x),gnPY(dp[0].y),6,0,Math.PI*2);CTX.fill();}

    // 辺選択モード：ハイライト描画
    if(S.selectingSegs&&dp.length>=2){
      var rs2=gnRealSegs();
      var maxLock=rs2.length-1;
      rs2.forEach(function(s2,i){
        var pa2=dp[i],pb2=dp[i+1]||dp[0];
        if(!pa2||!pb2)return;
        var isLocked=S.lockedSegs.indexOf(i)>=0;
        var canSelect=gnCanLockMore(i);
        // 辺の色
        var lineCol=isLocked?'#b87d00':(canSelect?C.skel:'rgba(83,74,183,0.25)');
        var lineW=isLocked?4:2;
        CTX.strokeStyle=lineCol;CTX.lineWidth=lineW;
        CTX.beginPath();CTX.moveTo(gnPX(pa2.x),gnPY(pa2.y));CTX.lineTo(gnPX(pb2.x),gnPY(pb2.y));CTX.stroke();
        // 中点に寸法ラベル（金色ハイライト）
        var mx3=(gnPX(pa2.x)+gnPX(pb2.x))/2,my3=(gnPY(pa2.y)+gnPY(pb2.y))/2;
        var isVert=Math.abs(pb2.x-pa2.x)<1;
        var bgCol=isLocked?'#b87d00':(canSelect?'rgba(83,74,183,0.85)':'rgba(180,180,180,0.7)');
        CTX.font='bold 12px monospace';
        var txt=s2.len+'mm';
        var tw=CTX.measureText(txt).width;
        if(isVert){
          CTX.save();CTX.translate(mx3,my3);CTX.rotate(-Math.PI/2);
          CTX.fillStyle=bgCol;CTX.beginPath();CTX.roundRect(-tw/2-6,-10,tw+12,20,4);CTX.fill();
          CTX.fillStyle='#fff';CTX.textAlign='center';CTX.textBaseline='middle';CTX.fillText(txt,0,0);
          CTX.restore();
        }else{
          CTX.fillStyle=bgCol;CTX.beginPath();CTX.roundRect(mx3-tw/2-6,my3-20,tw+12,20,4);CTX.fill();
          CTX.fillStyle='#fff';CTX.textAlign='center';CTX.fillText(txt,mx3,my3-6);
        }
        // 🔒アイコン（守る辺）
        if(isLocked){
          CTX.font='14px sans-serif';CTX.textAlign='center';
          if(isVert)CTX.fillText('🔒',mx3+18,my3);
          else CTX.fillText('🔒',mx3,my3-24);
        }
      });
      // 案内テキスト
      var canMore3=gnCanLockMore(-1);
      var guide=canMore3?'守りたい寸法をタップ（複数可）':'これ以上選択できません';
      var guideCol=canMore3?'rgba(15,110,86,0.9)':'rgba(180,0,0,0.85)';
      CTX.font='bold 12px sans-serif';CTX.textAlign='center';
      var gtw=CTX.measureText(guide).width;
      CTX.fillStyle=canMore3?'rgba(15,110,86,0.1)':'rgba(180,0,0,0.1)';
      CTX.beginPath();if(CTX.roundRect)CTX.roundRect(CV.width/2-gtw/2-10,CV.height-36,gtw+20,22,6);
      else CTX.rect(CV.width/2-gtw/2-10,CV.height-36,gtw+20,22);
      CTX.fill();
      CTX.fillStyle=guideCol;CTX.fillText(guide,CV.width/2,CV.height-21);
    }

    // 間仕切り壁（確定後）
    if(S.phase==='confirmed'&&S.layerVis.partition){
      S.walls.forEach(function(w2){
        var isSel=w2===S.selectedWall;
        var thick=100;
        CTX.fillStyle=isSel?C.partSelF:C.partF;
        CTX.strokeStyle=isSel?C.partSel:C.part;
        CTX.lineWidth=isSel?2.5:1.5;
        if(w2.type==='V'){
          CTX.fillRect(gnPX(w2.coord-thick/2),gnPY(w2.from),(thick)*S.vSC,(w2.to-w2.from)*S.vSC);
          CTX.strokeRect(gnPX(w2.coord-thick/2),gnPY(w2.from),(thick)*S.vSC,(w2.to-w2.from)*S.vSC);
        }else{
          CTX.fillRect(gnPX(w2.from),gnPY(w2.coord-thick/2),(w2.to-w2.from)*S.vSC,(thick)*S.vSC);
          CTX.strokeRect(gnPX(w2.from),gnPY(w2.coord-thick/2),(w2.to-w2.from)*S.vSC,(thick)*S.vSC);
        }
      });
    }

    // 作図中プレビュー・残差
    if(S.phase==='drawing'&&pts.length>1){
      var last=pts[pts.length-1];
      CTX.fillStyle=C.skel;CTX.beginPath();CTX.arc(gnPX(last.x),gnPY(last.y),4,0,Math.PI*2);CTX.fill();
      var rn=gnRealSegs().length;
      if(rn>=2){
        var e2=gnCloseErr();
        if(e2.total<300){
          var col=e2.total<=S.thr?C.snapOk:C.snapWn,tg=gnCloseTgt();
          CTX.strokeStyle=col;CTX.lineWidth=2;CTX.beginPath();CTX.arc(gnPX(tg.x),gnPY(tg.y),16,0,Math.PI*2);CTX.stroke();
          CTX.strokeStyle=col;CTX.lineWidth=1;CTX.setLineDash([3,3]);
          CTX.beginPath();CTX.moveTo(gnPX(last.x),gnPY(last.y));CTX.lineTo(gnPX(tg.x),gnPY(tg.y));CTX.stroke();CTX.setLineDash([]);
          CTX.fillStyle=col;CTX.font='10px sans-serif';CTX.textAlign='center';CTX.fillText('残差 '+e2.total+'mm',gnPX(tg.x),gnPY(tg.y)-20);
        }
        CTX.fillStyle=C.dim;CTX.font='9px monospace';CTX.textAlign='left';
        CTX.fillText('基準点まで '+e2.total+'mm（許容：'+S.thr+'mm）',6,CV.height-6);
      }
      var ang=gnSnap(S.wAng),r3=gnRad(ang),lv=parseInt(document.getElementById('len-val').value)||2000;
      var pe={x:last.x+Math.cos(r3)*lv,y:last.y+Math.sin(r3)*lv};
      CTX.strokeStyle=C.cur;CTX.lineWidth=1.5;CTX.setLineDash([6,4]);
      CTX.beginPath();CTX.moveTo(gnPX(last.x),gnPY(last.y));CTX.lineTo(gnPX(pe.x),gnPY(pe.y));CTX.stroke();CTX.setLineDash([]);
      CTX.save();CTX.translate(gnPX(pe.x),gnPY(pe.y));CTX.rotate(r3);
      CTX.fillStyle=C.cur;CTX.beginPath();CTX.moveTo(8,0);CTX.lineTo(-5,-4);CTX.lineTo(-5,4);CTX.closePath();CTX.fill();CTX.restore();
      CTX.fillStyle=C.cur;CTX.font='bold 10px monospace';CTX.textAlign='center';
      CTX.fillText(lv+'mm',(gnPX(last.x)+gnPX(pe.x))/2,(gnPY(last.y)+gnPY(pe.y))/2-7);
    }

    // 誤差記録
    if(S.phase==='confirmed'&&S.cerr&&S.cerr.total>0){
      CTX.fillStyle=S.cerr.warn?C.snapWn:C.snapOk;CTX.font='9px monospace';CTX.textAlign='left';
      CTX.fillText('記録済み誤差：'+S.cerr.total+'mm'+(S.cerr.warn?' ⚠':''),6,CV.height-6);
    }

    // カーソルオーバーレイ（間仕切りモード）
    if(S.mode==='partition'&&S.phase==='confirmed'){
      drawCursorOverlay(CTX,cpx||S.lastCursorPx);
    }

    gnUpdStatus();
  }

  function gnUpdStatus(){
    var el=document.getElementById('status-bar');
    if(S.phase==='setup'){el.textContent='外周パネルから現場情報と最大寸法を設定してください';return;}
    if(S.phase==='drawing'){
      var n=gnRealSegs().length,e=n>=2?gnCloseErr():null;
      el.textContent=n===0?'実始点（赤点）から最初の辺を引いてください':n+'辺入力済　'+(e&&e.total<300?'⭕ 基準点付近':'角度と長さを入力して確定');return;
    }
    if(S.phase==='confirmed'){
      var dp2=gnDrawPts();
      if(dp2.length>=2){
        var xs=dp2.map(function(p){return p.x;}),ys=dp2.map(function(p){return p.y;});
        var info='外周確定　'+gnRealSegs().length+'辺　'+(gnMax(xs)-gnMin(xs))+'×'+(gnMax(ys)-gnMin(ys))+'mm';
        if(S.mode==='partition'){
          if(S.addWallMode)info='壁を追加中：'+(S.addWallStep===0?'1点目をタップ':'2点目をタップ');
          else if(S.selectedWall)info='壁選択中　ドラッグで移動';
          else info='間仕切り '+S.walls.length+'本　部屋 '+S.rooms.length+'室';
        }
        el.textContent=info;
      }
    }
  }

  // ホイール描画
  function gnPaintWheel(){
    WCX.clearRect(0,0,200,200);
    WCX.fillStyle=C.wTr;WCX.beginPath();WCX.arc(WCX_R,WCY_R,WR+14,0,Math.PI*2);WCX.fill();
    for(var a=0;a<360;a+=STEP){
      var isn=gnSnap(S.wAng)===a;WCX.fillStyle=C.wAF;WCX.globalAlpha=isn?1:0.2;
      WCX.beginPath();WCX.moveTo(WCX_R,WCY_R);WCX.arc(WCX_R,WCY_R,WR+12,gnRad(a-STEP/2+1),gnRad(a+STEP/2-1));WCX.closePath();WCX.fill();WCX.globalAlpha=1;
    }
    for(var a2=0;a2<360;a2+=STEP){
      var r2=gnRad(a2),imj=a2%90===0;
      WCX.strokeStyle=imj?C.wTM:C.wTk;WCX.lineWidth=imj?2:1;
      WCX.beginPath();WCX.moveTo(WCX_R+Math.cos(r2)*(WR+14-(imj?12:6)),WCY_R+Math.sin(r2)*(WR+14-(imj?12:6)));
      WCX.lineTo(WCX_R+Math.cos(r2)*(WR+14),WCY_R+Math.sin(r2)*(WR+14));WCX.stroke();
      if(imj){WCX.fillStyle=C.wLb;WCX.font='10px monospace';WCX.textAlign='center';WCX.textBaseline='middle';
        WCX.fillText({0:'0',90:'90',180:'180',270:'270'}[a2],WCX_R+Math.cos(r2)*(WR+30),WCY_R+Math.sin(r2)*(WR+30));}
    }
    var sn=gnSnap(S.wAng),rn=gnRad(sn);
    WCX.strokeStyle=C.wNd;WCX.lineWidth=2.5;
    WCX.beginPath();WCX.moveTo(WCX_R+Math.cos(rn)*WRI,WCY_R+Math.sin(rn)*WRI);WCX.lineTo(WCX_R+Math.cos(rn)*WR,WCY_R+Math.sin(rn)*WR);WCX.stroke();
    WCX.save();WCX.translate(WCX_R+Math.cos(rn)*WR,WCY_R+Math.sin(rn)*WR);WCX.rotate(rn);
    WCX.fillStyle=C.wNd;WCX.beginPath();WCX.moveTo(9,0);WCX.lineTo(-5,-4);WCX.lineTo(-5,4);WCX.closePath();WCX.fill();WCX.restore();
    WCX.fillStyle=C.wCn;WCX.beginPath();WCX.arc(WCX_R,WCY_R,WRI,0,Math.PI*2);WCX.fill();
    WCX.fillStyle=C.wTx;WCX.font='bold 14px monospace';WCX.textAlign='center';WCX.textBaseline='middle';WCX.fillText(sn+'°',WCX_R,WCY_R);
  }
  function gnUpdWheel(){
    gnPaintWheel();
    document.getElementById('angle-disp').textContent=gnSnap(S.wAng)+'°';
    document.getElementById('dir-disp').textContent=gnDirLbl(gnSnap(S.wAng));
    document.getElementById('btn-close-poly').disabled=gnRealSegs().length<3;
    gnUpdSegList();gnPaint();
  }
  function gnWheelAngle(e){
    var r=WCV.getBoundingClientRect(),sx=WCV.width/r.width;
    var ex=e.touches?(e.touches[0].clientX-r.left)*sx:(e.clientX-r.left)*sx;
    var ey=e.touches?(e.touches[0].clientY-r.top)*sx:(e.clientY-r.top)*sx;
    return Math.atan2(ey-WCY_R,ex-WCX_R)*180/Math.PI;
  }
  WCV.addEventListener('mousedown', function(e){S.wDrag=true;S.wAng=gnWheelAngle(e);gnUpdWheel();});
  WCV.addEventListener('mousemove', function(e){if(!S.wDrag)return;S.wAng=gnWheelAngle(e);gnUpdWheel();});
  WCV.addEventListener('mouseup',   function(){S.wDrag=false;});
  WCV.addEventListener('touchstart',function(e){e.preventDefault();S.wDrag=true;S.wAng=gnWheelAngle(e);gnUpdWheel();},{passive:false});
  WCV.addEventListener('touchmove', function(e){e.preventDefault();if(!S.wDrag)return;S.wAng=gnWheelAngle(e);gnUpdWheel();},{passive:false});
  WCV.addEventListener('touchend',  function(){S.wDrag=false;});
  document.getElementById('len-val').addEventListener('input',  function(){gnPaint();});
  document.getElementById('len-val').addEventListener('keydown', function(e){if(e.key==='Enter')addSeg();});
  window.addEventListener('resize',function(){gnPaint();});

  function addSeg(){
    var len=parseInt(document.getElementById('len-val').value);
    if(!len||len<=0){gnErr('長さを入力してください');return;}
    var a=gnSnap(S.wAng),r2=gnRad(a),last=S.pts[S.pts.length-1];
    S.pts.push({x:Math.round(last.x+Math.cos(r2)*len),y:Math.round(last.y+Math.sin(r2)*len)});
    S.segs.push({angle:a,len:len,dx:Math.round(Math.cos(r2)*len),dy:Math.round(Math.sin(r2)*len)});
    document.getElementById('len-val').value='';
    gnUpdWheel();setTimeout(function(){document.getElementById('len-val').focus();},50);
  }
  function undoSeg(){
    if(S.segs.length===0)return;
    S.segs.pop();S.pts.pop();gnUpdWheel();
  }
  function gnUpdSegList(){
    var rs=gnRealSegs();
    document.getElementById('seg-list').innerHTML=rs.length===0?''
      :rs.map(function(s,i){return '<div class="seg-row">辺'+(i+1)+' '+s.angle+'° '+s.len+'mm</div>';}).join('');
  }

  // JSON出力
  function exportJSON(){
    var dp=gnDrawPts();
    var xs=dp.map(function(p){return p.x;}),ys=dp.map(function(p){return p.y;});
    var data={
      meta:{name:S.name,structure:S.str,ceilType:S.ct,ceilH:S.ch,exported:new Date().toISOString()},
      skeleton:{
        points:dp,
        width:gnMax(xs)-gnMin(xs),
        depth:gnMax(ys)-gnMin(ys),
        closeError:S.cerr,
      },
      partitions:S.walls,
      rooms:S.rooms,
      layers:S.layerVis,
    };
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download=(S.name||'floor_plan')+'_data.json';
    a.style.display='none';
    document.body.appendChild(a);
    var sx=window.scrollX,sy=window.scrollY;
    a.click();
    window.scrollTo(sx,sy);
    document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }

  // パネル
  function panelSkeleton(){
    var ic=S.phase==='confirmed',id=S.phase==='drawing',rs=gnRealSegs();
    var dp=gnDrawPts();
    var W=0,H=0;
    if(dp.length>=2){
      var xs=dp.map(function(p){return p.x;}),ys=dp.map(function(p){return p.y;});
      W=gnMax(xs)-gnMin(xs);H=gnMax(ys)-gnMin(ys);
    }
    return '<div class="sdiv">現場情報</div>'
      +'<div class="f-row"><span class="f-label">現場名</span>'
      +'<input type="text" value="'+S.name+'" placeholder="例：未来システム熊本" oninput="GN.setName(this.value)"></div>'
      +'<div class="f-row"><span class="f-label">構造種別</span><select onchange="GN.setStr(this.value)">'
      +[['RC造','RC'],['S造（鉄骨）','S'],['木造','W']].map(function(v){return '<option value="'+v[1]+'" '+(S.str===v[1]?'selected':'')+'>'+v[0]+'</option>';}).join('')
      +'</select></div>'
      +'<div class="f-row"><span class="f-label">天井タイプ</span><select onchange="GN.setCt(this.value)">'
      +CEILT.map(function(t){return '<option value="'+t.value+'" '+(S.ct===t.value?'selected':'')+'>'+t.label+'</option>';}).join('')
      +'</select></div>'
      +'<div class="f-row"><span class="f-label">天井高</span>'
      +'<input type="number" value="'+S.ch+'" step="50" style="max-width:100px;" oninput="GN.setCh(this.value)">'
      +'<span class="f-unit">mm</span></div>'
      +'<div class="sdiv">最大寸法（仮スケルトン）</div>'
      +'<div class="note">まずレーザーで最大幅・最大奥行を計測して入力してください。</div>'
      +'<div class="f-row"><span class="f-label">最大幅</span>'
      +'<input type="number" value="'+(S.gW||'')+'" step="50" placeholder="例：10000" oninput="GN.setGW(this.value)">'
      +'<span class="f-unit">mm</span></div>'
      +'<div class="f-row"><span class="f-label">最大奥行</span>'
      +'<input type="number" value="'+(S.gH||'')+'" step="50" placeholder="例：6000" oninput="GN.setGH(this.value)">'
      +'<span class="f-unit">mm</span></div>'
      +'<div class="sdiv">閉じる許容誤差</div>'
      +'<div class="f-row"><span class="f-label">許容誤差</span>'
      +'<input type="number" value="'+S.thr+'" step="10" style="max-width:100px;" oninput="GN.setThr(this.value)">'
      +'<span class="f-unit">mm</span></div>'
      +'<div class="btn-row">'
      +(!ic&&!id?'<button class="abtn primary" onclick="GN.startDraw()">設定して作図開始</button>':'')
      +(id?'<button class="abtn warn" onclick="GN.backToDraw()">作図に戻る</button>':'')
      +(ic?'<button class="abtn warn" onclick="GN.editSkel()">作図を編集する</button>':'')
      +(ic?'<button class="abtn danger" onclick="GN.gnReset()">やり直す</button>':'')
      +'</div>'
      +(ic?'<div class="sdiv" style="margin-top:12px;">確定済み外周 '+W+'×'+H+'mm（'+rs.length+'辺）</div>'
        +'<div style="font-size:11px;color:#666;line-height:1.8;">'
        +rs.map(function(s,i){return '辺'+(i+1)+': '+s.angle+'°　'+s.len+'mm';}).join('<br>')
        +(S.cerr&&S.cerr.total>0?'<br><span style="color:'+(S.cerr.warn?'#c33':'#2d7d3a')+';">記録済み誤差：'+S.cerr.total+'mm</span>':'<br>誤差：0mm')
        +'</div>'
        +'<div class="btn-row" style="margin-top:8px;"><button class="abtn" onclick="GN.exportJSON()">JSONを出力</button></div>'
        :'');
  }

  function panelPartition(){
    var modeV=S.addWallMode==='V',modeH=S.addWallMode==='H';
    return '<div class="btn-row" style="margin-bottom:6px;">'      +'<button class="abtn '+(modeV?'warn':'primary')+'" onclick="GN.toggleAddWall(\'V\')">'      +(modeV?'✕ 縦壁モード終了':'｜ 縦壁を追加')+'</button>'      +'<button class="abtn '+(modeH?'warn':'primary')+'" onclick="GN.toggleAddWall(\'H\')">'      +(modeH?'✕ 横壁モード終了':'― 横壁を追加')+'</button>'      +(S.selectedWall?'<button class="abtn danger" onclick="GN.deleteWall()">選択壁を削除</button>':'')      +'</div>'      +(S.addWallMode?'<div style="font-size:11px;color:#0f6e56;padding:2px 0 8px;">'        +(modeV?'縦壁：キャンバスをタップ → X座標に外周端まで伸長':'横壁：キャンバスをタップ → Y座標に外周端まで伸長')        +'</div>':'')      +(S.walls.length>0        ?'<div class="sdiv">間仕切り壁（'+S.walls.length+'本）</div>'        +S.walls.map(function(w2,i){          return '<div class="wall-item">'            +'<span>'+(w2.type==='V'?'縦壁 x='+w2.coord:'横壁 y='+w2.coord)+'mm</span>'            +'<button class="wall-del" onclick="GN.deleteWallById(\''+w2.id+'\')">×</button>'            +'</div>';        }).join('')        :'<div style="font-size:11px;color:#888;">壁がありません。追加ボタンで追加してください。</div>')      +(S.rooms.length>0        ?'<div class="sdiv" style="margin-top:12px;">自動生成された部屋（'+S.rooms.length+'室）</div>'        +S.rooms.map(function(r,i){          return '<div class="room-card">'            +'<div class="room-card-hd">'+(r.name||'部屋'+(i+1))+'　<span style="font-size:10px;color:#888;">'+r.w+'×'+r.h+'mm　'+r.area+'㎡</span></div>'            +'<div class="f-row" style="margin-bottom:6px;">'            +'<span class="f-label">部屋名</span>'            +'<input type="text" value="'+r.name+'" placeholder="例：ミーティングルーム" onchange="GN.updateRoom(\''+r.id+'\',\'name\',this.value)">'            +'</div>'            +'<div class="f-row" style="margin-bottom:6px;">'            +'<span class="f-label">天井高</span>'            +'<input type="number" value="'+r.ch+'" step="50" style="max-width:90px;" onchange="GN.updateRoom(\''+r.id+'\',\'ch\',parseInt(this.value))">'            +'<span class="f-unit">mm</span>'            +'</div>'            +'<div class="f-row" style="margin-bottom:0;">'            +'<span class="f-label">床材</span>'            +'<input type="text" value="'+r.mat.floor+'" placeholder="例：フロアタイル NT-31901" onchange="GN.updateRoomMat(\''+r.id+'\',\'floor\',this.value)">'            +'</div>'            +'</div>';        }).join('')        :'');
  }

  function panelLayer(){
    return '<div class="sdiv">レイヤー表示切替</div>'
      +LAYERS.map(function(l){
        var on=S.layerVis[l.key]!==false;
        return '<div class="layer-item">'
          +'<div class="layer-dot" style="background:'+l.color+';"></div>'
          +'<span class="layer-label">'+l.label+'</span>'
          +'<button class="layer-toggle'+(on?'':' off')+'" onclick="GN.toggleLayer(\''+l.key+'\')">'
          +(on?'ON':'OFF')+'</button>'
          +'</div>';
      }).join('');
  }

  function panelOpening(){
    return '<div style="color:#888;font-size:12px;padding:8px 0;">開口部モードは次のステップで実装します</div>';
  }

  function panelSetting(){
    var dp=gnDrawPts();
    var W=0,H=0;
    if(dp.length>=2){var xs=dp.map(function(p){return p.x;}),ys=dp.map(function(p){return p.y;});W=gnMax(xs)-gnMin(xs);H=gnMax(ys)-gnMin(ys);}
    return '<div style="font-size:12px;color:#555;line-height:2.2;">'
      +'<div>現場名：<b style="color:#222;">'+( S.name||'未設定')+'</b></div>'
      +'<div>構造：'+S.str+'</div>'
      +'<div>天井タイプ：'+(CEILT.find(function(t){return t.value===S.ct;})||CEILT[0]).label+'</div>'
      +'<div>天井高：'+S.ch+'mm</div>'
      +'<div>仮スケルトン：'+(S.gW?S.gW+'×'+S.gH+'mm':'未設定')+'</div>'
      +'<div>外周：'+(S.phase==='confirmed'?'✅ 確定（'+gnRealSegs().length+'辺　'+W+'×'+H+'mm）':S.phase==='drawing'?'⬜ 作図中':'⬜ 未開始')+'</div>'
      +'<div>間仕切り：'+S.walls.length+'本</div>'
      +'<div>部屋数：'+S.rooms.length+'室</div>'
      +'</div>'
      +(S.phase==='confirmed'?'<div class="btn-row" style="margin-top:12px;"><button class="abtn primary" onclick="GN.exportJSON()">JSONを出力</button></div>':'');
  }

  function openPanel(mode){
    document.getElementById('panel').classList.remove('hidden');
    var titles={skeleton:'外周・現場設定',partition:'間仕切り・部屋設定',opening:'開口部',layer:'レイヤー',setting:'設定・出力'};
    document.getElementById('panel-title').textContent=titles[mode]||mode;
    var bodies={skeleton:panelSkeleton,partition:panelPartition,layer:panelLayer,opening:panelOpening,setting:panelSetting};
    document.getElementById('panel-body').innerHTML=bodies[mode]?bodies[mode]():'<div style="color:#888;font-size:12px;padding:8px 0;">このモードは準備中です</div>';
  }
  function closePanel(){
    document.getElementById('panel').classList.add('hidden');
    if(S.phase==='drawing')document.getElementById('wheel-overlay').classList.remove('hidden');
  }
  function backToDraw(){
    document.getElementById('panel').classList.add('hidden');
    document.getElementById('wheel-overlay').classList.remove('hidden');
    setTimeout(function(){document.getElementById('len-val').focus();},100);
  }
  function editSkel(){
    S.phase='drawing';
    document.getElementById('panel').classList.add('hidden');
    document.getElementById('wheel-overlay').classList.remove('hidden');
    gnCalcView(S.gW,S.gH,190);gnUpdWheel();
    setTimeout(function(){document.getElementById('len-val').focus();},100);
  }
  function setMode(m){
    S.mode=m;
    ['skeleton','partition','opening','layer','setting'].forEach(function(k){
      var el=document.getElementById('bb-'+k);if(el)el.classList.toggle('active',k===m);
    });
    if(m!=='partition'){S.addWallMode=false;S.addWallStep=0;S.addWallP1=null;CV.style.cursor='default';}
    openPanel(m);gnPaint();
  }
  function startDraw(){
    if(!S.name){gnErr('現場名を入力してください');return;}
    if(!S.gW||!S.gH){gnErr('最大幅・最大奥行を入力してください');return;}
    S.phase='drawing';S.segs=[];S.pts=[{x:0,y:0}];S.cerr=null;
    gnCalcView(S.gW,S.gH,190);
    document.getElementById('panel').classList.add('hidden');
    document.getElementById('wheel-overlay').classList.remove('hidden');
    document.getElementById('fitview-btn').style.display='none';
    gnUpdWheel();gnPaint();
  }
  function gnReset(){
    if(!confirm('外周・間仕切りをすべてリセットしますか？'))return;
    S.phase='setup';S.segs=[];S.pts=[{x:0,y:0}];
    S.gW=0;S.gH=0;S.cerr=null;
    S.walls=[];S.rooms=[];S.selectedWall=null;S.addWallMode=false;
    document.getElementById('wheel-overlay').classList.add('hidden');
    document.getElementById('fitview-btn').style.display='none';
    gnPaint();openPanel('skeleton');
  }

  // 間仕切り操作
  function toggleAddWall(type){
    // 同じタイプを再押しでOFF、違うタイプはそちらに切替
    if(S.addWallMode===type){S.addWallMode=false;}
    else{S.addWallMode=type;}
    S.addWallStep=0;S.addWallP1=null;S.selectedWall=null;
    CV.style.cursor=S.addWallMode?'crosshair':'default';
    openPanel('partition');gnPaint();
  }
  function deleteWall(){
    if(!S.selectedWall)return;
    S.walls=S.walls.filter(function(w2){return w2!==S.selectedWall;});
    S.selectedWall=null;updateRooms();openPanel('partition');gnPaint();
  }
  function deleteWallById(id){
    S.walls=S.walls.filter(function(w2){return w2.id!==id;});
    if(S.selectedWall&&S.selectedWall.id===id)S.selectedWall=null;
    updateRooms();openPanel('partition');gnPaint();
  }
  function updateRoom(id,key,val){
    var r=S.rooms.find(function(r2){return r2.id===id;});if(r)r[key]=val;gnPaint();
  }
  function updateRoomMat(id,key,val){
    var r=S.rooms.find(function(r2){return r2.id===id;});if(r)r.mat[key]=val;
  }
  function toggleLayer(key){
    S.layerVis[key]=!S.layerVis[key];openPanel('layer');gnPaint();
  }

  // 起動（rAFで1フレーム待ってからCA.offsetWidthを取得）
  requestAnimationFrame(function(){
    CV.width=CA.offsetWidth;CV.height=CA.offsetHeight;
    updateRooms();fitView();setMode('partition');
  });

  return {
    fitView:fitView,addSeg:addSeg,tryClose:tryClose,undoSeg:undoSeg,
    toggleLockSeg:toggleLockSeg,cancelSegSelect:cancelSegSelect,doCloseWithLocks:doCloseWithLocks,
    startLockMode:startLockMode,gnCanLockMore:gnCanLockMore,
    confirmClose:confirmClose,forceClose:forceClose,forceCloseDirect:forceCloseDirect,closeDlg:closeDlg,
    closeWithSnap:closeWithSnap,closeWithActual:closeWithActual,
    openPanel:openPanel,closePanel:closePanel,setMode:setMode,
    startDraw:startDraw,gnReset:gnReset,backToDraw:backToDraw,editSkel:editSkel,
    exportJSON:exportJSON,
    setName:setName,setStr:setStr,setCt:setCt,setCh:setCh,setGW:setGW,setGH:setGH,setThr:setThr,
    toggleAddWall:toggleAddWall,deleteWall:deleteWall,deleteWallById:deleteWallById,
    updateRoom:updateRoom,updateRoomMat:updateRoomMat,toggleLayer:toggleLayer,
  };
})();
</script>
</body>
</html>
