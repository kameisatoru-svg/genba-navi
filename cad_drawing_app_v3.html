<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>図面作成｜アート・レイズ</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e2d40">
<style>
:root{
  --bg:#eeebe5;--navy:#1e2d40;--navy2:#2a3f5a;
  --accent:#c8a96e;--text:#1e2d40;--text2:#5a6a7a;--white:#ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;
  font-family:'Meiryo','Yu Gothic',sans-serif;
  background:var(--bg);color:var(--text);
  overflow:hidden;
}
#app{display:flex;flex-direction:column;height:100dvh;}

/* ── ヘッダー ── */
.header{
  background:var(--navy);height:50px;
  display:flex;align-items:center;padding:0 6px;gap:3px;flex-shrink:0;
}
.hbtn{
  width:44px;height:44px;border:none;background:transparent;
  color:var(--white);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;flex-shrink:0;
}
.hbtn:active{background:rgba(255,255,255,0.15);}
.hbtn svg{pointer-events:none;}
.header-spacer{flex:1;}

/* 図面種別ボタン（ドロップダウントリガー） */
#dtype-btn{
  height:34px;padding:0 10px;
  background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);
  border-radius:8px;color:var(--white);cursor:pointer;
  font-size:13px;font-weight:700;
  font-family:'Meiryo','Yu Gothic',sans-serif;
  display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;
}
#dtype-btn:active{background:rgba(255,255,255,0.22);}
#dtype-btn .arrow{font-size:9px;opacity:0.7;}

/* パーツボタン */
#parts-btn{
  height:34px;padding:0 12px;
  background:var(--accent);border:none;
  border-radius:8px;color:var(--navy);cursor:pointer;
  font-size:13px;font-weight:700;
  font-family:'Meiryo','Yu Gothic',sans-serif;
  display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;
}
#parts-btn:active{opacity:0.85;}
#parts-btn.open{background:rgba(200,169,110,0.3);color:var(--white);}

/* 種別ドロップダウン */
#dtype-dropdown{
  display:none;position:absolute;top:50px;left:6px;z-index:50;
  background:var(--navy2);border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  overflow:hidden;min-width:130px;
}
#dtype-dropdown.show{display:block;}
.dd-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;cursor:pointer;
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.8);
  font-family:'Meiryo','Yu Gothic',sans-serif;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.dd-item:last-child{border-bottom:none;}
.dd-item:active{background:rgba(255,255,255,0.1);}
.dd-item.active{color:var(--accent);}
.dd-item.active::after{content:"✓";margin-left:auto;font-size:12px;}

/* ── パーツパネル（ヘッダーのパーツボタンから開く） ── */
#parts-panel{
  position:absolute;left:0;right:0;bottom:0;z-index:25;
  background:var(--white);border-radius:18px 18px 0 0;
  box-shadow:0 -4px 24px rgba(30,45,64,0.18);
  transform:translateY(100%);
  transition:transform 0.28s cubic-bezier(0.32,0.72,0,1);
  max-height:60dvh;display:flex;flex-direction:column;overflow:hidden;
}
#parts-panel.open{transform:translateY(0);}
.pp-handle{width:36px;height:4px;border-radius:2px;background:rgba(30,45,64,0.2);margin:10px auto 0;flex-shrink:0;}
.pp-scroll{flex:1;overflow-y:auto;padding:10px 12px 24px;-webkit-overflow-scrolling:touch;}
#cwrap{
  flex:1;position:relative;overflow:hidden;
  background:#f4f2ee;
}
canvas{display:block;touch-action:none;}

/* ── ステータスバー ── */
#sb{
  height:26px;background:var(--navy);
  display:flex;align-items:center;padding:0 12px;
  font-size:10px;color:rgba(255,255,255,0.5);
  flex-shrink:0;letter-spacing:0.03em;
}

/* ── フローティング＋ボタン ── */
#fab{
  position:absolute;right:16px;bottom:16px;z-index:30;
  width:56px;height:56px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(30,45,64,0.35);
  transition:transform 0.2s,background 0.2s;
  color:var(--navy);
}
#fab:active{transform:scale(0.92);}
#fab.open{background:var(--navy2);color:var(--white);transform:rotate(45deg);}

/* ── パネル（スライドアップ） ── */
#panel{
  position:absolute;left:0;right:0;bottom:0;z-index:20;
  background:var(--white);border-radius:18px 18px 0 0;
  box-shadow:0 -4px 24px rgba(30,45,64,0.18);
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height:75dvh;display:flex;flex-direction:column;
  overflow:hidden;
}
#panel.open{transform:translateY(0);}

/* パネルハンドル */
.panel-handle{
  width:36px;height:4px;border-radius:2px;
  background:rgba(30,45,64,0.2);
  margin:10px auto 0;flex-shrink:0;
}

/* パネルスクロール */
.panel-scroll{
  flex:1;overflow-y:auto;padding:12px 12px 24px;
  -webkit-overflow-scrolling:touch;
}

/* ── セクション ── */
.p-section{margin-bottom:14px;}
.p-sec-title{
  font-size:10px;font-weight:700;color:var(--text2);
  letter-spacing:0.08em;margin-bottom:7px;padding-left:2px;
}

/* ── 図面種別タブ ── */
.dtype-row{display:flex;gap:6px;}
.dtype-btn{
  flex:1;height:38px;border:1.5px solid rgba(30,45,64,0.2);
  background:transparent;border-radius:10px;
  font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;
  font-family:'Meiryo','Yu Gothic',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:all 0.15s;
}
.dtype-btn.on{background:var(--navy);color:var(--white);border-color:var(--navy);}
.dtype-btn svg{flex-shrink:0;}

/* ── 部屋生成フォーム ── */
.gen-form{
  background:var(--bg);border-radius:12px;padding:10px 12px;
  display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;
}
.gen-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:70px;}
.gen-label{font-size:10px;color:var(--text2);font-weight:600;}
.gen-input{
  height:36px;border:1.5px solid rgba(30,45,64,0.2);
  border-radius:8px;background:var(--white);
  font-size:13px;color:var(--text);
  padding:0 8px;outline:none;
  font-family:'Meiryo','Yu Gothic',sans-serif;
  text-align:right;
}
.gen-input:focus{border-color:var(--navy);}
.gen-select{
  height:36px;border:1.5px solid rgba(30,45,64,0.2);
  border-radius:8px;background:var(--white);
  font-size:12px;color:var(--text);
  padding:0 6px;outline:none;
  font-family:'Meiryo','Yu Gothic',sans-serif;
}
.gen-btn{
  height:36px;padding:0 14px;
  background:var(--navy);color:var(--white);
  border:none;border-radius:8px;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Meiryo','Yu Gothic',sans-serif;white-space:nowrap;
}
.gen-btn:active{opacity:0.8;}
.gen-btn.add{background:var(--navy2);}

/* ── カテゴリタブ ── */
.cat-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.cat-row::-webkit-scrollbar{display:none;}
.cat-btn{
  flex-shrink:0;height:28px;padding:0 12px;
  border:1.5px solid rgba(30,45,64,0.18);
  background:transparent;border-radius:20px;
  font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;
  font-family:'Meiryo','Yu Gothic',sans-serif;white-space:nowrap;
}
.cat-btn.on{background:var(--navy);color:var(--white);border-color:var(--navy);}

/* ── パーツグリッド ── */
.parts-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));
  gap:6px;margin-top:2px;
}
.part-item{
  display:flex;flex-direction:column;align-items:center;
  padding:6px 4px 5px;border:1.5px solid rgba(30,45,64,0.15);
  border-radius:10px;cursor:grab;background:var(--white);
  user-select:none;-webkit-user-select:none;
  transition:border-color 0.15s,background 0.15s;
  gap:3px;
}
.part-item:active{background:rgba(200,169,110,0.15);border-color:var(--accent);}
.part-label{font-size:9px;color:var(--text2);text-align:center;line-height:1.2;}

/* ── 操作ボタン行 ── */
.op-row{display:flex;gap:6px;}
.op-btn{
  flex:1;height:40px;border:1.5px solid rgba(30,45,64,0.2);
  background:transparent;border-radius:10px;
  font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;
  font-family:'Meiryo','Yu Gothic',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all 0.15s;
}
.op-btn:active{background:rgba(30,45,64,0.08);}
.op-btn.on{background:var(--navy);color:var(--white);border-color:var(--navy);}
.op-btn.danger{border-color:rgba(180,40,40,0.3);color:#b42828;}
.op-btn.danger:active{background:rgba(180,40,40,0.08);}

/* ── オーバーレイ背景 ── */
#panel-bg{
  display:none;position:absolute;inset:0;z-index:10;
  background:rgba(0,0,0,0.3);
}
#panel-bg.show{display:block;}

/* ── 部品選択ツールバー（キャンバス上） ── */
#sel-toolbar{
  display:none;position:absolute;
  bottom:84px;left:50%;transform:translateX(-50%);
  background:var(--navy);border-radius:12px;
  padding:6px 8px;gap:6px;flex-direction:row;z-index:15;
  white-space:nowrap;box-shadow:0 4px 16px rgba(30,45,64,0.3);
}
#sel-toolbar.show{display:flex;}
#sel-toolbar button{
  height:36px;padding:0 12px;border:1.5px solid rgba(255,255,255,0.25);
  border-radius:8px;background:transparent;cursor:pointer;
  font-size:11px;font-weight:700;
  font-family:'Meiryo','Yu Gothic',sans-serif;color:var(--white);
}
#sel-toolbar button:active{background:rgba(255,255,255,0.15);}
#sel-toolbar button.danger-btn{border-color:rgba(255,80,80,0.5);color:#ff8080;}

/* ── 寸法入力モーダル ── */
#overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.5);z-index:100;
  align-items:flex-end;justify-content:center;
}
#overlay.show{display:flex;}
#dlg{
  background:var(--white);border-radius:18px 18px 0 0;
  padding:20px 18px 32px;width:100%;max-width:480px;
}
#dlg h3{
  font-size:13px;font-weight:700;color:var(--text2);
  margin-bottom:14px;
}
.dlg-field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.dlg-field label{font-size:11px;font-weight:600;color:var(--text2);}
.dlg-field input{
  height:48px;border:2px solid rgba(30,45,64,0.2);
  border-radius:12px;background:var(--bg);
  font-size:20px;font-weight:700;color:var(--text);
  padding:0 14px;outline:none;text-align:right;
  font-family:'Meiryo','Yu Gothic',sans-serif;
}
.dlg-field input:focus{border-color:var(--navy);}
.dlg-btns{display:flex;gap:10px;margin-top:16px;}
.dlg-cancel{
  flex:1;height:48px;border:2px solid rgba(30,45,64,0.15);
  background:transparent;border-radius:12px;
  font-size:15px;color:var(--text2);cursor:pointer;
  font-family:'Meiryo','Yu Gothic',sans-serif;
}
.dlg-ok{
  flex:2;height:48px;border:none;
  background:var(--navy);border-radius:12px;
  font-size:15px;font-weight:700;color:var(--white);cursor:pointer;
  font-family:'Meiryo','Yu Gothic',sans-serif;
}

/* ── 部屋接合ダイアログ ── */
#step-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.5);z-index:110;
  align-items:flex-end;justify-content:center;
}
#step-overlay.show{display:flex;}
#step-dlg{
  background:var(--white);border-radius:18px 18px 0 0;
  padding:20px 18px 32px;width:100%;max-width:480px;
}
#step-dlg h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:8px;}
#step-dlg p{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.7;}
#step-dlg-btns{display:flex;flex-direction:column;gap:8px;}
#step-dlg-btns button{
  height:46px;border:1.5px solid rgba(30,45,64,0.2);
  border-radius:12px;background:var(--bg);cursor:pointer;
  font-size:13px;font-weight:600;color:var(--text);text-align:left;
  padding:0 16px;font-family:'Meiryo','Yu Gothic',sans-serif;
}
#step-dlg-btns button:active{background:rgba(30,45,64,0.08);}
</style>
</head>
<body>
<div id="app">

  <!-- 種別ドロップダウン -->
  <div id="dtype-dropdown">
    <div class="dd-item active" id="dd-floor" onclick="setType('floor');closeDtypeDD()">
      <svg width="14" height="14" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="11" height="11" rx="1" stroke="currentColor" stroke-width="1.4"/><line x1="1" y1="5" x2="12" y2="5" stroke="currentColor" stroke-width="1"/><line x1="5" y1="1" x2="5" y2="12" stroke="currentColor" stroke-width="1"/></svg>
      平面図
    </div>
    <div class="dd-item" id="dd-ceiling" onclick="setType('ceiling');closeDtypeDD()">
      <svg width="14" height="14" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="11" height="11" rx="1" stroke="currentColor" stroke-width="1.4" stroke-dasharray="2 1.5"/><line x1="3" y1="6.5" x2="10" y2="6.5" stroke="currentColor" stroke-width="1"/><line x1="6.5" y1="3" x2="6.5" y2="10" stroke="currentColor" stroke-width="1"/></svg>
      天井図
    </div>
    <div class="dd-item" id="dd-spread" onclick="setType('spread');closeDtypeDD()">
      <svg width="14" height="14" viewBox="0 0 13 13" fill="none"><rect x="1" y="3" width="11" height="7" rx="1" stroke="currentColor" stroke-width="1.4"/><line x1="4" y1="3" x2="4" y2="10" stroke="currentColor" stroke-width="1"/><line x1="9" y1="3" x2="9" y2="10" stroke="currentColor" stroke-width="1"/></svg>
      展開図
    </div>
    <div class="dd-item" id="dd-elev" onclick="setType('elev');closeDtypeDD()">
      <svg width="14" height="14" viewBox="0 0 13 13" fill="none"><rect x="1" y="2" width="11" height="9" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="3" y="5" width="3" height="6" stroke="currentColor" stroke-width="1"/><rect x="8" y="4" width="3" height="7" stroke="currentColor" stroke-width="1"/></svg>
      立面図
    </div>
  </div>

  <!-- ヘッダー -->
  <div class="header">
    <button class="hbtn" onclick="goBack()" title="戻る">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M14 6L9 11L14 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button id="dtype-btn" onclick="toggleDtypeDD()">
      <span id="dtype-label">平面図</span>
      <span class="arrow">▼</span>
    </button>
    <button id="parts-btn" onclick="togglePartsPanel()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/>
        <rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/>
        <rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/>
        <rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/>
      </svg>
      パーツ
    </button>
    <div class="header-spacer"></div>
    <button class="hbtn" onclick="doUndo()" title="元に戻す">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M5 10.5C5 7.46 7.46 5 10.5 5C13.54 5 16 7.46 16 10.5S13.54 16 10.5 16H8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M5 8L5 10.5L7.5 10.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="hbtn" onclick="doRedo()" title="やり直し">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M17 10.5C17 7.46 14.54 5 11.5 5C8.46 5 6 7.46 6 10.5S8.46 16 11.5 16H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M17 8L17 10.5L14.5 10.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="hbtn" onclick="doSave()" title="保存（PNG）">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="4" y="3" width="14" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8 3v5h6V3" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M7 13h8M7 16h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- キャンバスラップ -->
  <div id="cwrap">
    <canvas id="c"></canvas>

    <!-- 部品選択ツールバー -->
    <div id="sel-toolbar">
      <button onclick="rotSel()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="margin-right:3px">
          <path d="M2 4C3.2 1.8 6.2 1 9 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M9 1v2.5H6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 10C10.8 12.2 7.8 13 5 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>回転
      </button>
      <button id="btn-flip" onclick="flipSel()" style="display:none">反転</button>
      <button class="danger-btn" onclick="delSel()">削除</button>
    </div>

    <!-- パーツパネル（ヘッダーのパーツボタンで開閉） -->
    <div id="parts-panel">
      <div class="pp-handle"></div>
      <div class="pp-scroll">
        <div class="cat-row" id="catbar" style="margin-bottom:8px;"></div>
        <div class="parts-grid" id="plist"></div>
      </div>
    </div>

    <!-- パネル背景 -->
    <div id="panel-bg" onclick="closeAllPanels()"></div>

    <!-- スライドアップパネル（FAB：部屋生成・操作） -->
    <div id="panel">
      <div class="panel-handle"></div>
      <div class="panel-scroll">

        <!-- 部屋サイズ・縮尺 -->
        <div class="p-section">
          <div class="p-sec-title">部屋サイズ・縮尺</div>
          <div class="gen-form">
            <div class="gen-field">
              <span class="gen-label" id="lw">W 間口 (mm)</span>
              <input class="gen-input" id="iw" type="number" value="6000" min="100" max="99999">
            </div>
            <div class="gen-field">
              <span class="gen-label" id="lh">D 奥行 (mm)</span>
              <input class="gen-input" id="ih" type="number" value="4000" min="100" max="99999">
            </div>
            <div class="gen-field" style="min-width:72px;max-width:80px;">
              <span class="gen-label">縮尺</span>
              <select class="gen-select" id="iscale">
                <option value="20">1:20</option>
                <option value="50" selected>1:50</option>
                <option value="100">1:100</option>
                <option value="200">1:200</option>
                <option value="300">1:300</option>
                <option value="500">1:500</option>
              </select>
            </div>
            <button class="gen-btn" onclick="genRoom()">生成</button>
            <button class="gen-btn add" id="btn-add" style="display:none" onclick="addRoom()">追加</button>
          </div>
        </div>

        <!-- 操作ボタン -->
        <div class="p-section">
          <div class="p-sec-title">操作</div>
          <div class="op-row" style="margin-bottom:6px;">
            <button class="op-btn on" id="op-sel" onclick="setTool('sel')">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M3 2L3 12L6 9L8 13L9.5 12.3L7.5 8.3L11 8L3 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/></svg>
              選択
            </button>

// ===== STATE（シーン管理） =====
// floor/ceiling は rooms・openings・縮尺を共有（floorが正）
// spread/elev は完全独立
function makeScene(){
  return{objects:[],undoStk:[],redoStk:[],zoom:1,panX:120,panY:80};
}

// --- アクセサ ---
function rooms_(){return(dtype==="floor"||dtype==="ceiling")?shared.rooms:indep[dtype].rooms;}

function scaleFixed_(){return(dtype==="floor"||dtype==="ceiling")?shared.scaleFixed:indep[dtype].scaleFixed;}
function setRooms(v){if(dtype==="floor"||dtype==="ceiling")shared.rooms=v;else indep[dtype].rooms=v;}
function setOpenings(v){if(dtype==="floor"||dtype==="ceiling")shared.openings=v;else indep[dtype].openings=v;}

// ===== 座標計算 =====
function px(mm){return mm*SC_()*cur.zoom;}
function c2abs(cx,cy){var z=SC_()*cur.zoom;return{x:(cx-cur.panX)/z,y:(cy-cur.panY)/z};}
function snp(v){return Math.round(v/20)*20;}
function roomOuterW(rm){return rm.w+WALL_T*2;}
function roomOuterH(rm){return rm.h+WALL_T*2;}
function rm2c(rm,mx,my){var z=SC_()*cur.zoom;return{x:cur.panX+(rm.x+mx)*z,y:cur.panY+(rm.y+my)*z};}
function c2rm(rm,cx,cy){var z=SC_()*cur.zoom;return{x:(cx-cur.panX)/z-rm.x,y:(cy-cur.panY)/z-rm.y};}
function getRoomById(id){var rs=rooms_();for(var i=0;i<rs.length;i++){if(rs[i].id===id)return rs[i];}return null;}
function getFrameRect(rm){var ow=roomOuterW(rm),oh=roomOuterH(rm),z=SC_()*cur.zoom;return{x0:cur.panX+rm.x*z,y0:cur.panY+rm.y*z,x1:cur.panX+(rm.x+ow)*z,y1:cur.panY+(rm.y+oh)*z};}
function getInnerRect(rm){var r=getFrameRect(rm),t=px(WALL_T);return{x0:r.x0+t,y0:r.y0+t,x1:r.x1-t,y1:r.y1-t};}

// ===== GROUPS =====
function getRoomGroups(){
  var rs=rooms_(),visited={},groups=[];
  for(var i=0;i<rs.length;i++){
    if(visited[rs[i].id])continue;
    var group=[rs[i]];visited[rs[i].id]=true;var queue=[rs[i]];
    while(queue.length>0){
      var c0=queue.shift();
      for(var j=0;j<rs.length;j++){
        if(visited[rs[j].id])continue;
        if(checkAdjacency(c0,rs[j]).length>0){visited[rs[j].id]=true;group.push(rs[j]);queue.push(rs[j]);}
      }
    }
    groups.push(group);
  }
  return groups;
}
function getGroupBBox(group){
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(var i=0;i<group.length;i++){var rm=group[i];minX=Math.min(minX,rm.x);minY=Math.min(minY,rm.y);maxX=Math.max(maxX,rm.x+roomOuterW(rm));maxY=Math.max(maxY,rm.y+roomOuterH(rm));}
  return{x:minX,y:minY,w:maxX-minX,h:maxY-minY};
}
function getGroupCanvasRect(group){
  var bb=getGroupBBox(group),z=SC_()*cur.zoom;
  return{x0:cur.panX+bb.x*z,y0:cur.panY+bb.y*z,x1:cur.panX+(bb.x+bb.w)*z,y1:cur.panY+(bb.y+bb.h)*z,fw:bb.w*z,fh:bb.h*z,bbox:bb};
}
function hitGroupBorder(group,cx,cy){
  var gc=getGroupCanvasRect(group),tol=18;
  return cx>=gc.x0-tol&&cx<=gc.x1+tol&&cy>=gc.y0-tol&&cy<=gc.y1+tol&&!(cx>=gc.x0+tol&&cx<=gc.x1-tol&&cy>=gc.y0+tol&&cy<=gc.y1-tol);
}
function hitGroupInside(group,cx,cy){var gc=getGroupCanvasRect(group);return cx>gc.x0&&cx<gc.x1&&cy>gc.y0&&cy<gc.y1;}
function hitGroupHandle(group,cx,cy){
  var gc=getGroupCanvasRect(group),tol=22;
  var handles={right:{x:gc.x1,y:(gc.y0+gc.y1)/2},left:{x:gc.x0,y:(gc.y0+gc.y1)/2},bottom:{x:(gc.x0+gc.x1)/2,y:gc.y1},top:{x:(gc.x0+gc.x1)/2,y:gc.y0},"corner-br":{x:gc.x1,y:gc.y1},"corner-bl":{x:gc.x0,y:gc.y1},"corner-tr":{x:gc.x1,y:gc.y0},"corner-tl":{x:gc.x0,y:gc.y0}};
  for(var k in handles){var h=handles[k];if(Math.abs(cx-h.x)<tol&&Math.abs(cy-h.y)<tol)return k;}
  return null;
}
function checkAdjacency(a,b){
  var T=WALL_T,aw=roomOuterW(a),ah=roomOuterH(a),bw=roomOuterW(b),bh=roomOuterH(b),res=[],tol=T*1.5;
  if(Math.abs((a.x+aw)-b.x)<tol&&Math.max(a.y,b.y)<Math.min(a.y+ah,b.y+bh)-T*2)res.push({side:"right"});
  if(Math.abs((b.x+bw)-a.x)<tol&&Math.max(a.y,b.y)<Math.min(a.y+ah,b.y+bh)-T*2)res.push({side:"left"});
  if(Math.abs((a.y+ah)-b.y)<tol&&Math.max(a.x,b.x)<Math.min(a.x+aw,b.x+bw)-T*2)res.push({side:"bottom"});
  if(Math.abs((b.y+bh)-a.y)<tol&&Math.max(a.x,b.x)<Math.min(a.x+aw,b.x+bw)-T*2)res.push({side:"top"});
  return res;
}
function checkCornerSnap(a,b){
  var T=WALL_T,aw=roomOuterW(a),ah=roomOuterH(a),bw=roomOuterW(b),bh=roomOuterH(b);
  var ca=[{name:"tl",x:a.x,y:a.y},{name:"tr",x:a.x+aw,y:a.y},{name:"bl",x:a.x,y:a.y+ah},{name:"br",x:a.x+aw,y:a.y+ah}];
  var cb=[{name:"tl",x:b.x,y:b.y},{name:"tr",x:b.x+bw,y:b.y},{name:"bl",x:b.x,y:b.y+bh},{name:"br",x:b.x+bw,y:b.y+bh}];
  for(var i=0;i<ca.length;i++)for(var j=0;j<cb.length;j++){if(Math.abs(ca[i].x-cb[j].x)<CORNER_SNAP&&Math.abs(ca[i].y-cb[j].y)<CORNER_SNAP)return{c1:ca[i],c2:cb[j]};}
  return null;
}
function isSameGroup(g1,g2){if(g1.length!==g2.length)return false;var ids={};for(var i=0;i<g1.length;i++)ids[g1[i].id]=1;for(var j=0;j<g2.length;j++){if(!ids[g2[j].id])return false;}return true;}
function getGroupForRoom(rm){var groups=getRoomGroups();for(var i=0;i<groups.length;i++){for(var j=0;j<groups[i].length;j++){if(groups[i][j].id===rm.id)return groups[i];}}return null;}
function getDropTargetRoom(cx,cy){var rs=rooms_();for(var i=rs.length-1;i>=0;i--){var r=getFrameRect(rs[i]);if(cx>r.x0&&cx<r.x1&&cy>r.y0&&cy<r.y1)return rs[i];}return null;}
function getOverlapRect(a,b,side){
  var T=WALL_T,aw=roomOuterW(a),ah=roomOuterH(a),bw=roomOuterW(b),bh=roomOuterH(b),ax=a.x,ay=a.y,bx=b.x,by=b.y,z=SC_()*cur.zoom;
  var rx,ry,rw,rh;
  if(side==="right"||side==="left"){rx=side==="right"?ax+aw-T:bx+bw-T;ry=Math.max(ay,by)+T;rw=T*2;rh=Math.min(ay+ah,by+bh)-T-ry;}
  else{rx=Math.max(ax,bx)+T;ry=side==="bottom"?ay+ah-T:by+bh-T;rw=Math.min(ax+aw,bx+bw)-T-rx;rh=T*2;}
  return{x:cur.panX+rx*z,y:cur.panY+ry*z,w:rw*z,h:rh*z};
}
function updateDragHighlights(movingRooms){
  adjHighlight=null;cornerHighlight=null;
  var others=rooms_().filter(function(r){for(var k=0;k<movingRooms.length;k++){if(movingRooms[k].id===r.id)return false;}return true;});
  for(var i=0;i<movingRooms.length;i++){for(var j=0;j<others.length;j++){
    if(!adjHighlight){var adjs=checkAdjacency(movingRooms[i],others[j]);if(adjs.length>0)adjHighlight=getOverlapRect(movingRooms[i],others[j],adjs[0].side);}
    if(!cornerHighlight){var cm=checkCornerSnap(movingRooms[i],others[j]);if(cm)cornerHighlight={c1:cm.c1,c2:cm.c2,px1:cur.panX+cm.c1.x*SC_()*cur.zoom,py1:cur.panY+cm.c1.y*SC_()*cur.zoom,px2:cur.panX+cm.c2.x*SC_()*cur.zoom,py2:cur.panY+cm.c2.y*SC_()*cur.zoom,r1:movingRooms[i],r2:others[j]};}
  }}
}
function checkAndShowDialog(movingRooms){
  var others=rooms_().filter(function(r){for(var k=0;k<movingRooms.length;k++){if(movingRooms[k].id===r.id)return false;}return true;});
  var adjInfo=null,cornerInfo=null;
  for(var i=0;i<movingRooms.length;i++){for(var j=0;j<others.length;j++){
    if(!adjInfo){var adjs=checkAdjacency(movingRooms[i],others[j]);if(adjs.length>0)adjInfo={r1:movingRooms[i],r2:others[j],side:adjs[0].side};}
    if(!cornerInfo){var cm=checkCornerSnap(movingRooms[i],others[j]);if(cm)cornerInfo={r1:movingRooms[i],r2:others[j],match:cm};}
  }}
  if(!adjInfo&&!cornerInfo){adjHighlight=null;cornerHighlight=null;return;}
  pendMerge={adjInfo:adjInfo,cornerInfo:cornerInfo};showStep1();
}
function showStepDlg(title,msg,buttons){
  document.getElementById("step-title").textContent=title;document.getElementById("step-msg").textContent=msg;
  var btns=document.getElementById("step-dlg-btns");btns.innerHTML="";
  for(var i=0;i<buttons.length;i++){(function(b){var el=document.createElement("button");el.textContent=b.label;el.onclick=b.fn;btns.appendChild(el);})(buttons[i]);}
  document.getElementById("step-overlay").classList.add("show");
}
function closeStepDlg(){document.getElementById("step-overlay").classList.remove("show");}
function showStep1(){
  if(pendMerge.cornerInfo){showStepDlg("コーナー揃え","コーナーが接近しています。外周を揃えますか？",[
    {label:"揃える",fn:function(){closeStepDlg();applyCornerAlign();showStep2();}},
    {label:"揃えない",fn:function(){closeStepDlg();showStep2();}},
    {label:"処理しない",fn:function(){closeStepDlg();pendMerge=null;adjHighlight=null;cornerHighlight=null;render();}}
  ]);}else{showStep2();}
}
function applyCornerAlign(){
  if(!pendMerge||!pendMerge.cornerInfo)return;
  var cm=pendMerge.cornerInfo.match,r1=pendMerge.cornerInfo.r1,r2=pendMerge.cornerInfo.r2,T=WALL_T;
  var c1=cm.c1,c2=cm.c2,newX=r1.x,newY=r1.y;
  if((c1.name==='tr'||c1.name==='br')&&(c2.name==='tl'||c2.name==='bl')){newX=c2.x-roomOuterW(r1)+T;}
  else if((c1.name==='tl'||c1.name==='bl')&&(c2.name==='tr'||c2.name==='br')){newX=c2.x-T;}
  else if((c1.name==='tl'||c1.name==='bl')&&(c2.name==='tl'||c2.name==='bl')){newX=c2.x;}
  else if((c1.name==='tr'||c1.name==='br')&&(c2.name==='tr'||c2.name==='br')){newX=c2.x-roomOuterW(r1);}
  else{newX=r1.x+(c2.x-c1.x);}
  if((c1.name==='bl'||c1.name==='br')&&(c2.name==='tl'||c2.name==='tr')){newY=c2.y-roomOuterH(r1)+T;}
  else if((c1.name==='tl'||c1.name==='tr')&&(c2.name==='bl'||c2.name==='br')){newY=c2.y-T;}
  else if((c1.name==='tl'||c1.name==='tr')&&(c2.name==='tl'||c2.name==='tr')){newY=c2.y;}
  else if((c1.name==='bl'||c1.name==='br')&&(c2.name==='bl'||c2.name==='br')){newY=c2.y-roomOuterH(r1);}
  else{newY=r1.y+(c2.y-c1.y);}
  r1.x=snp(newX);r1.y=snp(newY);
  var adjs=checkAdjacency(r1,r2);
  if(adjs.length>0){pendMerge.adjInfo={r1:r1,r2:r2,side:adjs[0].side};adjHighlight=getOverlapRect(r1,r2,adjs[0].side);}
  cornerHighlight=null;render();
}
function showStep2(){
  if(!pendMerge||!pendMerge.adjInfo){pendMerge=null;adjHighlight=null;cornerHighlight=null;render();return;}
  var sl={right:"右",left:"左",bottom:"下",top:"上"};
  showStepDlg("接触面の壁処理",'"'+pendMerge.adjInfo.r1.label+'" の'+sl[pendMerge.adjInfo.side]+'辺が "'+pendMerge.adjInfo.r2.label+'" と接触しています。接触面の壁を開口にしますか？',[
    {label:"開口にする（行き来できるようにする）",fn:function(){closeStepDlg();applyOpening();pendMerge=null;adjHighlight=null;cornerHighlight=null;render();}},
    {label:"壁のままにする",fn:function(){closeStepDlg();pendMerge=null;adjHighlight=null;cornerHighlight=null;render();}}
  ]);
}
function applyOpening(){
  if(!pendMerge||!pendMerge.adjInfo)return;
  saveUndo();
  var r1=pendMerge.adjInfo.r1,r2=pendMerge.adjInfo.r2,side=pendMerge.adjInfo.side,T=WALL_T;
  var ax=r1.x,ay=r1.y,aw=roomOuterW(r1),ah=roomOuterH(r1),bx=r2.x,by=r2.y,bh=roomOuterH(r2);
  var op={id:Date.now(),r1id:r1.id,r2id:r2.id,side:side};
  if(side==="right"||side==="left"){op.y1=Math.max(ay,by)+T;op.y2=Math.min(ay+ah,by+bh)-T;op.x=side==="right"?ax+aw-T:bx+roomOuterW(r2)-T;op.w=T*2;}
  else{op.x1=Math.max(ax,bx)+T;op.x2=Math.min(ax+aw,bx+roomOuterW(r2))-T;op.y=side==="bottom"?ay+ah-T:by+bh-T;op.h=T*2;}
  openings_().push(op);
}
function snapToWall(rm,ox,oy,ow,oh,id){
  if(!SNAP_IDS[id])return null;
  var T=WALL_T,W=roomOuterW(rm),H=roomOuterH(rm),th=(id==="door1"||id==="door2")?40:T;
  var cx=ox+ow/2,cy=oy+oh/2;var best=null,bestD=SNAP_DIST,d;
  d=Math.abs(cy-(T+th/2));if(d<bestD){bestD=d;best={x:cx-ow/2,y:T,rot:false};}
  d=Math.abs(cy-(H-T-th/2));if(d<bestD){bestD=d;best={x:cx-ow/2,y:H-T-th,rot:false};}
  d=Math.abs(cx-(T+th/2));if(d<bestD){bestD=d;best={x:T,y:cy-ow/2,rot:true};}
  d=Math.abs(cx-(W-T-th/2));if(d<bestD){bestD=d;best={x:W-T-th,y:cy-ow/2,rot:true};}
  if(id==="wall"){
    d=Math.abs(oy-T);if(d<bestD){bestD=d;best={x:cx-ow/2,y:T,rot:false};}
    d=Math.abs((oy+oh)-(H-T));if(d<bestD){bestD=d;best={x:cx-ow/2,y:H-T-oh,rot:false};}
    d=Math.abs(ox-T);if(d<bestD){bestD=d;best={x:T,y:cy-oh/2,rot:false};}
    d=Math.abs((ox+ow)-(W-T));if(d<bestD){bestD=d;best={x:W-T-ow,y:cy-oh/2,rot:false};}
  }
  return best;
}

var canvas=document.getElementById("c");
var ctx=canvas.getContext("2d");
var cwrap=document.getElementById("cwrap");

// ===== RENDER =====
function render(){
  var W=canvas.width,H=canvas.height,z=SC_()*cur.zoom;
  ctx.clearRect(0,0,W,H);ctx.fillStyle="#f4f2ee";ctx.fillRect(0,0,W,H);
  // グリッド
  var gp=500*z;
  if(gp>8){
    ctx.strokeStyle="rgba(30,45,64,0.06)";ctx.lineWidth=0.5;
    var gox=((cur.panX%gp)+gp)%gp,goy=((cur.panY%gp)+gp)%gp;
    for(var xi=gox;xi<W;xi+=gp){ctx.beginPath();ctx.moveTo(xi,0);ctx.lineTo(xi,H);ctx.stroke();}
    for(var yi=goy;yi<H;yi+=gp){ctx.beginPath();ctx.moveTo(0,yi);ctx.lineTo(W,yi);ctx.stroke();}
  }
  // 部屋
  var rs=rooms_();
  for(var ri=0;ri<rs.length;ri++){
    var rm=rs[ri],r=getFrameRect(rm),ir=getInnerRect(rm);
    ctx.fillStyle="#c8d4de";ctx.fillRect(r.x0,r.y0,r.x1-r.x0,r.y1-r.y0);
    ctx.fillStyle="#ffffff";ctx.fillRect(ir.x0,ir.y0,ir.x1-ir.x0,ir.y1-ir.y0);
    ctx.strokeStyle="#1e2d40";ctx.lineWidth=2;ctx.strokeRect(r.x0,r.y0,r.x1-r.x0,r.y1-r.y0);
    ctx.strokeStyle="#1e2d40";ctx.lineWidth=1;ctx.strokeRect(ir.x0,ir.y0,ir.x1-ir.x0,ir.y1-ir.y0);
    ctx.fillStyle="#5a6a7a";ctx.font=Math.max(9,Math.min(13,px(150)))+"px Meiryo,Yu Gothic,sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(rm.label,(ir.x0+ir.x1)/2,(ir.y0+ir.y1)/2);
  }
  // 開口
  var ops=openings_();
  for(var oi=0;oi<ops.length;oi++){
    var op=ops[oi],r1o=getRoomById(op.r1id),r2o=getRoomById(op.r2id);
    if(!r1o||!r2o)continue;
    ctx.fillStyle="#f4f2ee";
    if(op.side==="right"||op.side==="left"){
      var px0=cur.panX+op.x*z,py1=cur.panY+op.y1*z,oph=(op.y2-op.y1)*z,opw=op.w*z;
      ctx.fillRect(px0,py1,opw,oph);ctx.strokeStyle="rgba(30,45,64,0.2)";ctx.lineWidth=1;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(px0+opw/2,py1);ctx.lineTo(px0+opw/2,py1+oph);ctx.stroke();ctx.setLineDash([]);
    }else{
      var px1=cur.panX+op.x1*z,py0=cur.panY+op.y*z,opw2=(op.x2-op.x1)*z,oph2=op.h*z;
      ctx.fillRect(px1,py0,opw2,oph2);ctx.strokeStyle="rgba(30,45,64,0.2)";ctx.lineWidth=1;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(px1,py0+oph2/2);ctx.lineTo(px1+opw2,py0+oph2/2);ctx.stroke();ctx.setLineDash([]);
    }
  }
  // グループ選択・寸法線
  var groups=getRoomGroups();
  for(var gi=0;gi<groups.length;gi++){
    var grp=groups[gi],gc=getGroupCanvasRect(grp);
    if(selGroup&&isSameGroup(selGroup,grp)){
      ctx.strokeStyle="#c8a96e";ctx.lineWidth=2.5;ctx.setLineDash([6,3]);
      ctx.strokeRect(gc.x0,gc.y0,gc.fw,gc.fh);ctx.setLineDash([]);
    }
    var bb=gc.bbox;drawDims(gc.x0,gc.y0,gc.fw,gc.fh,bb.w-WALL_T*2,bb.h-WALL_T*2);
  }
  // ドラッグハイライト
  if(adjHighlight){
    ctx.save();ctx.fillStyle="rgba(200,60,60,0.25)";ctx.fillRect(adjHighlight.x,adjHighlight.y,adjHighlight.w,adjHighlight.h);
    ctx.strokeStyle="#cc3333";ctx.lineWidth=2;ctx.strokeRect(adjHighlight.x,adjHighlight.y,adjHighlight.w,adjHighlight.h);
    ctx.fillStyle="#aa2222";ctx.font="bold 10px Meiryo,sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("壁重複",adjHighlight.x+adjHighlight.w/2,adjHighlight.y+adjHighlight.h/2);ctx.restore();
  }
  if(cornerHighlight){
    ctx.save();var cs=Math.max(8,px(200));
    ctx.fillStyle="rgba(200,169,110,0.3)";ctx.strokeStyle="#c8a96e";ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cornerHighlight.px1,cornerHighlight.py1,cs,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.arc(cornerHighlight.px2,cornerHighlight.py2,cs,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.strokeStyle="#c8a96e";ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(cornerHighlight.px1,cornerHighlight.py1);ctx.lineTo(cornerHighlight.px2,cornerHighlight.py2);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle="#996633";ctx.font="bold 10px Meiryo,sans-serif";ctx.textAlign="center";ctx.textBaseline="bottom";
    ctx.fillText("コーナー揃え",(cornerHighlight.px1+cornerHighlight.px2)/2,Math.min(cornerHighlight.py1,cornerHighlight.py2)-4);ctx.restore();
  }
  // 部品
  var objs=cur.objects;
  for(var i=0;i<objs.length;i++){
    var o=objs[i],rm2=getRoomById(o.roomId);if(!rm2)continue;
    var def=findDef(o.cat,o.id);if(!def)continue;
    var cp=rm2c(rm2,o.x,o.y),pw=px(o.w),ph=px(o.h);
    def.draw(ctx,cp.x,cp.y,pw,ph,o.rot||false,o.flip||false);
    if(o.i===selId){ctx.save();ctx.strokeStyle="#c8a96e";ctx.lineWidth=2;ctx.setLineDash([5,3]);ctx.strokeRect(cp.x-2,cp.y-2,pw+4,ph+4);ctx.setLineDash([]);ctx.restore();}
  }
  // ドラッグゴースト
  if(dragPart){
    var rm3=getDropTargetRoom(dgX,dgY);
    if(rm3){var dd=findDef(dragPart.cat,dragPart.id);if(dd){
      var wc0=c2rm(rm3,dgX,dgY);
      var sn=snapToWall(rm3,wc0.x-dragPart.rw/2,wc0.y-dragPart.rh/2,dragPart.rw,dragPart.rh,dragPart.id);
      var gx,gy,gr=false;
      if(sn){gx=sn.x;gy=sn.y;gr=sn.rot;}else{gx=wc0.x-dragPart.rw/2;gy=wc0.y-dragPart.rh/2;}
      var gcp=rm2c(rm3,gx,gy);ctx.save();ctx.globalAlpha=0.55;
      dd.draw(ctx,gcp.x,gcp.y,px(dragPart.rw),px(dragPart.rh),gr,false);ctx.restore();
    }}
  }
}
function drawDims(fx,fy,fw,fh,lW,lH){
  var off=Math.max(24,px(300)),tc=Math.max(8,px(120));
  ctx.save();ctx.strokeStyle="#5a6a7a";ctx.fillStyle="#1e2d40";ctx.lineWidth=0.8;
  ctx.font=Math.max(9,Math.min(11,px(180)))+"px Meiryo,Yu Gothic,sans-serif";
  var ty=fy-off;ctx.textAlign="center";ctx.textBaseline="bottom";
  ctx.beginPath();ctx.moveTo(fx,fy-off*0.3);ctx.lineTo(fx,ty);ctx.moveTo(fx+fw,fy-off*0.3);ctx.lineTo(fx+fw,ty);ctx.moveTo(fx,ty);ctx.lineTo(fx+fw,ty);
  arw(fx,ty,1,0);arw(fx+fw,ty,-1,0);ctx.stroke();ctx.fillText(lW.toLocaleString()+"mm",fx+fw/2,ty-2);
  var lx=fx-off;ctx.beginPath();ctx.moveTo(fx-off*0.3,fy);ctx.lineTo(lx,fy);ctx.moveTo(fx-off*0.3,fy+fh);ctx.lineTo(lx,fy+fh);ctx.moveTo(lx,fy);ctx.lineTo(lx,fy+fh);
  arw(lx,fy,0,1);arw(lx,fy+fh,0,-1);ctx.stroke();
  ctx.save();ctx.translate(lx-tc*0.6,fy+fh/2);ctx.rotate(-Math.PI/2);ctx.textBaseline="bottom";ctx.fillText(lH.toLocaleString()+"mm",0,0);ctx.restore();
  ctx.restore();
}
function arw(x,y,dx,dy){var sz=5;ctx.moveTo(x,y);ctx.lineTo(x+dx*sz+dy*sz*0.4,y+dy*sz-dx*sz*0.4);ctx.moveTo(x,y);ctx.lineTo(x+dx*sz-dy*sz*0.4,y+dy*sz+dx*sz*0.4);}
function hitObj(cx,cy){
  var objs=cur.objects;
  for(var i=objs.length-1;i>=0;i--){var o=objs[i],rm=getRoomById(o.roomId);if(!rm)continue;var cp=rm2c(rm,o.x,o.y),pw=px(o.w),ph=px(o.h);if(cx>=cp.x-6&&cx<=cp.x+pw+6&&cy>=cp.y-6&&cy<=cp.y+ph+6)return i;}
  return -1;
}
function updateSelToolbar(){
  var tb=document.getElementById("sel-toolbar"),fb=document.getElementById("btn-flip");
  if(selId===null){tb.classList.remove("show");return;}
  var o=cur.objects.filter(function(o){return o.i===selId;})[0];
  if(!o){tb.classList.remove("show");return;}
  tb.classList.add("show");fb.style.display=FLIP_IDS[o.id]?"inline-block":"none";
}
function getPos(e){var rc=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return{x:src.clientX-rc.left,y:src.clientY-rc.top};}

// ===== POINTER（マウス） =====
canvas.addEventListener("pointerdown",function(e){
  if(e.pointerType==="touch")return;
  isDown=true;var p=getPos(e);
  if(selGroup){
    var hdl=hitGroupHandle(selGroup,p.x,p.y);
    if(hdl){frameDragHandle=hdl;var ab=c2abs(p.x,p.y);var bbox=getGroupBBox(selGroup);var starts=selGroup.map(function(r){return{id:r.id,x:r.x,y:r.y,w:r.w,h:r.h};});frameDragStart={mx:ab.x,my:ab.y,bbox:bbox,roomStarts:starts};return;}
    if(hitGroupInside(selGroup,p.x,p.y)){
      var oi=hitObj(p.x,p.y);
      if(oi>=0){selId=cur.objects[oi].i;dragging=cur.objects[oi];var rm2=getRoomById(dragging.roomId);if(rm2){var cp=rm2c(rm2,dragging.x,dragging.y);dragOff={x:p.x-cp.x,y:p.y-cp.y};}updateSelToolbar();render();return;}
      dragGroup=selGroup;var ab2=c2abs(p.x,p.y);var bbox2=getGroupBBox(selGroup);dragGroupOff={x:ab2.x-bbox2.x,y:ab2.y-bbox2.y};dragGroupStart=selGroup.map(function(r){return{id:r.id,x:r.x,y:r.y};});return;
    }
    selGroup=null;render();
  }
  var groups=getRoomGroups();
  for(var gi=0;gi<groups.length;gi++){if(hitGroupBorder(groups[gi],p.x,p.y)||hitGroupInside(groups[gi],p.x,p.y)){selGroup=groups[gi];selId=null;updateSelToolbar();render();return;}}
  if(tool==="sel"){var oi2=hitObj(p.x,p.y);if(oi2>=0){selId=cur.objects[oi2].i;dragging=cur.objects[oi2];var rm3=getRoomById(dragging.roomId);if(rm3){var cp2=rm2c(rm3,dragging.x,dragging.y);dragOff={x:p.x-cp2.x,y:p.y-cp2.y};}}else{selId=null;}updateSelToolbar();render();}
  else if(tool==="del"){saveUndo();var oi3=hitObj(p.x,p.y);if(oi3>=0){cur.objects.splice(oi3,1);selId=null;updateSelToolbar();}render();}
});
canvas.addEventListener("pointermove",function(e){
  if(e.pointerType==="touch")return;if(!isDown)return;var p=getPos(e);
  if(frameDragHandle&&selGroup){
    var ab=c2abs(p.x,p.y),dx=ab.x-frameDragStart.mx,dy=ab.y-frameDragStart.my,hh=frameDragHandle,bb=frameDragStart.bbox;
    var newW=bb.w,newH=bb.h,newX=bb.x,newY=bb.y,scaleX,scaleY;
    if(hh==="right"){newW=Math.max(500,snp(bb.w+dx));}if(hh==="left"){var s1=snp(dx);newX=bb.x+s1;newW=Math.max(500,bb.w-s1);}
    if(hh==="bottom"){newH=Math.max(500,snp(bb.h+dy));}if(hh==="top"){var s2=snp(dy);newY=bb.y+s2;newH=Math.max(500,bb.h-s2);}
    if(hh==="corner-br"){newW=Math.max(500,snp(bb.w+dx));newH=Math.max(500,snp(bb.h+dy));}

var ptouches={},pinchD0=0,pinchZ0=1,pinchP0={x:0,y:0},pinchM0={x:0,y:0};
function tdist(a,b){var dx=a.clientX-b.clientX,dy=a.clientY-b.clientY;return Math.sqrt(dx*dx+dy*dy);}
function tmid(a,b,rc){return{x:(a.clientX+b.clientX)/2-rc.left,y:(a.clientY+b.clientY)/2-rc.top};}

canvas.addEventListener("touchstart",function(e){
  if(dragPart)return;e.preventDefault();
  var rc=canvas.getBoundingClientRect();
  for(var i=0;i<e.changedTouches.length;i++){ptouches[e.changedTouches[i].identifier]=e.changedTouches[i];}
  var ids=Object.keys(ptouches);
  if(ids.length===2){
    var ta=ptouches[ids[0]],tb=ptouches[ids[1]];
    pinchD0=tdist(ta,tb);pinchZ0=cur.zoom;pinchP0={x:cur.panX,y:cur.panY};pinchM0=tmid(ta,tb,rc);
    dragGroup=null;frameDragHandle=null;dragging=null;isDown=false;
  }else if(ids.length===1){
    isDown=true;var p={x:e.touches[0].clientX-rc.left,y:e.touches[0].clientY-rc.top};
    if(selGroup){
      var hdl=hitGroupHandle(selGroup,p.x,p.y);
      if(hdl){frameDragHandle=hdl;var ab=c2abs(p.x,p.y);var bbox=getGroupBBox(selGroup);var starts=selGroup.map(function(r){return{id:r.id,x:r.x,y:r.y,w:r.w,h:r.h};});frameDragStart={mx:ab.x,my:ab.y,bbox:bbox,roomStarts:starts};return;}
      if(hitGroupInside(selGroup,p.x,p.y)){
        var oi=hitObj(p.x,p.y);
        if(oi>=0){selId=cur.objects[oi].i;dragging=cur.objects[oi];var rm2=getRoomById(dragging.roomId);if(rm2){var cp=rm2c(rm2,dragging.x,dragging.y);dragOff={x:p.x-cp.x,y:p.y-cp.y};}updateSelToolbar();render();return;}
        dragGroup=selGroup;var ab2=c2abs(p.x,p.y);var bbox2=getGroupBBox(selGroup);dragGroupOff={x:ab2.x-bbox2.x,y:ab2.y-bbox2.y};dragGroupStart=selGroup.map(function(r){return{id:r.id,x:r.x,y:r.y};});return;
      }
      selGroup=null;render();
    }
    var groups2=getRoomGroups();
    for(var gi2=0;gi2<groups2.length;gi2++){if(hitGroupBorder(groups2[gi2],p.x,p.y)){selGroup=groups2[gi2];selId=null;updateSelToolbar();render();return;}}
    if(tool==="sel"){var oi2=hitObj(p.x,p.y);if(oi2>=0){selId=cur.objects[oi2].i;dragging=cur.objects[oi2];var rm3=getRoomById(dragging.roomId);if(rm3){var cp2=rm2c(rm3,dragging.x,dragging.y);dragOff={x:p.x-cp2.x,y:p.y-cp2.y};}}else{selId=null;}updateSelToolbar();render();}
    else if(tool==="del"){saveUndo();var oi3=hitObj(p.x,p.y);if(oi3>=0){cur.objects.splice(oi3,1);selId=null;updateSelToolbar();}render();}
  }
},{passive:false});

canvas.addEventListener("touchmove",function(e){
  if(dragPart){var rc2=canvas.getBoundingClientRect(),t0=e.touches[0];dgX=t0.clientX-rc2.left;dgY=t0.clientY-rc2.top;render();return;}

      var ab=c2abs(p.x,p.y),dx=ab.x-frameDragStart.mx,dy=ab.y-frameDragStart.my,hh=frameDragHandle,bb=frameDragStart.bbox;

      if(hh==="bottom"){newH=Math.max(500,snp(bb.h+dy));}if(hh==="top"){var s2=snp(dy);newY=bb.y+s2;newH=Math.max(500,bb.h-s2);}
      if(hh==="corner-br"){newW=Math.max(500,snp(bb.w+dx));newH=Math.max(500,snp(bb.h+dy));}
      if(hh==="corner-bl"){var s3=snp(dx);newX=bb.x+s3;newW=Math.max(500,bb.w-s3);newH=Math.max(500,snp(bb.h+dy));}
      if(hh==="corner-tr"){newW=Math.max(500,snp(bb.w+dx));var s4=snp(dy);newY=bb.y+s4;newH=Math.max(500,bb.h-s4);}
      if(hh==="corner-tl"){var s5=snp(dx);newX=bb.x+s5;newW=Math.max(500,bb.w-s5);var s6=snp(dy);newY=bb.y+s6;newH=Math.max(500,bb.h-s6);}
      scaleX=newW/bb.w;scaleY=newH/bb.h;
      for(var ri=0;ri<selGroup.length;ri++){var rs2=frameDragStart.roomStarts[ri],rm=selGroup[ri];rm.x=snp(newX+(rs2.x-bb.x)*scaleX);rm.y=snp(newY+(rs2.y-bb.y)*scaleY);rm.w=Math.max(200,snp(rs2.w*scaleX));rm.h=Math.max(200,snp(rs2.h*scaleY));}
      render();
    }else if(dragGroup){
      var ab3=c2abs(p.x,p.y),bbox3=getGroupBBox(dragGroup),ddx=snp(ab3.x-dragGroupOff.x)-bbox3.x,ddy=snp(ab3.y-dragGroupOff.y)-bbox3.y;
      for(var ri2=0;ri2<dragGroup.length;ri2++){dragGroup[ri2].x=dragGroupStart[ri2].x+ddx;dragGroup[ri2].y=dragGroupStart[ri2].y+ddy;}
      updateDragHighlights(dragGroup);render();
    }else if(tool==="sel"&&dragging){
      var rm4=getRoomById(dragging.roomId);if(!rm4)return;
      var wc=c2rm(rm4,p.x-dragOff.x,p.y-dragOff.y);
      if(SNAP_IDS[dragging.id]){var sn2=snapToWall(rm4,wc.x,wc.y,dragging.w,dragging.h,dragging.id);if(sn2){dragging.x=sn2.x;dragging.y=sn2.y;dragging.rot=sn2.rot;}else{dragging.x=snp(wc.x);dragging.y=snp(wc.y);}}

},{passive:false});

  document.getElementById("lh").textContent=isElevOrSpread?"H 高さ (mm)":"D 奥行 (mm)";
  document.getElementById("iscale").disabled=scaleFixed_();

function buildCatBar(t){
  var bar=document.getElementById("catbar");bar.innerHTML="";
  var cats=CAT_DEFS[t]||CAT_DEFS.floor;
  currentCat=DEFAULT_CAT[t]||cats[0].id;
  cats.forEach(function(c,idx){
    var btn=document.createElement("button");
    btn.className="cat-btn"+(idx===0?" on":"");

    btn.onclick=(function(id,b){return function(){setCat(id,b);};})(c.id,btn);

function genRoom(){
  var w=parseInt(document.getElementById("iw").value)||6000;
  var h=parseInt(document.getElementById("ih").value)||4000;
  var sc=parseInt(document.getElementById("iscale").value)||50;
  if(!scaleFixed_()){setSC(1/sc);setScaleFixed(true);document.getElementById("iscale").disabled=true;}
  saveUndo();
  setRooms([{id:Date.now(),x:0,y:0,w:w,h:h,label:"部屋1"}]);
  setOpenings([]);
  cur.objects=[];selGroup=null;
  document.getElementById("btn-add").style.display="inline-block";
  fitView();render();closeAllPanels();
}
function addRoom(){
  var w=parseInt(document.getElementById("iw").value)||6000;
  var h=parseInt(document.getElementById("ih").value)||4000;
  saveUndo();
  var rs=rooms_(),lastRoom=rs[rs.length-1];
  var ox=lastRoom?lastRoom.x+roomOuterW(lastRoom)+2000:0;
  rs.push({id:Date.now(),x:ox,y:0,w:w,h:h,label:"部屋"+(rs.length+1)});
  selGroup=getGroupForRoom(rs[rs.length-1]);render();closeAllPanels();
}
function fitView(){
  var rs=rooms_();if(rs.length===0)return;
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(var i=0;i<rs.length;i++){var rm=rs[i];minX=Math.min(minX,rm.x);minY=Math.min(minY,rm.y);maxX=Math.max(maxX,rm.x+roomOuterW(rm));maxY=Math.max(maxY,rm.y+roomOuterH(rm));}
  var W=canvas.width,H=canvas.height,mg=80,sc=SC_();
  var sx=(W-mg*2)/((maxX-minX)*sc),sy=(H-mg*2)/((maxY-minY)*sc);
  cur.zoom=Math.min(sx,sy,3);
  cur.panX=(W-(maxX-minX)*sc*cur.zoom)/2-minX*sc*cur.zoom;
  cur.panY=(H-(maxY-minY)*sc*cur.zoom)/2-minY*sc*cur.zoom;
}
function setTool(t){
  tool=t;
  document.getElementById("op-sel").classList.toggle("on",t==="sel");
  document.getElementById("op-del").classList.toggle("on",t==="del");
}
function setCat(cat,btn){
  document.querySelectorAll(".cat-btn").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");currentCat=cat;renderParts();
}
function renderParts(){
  var list=document.getElementById("plist");list.innerHTML="";
  (PARTS[currentCat]||[]).forEach(function(p){
    var div=document.createElement("div");div.className="part-item";div.draggable=true;
    var sw=52,sh=34,tmp=document.createElement("canvas");tmp.width=sw;tmp.height=sh;
    p.draw(tmp.getContext("2d"),2,2,sw-4,sh-4,false,false);div.appendChild(tmp);
    var lbl=document.createElement("span");lbl.className="part-label";lbl.textContent=p.label;div.appendChild(lbl);
    div.addEventListener("dragstart",function(){dragPart=Object.assign({},p,{cat:currentCat});});
    div.addEventListener("touchstart",function(e){
      e.stopPropagation();
      dragPart=Object.assign({},p,{cat:currentCat});
      var rc=canvas.getBoundingClientRect(),t=e.touches[0];
      dgX=t.clientX-rc.left;dgY=t.clientY-rc.top;
      closeAllPanels();render();
    },{passive:true});
    list.appendChild(div);
  });

function findDef(cat,id){var arr=PARTS[cat]||[];for(var i=0;i<arr.length;i++){if(arr[i].id===id)return arr[i];}return null;}
function openModal(pp,rm,cx,cy){

    var wc=c2rm(rm,cx,cy),ox=snp(wc.x-w/2),oy=snp(wc.y-h/2),nrot=false;

function rotSel(){if(selId===null)return;var o=cur.objects.filter(function(o){return o.i===selId;})[0];if(!o)return;saveUndo();var cx=o.x+o.w/2,cy=o.y+o.h/2;var tmp=o.w;o.w=o.h;o.h=tmp;o.x=cx-o.w/2;o.y=cy-o.h/2;o.rot=!o.rot;render();}
function flipSel(){if(selId===null)return;var o=cur.objects.filter(function(o){return o.i===selId;})[0];if(!o||!FLIP_IDS[o.id])return;saveUndo();o.flip=!o.flip;render();}
function delSel(){if(selId===null)return;saveUndo();cur.objects=cur.objects.filter(function(o){return o.i!==selId;});selId=null;updateSelToolbar();render();}
function saveUndo(){
  var snap={objects:JSON.parse(JSON.stringify(cur.objects)),rooms:JSON.parse(JSON.stringify(rooms_())),openings:JSON.parse(JSON.stringify(openings_()))};
  cur.undoStk.push(snap);if(cur.undoStk.length>30)cur.undoStk.shift();cur.redoStk=[];
}
function doUndo(){
  if(!cur.undoStk.length)return;
  cur.redoStk.push({objects:JSON.parse(JSON.stringify(cur.objects)),rooms:JSON.parse(JSON.stringify(rooms_())),openings:JSON.parse(JSON.stringify(openings_()))});
  var st=cur.undoStk.pop();cur.objects=st.objects;setRooms(st.rooms);setOpenings(st.openings);
  selId=null;selGroup=null;updateSelToolbar();render();
}
function doRedo(){
  if(!cur.redoStk.length)return;
  cur.undoStk.push({objects:JSON.parse(JSON.stringify(cur.objects)),rooms:JSON.parse(JSON.stringify(rooms_())),openings:JSON.parse(JSON.stringify(openings_()))});
  var st=cur.redoStk.pop();cur.objects=st.objects;setRooms(st.rooms);setOpenings(st.openings);
  selId=null;selGroup=null;updateSelToolbar();render();
}

function doNew(){
  if(!confirm("新規作成します。全図面がリセットされます。よろしいですか？"))return;
  scenes={floor:makeScene(),ceiling:makeScene(),spread:makeScene(),elev:makeScene()};
  shared={rooms:[],openings:[],SC:1/50,scaleFixed:false};
  indep={spread:{rooms:[],openings:[],SC:1/50,scaleFixed:false},elev:{rooms:[],openings:[],SC:1/50,scaleFixed:false}};

function doSave(){
  if(rooms_().length===0){alert("図面がありません。まず部屋を生成してください。");return;}
  var tmp=document.createElement("canvas");tmp.width=canvas.width;tmp.height=canvas.height;
  var tc=tmp.getContext("2d");tc.fillStyle="#ffffff";tc.fillRect(0,0,tmp.width,tmp.height);tc.drawImage(canvas,0,0);
  var now=new Date(),typeLabel={floor:"平面図",ceiling:"天井図",spread:"展開図",elev:"立面図"};
  var label=typeLabel[dtype]+"｜アートレイズ　"+now.getFullYear()+"/"+String(now.getMonth()+1).padStart(2,"0")+"/"+String(now.getDate()).padStart(2,"0");
  tc.fillStyle="rgba(30,45,64,0.45)";tc.font="bold 11px Meiryo,sans-serif";tc.textAlign="right";tc.fillText(label,tmp.width-10,tmp.height-8);
  var link=document.createElement("a");
  link.download=typeLabel[dtype]+"_"+now.getFullYear()+String(now.getMonth()+1).padStart(2,"0")+String(now.getDate()).padStart(2,"0")+".png";
  link.href=tmp.toDataURL("image/png");link.click();
}
function goBack(){history.back();}
function resize(){canvas.width=cwrap.clientWidth;canvas.height=cwrap.clientHeight;if(rooms_().length>0)fitView();render();}
new ResizeObserver(resize).observe(cwrap);
buildCatBar("floor");resize();
</script>
