<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>設定｜アート・レイズ</title>
<style>
:root{
  --bg:#eeebe5;--navy:#1e2d40;--navy2:#2a3f5a;
  --accent:#c8a96e;--text:#1e2d40;--text2:#5a6a7a;--white:#ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

.header{background:var(--navy);height:50px;display:flex;align-items:center;padding:0 6px;flex-shrink:0;}
.btn-icon{width:44px;height:44px;border:none;background:transparent;color:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;}
.btn-icon:active{background:rgba(255,255,255,0.15);}
.header-title{flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--white);}

.scroll-area{flex:1;overflow-y:auto;padding:16px 14px 40px;-webkit-overflow-scrolling:touch;}

/* セクション */
.section{margin-bottom:24px;}
.section-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.08em;margin-bottom:8px;padding-left:2px;}
.card{background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(30,45,64,0.08);}

/* 設定行 */
.setting-row{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(30,45,64,0.07);}
.setting-row:last-child{border-bottom:none;}
.setting-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.setting-body{flex:1;min-width:0;}
.setting-label{font-size:13px;font-weight:700;color:var(--text);}
.setting-desc{font-size:11px;color:var(--text2);margin-top:1px;}

/* APIキー入力 */
.api-input-wrap{margin-top:8px;display:flex;gap:8px;}
.api-input{flex:1;height:40px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;padding:0 12px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);outline:none;font-family:monospace;}
.api-input:focus{border-color:var(--navy);}
.btn-api{height:40px;padding:0 14px;background:var(--navy);border:none;border-radius:10px;color:var(--white);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;flex-shrink:0;}
.btn-api:active{opacity:0.8;}
.api-status{margin-top:6px;font-size:11px;display:flex;align-items:center;gap:4px;}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-dot.ok{background:#208040;}
.status-dot.none{background:#bbb;}

/* アクションボタン */
.action-btn{width:100%;padding:14px 16px;border:none;background:transparent;display:flex;align-items:center;gap:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:left;}
.action-btn:active{background:rgba(30,45,64,0.04);}
.action-label{flex:1;font-size:13px;font-weight:700;color:var(--text);}
.action-desc{font-size:11px;color:var(--text2);margin-top:1px;}
.action-arrow{color:var(--text2);font-size:16px;flex-shrink:0;}
.action-btn.danger .action-label{color:#c03232;}

/* バージョン */
.version-info{text-align:center;padding:20px 0 8px;font-size:11px;color:var(--text2);line-height:1.8;}

/* トースト */
.toast{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:var(--white);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">
  <button class="btn-icon" onclick="history.back()">←</button>
  <div class="header-title">設定</div>
  <div style="width:44px;"></div>
</div>

<div class="scroll-area">

  <!-- APIキー -->
  <div class="section">
    <div class="section-title">CLAUDE連携</div>
    <div class="card">
      <div class="setting-row" style="flex-direction:column;align-items:stretch;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="setting-icon" style="background:rgba(200,169,110,0.15);">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="9" width="14" height="9" rx="2" stroke="#c8a96e" stroke-width="1.5" fill="none"/>
              <path d="M6 9V6a4 4 0 0 1 8 0v3" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
              <circle cx="10" cy="13.5" r="1.5" fill="#c8a96e"/>
            </svg>
          </div>
          <div class="setting-body">
            <div class="setting-label">APIキー</div>
            <div class="setting-desc">セッション中のみ有効・保存しません</div>
          </div>
        </div>
        <div class="api-input-wrap">
          <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-ant-api03-...">
          <button class="btn-api" onclick="setApiKey()">設定</button>
        </div>
        <div class="api-status" id="apiStatus">
          <div class="status-dot none" id="statusDot"></div>
          <span id="statusText">未設定</span>
        </div>
      </div>
    </div>
  </div>

  <!-- アプリ管理 -->
  <div class="section">
    <div class="section-title">アプリ管理</div>
    <div class="card">
      <button class="action-btn" onclick="updateApp()">
        <div class="setting-icon" style="background:rgba(30,45,64,0.06);">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 10a7 7 0 0 1 7-7 7 7 0 0 1 5 2.1" stroke="#1e2d40" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            <path d="M17 10a7 7 0 0 1-7 7 7 7 0 0 1-5-2.1" stroke="#1e2d40" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            <polyline points="15,7 15,2.5 19,2.5" stroke="#1e2d40" stroke-width="1.5" stroke-linejoin="round" fill="none" transform="translate(-2,0)"/>
            <polyline points="5,13 5,17.5 1,17.5" stroke="#1e2d40" stroke-width="1.5" stroke-linejoin="round" fill="none" transform="translate(2,0)"/>
          </svg>
        </div>
        <div class="setting-body">
          <div class="action-label">アプリを更新</div>
          <div class="setting-desc">最新版を読み込みます（キャッシュクリア）</div>
        </div>
        <div class="action-arrow">›</div>
      </button>
      <button class="action-btn" onclick="clearAllData()">
        <div class="setting-icon" style="background:rgba(192,50,50,0.07);">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <polyline points="3,5 17,5" stroke="#c03232" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M6 5V3h8v2" stroke="#c03232" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <rect x="4" y="5" width="12" height="12" rx="2" stroke="#c03232" stroke-width="1.5" fill="none"/>
            <line x1="8" y1="9" x2="8" y2="14" stroke="#c03232" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="9" x2="12" y2="14" stroke="#c03232" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="setting-body">
          <div class="action-label" style="color:#c03232;">データを全消去</div>
          <div class="setting-desc">写真情報・案件・記号データを削除</div>
        </div>
        <div class="action-arrow" style="color:#c03232;">›</div>
      </button>
    </div>
  </div>

  <!-- バージョン -->
  <div class="version-info">
    現場ナビ 軽量版<br>
    株式会社アート・レイズ<br>
    ver.1.0 · 2026
  </div>

</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
function showToast(msg, duration){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration||2000);
}

// APIキー設定
function setApiKey(){
  const val=document.getElementById('apiKeyInput').value.trim();
  if(!val){showToast('APIキーを入力してください');return;}
  if(!val.startsWith('sk-ant-')){showToast('正しいAPIキーの形式ではありません');return;}
  // sessionStorageに一時保存（ページを閉じると消える）
  sessionStorage.setItem('genba_api_key', val);
  document.getElementById('apiKeyInput').value='';
  document.getElementById('statusDot').className='status-dot ok';
  document.getElementById('statusText').textContent='設定済み（このセッションのみ有効）';
  showToast('APIキーを設定しました');
}

// 起動時にsessionStorageチェック
window.addEventListener('load',()=>{
  const key=sessionStorage.getItem('genba_api_key');
  if(key){
    document.getElementById('statusDot').className='status-dot ok';
    document.getElementById('statusText').textContent='設定済み（このセッションのみ有効）';
  }
});

// アプリ更新
function updateApp(){
  if(!confirm('アプリを最新版に更新しますか？\n（ページがリロードされます）'))return;
  // Service Worker削除＋強制リロード
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(r=>r.unregister());
      location.reload(true);
    });
  }else{
    location.reload(true);
  }
}

// データ全消去
function clearAllData(){
  if(!confirm('写真情報・案件データ・カスタム記号を全て削除しますか？\nこの操作は取り消せません。'))return;
  ['arPhotos','arAnken','artRaiseKigo'].forEach(k=>localStorage.removeItem(k));
  showToast('データを削除しました',2500);
}

// 外部リンク
function openLink(url){ window.open(url,'_blank'); }
</script>
</body>
</html>
