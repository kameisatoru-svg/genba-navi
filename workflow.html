<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件ワークフロー</title>
<style>
:root {
  --bg: #f7f8fa;
  --card: #ffffff;
  --text: #2c3e50;
  --text-sub: #6b7785;
  --text-mute: #9aa3ad;
  --border: #e4e7eb;
  --primary: #5a8dc7;
  --success: #4a7c4e;
  --warn: #d4a574;
  --danger: #c0392b;
  --done: #7a9d6f;
  --wip:  #d4a574;
  --todo: #c0c0c0;
  --na:   #b0b0b0;

  --status-sodan:          #a8c5da;
  --status-mitsumori-prep: #c8b9d9;
  --status-mitsumori:      #6c8eb5;
  --status-yotei:          #d4a574;
  --status-shiko:          #b97843;
  --status-seikyu:         #7a9d6f;
  --status-nyukin:         #4a7c4e;
  --status-kanryo:         #8b9095;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  font-size: 14px;
  line-height: 1.6;
}
.wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px;
}

/* ヘッダー */
.head {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  position: sticky;
  top: 8px;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.head-row1 {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 8px;
}
.head-key {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  color: var(--text-sub);
  word-break: break-all;
}
.head-title {
  font-size: 18px;
  font-weight: 700;
  margin: 4px 0 6px;
  word-break: break-word;
}
.head-meta {
  font-size: 12px;
  color: var(--text-sub);
}
.head-meta span + span { margin-left: 8px; }
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
}
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 12px;
}
.progress-bar-fill {
  height: 100%;
  background: var(--done);
  transition: width 0.3s ease;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-sub);
  margin-top: 4px;
}

/* ステージ */
.stage {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
}
.stage-head {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-left: 4px solid var(--stage-color, var(--primary));
  background: linear-gradient(to right, rgba(0,0,0,0.02), transparent);
}
.stage-icon {
  width: 24px;
  height: 24px;
  flex-shrink: 0;
  color: var(--stage-color, var(--primary));
}
.stage-title {
  font-weight: 700;
  font-size: 15px;
  flex: 1;
}
.stage-count {
  font-size: 12px;
  color: var(--text-sub);
  font-variant-numeric: tabular-nums;
}
.stage-body {
  padding: 8px 0;
}

/* チェック項目 */
.item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.item:first-child { border-top: none; }
.item:hover { background: rgba(90, 141, 199, 0.04); }
.item.done { opacity: 0.65; }
.item.done .item-label { text-decoration: line-through; color: var(--text-sub); }
.item.na { opacity: 0.5; background: rgba(0,0,0,0.02); }
.item.na .item-label { text-decoration: line-through; color: var(--text-mute); font-weight: 500; }
.item.na .item-detail { color: var(--text-mute); }

.item-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--todo);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  margin-top: 1px;
}
.item.done .item-check {
  background: var(--done);
  border-color: var(--done);
}
.item.wip .item-check {
  background: var(--wip);
  border-color: var(--wip);
}
.item.na .item-check {
  background: transparent;
  border-color: var(--na);
  border-style: dashed;
}
.item-check svg { width: 14px; height: 14px; color: #fff; }
.item.todo .item-check svg, .item.wip .item-check svg, .item.na .item-check svg { display: none; }
.item.wip .item-check::after {
  content: '';
  width: 8px;
  height: 8px;
  background: #fff;
  border-radius: 50%;
}
.item.na .item-check::after {
  content: '—';
  color: var(--na);
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
}

.item-body { flex: 1; min-width: 0; }
.item-label { font-weight: 600; font-size: 14px; }
.item-detail { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
.item-state {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 700;
  white-space: nowrap;
}
.item.done .item-state { background: var(--done); color: #fff; }
.item.wip  .item-state { background: var(--wip);  color: #fff; }
.item.todo .item-state { background: var(--border); color: var(--text-sub); }
.item.na   .item-state { background: transparent; color: var(--text-mute); border: 1px dashed var(--na); }

/* ボタンバー */
.actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.btn {
  flex: 1;
  min-width: 120px;
  padding: 12px 16px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: #f0f3f7; }
.btn-primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.btn-primary:hover { background: #4a7db7; }
.btn-success {
  background: var(--success);
  color: #fff;
  border-color: var(--success);
}
.btn-success:hover { background: #3a6c3e; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* 状態メッセージ */
.msg {
  margin-top: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
}
.msg.info    { background: #eaf2fa; color: #2c5e89; }
.msg.success { background: #ebf5ec; color: #2a5d2e; }
.msg.error   { background: #fbeaea; color: #8b2c25; }
.msg.warn    { background: #fcf3e3; color: #7c5a1f; }

/* ローダー */
.loader {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-sub);
}

/* PATモーダル */
.pat-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 16px;
}
.pat-overlay.show { display: flex; }
.pat-box {
  background: var(--card);
  border-radius: 12px;
  padding: 20px;
  max-width: 420px;
  width: 100%;
}
.pat-box h3 { margin: 0 0 8px; font-size: 16px; }
.pat-box p { margin: 0 0 12px; font-size: 13px; color: var(--text-sub); }
.pat-box input {
  width: 100%;
  padding: 10px;
  font-family: monospace;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 12px;
}
.pat-box .pat-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* トースト */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(calc(100% + 48px));
  opacity: 0;
  pointer-events: none;
  background: rgba(44, 62, 80, 0.95);
  color: #fff;
  padding: 10px 18px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
  transition: transform 0.3s ease, opacity 0.2s ease;
  z-index: 200;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
  pointer-events: auto;
}

/* 未対応ステータス案内 */
.unsupported {
  background: var(--card);
  border: 1px dashed var(--border);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  color: var(--text-sub);
}

/* 持ち越しセクション（前ステージからのやり残し） */
.carryover {
  background: #fff7ec;
  border: 1px solid #f0c785;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
}
.carryover-head {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #ffe7c5;
  border-left: 4px solid #d4791f;
}
.carryover-head-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  color: #d4791f;
}
.carryover-title {
  font-weight: 700;
  font-size: 14px;
  color: #7c4a13;
  flex: 1;
}
.carryover-count {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  background: #d4791f;
  padding: 2px 10px;
  border-radius: 999px;
}
.carryover-desc {
  padding: 8px 14px 4px;
  font-size: 12px;
  color: #7c4a13;
  background: #fff7ec;
}
.carryover-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 14px;
  border-top: 1px solid #f0c785;
  cursor: pointer;
  transition: background 0.15s;
  background: #fff;
}
.carryover-item:hover { background: rgba(212, 121, 31, 0.05); }
.carryover-item.done { opacity: 0.65; }
.carryover-item.done .item-label { text-decoration: line-through; color: var(--text-sub); }
.carryover-item.na { opacity: 0.5; }
.carryover-item.na .item-label { text-decoration: line-through; color: var(--text-mute); }
.carryover-source {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  color: #d4791f;
  background: #fff7ec;
  border: 1px solid #f0c785;
  padding: 1px 6px;
  border-radius: 3px;
  margin-bottom: 3px;
}

footer {
  margin-top: 24px;
  padding: 16px 0;
  text-align: center;
  font-size: 11px;
  color: var(--text-mute);
}
footer a { color: var(--text-sub); text-decoration: none; }
</style>
</head>
<body>

<!-- 共通テンプレート（dashboard.html と共有） -->
<script src="check_template.js"></script>

<script>
/* ============================================================
   workflow.html - 案件ワークフロー（Phase 1: 相談・見積準備）
   URL: workflow.html?key=<案件キー>
   ============================================================ */

const DATA_URL = 'https://kameisatoru-svg.github.io/genba-navi/data.json';
const GH_REPO  = 'kameisatoru-svg/genba-navi';
const GH_FILE  = 'data.json';
const GH_API   = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
const PAT_KEY  = 'artrise_gh_pat';

const STATUS_META = {
  '相談':                 { color: 'var(--status-sodan)' },
  '見積準備':             { color: 'var(--status-mitsumori-prep)' },
  '見積提出済み':         { color: 'var(--status-mitsumori)' },
  '施工予定':             { color: 'var(--status-yotei)' },
  '施工中':               { color: 'var(--status-shiko)' },
  '請求済み':             { color: 'var(--status-seikyu)' },
  '入金済み':             { color: 'var(--status-nyukin)' },
  '完了(請求書作成済み)': { color: 'var(--status-kanryo)' },
  '完了':                 { color: 'var(--status-kanryo)' },
  '保守管理(継続)':       { color: 'var(--status-nyukin)' },
  '中止':                 { color: 'var(--text-mute)' }
};

/* ----------------------------------------------------------
   チェック項目テンプレート CHECK_TEMPLATE は check_template.js
   から読み込む（同フォルダの check_template.js を script src で先に読み込む）
---------------------------------------------------------- */


/* ----------------------------------------------------------
   ユーティリティ
---------------------------------------------------------- */
const $ = (s, root = document) => root.querySelector(s);
function escapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function getQueryKey() {
  const p = new URLSearchParams(location.search);
  return p.get('key') || p.get('案件キー') || '';
}
function showToast(msg) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1800);
}

/* ----------------------------------------------------------
   グローバル状態
---------------------------------------------------------- */
const STATE = {
  ankenKey: '',
  anken: null,         // 案件オブジェクト
  template: null,      // 現ステータスのテンプレート
  checks: {},          // { "stageId.itemId": "done"|"wip"|"todo" }
  dirty: false         // 未保存変更あり
};

/* ----------------------------------------------------------
   起動：data.json取得→案件特定→描画
---------------------------------------------------------- */
async function init() {
  const key = getQueryKey();
  if (!key) {
    renderError('案件キーが指定されていません', 'URL末尾に <code>?key=案件キー</code> を付けてください。');
    return;
  }
  STATE.ankenKey = key;

  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('data.json 取得失敗: ' + res.status);
    const data = await res.json();
    const all  = [...(data['案件'] || []), ...(data['中止案件'] || [])];
    const a    = all.find(x => x['案件キー'] === key);
    if (!a) {
      renderError('案件が見つかりません', `案件キー: <code>${escapeHtml(key)}</code>`);
      return;
    }
    STATE.anken = a;
    STATE.checks = Object.assign({}, a['チェック'] || {});
    STATE.template = CHECK_TEMPLATE[a['ステータス']] || null;
    render();
  } catch (err) {
    renderError('読込エラー', err.message);
  }
}

/* ----------------------------------------------------------
   レンダリング
---------------------------------------------------------- */
function render() {
  const a = STATE.anken;
  const tpl = STATE.template;
  const status = a['ステータス'] || '';
  const sm = STATUS_META[status] || { color: 'var(--text-mute)' };

  // 進捗計算（該当なし=naは分母から除外）
  const allItems = (tpl?.stages || []).flatMap(s => s.items.map(i => `${s.id}.${i.id}`));
  const doneCount = allItems.filter(k => STATE.checks[k] === 'done').length;
  const wipCount  = allItems.filter(k => STATE.checks[k] === 'wip').length;
  const naCount   = allItems.filter(k => STATE.checks[k] === 'na').length;
  const total = allItems.length - naCount;
  const pct = total === 0 ? 0 : Math.round((doneCount / total) * 100);

  // 持ち越し算出（現在の checks 状態で再計算）
  const carryOver = getCarryOverItems({ ...a, 'チェック': STATE.checks });

  const headHtml = `
    <div class="head">
      <div class="head-row1">
        <div style="flex:1; min-width:0;">
          <div class="head-key">${escapeHtml(a['案件キー'])}</div>
          <div class="head-title">${escapeHtml(a['正式工事名'] || a['現場+工事'] || '(工事名未設定)')}</div>
          <div class="head-meta">
            <span>${escapeHtml(a['顧客略'] || '')}</span>
            <span>${escapeHtml(a['施工場所'] || '')}</span>
          </div>
        </div>
        <div class="status-badge" style="background:${sm.color};">${escapeHtml(status)}</div>
      </div>
      ${(total + naCount) > 0 ? `
        <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%;"></div></div>
        <div class="progress-label">
          <span>${tpl.description || ''}</span>
          <span>${doneCount} / ${total} 完了${wipCount > 0 ? `（着手中 ${wipCount}）` : ''}${naCount > 0 ? `（該当なし ${naCount}）` : ''}</span>
        </div>
      ` : ''}
    </div>
  `;

  // 持ち越しセクション
  let carryHtml = '';
  if (carryOver.length > 0) {
    const itemsHtml = carryOver.map(c => {
      const stateLabel = c.state === 'wip' ? '着手中' : '未着手';
      return `
        <div class="carryover-item item ${c.state}" data-key="${escapeHtml(c.key)}">
          <div class="item-check"><svg><use href="#check"/></svg></div>
          <div class="item-body">
            <div class="carryover-source">${escapeHtml(c.status)} / ${escapeHtml(c.stageLabel)}</div>
            <div class="item-label">${escapeHtml(c.label)}</div>
            ${c.detail ? `<div class="item-detail">${escapeHtml(c.detail)}</div>` : ''}
          </div>
          <div class="item-state">${stateLabel}</div>
        </div>
      `;
    }).join('');
    carryHtml = `
      <div class="carryover">
        <div class="carryover-head">
          <svg class="carryover-head-icon"><use href="#check"/></svg>
          <span class="carryover-title">前ステージから持ち越し</span>
          <span class="carryover-count">${carryOver.length}</span>
        </div>
        <div class="carryover-desc">先行施工パターン等で、まだ実施が残っている前ステージの項目です。タップで状態を循環し、見積発行・契約締結など終わったら完了にして解消できます。</div>
        ${itemsHtml}
      </div>
    `;
  }

  let bodyHtml = '';
  if (!tpl) {
    bodyHtml = `
      <div class="unsupported">
        <div style="font-size:15px; font-weight:600; margin-bottom:6px;">テンプレート未対応</div>
        <div>ステータス「${escapeHtml(status)}」のワークフローはまだ用意されていません。</div>
      </div>`;
  } else if (tpl.stages.length === 0) {
    bodyHtml = `
      <div class="unsupported">
        <div style="font-size:15px; font-weight:600; margin-bottom:6px;">Phase 2 で実装予定</div>
        <div>「${escapeHtml(status)}」のチェック項目は次のフェーズで追加されます。</div>
      </div>`;
  } else {
    bodyHtml = tpl.stages.map(stage => {
      const itemsHtml = stage.items.map(item => {
        const key = `${stage.id}.${item.id}`;
        const state = STATE.checks[key] || 'todo';
        const stateLabel = state === 'done' ? '完了'
                         : state === 'wip'  ? '着手中'
                         : state === 'na'   ? '該当なし'
                         : '未着手';
        return `
          <div class="item ${state}" data-key="${escapeHtml(key)}">
            <div class="item-check"><svg><use href="#check"/></svg></div>
            <div class="item-body">
              <div class="item-label">${escapeHtml(item.label)}</div>
              ${item.detail ? `<div class="item-detail">${escapeHtml(item.detail)}</div>` : ''}
            </div>
            <div class="item-state">${stateLabel}</div>
          </div>
        `;
      }).join('');
      const stageDone = stage.items.filter(i => STATE.checks[`${stage.id}.${i.id}`] === 'done').length;
      const stageNa   = stage.items.filter(i => STATE.checks[`${stage.id}.${i.id}`] === 'na').length;
      const stageDenom = stage.items.length - stageNa;
      return `
        <div class="stage" style="--stage-color:${stage.color};">
          <div class="stage-head">
            <svg class="stage-icon"><use href="#${stage.icon}"/></svg>
            <span class="stage-title">${escapeHtml(stage.label)}</span>
            <span class="stage-count">${stageDone} / ${stageDenom}${stageNa > 0 ? ` (該当なし${stageNa})` : ''}</span>
          </div>
          <div class="stage-body">${itemsHtml}</div>
        </div>
      `;
    }).join('');
  }

  // 現テンプレに項目がある or 持ち越しがある場合に保存ボタンを出す
  const hasInteractive = (tpl && tpl.stages.length > 0) || carryOver.length > 0;
  const actionsHtml = hasInteractive ? `
    <div class="actions">
      <button class="btn btn-primary" id="btn-save" ${STATE.dirty ? '' : 'disabled'}>
        ${STATE.dirty ? '変更を保存' : '保存済み'}
      </button>
      <button class="btn" id="btn-reset">変更を破棄</button>
    </div>
    <div id="msg"></div>
  ` : '';

  $('#content').innerHTML = headHtml + carryHtml + bodyHtml + actionsHtml;

  // イベント（持ち越し項目も `.item` クラスを持つので同じハンドラで処理可能）
  document.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', () => toggleItem(el.dataset.key));
  });
  $('#btn-save')?.addEventListener('click', saveChecks);
  $('#btn-reset')?.addEventListener('click', resetChecks);
}

function renderError(title, msg) {
  $('#content').innerHTML = `
    <div class="unsupported">
      <div style="font-size:16px; font-weight:700; margin-bottom:8px;">${escapeHtml(title)}</div>
      <div>${msg}</div>
    </div>`;
}

/* ----------------------------------------------------------
   チェック状態の操作
   クリック: todo → wip → done → todo の循環
---------------------------------------------------------- */
// 4状態循環: todo → wip → done → na → todo
function toggleItem(key) {
  const cur = STATE.checks[key] || 'todo';
  const next = cur === 'todo' ? 'wip'
             : cur === 'wip'  ? 'done'
             : cur === 'done' ? 'na'
             : 'todo';
  if (next === 'todo') {
    delete STATE.checks[key];   // 既定値に戻すなら削除
  } else {
    STATE.checks[key] = next;
  }
  STATE.dirty = true;
  render();
}

function resetChecks() {
  STATE.checks = Object.assign({}, STATE.anken['チェック'] || {});
  STATE.dirty = false;
  render();
  showToast('変更を破棄しました');
}

/* ----------------------------------------------------------
   GitHub PUT 保存
   PATの取り扱いは dashboard.html と共通（artrise_gh_pat）
---------------------------------------------------------- */
function getPAT()  { return localStorage.getItem(PAT_KEY) || ''; }
function savePAT(t){ localStorage.setItem(PAT_KEY, t); }

function showPATModal(callback) {
  const m = $('#pat-overlay');
  m.classList.add('show');
  $('#pat-input').value = '';
  setTimeout(() => $('#pat-input').focus(), 80);
  $('#pat-cancel').onclick = () => m.classList.remove('show');
  $('#pat-confirm').onclick = () => {
    const v = $('#pat-input').value.trim();
    if (!v) { showToast('トークンを入力してください'); return; }
    savePAT(v);
    m.classList.remove('show');
    callback();
  };
  $('#pat-input').onkeydown = (e) => { if (e.key === 'Enter') $('#pat-confirm').click(); };
}

async function saveChecks() {
  const pat = getPAT();
  if (!pat) { showPATModal(saveChecks); return; }

  const msgEl = $('#msg');
  const btn = $('#btn-save');
  if (btn) btn.disabled = true;
  if (msgEl) msgEl.innerHTML = '<div class="msg info">保存中...</div>';

  try {
    // 1. 現在の data.json を取得
    const res = await fetch(GH_API, {
      headers: { Authorization: `token ${pat}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.status === 401) {
      localStorage.removeItem(PAT_KEY);
      if (msgEl) msgEl.innerHTML = '<div class="msg error">トークンが無効です</div>';
      if (btn) btn.disabled = false;
      showPATModal(saveChecks);
      return;
    }
    if (!res.ok) throw new Error('取得失敗 ' + res.status);
    const fileData = await res.json();
    const sha = fileData.sha;
    const raw = atob(fileData.content.replace(/\n/g, ''));
    const bytes = new Uint8Array(raw.length).map((_, i) => raw.charCodeAt(i));
    const currentJson = JSON.parse(new TextDecoder('utf-8').decode(bytes));

    // 2. 該当案件を見つけて チェック フィールドを更新
    const buckets = ['案件', '中止案件'];
    let target = null;
    for (const b of buckets) {
      const arr = currentJson[b] || [];
      const idx = arr.findIndex(x => x['案件キー'] === STATE.ankenKey);
      if (idx !== -1) { target = arr[idx]; break; }
    }
    if (!target) throw new Error('案件が見つかりません: ' + STATE.ankenKey);

    // 空オブジェクトなら省略
    if (Object.keys(STATE.checks).length === 0) {
      delete target['チェック'];
    } else {
      target['チェック'] = Object.assign({}, STATE.checks);
    }

    // 3. PUT
    const jsonStr = JSON.stringify(currentJson, null, 2);
    const encBytes = new TextEncoder().encode(jsonStr);
    const encChars = Array.from(encBytes).map(b => String.fromCharCode(b)).join('');
    const newContent = btoa(encChars);
    const putRes = await fetch(GH_API, {
      method: 'PUT',
      headers: { Authorization: `token ${pat}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify({
        message: `workflow更新: ${STATE.ankenKey} チェック更新`,
        content: newContent,
        sha
      })
    });
    if (!putRes.ok) throw new Error('保存失敗 ' + putRes.status);

    // 4. ローカル STATE を最新で更新
    STATE.anken['チェック'] = Object.assign({}, STATE.checks);
    STATE.dirty = false;
    render();
    if (msgEl) msgEl.innerHTML = '<div class="msg success">✓ 保存しました（GitHub Pages反映には1〜2分かかる場合があります）</div>';
    showToast('保存しました');
  } catch (err) {
    console.error(err);
    if (msgEl) msgEl.innerHTML = `<div class="msg error">エラー: ${escapeHtml(err.message)}</div>`;
    if (btn) btn.disabled = false;
  }
}

/* 起動 */
init();
</script>
</body>
</html>
