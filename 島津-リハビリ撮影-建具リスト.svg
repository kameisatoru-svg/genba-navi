<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1188 840" font-family="'Noto Sans CJK JP','Noto Sans JP','IPAGothic','Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif">
  <defs>
    <marker id="dimS" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto"><path d="M8,2 L2,5 L8,8" fill="none" stroke="#c0392b" stroke-width="1"/></marker>
    <marker id="dimE" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M2,2 L8,5 L2,8" fill="none" stroke="#c0392b" stroke-width="1"/></marker>
  </defs>
  <rect x="0" y="0" width="1188" height="840" fill="#fff"/>
  <text x="24" y="38" font-size="20" font-weight="bold" fill="#1a2a3a">■大分リハビリテーション病院 一般撮影室 建具リスト</text>
  <text x="1164" y="38" font-size="12" fill="#555" text-anchor="end">2026/06/17</text>
  <text x="24" y="60" font-size="11" fill="#c0392b">※赤字は注記。寸法・開き勝手は清書/展開図基準。建具本体は既存。撮影室側に鋼製建具塗装（白 G25-90A）を追加（古賀美装・7/11土）。</text>

  <!-- 表枠 -->
  <g stroke="#888" stroke-width="1" fill="none">
    <rect x="20" y="72" width="1148" height="660"/>
    <line x1="95" y1="72" x2="95" y2="732"/>
    <line x1="365" y1="72" x2="365" y2="732"/>
    <line x1="635" y1="72" x2="635" y2="732"/>
    <line x1="905" y1="72" x2="905" y2="732"/>
    <!-- 横罫線: 姿図下=460, 箇所489, 仕上519, 見込549, ガラス579 -->
    <line x1="20" y1="460" x2="1168" y2="460"/>
    <line x1="20" y1="490" x2="1168" y2="490"/>
    <line x1="20" y1="520" x2="1168" y2="520"/>
    <line x1="20" y1="550" x2="1168" y2="550"/>
    <line x1="20" y1="580" x2="1168" y2="580"/>
    <line x1="20" y1="640" x2="1168" y2="640"/>
  </g>
  <!-- 左ラベル列 -->
  <g font-size="11" fill="#333" text-anchor="middle">
    <text x="57" y="270" font-weight="bold">姿図</text>
    <text x="57" y="479">箇所</text>
    <text x="57" y="509">仕上</text>
    <text x="57" y="539">見込</text>
    <text x="57" y="569">ガラス</text>
    <text x="57" y="613">付属金物</text>
    <text x="57" y="690" font-weight="bold">備考</text>
  </g>

  <!-- ===== D1 操作室ドア（片開き W970×H2025・内開き・吊元右） cx=230 FL=430 ===== -->
  <circle cx="150" cy="98" r="14" fill="#fff" stroke="#1a2a3a" stroke-width="1.4"/>
  <text x="150" y="103" font-size="12" font-weight="bold" text-anchor="middle">D1</text>
  <text x="250" y="93" font-size="12" fill="#222" text-anchor="middle">片開きドア</text>
  <text x="250" y="111" font-size="11" fill="#222" text-anchor="middle">数量 1</text>
  <!-- 姿図 -->
  <rect x="177" y="207" width="106" height="223" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <!-- 開き勝手: 吊元右(283)・センター(318)でくの字・一点鎖線 -->
  <g stroke="#2c3e50" stroke-width="0.9" fill="none" stroke-dasharray="7 2 2 2">
    <path d="M283,318 L177,207 M283,318 L177,430"/>
  </g>
  <!-- レバーハンドル(先側=左) -->
  <circle cx="186" cy="318" r="2.6" fill="#1a2a3a"/><line x1="188" y1="318" x2="199" y2="318" stroke="#1a2a3a" stroke-width="1.7"/>
  <line x1="232" y1="430" x2="430" y2="430" stroke="#2c3e50" stroke-width="1"/>
  <path d="M177,427 l8,0 l-4,7 z" fill="#2c3e50"/><text x="170" y="425" font-size="8" fill="#555" text-anchor="end">FL</text>
  <line x1="177" y1="448" x2="283" y2="448" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="230" y="443" font-size="9" fill="#c0392b" text-anchor="middle">970</text>
  <line x1="296" y1="207" x2="296" y2="430" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="289" y="318" font-size="9" fill="#c0392b" text-anchor="middle" transform="rotate(-90 289 318)">2025</text>
  <!-- 仕様 -->
  <g font-size="10" fill="#222" text-anchor="middle">
    <text x="230" y="479">A面・操作室側</text>
    <text x="230" y="509">塗装 G25-90A（撮影室側片面）</text>
    <text x="230" y="539">既存（要確認）</text>
    <text x="230" y="569">―</text>
    <text x="230" y="613">既存（レバー等）</text>
  </g>

  <!-- ===== D2 ドア（片開き W900×H2025・内開き） cx=500 ===== -->
  <circle cx="420" cy="98" r="14" fill="#fff" stroke="#1a2a3a" stroke-width="1.4"/>
  <text x="420" y="103" font-size="12" font-weight="bold" text-anchor="middle">D2</text>
  <text x="520" y="93" font-size="12" fill="#222" text-anchor="middle">片開きドア</text>
  <text x="520" y="111" font-size="11" fill="#222" text-anchor="middle">数量 1</text>
  <rect x="451" y="207" width="99" height="223" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <!-- 開き勝手: 吊元左(451)・センター(318)でくの字・一点鎖線 -->
  <g stroke="#2c3e50" stroke-width="0.9" fill="none" stroke-dasharray="7 2 2 2">
    <path d="M451,318 L550,207 M451,318 L550,430"/>
  </g>
  <!-- レバーハンドル(先側=右) -->
  <circle cx="541" cy="318" r="2.6" fill="#1a2a3a"/><line x1="539" y1="318" x2="528" y2="318" stroke="#1a2a3a" stroke-width="1.7"/>
  <line x1="500" y1="430" x2="700" y2="430" stroke="#2c3e50" stroke-width="1"/>
  <path d="M451,427 l8,0 l-4,7 z" fill="#2c3e50"/><text x="444" y="425" font-size="8" fill="#555" text-anchor="end">FL</text>
  <line x1="451" y1="448" x2="550" y2="448" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="500" y="443" font-size="9" fill="#c0392b" text-anchor="middle">900</text>
  <line x1="563" y1="207" x2="563" y2="430" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="556" y="318" font-size="9" fill="#c0392b" text-anchor="middle" transform="rotate(-90 556 318)">2025</text>
  <g font-size="10" fill="#222" text-anchor="middle">
    <text x="500" y="479">B面・空室側</text>
    <text x="500" y="509">塗装 G25-90A（撮影室側片面）</text>
    <text x="500" y="539">既存（要確認）</text>
    <text x="500" y="569">―</text>
    <text x="500" y="613">既存</text>
  </g>

  <!-- ===== D3 親子ドア（W1280×H2025・親=右/子=左・内開き） cx=770 ===== -->
  <circle cx="690" cy="98" r="14" fill="#fff" stroke="#1a2a3a" stroke-width="1.4"/>
  <text x="690" y="103" font-size="12" font-weight="bold" text-anchor="middle">D3</text>
  <text x="790" y="93" font-size="12" fill="#222" text-anchor="middle">親子ドア</text>
  <text x="790" y="111" font-size="11" fill="#222" text-anchor="middle">数量 1</text>
  <rect x="700" y="207" width="141" height="223" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <line x1="794" y1="207" x2="794" y2="430" stroke="#2c3e50" stroke-width="1"/>  <!-- 親子境界(親=右側広い) -->
  <!-- 開き: 親(吊元右841)・子(吊元左700)、各センターでくの字・一点鎖線 -->
  <g stroke="#2c3e50" stroke-width="0.9" fill="none" stroke-dasharray="7 2 2 2">
    <path d="M841,318 L794,207 M841,318 L794,430"/>  <!-- 親(右) -->
    <path d="M700,318 L794,207 M700,318 L794,430"/>  <!-- 子(左・ハンドル無) -->
  </g>
  <!-- レバーハンドルは親のみ(先側=境界・親側) -->
  <circle cx="803" cy="318" r="2.6" fill="#1a2a3a"/><line x1="805" y1="318" x2="815" y2="318" stroke="#1a2a3a" stroke-width="1.7"/>
  <text x="817" y="225" font-size="8" fill="#777" text-anchor="middle">親</text>
  <text x="747" y="225" font-size="8" fill="#777" text-anchor="middle">子</text>
  <line x1="770" y1="430" x2="905" y2="430" stroke="#2c3e50" stroke-width="1"/>
  <path d="M700,427 l8,0 l-4,7 z" fill="#2c3e50"/><text x="693" y="425" font-size="8" fill="#555" text-anchor="end">FL</text>
  <line x1="700" y1="448" x2="841" y2="448" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="770" y="443" font-size="9" fill="#c0392b" text-anchor="middle">1280</text>
  <line x1="854" y1="207" x2="854" y2="430" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="847" y="318" font-size="9" fill="#c0392b" text-anchor="middle" transform="rotate(-90 847 318)">2025</text>
  <g font-size="10" fill="#222" text-anchor="middle">
    <text x="770" y="479">C面・廊下側</text>
    <text x="770" y="509">塗装 G25-90A（撮影室側片面）</text>
    <text x="770" y="539">既存（要確認）</text>
    <text x="770" y="569">―</text>
    <text x="770" y="613">既存</text>
  </g>

  <!-- ===== W1 中連窓（W850×H850・腰下860） cx=1037 ===== -->
  <circle cx="960" cy="98" r="14" fill="#fff" stroke="#1a2a3a" stroke-width="1.4"/>
  <text x="960" y="103" font-size="12" font-weight="bold" text-anchor="middle">W1</text>
  <text x="1055" y="93" font-size="12" fill="#222" text-anchor="middle">中連窓（引違い）</text>
  <text x="1055" y="111" font-size="11" fill="#222" text-anchor="middle">数量 1</text>
  <!-- 窓: 腰下860→y=335, H850→上y=241 -->
  <rect x="990" y="241" width="94" height="94" fill="#eef4f8" stroke="#2c3e50" stroke-width="2"/>
  <line x1="1037" y1="241" x2="1037" y2="335" stroke="#2c3e50" stroke-width="0.8"/>
  <line x1="990" y1="288" x2="1084" y2="288" stroke="#2c3e50" stroke-width="0.6"/>
  <line x1="960" y1="430" x2="1130" y2="430" stroke="#2c3e50" stroke-width="1"/>
  <path d="M990,427 l8,0 l-4,7 z" fill="#2c3e50"/><text x="983" y="425" font-size="8" fill="#555" text-anchor="end">FL</text>
  <line x1="990" y1="353" x2="990" y2="430" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="983" y="395" font-size="9" fill="#c0392b" text-anchor="middle" transform="rotate(-90 983 395)">腰下860</text>
  <line x1="990" y1="226" x2="1084" y2="226" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="1037" y="221" font-size="9" fill="#c0392b" text-anchor="middle">850</text>
  <line x1="1097" y1="241" x2="1097" y2="335" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
  <text x="1090" y="288" font-size="9" fill="#c0392b" text-anchor="middle" transform="rotate(-90 1090 288)">850</text>
  <g font-size="10" fill="#222" text-anchor="middle">
    <text x="1037" y="479">A面・操作室側</text>
    <text x="1037" y="509">枠塗装 G25-90A（片面）</text>
    <text x="1037" y="539">既存（要確認）</text>
    <text x="1037" y="569" fill="#c0392b">ガラス種要確認</text>
    <text x="1037" y="613">既存（クレセント）</text>
  </g>

  <!-- 備考 -->
  <g font-size="10.5" fill="#222">
    <text x="105" y="665">○ 本工事は内装（クロス・床シート・巾木）。建具は既存のため、本リストは開口・寸法の記録（養生・取合い確認用）。</text>
    <text x="105" y="685">○ 寸法・開き勝手・吊元は清書/展開図に一致。記号 D=ドア／W=窓。FL＝床仕上面。姿図の<tspan fill="#2c3e50">一点鎖線（くの字・吊元側センターで折返）＝開き勝手</tspan>、<tspan fill="#1a2a3a">●—＝レバーハンドル位置</tspan>（親子の子扉はハンドル無）。</text>
    <text x="105" y="705" fill="#c0392b">○ 塗装：撮影室付随の鋼製建具（扉3＝D1/D2/D3・監視窓枠1＝W1想定）を撮影室側片面・枠片面塗装。色 白 G25-90A。塗装日 2026/7/11(土)9時（古賀美装）。本体工事(7/18-19)より前倒しの別日。</text>
  </g>
</svg>
