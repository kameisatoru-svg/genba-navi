<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>現場写真｜アート・レイズ</title>
<style>
:root{
  --bg:#eeebe5;--navy:#1e2d40;--navy2:#2a3f5a;
  --accent:#c8a96e;--text:#1e2d40;--text2:#5a6a7a;--white:#ffffff;
  --before:#1a6fc4;--after:#208040;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
.header{background:var(--navy);height:50px;display:flex;align-items:center;padding:0 6px;flex-shrink:0;}
.btn-icon{width:44px;height:44px;border:none;background:transparent;color:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;}
.btn-icon:active{background:rgba(255,255,255,0.15);}
.header-title{flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--white);}
.anken-bar{background:var(--navy2);height:44px;display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;}
.anken-select{flex:1;height:30px;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);border-radius:8px;color:var(--white);font-size:12px;font-weight:500;padding:0 10px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.anken-select option{background:#2a3f5a;color:var(--white);}
.btn-sm{height:30px;padding:0 12px;background:var(--accent);border:none;border-radius:8px;color:var(--navy);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;flex-shrink:0;}
.filter-bar{background:var(--white);height:38px;display:flex;align-items:center;padding:0 10px;gap:6px;border-bottom:1px solid rgba(30,45,64,0.1);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{height:24px;padding:0 12px;border:1.5px solid rgba(30,45,64,0.2);background:transparent;color:var(--text2);font-size:11px;font-weight:500;border-radius:20px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;flex-shrink:0;}
.filter-btn.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
.filter-count{font-size:10px;margin-left:3px;opacity:0.7;}
.scroll-area{flex:1;overflow-y:auto;padding:10px 10px 90px;-webkit-overflow-scrolling:touch;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text2);}
.empty-icon{width:60px;height:60px;border-radius:50%;background:rgba(30,45,64,0.06);display:flex;align-items:center;justify-content:center;}
.empty-text{font-size:13px;text-align:center;line-height:1.6;}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.photo-card{background:var(--white);border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(30,45,64,0.08);cursor:pointer;}
.photo-card:active{opacity:0.85;}
.photo-thumb-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;position:relative;}
.photo-thumb{width:100%;height:100%;object-fit:cover;display:block;}
.photo-thumb-empty{width:100%;height:100%;background:#e8e5df;display:flex;align-items:center;justify-content:center;}
.photo-tag-overlay{position:absolute;top:6px;left:6px;}
.tag{display:inline-flex;align-items:center;height:18px;padding:0 7px;border-radius:10px;font-size:10px;font-weight:700;}
.tag-before{background:rgba(26,111,196,0.85);color:#fff;}
.tag-after{background:rgba(32,128,64,0.85);color:#fff;}
.photo-info{padding:8px 10px 10px;}
.photo-place{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.photo-comment{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:14px;}
.photo-date{font-size:10px;color:var(--text2);margin-top:4px;opacity:0.6;}
.fab-doc{background:var(--white);border:2px solid var(--navy);}
.fab-doc-label{position:absolute;right:60px;background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.2s;}
.fab-wrap.doc-open .fab-doc-label{opacity:1;}

.fab{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(30,45,64,0.28);}
.fab:active{transform:scale(0.94);}
.fab-camera{background:var(--navy);}
.fab-gallery{background:var(--accent);}
.modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.5);align-items:flex-end;justify-content:center;}
.modal.show{display:flex;}
.modal-panel{background:var(--white);width:100%;max-width:480px;border-radius:16px 16px 0 0;padding:20px 16px 40px;max-height:92dvh;overflow-y:auto;}
.modal-panel h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;}
.form-label{font-size:11px;font-weight:500;color:var(--text2);margin:12px 0 4px;display:block;}
.form-input{width:100%;height:44px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;padding:0 12px;font-size:15px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);outline:none;}
.form-input:focus{border-color:var(--navy);}
.form-textarea{width:100%;min-height:68px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;padding:10px 12px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);outline:none;resize:none;line-height:1.5;}
.form-textarea:focus{border-color:var(--navy);}
.toggle-wrap{display:flex;gap:8px;margin-top:4px;}
.toggle-btn{flex:1;height:40px;border:2px solid rgba(30,45,64,0.2);background:transparent;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--text2);}
.toggle-btn.sel-before{background:rgba(26,111,196,0.1);border-color:var(--before);color:var(--before);}
.toggle-btn.sel-after{background:rgba(32,128,64,0.1);border-color:var(--after);color:var(--after);}
.preview-wrap{width:100%;aspect-ratio:4/3;background:#e8e5df;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
.preview-wrap img{width:100%;height:100%;object-fit:cover;}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.btn-cancel{flex:1;height:44px;border:2px solid rgba(30,45,64,0.2);background:transparent;border-radius:10px;font-size:15px;font-family:'Noto Sans JP',sans-serif;color:var(--text2);cursor:pointer;}
.btn-ok{flex:2;height:44px;border:none;background:var(--navy);border-radius:10px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:var(--white);cursor:pointer;}
.btn-danger{background:#c03232;color:#fff;border:none;border-radius:10px;height:44px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;padding:0 16px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(30,45,64,0.08);}
.detail-label{font-size:11px;color:var(--text2);}
.detail-val{font-size:13px;font-weight:500;color:var(--text);}
.detail-actions{display:flex;gap:8px;margin-top:14px;}
.doc-type-btn{width:100%;padding:12px 14px;background:var(--bg);border:2px solid rgba(30,45,64,0.15);border-radius:10px;text-align:left;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Noto Sans JP',sans-serif;line-height:1.4;}
.doc-type-btn.active{border-color:var(--navy);background:#eef2f8;}
.doc-photo-sel{position:relative;border-radius:8px;overflow:hidden;cursor:pointer;border:3px solid transparent;aspect-ratio:4/3;}
.doc-photo-sel img{width:100%;height:100%;object-fit:cover;display:block;}
.doc-photo-sel.selected{border-color:var(--accent);}
.doc-photo-sel .sel-badge{display:none;position:absolute;top:4px;right:4px;width:20px;height:20px;background:var(--accent);border-radius:50%;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--navy);}
.doc-photo-sel.selected .sel-badge{display:flex;}
.doc-photo-sel .phase-tag{position:absolute;bottom:4px;left:4px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">
  <button class="btn-icon" onclick="history.back()">←</button>
  <div class="header-title">現場写真</div>
  <button class="btn-icon" style="font-size:12px;color:var(--accent);" onclick="openAnkenMgr()">案件</button>
</div>

<div class="anken-bar">
  <select class="anken-select" id="ankenSelect" onchange="onAnkenChange()">
    <option value="">── 案件を選択 ──</option>
  </select>
  <button class="btn-sm" onclick="openAddAnken()">＋案件</button>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">すべて<span class="filter-count" id="cntAll"></span></button>
  <button class="filter-btn" onclick="setFilter('before',this)">施工前<span class="filter-count" id="cntBefore"></span></button>
  <button class="filter-btn" onclick="setFilter('after',this)">施工後<span class="filter-count" id="cntAfter"></span></button>
</div>

<div class="scroll-area" id="scrollArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="6" width="24" height="18" rx="3" stroke="#5a6a7a" stroke-width="1.5" fill="none"/>
        <circle cx="14" cy="15" r="5" stroke="#5a6a7a" stroke-width="1.5" fill="none"/>
        <path d="M10 6 L12 3 L16 3 L18 6" stroke="#5a6a7a" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="empty-text" id="emptyText">案件を選択して<br>写真を追加してください</div>
  </div>
  <div class="photo-grid" id="photoGrid" style="display:none;"></div>
</div>

<div class="fab-wrap">
  <button class="fab fab-doc" onclick="openDocModal()" title="書類作成" style="position:relative;">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="3" y="2" width="13" height="18" rx="2" stroke="#1e2d40" stroke-width="1.5" fill="none"/>
      <path d="M16 6 L19 6 L19 20 L6 20 L6 18" stroke="#1e2d40" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
      <line x1="6" y1="7" x2="13" y2="7" stroke="#1e2d40" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="6" y1="10" x2="13" y2="10" stroke="#1e2d40" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="6" y1="13" x2="10" y2="13" stroke="#1e2d40" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="fab fab-gallery" onclick="openGallery()" title="ギャラリーから選択">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="2" y="2" width="18" height="18" rx="3" stroke="#1e2d40" stroke-width="1.5" fill="none"/>
      <rect x="4" y="4" width="6" height="6" rx="1" stroke="#1e2d40" stroke-width="1.2" fill="none"/>
      <rect x="12" y="4" width="6" height="6" rx="1" stroke="#1e2d40" stroke-width="1.2" fill="none"/>
      <rect x="4" y="12" width="6" height="6" rx="1" stroke="#1e2d40" stroke-width="1.2" fill="none"/>
      <rect x="12" y="12" width="6" height="6" rx="1" stroke="#1e2d40" stroke-width="1.2" fill="none"/>
    </svg>
  </button>
  <button class="fab fab-camera" onclick="openCamera()" title="カメラで撮影">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <rect x="2" y="6" width="20" height="15" rx="3" stroke="white" stroke-width="1.5" fill="none"/>
      <circle cx="12" cy="13" r="4" stroke="white" stroke-width="1.5" fill="none"/>
      <path d="M8 6 L10 3 L14 3 L16 6" stroke="white" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<input type="file" id="fileCamera" accept="image/*" capture="environment" style="display:none;" onchange="onFileSelected(this)">
<input type="file" id="fileGallery" accept="image/*" style="display:none;" onchange="onFileSelected(this)">

<!-- 写真追加モーダル -->
<div class="modal" id="addModal">
  <div class="modal-panel">
    <h3>写真を追加</h3>
    <div class="preview-wrap" id="previewWrap">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" opacity="0.25">
        <rect x="3" y="8" width="34" height="26" rx="4" stroke="#1e2d40" stroke-width="2" fill="none"/>
        <circle cx="20" cy="21" r="7" stroke="#1e2d40" stroke-width="2" fill="none"/>
        <path d="M14 8 L17 4 L23 4 L26 8" stroke="#1e2d40" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="form-label">場所メモ</span>
    <input type="text" class="form-input" id="addPlace" placeholder="例：1階廊下、和室6畳">
    <span class="form-label">施工前 / 施工後</span>
    <div class="toggle-wrap">
      <button class="toggle-btn sel-before" id="btnBefore" onclick="selectPhase('before')">施工前</button>
      <button class="toggle-btn" id="btnAfter" onclick="selectPhase('after')">施工後</button>
    </div>
    <span class="form-label">コメント</span>
    <textarea class="form-textarea" id="addComment" placeholder="気になる点・メモ等"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">キャンセル</button>
      <button class="btn-ok" onclick="savePhoto()">保存</button>
    </div>
  </div>
</div>

<!-- 案件追加モーダル -->
<div class="modal" id="ankenModal">
  <div class="modal-panel">
    <h3>案件を追加</h3>
    <span class="form-label">案件名</span>
    <input type="text" class="form-input" id="ankenName" placeholder="例：さくら苑 床リフォーム">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAnkenModal()">キャンセル</button>
      <button class="btn-ok" onclick="confirmAddAnken()">追加</button>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal" id="detailModal">
  <div class="modal-panel">
    <h3 id="detailTitle">写真詳細</h3>
    <div id="detailImgWrap" style="margin-bottom:12px;"></div>
    <div class="detail-row">
      <span class="detail-label">案件</span><span class="detail-val" id="detailAnken"></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">場所</span><span class="detail-val" id="detailPlace"></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">区分</span><span class="detail-val" id="detailPhase"></span>
    </div>
    <div class="detail-row" style="border:none;">
      <span class="detail-label">コメント</span>
      <span class="detail-val" id="detailComment" style="max-width:65%;text-align:right;"></span>
    </div>
    <div class="detail-actions">
      <button class="btn-ok" style="flex:2;" onclick="downloadPhoto()">📥 端末に保存</button>
      <button class="btn-danger" onclick="deletePhoto()">削除</button>
      <button class="btn-cancel" style="flex:1;" onclick="closeDetailModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- 書類作成モーダル -->
<div class="modal" id="docModal">
  <div class="modal-panel" style="max-height:92dvh;overflow-y:auto;">
    <h3>📋 書類作成</h3>

    <!-- STEP1: 書類選択 -->
    <div id="docStep1">
      <span class="form-label">書類の種類</span>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
        <button class="doc-type-btn active" data-type="kanryo" onclick="selectDocType('kanryo',this)">
          工事完了報告書
          <span style="font-size:10px;color:var(--text2);display:block;font-weight:400;">施工前・施工後の写真を添えてご報告</span>
        </button>
      </div>
      <div class="modal-btns" style="margin-top:16px;">
        <button class="btn-cancel" onclick="closeDocModal()">キャンセル</button>
        <button class="btn-ok" onclick="goDocStep2()">次へ　写真を選ぶ →</button>
      </div>
    </div>

    <!-- STEP2: 写真選択 -->
    <div id="docStep2" style="display:none;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <button onclick="backDocStep1()" style="background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:0;">←</button>
        <span style="font-size:13px;font-weight:700;color:var(--text);">写真を選択</span>
      </div>
      <p style="font-size:11px;color:var(--text2);margin-bottom:10px;">この案件の写真から、書類に使う写真を選んでください。施工前・施工後それぞれ1枚以上選ぶと書類が充実します。</p>
      <div id="docPhotoGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:38dvh;overflow-y:auto;"></div>
      <p id="docNoPhoto" style="display:none;font-size:12px;color:var(--text2);text-align:center;padding:20px 0;">この案件に写真がありません。<br>先に写真を追加してください。</p>
      <div style="margin-top:10px;padding:8px 10px;background:var(--bg);border-radius:8px;font-size:11px;color:var(--text2);">
        選択中：<span id="docSelectedCount" style="font-weight:700;color:var(--navy);">0</span> 枚
      </div>

      <!-- STEP2b: 案件情報入力 -->
      <div style="margin-top:12px;">
        <span class="form-label">工事件名</span>
        <input type="text" class="form-input" id="docKojiName" placeholder="例：床面リフォーム工事（塩ビタイル貼り）">
        <span class="form-label">施工場所</span>
        <input type="text" class="form-input" id="docKojiLoc" placeholder="例：1階廊下・居室">
        <span class="form-label">工事期間</span>
        <input type="text" class="form-input" id="docKojiPeriod" placeholder="例：令和8年3月21日〜22日">
        <span class="form-label">宛先（お客様名）</span>
        <input type="text" class="form-input" id="docClient" placeholder="例：社会福祉法人 玉寿会">
        <span class="form-label">報告日</span>
        <input type="text" class="form-input" id="docDate" placeholder="例：令和8年3月22日">
      </div>

      <div class="modal-btns" style="margin-top:14px;">
        <button class="btn-cancel" onclick="closeDocModal()">キャンセル</button>
        <button class="btn-ok" id="docSendBtn" onclick="buildClaudePrompt()">📋 Claudeに投げる</button>
      </div>
    </div>
  </div>
</div>

<!-- コピー完了トースト -->
<div id="copyToast" style="display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#208040;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;">✅ クリップボードにコピーしました！</div>

<script>
function loadData(key,def){try{const d=localStorage.getItem(key);return d?JSON.parse(d):def;}catch(e){return def;}}
function saveData(key,val){localStorage.setItem(key,JSON.stringify(val));}

let ankenList=loadData('arAnken',['さくら苑 床リフォーム']);
let photos=loadData('arPhotos',[]);
let currentAnken='';
let currentFilter='all';
let currentPhase='before';
let pendingDataURL=null;
let detailId=null;

function buildAnkenSelect(){
  const sel=document.getElementById('ankenSelect');
  const cur=currentAnken;
  sel.innerHTML='<option value="">── 案件を選択 ──</option>';
  ankenList.forEach(a=>{
    const o=document.createElement('option');
    o.value=a;o.textContent=a;
    if(a===cur)o.selected=true;
    sel.appendChild(o);
  });
}
function onAnkenChange(){
  currentAnken=document.getElementById('ankenSelect').value;
  renderPhotos();
}
function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderPhotos();
}
function renderPhotos(){
  const filtered=photos.filter(p=>{
    if(currentAnken&&p.anken!==currentAnken)return false;
    if(currentFilter==='before')return p.phase==='before';
    if(currentFilter==='after')return p.phase==='after';
    return true;
  });
  const all=photos.filter(p=>!currentAnken||p.anken===currentAnken);
  document.getElementById('cntAll').textContent=all.length?`(${all.length})`:'';
  document.getElementById('cntBefore').textContent=all.filter(p=>p.phase==='before').length?`(${all.filter(p=>p.phase==='before').length})`:'';
  document.getElementById('cntAfter').textContent=all.filter(p=>p.phase==='after').length?`(${all.filter(p=>p.phase==='after').length})`:'';
  const grid=document.getElementById('photoGrid');
  const empty=document.getElementById('emptyState');
  if(filtered.length===0){
    grid.style.display='none';empty.style.display='flex';
    document.getElementById('emptyText').innerHTML=currentAnken?'写真がありません<br>カメラまたはギャラリーから追加':'案件を選択して<br>写真を追加してください';
    return;
  }
  grid.style.display='grid';empty.style.display='none';
  grid.innerHTML='';
  filtered.slice().reverse().forEach(p=>{
    const card=document.createElement('div');
    card.className='photo-card';
    card.onclick=()=>openDetail(p.id);
    const tagClass=p.phase==='before'?'tag-before':'tag-after';
    const tagText=p.phase==='before'?'施工前':'施工後';
    card.innerHTML=`
      <div class="photo-thumb-wrap">
        ${p.dataURL?`<img class="photo-thumb" src="${p.dataURL}" loading="lazy">`:`<div class="photo-thumb-empty"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="2" y="6" width="24" height="18" rx="3" stroke="#bbb" stroke-width="1.5" fill="none"/><circle cx="14" cy="15" r="5" stroke="#bbb" stroke-width="1.5" fill="none"/></svg></div>`}
        <div class="photo-tag-overlay"><span class="tag ${tagClass}">${tagText}</span></div>
      </div>
      <div class="photo-info">
        <div class="photo-place">${p.place||'場所未記入'}</div>
        <div class="photo-comment">${p.comment||''}</div>
        <div class="photo-date">${p.date}</div>
      </div>`;
    grid.appendChild(card);
  });
}
function openCamera(){
  if(!currentAnken){alert('先に案件を選択してください');return;}
  document.getElementById('fileCamera').value='';
  document.getElementById('fileCamera').click();
}
function openGallery(){
  if(!currentAnken){alert('先に案件を選択してください');return;}
  document.getElementById('fileGallery').value='';
  document.getElementById('fileGallery').click();
}
function onFileSelected(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    pendingDataURL=e.target.result;
    const pw=document.getElementById('previewWrap');
    pw.innerHTML=`<img src="${pendingDataURL}" style="width:100%;height:100%;object-fit:cover;">`;
    document.getElementById('addPlace').value='';
    document.getElementById('addComment').value='';
    selectPhase('before');
    document.getElementById('addModal').classList.add('show');
    setTimeout(()=>document.getElementById('addPlace').focus(),300);
  };
  reader.readAsDataURL(file);
}
function selectPhase(p){
  currentPhase=p;
  document.getElementById('btnBefore').className='toggle-btn'+(p==='before'?' sel-before':'');
  document.getElementById('btnAfter').className='toggle-btn'+(p==='after'?' sel-after':'');
}
function savePhoto(){
  if(!pendingDataURL){alert('写真が選択されていません');return;}
  const place=document.getElementById('addPlace').value.trim();
  const comment=document.getElementById('addComment').value.trim();
  const now=new Date();
  const dateStr=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  const id=Date.now().toString();
  // 端末に保存
  const link=document.createElement('a');
  const phaseLabel=currentPhase==='before'?'施工前':'施工後';
  link.download=`${currentAnken}_${place||phaseLabel}_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.jpg`;
  link.href=pendingDataURL;
  link.click();
  // サムネイル縮小してlocalStorageに保存
  resizeImage(pendingDataURL,400).then(dataURL=>{
    photos.push({id,anken:currentAnken,place,phase:currentPhase,comment,date:dateStr,dataURL});
    saveData('arPhotos',photos);
    if(photos.length>80){
      alert('写真が80枚を超えました。古い写真を削除してください。');
    }
    pendingDataURL=null;
    closeAddModal();
    renderPhotos();
  });
}
function resizeImage(dataURL,maxW){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(1,maxW/img.width);
      const w=img.width*ratio,h=img.height*ratio;
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.75));
    };
    img.src=dataURL;
  });
}
function closeAddModal(){
  document.getElementById('addModal').classList.remove('show');
  pendingDataURL=null;
}
function openAddAnken(){
  document.getElementById('ankenName').value='';
  document.getElementById('ankenModal').classList.add('show');
  setTimeout(()=>document.getElementById('ankenName').focus(),100);
}
function closeAnkenModal(){document.getElementById('ankenModal').classList.remove('show');}
function confirmAddAnken(){
  const name=document.getElementById('ankenName').value.trim();
  if(!name){closeAnkenModal();return;}
  if(!ankenList.includes(name))ankenList.push(name);
  saveData('arAnken',ankenList);
  currentAnken=name;
  buildAnkenSelect();
  closeAnkenModal();
  renderPhotos();
}
document.getElementById('ankenName').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddAnken();});
function openDetail(id){
  const p=photos.find(x=>x.id===id);
  if(!p)return;
  detailId=id;
  document.getElementById('detailTitle').textContent=p.place||'写真詳細';
  document.getElementById('detailImgWrap').innerHTML=p.dataURL
    ?`<img src="${p.dataURL}" style="width:100%;display:block;max-height:45dvh;object-fit:contain;background:#111;border-radius:10px;">`:'';
  document.getElementById('detailAnken').textContent=p.anken;
  document.getElementById('detailPlace').textContent=p.place||'未記入';
  document.getElementById('detailPhase').innerHTML=p.phase==='before'
    ?'<span class="tag tag-before">施工前</span>':'<span class="tag tag-after">施工後</span>';
  document.getElementById('detailComment').textContent=p.comment||'—';
  document.getElementById('detailModal').classList.add('show');
}
function closeDetailModal(){document.getElementById('detailModal').classList.remove('show');}
function downloadPhoto(){
  const p=photos.find(x=>x.id===detailId);
  if(!p||!p.dataURL)return;
  const link=document.createElement('a');
  link.download=`${p.anken}_${p.place||p.phase}_${p.date.replace(/\//g,'')}.jpg`;
  link.href=p.dataURL;link.click();
}
function deletePhoto(){
  if(!confirm('この写真を削除しますか？'))return;
  photos=photos.filter(x=>x.id!==detailId);
  saveData('arPhotos',photos);
  closeDetailModal();
  renderPhotos();
}
function openAnkenMgr(){
  const list=ankenList.map((a,i)=>`${i+1}. ${a}`).join('\n');
  alert(ankenList.length?`登録案件：\n${list}`:'案件が登録されていません');
}
buildAnkenSelect();
renderPhotos();

// ── 書類作成モーダル ──
let selectedDocType='kanryo';
let selectedDocPhotos=new Set();

function selectDocType(type,btn){
  selectedDocType=type;
  document.querySelectorAll('.doc-type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function openDocModal(){
  if(!currentAnken){alert('先に案件を選択してください');return;}
  selectedDocPhotos.clear();
  // 案件情報を自動入力（案件名から推測）
  document.getElementById('docClient').value='';
  document.getElementById('docKojiName').value=currentAnken;
  document.getElementById('docKojiLoc').value='';
  const today=new Date();
  const wareki=`令和${today.getFullYear()-2018}年${today.getMonth()+1}月${today.getDate()}日`;
  document.getElementById('docDate').value=wareki;
  document.getElementById('docKojiPeriod').value='';
  document.getElementById('docStep1').style.display='';
  document.getElementById('docStep2').style.display='none';
  document.getElementById('docModal').classList.add('show');
}
function closeDocModal(){document.getElementById('docModal').classList.remove('show');}
function backDocStep1(){
  document.getElementById('docStep2').style.display='none';
  document.getElementById('docStep1').style.display='';
}
function goDocStep2(){
  document.getElementById('docStep1').style.display='none';
  document.getElementById('docStep2').style.display='';
  buildDocPhotoGrid();
}
function buildDocPhotoGrid(){
  const ankenPhotos=photos.filter(p=>p.anken===currentAnken&&p.dataURL);
  const grid=document.getElementById('docPhotoGrid');
  const noPhoto=document.getElementById('docNoPhoto');
  grid.innerHTML='';
  selectedDocPhotos.clear();
  updateDocCount();
  if(ankenPhotos.length===0){grid.style.display='none';noPhoto.style.display='block';return;}
  grid.style.display='grid';noPhoto.style.display='none';
  ankenPhotos.slice().reverse().forEach(p=>{
    const div=document.createElement('div');
    div.className='doc-photo-sel';
    div.dataset.id=p.id;
    const phaseColor=p.phase==='before'?'rgba(26,111,196,0.85)':'rgba(32,128,64,0.85)';
    const phaseText=p.phase==='before'?'施工前':'施工後';
    div.innerHTML=`<img src="${p.dataURL}">
      <div class="sel-badge">✓</div>
      <div class="phase-tag" style="background:${phaseColor};color:#fff;">${phaseText}</div>`;
    div.onclick=()=>toggleDocPhoto(p.id,div);
    grid.appendChild(div);
  });
}
function toggleDocPhoto(id,el){
  if(selectedDocPhotos.has(id)){
    selectedDocPhotos.delete(id);
    el.classList.remove('selected');
  }else{
    selectedDocPhotos.add(id);
    el.classList.add('selected');
  }
  updateDocCount();
}
function updateDocCount(){
  document.getElementById('docSelectedCount').textContent=selectedDocPhotos.size;
}

function buildClaudePrompt(){
  const kojiName=document.getElementById('docKojiName').value.trim();
  const kojiLoc=document.getElementById('docKojiLoc').value.trim();
  const kojiPeriod=document.getElementById('docKojiPeriod').value.trim();
  const client=document.getElementById('docClient').value.trim();
  const date=document.getElementById('docDate').value.trim();

  if(selectedDocPhotos.size===0){alert('写真を1枚以上選択してください');return;}

  const selPhotos=photos.filter(p=>selectedDocPhotos.has(p.id));
  const beforePhotos=selPhotos.filter(p=>p.phase==='before');
  const afterPhotos=selPhotos.filter(p=>p.phase==='after');

  // 写真情報（Base64は重いのでメタ情報＋dataURLを渡す）
  function photoInfo(p){
    return `【${p.phase==='before'?'施工前':'施工後'}】場所：${p.place||'未記入'}　コメント：${p.comment||'なし'}　dataURL：${p.dataURL}`;
  }

  let prompt=`以下の情報と写真を使って、工事完了報告書のHTMLを作成してください。

## 書類種別
工事完了報告書

## 案件情報
- 宛先：${client||currentAnken}
- 工事件名：${kojiName}
- 施工場所：${kojiLoc}
- 工事期間：${kojiPeriod}
- 報告日：${date}
- 担当：亀井 悟

## 写真データ（${selPhotos.length}枚）
`;

  selPhotos.forEach((p,i)=>{
    prompt+=`\n### 写真${i+1}\n`;
    prompt+=`- 区分：${p.phase==='before'?'施工前':'施工後'}\n`;
    prompt+=`- 場所：${p.place||'未記入'}\n`;
    prompt+=`- コメント：${p.comment||'なし'}\n`;
    prompt+=`- 画像データ：${p.dataURL}\n`;
  });

  prompt+=`
## 出力仕様
- 既存の工事完了報告書HTMLフォーマット（A4縦・印刷対応）に従って出力
- 写真は施工前・施工後をペアで並べる（施工前が複数ある場合は見やすく配置）
- 工事内容は写真のコメントと場所から気の利いた文章で箇条書き（2〜4項目）
- 挨拶文は「下記の工事が完了いたしましたのでご報告申し上げます。」
- フッターに「株式会社アート・レイズ　〒874-0829　大分県別府市上原町13番25号　担当：亀井 悟」
- 完成したHTMLコードのみ出力（説明不要）
`;

  navigator.clipboard.writeText(prompt).then(()=>{
    closeDocModal();
    const toast=document.getElementById('copyToast');
    toast.style.display='block';
    setTimeout(()=>{toast.style.display='none';},2500);
  }).catch(()=>{
    // フォールバック：テキストエリアでコピー
    const ta=document.createElement('textarea');
    ta.value=prompt;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    closeDocModal();
    const toast=document.getElementById('copyToast');
    toast.style.display='block';
    setTimeout(()=>{toast.style.display='none';},2500);
  });
}
