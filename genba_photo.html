<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>現場写真｜アート・レイズ</title>
<style>
:root{
  --bg:#eeebe5;--navy:#1e2d40;--navy2:#2a3f5a;
  --accent:#c8a96e;--text:#1e2d40;--text2:#5a6a7a;--white:#ffffff;
  --before:#1a6fc4;--after:#208040;
  --before-bg:#e8f0ff;--after-bg:#e8f5ec;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* ヘッダー */
.header{background:var(--navy);height:50px;display:flex;align-items:center;padding:0 6px;flex-shrink:0;}
.btn-icon{width:44px;height:44px;border:none;background:transparent;color:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;}
.btn-icon:active{background:rgba(255,255,255,0.15);}
.header-title{flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--white);}

/* 案件バー */
.anken-bar{background:var(--navy2);height:44px;display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;}
.anken-select{flex:1;height:30px;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);border-radius:8px;color:var(--white);font-size:12px;font-weight:500;padding:0 10px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.anken-select option{background:#2a3f5a;color:var(--white);}
.btn-sm{height:30px;padding:0 12px;background:var(--accent);border:none;border-radius:8px;color:var(--navy);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;flex-shrink:0;}

/* タブ */
.tab-bar{background:var(--white);display:flex;border-bottom:2px solid rgba(30,45,64,0.1);flex-shrink:0;}
.tab-btn{flex:1;height:40px;border:none;background:transparent;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.15s;}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy);}

/* スクロールエリア */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 10px 100px;}

/* 写真グリッド */
.photo-columns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.col-header{display:flex;align-items:center;justify-content:center;height:28px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:6px;}
.col-header-before{background:var(--before-bg);color:var(--before);}
.col-header-after{background:var(--after-bg);color:var(--after);}
.photo-col{display:flex;flex-direction:column;gap:8px;}

/* 写真カード */
.photo-card{background:var(--white);border-radius:10px;overflow:hidden;box-shadow:0 1px 5px rgba(30,45,64,0.1);cursor:pointer;position:relative;}
.photo-card:active{opacity:0.85;}
.photo-num{position:absolute;top:5px;left:5px;width:22px;height:22px;background:var(--navy);color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:2;line-height:1;}
.photo-thumb-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;}
.photo-thumb{width:100%;height:100%;object-fit:cover;display:block;}
.photo-info{padding:6px 8px 8px;}
.photo-place{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.photo-date{font-size:10px;color:var(--text2);opacity:0.6;margin-top:2px;}

/* 空状態 */
.empty-col{aspect-ratio:4/3;border:2px dashed rgba(30,45,64,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);opacity:0.6;}

/* FAB */
.fab-wrap{position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;gap:10px;z-index:50;}
.fab{height:44px;border-radius:22px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;padding:0 16px;box-shadow:0 4px 14px rgba(30,45,64,0.28);}
.fab:active{transform:scale(0.94);}
.fab-before{background:var(--before);color:#fff;}
.fab-after{background:var(--after);color:#fff;}

/* 書類タブ */
.doc-section{margin-bottom:16px;}
.doc-section-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;padding-left:2px;}
.photo-select-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.photo-sel-item{position:relative;aspect-ratio:4/3;border-radius:8px;overflow:hidden;cursor:pointer;border:3px solid transparent;transition:border-color 0.15s;}
.photo-sel-item.selected{border-color:var(--accent);}
.photo-sel-item img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-sel-num{position:absolute;top:3px;left:3px;width:20px;height:20px;background:var(--navy);color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.photo-sel-check{position:absolute;top:3px;right:3px;width:20px;height:20px;background:var(--accent);color:var(--navy);border-radius:50%;font-size:11px;font-weight:700;display:none;align-items:center;justify-content:center;}
.photo-sel-item.selected .photo-sel-check{display:flex;}
.photo-sel-phase{position:absolute;bottom:0;left:0;right:0;font-size:9px;font-weight:700;text-align:center;padding:2px 0;}
.phase-before-bar{background:rgba(26,111,196,0.8);color:#fff;}
.phase-after-bar{background:rgba(32,128,64,0.8);color:#fff;}

/* 書類種類選択 */
.doc-type-list{display:flex;flex-direction:column;gap:8px;}
.doc-type-btn{height:44px;border:2px solid rgba(30,45,64,0.2);background:var(--white);border-radius:10px;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:left;padding:0 14px;display:flex;align-items:center;gap:10px;}
.doc-type-btn.selected{border-color:var(--navy);background:rgba(30,45,64,0.06);}
.doc-type-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}

/* 生成ボタン */
.btn-generate{width:100%;height:48px;background:var(--navy);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:12px;}
.btn-generate:active{opacity:0.85;}
.btn-generate:disabled{opacity:0.4;cursor:not-allowed;}

/* プレビュー全画面 */
.preview-screen{display:none;position:fixed;inset:0;z-index:200;background:var(--navy);flex-direction:column;}
.preview-screen.show{display:flex;}
.preview-header{background:var(--navy);padding:10px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.preview-body{flex:1;background:#fff;overflow-y:auto;padding:14px 12px;}
.preview-footer{background:rgba(30,45,64,0.95);padding:10px 14px;display:flex;gap:10px;flex-shrink:0;}
.btn-preview-back{flex:1;height:44px;background:transparent;border:1.5px solid rgba(255,255,255,0.3);border-radius:10px;color:#fff;font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.btn-preview-done{flex:2;height:44px;background:var(--accent);border:none;border-radius:10px;color:var(--navy);font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}

/* プレビュー内容 */
.preview-doc-title{font-size:14px;font-weight:700;color:#1e2d40;text-align:center;padding:8px 0 10px;border-bottom:2px solid #1e2d40;margin-bottom:12px;}
.preview-photo-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.preview-photo-single{margin-bottom:10px;}
.preview-photo-box{display:flex;flex-direction:column;gap:4px;}
.preview-phase-label{font-size:10px;font-weight:700;text-align:center;padding:3px 0;border-radius:4px;}
.preview-img-wrap{aspect-ratio:4/3;background:#f0f0f0;border:1.5px solid #ccc;border-radius:6px;overflow:hidden;}
.preview-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.preview-caption{font-size:9px;color:#555;text-align:center;}
.preview-footer-text{font-size:10px;color:#888;text-align:center;padding-top:8px;border-top:1px solid #eee;margin-top:4px;}

/* モーダル共通 */
.modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.5);align-items:flex-end;justify-content:center;}
.modal.show{display:flex;}
.modal-panel{background:var(--white);width:100%;max-width:480px;border-radius:16px 16px 0 0;padding:20px 16px 40px;max-height:92dvh;overflow-y:auto;}
.modal-panel h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;}
.form-label{font-size:11px;font-weight:500;color:var(--text2);margin:12px 0 4px;display:block;}
.form-input{width:100%;height:44px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;padding:0 12px;font-size:15px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);outline:none;}
.form-input:focus{border-color:var(--navy);}
.form-textarea{width:100%;min-height:68px;border:1.5px solid rgba(30,45,64,0.2);border-radius:10px;padding:10px 12px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);outline:none;resize:none;line-height:1.5;}
.form-textarea:focus{border-color:var(--navy);}
.preview-wrap{width:100%;aspect-ratio:4/3;background:#e8e5df;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
.preview-wrap img{width:100%;height:100%;object-fit:cover;}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.btn-cancel{flex:1;height:44px;border:2px solid rgba(30,45,64,0.2);background:transparent;border-radius:10px;font-size:15px;font-family:'Noto Sans JP',sans-serif;color:var(--text2);cursor:pointer;}
.btn-ok{flex:2;height:44px;border:none;background:var(--navy);border-radius:10px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:var(--white);cursor:pointer;}
.btn-danger{background:#c03232;color:#fff;border:none;border-radius:10px;height:44px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;padding:0 16px;}

/* 詳細モーダル */
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(30,45,64,0.08);}
.detail-label{font-size:11px;color:var(--text2);}
.detail-val{font-size:13px;font-weight:500;color:var(--text);}
.detail-actions{display:flex;gap:8px;margin-top:14px;}
.tag{display:inline-flex;align-items:center;height:18px;padding:0 7px;border-radius:10px;font-size:10px;font-weight:700;}
.tag-before{background:rgba(26,111,196,0.85);color:#fff;}
.tag-after{background:rgba(32,128,64,0.85);color:#fff;}

/* 選択枚数バッジ */
.sel-badge{background:var(--accent);color:var(--navy);border-radius:10px;font-size:10px;font-weight:700;padding:2px 7px;margin-left:6px;}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">
  <button class="btn-icon" onclick="history.back()">←</button>
  <div class="header-title">現場写真</div>
  <button class="btn-icon" style="font-size:12px;color:var(--accent);" onclick="openAnkenMgr()">案件</button>
</div>

<div class="anken-bar">
  <select class="anken-select" id="ankenSelect" onchange="onAnkenChange()">
    <option value="">── 案件を選択 ──</option>
  </select>
  <button class="btn-sm" onclick="openAddAnken()">＋案件</button>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tabPhoto" onclick="switchTab('photo')">📷 写真</button>
  <button class="tab-btn" id="tabDoc" onclick="switchTab('doc')">📋 書類</button>
</div>

<!-- 写真タブ -->
<div class="scroll-area" id="panelPhoto">
  <div id="photoEmptyState" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text2);">
    <div style="width:60px;height:60px;border-radius:50%;background:rgba(30,45,64,0.06);display:flex;align-items:center;justify-content:center;">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="6" width="24" height="18" rx="3" stroke="#5a6a7a" stroke-width="1.5" fill="none"/>
        <circle cx="14" cy="15" r="5" stroke="#5a6a7a" stroke-width="1.5" fill="none"/>
        <path d="M10 6 L12 3 L16 3 L18 6" stroke="#5a6a7a" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
      </svg>
    </div>
    <div id="photoEmptyText" style="font-size:13px;text-align:center;line-height:1.6;">案件を選択して<br>写真を追加してください</div>
  </div>

  <div id="photoColumns" style="display:none;">
    <div class="photo-columns">
      <div>
        <div class="col-header col-header-before">施工前</div>
        <div class="photo-col" id="colBefore"></div>
      </div>
      <div>
        <div class="col-header col-header-after">施工後</div>
        <div class="photo-col" id="colAfter"></div>
      </div>
    </div>
  </div>
</div>

<!-- 書類タブ -->
<div class="scroll-area" id="panelDoc" style="display:none;">
  <div class="doc-section">
    <div class="doc-section-title">使用する写真を選ぶ <span id="selCountBadge" class="sel-badge" style="display:none;"></span></div>
    <div id="docPhotoGrid" class="photo-select-grid"></div>
    <div id="docPhotoEmpty" style="font-size:12px;color:var(--text2);text-align:center;padding:20px 0;display:none;">写真がありません。先に写真タブで追加してください。</div>
  </div>

  <div class="doc-section">
    <div class="doc-section-title">書類の種類を選ぶ</div>
    <div class="doc-type-list">
      <button class="doc-type-btn" onclick="selectDocType('survey',this)">
        <div class="doc-type-icon" style="background:#fff3e0;">🔍</div>
        調査報告書
      </button>
      <button class="doc-type-btn" onclick="selectDocType('completion',this)">
        <div class="doc-type-icon" style="background:#e8f5ec;">✅</div>
        工事完了報告書
      </button>
      <button class="doc-type-btn" onclick="selectDocType('photos',this)">
        <div class="doc-type-icon" style="background:#e8f0ff;">📸</div>
        工事完成写真台帳
      </button>
    </div>
  </div>

  <button class="btn-generate" id="btnGenerate" onclick="openPreview()" disabled>
    📋 Claudeに渡すレイアウトを生成
  </button>
</div>

<!-- FABボタン -->
<div class="fab-wrap" id="fabWrap" style="display:none;">
  <button class="fab fab-before" onclick="openCamera('before')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="4" width="14" height="10" rx="2" stroke="white" stroke-width="1.3" fill="none"/>
      <circle cx="8" cy="9" r="3" stroke="white" stroke-width="1.3" fill="none"/>
      <path d="M5.5 4 L6.5 2 L9.5 2 L10.5 4" stroke="white" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
    </svg>
    ＋施工前
  </button>
  <button class="fab fab-after" onclick="openCamera('after')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="4" width="14" height="10" rx="2" stroke="white" stroke-width="1.3" fill="none"/>
      <circle cx="8" cy="9" r="3" stroke="white" stroke-width="1.3" fill="none"/>
      <path d="M5.5 4 L6.5 2 L9.5 2 L10.5 4" stroke="white" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
    </svg>
    ＋施工後
  </button>
</div>

<!-- ファイル入力（カメラ・ギャラリー） -->
<input type="file" id="filePicker" accept="image/*" style="display:none;" onchange="onFileSelected(this)">

<!-- 写真追加モーダル -->
<div class="modal" id="addModal">
  <div class="modal-panel">
    <h3 id="addModalTitle">写真を追加（施工前）</h3>
    <div class="preview-wrap" id="addPreviewWrap">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" opacity="0.25">
        <rect x="3" y="8" width="34" height="26" rx="4" stroke="#1e2d40" stroke-width="2" fill="none"/>
        <circle cx="20" cy="21" r="7" stroke="#1e2d40" stroke-width="2" fill="none"/>
        <path d="M14 8 L17 4 L23 4 L26 8" stroke="#1e2d40" stroke-width="2" fill="none" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="form-label">場所メモ</span>
    <input type="text" class="form-input" id="addPlace" placeholder="例：1階廊下、和室6畳">
    <span class="form-label">コメント</span>
    <textarea class="form-textarea" id="addComment" placeholder="気になる点・メモ等"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">キャンセル</button>
      <button class="btn-ok" onclick="savePhoto()">保存</button>
    </div>
  </div>
</div>

<!-- 案件追加モーダル -->
<div class="modal" id="ankenModal">
  <div class="modal-panel">
    <h3>案件を追加</h3>
    <span class="form-label">案件名</span>
    <input type="text" class="form-input" id="ankenName" placeholder="例：さくら苑 床リフォーム">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAnkenModal()">キャンセル</button>
      <button class="btn-ok" onclick="confirmAddAnken()">追加</button>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal" id="detailModal">
  <div class="modal-panel">
    <h3 id="detailTitle">写真詳細</h3>
    <div id="detailImgWrap" style="margin-bottom:12px;"></div>
    <div class="detail-row">
      <span class="detail-label">番号</span><span class="detail-val" id="detailNum"></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">案件</span><span class="detail-val" id="detailAnken"></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">場所</span><span class="detail-val" id="detailPlace"></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">区分</span><span class="detail-val" id="detailPhase"></span>
    </div>
    <div class="detail-row" style="border:none;">
      <span class="detail-label">コメント</span>
      <span class="detail-val" id="detailComment" style="max-width:65%;text-align:right;"></span>
    </div>
    <div class="detail-actions">
      <button class="btn-ok" style="flex:2;" onclick="downloadPhoto()">📥 端末に保存</button>
      <button class="btn-danger" onclick="deletePhoto()">削除</button>
      <button class="btn-cancel" style="flex:1;" onclick="closeDetailModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- プレビュー全画面 -->
<div class="preview-screen" id="previewScreen">
  <div class="preview-header">
    <button onclick="closePreview()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0;line-height:1;">←</button>
    <span style="color:#fff;font-size:13px;font-weight:700;flex:1;" id="previewTitle">プレビュー</span>
    <span style="color:var(--accent);font-size:11px;font-weight:700;">📸 スクショ→Claudeへ</span>
  </div>
  <div class="preview-body" id="previewBody"></div>
  <div class="preview-footer">
    <button class="btn-preview-back" onclick="closePreview()">← 選び直す</button>
    <button class="btn-preview-done" onclick="closePreview()">✅ スクショ撮った！完了</button>
  </div>
</div>

<script>
// ── データ管理 ──
function loadData(key,def){try{const d=localStorage.getItem(key);return d?JSON.parse(d):def;}catch(e){return def;}}
function saveData(key,val){localStorage.setItem(key,JSON.stringify(val));}

let ankenList = loadData('arAnken',['さくら苑 床リフォーム']);
let photos = loadData('arPhotos',[]);
let currentAnken = '';
let currentTab = 'photo';
let pendingPhase = 'before';
let pendingDataURL = null;
let detailId = null;
let selectedDocPhotos = new Set();
let selectedDocType = null;

// 全体通し番号を取得（photos配列内のインデックス+1）
function getPhotoNum(id){
  const idx = photos.findIndex(p=>p.id===id);
  return idx>=0 ? idx+1 : '?';
}

// ── タブ切り替え ──
function switchTab(tab){
  currentTab = tab;
  document.getElementById('tabPhoto').classList.toggle('active', tab==='photo');
  document.getElementById('tabDoc').classList.toggle('active', tab==='doc');
  document.getElementById('panelPhoto').style.display = tab==='photo'?'block':'none';
  document.getElementById('panelDoc').style.display = tab==='doc'?'block':'none';
  document.getElementById('fabWrap').style.display = (tab==='photo' && currentAnken) ? 'flex' : 'none';
  if(tab==='doc') renderDocPhotoGrid();
}

// ── 案件 ──
function buildAnkenSelect(){
  const sel = document.getElementById('ankenSelect');
  const cur = currentAnken;
  sel.innerHTML = '<option value="">── 案件を選択 ──</option>';
  ankenList.forEach(a=>{
    const o = document.createElement('option');
    o.value=a; o.textContent=a;
    if(a===cur) o.selected=true;
    sel.appendChild(o);
  });
}
function onAnkenChange(){
  currentAnken = document.getElementById('ankenSelect').value;
  selectedDocPhotos.clear();
  renderPhotos();
  renderDocPhotoGrid();
  document.getElementById('fabWrap').style.display = (currentTab==='photo' && currentAnken) ? 'flex' : 'none';
}
function openAddAnken(){
  document.getElementById('ankenName').value='';
  document.getElementById('ankenModal').classList.add('show');
  setTimeout(()=>document.getElementById('ankenName').focus(),100);
}
function closeAnkenModal(){document.getElementById('ankenModal').classList.remove('show');}
function confirmAddAnken(){
  const name = document.getElementById('ankenName').value.trim();
  if(!name){closeAnkenModal();return;}
  if(!ankenList.includes(name)) ankenList.push(name);
  saveData('arAnken',ankenList);
  currentAnken = name;
  buildAnkenSelect();
  closeAnkenModal();
  renderPhotos();
  document.getElementById('fabWrap').style.display = (currentTab==='photo' && currentAnken) ? 'flex' : 'none';
}
document.getElementById('ankenName').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddAnken();});
function openAnkenMgr(){
  const list = ankenList.map((a,i)=>`${i+1}. ${a}`).join('\n');
  alert(ankenList.length?`登録案件：\n${list}`:'案件が登録されていません');
}

// ── 写真レンダリング ──
function renderPhotos(){
  const ankenPhotos = photos.filter(p=>!currentAnken||p.anken===currentAnken);
  const before = ankenPhotos.filter(p=>p.phase==='before');
  const after  = ankenPhotos.filter(p=>p.phase==='after');

  const empty = document.getElementById('photoEmptyState');
  const cols  = document.getElementById('photoColumns');

  if(!currentAnken){
    empty.style.display='flex';
    cols.style.display='none';
    document.getElementById('photoEmptyText').innerHTML='案件を選択して<br>写真を追加してください';
    return;
  }
  if(ankenPhotos.length===0){
    empty.style.display='flex';
    cols.style.display='none';
    document.getElementById('photoEmptyText').innerHTML='写真がありません<br>下のボタンから追加してください';
    return;
  }
  empty.style.display='none';
  cols.style.display='block';

  renderCol('colBefore', before);
  renderCol('colAfter',  after);
}

function renderCol(colId, photoList){
  const col = document.getElementById(colId);
  col.innerHTML='';
  if(photoList.length===0){
    const empty = document.createElement('div');
    empty.className='empty-col';
    empty.textContent='なし';
    col.appendChild(empty);
    return;
  }
  photoList.forEach(p=>{
    const num = getPhotoNum(p.id);
    const card = document.createElement('div');
    card.className='photo-card';
    card.onclick=()=>openDetail(p.id);
    card.innerHTML=`
      <div class="photo-num">⑩`.replace('⑩',num<=20?['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'][num-1]:num)+`</div>
      <div class="photo-thumb-wrap">
        ${p.dataURL?`<img class="photo-thumb" src="${p.dataURL}" loading="lazy">`:''}
      </div>
      <div class="photo-info">
        <div class="photo-place">${p.place||'場所未記入'}</div>
        <div class="photo-date">${p.date}</div>
      </div>`;
    col.appendChild(card);
  });
}

// ── FAB・写真追加 ──
function openCamera(phase){
  if(!currentAnken){alert('先に案件を選択してください');return;}
  pendingPhase = phase;
  document.getElementById('addModalTitle').textContent = `写真を追加（${phase==='before'?'施工前':'施工後'}）`;
  document.getElementById('filePicker').value='';
  document.getElementById('filePicker').click();
}
document.getElementById('filePicker').onchange = function(){ onFileSelected(this); };

function onFileSelected(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    pendingDataURL = e.target.result;
    document.getElementById('addPreviewWrap').innerHTML=`<img src="${pendingDataURL}" style="width:100%;height:100%;object-fit:cover;">`;
    document.getElementById('addPlace').value='';
    document.getElementById('addComment').value='';
    document.getElementById('addModal').classList.add('show');
    setTimeout(()=>document.getElementById('addPlace').focus(),300);
  };
  reader.readAsDataURL(file);
}
function closeAddModal(){
  document.getElementById('addModal').classList.remove('show');
  pendingDataURL=null;
}
function savePhoto(){
  if(!pendingDataURL){alert('写真が選択されていません');return;}
  const place   = document.getElementById('addPlace').value.trim();
  const comment = document.getElementById('addComment').value.trim();
  const now     = new Date();
  const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  const id      = Date.now().toString();

  // 端末に自動保存
  const link = document.createElement('a');
  const phaseLabel = pendingPhase==='before'?'施工前':'施工後';
  link.download = `${currentAnken}_${place||phaseLabel}_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.jpg`;
  link.href = pendingDataURL;
  link.click();

  // 縮小してlocalStorageに保存
  resizeImage(pendingDataURL,400).then(dataURL=>{
    photos.push({id, anken:currentAnken, place, phase:pendingPhase, comment, date:dateStr, dataURL});
    saveData('arPhotos',photos);
    if(photos.length>100) alert('写真が100枚を超えました。古い写真を削除してください。');
    pendingDataURL=null;
    closeAddModal();
    renderPhotos();
  });
}
function resizeImage(dataURL,maxW){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(1,maxW/img.width);
      const w=img.width*ratio, h=img.height*ratio;
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.75));
    };
    img.src=dataURL;
  });
}

// ── 詳細モーダル ──
function openDetail(id){
  const p = photos.find(x=>x.id===id);
  if(!p) return;
  detailId=id;
  const num = getPhotoNum(id);
  document.getElementById('detailTitle').textContent = p.place||'写真詳細';
  document.getElementById('detailImgWrap').innerHTML = p.dataURL
    ?`<img src="${p.dataURL}" style="width:100%;display:block;max-height:45dvh;object-fit:contain;background:#111;border-radius:10px;">`:'';
  document.getElementById('detailNum').textContent   = `No.${num}`;
  document.getElementById('detailAnken').textContent = p.anken;
  document.getElementById('detailPlace').textContent = p.place||'未記入';
  document.getElementById('detailPhase').innerHTML   = p.phase==='before'
    ?'<span class="tag tag-before">施工前</span>':'<span class="tag tag-after">施工後</span>';
  document.getElementById('detailComment').textContent = p.comment||'—';
  document.getElementById('detailModal').classList.add('show');
}
function closeDetailModal(){document.getElementById('detailModal').classList.remove('show');}
function downloadPhoto(){
  const p=photos.find(x=>x.id===detailId);
  if(!p||!p.dataURL) return;
  const link=document.createElement('a');
  link.download=`${p.anken}_${p.place||p.phase}_${p.date.replace(/\//g,'')}.jpg`;
  link.href=p.dataURL; link.click();
}
function deletePhoto(){
  if(!confirm('この写真を削除しますか？')) return;
  photos=photos.filter(x=>x.id!==detailId);
  saveData('arPhotos',photos);
  closeDetailModal();
  renderPhotos();
  renderDocPhotoGrid();
}

// ── 書類タブ ──
function renderDocPhotoGrid(){
  const grid  = document.getElementById('docPhotoGrid');
  const empty = document.getElementById('docPhotoEmpty');
  const ankenPhotos = currentAnken ? photos.filter(p=>p.anken===currentAnken&&p.dataURL) : photos.filter(p=>p.dataURL);

  if(ankenPhotos.length===0){
    grid.style.display='none';
    empty.style.display='block';
    updateGenerateBtn();
    return;
  }
  grid.style.display='grid';
  empty.style.display='none';
  grid.innerHTML='';

  ankenPhotos.forEach(p=>{
    const num = getPhotoNum(p.id);
    const item = document.createElement('div');
    item.className = 'photo-sel-item' + (selectedDocPhotos.has(p.id)?' selected':'');
    item.onclick = ()=>toggleDocPhoto(p.id, item);
    const circled = num<=20?['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'][num-1]:num;
    item.innerHTML=`
      <img src="${p.dataURL}">
      <div class="photo-sel-num">${circled}</div>
      <div class="photo-sel-check">✓</div>
      <div class="photo-sel-phase ${p.phase==='before'?'phase-before-bar':'phase-after-bar'}">${p.phase==='before'?'前':'後'}</div>`;
    grid.appendChild(item);
  });
  updateGenerateBtn();
}

function toggleDocPhoto(id, el){
  if(selectedDocPhotos.has(id)){
    selectedDocPhotos.delete(id);
    el.classList.remove('selected');
  } else {
    selectedDocPhotos.add(id);
    el.classList.add('selected');
  }
  updateGenerateBtn();
}

function selectDocType(type, btn){
  selectedDocType = type;
  document.querySelectorAll('.doc-type-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  updateGenerateBtn();
}

function updateGenerateBtn(){
  const btn   = document.getElementById('btnGenerate');
  const badge = document.getElementById('selCountBadge');
  const cnt   = selectedDocPhotos.size;
  if(cnt>0){
    badge.style.display='inline';
    badge.textContent=`${cnt}枚選択中`;
  } else {
    badge.style.display='none';
  }
  btn.disabled = !(cnt>0 && selectedDocType);
}

// ── プレビュー生成 ──
const docTypeLabel = {survey:'調査報告書', completion:'工事完了報告書', photos:'工事完成写真台帳'};

function openPreview(){
  if(selectedDocPhotos.size===0 || !selectedDocType) return;

  const selPhotos = photos.filter(p=>selectedDocPhotos.has(p.id));
  const label = docTypeLabel[selectedDocType]||'';
  const ankenName = currentAnken||'';

  // プレビュー本文を生成
  let html = `<div class="preview-doc-title">${label}　${ankenName}</div>`;

  if(selectedDocType==='photos'){
    // 完成写真台帳：2枚ずつペアで横並び
    for(let i=0;i<selPhotos.length;i+=2){
      const p1 = selPhotos[i];
      const p2 = selPhotos[i+1];
      const num1 = getPhotoNum(p1.id);
      const num2 = p2 ? getPhotoNum(p2.id) : null;
      const circ = n => n<=20?['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'][n-1]:n;
      html += `<div class="preview-photo-pair">
        <div class="preview-photo-box">
          <div style="font-size:10px;font-weight:700;text-align:center;color:#555;margin-bottom:3px;">${circ(num1)} ${p1.place||''}</div>
          <div class="preview-img-wrap"><img src="${p1.dataURL}"></div>
          <div class="preview-caption">${p1.phase==='before'?'施工前':'施工後'}</div>
        </div>
        ${p2?`<div class="preview-photo-box">
          <div style="font-size:10px;font-weight:700;text-align:center;color:#555;margin-bottom:3px;">${circ(num2)} ${p2.place||''}</div>
          <div class="preview-img-wrap"><img src="${p2.dataURL}"></div>
          <div class="preview-caption">${p2.phase==='before'?'施工前':'施工後'}</div>
        </div>`:'<div></div>'}
      </div>`;
    }
  } else {
    // 調査報告書・完了報告書：施工前後ペアで並べる
    const before = selPhotos.filter(p=>p.phase==='before');
    const after  = selPhotos.filter(p=>p.phase==='after');
    const maxLen = Math.max(before.length, after.length);
    const circ = n => n<=20?['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'][n-1]:n;

    for(let i=0;i<maxLen;i++){
      const pb = before[i];
      const pa = after[i];
      html += `<div class="preview-photo-pair">
        <div class="preview-photo-box">
          <div class="preview-phase-label" style="background:#e8f0ff;color:#1a6fc4;">施工前</div>
          ${pb?`<div class="preview-img-wrap"><img src="${pb.dataURL}"></div>
          <div class="preview-caption">${circ(getPhotoNum(pb.id))} ${pb.place||''}</div>`
          :`<div class="preview-img-wrap" style="display:flex;align-items:center;justify-content:center;"><span style="font-size:11px;color:#aaa;">未選択</span></div><div class="preview-caption"></div>`}
        </div>
        <div class="preview-photo-box">
          <div class="preview-phase-label" style="background:#e8f5ec;color:#208040;">施工後</div>
          ${pa?`<div class="preview-img-wrap"><img src="${pa.dataURL}"></div>
          <div class="preview-caption">${circ(getPhotoNum(pa.id))} ${pa.place||''}</div>`
          :`<div class="preview-img-wrap" style="display:flex;align-items:center;justify-content:center;"><span style="font-size:11px;color:#aaa;">未選択</span></div><div class="preview-caption"></div>`}
        </div>
      </div>`;
    }
  }

  html += `<div class="preview-footer-text">株式会社アート・レイズ　担当：亀井 悟</div>`;

  document.getElementById('previewBody').innerHTML = html;
  document.getElementById('previewTitle').textContent = label;
  document.getElementById('previewScreen').classList.add('show');
}

function closePreview(){
  document.getElementById('previewScreen').classList.remove('show');
}

// ── 初期化 ──
buildAnkenSelect();
renderPhotos();
</script>
