<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AIアシスト｜アート・レイズ</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AIアシスト">
<meta name="theme-color" content="#1e2d40">
<link rel="stylesheet" href="common.css">
<style>
/* html/bodyを画面に固定（iOS Safariのアドレスバー出入りでも下段が見切れない） */
html{height:100%;}
body{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  height:100%;          /* fallback */
  height:100svh;         /* small viewport（ブラウザchrome展開時でも安定）*/
  overflow:hidden;
  background:var(--bg);
}

/* ヘッダー右側の小ボタン */
.hdr-iconbtn{
  width:38px;height:38px;border:none;border-radius:var(--radius-md);
  background:rgba(255,255,255,0.08);color:#fff;cursor:pointer;
  font-family:inherit;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.hdr-iconbtn:active{background:rgba(255,255,255,0.22);}

/* スキルボタン横スクロール */
.ai-skills{
  display:flex;gap:6px;padding:8px 10px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  background:#eeebe5;
  border-bottom:1px solid rgba(30,45,64,0.08);
  flex-shrink:0;scrollbar-width:none;
}
.ai-skills::-webkit-scrollbar{height:0;display:none;}
.ai-skill{
  flex-shrink:0;height:40px;padding:0 12px;
  border:1px solid rgba(30,45,64,0.15);
  background:#fff;border-radius:var(--radius-md);
  font-size:12px;font-weight:600;color:var(--text);
  font-family:inherit;cursor:pointer;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.ai-skill:active{background:rgba(200,169,110,0.15);}
.ai-skill svg{flex-shrink:0;color:var(--navy);}

/* モデル選択（スキルバー先頭に固定表示） */
.ai-model-sel{
  flex-shrink:0;height:40px;position:sticky;left:0;z-index:2;
  border:1px solid rgba(30,45,64,0.18);
  background:var(--navy);color:#fff;border-radius:var(--radius-md);
  font-size:12px;font-weight:700;font-family:inherit;
  padding:0 26px 0 10px;cursor:pointer;outline:none;
  -webkit-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23fff' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 9px center;
}

/* チャット領域 */
.ai-messages{
  flex:1 1 0;min-height:0;          /* min-height:0 がないとflex子要素が内容で居座って下段を押し出す */
  overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  background:#fff;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;       /* メッセージ内のスクロールを画面スクロールに伝播させない */
}
.ai-msg{
  max-width:88%;padding:10px 14px;border-radius:14px;
  font-size:13.5px;line-height:1.65;word-wrap:break-word;
}
.ai-msg-user{
  align-self:flex-end;background:var(--navy);color:#fff;
  border-radius:14px 14px 4px 14px;white-space:pre-wrap;
}
.ai-msg-ai{
  align-self:flex-start;background:#eeebe5;color:var(--text);
  border-radius:14px 14px 14px 4px;
}
.ai-msg-system{
  align-self:center;background:rgba(200,169,110,0.15);
  color:var(--text2);font-size:11.5px;padding:6px 12px;
  border-radius:var(--radius-sm);text-align:center;
}
.ai-msg-error{
  align-self:flex-start;background:#ffe9e3;color:#a04040;
  border:1px solid rgba(160,64,64,0.25);
  border-radius:var(--radius-sm);font-size:12.5px;white-space:pre-wrap;
}
.ai-msg pre{
  background:rgba(0,0,0,0.06);padding:8px;border-radius:6px;
  font-size:11.5px;overflow-x:auto;white-space:pre-wrap;
  font-family:'Consolas','Courier New',monospace;margin:4px 0;
}
.ai-msg code{
  background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:4px;
  font-size:12px;font-family:'Consolas','Courier New',monospace;
}
.ai-msg h1{font-size:15px;margin:6px 0 4px;font-weight:700;}
.ai-msg h2{font-size:14px;margin:6px 0 4px;font-weight:700;}
.ai-msg h3{font-size:13px;margin:5px 0 3px;font-weight:700;}
.ai-msg ul,.ai-msg ol{padding-left:20px;margin:4px 0;}
.ai-msg li{margin:2px 0;}
.ai-msg-ai strong{color:var(--navy);}
.ai-msg table{border-collapse:collapse;margin:6px 0;font-size:12px;}
.ai-msg th,.ai-msg td{border:1px solid rgba(30,45,64,0.2);padding:4px 8px;}
.ai-msg th{background:rgba(30,45,64,0.08);font-weight:700;}
.ai-typing{color:var(--text2);letter-spacing:2px;}
.ai-typing span{display:inline-block;animation:ai-bounce 1.4s infinite;}
.ai-typing span:nth-child(2){animation-delay:.2s;}
.ai-typing span:nth-child(3){animation-delay:.4s;}
@keyframes ai-bounce{0%,80%,100%{opacity:.3;transform:translateY(0);}40%{opacity:1;transform:translateY(-3px);}}

/* 入力エリア */
.ai-input{
  display:flex;gap:8px;padding:10px;
  background:#f5f2ec;
  border-top:1px solid rgba(30,45,64,0.1);
  flex-shrink:0;
  padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
}
.ai-input textarea{
  flex:1;resize:none;
  border:1.5px solid rgba(30,45,64,0.18);
  border-radius:var(--radius-md);padding:10px 12px;
  font-size:14.5px;font-family:inherit;
  background:#fff;outline:none;color:var(--text);
  min-height:48px;max-height:140px;line-height:1.5;
}
.ai-input textarea:focus{border-color:var(--accent);}
.ai-send{
  width:72px;border:none;border-radius:var(--radius-md);
  background:var(--accent);color:var(--navy);
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;flex-shrink:0;
}
.ai-send:active{background:#b89a5e;}
.ai-send:disabled{opacity:.5;cursor:not-allowed;}

/* 履歴モーダル */
.ai-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(10,20,35,0.6);
  display:none;align-items:center;justify-content:center;
  padding:20px;
  padding-top:calc(20px + env(safe-area-inset-top,0px));
  padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));
}
.ai-modal.open{display:flex;}
.ai-modal-box{
  background:#fff;border-radius:var(--radius-xl);
  width:100%;max-width:520px;max-height:100%;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:var(--shadow-modal);
}
.ai-modal-head{
  display:flex;align-items:center;gap:8px;
  padding:12px 14px;background:#f5f2ec;
  border-bottom:1px solid rgba(30,45,64,0.1);
  flex-shrink:0;
}
.ai-modal-title{flex:1;font-size:14px;font-weight:700;color:var(--text);}
.ai-modal-close{
  width:34px;height:34px;border:none;border-radius:var(--radius-sm);
  background:transparent;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit;
}
.ai-modal-close:active{background:rgba(30,45,64,0.08);}
.ai-modal-body{
  flex:1 1 0;min-height:0;overflow-y:auto;
  padding:10px 12px 12px;-webkit-overflow-scrolling:touch;
}
.ai-new-btn{
  width:100%;height:46px;
  border:1.5px dashed rgba(30,45,64,0.25);
  background:transparent;border-radius:var(--radius-md);
  color:var(--navy);font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;margin:4px 0 12px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.ai-new-btn:active{background:rgba(200,169,110,0.1);border-color:var(--accent);}
.ai-hist-item{
  display:flex;align-items:stretch;
  border:1px solid rgba(30,45,64,0.1);
  border-radius:var(--radius-md);
  background:#fff;margin-bottom:6px;overflow:hidden;
}
.ai-hist-body{
  flex:1;padding:10px 12px;cursor:pointer;min-width:0;
  background:transparent;border:none;text-align:left;
  font-family:inherit;color:var(--text);
}
.ai-hist-body:active{background:rgba(200,169,110,0.1);}
.ai-hist-title{
  font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.4;
}
.ai-hist-meta{
  font-size:11px;color:var(--text2);margin-top:3px;
}
.ai-hist-del{
  width:46px;border:none;background:transparent;
  color:var(--text2);font-size:22px;cursor:pointer;
  border-left:1px solid rgba(30,45,64,0.08);
  flex-shrink:0;font-family:inherit;
}
.ai-hist-del:active{background:rgba(192,57,43,0.12);color:#c0392b;}
.ai-hist-empty{
  text-align:center;padding:36px 20px;
  color:var(--text2);font-size:13px;line-height:1.6;
}

/* 印刷時 */
@media print{
  body{position:static;height:auto;overflow:visible;background:#fff;}
  .app-header,.ai-skills,.ai-input,.ai-modal{display:none!important;}
  .ai-messages{overflow:visible;height:auto;}
}
</style>
</head>

<script>
function goBack(){
  if(document.referrer && document.referrer.indexOf(location.host) >= 0){
    history.back();
  }else{
    location.href = 'index.html';
  }
}

/* ====== AIアシスト ====== */
(function(){
  var ANTHROPIC_URL = 'https://api.anthropic.com/v1/messages';
  var STORAGE_KEY = 'ANTHROPIC_API_KEY';
  var MODEL_KEY   = 'ai_assist_model';          // 選択中のモデル
  var CURRENT_KEY = 'ai_assist_current_chat';   // 自動保存中の会話
  var SAVED_KEY   = 'ai_assist_saved_chats';    // ユーザーが名前を付けて保存した会話リスト
  var MAX_SAVED   = 50;                          // 保存リスト最大件数

  // 選択可能なモデル（旧 claude-sonnet-4-20250514 は 2026-06-15 退役→404 のため廃止）
  var MODELS = [
    { id: 'claude-opus-4-8',   label: 'Opus 4.8（高精度）' },
    { id: 'claude-sonnet-4-6', label: 'Sonnet 4.6（高速・低コスト）' }
  ];
  var DEFAULT_MODEL = 'claude-opus-4-8';
  function getModel(){
    var m = (localStorage.getItem(MODEL_KEY) || '').trim();

  function getKey(){ return (localStorage.getItem(STORAGE_KEY)||'').trim(); }
  function setKey(k){ localStorage.setItem(STORAGE_KEY, (k||'').trim()); }

  // ─── 永続化（現在の会話） ───
  function persistCurrent(){
    try{
      if(aiHistory.length === 0){
        localStorage.removeItem(CURRENT_KEY);
      }else{
        localStorage.setItem(CURRENT_KEY, JSON.stringify({
          messages: aiHistory,
          updatedAt: new Date().toISOString()
        }));
      }
    }catch(e){
      console.warn('永続化失敗:', e);
    }
  }

  function restoreCurrent(){
    try{
      var raw = localStorage.getItem(CURRENT_KEY);
      if(!raw) return false;
      var data = JSON.parse(raw);
      if(!data || !Array.isArray(data.messages) || data.messages.length === 0) return false;
      aiHistory = data.messages;
      var box = document.getElementById('ai-messages');
      box.innerHTML = '';
      aiHistory.forEach(function(m){
        appendMsg(m.role === 'user' ? 'user' : 'ai', m.content);
      });
      var when = data.updatedAt ? fmtDateTime(data.updatedAt) : '';
      appendMsg('system', '前回の会話を復元しました（' + aiHistory.length + '件 ' + when + '）');
      return true;
    }catch(e){
      console.warn('復元失敗:', e);
      return false;
    }
  }

  // ─── 保存済み会話の管理 ───
  function getSavedList(){
    try{
      var raw = localStorage.getItem(SAVED_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){
      return [];
    }
  }
  function setSavedList(list){
    try{
      localStorage.setItem(SAVED_KEY, JSON.stringify(list));
    }catch(e){
      alert('保存に失敗しました。localStorage容量超過の可能性があります。\n古い会話を削除してください。');
    }
  }

  function fmtDateTime(iso){
    try{
      var d = new Date(iso);
      return (d.getMonth()+1) + '/' + d.getDate() + ' ' +
             ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
    }catch(e){ return ''; }
  }

  function escapeHtml(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  window.aiPromptKey = function(){
    var cur = getKey();
    var masked = cur ? cur.slice(0,8)+'…'+cur.slice(-4) : '(未設定)';
    var key = prompt('Anthropic API キーを入力してください（sk-ant-…）\n現在: '+masked, cur);
    if(key === null) return false;
    setKey(key);
    if(key.trim()){ appendMsg('system', 'APIキーを保存しました。'); }
    else { appendMsg('system', 'APIキーを削除しました。'); }
    return !!key.trim();
  };

  // ─── この会話を保存 ───
  window.aiSaveCurrent = function(){
    if(aiHistory.length === 0){
      alert('保存する会話がありません。');
      return;
    }
    var firstUser = null;
    for(var i=0; i<aiHistory.length; i++){
      if(aiHistory[i].role === 'user'){ firstUser = aiHistory[i]; break; }
    }
    var defTitle = firstUser ? firstUser.content.replace(/\s+/g,' ').trim().slice(0,40) : '会話';
    var title = prompt('保存するタイトル', defTitle);
    if(title === null) return;
    title = (title || defTitle).trim() || defTitle;

    var list = getSavedList();
    list.unshift({
      id: 'c'+Date.now()+Math.random().toString(36).slice(2,6),
      title: title,
      savedAt: new Date().toISOString(),
      messages: aiHistory.slice()
    });
    if(list.length > MAX_SAVED) list = list.slice(0, MAX_SAVED);
    setSavedList(list);
    appendMsg('system', '💾 「' + title + '」を保存しました（合計 ' + list.length + ' 件）');
  };

  window.aiLoadChat = function(id){
    var list = getSavedList();
    var c = null;
    for(var i=0; i<list.length; i++){ if(list[i].id === id){ c = list[i]; break; } }
    if(!c) return;
    if(aiHistory.length > 0 && !confirm('現在の会話を置き換えて読み込みますか？\n（未保存の場合は失われます）')) return;
    aiHistory = (c.messages || []).slice();
    var box = document.getElementById('ai-messages');
    box.innerHTML = '';
    aiHistory.forEach(function(m){
      appendMsg(m.role === 'user' ? 'user' : 'ai', m.content);
    });
    appendMsg('system', '読み込みました：' + c.title);
    persistCurrent();
    window.aiCloseHistory();
  };

    var list = getSavedList().filter(function(c){ return c.id !== id; });

  async function loadData(force){
    if(aiDataCache && !force) return aiDataCache;
    try{
      var res = await fetch('data.json', {cache:'no-store'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      aiDataCache = await res.json();
    }catch(e){
      return null;
    }
    // genka.json（原価明細）は任意。取得できなくても続行する。
    try{
      var gres = await fetch('genka.json', {cache:'no-store'});
      aiGenkaCache = gres.ok ? await gres.json() : null;
    }catch(e){
      aiGenkaCache = null;
    }
    return aiDataCache;
  }

  function appendMsg(role, text, asLoading){
    var box = document.getElementById('ai-messages');
    var id  = 'aim-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
    var cls = role==='user'   ? 'ai-msg ai-msg-user'
            : role==='system' ? 'ai-msg ai-msg-system'
            : role==='error'  ? 'ai-msg ai-msg-error'
            :                   'ai-msg ai-msg-ai';
    var div = document.createElement('div');
    div.className = cls;
    div.id = id;

      div.innerHTML = '<span class="ai-typing"><span>●</span><span>●</span><span>●</span></span>';

  function renderMd(text){
    if(text == null) return '';
    var s = String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s = s.replace(/```([a-zA-Z0-9]*)\n?([\s\S]*?)```/g, function(_, lang, code){
      return '<pre>'+code.replace(/\n/g,'NL')+'</pre>';
    });
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>')
         .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
         .replace(/^# (.+)$/gm,   '<h1>$1</h1>');
    s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    s = s.replace(/(^\|.+\|\n\|[\s\-:|]+\|\n(?:\|.+\|\n?)+)/gm, function(block){
      var lines = block.trim().split('\n');
      var head = lines[0].split('|').slice(1,-1).map(function(c){return '<th>'+c.trim()+'</th>';}).join('');
      var body = lines.slice(2).map(function(line){
        var cells = line.split('|').slice(1,-1).map(function(c){return '<td>'+c.trim()+'</td>';}).join('');
        return '<tr>'+cells+'</tr>';
      }).join('');
      return '<table><thead><tr>'+head+'</tr></thead><tbody>'+body+'</tbody></table>';
    });
    s = s.replace(/(^[-*] .+(?:\n[-*] .+)*)/gm, function(block){
      var items = block.split('\n').map(function(l){return '<li>'+l.replace(/^[-*] /,'')+'</li>';}).join('');
      return '<ul>'+items+'</ul>';
    });
    s = s.replace(/(^\d+\. .+(?:\n\d+\. .+)*)/gm, function(block){
      var items = block.split('\n').map(function(l){return '<li>'+l.replace(/^\d+\. /,'')+'</li>';}).join('');
      return '<ol>'+items+'</ol>';
    });
    var parts = s.split(/(<pre>[\s\S]*?<\/pre>|<table>[\s\S]*?<\/table>|<ul>[\s\S]*?<\/ul>|<ol>[\s\S]*?<\/ol>|<h[1-3]>[\s\S]*?<\/h[1-3]>)/);
    s = parts.map(function(p){
      if(/^<(pre|table|ul|ol|h[1-3])/.test(p)) return p;
      return p.replace(/\n/g,'<br>');
    }).join('');
    s = s.replace(/NL/g, '\n');
    s = s.replace(/(<\/(?:h[1-3]|ul|ol|pre|table)>)<br>/g, '$1');
    return s;
  }

  window.aiSend = async function(){
    var ta = document.getElementById('ai-input-text');
    var text = (ta.value || '').trim();
    if(!text) return;

    var key = getKey();
    if(!key){
      if(!window.aiPromptKey()) return;
      key = getKey();
      if(!key) return;
    }

    appendMsg('user', text);
    ta.value = '';
    ta.style.height='auto';
    aiHistory.push({role:'user', content:text});
    persistCurrent();   // ユーザー発言の時点で保存（API失敗でも残せる）

    var data = await loadData(false);
    if(!data){
      appendMsg('error', 'data.jsonを読み込めませんでした。GitHub Pages配下から開いていますか？');
      aiHistory.pop();
      persistCurrent();
      return;
    }

    var sysPrompt = buildSystemPrompt(data);
    var sendBtn = document.getElementById('ai-send-btn');
    sendBtn.disabled = true;
    sendBtn.textContent = '送信中';
    var thinkingId = appendMsg('ai', '', true);

    try{
      var res = await fetch(ANTHROPIC_URL, {
        method:'POST',
        headers:{
          'content-type':'application/json',
          'x-api-key': key,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body: JSON.stringify({
          model: getModel(),
          max_tokens: 4096,
          // システムプロンプト（取引先・案件・原価の大きなコンテキスト）はキャッシュして
          // 2回目以降のやり取りのコストを抑える（プロンプトキャッシュ）。
          system: [{ type:'text', text: sysPrompt, cache_control:{ type:'ephemeral' } }],
          messages: aiHistory
        })
      });
      if(!res.ok){
        var errText = '';
        try{
          var ej = await res.json();
          errText = (ej.error && ej.error.message) ? ej.error.message : JSON.stringify(ej);
        }catch(_){
          errText = await res.text();
        }
        replaceMsg(thinkingId, 'APIエラー ('+res.status+')\n'+errText, 'error');
        aiHistory.pop();
        persistCurrent();
        return;
      }
      var json = await res.json();
      var reply = '';
      if(json.content && Array.isArray(json.content)){
        reply = json.content.filter(function(c){return c.type==='text';}).map(function(c){return c.text;}).join('\n\n');
      }
      if(!reply) reply = '(返答が空でした)';
      replaceMsg(thinkingId, reply);
      aiHistory.push({role:'assistant', content:reply});
      persistCurrent();   // AI返答を含めて再保存
    }catch(e){
      replaceMsg(thinkingId, '通信エラー: '+(e && e.message ? e.message : String(e)), 'error');
      aiHistory.pop();
      persistCurrent();
    }finally{
      sendBtn.disabled = false;
      sendBtn.textContent = '送信';
    }
  };

  document.addEventListener('DOMContentLoaded', function(){
    // モデル選択の初期化
    var sel = document.getElementById('ai-model');
    if(sel){
      sel.innerHTML = MODELS.map(function(m){
        return '<option value="'+m.id+'">'+escapeHtml(m.label)+'</option>';
      }).join('');
      sel.value = getModel();
      sel.addEventListener('change', function(){
        setModel(sel.value);
        var lbl = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text : sel.value;
        appendMsg('system', 'モデルを「'+lbl+'」に切り替えました。');
      });
    }

    var ta = document.getElementById('ai-input-text');
    if(!ta) return;
    ta.addEventListener('input', function(){
      ta.style.height='auto';
      ta.style.height = Math.min(140, ta.scrollHeight) + 'px';
    });
    ta.addEventListener('keydown', function(e){
      if(e.key==='Enter' && !e.shiftKey && !e.isComposing){
        e.preventDefault();
        window.aiSend();
      }
    });
    // ESCで履歴モーダルを閉じる
    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape'){
        var m = document.getElementById('ai-hist-modal');
        if(m && m.classList.contains('open')) window.aiCloseHistory();
      }
    });

    // 前回の会話を復元（あれば）
    restoreCurrent();

    // APIキー未設定なら起動時に促す
    if(!getKey()){
      setTimeout(function(){
        window.aiPromptKey();
      }, 300);
    }
  });
})();
</script>
</body>
</html>
