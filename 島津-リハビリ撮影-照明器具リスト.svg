<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1188 840" font-family="'Noto Sans CJK JP','Noto Sans JP','IPAGothic','Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif">
  <rect x="0" y="0" width="1188" height="840" fill="#fff"/>
  <text x="24" y="38" font-size="20" font-weight="bold" fill="#1a2a3a">■大分リハビリテーション病院 一般撮影室 照明器具リスト</text>
  <text x="1164" y="38" font-size="12" fill="#555" text-anchor="end">2026/06/17　GUIDE-1</text>
  <text x="24" y="60" font-size="11" fill="#c0392b">※本工事は内装（クロス・床シート・巾木）。照明は既存・本工事対象外。本リストは既存器具の記録（新築時は型番・姿図・単価を記入するテンプレート）。</text>

  <!-- 表 -->
  <g stroke="#888" stroke-width="1" fill="none">
    <rect x="20" y="74" width="1148" height="170"/>
    <line x1="20" y1="104" x2="1168" y2="104"/>
    <line x1="20" y1="176" x2="1168" y2="176"/>
    <!-- 縦罫 -->
    <line x1="80" y1="74" x2="80" y2="244"/>
    <line x1="220" y1="74" x2="220" y2="244"/>
    <line x1="430" y1="74" x2="430" y2="244"/>
    <line x1="540" y1="74" x2="540" y2="244"/>
    <line x1="700" y1="74" x2="700" y2="244"/>
    <line x1="760" y1="74" x2="760" y2="244"/>
    <line x1="900" y1="74" x2="900" y2="244"/>
    <line x1="1000" y1="74" x2="1000" y2="244"/>
  </g>
  <rect x="20" y="74" width="1148" height="30" fill="#eef2f6"/>
  <g font-size="11.5" font-weight="bold" fill="#1a2a3a" text-anchor="middle">
    <text x="50" y="94">符号</text>
    <text x="150" y="94">場所</text>
    <text x="325" y="94">器具種別</text>
    <text x="485" y="94">メーカー</text>
    <text x="620" y="94">品番・型番</text>
    <text x="730" y="94">数量</text>
    <text x="830" y="94">ランプ/W</text>
    <text x="950" y="94">色温</text>
    <text x="1084" y="94">備考</text>
  </g>

  <!-- 行1: ベースライト 40W×2 -->
  <g font-size="11" fill="#222" text-anchor="middle">
    <circle cx="50" cy="140" r="13" fill="#f6e6a8" stroke="#c8a93e" stroke-width="1.3"/><text x="50" y="144" font-weight="bold">L1</text>
    <text x="150" y="144">一般撮影室</text>
    <text x="325" y="144">ベースライト（蛍光灯 40W×2）</text>
    <text x="485" y="138" fill="#555">既存</text><text x="485" y="153" fill="#555">（要確認）</text>
    <text x="620" y="144" fill="#555">既存</text>
    <text x="730" y="144" font-weight="bold">4</text>
    <text x="830" y="144">FL40W×2</text>
    <text x="950" y="144" fill="#555">既存</text>
  </g>
  <text x="1008" y="138" font-size="10" fill="#222">既存利用・本工事対象外。</text>
  <text x="1008" y="153" font-size="10" fill="#c0392b">クロス施工時は養生／脱着要確認。</text>

  <!-- 行2: 非常灯 -->
  <g font-size="11" fill="#222" text-anchor="middle">
    <circle cx="50" cy="210" r="13" fill="#ead3ee" stroke="#9a4a9a" stroke-width="1.3"/><text x="50" y="214" font-weight="bold">E1</text>
    <text x="150" y="214">一般撮影室</text>
    <text x="325" y="214">非常照明（非常灯）</text>
    <text x="485" y="214" fill="#555">既存</text>
    <text x="620" y="214" fill="#555">既存</text>
    <text x="730" y="214" font-weight="bold">1</text>
    <text x="830" y="214" fill="#555">―</text>
    <text x="950" y="214" fill="#555">―</text>
  </g>
  <text x="1008" y="214" font-size="10" fill="#222">既存。位置は清書参照。</text>

  <!-- 凡例・備考 -->
  <text x="24" y="282" font-size="13" font-weight="bold" fill="#1a2a3a">■備考・凡例</text>
  <rect x="20" y="290" width="1148" height="180" fill="#fff" stroke="#888" stroke-width="1"/>
  <g font-size="11" fill="#222">
    <text x="34" y="314">○ 符号：L=一般照明／E=非常・誘導。色分け＝照明(黄)・非常灯(紫)は清書の什器色分けと共通。</text>
    <text x="34" y="336">○ 既存器具（メーカー/型番/色温/単価）は現場確認。本案件は内装のみのため見積対象外。</text>
    <text x="34" y="358" fill="#c0392b">※ クロス・天井施工に伴う器具の一時脱着・養生の要否を島津／病院と確認（撮影機器との取合い注意）。</text>
    <text x="34" y="388" font-weight="bold">【新築・改修で器具を選定する場合のテンプレート列】</text>
    <text x="34" y="408" fill="#555">符号／場所／器具種別／メーカー／品番・型番／数量／ランプ・W／色温(例2700K)／単価／姿図・写真／備考</text>
    <text x="34" y="430" fill="#555">各器具に製品写真または姿図、定格(lm/W)、ランプ種別、調光要否を添付。復活・変更は赤字＋日付で明示。</text>
    <text x="34" y="452" fill="#555">※グレー字＝支給品（お見積り不要）。</text>
  </g>
</svg>
