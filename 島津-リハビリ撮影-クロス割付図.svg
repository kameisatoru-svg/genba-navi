  <!-- ============ 合計・注記 ============ -->
  <g>
    <text x="290" y="903" font-size="12" fill="#333">○ 壁クロス正味 ≒ <tspan font-weight="bold">49㎡</tspan>（見_改2）／天井 ≒ <tspan font-weight="bold">20㎡</tspan>。切寸計の発注目安 計 ≒ <tspan font-weight="bold">81m</tspan>。各品番は <tspan font-weight="bold">50m乱×1本</tspan>で充足（切売りなら上表m）。</text>

    <text x="290" y="930" font-size="11.5" font-weight="bold" fill="#9a5a00">※ 発注前の確認事項</text>
    <text x="290" y="949" font-size="11" fill="#9a5a00">・柄合わせ要：A面 FE-76751(タテ642)・D面 FE-76728(タテ321ステップ)＝各短冊の切寸をリピート倍数へ切上済（上表に反映）。</text>
    <text x="290" y="966" font-size="11" fill="#9a5a00">・FE-76728 はステップ(半割れ)柄＝隣接短冊を½リピートずらして貼るため、端短冊で +½リピート程度のロスを別途見込む。</text>
    <text x="290" y="983" font-size="11" fill="#9a5a00">・短冊本数は開口(窓・ドア)上も通しで取り、開口部は現場カット＝上表は保守的な通し本数。端短冊(A/C=858・B/D=473)は入隅で回す/逃がす。</text>
    <text x="290" y="1000" font-size="11" fill="#9a5a00">・壁柱670(B面)の見付・見込面、入隅/出隅の回し分、天井ルーバー(エアー吹出)まわりの開口控除・カットは別途加減。</text>
    <text x="290" y="1017" font-size="11" fill="#9a5a00">・無地貼可：C面 FE-76251／リピート無：B面 FE-76109・天井 FE-76202＝柄合わせ不要(ロス加算なし)。</text>
    <text x="290" y="1040" font-size="10.5" fill="#888">寸法は清書基準・概略。割付・数量は発注前にサンゲツ在庫・ロット・巾(92cm)・50m乱単位を最終確認すること。</text>
  </g>
