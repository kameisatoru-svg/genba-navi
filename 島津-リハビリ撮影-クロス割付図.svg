<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 1090" font-family="'Noto Sans CJK JP','Noto Sans JP','IPAGothic','Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif">
  <defs>
    <marker id="dim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M2,2 L8,5 L2,8" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
    <pattern id="col" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#dfe7ec"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#9bb3c2" stroke-width="1.3"/>
    </pattern>
  </defs>

  <text x="30" y="36" font-size="21" font-weight="bold" fill="#1a2a3a">大分リハビリテーション病院 一般撮影室 壁・天井クロス割付図（サンゲツ FE）</text>
  <text x="30" y="56" font-size="12" fill="#555">ロール巾920／横貼り（流れ＝横）＝水平に通す／CH2790＝920×3＋端部30の4段／開口控除・各面FE品番／寸法mm</text>

  <!-- ============ A面 操作室側 (3618×2790) FE-76751 ============ -->
  <g>
    <text x="70" y="108" font-size="13" font-weight="bold" fill="#a8600a">A面 操作室側　FE-76751（L=3618）</text>
    <!-- 帯(横) 下から B1,B2,B3,B4 -->
    <rect x="70" y="135" width="242" height="187" fill="#eaf3fa" stroke="#2c3e50" stroke-width="2.4"/>
    <rect x="70" y="260" width="242" height="62" fill="#dceaf5"/>
    <rect x="70" y="137" width="242" height="62" fill="#dceaf5"/>
    <!-- 横継ぎ(目地) -->
    <g stroke="#c0392b" stroke-width="1" stroke-dasharray="6 3">
      <line x1="70" y1="260" x2="312" y2="260"/>
      <line x1="70" y1="199" x2="312" y2="199"/>
      <line x1="70" y1="137" x2="312" y2="137"/>
    </g>
    <!-- 開口: 窓(腰下860,H850) -->
    <rect x="143" y="207" width="57" height="57" fill="#fff" stroke="#2a6da3" stroke-width="1.3"/>
    <text x="171" y="200" font-size="8.5" fill="#2a6da3" text-anchor="middle">中連窓850</text>
    <!-- 開口: 操作室ドア(H2025) -->
    <rect x="241" y="186" width="65" height="136" fill="#fff" stroke="#e8932e" stroke-width="1.3"/>
    <text x="273" y="258" font-size="8.5" fill="#e8932e" text-anchor="middle">ドア970</text>
    <!-- 帯番号 -->
    <text x="64" y="295" font-size="9" fill="#c0392b" text-anchor="end">①</text>
    <text x="64" y="234" font-size="9" fill="#c0392b" text-anchor="end">②</text>
    <text x="64" y="172" font-size="9" fill="#c0392b" text-anchor="end">③</text>
    <text x="64" y="139" font-size="8" fill="#c0392b" text-anchor="end">④</text>
    <!-- 寸法 CH -->
    <line x1="324" y1="135" x2="324" y2="322" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <text x="331" y="232" font-size="9.5" fill="#c0392b" transform="rotate(-90 331 232)" text-anchor="middle">2790</text>
    <line x1="70" y1="332" x2="312" y2="332" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <text x="191" y="345" font-size="9.5" fill="#c0392b" text-anchor="middle">3618</text>
  </g>

  <!-- ============ C面 廊下側 (3618×2790) FE-76251 ============ -->
  <g>
    <text x="560" y="108" font-size="13" font-weight="bold" fill="#a8600a">C面 廊下側　FE-76251（L=3618）</text>
    <rect x="560" y="135" width="242" height="187" fill="#eaf3fa" stroke="#2c3e50" stroke-width="2.4"/>
    <rect x="560" y="260" width="242" height="62" fill="#dceaf5"/>
    <rect x="560" y="137" width="242" height="62" fill="#dceaf5"/>
    <g stroke="#c0392b" stroke-width="1" stroke-dasharray="6 3">
      <line x1="560" y1="260" x2="802" y2="260"/>
      <line x1="560" y1="199" x2="802" y2="199"/>
      <line x1="560" y1="137" x2="802" y2="137"/>
    </g>
    <!-- 開口: 親子ドア(H2025,W1280) -->
    <rect x="710" y="186" width="86" height="136" fill="#fff" stroke="#e8932e" stroke-width="1.3"/>
    <text x="753" y="258" font-size="8.5" fill="#e8932e" text-anchor="middle">親子ドア1280</text>
    <text x="554" y="295" font-size="9" fill="#c0392b" text-anchor="end">①</text>
    <text x="554" y="234" font-size="9" fill="#c0392b" text-anchor="end">②</text>
    <text x="554" y="172" font-size="9" fill="#c0392b" text-anchor="end">③</text>
    <text x="554" y="139" font-size="8" fill="#c0392b" text-anchor="end">④</text>
    <line x1="560" y1="332" x2="802" y2="332" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <text x="681" y="345" font-size="9.5" fill="#c0392b" text-anchor="middle">3618</text>
  </g>

  <!-- ============ B面 空室側 (5073×2790) FE-76109 ============ -->
  <g>
    <text x="70" y="388" font-size="13" font-weight="bold" fill="#a8600a">B面 空室側　FE-76109（L=5073）　※壁柱670あり</text>
    <rect x="70" y="415" width="340" height="187" fill="#eaf3fa" stroke="#2c3e50" stroke-width="2.4"/>
    <rect x="70" y="540" width="340" height="62" fill="#dceaf5"/>
    <rect x="70" y="417" width="340" height="62" fill="#dceaf5"/>
    <g stroke="#c0392b" stroke-width="1" stroke-dasharray="6 3">
      <line x1="70" y1="540" x2="410" y2="540"/>
      <line x1="70" y1="479" x2="410" y2="479"/>
      <line x1="70" y1="417" x2="410" y2="417"/>
    </g>
    <!-- 壁柱(全高) -->
    <rect x="156" y="415" width="45" height="187" fill="url(#col)" stroke="#2c3e50" stroke-width="1.2"/>
    <text x="178" y="510" font-size="8.5" fill="#2c3e50" text-anchor="middle" font-weight="bold">壁柱</text>
    <!-- ドアW900(H2025) -->
    <rect x="203" y="466" width="60" height="136" fill="#fff" stroke="#e8932e" stroke-width="1.3"/>
    <text x="233" y="538" font-size="8.5" fill="#e8932e" text-anchor="middle">ドア900</text>
    <text x="64" y="575" font-size="9" fill="#c0392b" text-anchor="end">①</text>
    <text x="64" y="514" font-size="9" fill="#c0392b" text-anchor="end">②</text>
    <text x="64" y="452" font-size="9" fill="#c0392b" text-anchor="end">③</text>
    <text x="64" y="419" font-size="8" fill="#c0392b" text-anchor="end">④</text>
    <line x1="70" y1="612" x2="410" y2="612" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <text x="240" y="625" font-size="9.5" fill="#c0392b" text-anchor="middle">5073</text>
  </g>

  <!-- ============ D面 受付側 (5073×2790) FE-76728 ============ -->
  <g>
    <text x="560" y="388" font-size="13" font-weight="bold" fill="#a8600a">D面 受付側　FE-76728（L=5073・開口なし）</text>
    <rect x="560" y="415" width="340" height="187" fill="#eaf3fa" stroke="#2c3e50" stroke-width="2.4"/>
    <rect x="560" y="540" width="340" height="62" fill="#dceaf5"/>
    <rect x="560" y="417" width="340" height="62" fill="#dceaf5"/>
    <g stroke="#c0392b" stroke-width="1" stroke-dasharray="6 3">
      <line x1="560" y1="540" x2="900" y2="540"/>
      <line x1="560" y1="479" x2="900" y2="479"/>
      <line x1="560" y1="417" x2="900" y2="417"/>
    </g>
    <text x="554" y="575" font-size="9" fill="#c0392b" text-anchor="end">①</text>
    <text x="554" y="514" font-size="9" fill="#c0392b" text-anchor="end">②</text>
    <text x="554" y="452" font-size="9" fill="#c0392b" text-anchor="end">③</text>
    <text x="554" y="419" font-size="8" fill="#c0392b" text-anchor="end">④</text>
    <line x1="560" y1="612" x2="900" y2="612" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <text x="730" y="625" font-size="9.5" fill="#c0392b" text-anchor="middle">5073</text>
    <text x="730" y="500" font-size="11" fill="#2a6da3" text-anchor="middle">①〜④ 各920巾を水平に通す</text>
  </g>

  <!-- ============ 天井 (3618×5073) FE-76202 ============ -->
  <g>
    <text x="70" y="668" font-size="13" font-weight="bold" fill="#a8600a">天井　FE-76202（3618×5073・ルーバー有）</text>
    <!-- plan s2=0.0394: 3618->143, 5073->200 -->
    <rect x="70" y="685" width="143" height="200" fill="#eef6f0" stroke="#2c3e50" stroke-width="2"/>
    <!-- 4列(920巾) 縦方向(5073に通す) -->
    <g stroke="#7aa37d" stroke-width="1" stroke-dasharray="5 3">
      <line x1="106" y1="685" x2="106" y2="885"/>
      <line x1="142" y1="685" x2="142" y2="885"/>
      <line x1="178" y1="685" x2="178" y2="885"/>
    </g>
    <text x="88" y="790" font-size="8" fill="#5a7a5d" text-anchor="middle" transform="rotate(-90 88 790)">①</text>
    <text x="124" y="790" font-size="8" fill="#5a7a5d" text-anchor="middle" transform="rotate(-90 124 790)">②</text>
    <text x="160" y="790" font-size="8" fill="#5a7a5d" text-anchor="middle" transform="rotate(-90 160 790)">③</text>
    <text x="196" y="790" font-size="8" fill="#5a7a5d" text-anchor="middle" transform="rotate(-90 196 790)">④</text>
    <text x="142" y="905" font-size="9.5" fill="#555" text-anchor="middle">920×4列（5073方向に通す）</text>
  </g>

  <!-- ============ 数量メモ ============ -->
  <g transform="translate(300,690)">
    <rect x="-8" y="-16" width="610" height="350" fill="#fdf6ef" stroke="#a8600a" stroke-width="1.2" rx="6"/>
    <text x="0" y="2" font-size="14" font-weight="bold" fill="#a8600a">クロス 割付・数量（920巾・横貼り）</text>
    <text x="0" y="26" font-size="12" fill="#333">○ 横貼り：各面とも 920巾の帯を水平に通す。CH2790 ＝</text>
    <text x="16" y="44" font-size="12" fill="#333">①920 ＋ ②920 ＋ ③920 ＋ ④端部30 ＝ 4段</text>

    <text x="0" y="72" font-size="12.5" font-weight="bold" fill="#333">面別（帯長＝壁長／開口は控除しカット）</text>
    <text x="0" y="92" font-size="12" fill="#333">・A面 操作室側 FE-76751：4段×3618 ＝ 14.5m（窓・ドア控除）</text>
    <text x="0" y="110" font-size="12" fill="#333">・B面 空室側　FE-76109：4段×5073 ＝ 20.3m（壁柱・ドア控除）</text>
    <text x="0" y="128" font-size="12" fill="#333">・C面 廊下側　FE-76251：4段×3618 ＝ 14.5m（親子ドア控除）</text>
    <text x="0" y="146" font-size="12" fill="#333">・D面 受付側　FE-76728：4段×5073 ＝ 20.3m（開口なし）</text>
    <text x="0" y="164" font-size="12" fill="#333">・天井　　　　FE-76202：920×4列×5073 ＝ 20.3m</text>

    <text x="0" y="190" font-size="12" fill="#333">○ 壁クロス正味 ≒ <tspan font-weight="bold">49㎡</tspan>（見積）。横貼り総延長(粗) ≒ 69.5m＋天井20.3m</text>
    <text x="0" y="208" font-size="12" fill="#333">○ 発注はロール巾920で品番別に集計（FE品番ごとに分ける）</text>

    <text x="0" y="234" font-size="11.5" fill="#9a5a00" font-weight="bold">※ 要確認</text>
    <text x="0" y="251" font-size="11.5" fill="#9a5a00">・CH2790は920の倍数でないため最上段が30mmの細帯になります。</text>
    <text x="16" y="267" font-size="11.5" fill="#9a5a00">横貼りだとロス大。縦貼り（高さ2790通し）の方が歩留り良。</text>
    <text x="0" y="285" font-size="11.5" fill="#9a5a00">・FE品番系は無地〜微柄。柄合わせ(リピート)有無を発注前に確認。</text>
    <text x="0" y="303" font-size="11.5" fill="#9a5a00">・壁柱(670)の見付・見込面、入隅/出隅の回し分は別途加算。</text>
    <text x="0" y="324" font-size="10.5" fill="#888">寸法は清書基準・概略／割付・数量は発注前に最終確認。</text>
  </g>
</svg>
