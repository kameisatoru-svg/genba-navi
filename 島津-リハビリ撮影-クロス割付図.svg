<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 1090" font-family="'Noto Sans CJK JP','Noto Sans JP','IPAGothic','Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif">
  <defs>
    <marker id="dimS" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto">
      <path d="M8,2 L2,5 L8,8" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
    <marker id="dimE" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M2,2 L8,5 L2,8" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
    <pattern id="col" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#dfe7ec"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#9bb3c2" stroke-width="1.3"/>
    </pattern>
  </defs>

  <text x="30" y="36" font-size="21" font-weight="bold" fill="#1a2a3a">大分リハビリテーション病院 一般撮影室 壁・天井クロス割付図（サンゲツ FE）</text>
  <text x="30" y="56" font-size="12" fill="#555">壁＝縦貼り（短冊 巾920×高さCH2790＋上下しろ）／天井＝横流れ（920帯を3618方向に通す）／開口控除・各面FE品番／寸法mm</text>

  <!-- ============ A面 操作室側 (3618×2790) FE-76751 縦貼り4短冊 ============ -->
  <g>
    <text x="70" y="108" font-size="13" font-weight="bold" fill="#a8600a">A面 操作室側　FE-76751（L=3618）縦貼り4短冊</text>
    <rect x="70" y="135" width="242" height="187" fill="#eaf3fa" stroke="#2c3e50" stroke-width="2.4"/>
    <rect x="131.6" y="135" width="61.7" height="187" fill="#dceaf5"/>
    <rect x="254.9" y="135" width="57.1" height="187" fill="#dceaf5"/>
    <g stroke="#c0392b" stroke-width="1" stroke-dasharray="6 3">
      <line x1="131.6" y1="135" x2="131.6" y2="322"/>
      <line x1="193.3" y1="135" x2="193.3" y2="322"/>
      <line x1="254.9" y1="135" x2="254.9" y2="322"/>
    </g>
    <!-- 窓(中連・腰下860,H850) -->
    <rect x="143" y="207" width="57" height="57" fill="#fff" stroke="#2a6da3" stroke-width="1.3"/>
    <text x="171" y="200" font-size="8.5" fill="#2a6da3" text-anchor="middle">中連窓850</text>
    <!-- 操作室ドア(H2025) -->
    <rect x="241" y="186" width="65" height="136" fill="#fff" stroke="#e8932e" stroke-width="1.3"/>
    <text x="273" y="258" font-size="8.5" fill="#e8932e" text-anchor="middle">ドア970</text>
    <!-- 短冊番号 -->
    <text x="100" y="131" font-size="9" fill="#c0392b" text-anchor="middle">①</text>
    <text x="162" y="131" font-size="9" fill="#c0392b" text-anchor="middle">②</text>
    <text x="224" y="131" font-size="9" fill="#c0392b" text-anchor="middle">③</text>
    <text x="283" y="131" font-size="9" fill="#c0392b" text-anchor="middle">④</text>
    <line x1="324" y1="135" x2="324" y2="322" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
    <text x="316" y="232" font-size="9.5" fill="#c0392b" transform="rotate(-90 316 232)" text-anchor="middle">2790</text>
    <line x1="70" y1="342" x2="312" y2="342" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
    <text x="191" y="335" font-size="9.5" fill="#c0392b" text-anchor="middle">3618</text>
  </g>

  <!-- ============ C面 廊下側 (3618×2790) FE-76251 縦貼り4短冊 ============ -->
  <g>
    <text x="560" y="108" font-size="13" font-weight="bold" fill="#a8600a">C面 廊下側　FE-76251（L=3618）縦貼り4短冊</text>
    <rect x="560" y="135" width="242" height="187" fill="#eaf3fa" stroke="#2c3e50" stroke-width="2.4"/>
    <rect x="621.6" y="135" width="61.7" height="187" fill="#dceaf5"/>
    <rect x="744.9" y="135" width="57.1" height="187" fill="#dceaf5"/>
    <g stroke="#c0392b" stroke-width="1" stroke-dasharray="6 3">
      <line x1="621.6" y1="135" x2="621.6" y2="322"/>
      <line x1="683.3" y1="135" x2="683.3" y2="322"/>
      <line x1="744.9" y1="135" x2="744.9" y2="322"/>
    </g>
    <!-- 親子ドア(H2025,W1280) -->
    <rect x="710" y="186" width="86" height="136" fill="#fff" stroke="#e8932e" stroke-width="1.3"/>
    <text x="753" y="258" font-size="8.5" fill="#e8932e" text-anchor="middle">親子ドア1280</text>
    <text x="590" y="131" font-size="9" fill="#c0392b" text-anchor="middle">①</text>
    <text x="652" y="131" font-size="9" fill="#c0392b" text-anchor="middle">②</text>
    <text x="714" y="131" font-size="9" fill="#c0392b" text-anchor="middle">③</text>
    <text x="773" y="131" font-size="9" fill="#c0392b" text-anchor="middle">④</text>
    <line x1="560" y1="342" x2="802" y2="342" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
    <text x="681" y="335" font-size="9.5" fill="#c0392b" text-anchor="middle">3618</text>
  </g>

  <!-- ============ B面 空室側 (5073×2790) FE-76109 縦貼り6短冊 ============ -->
  <g>
    <text x="70" y="388" font-size="13" font-weight="bold" fill="#a8600a">B面 空室側　FE-76109（L=5073）縦貼り6短冊　※壁柱670あり</text>
    <rect x="70" y="415" width="340" height="187" fill="#eaf3fa" stroke="#2c3e50" stroke-width="2.4"/>
    <rect x="131.6" y="415" width="61.7" height="187" fill="#dceaf5"/>
    <rect x="254.9" y="415" width="61.7" height="187" fill="#dceaf5"/>
    <rect x="378.2" y="415" width="31.8" height="187" fill="#dceaf5"/>
    <g stroke="#c0392b" stroke-width="1" stroke-dasharray="6 3">
      <line x1="131.6" y1="415" x2="131.6" y2="602"/>
      <line x1="193.3" y1="415" x2="193.3" y2="602"/>
      <line x1="254.9" y1="415" x2="254.9" y2="602"/>
      <line x1="316.6" y1="415" x2="316.6" y2="602"/>
      <line x1="378.2" y1="415" x2="378.2" y2="602"/>
    </g>
    <!-- 壁柱(全高) -->
    <rect x="156" y="415" width="45" height="187" fill="url(#col)" stroke="#2c3e50" stroke-width="1.2"/>
    <text x="178" y="510" font-size="8.5" fill="#2c3e50" text-anchor="middle" font-weight="bold">壁柱</text>
    <!-- ドアW900(H2025) -->
    <rect x="203" y="466" width="60" height="136" fill="#fff" stroke="#e8932e" stroke-width="1.3"/>
    <text x="233" y="538" font-size="8.5" fill="#e8932e" text-anchor="middle">ドア900</text>
    <text x="100" y="411" font-size="9" fill="#c0392b" text-anchor="middle">①</text>
    <text x="162" y="411" font-size="9" fill="#c0392b" text-anchor="middle">②</text>
    <text x="224" y="411" font-size="9" fill="#c0392b" text-anchor="middle">③</text>
    <text x="285" y="411" font-size="9" fill="#c0392b" text-anchor="middle">④</text>
    <text x="347" y="411" font-size="9" fill="#c0392b" text-anchor="middle">⑤</text>
    <text x="394" y="411" font-size="9" fill="#c0392b" text-anchor="middle">⑥</text>
    <line x1="70" y1="620" x2="410" y2="620" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
    <text x="240" y="613" font-size="9.5" fill="#c0392b" text-anchor="middle">5073</text>
  </g>

  <!-- ============ D面 受付側 (5073×2790) FE-76728 縦貼り6短冊 ============ -->
  <g>
    <text x="560" y="388" font-size="13" font-weight="bold" fill="#a8600a">D面 受付側　FE-76728（L=5073・開口なし）縦貼り6短冊</text>
    <rect x="560" y="415" width="340" height="187" fill="#eaf3fa" stroke="#2c3e50" stroke-width="2.4"/>
    <rect x="621.6" y="415" width="61.7" height="187" fill="#dceaf5"/>
    <rect x="744.9" y="415" width="61.7" height="187" fill="#dceaf5"/>
    <rect x="868.2" y="415" width="31.8" height="187" fill="#dceaf5"/>
    <g stroke="#c0392b" stroke-width="1" stroke-dasharray="6 3">
      <line x1="621.6" y1="415" x2="621.6" y2="602"/>
      <line x1="683.3" y1="415" x2="683.3" y2="602"/>
      <line x1="744.9" y1="415" x2="744.9" y2="602"/>
      <line x1="806.6" y1="415" x2="806.6" y2="602"/>
      <line x1="868.2" y1="415" x2="868.2" y2="602"/>
    </g>
    <text x="590" y="411" font-size="9" fill="#c0392b" text-anchor="middle">①</text>
    <text x="652" y="411" font-size="9" fill="#c0392b" text-anchor="middle">②</text>
    <text x="714" y="411" font-size="9" fill="#c0392b" text-anchor="middle">③</text>
    <text x="775" y="411" font-size="9" fill="#c0392b" text-anchor="middle">④</text>
    <text x="837" y="411" font-size="9" fill="#c0392b" text-anchor="middle">⑤</text>
    <text x="884" y="411" font-size="9" fill="#c0392b" text-anchor="middle">⑥</text>
    <line x1="560" y1="620" x2="900" y2="620" stroke="#c0392b" stroke-width="0.8" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
    <text x="730" y="613" font-size="9.5" fill="#c0392b" text-anchor="middle">5073</text>
  </g>

  <!-- ============ 天井 (3618×5073) FE-76202 横流れ6帯 ============ -->
  <g>
    <text x="70" y="668" font-size="13" font-weight="bold" fill="#a8600a">天井　FE-76202（3618×5073・横流れ＝3618方向に通す）</text>
    <!-- plan 3618->143(s=0.0395), 5073->200 -->
    <rect x="70" y="685" width="143" height="200" fill="#eef6f0" stroke="#2c3e50" stroke-width="2"/>
    <rect x="70" y="721.3" width="143" height="36.3" fill="#e2efe5"/>
    <rect x="70" y="793.9" width="143" height="36.3" fill="#e2efe5"/>
    <rect x="70" y="866.5" width="143" height="18.5" fill="#e2efe5"/>
    <g stroke="#7aa37d" stroke-width="1" stroke-dasharray="5 3">
      <line x1="70" y1="721.3" x2="213" y2="721.3"/>
      <line x1="70" y1="757.6" x2="213" y2="757.6"/>
      <line x1="70" y1="793.9" x2="213" y2="793.9"/>
      <line x1="70" y1="830.2" x2="213" y2="830.2"/>
      <line x1="70" y1="866.5" x2="213" y2="866.5"/>
    </g>
    <text x="60" y="706" font-size="8" fill="#5a7a5d" text-anchor="end">①</text>
    <text x="60" y="742" font-size="8" fill="#5a7a5d" text-anchor="end">②</text>
    <text x="60" y="778" font-size="8" fill="#5a7a5d" text-anchor="end">③</text>
    <text x="60" y="815" font-size="8" fill="#5a7a5d" text-anchor="end">④</text>
    <text x="60" y="851" font-size="8" fill="#5a7a5d" text-anchor="end">⑤</text>
    <text x="60" y="881" font-size="8" fill="#5a7a5d" text-anchor="end">⑥</text>
    <text x="142" y="903" font-size="9.5" fill="#555" text-anchor="middle">920×6帯（3618方向＝横に通す）</text>
  </g>

  <!-- ============ 数量メモ ============ -->
  <g transform="translate(300,690)">
    <rect x="-8" y="-16" width="610" height="350" fill="#fdf6ef" stroke="#a8600a" stroke-width="1.2" rx="6"/>
    <text x="0" y="2" font-size="14" font-weight="bold" fill="#a8600a">クロス 割付・数量（920巾）</text>
    <text x="0" y="24" font-size="12" fill="#333">○ 壁＝<tspan font-weight="bold">縦貼り</tspan>（短冊 巾920×高さCH2790＋上下しろ）</text>
    <text x="0" y="42" font-size="12" fill="#333">○ 天井＝<tspan font-weight="bold">横流れ</tspan>（920帯を3618方向に通す）</text>

    <text x="0" y="68" font-size="12.5" font-weight="bold" fill="#333">面別 短冊数（開口は控除しカット）</text>
    <text x="0" y="88" font-size="12" fill="#333">・A面 操作室側 FE-76751：4短冊（窓・ドア控除）</text>
    <text x="0" y="106" font-size="12" fill="#333">・B面 空室側　FE-76109：6短冊（壁柱・ドア控除）</text>
    <text x="0" y="124" font-size="12" fill="#333">・C面 廊下側　FE-76251：4短冊（親子ドア控除）</text>
    <text x="0" y="142" font-size="12" fill="#333">・D面 受付側　FE-76728：6短冊（開口なし）</text>
    <text x="0" y="160" font-size="12" fill="#333">・天井　　　　FE-76202：920×6帯×3618 ＝ 21.7m</text>

    <text x="0" y="186" font-size="12" fill="#333">○ 壁 短冊計 20本×（2790＋しろ） ≒ 58〜60m（粗）</text>
    <text x="0" y="204" font-size="12" fill="#333">○ 壁クロス正味 ≒ <tspan font-weight="bold">49㎡</tspan>（見積）／発注はFE品番別に集計</text>

    <text x="0" y="230" font-size="11.5" fill="#9a5a00" font-weight="bold">※ 要確認</text>
    <text x="0" y="247" font-size="11.5" fill="#9a5a00">・短冊割付の端短冊（A/C=858、B/D=473）は入隅で回す/逃がす。</text>
    <text x="0" y="263" font-size="10.5" fill="#9a5a00">・柄合わせ要：A面FE-76751(タテ64.2)・D面FE-76728(タテ32.1ステップ)＝各短冊長をタテリピート倍数に切上げ加算。他(76251無地貼可/76109/76202リピート無)＝不要。</text>
    <text x="0" y="279" font-size="11.5" fill="#9a5a00">・壁柱(670)の見付・見込面、入隅/出隅の回し分は別途加算。</text>
    <text x="0" y="295" font-size="11.5" fill="#9a5a00">・天井ルーバー(エアー吹出)まわりは開口控除・カット。</text>
    <text x="0" y="318" font-size="10.5" fill="#888">寸法は清書基準・概略／割付・数量は発注前に最終確認。</text>
  </g>
</svg>
